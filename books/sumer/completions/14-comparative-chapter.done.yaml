summary: >
  Wrote the single comparative chapter for the Sumerian mythology book.
  The chapter is the only place in the book where cross-cultural
  comparison is allowed; the ~496 `// COMPARATIVE-HOOK:` markers
  distributed across the 36 story chapters and the introduction were
  consolidated and worked up here. Starts with an opening essay on what
  kinds of comparison are valid (shared cultural substrate, documented
  diffusion, independent parallel invention, and disciplined structural
  typology in the Dumézil/Puhvel/West tradition) and what kinds are not
  (Frazerian universalism, Jungian archetypalism). Each major
  comparative section pairs at least one in-scope Sumerian source
  citation with at least one out-of-scope source citation, and uses
  [SPECULATION: ...] tags for hypotheses that are plausible but not
  scholarly consensus. Closes by reiterating that priority is not
  causation and that Sumerian material must be read first in its own
  terms.

structure:
  - opening: "scope and limits of comparison"
  - cosmogonic_parallels: "Nammu/Genesis, clay creation/Prometheus, heaven-earth separation/Pangu-Ouranos, divine assignment of domains"
  - chaoskampf: "Lugal-e as prototype; Marduk/Tiamat (out of scope), Indra/Vrtra, Zeus/Typhon, Thor/Jörmungandr; Dumézil"
  - descent_and_dying_god: "Inanna/Persephone; Dumuzid/Adonis/Osiris/Baldr; Frazer critique; Izanagi/Izanami as independent invention; law of substitute flagged as distinctive"
  - heroic_narratives: "Gilgamesh/Achilles kleos; Lugalbanda/Odysseus wilderness trial; Anzud/Roc/Garuda"
  - divine_kingship: "Enlil/Inanna/Athena; temple-building Ugaritic Baal Cycle"
  - underworld: "Kur/Hades/Duat/Sheol; Odyssey 11 Nekyia; law of substitute as Sumerian distinctive"
  - debate_genre: "Medieval Conflictus and Owl-and-Nightingale as independent reinventions; Aesop/Panchatantra; Akkadian-Aramaic-Arabic transmission channel vs. independent Latin reinvention"
  - flood_story: "Eridu Genesis -> Atrahasis -> Gilgamesh XI -> Genesis; Deucalion; Manu; reed-wall device distinctive to Sumer/Akkad"
  - closing: "priority is not causation; defend against universalism"

