ant copula. All 19 footnote anchors and 28 footnote bodies (verified byte-identical via bracket-aware extraction) preserved. All four resolved-marker passages (italicized parentheticals at lines 38 and 69, bracketed editorial note at line 28, reconstruction footnote at line 51) are byte-identical to the input. All // EVIDENCE and // COMPARATIVE-HOOK comments unchanged. AsciiDoc heading, thematic-break separators (\"'''\"), and footnote syntax untouched. Chosen renderings (Ninurta, Enlil, Ninlil, Ninhursaja, Nippur/Nibru, _kur_, _me-lam_) preserved per glossary. First-mention glosses for Ninurta, Nippur, Enlil, Ninlil, _kur_, _me-lam_ all retained intact. Diff file enumerates each non-trivial sentence change with its Pinker rationale."
