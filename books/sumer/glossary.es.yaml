# ── Convenciones generales (no-término) ──────────────────────────────

bibliography_policy: >
  Los títulos de las obras citadas en las notas al pie y en
  bibliography.bib se mantienen en su lengua original (inglés,
  alemán, francés) siguiendo la convención Chicago author-date. No
  se traducen. Los nombres de los autores (Kramer, Jacobsen, Black,
  Bottéro, Flückiger-Hawker, etc.) tampoco se traducen.

direct_quotations_policy: >
  Las citas directas de traducciones académicas al inglés
  (Black/Cunningham/Robson/Zólyomi 2004; Jacobsen 1987; Kramer
  1961; Vanstiphout 2003; George 2003) se traducen al español
  dentro del texto y se añade una nota al pie del tipo «Traducción
  propia del inglés de <autor> <año>.» salvo que se disponga de una
  traducción publicada al español citable.

punctuation_policy: >
  Comillas: guillemets franceses «...» para el discurso directo y
  los títulos dentro del cuerpo. Apertura de interrogación y
  exclamación con ¿ y ¡. Guion largo (—) para incisos, sin espacios
  interiores, con espacios exteriores. Cursivas para términos
  extranjeros transliterados (me, kur, abzu, me-lam, edubba, galla,
  huluppu, en, ensi, lugal, abgal, lukur) y para títulos de obras
  dentro del cuerpo.

register_policy: >
  Divulgación científica al estilo Asimov: prosa llana, voz activa
  por defecto, verbos concretos. Evitar cadenas de nominalizaciones
  («la realización de la verificación de» → «verificar»), pasivas
  sin agente cuando cabe activa, pilas latinizantes («con el objeto
  de proceder a» → «para») y fórmulas de apertura vacías («cabe
  destacar que…»). El público objetivo es el lector general
  hispanohablante, no el especialista.

