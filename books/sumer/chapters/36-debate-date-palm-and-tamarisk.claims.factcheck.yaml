    evidence: "The Akkadian text (Lambert BWL) has detailed product catalogues; the Sumerian fragments are too broken to confirm."
    recommended_fix: "Qualify which products are attested in Sumerian vs. inferred from the Akkadian parallel or general cultural knowledge."

