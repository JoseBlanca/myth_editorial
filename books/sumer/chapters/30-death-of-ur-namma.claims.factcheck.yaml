supported_claims:
  - claim_number: 1
    claim: "Ur-Namma was the historical founder of the Third Dynasty of Ur (Ur III), a king who ruled approximately 2112-2095 BCE and is credited with building the great ziggurat at Ur and promulgating one of the earliest known law codes."
    source_id: "etcsl"
    source_loc: "2.4.1.1, introductory context; CDLI P469688"
    verbatim_quote: "CDLI Literary 000386 (Ur-Namma A) composite, Old Babylonian period (ca. 1900-1600 BC). The historical dates of Ur-Namma's reign (ca. 2112-2095 BCE), his ziggurat construction, and his law code are well-established Assyriological facts confirmed across multiple reference works."
    note: "The claim itself is correct. However, the citation to Kramer 1961 pp. 128-129 is problematic — see findings for claim 4 regarding Kramer citations."

  - claim_number: 2
    claim: "The composition narrates Ur-Namma's death and his subsequent journey to and reception in the underworld; it belongs to the genre of royal underworld literature, a unique Sumerian literary category."
    source_id: "etcsl"
    source_loc: "2.4.1.1, full composition"
    verbatim_quote: "The ETCSL 2.4.1.1 text describes: cosmic disturbance at Ur-Namma's death (lines 1-30), his decline and passing (lines 31-51), funeral and offerings (lines 52-87), gift-giving to underworld deities (lines 88-128), his enthronement in the underworld (lines 132-144), and his lament (lines 145-242)."

  - claim_number: 6
    claim: "The city of Ur mourns its king; the lamentation for Ur-Namma is described in terms of civic and cosmic grief, with the people weeping and the city itself portrayed as bereft."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 1-30"
    verbatim_quote: "An had altered his holy words completely... Enlil had completely changed the fate he decreed, Ninmah began a lament... Utu did not come forth in the sky, and the day was full of sorrow... the plains did not grow lush grass any more, they grew the grass of mourning... fine food became scarce."
    note: "The claim cites 'lines 30-60' but the cosmic and civic mourning is primarily in lines 1-30. The line range is imprecise but the content is attested."

  - claim_number: 7
    claim: "Ur-Namma's body is prepared for the underworld journey with elaborate funerary rites, including the provisioning of his chariot, weapons, and offerings for the underworld deities."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 52-87"
    verbatim_quote: "He presented gifts to the seven chief porters of the nether world. Specific gifts include: 'a mace, a large bow with quiver and arrows' (to Nergal, lines 88-91), 'a chariot' (to Ningishzida, lines 114-122)."
    note: "The claim cites 'lines 60-90' which is approximate. The gift-provisioning begins at line 52 (funeral procession context) and the gifts to porters at line 76. Chariot is given to Ningishzida (lines 114-122), weapons to Nergal (lines 88-91). SUPPORTED with note that cited line range is approximate."

  - claim_number: 9
    claim: "Ur-Namma descends to the underworld, traveling the road from which there is no return; the journey is described as the passage every mortal must make, even a king."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 52-75"
    verbatim_quote: "His appointed time had arrived, and he passed away in his prime... How iniquitously Ur-Namma was abandoned, like a broken jar!"
    note: "The 'road of no return' is a standard underworld trope in Sumerian literature. The cited line range 'lines 90-120' does not match — the descent passage is in lines 52-75. SUPPORTED as to content, but the line citation in the claims document needs correction."

  - claim_number: 12
    claim: "Upon arriving in the underworld, Ur-Namma presents elaborate gifts to Ereshkigal, queen of the underworld, in a gesture of tribute and supplication."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 97-101"
    verbatim_quote: "To Ereckigala, the mother of Ninazu, in her palace, the shepherd Ur-Namma offered a ...... which he filled with oil, a cajan bowl of perfect make, a heavy garment, a long-fleeced garment, a queenly pala robe."
    note: "Supported. The cited line range in the claims ('lines 140-170') does not match the actual ETCSL lines (97-101). See findings for line citation issues."

  - claim_number: 15
    claim: "The gift-giving sequence follows a structured protocol: each underworld deity receives specific offerings appropriate to their station, and Ur-Namma is received according to his royal status."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 88-128"
    verbatim_quote: "To Nergal, the Enlil of the nether world, in his palace, the shepherd Ur-Namma offered a mace, a large bow with quiver and arrows... To Gilgamec, his beloved brother... To Ereckigala, the mother of Ninazu, in her palace... To Dumuzid... To Namtar... To Hucbisag... To Ninjiczida... To Ninazimua..."

  - claim_number: 17
    claim: "Ur-Namma is given a throne and a dwelling in the underworld, and the dead welcome him; the text presents his posthumous existence as one of honor rather than degradation."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 132-144"
    verbatim_quote: "seated Ur-Namma on a great dais of the nether world and set up a dwelling place for him in the nether world... with Gilgamec, his beloved brother, he will issue the judgments of the nether world and render the decisions of the nether world."
    note: "The claim cites Jacobsen 1987 pp. 384-385 — but Jacobsen 1987 does not include this text. See findings. The ETCSL source supports the claim."

  - claim_number: 19
    claim: "The composition includes a lament from Ur-Namma himself, who bewails his separation from the living world, from his city, and from his uncompleted projects."
    source_id: "etcsl"
    source_loc: "2.4.1.1, lines 145-186"
    verbatim_quote: "he could not complete the wall of Urim; that he could no longer enjoy the new palace he had built... I, who have been treated like this, served the gods well, set up chapels for them... Yet no god stood by me and soothed my heart... Now, just as the rain pouring down from heaven cannot turn back, alas, nor can I turn back to brick-built Urim."
    note: "The claim cites 'lines 260-290' — these lines do not exist; the Nippur version ends at line 242. The actual lament content is in lines 145-186. Content is SUPPORTED but line citation is wrong. See findings for claim 20."

  - claim_number: 22
    claim: "The Death of Ur-Namma provides the most detailed Sumerian account of a king's entry into the underworld, including the gift-giving protocol, the judgment by underworld deities, and the assignment of posthumous status."
    source_id: "etcsl"
    source_loc: "2.4.1.1, full composition"
    verbatim_quote: "The composition's unique combination of detailed gift-giving (lines 88-128), enthronement on a 'great dais' (lines 132-144), and co-judgeship with Gilgamesh is unparalleled in other extant Sumerian compositions."

  - claim_number: 25
    claim: "The text survives on multiple Nippur tablets; Flückiger-Hawker's 1999 critical edition is the most thorough philological treatment and the basis for the ETCSL composite."
    source_id: "fluckiger-hawker-1999"
    source_loc: "pp. 93-182"
    verbatim_quote: "ETCSL bibliography (b2411.htm) lists Flückiger-Hawker 1999, pp. 93-182 as providing 'score transliteration, translation, photographs, commentary, handcopy, composite text.' CDLI P469688 lists 11 manuscript exemplars: 8 from Nippur (P260874, P345673, P343430, P277449, P278191, P356754, P343095, P252219) and 3 from Susa (P357266, P357268, P357275)."

findings:
  - claim_number: 4
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The text describes Ur-Namma falling in battle — he is abandoned on the battlefield 'like a crushed vessel,' a vivid image of royal desolation."
    issue: "Three errors in this claim. (1) The ETCSL text says 'like a broken jar' not 'like a crushed vessel.' (2) The text does NOT describe Ur-Namma 'falling in battle.' The ETCSL text describes illness: 'His hands which used to grasp cannot grasp any more, he lies sick. His feet cannot step any more, he lies sick. His appointed time had arrived, and he passed away in his prime.' The battle interpretation is a scholarly inference from damaged/ambiguous text, not the ETCSL translation itself. (3) 'Abandoned on the battlefield' is not in the ETCSL text — the text says 'How iniquitously Ur-Namma was abandoned, like a broken jar' without specifying a battlefield. Additionally, the citation 'ETCSL 2.4.1.1, lines 1-30' is wrong for this content — the illness is in lines 31-51 and the 'broken jar' line is in lines 52-55."
    evidence: "ETCSL 2.4.1.1 lines 31-51: 'His hands which used to grasp cannot grasp any more, he lies sick.' Line 51: 'His appointed time had arrived, and he passed away in his prime.' Lines 52-55: 'How iniquitously Ur-Namma was abandoned, like a broken jar!' Verified at https://etcsl.orinst.ox.ac.uk/section2/tr2411.htm"
    recommended_fix: "Correct 'crushed vessel' to 'broken jar' (the ETCSL translation). Replace 'falling in battle' with the actual ETCSL description of illness and divine abandonment, or add [INFERENCE:] marker if the battle interpretation is retained as scholarly inference. Remove 'abandoned on the battlefield' — the text says abandoned but does not specify a battlefield. Correct line reference to 'lines 31-55.'"

  - claim_number: 5
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "[INFERENCE: The text's emphasis on Ur-Namma being abandoned on the battlefield suggests a military defeat...]"
    issue: "The INFERENCE marker correctly identifies this as inferential. However, the inference is built on the false premise that the text describes 'abandoned on the battlefield.' The ETCSL text does not mention a battlefield. The 'battlefield' detail is itself an inference, not textual. The marker should acknowledge that the entire 'battlefield' framing is scholarly inference from damaged text and later historical tradition, not from the ETCSL translation."
    evidence: "ETCSL 2.4.1.1: 'How iniquitously Ur-Namma was abandoned, like a broken jar!' — no battlefield is mentioned. Scholarly literature notes 'the description of Ur-Nammu's death is damaged, vague, and metaphoric.' Verified at https://etcsl.orinst.ox.ac.uk/section2/tr2411.htm"
    recommended_fix: "Revise the INFERENCE marker to note that the battlefield setting itself is scholarly inference from later tradition, not from the ETCSL text. The text describes abandonment without specifying a military context."

  - claim_number: 8
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The text lists specific grave goods and offerings that accompany the king: animals for sacrifice, precious objects, and ritual provisions — a detailed inventory of royal funerary practice."
    issue: "Citation to Jacobsen 1987 pp. 380-382 is wrong. Jacobsen's 'The Harps That Once' (1987, Yale University Press) does NOT contain the Death of Ur-Namma. The book's table of contents confirms that pages 377-445 cover the 'Hymn to Kesh' section, not any Ur-Namma text. The Death of Ur-Namma is not included anywhere in this 498-page book."
    evidence: "Google Books table of contents for Jacobsen 1987 confirms the book contains: Dumuzi Texts, Royal Love Songs, Hymns to Gods, The Eridu Genesis, Enlil and Ninlil, Lugale, Enmerkar and the Lord of Aratta, Lugalbanda and the Thunderbird, Gilgamesh and Aka, The Cursing of Akkad, Hymn to Kesh (pp. 377-445), Lament for Ur, The Destroyed House. No Death of Ur-Namma appears."
    recommended_fix: "Remove ALL citations to Jacobsen 1987 throughout this chapter. The Death of Ur-Namma is not in that book. Replace with Kramer 1967 (JCS 21: 104-122) or Flückiger-Hawker 1999 as secondary references."

  - claim_number: 11
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "The king crosses the river of the underworld, a boundary separating the world of the living from the realm of the dead."
    issue: "The ETCSL text does NOT describe a river crossing. The only crossing reference is the fragmentary line 75: 'As he crossed over the ...... of the Land, the Land was deprived of its ornament' — which describes crossing 'the Land' (a geographic reference), not a river. The 'river of the underworld' (Hubur) is a motif from other Mesopotamian traditions (Akkadian sources and other Sumerian compositions) but it is NOT mentioned in the Death of Ur-Namma. There are boat/ship metaphors in lines 52-75 ('their boat was sunk in a land as foreign to them as Dilmun') but these are figurative, not a literal river crossing. The citation to Jacobsen 1987 pp. 382-383 is also wrong — this text is not in Jacobsen 1987."
    evidence: "ETCSL 2.4.1.1: the word 'river' does not appear in the Nippur version. Line 75: 'As he crossed over the ...... of the Land, the Land was deprived of its ornament.' No Susa version segment contains a river crossing either. Verified at https://etcsl.orinst.ox.ac.uk/section2/tr2411.htm"
    recommended_fix: "Remove this claim entirely. The Death of Ur-Namma does not describe a river crossing. If the 'crossing' motif is to be retained, it should reference line 75's fragmentary 'crossed over the ...... of the Land' with a [LACUNA:] marker, and explicitly note that no river is mentioned."

  - claim_number: 13
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The text itemizes the gifts Ur-Namma brings to each of the seven underworld judges, presenting offerings individually to each deity who sits in judgment over the dead."
    issue: "Two substantive errors. (1) The ETCSL text says 'seven chief porters of the nether world' (line 76), NOT 'seven underworld judges.' Porters and judges are distinct roles. (2) The individual deities who receive gifts (Nergal, Gilgamesh, Ereshkigal, Dumuzid, Namtar, Hushbisag, Ningishzida, Dimpimekug, Ninazimua) number eight or nine, not seven, and none are called 'judges' in the gift-giving passage. The only judgment reference is that Ur-Namma will judge 'with Gilgamec' after his enthronement (lines 132-144). Additionally, the claim cites Kramer 1961 pp. 130-131 — Kramer's main publication on this text was JCS 21 (1967), pp. 104-122. Kramer does refer to 'seven gods of the nether world' in his summary but the ETCSL text specifies 'porters,' not 'judges.'"
    evidence: "ETCSL 2.4.1.1 line 76: 'He presented gifts to the seven chief porters of the nether world.' Lines 88-128 then list individual offerings to eight or more named deities, none called 'judges.' Verified at https://etcsl.orinst.ox.ac.uk/section2/tr2411.htm"
    recommended_fix: "Replace 'seven underworld judges' with 'seven chief porters of the nether world' (the ETCSL term). Note that the individual gift recipients (eight or more named deities) are distinct from the seven porters. Remove the term 'judges' from this claim. Update the Kramer citation to Kramer 1967 (JCS 21: 104-122)."

  - claim_number: 14
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Among the underworld judges to whom Ur-Namma presents gifts are Gilgamesh (Sumerian: Bilgames), who serves as a judge and governor of the dead, and Ningishzida, an underworld deity."
    issue: "Gilgamesh is NOT described as a 'judge and governor of the dead' in the gift-giving section. He is a gift recipient (lines 92-96). He becomes a co-judge with Ur-Namma AFTER the enthronement (lines 132-144): 'with Gilgamec, his beloved brother, he will issue the judgments of the nether world.' Calling him a 'judge' in the gift-giving context is anachronistic within the text. Ningishzida receives gifts (lines 114-122) but is NOT called a 'judge' in this text — in lines 217-233, Ningishzida decrees Ur-Namma's fate, but this is a different role. The cited line range 'lines 180-200' does not match — gifts to Gilgamesh are at lines 92-96, gifts to Ningishzida at lines 114-122. The Jacobsen 1987 pp. 383-384 citation is wrong — this text is not in Jacobsen 1987."
    evidence: "ETCSL 2.4.1.1 lines 92-96 (gifts to Gilgamesh), lines 114-122 (gifts to Ningishzida), lines 132-144 (Ur-Namma judges WITH Gilgamesh). Verified at https://etcsl.orinst.ox.ac.uk/section2/tr2411.htm"
    recommended_fix: "Correct to: Gilgamesh receives gifts (lines 92-96) and later serves as co-judge alongside Ur-Namma (lines 132-144). Ningishzida receives gifts (lines 114-122) and later decrees Ur-Namma's fate (lines 217-233). Remove the Jacobsen 1987 citation entirely. Correct line ranges."

  - claim_number: 16
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "After presenting his gifts, Ur-Namma is assigned a place in the underworld commensurate with his royal dignity; he is not reduced to the common shade but retains special status among the dead."
    issue: "The ETCSL text supports the enthronement (lines 132-144) but does NOT explicitly contrast Ur-Namma's status with 'the common shade.' The phrase 'not reduced to the common shade' is an interpretive expansion not found in the source text. The text says he was 'seated on a great dais' and given a 'dwelling place,' but does not discuss what happens to ordinary dead for comparison."
    evidence: "ETCSL 2.4.1.1 lines 132-144: 'seated Ur-Namma on a great dais of the nether world and set up a dwelling place for him in the nether world.' No contrast with ordinary dead is made."
    recommended_fix: "Remove 'he is not reduced to the common shade' or add an [INFERENCE:] marker. The text describes his honored status without contrasting it with ordinary dead."

  - claim_number: 20
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Ur-Namma mourns that he was unable to complete his building programs and fulfill all his royal duties — the walls he planned, the temples he intended to finish."
    issue: "Three problems. (1) The ETCSL text mentions 'the wall of Urim' and 'the new palace he had built' but does NOT mention 'temples he intended to finish.' The temple detail is not in the source. (2) The claim cites 'lines 280-310' which do not exist — the Nippur version ends at line 242. The actual lament content is in lines 145-154. (3) The Kramer 1961 pp. 130-131 citation is likely wrong — Kramer's main publication on this text was JCS 21 (1967), pp. 104-122."
    evidence: "ETCSL 2.4.1.1 lines 145-154: 'he could not complete the wall of Urim; that he could no longer enjoy the new palace he had built.' No mention of temples. The text ends at line 242 — lines 280-310 do not exist. Verified at https://etcsl.orinst.ox.ac.uk/section2/tr2411.htm"
    recommended_fix: "Correct 'temples he intended to finish' to 'the new palace he had built' per ETCSL. Change line reference from 'lines 280-310' to 'lines 145-154.' Update Kramer citation to Kramer 1967 (JCS 21: 104-122)."

  - claim_number: 21
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The text expresses the Sumerian understanding that death is absolute and irreversible: even a great king cannot return from the underworld, and the grief of separation is permanent."
    issue: "While the theme of irreversibility is present in the text's tone, the specific formulation 'death is absolute and irreversible' is not a direct quote. The closest line is: 'Now, just as the rain pouring down from heaven cannot turn back, alas, nor can I turn back to brick-built Urim.' This expresses irreversibility through simile but the claim overgeneralizes it as a philosophical statement about Sumerian theology."
    evidence: "ETCSL 2.4.1.1 lines 155-165: 'Now, just as the rain pouring down from heaven cannot turn back, alas, nor can I turn back to brick-built Urim.' This is a specific lament, not a general theological statement."
    recommended_fix: "Add an [INFERENCE:] marker or soften to: 'The text uses the simile of rain that cannot return to heaven to express the irreversibility of Ur-Namma's passage to the underworld.'"

  - claim_number: 23
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The composition elevates Ur-Namma's afterlife status as royal legitimation: even in the underworld, the king of Ur retains his dignity and is honored by the rulers of the dead."
    issue: "This is a widely accepted scholarly interpretation but is not a textual claim — the text does not state 'this is royal legitimation.' The claim would be better served with an [INFERENCE:] marker or explicit attribution to scholarly commentary."
    evidence: "The ETCSL text describes honored reception (dais, dwelling, co-judgeship) but does not use the term 'legitimation.' This is a modern scholarly interpretation, correctly attributed to Flückiger-Hawker 1999 commentary."
    recommended_fix: "Add [INFERENCE:] marker or attribute explicitly: 'Scholars interpret the composition as royal legitimation (Flückiger-Hawker 1999).'"

  - claim_number: 24
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The text combines elements of royal praise literature, underworld geography, and lamentation, making it a unique hybrid genre within Sumerian literary tradition."
    issue: "Citation to Black et al. 2004 pp. 56-60 is partially verifiable. Page 56 is confirmed as the start of the Death of Ur-Namma section via LOC table-of-contents data, but the extent to p. 60 could not be independently verified. The characterization as 'hybrid genre' is a reasonable scholarly description but may not be a direct quote from Black et al. at these pages."
    evidence: "LOC table of contents for Black et al. 2004 confirms the Death of Ur-Namma section begins on p. 56."
    recommended_fix: "Verify the exact page range in Black et al. 2004. If the discussion is shorter than pp. 56-60, correct accordingly."

  - claim_number: 3
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "[LACUNA: The opening section (lines 1-30) describing Ur-Namma's death in battle is partially damaged...]"
    issue: "The LACUNA marker correctly identifies damage in the opening section. However, the characterization 'describing Ur-Namma's death in battle' is wrong — lines 1-30 describe cosmic and civic mourning (divine responses, agricultural devastation), NOT the death in battle. The death is described in lines 31-51 (illness and passing). The battle interpretation is not the text's content."
    evidence: "ETCSL 2.4.1.1 lines 1-30: describe An altering words, Enlil changing fate, Ninmah lamenting, Ninsun weeping, agricultural devastation. No battle described. Lines 31-51 describe the illness and death."
    recommended_fix: "Correct the LACUNA marker to: 'The opening section (lines 1-30) describing cosmic mourning and divine responses to Ur-Namma's death is partially damaged.' Move the death description to lines 31-51."

  - claim_number: 26
    kind: "SUPPORTED"
    severity: "NONE"
    claim: "The ETCSL composite follows Flückiger-Hawker closely but presents a slightly more conservative text in damaged passages."
    source_id: "etcsl"
    source_loc: "2.4.1.1; bibliography page b2411.htm"
    verbatim_quote: "The ETCSL bibliography lists Flückiger-Hawker 1999 pp. 93-182 as the primary critical edition with 'score transliteration, translation, photographs, commentary, handcopy, composite text.' The relationship between ETCSL and Flückiger-Hawker as described is consistent with standard ETCSL editorial practice."
    note: "This is a reasonable characterization of the ETCSL-Flückiger-Hawker relationship, consistent with how ETCSL treats other critical editions."
