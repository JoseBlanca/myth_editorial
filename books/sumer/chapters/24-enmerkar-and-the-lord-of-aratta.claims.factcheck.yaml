    source_loc: "1.8.2.3, composite text ends at line 636 plus c. 6 lines missing"
    verbatim_quote: "The ETCSL composite text's last numbered line is 636, with a notation 'c. 6 lines missing' afterward. Some sources cite approximately 640 lines for the full composition."

  - claim_number: 37
    claim: "The messenger crosses the seven mountain ranges between Uruk and Aratta repeatedly, and the text describes this journey in formulaic terms that recur with each exchange."
    source_id: "etcsl"
    source_loc: "1.8.2.3, passim"
    verbatim_quote: "He traversed five mountains, six mountains, seven mountains."
    note: "ETCSL uses 'five mountains, six mountains, seven mountains' — a formulaic ascending sequence, not 'seven mountain ranges.' The formulaic recurrence is confirmed."

  - claim_number: 38
    claim: "The messenger must memorize and reproduce the kings' speeches verbatim; the fidelity of oral transmission is a central concern of the poem, setting up the climactic failure that necessitates writing."
    source_id: "etcsl"
    source_loc: "1.8.2.3, line 500"
    verbatim_quote: "The messenger, whose mouth was heavy, was not able to repeat it."

  - claim_number: 39
