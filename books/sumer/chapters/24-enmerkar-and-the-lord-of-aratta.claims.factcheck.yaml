  - claim_number: 20
    kind: "INTERNAL-VARIANCE"
    severity: "MEDIUM"
    claim: "The poem contains a passage stating that once upon a time all lands spoke a single language in unison to Enlil, but that this linguistic unity was disrupted — the tongues of humanity were confused."
    issue: "The interpretation of the 'Incantation of Nudimmud' (lines 136-155) is genuinely debated. Kramer (1961) read it as describing a past golden age of linguistic unity disrupted by Enki (parallel to Babel). Vanstiphout and Alster argue it is a prayer for future restoration of linguistic unity — Enki is invoked to change diverse tongues into one. The ETCSL translation uses optative mood ('may they all address Enlil together in a single language'), supporting the wish/prayer interpretation, not a past-tense narrative of disruption. The claim presents Kramer's interpretation as fact without noting the major scholarly debate."
    evidence: "ETCSL 1.8.2.3, lines 136-155: 'the whole universe, the well-guarded people -- may they all address Enlil together in a single language!' and 'Enki...shall change the speech in their mouths, as many as he had placed there, and so the speech of mankind is truly one.' The optative 'may' and the concluding 'the speech of mankind is truly one' suggest unification, not confusion."
    recommended_fix: "Present both interpretations with a [VARIANT:] marker. Note that Kramer's 'confusion of tongues' reading is contested and that the ETCSL translation and Vanstiphout/Alster favor a unification reading."

