    verbatim_quote: "Black et al.'s introduction discusses the composition's ideological function in establishing Uruk's supremacy through divinely endorsed demands."

  - claim_number: 35
    claim: "The composition survives across multiple Old Babylonian manuscripts from Nippur and other scribal centers, attesting to wide circulation as a curriculum text in the edubba tradition."
    source_id: "etcsl"
    source_loc: "1.8.2.3, manuscript list; CDLI wiki"
