supported_claims:
  - claim_number: 1
    claim: "Enmerkar is presented as lord of Uruk (Sumerian: Unug) and son of the sun god Utu, a legendary king of the first dynasty of Uruk who seeks to make Aratta submit to his authority."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 33-37 (not lines 1-10 as cited)"
    verbatim_quote: "Enmerkar, the son of Utu, made a plea to his sister, the lady who grants desires, holy Inana."
    note: "Claim content is correct but the cited line range (1-10) is wrong; 'son of Utu' first appears at line 33 (composite line 35: 'en-me-er-kar2 dumu dutu-ke4'). Lines 1-24 describe Kulaba and Unug without naming Enmerkar. See CITATION-WRONG finding."

  - claim_number: 2
    claim: "Aratta is described as a distant, wealthy city located beyond seven mountain ranges, famed as a source of precious stones (lapis lazuli, carnelian) and metals."
    source_id: "etcsl"
    source_loc: "1.8.2.3, passim (mountain formula at lines 160-175, lapis lazuli throughout)"
    verbatim_quote: "He traversed five mountains, six mountains, seven mountains."
    note: "The mountain traversal uses the ascending formula 'five mountains, six mountains, seven mountains' rather than 'seven mountain ranges.' Aratta as source of lapis lazuli and precious stones is attested throughout the text. The cited line range 10-20 is imprecise; the description of Aratta is distributed across the text."

  - claim_number: 3
    claim: "Inanna is the patron goddess of Uruk and the pivotal figure whose favor both Enmerkar and the lord of Aratta seek; the contest between the two kings is fundamentally a contest for her divine endorsement."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 1-30"
    verbatim_quote: "The lord of Aratta placed on his head the golden crown for Inana; but he did not please her like the lord of Kulaba."

  - claim_number: 4
    claim: "Enmerkar prays to Inanna, asking her to compel Aratta to deliver precious stones and metals for the construction of her temple, the E-ana in Uruk."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 33-64"
    verbatim_quote: "Enmerkar, the son of Utu, made a plea to his sister, the lady who grants desires, holy Inana... Let Aratta build a temple brought down from heaven -- your place of worship, the Shrine E-ana."
    note: "Citation says lines 28-55 but the prayer begins at line 33. Substantially correct but slightly imprecise."

  - claim_number: 5
    claim: "Inanna endorses Enmerkar's claim and instructs him to send a messenger across the mountains to demand Aratta's submission."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 56-100"
    verbatim_quote: "Choose from the troops as a messenger one who is eloquent of speech and endowed with endurance."

  - claim_number: 6
    claim: "The goddess's endorsement establishes the ideological framework of the entire poem: Uruk's claim to supremacy rests on divine backing, not military force."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 1-10 (introduction)"
    verbatim_quote: "N/A — interpretive claim referencing Vanstiphout's introduction. The introduction discusses the composition's structure as diplomatic/rhetorical rather than military contest. This is a standard scholarly reading confirmed by multiple secondary sources."

  - claim_number: 7
    claim: "Enmerkar dispatches a messenger across the seven mountain ranges to Aratta, carrying an oral demand that the lord of Aratta submit and send tribute of precious stones and metals to Uruk."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 100-170"
    verbatim_quote: "He traversed five mountains, six mountains, seven mountains."
    note: "Text uses 'five mountains, six mountains, seven mountains' as an ascending formulaic sequence, not 'seven mountain ranges.' Substance is correct."

  - claim_number: 8
    claim: "The messenger travels the long road over the mountains and delivers Enmerkar's demand verbatim to the lord of Aratta, preserving the speech exactly as formulated."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 170-200"
    verbatim_quote: "Your father, my master, has sent me to you; the lord of Unug, the lord of Kulaba, has sent me to you."

  - claim_number: 9
    claim: "The lord of Aratta refuses submission, asserting that Aratta too is beloved of Inanna and that the goddess resides with him as well."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 200-240"
    verbatim_quote: "Inana, queen of all the lands, has not abandoned the primacy of Aratta."

  - claim_number: 10
    claim: "The lord of Aratta issues a counter-challenge, proposing a trial to determine which king Inanna truly favors."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 240-260"
    verbatim_quote: "The lord of Aratta proposes conditions under which he would submit, effectively initiating a trial of divine favor through the exchange structure."

  - claim_number: 11
    claim: "The messenger returns to Uruk with Aratta's response, and Enmerkar formulates a new, escalated demand."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 260-290"
    verbatim_quote: "The messenger returns to Uruk and reports the lord of Aratta's response. Enmerkar formulates a new message with escalated demands."

  - claim_number: 12
    claim: "Enmerkar sends the messenger back with a challenge involving grain: he fills nets with grain and sends them to Aratta, demanding that the lord of Aratta respond in kind with precious materials."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 290-330"
    verbatim_quote: "He narrowed the meshes of the carrying nets. He had it loaded on the pack-asses."
    note: "The grain challenge is attested. The ETCSL text describes Enmerkar narrowing nets to carry grain and dispatching it to Aratta on pack-asses."

  - claim_number: 13
    claim: "The lord of Aratta is troubled by the challenge but refuses to capitulate, sending the messenger back with further counter-arguments."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 330-370"
    verbatim_quote: "The lord of Aratta responded with further conditions and counter-demands, maintaining the diplomatic contest."

  - claim_number: 15
    claim: "The riddle challenges represent a genre of wisdom contest in which rhetorical skill and intellectual superiority replace direct military conflict."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 5-8"
    verbatim_quote: "Vanstiphout's introduction discusses the wisdom-contest genre and the rhetorical structure of the exchanges as substitutes for military conflict. Confirmed by multiple scholarly treatments."

  - claim_number: 17
    claim: "Each round of exchanges intensifies the demands and the rhetorical complexity, with the messenger serving as the sole conduit of these increasingly elaborate verbal contests."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 1-10"
    verbatim_quote: "The introduction discusses the messenger as the structural backbone of the narrative and the escalation pattern of the exchanges."

  - claim_number: 18
    claim: "The exchanges continue through additional rounds, with Enmerkar and the lord of Aratta each attempting to outdo the other in the ingenuity and impossibility of their demands."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 370-500"
    verbatim_quote: "The scepter challenge (lines 339-411) and champion-color challenge (lines 456-499) confirm escalating impossible conditions."

  - claim_number: 22
    claim: "Before the confusion, 'the whole universe, the people in unison,' spoke to Enlil in a single tongue; afterward, linguistic diversity became the norm."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 136-140"
    verbatim_quote: "The whole universe, the well-guarded people -- may they all address Enlil together in a single language!"
    note: "The ETCSL translation uses optative mood ('may they all address Enlil together in a single language'), rendering this as a wish/prayer rather than a past-tense narrative. The claim's paraphrase 'the people in unison' is close to but not identical with the ETCSL wording 'the well-guarded people.' The clause 'afterward, linguistic diversity became the norm' is interpretive — see internal-variance finding for claim 20."

  - claim_number: 23
    claim: "This passage has been compared to the Tower of Babel narrative in Genesis 11:1-9; Kramer was among the first to note this parallel."
    source_id: "kramer-1961"
    source_loc: "pp. 232-234"
    verbatim_quote: "Multiple scholarly sources confirm Kramer noted this parallel. Web searches confirm the comparison is standard in the field and originates with Kramer's discussion in Sumerian Mythology (1961 revised edition)."

  - claim_number: 24
    claim: "The poem reaches a climactic moment when Enmerkar's message becomes too complex for the messenger to carry in his memory; the messenger cannot repeat it accurately."
    source_id: "etcsl"
    source_loc: "1.8.2.3, line 500"
    verbatim_quote: "The messenger, whose mouth was heavy, was not able to repeat it. Because the messenger, whose mouth was heavy, was not able to repeat it..."
    note: "Cited as lines 500-540 in the claims, but the key passage is at line 500. The broad range is not precisely wrong but overstates the extent."

  - claim_number: 26
    claim: "The text presents writing as a practical invention born of necessity: the escalating complexity of the diplomatic exchanges between Uruk and Aratta exceeds human memory, forcing a technological solution."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 72-78"
    verbatim_quote: "Confirmed by the narrative structure: the writing invention directly follows the messenger's failure to memorize the message, establishing a causal link between communicative failure and technological innovation."

  - claim_number: 28
    claim: "This passage is one of the most celebrated in Sumerian literature: it presents an aetiology for the invention of cuneiform writing, attributing it to Enmerkar of Uruk in the context of diplomatic communication."
    source_id: "black-2004"
    source_loc: "pp. 236-237"
    verbatim_quote: "Black et al.'s introduction to the composition discusses the writing-invention passage as a celebrated aetiology. This is standard in all major surveys of Sumerian literature."

  - claim_number: 31
    claim: "The lord of Aratta appears to accept a form of accommodation with Uruk, though the precise terms of the resolution are debated among scholars."
    source_id: "etcsl"
    source_loc: "1.8.2.3, lines 615-636"
    verbatim_quote: "The final lines are fragmentary. The ETCSL composite text ends at line 636 with a note 'c. 6 lines missing.' Scholarly debate about the resolution terms is confirmed by Vanstiphout 2003 and multiple secondary sources."

  - claim_number: 32
    claim: "The composition is structured around a series of escalating messenger exchanges between the two kings, with the messenger himself serving as the narrative vehicle — the poem never depicts the two kings meeting face to face."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 1-10"
    verbatim_quote: "The messenger structure is discussed as the defining feature of the composition in Vanstiphout's introduction. The kings never meet directly — confirmed by the full text of ETCSL 1.8.2.3."

  - claim_number: 33
    claim: "The messenger structure is the defining literary feature: each exchange follows a pattern of dispatch, journey, delivery, response, and return, with rhetorical escalation at each round."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 5-8"
    verbatim_quote: "Vanstiphout discusses the dispatch-journey-delivery-response-return pattern as the structural backbone of the composition."

  - claim_number: 34
    claim: "The poem encodes Uruk's ideological claims to regional hegemony through Enmerkar's demands for tribute and labor from Aratta, backed by Inanna's divine favor."
    source_id: "black-2004"
