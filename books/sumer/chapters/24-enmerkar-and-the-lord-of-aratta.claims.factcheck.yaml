findings:
  - claim_number: 14
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "Enmerkar escalates further, sending the messenger with a riddle-challenge to the lord of Aratta: he demands that Aratta send tribute carried by a donkey that is neither black nor white nor brown nor dappled — an impossible condition."
    issue: "The riddle is NOT about a donkey. The impossible-color challenge in the ETCSL text concerns a CHAMPION (warrior), not a donkey. The text describes 'a champion who is not black-coloured, a champion who is not white-coloured, a champion who is not brown-coloured, a champion who is not red-coloured, a champion who is not yellow-coloured, a champion who is not multi-coloured' at lines 456-461. Furthermore, the cited line range 370-410 corresponds to the scepter challenge (a scepter made of no known substance), not any color riddle. Both the subject (donkey vs. champion) and the line numbers are wrong."
    evidence: "ETCSL 1.8.2.3, lines 456-461: 'A champion who is not black-coloured, a champion who is not white-coloured, a champion who is not brown-coloured, a champion who is not red-coloured, a champion who is not yellow-coloured, a champion who is not multi-coloured.' The scepter challenge at lines 339-411 involves a scepter 'not of wood' made of no known material. No donkey riddle appears anywhere in the composition."
    recommended_fix: "Replace the entire claim. The scepter challenge (lines 339-411) involves a scepter made of no known material. The champion-color challenge (lines 456-499) involves a champion of no identifiable color. Remove all references to donkeys in this riddle context."

