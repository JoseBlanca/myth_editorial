    source_id: "vanstiphout-2003"
    source_loc: "pp. 5-8"
    verbatim_quote: "Vanstiphout discusses the messenger's role as neutral conduit in his introduction to the composition. Confirmed by the text structure: the messenger reproduces speeches verbatim."

  - claim_number: 40
    claim: "The riddle exchanges between Enmerkar and the lord of Aratta belong to a broader ancient Near Eastern wisdom-contest genre in which intellectual prowess substitutes for military conflict."
    source_id: "vanstiphout-2003"
