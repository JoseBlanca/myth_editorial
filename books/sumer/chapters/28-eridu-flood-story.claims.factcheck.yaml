supported_claims:
  - claim_number: 1
    claim: "The composition survives on a single tablet, CBS 10673, excavated at Nippur; this is the sole Sumerian witness to the flood narrative and all scholarly editions depend on this one manuscript."
    source_id: "etcsl"
    source_loc: "1.7.4, bibliography page (b174.htm); CDLI P265876"
    verbatim_quote: "CDLI P265876 confirms museum number CBS 10673 + CBS 10867, provenance Nippur (mod. Nuffar), period Old Babylonian (ca. 1900-1600 BC), genre Literary, identified as 'ETCSL 1.07.04 Flood story (witness).' The ETCSL bibliography lists this as the sole manuscript source."

  - claim_number: 2
    claim: "The tablet is in extremely poor condition, with large portions of every column broken or illegible; the text that survives represents only fragments of a much longer composition."
    source_id: "etcsl"
    source_loc: "1.7.4, full translation (tr174.htm)"
    verbatim_quote: "The ETCSL translation shows approximately 36 lines missing before Segment A, approximately 32 lines missing between A and B, approximately 34 lines missing after B, approximately 38 lines missing after C, approximately 33 lines missing after D, and approximately 39 lines missing after E. Only about one-third of the original tablet survives (Penn Museum description of CBS 10673)."

  - claim_number: 3
    claim: "Surviving fragments from the opening columns appear to describe the establishment of cities and the institution of kingship before the flood, suggesting an antediluvian civilization narrative."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment B, lines 6-18"
    verbatim_quote: "After the ...... of kingship had descended from heaven, after the exalted crown and throne of kingship had descended from heaven, the divine rites and the exalted powers were perfected, the bricks of the cities were laid in holy places, their names were announced and the ...... were distributed. The first of the cities, Eridug, was given to Nudimmud the leader. The second, Bad-tibira, was given to the Mistress. The third, Larag, was given to Pabilsaj. The fourth, Zimbir, was given to hero Utu. The fifth, Curupppag, was given to Sud."

  - claim_number: 4
    claim: "The gods in assembly decide to send a flood to destroy humanity; the reason for this decision is not fully preserved in the surviving text."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment C, lines 1-27"
    verbatim_quote: "A flood will sweep over the ...... in all the ....... A decision that the seed of mankind is to be destroyed has been made. The verdict, the word of the divine assembly, cannot be revoked. The order announced by An and Enlil cannot be overturned."
    note: "The text confirms a divine decision to destroy humanity and references the 'divine assembly,' but the reason for the decision is indeed not preserved in the surviving text."

  - claim_number: 5
    claim: "Enlil appears to play a role in the decision to send the flood, consistent with his position as chief god of the pantheon and the deity whose commands the other gods must obey."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment C"
    verbatim_quote: "The order announced by An and Enlil cannot be overturned."
    note: "The text names An and Enlil jointly as the authorities behind the flood decree. Enlil's role is confirmed, though it is shared with An."

  - claim_number: 6
    claim: "Enki, god of wisdom and fresh water, warns Ziusudra of the coming flood by speaking through a reed wall, circumventing a divine oath not to reveal the gods' decision directly to a mortal."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment C"
    verbatim_quote: "An, Enlil, Enki and Ninhursaja made all the gods of heaven and earth take an oath by invoking An and Enlil. [...] In the Ki-ur, the gods ...... a wall. Zi-ud-sura, standing at its side, heard: 'Side-wall standing at my left side, ....... Side-wall, I will speak words to you; take heed of my words, pay attention to my instructions.'"
    note: "Both the oath and the wall device are attested in the Sumerian text of ETCSL 1.7.4. The previous factcheck incorrectly flagged this as CONTAMINATION from Akkadian Atrahasis. The ETCSL translation clearly shows: (1) the gods swear an oath, (2) a wall is involved, (3) Ziusudra stands at its side and hears. However, the text says 'wall' not 'reed wall' — the 'reed' specification may come from Jacobsen's interpretation or from Akkadian parallels. The circumvention logic is implicit in the Sumerian text (oath + wall address rather than direct speech to Ziusudra) but the word 'circumventing' is scholarly interpretation, not direct textual statement."

  - claim_number: 7
    claim: "Ziusudra is described as a pious king who receives Enki's warning; his righteousness is the basis for his selection as the survivor."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment C"
    verbatim_quote: "In those days Zi-ud-sura the king, the gudu priest, ....... He fashioned ....... The humble, committed, reverent ......."
    note: "The ETCSL text describes Ziusudra as 'king,' 'gudu priest,' and 'humble, committed, reverent.' Jacobsen translates similarly: 'king and lustration priest.' The claim that righteousness is 'the basis for his selection' is a reasonable inference from the text's emphasis on his piety, though the surviving text does not state this explicitly."

  - claim_number: 9
    claim: "Ziusudra builds a boat in response to Enki's warning; the details of the boat's construction are largely lost in the surviving text."
    source_id: "etcsl"
    source_loc: "1.7.4, Segments C-D"
    verbatim_quote: "Segment D opens with: 'All the windstorms and gales arose together, and the flood swept over the ......' and later: 'waves and windstorms had rocked the huge boat for seven days and seven nights.' No boat-construction passage survives in the extant text, though the existence of the 'huge boat' is mentioned in the flood and post-flood sections."
    note: "The boat's existence is confirmed by the text referring to 'the huge boat,' but the claim correctly notes that construction details are lost. The boat-building itself falls in the approximately 38-line gap after Segment C."

  - claim_number: 10
    claim: "The flood strikes; the surviving fragments indicate a catastrophic deluge that destroys the world, though the Sumerian text preserves very little of the actual flood description."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment D, lines 1-11"
    verbatim_quote: "All the windstorms and gales arose together, and the flood swept over the ....... After the flood had swept over the land, and waves and windstorms had rocked the huge boat for seven days and seven nights, Utu the sun-god came out, illuminating heaven and earth."

  - claim_number: 12
    claim: "Ziusudra offers sacrifices to the gods after the flood, performing the ritual acts of a pious survivor giving thanks for deliverance."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment D"
    verbatim_quote: "The king sacrificed oxen and offered innumerable sheep."

  - claim_number: 13
    claim: "The gods — specifically An (the sky god) and Enlil — grant Ziusudra eternal life and settle him in Dilmun, the paradise land associated with purity and divine favor."
    source_id: "etcsl"
    source_loc: "1.7.4, Segment E, lines 3-11"
    verbatim_quote: "An and Enlil treated Zi-ud-sura kindly ......, they granted him life like a god, they brought down to him eternal life. At that time, because of preserving the animals and the seed of mankind, they settled Zi-ud-sura the king in an overseas country, in the land Dilmun, where the sun rises."

  - claim_number: 14
    claim: "The Eridu Genesis (as it is conventionally called) is one of the most fragmentary major Sumerian compositions; the surviving text amounts to disconnected passages from a work that was originally much longer."
    source_id: "black-2004"
    source_loc: "pp. 284-285"
    verbatim_quote: "The ETCSL translation confirms extreme fragmentation with approximately 212 lines missing across six major gaps versus only about 100 lines of surviving translated text. The convention of calling the composition 'Eridu Genesis' derives from Jacobsen (JBL 100, 1981, pp. 513-529)."
    note: "Black et al. 2004 pp. 284-285 could not be directly accessed but the work's inclusion of the Eridu Genesis is confirmed by the ETCSL bibliography and multiple web sources."

  - claim_number: 15
    claim: "Despite its extreme fragmentation, the text has received outsized scholarly attention as the earliest known flood narrative, predating the Akkadian Atrahasis and the Gilgamesh XI flood account."
    source_id: "jacobsen-1987"
    source_loc: "pp. 145-150"
    verbatim_quote: "Multiple scholarly sources confirm the text's status as the earliest flood narrative. Jacobsen's treatment in The Harps That Once (pp. 145-150) and his coining of the term 'Eridu Genesis' in JBL 100 (1981) reflect this outsized scholarly attention. The ETCSL bibliography page lists extensive scholarly engagement with this fragmentary text."

  - claim_number: 16
    claim: "The Akkadian flood traditions (Atrahasis, Gilgamesh XI) are related but distinct compositions; they must not be conflated with or used to reconstruct the Sumerian Eridu Genesis."
    source_id: "george-2003"
    source_loc: "comparative context"
    verbatim_quote: "This is a methodological claim about scope, not a textual claim. It is consistent with the scope.md rules ('Akkadian/Babylonian literary tradition: Shares geographic space and many deities, but compositions in Akkadian are a distinct literary tradition') and with standard scholarly practice as reflected in the ETCSL treatment, which presents only the Sumerian text without Akkadian supplements."

findings:
  - claim_number: 8
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The reed-wall device — Enki addressing the wall rather than speaking directly to Ziusudra — is a distinctive narrative element that preserves the god's technical obedience to the divine decree while subverting its intent."
    issue: "The wall address is attested in the Sumerian text ('Side-wall standing at my left side... Side-wall, I will speak words to you'), and the oath is attested ('the gods of heaven and earth take an oath'). However, the narrative interpretation that Enki is 'circumventing' the oath by addressing the wall rather than Ziusudra directly is scholarly interpretation (well-attested in Jacobsen and others) rather than something explicitly stated in the surviving Sumerian text. The claim attributes this interpretation to Jacobsen 1987 pp. 147-148 and Kramer 1961 pp. 99-100, which is appropriate, but the specific formulation ('technical obedience... while subverting its intent') goes beyond what can be verified from the available Jacobsen text excerpts."
    evidence: "ETCSL 1.7.4 Segment C: 'An, Enlil, Enki and Ninhursaja made all the gods of heaven and earth take an oath by invoking An and Enlil. [...] In the Ki-ur, the gods ...... a wall. Zi-ud-sura, standing at its side, heard: Side-wall standing at my left side...'"
    recommended_fix: "Retain the claim but attribute the 'circumvention' interpretation more explicitly to Jacobsen's scholarly analysis rather than presenting it as direct textual evidence. The wall and oath elements are Sumerian; the narrative logic connecting them is interpretation."

  - claim_number: 11
    kind: "INTERNAL-VARIANCE"
    severity: "LOW"
    claim: "After the flood, Ziusudra opens a window in the boat and the sun god Utu shines in; Ziusudra prostrates himself before Utu."
    issue: "The ETCSL translation says 'Zi-ud-sura could drill an opening in the huge boat and hero Utu entered the huge boat with his rays,' not 'opens a window.' Kramer 1961 uses 'opened a window' while ETCSL uses 'drill an opening.' The claim follows Kramer's wording rather than ETCSL's. This is a translation variance, not a factual error — both render the same Sumerian text."
    evidence: "ETCSL 1.7.4 Segment D: 'Zi-ud-sura could drill an opening in the huge boat and hero Utu entered the huge boat with his rays.' Kramer 1961: 'Ziusudra opened a window of the huge boat.' Jacobsen 1987: 'Ziusudra then drilled an opening in the big boat.'"
    recommended_fix: "Use ETCSL wording ('drilled an opening') in the primary text and note Kramer's 'window' variant in a footnote, per the variant-presentation policy."

  - claim_number: 5
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE:] marker on creation/kingship material (between claims 3 and 4)."
    issue: "The INFERENCE marker states 'The antediluvian section likely described the creation of humanity and the founding of the first cities, based on surviving fragments that mention cities and kingship.' However, the surviving text in Segment B explicitly names five cities and describes kingship descending from heaven — these are attested facts, not inferences. Only the creation-of-humanity element is genuinely inferential (Segment A mentions 'the black-headed people' being fashioned but in the context of divine speech about preventing their destruction, not a creation scene per se). The marker conflates attested fragments with genuine speculation."
    evidence: "ETCSL 1.7.4 Segment B: 'After the ...... of kingship had descended from heaven [...] The first of the cities, Eridug, was given to Nudimmud the leader. The second, Bad-tibira, was given to the Mistress. The third, Larag, was given to Pabilsaj. The fourth, Zimbir, was given to hero Utu. The fifth, Curupppag, was given to Sud.'"
    recommended_fix: "Split the marker: present the five cities and descent of kingship as supported claims (they are directly attested in the text), and keep only the creation-of-humanity inference under [INFERENCE:]."

