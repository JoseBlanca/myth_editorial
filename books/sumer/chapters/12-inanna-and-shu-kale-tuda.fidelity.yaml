chapter: 12
title: "Inanna and Shu-kale-tuda: The Gardener's Crime"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.3.3, OB tablets from Nippur"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The composition known as \"Inanna and Shu-kale-tuda\" is catalogued as ETCSL 1.3.3 and survives on Old Babylonian tablets from Nippur.' Faithful."

  - claim_id: C02
    claim_summary: "Contains significant fragmentary sections, particularly in plague descriptions"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The text contains significant fragmentary sections, particularly in the descriptions of the three plagues that form the narrative's central action.' Faithful."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite + Black et al. 2004, pp. 78-84"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Black et al. 2004, pp. 78--84.' Faithful."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Composition catalogued as ETCSL 1.3.3, OB tablets from Nippur"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Same information as C01, covered in paragraph 1. Faithful."

  - claim_id: C05
    claim_summary: "Text classified as single-prevalent-reconstructed; significant gaps in plague sections"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The ETCSL composite is the only standard reconstruction, but significant gaps remain in the plague description sections across all witnesses, classifying the text as single-prevalent-reconstructed.' Faithful."

  - claim_id: C06_LACUNA
    claim_summary: "LACUNA: Opening lines 1-15 damaged"
    narrative_location: "line 14"
    status: MAPPED
    notes: "LACUNA block reproduced from claims: '[LACUNA: Opening lines 1--15 are damaged; the initial context for the gardener's circumstances is partially lost. | source: etcsl 1.3.3 | scholarly_reconstruction: partial, some manuscripts preserve fragments of the opening.]' Faithful."

  # === Shu-kale-tuda the gardener ===

  - claim_id: C07
    claim_summary: "Shu-kale-tuda is a mortal gardener; garden fails, crops wither"
    narrative_location: "line 16 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'Shu-kale-tuda is a mortal gardener who tends a garden but struggles: his garden fails repeatedly and his crops wither.' Faithful."

  - claim_id: C08
    claim_summary: "Shu-kale-tuda looks to stars, plants tree (possibly poplar), garden flourishes"
    narrative_location: "line 19 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'Shu-kale-tuda looks to the stars for guidance and plants a tree -- possibly a poplar or Euphrates poplar -- that provides shade and finally allows his garden to flourish.' Faithful."

  # === The crime against Inanna ===

  - claim_id: C09
    claim_summary: "Inanna, wearied from traversing heaven and earth, lies down in shade of garden"
    narrative_location: "line 24 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'Inanna -- goddess of love, war, and the morning and evening star -- wearied from traversing heaven and earth, lies down to rest in the shade of the garden.' Faithful. The gloss matches glossary first_mention_gloss."

  - claim_id: C10
    claim_summary: "Shu-kale-tuda discovers sleeping goddess and rapes her"
    narrative_location: "line 27 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'Shu-kale-tuda discovers the sleeping goddess and rapes her.' Faithful."

  - claim_id: C11
    claim_summary: "Inanna awakes at dawn, discovers violation, filled with rage, resolves to find and punish"
    narrative_location: "line 32 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'When dawn comes, Inanna awakes, discovers the violation of her body, and is filled with rage; she resolves to find and punish the one who committed the act.' Faithful."

  # === Inanna's search and the three plagues ===

  - claim_id: C12
    claim_summary: "Inanna searches land, cannot find perpetrator; Shu-kale-tuda hides among population"
    narrative_location: "line 37 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Inanna searches the land for the perpetrator but cannot identify or find him; Shu-kale-tuda hides among the human population.' Faithful."

  - claim_id: C13
    claim_summary: "Inanna sends first plague to force revelation of guilty man"
    narrative_location: "line 40 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'Inanna sends the first plague upon the land to force the revelation of the guilty man.' Faithful."

  - claim_id: C14_LACUNA
    claim_summary: "LACUNA: Significant portions of plague descriptions broken; first and second plagues only partially recoverable"
    narrative_location: "line 43"
