    status: MAPPED
    notes: "Narrative: 'Shu-kale-tuda survives the first plague by following advice from his father -- or from Enki -- to hide among the cities of men.' Faithful."

  - claim_id: C18
    claim_summary: "Inanna sends second plague, escalating assault"
    narrative_location: "line 55 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'Inanna sends a second plague upon the land, escalating her assault.' Faithful."

  - claim_id: C19_LACUNA
