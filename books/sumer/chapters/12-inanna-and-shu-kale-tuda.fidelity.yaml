  - claim_id: C15
    claim_summary: "First plague affects wells/water: Inanna filled wells with blood or polluted"
    narrative_location: "line 47 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'The first plague affects the wells or water supply of the land: Inanna filled the wells of the Land with blood or otherwise polluted them.' Claims say 'with blood or becomes otherwise polluted.' Minor wording difference ('polluted them' vs 'becomes otherwise polluted'). Faithful."

  - claim_id: C16_RECONSTRUCTION
