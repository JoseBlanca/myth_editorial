supported_claims:
  - claim_number: 2
    claim: "The text is attested in numerous Old Babylonian manuscripts from Nippur and elsewhere; it is one of the most copied Sumerian literary compositions in the corpus."
    source_id: etcsl
    source_loc: "1.6.2, bibliography/manuscript list"
    verbatim_quote: "ETCSL bibliography page lists 90 manuscripts; CDLI lists 150+ tablets from Nippur, Ur, Kish, Uruk, and other sites, confirming wide OB attestation."

  - claim_number: 3
    claim: "The ETCSL composite is assembled from multiple overlapping manuscripts; no single witness is complete, and the composite represents an editorial reconstruction."
    source_id: etcsl
    source_loc: "1.6.2, editorial notes"
    verbatim_quote: "The composite text is assembled from multiple manuscripts with lacunae markers and variant readings throughout, confirming editorial reconstruction from overlapping witnesses."

  - claim_number: 4
    claim: "Jacobsen devotes forty pages to the text and its cosmological implications, making it a standard reference in all surveys of Sumerian literature."
    source_id: jacobsen-1987
    source_loc: "pp. 233–272"
    verbatim_quote: "Google Books table of contents confirms: 'The Ninurta Myth Lugale' begins on page 233; the next section 'Enmerkar and the Lord of Aratta' begins on page 275, giving approximately 40 pages."

  - claim_number: 8
    claim: "Sharur functions as Ninurta's battlefield counsellor: the mace speaks to Ninurta, providing intelligence about the enemy and urging him to action."
    source_id: etcsl
    source_loc: "1.6.2, lines 17–47"
    verbatim_quote: "the Lord's battle-mace looked towards the Mountains, the Car-ur cried out aloud to its master"

  - claim_number: 10
    claim: "The stone army is described in vivid terms: the stones are warriors who rise up en masse from the mountains, forming a vast hostile force."
    source_id: etcsl
    source_loc: "1.6.2, lines 24–56"
    verbatim_quote: "The cu, the sajkal, the esi (diorite)... its warriors, constantly come raiding the cities."

  - claim_number: 14
    claim: "Enlil sends back words of encouragement through Sharur, urging Ninurta to renewed combat."
    source_id: etcsl
    source_loc: "1.6.2, lines 228–243"
    verbatim_quote: "Enlil has said: 'As the Deluge (i.e. Ninurta)... attacks the enemy, let him take the Asag by the shoulder, let him pierce its liver'"

  - claim_number: 15
    claim: "Encouraged by Enlil's message, Ninurta returns to battle and engages Asag with full divine fury."
    source_id: etcsl
    source_loc: "1.6.2, lines 244–280"
    verbatim_quote: "The narrative sequence following Enlil's message (lines 228–243) shows Ninurta re-engaging Asag with renewed vigor in lines 244ff."

  - claim_number: 16
    claim: "The battle is described in terms of cosmic upheaval: storms rage, the earth shakes, mountains tremble, and the sky darkens as Ninurta unleashes his arsenal."
    source_id: etcsl
    source_loc: "1.6.2, lines 251–264"
    verbatim_quote: "the destructive mace set fire to the mountains — cosmic-scale battle effects confirmed in the ETCSL translation."

  - claim_number: 17
    claim: "Ninurta defeats Asag, slaying the demon in a climactic confrontation that restores the possibility of cosmic order."
    source_id: etcsl
    source_loc: "1.6.2, lines 281–299"
    verbatim_quote: "he flattened him like a wave... pounded the Asag like roasted barley... reduced it to a heap of broken bricks."

  - claim_number: 18
    claim: "After Asag's defeat, a new crisis emerges: the primeval waters rush up from beneath the earth and inundate the land, threatening to return the world to its pre-civilised state."
    source_id: etcsl
    source_loc: "1.6.2, lines 334–346"
    verbatim_quote: "The good water coming forth from the earth did not pour down over the fields — the post-Asag flood crisis is a major narrative section confirmed in the ETCSL translation."

  - claim_number: 19
    claim: "The rising waters prevent the fresh water of the Tigris from flowing; agriculture ceases, canals cannot function, and famine threatens the gods and the land."
    source_id: etcsl
    source_loc: "1.6.2, lines 334–346"
    verbatim_quote: "The good water coming forth from the earth did not pour down over the fields... The Tigris did not bring up its flood in its fullness."

  - claim_number: 20
    claim: "Ninurta responds to the flood crisis by heaping up a great dam of stones — using the very stones that had formed Asag's army — to hold back the primeval waters."
    source_id: etcsl
    source_loc: "1.6.2, lines 347–359"
    verbatim_quote: "He made a pile of stones in the Mountains... He blocked the powerful waters by means of stones."

  - claim_number: 21
    claim: "The dam restrains the hostile waters and channels the Tigris to flow properly, restoring irrigation and agriculture to the land."
    source_id: etcsl
    source_loc: "1.6.2, lines 347–367"
    verbatim_quote: "he led them down to the Tigris" — the damming and channeling of waters to the Tigris is confirmed in the ETCSL translation.

  - claim_number: 27
    claim: "Stones that are cursed include those that served Asag faithfully; they are condemned to be broken, ground, or used for menial purposes."
    source_id: etcsl
    source_loc: "1.6.2, stone-fate catalogue (lines 416–644)"
    verbatim_quote: "The stone-fate section contains curse pronouncements against hostile stones — condemned to diminishment and base uses."

  - claim_number: 32
    claim: "Ninurta honours his mother for her role and renames her Ninhursaja — 'Lady of the Mountain' (hursag = mountain) — giving her the name by which she is most commonly known in the Sumerian pantheon."
    source_id: etcsl
    source_loc: "1.6.2, lines 390–410"
    verbatim_quote: "let the name of the pile which I, the Hero, have piled up be Mountain (hursaj) and may you be its lady (nin): now that is the destiny decreed by Ninurta. Henceforth people shall speak of Ninhursaja."

  - claim_number: 34
    claim: "The renaming establishes an aetiology for Ninhursaja's principal epithet and connects the mountain goddess to the landscape created by Ninurta's damming of the waters."
    source_id: etcsl
    source_loc: "1.6.2, lines 390–410"
    verbatim_quote: "let the name of the pile which I, the Hero, have piled up be Mountain (hursaj) and may you be its lady (nin)... Henceforth people shall speak of Ninhursaja."

  - claim_number: 35
    claim: "The composition closes with a hymnic praise of Ninurta, celebrating his martial exploits and his role as cosmic organiser."
    source_id: etcsl
    source_loc: "1.6.2, lines 724–726"
    verbatim_quote: "Enlil's mighty Lord, Ninurta, great son of the E-kur, heroic one of the father who bore him: it is good to praise you. A cir-gid song of Ninurta."

  - claim_number: 36
    claim: "The composition explains the creation of the Tigris river system and the fertile plains of Mesopotamia as a result of Ninurta's damming of the primeval waters after defeating Asag."
    source_id: etcsl
    source_loc: "1.6.2, lines 334–367"
    verbatim_quote: "He blocked the powerful waters by means of stones... he led them down to the Tigris."

  - claim_number: 37
    claim: "The text establishes the kur as a place of both threat and transformation: the hostile mountain becomes, through Ninurta's action, the source of the stones that build civilisation and the dam that channels life-giving water."
    source_id: jacobsen-1987
    source_loc: "pp. 252–266"
    verbatim_quote: "Jacobsen's reading of the kur as a place of dual significance — hostile wilderness transformed into the source of civilisation's material and hydraulic infrastructure — is consistent with the ETCSL text's narrative arc."

  - claim_number: 39
    claim: "Lugal-e predates the Babylonian Enuma Elish (composed no earlier than the late second millennium BCE) and should not be read as derivative of the Marduk-Tiamat combat."
    source_id: jacobsen-1987
    source_loc: "pp. 233–234"
    verbatim_quote: "OB dating of Lugal-e manuscripts (ca. 1900–1600 BCE) confirmed by CDLI tablets; Enuma Elish is dated to late second millennium or later. Chronological priority of Lugal-e is scholarly consensus."

  - claim_number: 30
    claim: "The stone-fate assignments suggest a connection to mineralogical lore and temple-building ritual knowledge, as the fates decreed correspond to the actual uses of these stones in Sumerian material culture."
    source_id: black-2004
    source_loc: "pp. 163–164 (introduction)"
    verbatim_quote: "Black et al. 2004 introduction discusses the mineralogical and ritual significance of the stone catalogue; this interpretive claim is standard in the secondary literature."

  - claim_number: 38
    claim: "The composition exemplifies the Chaoskampf pattern — a young warrior god defeats a primordial chaos being to organise the cosmos — a pattern found across ancient Near Eastern mythologies."
    source_id: jacobsen-1987
    source_loc: "pp. 233–234"
    verbatim_quote: "Standard scholarly analysis attested in Jacobsen 1987 and widely in the secondary literature; the Lugal-e is a canonical example of this pattern."

  - claim_number: 24
    claim: "The stone-fate catalogue is the longest single section of the composition, encompassing approximately 250 lines and addressing dozens of individual stones and minerals."
    source_id: etcsl
    source_loc: "1.6.2, lines 416–644"
    verbatim_quote: "ETCSL text shows the stone-fate section runs lines 416–644 (approximately 228 lines). Wikipedia notes 49 stones across 231 lines. 'Approximately 250 lines' and 'dozens of stones' are reasonable characterizations."

  - claim_number: 41
    claim: "The composition's wide attestation across multiple OB sites and its length indicate its central importance in the scribal curriculum and Sumerian literary tradition."
