findings:
  # --- Pass 1: Claim-level verification (start to end) ---

  - claim_number: 4
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: >
      Jacobsen devotes forty pages to the text and its cosmological
      implications, making it a standard reference in all surveys of
      Sumerian literature.
    issue: >
      The page range cited is Jacobsen 1987, pp. 233–272, which spans
      39 pages (not forty, but "approximately forty" is defensible). The
      claim that Jacobsen "devotes forty pages" is plausible from training
      knowledge — Jacobsen 1987 does include "Lugal-e" in a substantial
      section. However, the exact starting and ending pages of the Lugal-e
      treatment cannot be confirmed without live access to the book. The
      characterisation "standard reference in all surveys" is a broad
      scholarly assessment that is generally correct but cannot be
      independently verified here.
    evidence: >
      Training knowledge: Jacobsen 1987 "The Harps That Once..." includes
      a substantial treatment of Lugal-e. The page range pp. 233-272
      (39 pages) is plausible. Cannot confirm exact page boundaries.
    recommended_fix: >
      Verify the exact page range in Jacobsen 1987. If pp. 233-272 is
      correct, "approximately forty pages" or "some forty pages" is
      accurate (39 pages). Alternatively, state "nearly forty pages."

  - claim_number: 9
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: >
      Asag's power is so great that his me-lam (terrifying divine
      radiance) causes the fish to boil in the rivers and the vegetation
      to wither — the natural order itself is threatened.
    issue: >
      The detail about "fish boiling in rivers" is a well-known element
      of the Lugal-e tradition, but in the ETCSL 1.6.2 composite text,
      this detail is associated with Asag's effect on the landscape. From
      training knowledge, the specific reference to fish being cooked or
      boiled in the water occurs not as a description of Asag's me-lam
      per se, but rather as a consequence of the disruption of the water
      system after Asag's activities. The line range "60–90" may not be
      the precise location of this detail in the ETCSL composite. More
      critically, the term "me-lam" (divine radiance) is not necessarily
      what causes the fish to boil in the ETCSL text — the ETCSL
      translation may attribute this effect to the general disruption or
      to the rising of the kur waters rather than specifically to Asag's
      me-lam. The claim conflates two elements: Asag possesses me-lam
      (correct) and the fish boil (correct), but the causal link between
      them is uncertain from the ETCSL translation alone.
    evidence: >
      Training knowledge: The fish-boiling motif is well attested for
      this composition but the precise causal mechanism (me-lam vs.
      general disruption vs. water-heating) and the exact line numbers
      need verification against the ETCSL composite text.
    recommended_fix: >
      Verify the exact lines in ETCSL 1.6.2 where the fish-boiling motif
      appears and confirm whether it is explicitly attributed to Asag's
      me-lam or to a more general disruption. Adjust the causal framing
      if needed. Also verify the line range 60-90.

  - claim_number: 13
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: >
      Encouraged by Enlil's message, Ninurta returns to battle and
      engages Asag with full divine fury.
    issue: >
      The general narrative is well-attested — Ninurta does re-engage
      after receiving encouragement. However, the specific line range
      "180–220" for this episode cannot be confirmed from training
      knowledge. The phrase "full divine fury" is an interpretive
      embellishment. The ETCSL translation may use different language.
      Without live access, both the exact line range and the exact
      characterisation cannot be verified.
    evidence: >
      Training knowledge confirms Ninurta returns to battle after Enlil's
      encouragement. Exact line range and the specific phrase "full divine
      fury" are unverified.
    recommended_fix: >
      Verify line range 180-220 against ETCSL 1.6.2. Consider whether
      "full divine fury" should carry an [INFERENCE:] marker or be
      rephrased closer to the ETCSL translation language.

  - claim_number: 14
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: >
      The battle is described in terms of cosmic upheaval: storms rage,
      the earth shakes, mountains tremble, and the sky darkens as Ninurta
      unleashes his arsenal.
    issue: >
      The general description of cosmic upheaval during the battle is
      consistent with training knowledge of the composition — Ninurta's
      combat does involve storm and earthquake imagery. However, the
      specific list "storms rage, the earth shakes, mountains tremble,
      and the sky darkens" is a paraphrase that may not precisely match
      the ETCSL translation. The line range "200–240" is plausible but
      cannot be confirmed.
    evidence: >
      Training knowledge confirms cosmic-scale battle imagery in this
      section of Lugal-e. Exact line range and precise wording need
      verification.
    recommended_fix: >
      Verify against ETCSL 1.6.2 lines 200-240 and adjust the paraphrase
      to match the actual imagery in the translation.

  - claim_number: 17
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: >
      The rising waters prevent the fresh water of the Tigris from
      flowing; agriculture ceases, canals cannot function, and famine
      threatens the gods and the land.
    issue: >
      The general narrative of water disruption is well-attested in
      training knowledge. However, the specific detail that "canals cannot
      function" may be an inference — the ETCSL text may describe the
      disruption in different terms (e.g., rivers not reaching the
      fields, water not being available for irrigation). The Tigris
      specifically is mentioned in the composition, but whether the text
      mentions "canals" by name at lines 290-330 is uncertain. The line
      range also needs verification.
    evidence: >
      Training knowledge: the water-disruption episode is a core element
      of Lugal-e. The specific mention of "canals" at the cited lines
      cannot be confirmed without live ETCSL access.
    recommended_fix: >
      Verify lines 290-330 in ETCSL 1.6.2. Confirm whether "canals"
      are specifically mentioned or whether the text uses more general
      language about water/irrigation disruption.

  - claim_number: 20
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: >
      The stone-fate catalogue is the longest single section of the
      composition, encompassing approximately 250 lines and addressing
      dozens of individual stones and minerals.
    issue: >
      The stone-fate catalogue (approximately lines 400-650) does span
      roughly 250 lines and is indeed the longest section. However, the
      exact line range and the count "approximately 250 lines" need
      verification. From training knowledge, the stone section is
      extensive but the exact boundaries (where the catalogue begins and
      ends) and the precise number of stones addressed are uncertain
      without live ETCSL access.
    evidence: >
      Training knowledge confirms the stone-fate section is the longest
      part of the composition and addresses many individual stones. The
      "approximately 250 lines" figure is plausible but unverified.
    recommended_fix: >
      Verify the exact line range of the stone-fate catalogue in ETCSL
      1.6.2 and confirm the approximate line count.

  - claim_number: 22
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: >
      The catalogue includes stones used in building (limestone, bitite),
      stones used as weights and tools (hematite), and decorative stones,
      reflecting a comprehensive Sumerian mineralogical knowledge
      embedded in mythological narrative.
    issue: >
      The term "bitite" is unrecognised in standard Sumerian mineralogical
      references. Training knowledge does not identify "bitite" as a stone
      name in the Lugal-e stone catalogue or in Sumerian lexical lists.
      This may be a garbled form of "bitumen" (esir₂ in Sumerian) or a
      confusion with another stone name. The ETCSL translation uses
      Sumerian stone names that are sometimes left untranslated or given
      approximate English equivalents. "Limestone" and "hematite" are
      plausible identifications for stones in the catalogue, but "bitite"
      appears to be either fabricated or a misspelling. The source
      citation to "Black et al. 2004, pp. 177-188" is plausible for the
      general stone-catalogue section but the specific stone name "bitite"
      needs correction.
    evidence: >
      Training knowledge: "bitite" is not a recognised stone name in
      Sumerian literature or modern mineralogy. The stone catalogue in
      Lugal-e includes stones like diorite (na₄esi), lapis lazuli
      (na₄za-gin₃), carnelian, alabaster, and others, but "bitite" does
      not appear in standard translations.
    recommended_fix: >
      Verify the stone names against the ETCSL 1.6.2 translation and
      Black et al. 2004 pp. 177-188. Remove or replace "bitite" with the
      correct stone name from the source. Consider using the stone names
      as they appear in the translation rather than modern identifications
      that may be incorrect.

  - claim_number: 25
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: >
      The renaming establishes an aetiology for Ninhursaja's principal
      epithet and connects the mountain goddess to the landscape created
      by Ninurta's damming of the waters.
    issue: >
      The first part of this claim (aetiological function of the renaming)
      is directly supported by the text — ETCSL 1.6.2 does present the
      renaming as an origin story for the name Ninhursaja. The second part
      ("connects the mountain goddess to the landscape created by
      Ninurta's damming") is an interpretive reading that links two
      narrative sections. While this is a reasonable scholarly
      interpretation (Jacobsen 1987 reads it this way), the claim
      presents it as textual fact rather than scholarly analysis. This
      should arguably carry an [INFERENCE:] marker for the second half.
    evidence: >
      The ETCSL text narrates both the damming and the renaming, but
      the explicit causal connection between the two (the mountain =
      the dam = the hursag in Ninhursaja's name) is a scholarly
      interpretation, notably Jacobsen's.
    recommended_fix: >
      Add an [INFERENCE:] marker for the claim that the renaming
      "connects the mountain goddess to the landscape created by
      Ninurta's damming" — or attribute this reading explicitly to
      Jacobsen 1987.

