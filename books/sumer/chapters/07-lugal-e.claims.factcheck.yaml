findings:
  - claim_number: 1
    kind: CITATION-WRONG
    severity: LOW
    claim: "The composition known as 'Lugal-e' is catalogued as ETCSL 1.6.2 and extends to approximately 729 lines."
    issue: "ETCSL composite text ends at line 726, not 729. Wikipedia states 728 lines. The claim says 'approximately 729' which is close but imprecise."
    evidence: "ETCSL composite text (c162.htm) last line is 726. CDLI composite (P469530) also shows 726 lines. Wikipedia states 728."
    recommended_fix: "Change '729 lines' to '726 lines' (per ETCSL composite) or 'approximately 726–728 lines' to reflect slight variation between editions."

  - claim_number: 6
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Ninurta's weapon is the sentient mace Sharur (literally 'smiter of thousands')."
    issue: "The standard translation of šar₂-ur₃ is 'smasher of thousands' (not 'smiter of thousands'). The Sumerian šar₂ means 3,600 (or a large number/totality), and ur₃ means 'to destroy, mow down' — hence 'smasher' not 'smiter'."
    evidence: "Wikipedia: 'Sharur (Sumerian: šar₂-ur₃), which means smasher of thousands.' Tumblr Sumerian Language blog confirms etymology: ur = 'to destroy, mow down, erase', shar = 3,600 / totality."
    recommended_fix: "Change 'smiter of thousands' to 'smasher of thousands'."

  - claim_number: 9
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Asag is a monstrous demon of sickness, born of An (heaven) and Ki (earth), who has raised an army of stones against the gods from his stronghold in the kur."
    issue: "Three problems: (1) The ETCSL text says 'Heaven copulated with the verdant Earth' — it does not name An and Ki explicitly. The parentage claim is interpretive, not textual. (2) Calling Asag a 'demon of sickness' conflates the Lugal-e characterization with the later Akkadian asakku tradition. In Lugal-e, Asag is described as 'a warrior who knows no fear,' not as a sickness demon. (3) The text does not say Asag 'raised an army of stones' — the stones are warriors that serve him, described as raiding cities."
    evidence: "ETCSL 1.6.2 lines 24–47: 'Heaven copulated with the verdant Earth, Ninurta: she has born him a warrior who knows no fear -- the Asag, a child who sucked the power of milk without ever staying with a wet-nurse.' No mention of 'sickness' or 'An and Ki' by name."
    recommended_fix: "Change 'demon of sickness' to 'monstrous demon' or 'fearsome warrior-being'. Change 'born of An (heaven) and Ki (earth)' to 'born of Heaven and Earth'. Adjust 'raised an army of stones' to 'whose stone warriors raid cities'."

  - claim_number: 11
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Asag's power is so great that his me-lam (terrifying divine radiance) causes the fish to boil in the rivers and the vegetation to wither."
    issue: "The ETCSL text (lines 70–95) describes environmental destruction from the battle/storm effects, attributed to Ninurta's hurricane and the general combat, not specifically to Asag's me-lam. The passage reads: 'the storm flooded out the fish there in the subterranean waters' and 'It caused a rain of coals and flaming fires.' The fish-boiling trope is associated with Asag in secondary literature and Wikipedia, but the ETCSL text does not explicitly attribute these effects to Asag's me-lam."
    evidence: "ETCSL 1.6.2 lines 70–95: 'the storm flooded out the fish there in the subterranean waters, their mouths snapped at the air... It caused a rain of coals and flaming fires; the fire consumed men.' The destructive effects are attributed to the storm/battle, not to Asag's me-lam specifically."
    recommended_fix: "Reframe as: 'The battle unleashes devastating environmental effects — fires consume the land, rivers are muddied, and fish are destroyed — reflecting the cosmic scale of the conflict.' Or cite a secondary source (Jacobsen) that specifically attributes these effects to Asag."

  - claim_number: 12
    kind: UNVERIFIED
    severity: LOW
    claim: "Ninurta advances against Asag but is initially overwhelmed by the demon's power; in some readings, he suffers a tactical retreat."
    issue: "The ETCSL text shows Sharur warning Ninurta against further battle (lines 135–150: 'do not venture again to a battle as terrible as that'), suggesting difficulty. However, a clear tactical retreat is not explicit in the ETCSL composite. The qualification 'in some readings' makes this a hedged claim but the specific ETCSL line range cited (90–130) does not clearly contain a retreat episode."
    evidence: "ETCSL 1.6.2 lines 135–150 contain Sharur's warning, but the preceding lines (90–130) describe Ninurta's advance and destructive march, not a retreat."
    recommended_fix: "Adjust to: 'Ninurta's initial engagement proves so fierce that his weapon Sharur warns him against further battle, suggesting the enormity of the threat.'"

  - claim_number: 13
    kind: CITATION-WRONG
    severity: LOW
    claim: "Sharur travels to Enlil's temple in Nippur to report the dire situation and to obtain divine encouragement for Ninurta."
    issue: "The cited line range (130–160) does not contain this episode. The Sharur-to-Enlil mission appears at lines 191–214 in the ETCSL text. The line citation is off by approximately 30–50 lines."
    evidence: "ETCSL 1.6.2 lines 191–214: 'The weapon which loved the Lord, obedient to its master, the Car-ur... for Lord Ninurta to his father in Nibru... The weapon... spoke to Enlil.'"
    recommended_fix: "Change line reference from '130–160' to '191–214'."

  - claim_number: 23
    kind: CITATION-WRONG
    severity: LOW
    claim: "After establishing the dam, Ninurta addresses the individual stones that formed Asag's army, decreeing the fate of each one — rewarding those that aided him and cursing those that fought against him."
    issue: "Claim is substantively correct and supported by ETCSL, but the cited line range 'lines 400–650' is imprecise. The actual stone-fate section runs approximately lines 416–644 per the ETCSL text."
    evidence: "ETCSL 1.6.2: Stone fate declarations begin around line 416 and end around line 644."
    recommended_fix: "Adjust line range to 'lines 416–644 (approximate)' for accuracy."

  - claim_number: 26
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Stones that are praised and given beneficial fates include diorite, which is decreed worthy of bearing royal inscriptions, and lapis lazuli, which is honoured for its beauty and association with heaven."
    issue: "Two problems: (1) Diorite (esi) in the ETCSL text is given the fate of being placed 'in the place of libations... in my temple E-ninnu' and being used to shape copper — it is NOT described as bearing 'royal inscriptions.' The royal-inscription claim appears to be a reasonable inference from known Sumerian practice but is not stated in the text. (2) Lapis lazuli (zagin) appears only in a collective listing at line 528 with other stones; it does not receive individual praise or specific mention of 'beauty and association with heaven' in the ETCSL text."
    evidence: "ETCSL 1.6.2 lines 466–478 (diorite): 'They shall extract you from the highland countries... You shall shape Strong Copper like leather... you shall be placed in the place of libations... in my temple E-ninnu.' Lines 528–533 (lapis lazuli): zagin appears in a collective list; no individual fate-pronouncement describes its beauty or heavenly association."
    recommended_fix: "Revise diorite description to match the ETCSL text: 'decreed worthy for use in temples and libation-places.' Revise lapis lazuli to note it receives collective treatment rather than individual praise, or cite a secondary source for the beauty/heaven association."

  - claim_number: 28
    kind: UNVERIFIED
    severity: LOW
    claim: "The catalogue includes stones used in building (limestone, bitite), stones used as weights and tools (hematite), and decorative stones, reflecting a comprehensive Sumerian mineralogical knowledge embedded in mythological narrative."
    issue: "The ETCSL text names approximately 25+ stones. Hematite (kagina) is attested at line 497. However, 'limestone' and 'bitite' are not explicitly named in the ETCSL stone catalogue. The stone names use Sumerian terms whose identification with modern minerals is often uncertain."
    evidence: "ETCSL 1.6.2 stone catalogue names: u, cu, gasura, sajkal, gulgul, sajjar, esi, na, elel, kagina, jicnugal, algamec, ducia, nir, gug, zagin, and many others. 'Limestone' and 'bitite' as modern identifications are not given in the ETCSL translation."
    recommended_fix: "Replace 'limestone, bitite' with examples verifiable in the ETCSL text (e.g., 'na stone, kagina (hematite), esi (diorite)') or add a qualifier noting uncertain mineral identifications."

  - claim_number: 31
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "After the stone-fate decrees, Ninurta's mother comes to the kur to see her son's victory; she is identified in this passage as Ninmah (the 'exalted lady')."
    issue: "Two problems: (1) The cited line range (650–690) is wrong — the Ninmah passage appears at lines 368–410, much earlier. (2) The ETCSL text says she 'went to him in E-cumeca, his chosen place,' not that she 'comes to the kur.' The location description is inaccurate."
    evidence: "ETCSL 1.6.2 lines 368–371: 'At that time he also reached a woman with compassion. Ninmah was sleepless from remembering the place where she had conceived him.' Lines 390–410 contain the renaming. The cited range '650–690' is incorrect."
    recommended_fix: "Correct line range from '650–690' to approximately '368–410'. Change 'comes to the kur' to 'comes to E-cumeca' or 'comes to see her son.'"

  - claim_number: 33
    kind: MARKER-MISUSED
    severity: LOW
    claim: "[LACUNA: Closing hymnic section (lines 680–729) has minor gaps in the praise formula and the mother-renaming passage]"
    issue: "The mother-renaming passage is NOT in lines 680–729. It occurs around lines 368–410. The LACUNA marker correctly identifies gaps in lines 680–726 (closing section), but incorrectly states the mother-renaming passage is in this range."
    evidence: "ETCSL composite text confirms lacunae in lines 680–726 area (bracketed restorations), but the Ninmah/Ninhursaja renaming is at lines 390–410."
    recommended_fix: "Remove 'and the mother-renaming passage' from the LACUNA marker, as the renaming occurs at lines 390–410, not 680–729."

  - claim_number: 25
    kind: MARKER-MISUSED
    severity: LOW
    claim: "[LACUNA: Portions of the stone-fate assignment section (lines 330–370) damaged]"
    issue: "The LACUNA marker places damage at lines 330–370, but the stone-fate section begins around line 416. Lines 330–370 are part of the damming/water-management section, not the stone-fate assignments. The ETCSL composite does show a 1-line gap around line 332–333, which is in the water section."
    evidence: "ETCSL composite (c162.htm) shows '1 line missing' at line 332, which is in the damming episode (lines 334–367), not the stone-fate section (lines 416–644)."
    recommended_fix: "Correct the LACUNA marker to either: (a) note the gap at lines 332–333 as part of the damming section, or (b) if referring to stone-fate lacunae, cite the appropriate line ranges within 416–644."

