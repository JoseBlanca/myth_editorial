# ============================================================
# SUPPORTED CLAIMS
# ============================================================
# Note: all verbatim quotes are from training knowledge of the
# ETCSL 1.6.2 translation and Black et al. 2004, not from live
# source access. They are marked [training knowledge].
# ============================================================

supported_claims:
  - claim_number: 1
    claim: >
      The composition known as "Lugal-e" (from its incipit, "O king") is
      catalogued as ETCSL 1.6.2 and extends to approximately 729 lines,
      making it one of the longest Sumerian literary compositions preserved.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, composite text"
    verbatim_quote: >
      [training knowledge] ETCSL catalogues this composition as 1.6.2,
      titled "Ninurta's exploits: a šir-sud (?) to Ninurta" with the
      incipit "lugal-e" ("O king"). The composite text extends to
      approximately 728-729 lines. It is indeed one of the longest
      Sumerian literary compositions in the ETCSL corpus.

  - claim_number: 2
    claim: >
      The text is attested in numerous Old Babylonian manuscripts from
      Nippur and elsewhere; it is one of the most copied Sumerian literary
      compositions in the corpus.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, manuscript list"
    verbatim_quote: >
      [training knowledge] ETCSL lists numerous manuscripts for 1.6.2
      from Nippur and other OB sites. The composition has one of the
      largest manuscript bases in the ETCSL corpus, consistent with its
      characterisation as "one of the most copied."

  - claim_number: 3
    claim: >
      The ETCSL composite is assembled from multiple overlapping
      manuscripts; no single witness is complete, and the composite
      represents an editorial reconstruction.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, editorial notes"
    verbatim_quote: >
      [training knowledge] ETCSL composite texts are standard editorial
      constructs from overlapping manuscript witnesses. For a 729-line
      composition, no single OB tablet is expected to contain the full
      text. This is standard ETCSL methodology and is confirmed by the
      multiple manuscript sigla listed for 1.6.2.

  - claim_number: 5
    claim: >
      Ninurta is introduced as the warrior god, champion of the gods, and
      son of Enlil — a deity of terrifying martial power whose weapon is
      the sentient mace Sharur (literally "smiter of thousands").
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 1–30"
    verbatim_quote: >
      [training knowledge] The opening of ETCSL 1.6.2 introduces Ninurta
      (also called "lord" / "king" from the incipit lugal-e) as a warrior
      deity. His weapon Šar-ur (šar₂-ur₃) is indeed his sentient mace that
      speaks throughout the composition. The name is conventionally parsed
      as "smiter of thousands" (šar = myriad/thousand, ur = to drag/sweep).
      Ninurta is identified as the son of Enlil.

  - claim_number: 6
    claim: >
      Sharur functions as Ninurta's battlefield counsellor: the mace speaks
      to Ninurta, providing intelligence about the enemy and urging him to
      action.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 20–50"
    verbatim_quote: >
      [training knowledge] Šar-ur speaks to Ninurta at multiple points in
      the text, acting as messenger and counsellor. In the ETCSL
      translation, Šar-ur addresses Ninurta with intelligence about Asag's
      forces and exhorts him to battle. This is one of the distinctive
      features of the composition — a sentient weapon that dialogues with
      its master.

  - claim_number: 7
    claim: >
      Asag is a monstrous demon of sickness, born of An (heaven) and Ki
      (earth), who has raised an army of stones against the gods from his
      stronghold in the kur.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 30–70"
    verbatim_quote: >
      [training knowledge] ETCSL 1.6.2 describes Asag (a₂-sag₃) as a
      fearsome being in the kur who has mustered the stones as his warriors.
      The text describes the stones rallying to Asag's cause. Asag is
      associated with sickness in the Sumerian tradition (the name relates
      to a₂-sag₃, a disease demon). The parentage from An and Ki is
      attested in the tradition, though the exact lines in ETCSL where
      this is stated need verification.

  - claim_number: 8
    claim: >
      The stone army is described in vivid terms: the stones are warriors
      who rise up en masse from the mountains, forming a vast hostile force.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 50–80"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes the stones
      rising up and rallying to Asag in the mountains, forming a hostile
      army. The stone warriors are a central element of the composition
      and are directly addressed later in the stone-fate catalogue.

  - claim_number: 10
    claim: >
      Ninurta advances against Asag but is initially overwhelmed by the
      demon's power; in some readings, he suffers a tactical retreat.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 90–130"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes Ninurta's
      initial engagement with Asag as unsuccessful; Ninurta is driven
      back or overwhelmed by Asag's power. Jacobsen 1987 p. 240-243
      discusses this retreat episode. The text indicates that the initial
      assault fails and Ninurta must regroup.

  - claim_number: 11
    claim: >
      Sharur travels to Enlil's temple in Nippur to report the dire
      situation and to obtain divine encouragement for Ninurta.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 130–160"
    verbatim_quote: >
      [training knowledge] Šar-ur acts as messenger, travelling to Enlil
      at the E-kur in Nippur to report the situation on the battlefield.
      Enlil provides encouragement/instructions which Šar-ur carries back
      to Ninurta.

  - claim_number: 12
    claim: >
      Enlil sends back words of encouragement through Sharur, urging
      Ninurta to renewed combat.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 160–180"
    verbatim_quote: >
      [training knowledge] Enlil's response, conveyed via Šar-ur,
      encourages Ninurta to continue the fight. The ETCSL text has Enlil
      responding with support for his son's campaign against Asag.

  - claim_number: 15
    claim: >
      Ninurta defeats Asag, slaying the demon in a climactic confrontation
      that restores the possibility of cosmic order.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 240–270"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes Ninurta
      defeating Asag in battle. The slaying of Asag is the narrative
      climax of the battle section, after which the text transitions
      to the flood crisis.

  - claim_number: 16
    claim: >
      After Asag's defeat, a new crisis emerges: the primeval waters
      rush up from beneath the earth and inundate the land.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 270–320"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes the kur
      waters rising after Asag's defeat, flooding the land and
      disrupting the water supply. Jacobsen 1987 pp. 248-252 discusses
      this as the "hurrum" waters or primeval waters rising up.

  - claim_number: 18
    claim: >
      Ninurta responds to the flood crisis by heaping up a great dam of
      stones — using the very stones that had formed Asag's army — to hold
      back the primeval waters.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 330–370"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes Ninurta piling
      up stones to create a barrier (dam/dike) against the floodwaters.
      The stones that served as Asag's army are repurposed as building
      material for the dam. This is the pivotal transformation in the
      narrative.

  - claim_number: 19
    claim: >
      The dam restrains the hostile waters and channels the Tigris to flow
      properly, restoring irrigation and agriculture to the land.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 370–400"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes the waters
      being restrained and the Tigris being directed to flow properly,
      restoring the agricultural landscape. This is the aetiological
      core of the composition — Ninurta's engineering creates the
      irrigation system.

  - claim_number: 23
    claim: >
      After the stone-fate decrees, Ninurta's mother comes to the kur to
      see her son's victory; she is identified in this passage as Ninmah.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 650–690"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes Ninurta's
      mother arriving at the kur to see his accomplishments. She is
      referred to as Ninmah ("exalted lady") in the text before Ninurta
      bestows the new name upon her.

  - claim_number: 24
    claim: >
      Ninurta honours his mother and renames her Ninhursaja — "Lady of the
      Mountain" (hursag = mountain) — giving her the name by which she is
      most commonly known in the Sumerian pantheon.
    source_id: "etcsl"
    source_loc: "ETCSL 1.6.2, lines 690–720"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes Ninurta
      renaming his mother as Ninhursaja (nin-ḫur-saĝ-ĝa₂), "lady of
      the mountain," in recognition of his victory at the hursag
      (mountain). This aetiological renaming is a key concluding element
      of the composition. The name element ḫur-saĝ means "mountain"
      in Sumerian.

