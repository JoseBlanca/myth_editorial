additions:
  status: "MINOR-ISSUES"
  high_severity: 0
  medium_severity: 0
  low_severity: 10
  items:
    - id: "ADD-01"
      severity: "LOW"
      location: "narrative line 3"
      text: >
        The existence of that bilingual version tells us something about
        the text's longevity: scribes were still interested in it long
        after Sumerian had ceased to be a spoken language.
      note: >
        Editorial inference from the approved claim about the bilingual
        Sumerian-Akkadian version. No new factual content; restates the
        significance of the bilingual attestation in rhetorical terms.

    - id: "ADD-02"
      severity: "LOW"
      location: "narrative line 13"
      text: >
        Lugal-e (chapter 7) told the story of Ninurta -- warrior god,
        son of Enlil, champion of the gods -- defeating the demon Asag
        and his stone army, then damming the primeval waters and
        decreeing the fates of every stone on the battlefield. Lugal-e
        ended with Ninurta victorious, the landscape reorganised, his
        mother renamed Ninhursaja in honour of the mountain he had
        built. But Lugal-e left something unaddressed. What happens
        when the warrior comes home?
      note: >
        Summary of Lugal-e content from the preceding chapter. All
        details correspond to approved claims from ch-07 and the
        approved claim in ch-08 about Angim as sequel to Lugal-e
        (Jacobsen reference). No new mythological content.

    - id: "ADD-03"
      severity: "LOW"
      location: "narrative line 16"
      text: >
        The story, as the tablets preserve it, goes as follows.
      note: >
        Transitional sentence. No factual content.

    - id: "ADD-04"
      severity: "LOW"
      location: "narrative line 20"
      text: >
        He is not marching in orderly formation with his weapons stowed.
        He is blazing across the landscape like a storm that has
        forgotten how to stop.
      note: >
        Rhetorical elaboration on the approved claims about Ninurta's
        terrifying departure with trophies. No new factual content;
        literary characterisation consistent with the claims about
        overwhelming martial splendour and storm imagery.

    - id: "ADD-05"
      severity: "LOW"
      location: "narrative line 24"
      text: >
        He moves through the world not as a returning champion but as a
        natural disaster in progress -- a concentration of destructive
        force that has not yet received the message that the battle is
        over.
      note: >
        Rhetorical elaboration on the terrifying procession claims.
        No new factual content; interpretive restating of the approved
        claims about uncontained martial fury.

    - id: "ADD-06"
      severity: "LOW"
      location: "narrative line 35"
      text: >
        The irony is precise. The gods sent Ninurta to fight Asag
        because Asag threatened the world. Now Ninurta is coming home,
        and the gods are afraid... The champion has become the threat.
        The weapon the gods deployed against chaos has not been
        resheathed.
      note: >
        Editorial commentary restating the INFERENCE marker about the
        central dramatic tension. No new factual assertions; rhetorical
        amplification of the approved claims about gods' fear and the
        approved inference about martial power threatening cosmic
        stability.

    - id: "ADD-07"
      severity: "LOW"
      location: "narrative line 40"
      text: >
        This is the city from which Enlil -- king of the gods, lord of
        wind and command, supreme authority in Nippur -- dispatched him
        to fight in the first place. And the inhabitants of that city,
        divine inhabitants included, are now watching the horizon with
        the same apprehension they would have felt watching Asag's
        approach. The saviour and the threat have become
        indistinguishable. Ninurta has not changed his nature. He has
        simply not changed back.
      note: >
        Extended editorial commentary on the approved claim about gods
        cowering as Ninurta approaches Nippur. The Enlil gloss matches
        the glossary exactly. No new factual assertions.

    - id: "ADD-08"
      severity: "LOW"
      location: "narrative line 43"
      text: >
        The me-lam that blazes from Ninurta's body is not something he
        can turn off like a lamp. It is intrinsic to what he is. The
        battle awakened capacities that do not sleep on command.
      note: >
        Editorial commentary on the nature of me-lam. Consistent with
        the approved claims about me-lam blazing uncontrollably. No
        new factual assertions; interpretive observation.

    - id: "ADD-09"
      severity: "LOW"
      location: "narrative line 47"
      text: >
        His response is not force. It is diplomacy. He does not meet
        Ninurta at the gate with a greater display of power. He does
        not command him to stop. He does something far more calculated.
      note: >
        Editorial characterisation of Enlil's response. Consistent
        with the approved claim about Enlil dispatching Nusku to
        soothe and channel Ninurta's return. No new factual content.

    - id: "ADD-10"
      severity: "LOW"
      location: "narrative line 53"
      text: >
        The choice of intermediary matters. Enlil does not go himself.
        He sends Nusku -- his vizier, his trusted minister. The message
        is not a command but a reframing... The father does not confront
        the son. The father contains the son -- not by force but by
        form.
      note: >
        Extended editorial commentary on the diplomatic strategy.
        Consistent with approved claims about Nusku as intermediary
        and the soothing/channelling purpose. No new factual
        assertions; interpretive elaboration on the approved claims.

