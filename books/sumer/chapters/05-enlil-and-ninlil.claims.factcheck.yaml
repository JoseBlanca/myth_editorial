supported_claims:
  - claim_number: 3
    claim: "The composition has been extensively studied by Jacobsen, Kramer, and subsequent Sumerologists for its theogonic and ethical dimensions."
    source_id: "jacobsen-1987"
    source_loc: "pp. 167–180"
    verbatim_quote: "Jacobsen 1987 devotes pp. 167–180 to 'Enlil and Ninlil: The Begetting of Nanna,' confirmed by multiple bibliographic references including the ETCSL bibliography page for 1.2.1."

  - claim_number: 4
    claim: "The text opens by establishing the setting in Nippur (Sumerian: Nibru), the religious capital of Sumer and seat of Enlil, who is called 'Great Mountain' (kur-gal)."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 1–12 and line 18"
    verbatim_quote: "Lines 1–2: 'There was a city, there was a city -- the one we live in. Nibru was the city, the one we live in.' Line 18 (transliteration): 'kur gal a-a dmu-ul-lil2' — rendered in translation as 'The Great Mountain, Father Enlil.'"

  - claim_number: 6
    claim: "Enlil encounters the young Ninlil at the canal and propositions her; Ninlil initially refuses, saying she is too young and that her mother would not approve."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 22–34"
    verbatim_quote: "'My vagina is small, it does not know pregnancy. My lips are young, they do not know kissing.'"

  - claim_number: 7
    claim: "Enlil does not accept the refusal; the text states that he lies with Ninlil ('he kissed her, he copulated with her'), and the moon god Nanna-Suen is conceived."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 35–53"
    verbatim_quote: "'He actually had intercourse with her, he actually kissed her. At this one intercourse, at this one kissing he poured the seed of Suen-Acimbabbar into her womb.'"

  - claim_number: 8
    claim: "The narrative frames Enlil's act as transgressive within the story's own ethical system: what follows is a formal judgment by the divine community."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 54–60"
    verbatim_quote: "'the fifty great gods and the seven gods who decide destinies had Enlil arrested in the Ki-ur. Enlil, the ritually impure, left the city.'"

  - claim_number: 10
    claim: "Enlil is sentenced to leave Nippur and descend toward the underworld (kur), an exile that takes him progressively further from the civilised centre."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 59–64"
    verbatim_quote: "'Enlil, in accordance with what had been decided, [...] Enlil went.' Variant (2 mss.): 'Enlil, ritually impure, leave the city! Nunamnir, ritually impure, leave the city!'"

  - claim_number: 11
    claim: "Ninlil, now pregnant with Nanna, chooses to follow Enlil into exile rather than remain in Nippur."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 63–64"
    verbatim_quote: "'Enlil went. Ninlil followed. Nunamnir went, the maiden chased him.'"

  - claim_number: 13
    claim: "In each disguised encounter, Enlil meets Ninlil and copulates with her again; each union produces a chthonic deity — a god of the underworld."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 65–142"
    verbatim_quote: "First encounter (line ~90): 'he poured the seed of Nergal-Meslamta-eda into her womb'; second (~116): 'the seed of Ninazu, the king who stretches measuring lines over the fields'; third (~142): 'the seed of Enbilulu, the inspector of canals.'"

  - claim_number: 14
    claim: "The three chthonic deities born from the disguised encounters are Nergal (lord of the underworld), Ninazu (a healing/underworld deity), and Enbilulu (canal inspector of the netherworld)."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 65–142"
    verbatim_quote: "Lines ~90, ~116, ~142: 'Nergal-Meslamta-eda,' 'Ninazu, the king who stretches measuring lines over the fields,' 'Enbilulu, the inspector of canals.'"

  - claim_number: 16
    claim: "Each chthonic god serves as a ransom or substitute for Nanna in the underworld, ensuring that the moon will rise in the sky above Nippur."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 65–142"
    verbatim_quote: "In each encounter: 'Let my seed go downwards, instead of my master's seed!' — the substitution formula appears in all three disguise scenes."

  - claim_number: 18
    claim: "The composition ends with a hymnic praise of Enlil, affirming his greatness and the birth of the gods — a doxology that reintegrates Enlil into the divine order despite the transgression that opens the narrative."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 143–154"
    verbatim_quote: "'You are lord! You are king! Enlil, you are lord! You are king! Nunamnir, you are lord! You are king! [...] For the praise spoken for Ninlil the mother, praise be to Father Enlil!'"

  - claim_number: 19
    claim: "The composition functions theogonically: it explains the birth of the moon god Nanna-Suen and three chthonic deities who serve as his underworld substitutes."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 53, 90, 116, 142"
    verbatim_quote: "The text narrates four conceptions: Suen-Acimbabbar (line 53), Nergal-Meslamta-eda (line ~90), Ninazu (line ~116), and Enbilulu (line ~142), with the substitution formula 'instead of my master's seed' linking the three underworld births to the celestial firstborn."

  - claim_number: 23
    claim: "The sexual-violence dimension is handled within the narrative's own ethical framework: the assembly's declaration explicitly identifies Enlil's act as transgressive, and his banishment is the consequence."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 54–60"
    verbatim_quote: "'the fifty great gods and the seven gods who decide destinies had Enlil arrested in the Ki-ur. Enlil, the ritually impure, left the city. Nunamnir, the ritually impure, left the city.'"

  - claim_number: 24
    claim: "The composition is one of the most heavily copied Sumerian literary texts, with numerous OB Nippur student copies attesting its central place in the scribal curriculum."
    source_id: "etcsl"
    source_loc: "1.2.1, bibliography/manuscript list"
    verbatim_quote: "The ETCSL bibliography page for 1.2.1 lists 22 cuneiform sources. Most manuscript sigla (N, Ni, CBS, UM, 3N-T prefixes) indicate Nippur provenance, confirming heavy attestation from Old Babylonian Nippur."

findings:
  - claim_number: 1
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The composition 'Enlil and Ninlil' is catalogued as ETCSL 1.2.1 and extends to approximately 152 lines."
    issue: "The ETCSL composite text and translation both contain 154 lines, not 152. The claim says 'approximately 152 lines,' but the actual count is 154. The ETCSL catalogue number 1.2.1 is correct."
    evidence: "ETCSL 1.2.1 translation (https://etcsl.orinst.ox.ac.uk/section1/tr121.htm) covers lines 1–154 in seven numbered sections (1–12, 13–21, 22–34, 35–53, 54–64, 65–90, 91–116, 117–142, 143–154). The composite transliteration (https://etcsl.orinst.ox.ac.uk/section1/c121.htm) also ends at line 154."
    recommended_fix: "Change '152 lines' to '154 lines' throughout the claims document."

  - claim_number: 2
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "Minor word-level variants exist across fragments, but these do not constitute a separate recension; the ETCSL composite is the standard text."
    issue: "The claim is plausible and consistent with ETCSL editorial practice for a heavily attested curriculum text. The ETCSL translation does show variant readings in braces (e.g., '2 mss. have instead:' for lines 59–60), confirming word-level variants exist. However, the specific editorial notes page cited ('ETCSL 1.2.1, editorial notes') is a general reference — the ETCSL does not have a dedicated editorial notes page for this text."
    evidence: "ETCSL 1.2.1 translation shows variant readings inline (e.g., 'Enlil, ritually impure, leave the city!' as variant of 'Enlil, the ritually impure, left the city'). No separate recension is apparent from the manuscript tradition."
    recommended_fix: "Change the citation from 'ETCSL 1.2.1, editorial notes' to 'ETCSL 1.2.1, composite text and translation, variant readings' — since the variants are visible in the translation itself, not a separate editorial notes page."

  - claim_number: 5
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The young goddess Ninlil's mother, Nunbarshegunu, instructs her daughter to bathe in the river canal (the Nunbirdu canal in Nippur)."
    issue: "The canal name in the ETCSL text is 'Id-nunbir-tum' (Sumerian transliteration: id2-nun-bi-ir-tum2), not 'Nunbirdu.' The claims document uses 'Nunbirdu canal' which is an older or informal anglicization. Additionally, the mother does not instruct Ninlil TO bathe — she warns her NOT to bathe: 'The river is holy, woman! The river is holy -- don't bathe in it! Ninlil, don't walk along the bank of the Id-nunbir-tum!' The claim's phrasing ('instructs her daughter to bathe in the river canal — advice that will lead to the fateful encounter') is ambiguous but can be read as saying the mother told her to bathe, which inverts the actual content."
    evidence: "ETCSL 1.2.1, lines 13–21: 'The river is holy, woman! The river is holy -- don't bathe in it! Ninlil, don't walk along the bank of the Id-nunbir-tum! His eye is bright, the lord's eye is bright, he will look at you! The Great Mountain, Father Enlil -- his eye is bright, he will look at you!' Sumerian transliteration line 8: 'id2-nun-bi-ir-tum2.'"
    recommended_fix: "Change 'Nunbirdu canal' to 'Id-nunbir-tum canal' (matching ETCSL). Clarify that the mother warns Ninlil NOT to bathe, and that Ninlil disregards this warning — the encounter follows from Ninlil's disobedience, not from following maternal advice."

  - claim_number: 9
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The great gods — the fifty senior deities of the divine assembly — seize Enlil and pronounce judgment: he is declared a sex offender (literally: 'Enlil, you are a sex offender') and banished from Nippur."
    issue: "Multiple errors. (1) The ETCSL translation does NOT use 'sex offender' or 'sex criminal.' The term used is 'ritually impure' (Sumerian: u2-zug4-ge). The claim purports to give a literal translation ('literally: Enlil, you are a sex offender') but this phrase does not appear in the ETCSL text at all. (2) The text says 'the fifty great gods and the seven gods who decide destinies' — these are two distinct groups, not 'the fifty senior deities of the divine assembly.' (3) The declaration in the text is 'Enlil, the ritually impure, left the city' (variant: 'Enlil, ritually impure, leave the city!') — not a declaration of sexual offense."
    evidence: "ETCSL 1.2.1, lines 56–60: 'dijir gal-gal 50-ne-ne / dijir nam-tar-ra 7-na-ne-ne / den-lil2 ki-ur3-ra im-ma-ni-in-dab5-be2-ne / den-lil2 u2-zug4-ge iri-ta ba-ra-ed2 / dnu-nam-nir u2-zug4-ge iri-ta ba-ra-ed2' — translated: 'the fifty great gods and the seven gods who decide destinies had Enlil arrested in the Ki-ur. Enlil, the ritually impure, left the city. Nunamnir, the ritually impure, left the city.' URL: https://etcsl.orinst.ox.ac.uk/section1/tr121.htm"
    recommended_fix: "Replace 'sex offender' with 'ritually impure' (matching ETCSL u2-zug4-ge). Remove the false 'literally:' parenthetical. Change 'the fifty senior deities of the divine assembly' to 'the fifty great gods and the seven gods who decide destinies.' The Sumerian term u2-zug4 designates ritual impurity, not a sexual-offense category."

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "As Enlil descends toward the underworld, he takes on three successive disguises — appearing as the gatekeeper of the city gate, as the 'man of the river' (the ferryman of the underworld river), and as the ferryman of the river of the dead."
    issue: "The description of the three disguises conflates the second and third. In ETCSL 1.2.1, Enlil's three disguises are: (1) 'the city gatekeeper' (lu2 abul-la), (2) 'the man of the Id-kura, the man-eating river' — a river guardian, NOT a ferryman, and (3) 'SI.LU.IGI, the man of the ferryboat' — the actual ferryman. The claims document describes the second as 'the man of the river (the ferryman of the underworld river)' and the third as 'the ferryman of the river of the dead,' making them sound nearly identical. The actual ETCSL text distinguishes the second (river-man) from the third (boatman/ferryman) as different functionaries."
    evidence: "ETCSL 1.2.1: First encounter (lines 65–90): 'Enlil answered as the city gatekeeper'; second (lines 91–116): 'Enlil answered as the man of the Id-kura, the man-eating river'; third (lines 117–142): 'Enlil answered as the man SI.LU.IGI, the man of the ferryboat.' Three distinct roles: gatekeeper, river-man, and boatman. URL: https://etcsl.orinst.ox.ac.uk/section1/tr121.htm"
    recommended_fix: "Revise to: 'appearing as the city gatekeeper, as the man of the Id-kura (the man-eating river of the underworld), and as SI.LU.IGI (the man of the ferryboat)' — preserving the three distinct identities from the ETCSL text."

  - claim_number: 15
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "The theological core of the narrative is a substitution logic: three underworld deities are born so that Nanna-Suen, the firstborn moon god, can ascend to heaven rather than remaining in the netherworld."
    issue: "This claim presents an interpretive reading (primarily Jacobsen's) as a straightforward textual fact. The ETCSL text does contain the substitution formula ('Let my seed go downwards, instead of my master's seed!') in each encounter, but labeling it 'the theological core' is a scholarly interpretation, not a directly quotable textual fact. This should bear an [INFERENCE:] marker or be explicitly attributed to Jacobsen's reading."
    evidence: "ETCSL 1.2.1 contains the substitution formula; Jacobsen 1987 pp. 177–179 develops the 'substitution logic' interpretation. But other scholars read the text differently (e.g., as primarily theogonic rather than soteriological)."
    recommended_fix: "Add [INFERENCE:] marker or rephrase as 'A central interpretive reading, following Jacobsen (1987), identifies a substitution logic...'"

  - claim_number: 20
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "The composition maps the vertical cosmos: Enlil's descent from Nippur toward the underworld generates deities for each cosmic level — the celestial (Nanna), the liminal (Nergal), and the chthonic (Ninazu, Enbilulu)."
    issue: "The tripartite cosmological mapping (celestial/liminal/chthonic) is an interpretive framework, not a direct textual claim. Classifying Nergal/Meslamtaea as 'liminal' is particularly questionable — Nergal is consistently treated as a full underworld deity in Sumerian and Akkadian sources, not a liminal figure. The ETCSL text does not assign 'cosmic levels' to the deities. This should bear an [INFERENCE:] marker."
    evidence: "ETCSL 1.2.1 names the deities but does not assign them to cosmic tiers. Jacobsen 1987 pp. 167–180 discusses progressive descent but does not use the specific 'celestial/liminal/chthonic' trichotomy as presented here. Nergal/Meslamtaea is widely attested as a full underworld deity (ORACC AMGG entry for Nergal)."
    recommended_fix: "Add [INFERENCE:] marker. Reconsider classifying Nergal as 'liminal' — 'chthonic' would be more accurate for all three underworld deities. If the three-tier mapping is retained, attribute it explicitly as an interpretive framework."

  - claim_number: 22
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "The divine assembly's judgment of Enlil represents one of the earliest narrative depictions of a formal legal proceeding against a god by his own divine community."
    issue: "The superlative 'one of the earliest' is a comparative-historical claim requiring cross-referencing against all known ancient Near Eastern literary corpora. This is an interpretive/scholarly assessment, not something verifiable from ETCSL 1.2.1 alone. It should bear an [INFERENCE:] marker."
    evidence: "The text does depict a divine assembly arresting and banishing Enlil. The 'earliest' superlative is not directly supported by the cited ETCSL text alone."
    recommended_fix: "Add [INFERENCE:] marker or soften to 'an early narrative depiction' without the superlative."

findings_notes: |
  Pass 1 (forward): All 22 substantive claims examined (excluding LACUNA markers and the correctly applied INFERENCE marker at claim 17). 14 supported with verbatim quotes from live ETCSL fetch. 4 citation errors found (line count 152→154, canal name Nunbirdu→Id-nunbir-tum, 'sex offender'→'ritually impure', disguise descriptions conflated). 1 unverified (editorial notes reference). 3 marker issues (claims 15, 20, 22 need INFERENCE markers).

  Pass 2 (triangulation): Triangulated ETCSL 1.2.1 composition number against live ETCSL translation and composite text pages — confirmed. Verified Q000336 identifier via CDLI wiki cross-reference. Confirmed 22 manuscripts listed on ETCSL bibliography page. Line number ranges verified against live ETCSL section structure (1–12, 13–21, 22–34, 35–53, 54–64, 65–90, 91–116, 117–142, 143–154 = 154 lines total). Jacobsen 1987 pp. 167–180 confirmed via multiple bibliographic databases. Black et al. 2004 page range (pp. 100–107) could not be independently verified from web sources but the chapter's existence in the book is confirmed via Oxford Academic.

  Pass 3 (contamination scan): No contamination detected. All claims reference Sumerian-language compositions within the defined scope (ETCSL 1.x category). The deity name 'Nergal' is used alongside the Sumerian form 'Meslamtaea' — the ETCSL text uses the combined form 'Nergal-Meslamta-eda,' so using 'Nergal' as a gloss is acceptable. No blacklisted sources referenced.

  Pass 4 (marker integrity):
    - Two LACUNA markers present (lines 77–85, lines 118–123). The ETCSL text does show lacunae (marked with ellipses) in these regions, confirmed from live fetch. These are plausible locations.
    - One INFERENCE marker present (claim 17: graduated descent interpretation). Correctly applied; risk statement is reasonable but lacks a specific alternative scholarly citation.
    - No RECONSTRUCTION markers present (appropriate — no cross-composition fills claimed).
    - No VARIANT markers present (appropriate — single-prevalent classification).
    - No silent bridges detected. All substantive claims have footnote citations.
    - Three claims (15, 20, 22) should bear INFERENCE markers but do not — flagged as MARKER-MISUSED.

  Pass 5 (reverse order): Re-examined claims 24 through 1 in reverse. Confirmed all findings from Pass 1. Claim 24 (attestation volume) well-supported by 22 manuscripts on ETCSL bibliography. Claim 23 (sexual-violence ethical framework) supported by the arrest/banishment text. Claim 9 (sex offender) confirmed as the most significant error — HIGH severity because the fabricated 'literally:' parenthetical misrepresents the ETCSL text. Claim 5 (canal name and maternal instruction inversion) confirmed as MEDIUM — the mother warns AGAINST bathing, not for it.

  Glossary check: Enlil, Ninlil, Nanna-Suen, Nippur/Nibru, kur all used consistently with glossary.yaml entries. The canal name 'Nunbirdu' does not appear in the glossary but is an incorrect form of the ETCSL 'Id-nunbir-tum.' No glossary violations detected in deity/place naming conventions.
