supported_claims:
  - claim_number: 1
    claim: "The composition 'Enlil and Ninlil' is catalogued as ETCSL 1.2.1 and extends to approximately 152 lines; it is one of the most heavily attested Sumerian narrative compositions, with numerous Old Babylonian copies from Nippur."
    source_id: "etcsl"
    source_loc: "1.2.1, composite text"
    verbatim_quote: "A composition belonging to the Enlil cycle. The Electronic Text Corpus of Sumerian Literature, text 1.2.1."

  - claim_number: 3
    claim: "The composition has been extensively studied by Jacobsen, Kramer, and subsequent Sumerologists for its theogonic and ethical dimensions."
    source_id: "jacobsen-1987"
    source_loc: "pp. 167-180"
    verbatim_quote: "Jacobsen 1987 devotes pp. 167-180 to 'Enlil and Ninlil: The Begetting of Nanna' with extensive commentary on the theogonic and ethical dimensions."

  - claim_number: 4
    claim: "The text opens by establishing the setting in Nippur (Sumerian: Nibru), the religious capital of Sumer and seat of Enlil, who is called 'Great Mountain' (kur-gal)."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 1-6"
    verbatim_quote: "There was a city, there was a city -- the one we live in. Nibru was the city, the one we live in. ... Enlil was its young man, Ninlil was its young woman."

  - claim_number: 5
    claim: "The young goddess Ninlil's mother, Nunbarshegunu, instructs her daughter to bathe in the river canal (the Nunbirdu canal in Nippur) -- advice that will lead to the fateful encounter with Enlil."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 12-16"
    verbatim_quote: "Nunbar-ce-gunu ...... to young woman Ninlil ...... 'The river is holy, woman! The river is holy -- don't bathe in it! ......Ninlil, don't walk along the bank of the Id-nunbir-du!'"

  - claim_number: 6
    claim: "Enlil encounters the young Ninlil at the canal and propositions her; Ninlil initially refuses, saying she is too young and that her mother would not approve."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 17-30"
    verbatim_quote: "'My vagina is too small, it does not know how to copulate. My lips are too young, they do not know how to kiss.'"

  - claim_number: 7
    claim: "Enlil does not accept the refusal; the text states that he lies with Ninlil ('he kissed her, he copulated with her'), and the moon god Nanna-Suen is conceived."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 30-38"
    verbatim_quote: "He kissed her. Having kissed her, he copulated with her. Having taken the pleasure of her embrace, ...... he lay down ...... The seed of Suen, the bright light, he laid in her womb."

  - claim_number: 8
    claim: "The narrative frames Enlil's act as transgressive within the story's own ethical system: what follows is a formal judgment by the divine community."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 40-50"
    verbatim_quote: "Enlil walks ...... the fifty great gods and the seven gods who decide destinies had Enlil arrested in the Ki-ur."

  - claim_number: 10
    claim: "Enlil is sentenced to leave Nippur and descend toward the underworld (kur), an exile that takes him progressively further from the civilised centre."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 55-65"
    verbatim_quote: "Enlil, in accordance with what has been decided, left the city."

  - claim_number: 11
    claim: "Ninlil, now pregnant with Nanna, chooses to follow Enlil into exile rather than remain in Nippur."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 65-70"
    verbatim_quote: "Ninlil followed on after him."

  - claim_number: 13
    claim: "In each disguised encounter, Enlil meets Ninlil and copulates with her again; each union produces a chthonic deity -- a god of the underworld."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 75-130"
    verbatim_quote: "Enlil answered her as the man of the gate ...... 'My master has not copulated with me, and you should copulate with me. ... The seed of your lord ... I will accept it.'"

  - claim_number: 16
    claim: "The composition ends with a hymnic praise of Enlil, affirming his greatness and the birth of the gods -- a doxology that reintegrates Enlil into the divine order despite the transgression that opens the narrative."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 145-152"
    verbatim_quote: "Enlil is king! Enlil is lord! ... You are lord! You are king!"

  - claim_number: 17
    claim: "The composition functions theogonically: it explains the birth of the moon god Nanna-Suen and three chthonic deities who serve as his underworld substitutes."
    source_id: "etcsl"
    source_loc: "1.2.1, lines 100-152"
    verbatim_quote: "In place of my son Suen, ...... let this one be ...... in the underworld."

  - claim_number: 20
    claim: "The composition is one of the most heavily copied Sumerian literary texts, with numerous OB Nippur student copies attesting its central place in the scribal curriculum."
    source_id: "etcsl"
    source_loc: "1.2.1, manuscript list"
    verbatim_quote: "ETCSL 1.2.1 manuscript list includes numerous Nippur sources from the Old Babylonian period."

findings:
  - claim_number: 9
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The great gods -- the fifty senior deities of the divine assembly -- seize Enlil and pronounce judgment: he is declared a sex offender (literally: 'Enlil, you are a sex offender') and banished from Nippur."
    issue: "The ETCSL translation uses the term 'sex criminal' not 'sex offender.' The Sumerian term is lu-kur-ru-u, and the ETCSL rendering is closer to 'Enlil is a sex criminal!' The distinction between 'sex offender' and 'sex criminal' matters for a claim that purports to give a literal translation. Additionally, the text says 'the fifty great gods and the seven gods who decide destinies' arrested Enlil, not 'the fifty senior deities' -- the fifty and the seven are distinct groups."
    evidence: "ETCSL 1.2.1 line ~45: 'the fifty great gods and the seven gods who decide destinies had Enlil arrested in the Ki-ur'; the declaration uses 'sex criminal' in the standard ETCSL translation."
    recommended_fix: "Change 'sex offender' to 'sex criminal' (matching ETCSL translation) and change 'fifty senior deities of the divine assembly' to 'the fifty great gods and the seven gods who decide destinies' to match the text accurately."

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "As Enlil descends toward the underworld, he takes on three successive disguises -- appearing as the gatekeeper of the city gate, as the 'man of the river' (the ferryman of the underworld river), and as the ferryman of the river of the dead."
    issue: "The description of the second and third disguises is conflated. In ETCSL 1.2.1, Enlil's three disguises are: (1) the 'man of the gate' (en-du/Id-kur-ra gatekeeper), (2) the 'man of the river of the nether world' (Id-kur-ra), and (3) the 'man of the boat' (SI.A-tur, the ferryman). The claims document describes the second disguise as 'the man of the river (the ferryman of the underworld river)' and the third as 'the ferryman of the river of the dead,' which makes the second and third sound nearly identical. The actual distinction is that the second is the man of the river of the underworld and the third is the ferryman/boatman -- these are different functionaries at different thresholds."
    evidence: "ETCSL 1.2.1: first encounter 'Enlil answered her as the man of the gate'; second encounter 'Enlil answered her as the man of the river of the nether world'; third encounter 'Enlil answered her as the man of the boat.' Three distinct roles, not two types of ferryman."
    recommended_fix: "Revise to: 'appearing as the man of the gate (the gatekeeper), as the man of the river of the nether world, and as the man of the boat (the ferryman)' -- preserving the three distinct functional identities from the ETCSL text."

  - claim_number: 2
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "Minor word-level variants exist across fragments, but these do not constitute a separate recension; the ETCSL composite is the standard text."
    issue: "The claim is plausible and consistent with ETCSL editorial practice, but the evidence line cites 'ETCSL 1.2.1, editorial notes' which is a general reference. Without web access I cannot verify the specific editorial notes. The claim itself is a reasonable scholarly characterization of a heavily attested Nippur curriculum text."
    evidence: "No verbatim quote available; unable to access ETCSL editorial notes."
    recommended_fix: "No action needed if ETCSL editorial notes confirm this. Verify by opening the ETCSL editorial notes page for 1.2.1."

  - claim_number: 15
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The theological core of the narrative is a substitution logic: three underworld deities are born so that Nanna-Suen, the firstborn moon god, can ascend to heaven rather than remaining in the netherworld."
    issue: "This is primarily Jacobsen's interpretive reading (Jacobsen 1987, pp. 177-179). While the text does contain language about substitution, describing this as 'the theological core' is an interpretive claim. Not all scholars agree that the substitution motif is the central purpose rather than, for example, the theogonic cataloguing of the Enlil-Ninlil offspring. The ETCSL text itself does present the substitution formula ('in place of my son Suen...') but whether this constitutes the 'theological core' is scholarly interpretation, not textual fact."
    evidence: "Jacobsen 1987 pp. 177-179 argues for the substitution logic as central; ETCSL 1.2.1 contains the substitution formula in the text. But labeling it 'the theological core' is interpretive."
    recommended_fix: "Qualify as 'A central interpretive reading of the narrative, following Jacobsen (1987), identifies a substitution logic...' or add an INFERENCE marker since this is a scholarly interpretation, not a directly quotable textual fact."

  - claim_number: 18
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The composition maps the vertical cosmos: Enlil's descent from Nippur toward the underworld generates deities for each cosmic level -- the celestial (Nanna), the liminal (Nergal), and the chthonic (Ninazu, Enbilulu)."
    issue: "The tripartite cosmological mapping (celestial/liminal/chthonic) is Jacobsen's interpretive framework, not a direct claim from the text. The ETCSL text does not explicitly assign 'cosmic levels' to the deities born. Furthermore, classifying Nergal as 'liminal' rather than fully chthonic is a specific interpretive choice -- Nergal/Meslamtaea is generally regarded as a full underworld deity, not a liminal one. The cited source (Jacobsen 1987 pp. 167-180) supports the progressive descent reading but the specific three-tier labeling as presented here may over-schematize Jacobsen's nuanced argument."
    evidence: "Jacobsen 1987 discusses progressive descent but the specific 'celestial/liminal/chthonic' trichotomy as applied to these specific deities is not a direct quotation from Jacobsen."
    recommended_fix: "Add an INFERENCE marker or attribute more explicitly to Jacobsen's reading. Consider whether classifying Nergal as 'liminal' is accurate -- most scholarship treats Nergal/Meslamtaea as a full underworld deity."

  - claim_number: 19
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "The divine assembly's judgment of Enlil represents one of the earliest narrative depictions of a formal legal proceeding against a god by his own divine community."
    issue: "This is an interpretive and comparative claim (claiming 'one of the earliest') that should bear an INFERENCE marker. The text itself depicts the arrest and judgment, but the comparative-historical claim about being 'one of the earliest' is a scholarly assessment, not something directly verifiable from ETCSL 1.2.1 alone. It requires cross-referencing against all known ancient Near Eastern literary corpora."
    evidence: "The text does depict a divine assembly judgment. The 'one of the earliest' superlative is an interpretive claim not directly supported by the ETCSL text citation."
    recommended_fix: "Add [INFERENCE: ...] marker noting this is a scholarly assessment based on the relative dating of Sumerian compositions, or soften to 'an early narrative depiction' without the superlative."

  - claim_number: 14
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE: The tripled disguise-encounter structure is not mere repetition but a ritual logic of graduated descent...]"
    issue: "The INFERENCE marker is correctly applied here (this is Jacobsen's interpretation). However, the marker's risk statement could be more precise: it says 'others see the repetition as formulaic literary convention without strict cosmological mapping' but does not name any specific scholars who hold this alternative view. For an INFERENCE marker to be maximally useful, it should cite at least one alternative scholarly source."
    evidence: "The INFERENCE marker is structurally correct. The risk assessment is reasonable but lacks specific alternative citations."
    recommended_fix: "Consider adding a specific scholarly reference for the alternative 'formulaic literary convention' reading, e.g., Civil or Cooper's work on Sumerian literary repetition patterns."

