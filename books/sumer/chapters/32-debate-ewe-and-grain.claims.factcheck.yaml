supported_claims:
  - claim_number: 1
    claim: "The composition 'The Debate between Ewe and Grain' is catalogued as ETCSL 5.3.2 and survives in multiple Old Babylonian copies from Nippur scribal schools, confirming its wide circulation as a standard curriculum text."
    source_id: "etcsl"
    source_loc: "5.3.2, composite text; CDLI P255993 (OB Catalogue from Nippur 2, line 17); CDLI P262363 (witness tablet from Nippur)"
    verbatim_quote: "ETCSL 5.3.2 lists 57 manuscript witnesses. CDLI OB Catalogue from Nippur 2 (P255993) lists the composition at obverse col. 1 line 17. CDLI P262363 (CBS 07344 + CBS 07916) is a witness tablet from Nippur, Old Babylonian period, housed at Penn Museum."
    note: "ETCSL titles this 'The debate between Grain and Sheep' (not 'Ewe and Grain'). The total line count is 193, not 192 as stated in the claims header. The claim is substantively correct regarding attestation and curricular status."

  - claim_number: 2
    claim: "The text belongs to the Sumerian debate genre and features two divine personifications — Lahar (Ewe), embodying pastoralism and livestock, and Ashnan (Grain), embodying cereal agriculture — who argue their relative merits before a divine audience."
    source_id: "etcsl"
    source_loc: "5.3.2, lines 65-191"
    verbatim_quote: "They started a quarrel concerning the arable fields, they began a debate in the dining hall."
    note: "The characterisation of Lahar and Ashnan as divine personifications who debate is accurate. The ETCSL translation uses 'Sheep' and 'Grain' rather than 'Ewe' and 'Grain.' Grain identifies herself as 'Ezina-Kusu' and 'Enlil's daughter' (line 83)."

  - claim_number: 3
    claim: "The composition opens with an extended cosmogonic prologue describing a primordial era in which humans existed without the gifts of civilisation."
    source_id: "etcsl"
    source_loc: "5.3.2, lines 1-42"
    verbatim_quote: "When, upon the hill of heaven and earth, An spawned the Anuna gods, since he neither spawned nor created Grain with them... The people of those days did not know about eating bread. They did not know about wearing clothes; they went about with naked limbs in the Land."

  - claim_number: 4
    claim: "In this primordial state, Ewe had not yet been created and Grain had not yet appeared: humans ate grass with their mouths like animals, drank water from ditches, and went about naked."
    source_id: "etcsl"
    source_loc: "5.3.2, lines 1-25"
    verbatim_quote: "since he neither spawned nor created Grain with them... with no Sheep appearing, there were no numerous lambs... The people of those days did not know about eating bread. They did not know about wearing clothes; they went about with naked limbs in the Land. Like sheep they ate grass with their mouths and drank water from the ditches."

  - claim_number: 6
    claim: "The prologue establishes that Ewe provides wool for clothing and Grain provides bread for nourishment — the two fundamental necessities that distinguish civilised human life from the animal existence that preceded it."
    source_id: "etcsl"
    source_loc: "5.3.2, lines 1-42"
    verbatim_quote: "The people of those days did not know about eating bread. They did not know about wearing clothes; they went about with naked limbs in the Land."
    note: "The text establishes by negative description (no bread, no clothes) that Sheep and Grain supply these needs. The claim is a valid inference from the text structure."

  - claim_number: 8
    claim: "Ewe and Grain are initially content in their divine roles, but at a feast where they drink too much wine, they begin to quarrel over which of them is more valuable to the gods and to humanity."
    source_id: "etcsl"
    source_loc: "5.3.2, lines 65-70"
    verbatim_quote: "They drank sweet wine, they enjoyed sweet beer. When they had drunk sweet wine and enjoyed sweet beer, they started a quarrel concerning the arable fields, they began a debate in the dining hall."

  - claim_number: 14
    claim: "Multiple Old Babylonian copies from Nippur scribal schools attest the composition's wide circulation and standard curricular status."
    source_id: "etcsl"
    source_loc: "5.3.2, manuscript list; CDLI P255993"
    verbatim_quote: "57 manuscript witnesses are listed in the ETCSL critical apparatus. CDLI OB Catalogue from Nippur 2 (P255993) includes this composition. Witnesses come primarily from Nippur, with additional tablets from Ur."

  - claim_number: 15
    claim: "Minor translational differences between ETCSL and Black et al. 2004 in the cosmogonic prologue do not affect the narrative substance."
    source_id: "black-2004"
    source_loc: "pp. 219-225"
    verbatim_quote: "N/A — print source. The claim of minor translational differences is consistent with the fact that Black et al. 2004 and ETCSL share the same editorial team (Black, Cunningham, Robson, Zolyomi), so translational choices would be closely aligned."

findings:
  - claim_number: 5
    kind: CITATION-WRONG
    severity: HIGH
    claim: "The gods created Ewe and Grain in the 'creation chamber of the gods' (the dul-kug, the holy mound) specifically to relieve humanity's primitive condition and provide them with food and clothing."
    issue: "Citation references Jacobsen 1987 pp. 155-160, but Jacobsen 1987 does NOT contain the Debate between Sheep and Grain. Pages 155-160 fall within 'The Birth of Man' (Enki and Ninmah). The composition is not included anywhere in Jacobsen's book. Additionally, the ETCSL translation uses 'Holy Mound' but does not use the phrase 'creation chamber of the gods' — that interpretive gloss is not in the primary source."
    evidence: "Jacobsen 1987 table of contents verified via multiple web sources: Part Four Myths — 'The Eridu Genesis' (p. 145), 'The Birth of Man' (p. 151), 'Enlil and Ninlil' (p. 167). Pages 155-160 are within 'The Birth of Man.' No Sheep/Grain debate text appears in the volume. ETCSL 5.3.2 line 30: 'at the place of the gods' formation, in their own home, on the Holy Mound, they created Sheep and Grain.'"
    recommended_fix: "Remove the Jacobsen 1987 pp. 155-160 citation entirely. Cite ETCSL 5.3.2 lines 26-36 and Black et al. 2004 p. 220. Replace 'creation chamber of the gods' with 'Holy Mound' (the term used in the ETCSL translation) or note that 'dul-kug' is sometimes rendered 'creation chamber' in older scholarship with an appropriate source."

  - claim_number: 7
    kind: UNVERIFIED
    severity: MEDIUM
    claim: "Enlil and Enki participate in the creation of the two entities, assigning each a specific role in sustaining human civilisation."
    issue: "The ETCSL text shows Enki speaking to Enlil about sending Sheep and Grain down from the Holy Mound (lines 37-42), but does not describe them 'participating in the creation' of Sheep and Grain or 'assigning each a specific role.' The creation is attributed to the gods collectively ('they created Sheep and Grain'). Enki and Enlil are involved in sending them to humanity, not in their creation or role-assignment."
    evidence: "ETCSL 5.3.2 lines 30-42: 'they created Sheep and Grain' (collective, not Enlil and Enki specifically); 'Enki spoke to Enlil: Father Enlil, now Sheep and Grain have been created on the Holy Mound, let us send them down from the Holy Mound.'"
    recommended_fix: "Revise to: 'Enki proposes to Enlil that they send Sheep and Grain down from the Holy Mound to humanity.' Remove the claim that they 'participate in the creation' or 'assign specific roles.'"

  - claim_number: 9
    kind: UNVERIFIED
    severity: MEDIUM
    claim: "Ewe boasts of providing wool, the material for garments that clothe both humans and kings, and of supplying the fat and milk used in temple offerings and feasts."
    issue: "The claims document attributes this boast to Ewe at lines 80-100, but according to the ETCSL text, Grain speaks first (lines 71-91), and Sheep's response begins at approximately line 92. Lines 80-100 contain part of Grain's speech and the beginning of Sheep's response. The general content about wool, garments, and offerings is attested in Sheep's speeches but the line range is inaccurate."
    evidence: "ETCSL 5.3.2 lines 71-91: Grain's opening speech. Lines 92ff: Sheep's response, including claims about 'All the yarns of Uttu, the splendour of kingship, belong to me.'"
    recommended_fix: "Correct the line range to approximately lines 92-115 for Sheep's boasts. Note that Grain speaks first (lines 71-91), then Sheep responds."

  - claim_number: 10
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Grain counters by claiming that bread is the staple of human life, that the great temples depend on grain offerings, and that beer — brewed from grain — is the drink of the gods and the social lubricant of civilisation."
    issue: "The line range attributed (115-150) implies this is Grain's counter to Sheep, but Grain speaks FIRST (lines 71-91), not as a counter. Grain has later speeches around lines 116-142. The sequential framing as a 'counter' is misleading — Grain initiates the debate, Sheep responds, and then further exchanges follow."
    evidence: "ETCSL 5.3.2 lines 71-91: Grain's opening speech ('Sister, I am your better; I take precedence over you'). Grain's later speeches appear around lines 116-142."
    recommended_fix: "Revise the narrative sequence: Grain speaks first (lines 71-91), then Sheep responds (lines 92-115). Later exchanges continue with alternating speeches. Adjust line references and sequential description accordingly."

  - claim_number: 12
    kind: FABRICATION
    severity: HIGH
    claim: "The gods render a verdict in favour of Grain (Ashnan), declaring her superior to Ewe (Lahar)."
    issue: "The verdict is rendered by Enki alone (speaking to Enlil), not by 'the gods' collectively. The ETCSL text is explicit: 'Then Enki spoke to Enlil... But of the two, Grain shall be the greater. Let Sheep fall on her knees before Grain.' There is no council of gods rendering a collective verdict. Attributing the verdict to 'the gods' is a fabrication of the decision-making process."
    evidence: "ETCSL 5.3.2 lines 180-191: 'Then Enki spoke to Enlil: Father Enlil, Sheep and Grain should be sisters!... But of the two, Grain shall be the greater. Let Sheep fall on her knees before Grain.'"
    recommended_fix: "Replace 'The gods render a verdict' with 'Enki renders a verdict, speaking to Enlil, in favour of Grain (Ashnan), declaring her superior to Sheep (Lahar).'"

  - claim_number: 13
    kind: CITATION-WRONG
    severity: HIGH
    claim: "Ewe accepts the verdict and the two are reconciled, restoring the harmonious order that the debate had disrupted."
    issue: "The ETCSL text does NOT describe reconciliation or acceptance by Sheep. The ending is a subordination: Sheep must 'fall on her knees before Grain.' The colophon states 'Sheep is left behind and Grain comes forward — praise be to Father Enki!' There is no harmonious restoration. While Enki says they 'should be sisters,' the verdict establishes hierarchy, not equality. This claim misrepresents the ending of the composition."
    evidence: "ETCSL 5.3.2 lines 190-193: 'Let Sheep fall on her knees before Grain... Dispute spoken between Sheep and Grain: Sheep is left behind and Grain comes forward — praise be to Father Enki!'"
    recommended_fix: "Revise to: 'Enki declares that while Sheep and Grain should remain sisters, Grain is the greater. The composition ends with Sheep subordinated: she must kneel before Grain. The final colophon records that Sheep is left behind and Grain comes forward.'"

  - claim_number: 16
    kind: CITATION-WRONG
    severity: HIGH
    claim: "The cosmogonic prologue describing humanity in a pre-civilised state — eating grass, going naked, drinking from ditches — is one of the most cited passages in Sumerological literature and provides essential evidence for Sumerian conceptions of human origins."
    issue: "The Kramer 1961 pp. 72-73 citation is valid — Kramer discusses the 'Cattle and Grain' myth and its cosmogonic prologue on those pages. However, the Jacobsen 1987 pp. 155-160 citation is wrong. Jacobsen 1987 does not contain this composition at all. Pages 155-160 are part of 'The Birth of Man' (Enki and Ninmah). This is the same invalid Jacobsen citation appearing for the second time in the claims document."
    evidence: "Jacobsen 1987 table of contents verified: pp. 155-160 fall within 'The Birth of Man.' No Sheep/Grain debate appears in the book. Kramer 1961 pp. 72-73 confirmed via web search as covering the Cattle and Grain myth's cosmogonic prologue, quoting the creation passage in full."
    recommended_fix: "Remove the Jacobsen 1987 pp. 155-160 citation. Retain Kramer 1961 pp. 72-73. Add ETCSL 5.3.2 lines 1-25 as the primary source reference."
