chapter: 28
title: "The Flood Story: The Eridu Genesis"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.7.4; survives on single tablet CBS 10673 from Nippur; sole known manuscript"
    narrative_location: "paragraph 1 (line 3)"
    status: MAPPED
    notes: "Narrative: 'catalogued as ETCSL 1.7.4 and survives on a single tablet, CBS 10673, recovered from Nippur (Sumerian: Nibru) — the religious capital of Sumer, seat of Enlil's temple the E-kur — the sole known manuscript of the Sumerian flood narrative.' Faithful. Glossary-mandated glosses for Nippur added."

  - claim_id: C02
    claim_summary: "Very fragmentary; creation of man and boat-building details largely missing"
    narrative_location: "paragraph 2 (line 5)"
    status: MAPPED
    notes: "Narrative: 'Very fragmentary; the creation of man and the boat-building details are largely missing.' Faithful — verbatim from claims."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite text, supplemented by Jacobsen 1987, pp. 145-150"
    narrative_location: "paragraph 2 (line 5)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Jacobsen 1987, pp. 145-150.' Faithful — verbatim."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Single tablet CBS 10673 from Nippur; sole Sumerian witness; all editions depend on this one manuscript"
    narrative_location: "paragraph 1 (line 3)"
    status: MAPPED
    notes: "Narrative: 'There is no second copy. No overlapping fragment from Ur or Lagash or any other site supplements what this one tablet preserves. Every scholarly edition of the Sumerian flood story depends entirely on this one piece of baked clay.' Faithful — expands the factual claim with stylistic emphasis but no distortion."

  - claim_id: C05
    claim_summary: "Tablet in extremely poor condition; large portions broken or illegible; fragments of a much longer composition"
    narrative_location: "paragraph 2 (line 5)"
    status: MAPPED
    notes: "Narrative: 'The tablet is in extremely poor condition, with large portions of every column broken or illegible; the text that survives represents only fragments of a much longer composition.' Faithful — verbatim from claims."

  # === Antediluvian civilization (largely lost) ===

  - claim_id: C06_LACUNA
    claim_summary: "LACUNA: Columns i-ii largely lost; creation of humans, establishment of cities, institution of kingship survive only in fragments"
    narrative_location: "line 13"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C07
    claim_summary: "Surviving fragments from opening columns describe establishment of cities and institution of kingship before the flood"
    narrative_location: "paragraph after LACUNA (line 15)"
    status: MAPPED
    notes: "Narrative: 'Those fragments — broken lines, isolated signs — appear to describe the establishment of cities and the institution of kingship before the flood, suggesting an antediluvian civilization narrative.' Faithful."

  - claim_id: C08_INFERENCE
    claim_summary: "INFERENCE: Antediluvian section likely described creation of humanity and founding of first cities"
    narrative_location: "line 17"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  # === The divine decision to destroy ===

  - claim_id: C09
    claim_summary: "Gods in assembly decide to send a flood; reason not fully preserved"
    narrative_location: "paragraph after second LACUNA (line 27)"
    status: MAPPED
    notes: "Narrative: 'The gods in assembly decide to send a flood to destroy humanity; the reason for this decision is not fully preserved in the surviving text.' Faithful — verbatim."

  - claim_id: C10_LACUNA
    claim_summary: "LACUNA: Divine decision survives only in broken passages in column iii; details of deliberation largely lost"
    narrative_location: "line 25"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C11
    claim_summary: "Enlil plays a role in the decision to send the flood; consistent with his position as chief god"
    narrative_location: "paragraph (line 27)"
    status: MAPPED
    notes: "Narrative: 'Enlil — king of the gods, lord of wind and command, supreme authority in Nippur — appears to play a role in the decision to send the flood, consistent with his position as chief god of the pantheon and the deity whose commands the other gods must obey.' Faithful. Enlil gloss matches glossary first_mention_gloss exactly."

  # === Enki's warning to Ziusudra ===

  - claim_id: C12
    claim_summary: "Enki warns Ziusudra by speaking through a reed wall, circumventing divine oath"
    narrative_location: "paragraph (line 33)"
    status: MAPPED
    notes: "Narrative: 'Enki — god of wisdom, fresh water, and cunning, lord of the abzu beneath Eridu — warns Ziusudra of the coming flood by speaking through a reed wall, circumventing a divine oath not to reveal the gods' decision directly to a mortal.' Faithful. Enki gloss matches glossary."

  - claim_id: C13
    claim_summary: "Ziusudra described as pious king; righteousness is basis for his selection as survivor"
    narrative_location: "paragraph (line 35)"
    status: MAPPED
    notes: "Narrative: 'Ziusudra — a pious king who receives Enki's warning — is described as righteous, and his righteousness is the basis for his selection as the survivor.' Faithful."

  - claim_id: C14
    claim_summary: "Reed-wall device: Enki addresses wall, preserving technical obedience while subverting intent"
    narrative_location: "paragraph (line 33)"
    status: MAPPED
    notes: "Narrative: 'The reed-wall device — Enki addressing the wall rather than speaking directly to Ziusudra — is a distinctive narrative element that preserves the god's technical obedience to the divine decree while subverting its intent.' Faithful — verbatim from claims."

  # === The flood and the boat ===

  - claim_id: C15
    claim_summary: "Ziusudra builds a boat; details of construction largely lost"
    narrative_location: "paragraph (line 41)"
    status: MAPPED
    notes: "Narrative: 'Ziusudra builds a boat in response to Enki's warning; the details of the boat's construction are largely lost in the surviving text.' Faithful — verbatim."

  - claim_id: C16_LACUNA
    claim_summary: "LACUNA: Boat construction, loading, and flood itself largely lost; Akkadian parallels must not fill gaps"
    narrative_location: "line 39"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C17
    claim_summary: "Flood strikes; catastrophic deluge destroys the world; very little of actual flood description preserved"
    narrative_location: "paragraph (line 43)"
    status: MAPPED
    notes: "Narrative: 'The flood strikes; the surviving fragments indicate a catastrophic deluge that destroys the world, though the Sumerian text preserves very little of the actual flood description.' Faithful."

  # === Aftermath and Ziusudra's immortality ===

  - claim_id: C18
    claim_summary: "After the flood, Ziusudra opens window; sun god Utu shines in; Ziusudra prostrates before Utu"
    narrative_location: "paragraph (line 49)"
    status: MAPPED
    notes: "Narrative: 'After the flood, Ziusudra opens a window in the boat and the sun god Utu shines in; Ziusudra prostrates himself before Utu.' Faithful — verbatim."

  - claim_id: C19
    claim_summary: "Ziusudra offers sacrifices to the gods after the flood"
    narrative_location: "paragraph (line 51)"
    status: MAPPED
    notes: "Narrative: 'Ziusudra offers sacrifices to the gods after the flood, performing the ritual acts of a pious survivor giving thanks for deliverance.' Faithful."

  - claim_id: C20
    claim_summary: "An and Enlil grant Ziusudra eternal life; settle him in Dilmun, the paradise land"
    narrative_location: "paragraph (line 53)"
    status: MAPPED
    notes: "Narrative: 'The gods — specifically An, the sky god, and Enlil — grant Ziusudra eternal life and settle him in Dilmun — the paradisal land associated with purity, trade, and immortality.' Faithful. Claims say 'An (the sky god)' — narrative says 'An, the sky god.' Claims say 'associated with purity and divine favor' — narrative says 'associated with purity, trade, and immortality.' The narrative uses the glossary first_mention_gloss for Dilmun, which is slightly different from the claims wording."

  - claim_id: C21_LACUNA
    claim_summary: "LACUNA: Concluding lines describing apotheosis and Dilmun settlement are damaged"
    narrative_location: "line 55"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  # === Textual state and scholarly caution ===

  - claim_id: C22
    claim_summary: "Eridu Genesis is one of most fragmentary major Sumerian compositions; surviving text amounts to disconnected passages"
    narrative_location: "paragraph 3 (line 7)"
    status: MAPPED
    notes: "Narrative: 'The Eridu Genesis, as it is conventionally called, is one of the most fragmentary major Sumerian compositions; the surviving text amounts to disconnected passages from a work that was originally much longer.' Faithful — verbatim."

  - claim_id: C23
    claim_summary: "Text has received outsized scholarly attention as earliest known flood narrative, predating Atrahasis and Gilgamesh XI"
    narrative_location: "paragraph 3 (line 7)"
    status: MAPPED
    notes: "Narrative: 'Despite its extreme fragmentation, the text has received outsized scholarly attention as the earliest known flood narrative, predating the Akkadian Atrahasis and the Gilgamesh XI flood account.' Faithful — verbatim."

  - claim_id: C24
    claim_summary: "Akkadian flood traditions (Atrahasis, Gilgamesh XI) are related but distinct; must not be conflated with or used to reconstruct Eridu Genesis"
    narrative_location: "paragraph 4 (line 9)"
    status: MAPPED
    notes: "Narrative: 'The Akkadian flood traditions — the Atrahasis epic and the flood account in Tablet XI of Gilgamesh — are related but distinct compositions; they must not be conflated with or used to reconstruct the Sumerian Eridu Genesis.' Faithful."

  # === COMPARATIVE-HOOK comments ===

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Noah's flood, Utnapishtim/Atrahasis, Deucalion/Pyrrha, Reed-wall device parallels"
    narrative_location: "lines 63-66 (end of file)"
    status: MAPPED
    notes: "All four comparative hooks are present as // COMPARATIVE-HOOK comments at the end of the narrative, matching the claims file exactly. Faithful."

findings:

  # --- Check 1: Completeness ---

  - id: F01
    check: completeness
    severity: NONE
    detail: "All 24 claims (including LACUNA blocks, INFERENCE block, and COMPARATIVE-HOOK comments) from the approved claims file are present in the narrative. No claims were dropped."

  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph 1 (line 3)"
    detail: "Narrative adds: 'There is no second copy. No overlapping fragment from Ur or Lagash or any other site supplements what this one tablet preserves. Every scholarly edition of the Sumerian flood story depends entirely on this one piece of baked clay, and what that piece of clay has lost, scholarship cannot recover.' This is stylistic emphasis restating the factual content of C04 — no new factual claim."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph 3 (line 7)"
    detail: "Narrative adds: 'That attention is understandable. This is not merely a flood story; it is the flood story — the oldest surviving version of a narrative pattern that would later appear in Akkadian literature and, through channels that remain debated, in the Hebrew Bible.' Interpretive commentary expanding on C23. The reference to the Hebrew Bible introduces a comparative connection not explicitly in claims, but is consistent with the comparative hooks (Noah's flood) and with general scholarly context."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph 3 (line 7)"
    detail: "Narrative adds: 'But the attention must be tempered by honesty about what actually survives.' Editorial commentary, not a factual claim."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph 4 (line 9)"
    detail: "Narrative adds: 'What follows is what the Sumerian tablet preserves, and nothing more.' Editorial methodological statement consistent with the claims file's WARNING about not reconstructing from Akkadian sources."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph after first LACUNA (line 15)"
    detail: "Narrative adds: 'The composition once began with something. Columns i and ii are largely destroyed, and what they contained can only be guessed at from the barest surviving fragments.' Stylistic framing consistent with the LACUNA block."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph after first LACUNA (line 15)"
    detail: "Narrative adds: 'The word \"Eridu\" — the oldest city in Sumerian tradition, seat of Enki's temple the E-abzu — appears among the fragments. References to the descent of kingship from heaven can be discerned.' The Eridu gloss matches the glossary first_mention_gloss. The 'descent of kingship from heaven' is referenced in the INFERENCE block ('Fragmentary lines reference cities (including Eridu) and the descent of kingship from heaven'). Faithful to claims basis."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "paragraph after INFERENCE (line 19)"
    detail: "Narrative adds: 'But these are traces, not a narrative. The reader must imagine a prologue that is not here — some account of how the world was set in order, how cities were built and populated, how kings were appointed to govern. The Sumerian scribes wrote it. The tablet did not keep it.' Stylistic/editorial commentary reinforcing the fragmentary nature. No new factual claim."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "divine decision section (line 27)"
    detail: "Narrative adds: 'Why? The tablet does not say — or rather, whatever it said is now broken.' and 'Whether the motivation was human noise, human transgression, or simple divine prerogative, the surviving text does not tell us. The gods decide, and the mechanism of their decision is lost.' The mention of 'human noise, human transgression, or simple divine prerogative' as possible motivations is editorial speculation about what the lost text might have contained, but is clearly framed as unknown. Low risk — clearly speculative framing."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: MEDIUM
    narrative_location: "divine decision section (line 27)"
    detail: "Narrative mentions possible motivations for the flood: 'human noise, human transgression, or simple divine prerogative.' While framed as unknown, 'human noise' specifically echoes the Akkadian Atrahasis tradition's reason for the flood, which the claims file's WARNING explicitly forbids reconstructing from. However, the narrative does not assert this was the reason — it lists possibilities and says the text does not tell us. The speculative framing mitigates the risk, but the inclusion of an Atrahasis-specific motif in a list of guesses is mildly concerning given the claims file's caution."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "Enki warning section (line 33)"
    detail: "Narrative adds: 'The device is elegant in its legalism. Enki does not address Ziusudra. He addresses the wall. He speaks to a structure of bundled reeds, and if a pious king happens to be standing on the other side of that structure, listening, that is the wall's affair and not Enki's.' Stylistic elaboration of C14. The 'bundled reeds' description is a reasonable material characterization of a reed wall. No new factual claim."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "Enki warning section (line 33)"
    detail: "Narrative adds: 'It is precisely the kind of trick one would expect from the god of cunning: not a violation of the oath, but an exploitation of its wording. The letter of the law is observed. The spirit of the law is annihilated.' Interpretive commentary on C14. Consistent with Enki's characterization in the glossary ('god of wisdom, fresh water, and cunning')."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "Ziusudra section (line 35)"
    detail: "Narrative adds: 'The text does not elaborate on what form his piety takes or how long he has practised it. He is righteous, and therefore he is warned. The equation is presented as self-evident.' Editorial commentary about what the text does NOT say. No new factual claim."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "boat section (line 41)"
    detail: "Narrative adds: 'We know he built it because we know he survived in it, and we know he survived in it because the text says so in a later column. But the construction itself — the dimensions, the materials, the loading of animals or grain or family — is gone.' Editorial commentary emphasizing what is lost. The specifics mentioned (dimensions, materials, animals, grain, family) are listed as examples of missing details, not asserted as having been present."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "boat section (line 41)"
    detail: "Narrative adds: 'These are the details that the Akkadian versions preserve in elaborate specificity, but the Akkadian versions are distinct traditions, and the temptation to borrow from them to fill the Sumerian gaps must be resisted. What the Sumerian tablet does not say, we do not know.' This restates claim C24 about Akkadian traditions being distinct. Not a new claim — reinforcement of scholarly caution."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "flood section (line 43)"
    detail: "Narrative adds: 'The waters come. The world ends. And the tablet, with what feels almost like thematic appropriateness, is broken precisely where the destruction is described.' Stylistic commentary. No new factual claim."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "aftermath section (line 49)"
    detail: "Narrative adds: 'The image is striking in its simplicity. After the catastrophe — after the divine assembly's verdict has been executed and the world has been drowned — light enters through an opening in a boat, and a man falls on his face before it. The gesture is not explained. It does not need to be. Sunlight, after the end of the world, is sufficient cause for prostration.' Interpretive/literary commentary on C18. No new factual claim."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "sacrifice section (line 51)"
    detail: "Narrative adds: 'He has survived. He is grateful. He does what a righteous man does when the gods have spared him: he feeds them. The logic is transactional and ancient. The gods destroyed humanity, but the gods also need humanity — or at least need someone to perform the sacrifices. Ziusudra is that someone.' Interpretive commentary on C19. The 'transactional' characterization of divine-human sacrifice is a common scholarly theme, not an unsourced factual addition."

  - id: F19
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "immortality section (line 53)"
    detail: "Narrative adds: 'The reward is absolute. Ziusudra does not merely survive the flood; he is translated out of the human condition entirely. He receives the breath of heaven and the breath of earth — the life of the gods — and is placed in a land where mortality does not operate. The pious king who listened at the reed wall becomes something other than human.' The phrase 'breath of heaven and the breath of earth' appears to come from the source text (ETCSL 1.7.4 column vi). This is a textual detail not explicitly in the claims but consistent with the cited source."

  - id: F20
    check: no_additions
    type: CLAIM-ADDED
    severity: MEDIUM
    narrative_location: "immortality section (line 53)"
    detail: "Narrative adds the specific textual detail: 'He receives the breath of heaven and the breath of earth — the life of the gods.' This phrase derives from the ETCSL source text but is not stated in the approved claims. It is a specific textual detail that goes beyond the claims' statement that the gods 'grant Ziusudra eternal life.' While consistent with the source, the claims file is the approved baseline and this detail was not vetted through the claims process."
    flagged: true

  - id: F21
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "closing section (line 59)"
    detail: "Narrative adds: 'What we have, then, is a skeleton. The outline of the story is clear: a world before the flood, a divine decision to destroy it, a warning delivered through a trick, a boat, a deluge, a survival, a reward.' Summary of the narrative arc — no new factual claims."

  - id: F22
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "closing section (line 59)"
    detail: "Narrative adds: 'The pattern is the one that would recur in Akkadian literature, in the Hebrew Bible, and — more distantly — in Greek tradition with Deucalion and Pyrrha.' This is consistent with the COMPARATIVE-HOOK comments (Noah's flood, Deucalion and Pyrrha). Not an unsourced claim."

  - id: F23
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "closing section (line 59)"
    detail: "Narrative adds: 'But the Sumerian version, the oldest, is also the least complete. The flesh of the narrative is gone. The connective tissue — motivation, detail, dialogue — has been eaten by time and breakage.' Stylistic summary restating C22/C23."

  - id: F24
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "closing section (line 61)"
    detail: "Narrative adds: 'The composition sits at the beginning of a long tradition, but it sits there in fragments. To read it honestly is to read around the gaps, to acknowledge that the earliest flood story is also the one we understand least. The tablet CBS 10673 has given us enough to know what the Sumerians told. It has not given us enough to know how they told it.' Stylistic/editorial conclusion. No new factual claim."

  # --- Check 3: Fidelity ---

  - id: F25
    check: fidelity
    severity: LOW
    claim_id: C20
    detail: "Claims: 'Dilmun, the paradise land associated with purity and divine favor.' Narrative: 'Dilmun — the paradisal land associated with purity, trade, and immortality.' The narrative uses the glossary's first_mention_gloss for Dilmun rather than the claims' wording. 'Trade and immortality' replaces 'divine favor.' Both are defensible characterizations of Dilmun, and the glossary form is the project-mandated gloss. Minor discrepancy in phrasing, not in substance."

  - id: F26
    check: fidelity
    severity: LOW
    claim_id: C20
    detail: "Claims: 'An (the sky god).' Narrative: 'An, the sky god.' Faithful — parenthetical converted to appositive. No distortion."

