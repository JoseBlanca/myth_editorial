      - Dilmun: first mention (line 53) glossed as 'the paradisal land associated with purity, trade, and immortality' — matches glossary first_mention_gloss exactly. PASS.
      - abzu: appears in Enki's gloss (line 33) and Eridu's gloss (line 15) as 'the abzu' — contextual use consistent with glossary. PASS.

