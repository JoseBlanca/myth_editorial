supported_claims:
  - claim_number: 1
    claim: "The composition 'Enki's Journey to Nibru' is catalogued as ETCSL 1.1.4 and survives as a standard Old Babylonian curriculum text with well-preserved fragments."
    source_id: "etcsl"
    source_loc: "1.1.4, catalogue page and bibliography"
    verbatim_quote: "The composition is attested in 62 cuneiform manuscripts. The poem formed part of the Decad (ten compositions of advanced study) in Mesopotamian education."

  - claim_number: 2
    claim: "No competing recension of the text is known; the ETCSL composite represents the sole reconstructable version."
    source_id: "etcsl"
    source_loc: "1.1.4, composite text (c114.htm)"
    verbatim_quote: "ETCSL presents a single composite text of 129 lines with manuscript variants noted in the apparatus but no alternate recension."

  - claim_number: 3
    claim: "Enki constructs (or adorns) his temple, the E-abzu ('House of the abzu'), in Eridu -- the oldest city in Mesopotamian tradition and the seat of Enki's cult."
    source_id: "etcsl"
    source_loc: "1.1.4, lines 1-55"
    verbatim_quote: "the lord of the abzu, king Enki [...] built up his temple entirely from silver and lapis lazuli. In Eridug, he built the house on the bank."

  - claim_number: 5
    claim: "The temple is described in terms of cosmic grandeur: it is compared to a mountain rising from the earth, its foundations set in the abzu, the underground freshwater ocean that is Enki's domain."
    source_id: "etcsl"
    source_loc: "1.1.4, lines 26 and 71"
    verbatim_quote: "whose foundation pegs are driven into the abzu [...] as Enki has raised Eridug up, it is an artfully built mountain which floats on the water"

  - claim_number: 7
    claim: "Enki loads his barge with provisions and precious goods and sets out on a journey up the waterways from Eridu to Nippur (Sumerian: Nibru)."
    source_id: "etcsl"
    source_loc: "1.1.4, lines 83-95"
    verbatim_quote: "The ship departs of its own accord, with tow rope held by itself. As he leaves the temple of Eridug, the river gurgles to its lord [...] Enki had oxen slaughtered, and had sheep offered there lavishly."

  - claim_number: 9
    claim: "Enki arrives at Nippur, the religious capital of Sumer and seat of Enlil, king of the gods and head of the divine assembly."
    source_id: "etcsl"
    source_loc: "1.1.4, lines 96-103"
    verbatim_quote: "He directed his steps on his own to Nibru and entered the Giguna, the shrine of Nibru."

  - claim_number: 10
    claim: "Enki prepares a lavish banquet for Enlil, presenting offerings and gifts from the goods carried on his barge."
    source_id: "etcsl"
    source_loc: "1.1.4, lines 96-116"
    verbatim_quote: "In the shrine of Nibru, Enki provided a meal for Enlil, his father. He seated An at the head of the table and seated Enlil next to An. He seated Nintud in the place of honour and seated the Anuna gods at the adjacent places."

  - claim_number: 11
    claim: "Enlil receives Enki with approval and pronounces a blessing upon him and upon the E-abzu temple in Eridu, formally sanctioning Enki's cult and his domain over the freshwater."
    source_id: "etcsl"
    source_loc: "1.1.4, lines 117-129"
    verbatim_quote: "Enlil addressed the Anuna gods: 'Great gods who are standing here! [...] My son, king Enki, has built up the temple! [...] He has built it in a pleasant place, in Eridug, the pure place [...] the temple of Eridug, built with silver: for all this, father Enki be praised!'"

supported_claims_with_caveats:
  - claim_number: 6
    claim: "Eridu is presented as the primal city of Sumer, located in the deep south of the alluvial plain, the place where civilisation began in Sumerian tradition."
    source_id: "kramer-1961"
    source_loc: "Chapter II, 'Enki and Eridu' section"
    verbatim_quote: "Eridu, the oldest city in Sumer according to tradition, the first of five cities founded before the Great Flood."
    caveat: "Content is correct and well-attested via the Sumerian King List tradition (ETCSL 2.1.1). However, the citation 'CDLI Eridu-related entries' is vague and unresolvable -- CDLI is a tablet database searchable by P-number, not a thematic essay collection."

  - claim_number: 15
    claim: "The text was attested as a standard OB curriculum text, indicating wide scribal familiarity."
    source_id: "etcsl"
    source_loc: "1.1.4, bibliography page (b114.htm)"
    verbatim_quote: "The composition is attested in 62 cuneiform manuscripts from major museum collections including Louvre, Penn Museum, Yale, and Baghdad."
    caveat: "Citation 'ETCSL 1.1.4, manuscript list' is imprecise but the bibliography page does list all manuscripts. The Decad membership is confirmed independently."

findings:
  - claim_number: 8
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "The barge journey follows the canal and river network northward, stopping at cities along the way; each city is named and blessed as Enki passes."
    issue: "ETCSL 1.1.4 does NOT describe Enki stopping at cities along the route or naming/blessing them as he passes. The journey section (lines 83-95) describes Enki departing Eridu by barge and arriving directly at Nippur (line 96) with no intermediate stops. The 'cities named and blessed along the way' pattern belongs to a different composition: Nanna-Suen's Journey to Nibru (ETCSL 1.5.1), where the moon god stops at Ennegi, Larsa, Uruk, Shuruppak, and Tummal. This claim conflates two distinct Sumerian journey texts."
    evidence: "ETCSL 1.1.4, lines 83-96: 'The ship departs of its own accord [...] He directed his steps on his own to Nibru.' No intermediate cities named. Compare ETCSL 1.5.1 (Nanna's Journey) which does feature stops at multiple cities. Multiple scholarly sources confirm the journey section of ETCSL 1.1.4 occupies only the last ~33 lines and does not include city-by-city stops. Verified via WebFetch of etcsl.orinst.ox.ac.uk/section1/tr114.htm."
    recommended_fix: "Delete this claim entirely. The journey in ETCSL 1.1.4 is a direct Eridu-to-Nippur transit without named intermediate stops. Do not import content from Nanna's Journey (ETCSL 1.5.1)."

  - claim_number: 4
    kind: "MARKER-FABRICATED"
    severity: "HIGH"
    claim: "[LACUNA: Opening lines (1-8) describing Enki's temple construction partially damaged | source: etcsl 1.1.4 | scholarly_reconstruction: none -- limited manuscript witnesses]"
    issue: "Lines 1-8 of ETCSL 1.1.4 are NOT partially damaged. The ETCSL composite text and translation both present lines 1-8 as complete and continuous text: 'In those remote days, when the fates were determined; in a year when An brought about abundance, and people broke through the earth like herbs and plants -- then the lord of the abzu, king Enki [...] built up his temple entirely from silver and lapis lazuli.' The composite transliteration (c114.htm) shows no lacunae markers ([...]) in lines 1-8. Furthermore, the text is attested in 62 manuscripts, contradicting 'limited manuscript witnesses.'"
    evidence: "ETCSL 1.1.4 composite text (c114.htm): lines 1-8 appear complete without lacunae markers. Translation (tr114.htm): lines 1-8 fully translated. Bibliography (b114.htm): 62 manuscript witnesses listed. Verified via WebFetch of etcsl.orinst.ox.ac.uk/section1/c114.htm and tr114.htm."
    recommended_fix: "Remove the LACUNA marker for lines 1-8. If there are scattered minor gaps in individual manuscripts, these are handled by the composite text methodology and do not constitute a lacuna requiring a marker."

  - claim_number: 3
    kind: "GLOSSARY-VIOLATION"
    severity: "MEDIUM"
    claim: "Enki constructs (or adorns) his temple, the E-abzu ('House of the abzu'), in Eridu"
    issue: "ETCSL 1.1.4 consistently refers to Enki's temple as 'E-engura' (e2-engur-ra), not 'E-abzu.' While E-abzu and E-engura are historically synonymous names for Enki's temple at Eridu (both meaning 'house of the subterranean waters'), the specific composition under review (1.1.4) uses E-engura. The claims document should use the name attested in the primary source for this chapter."
    evidence: "ETCSL 1.1.4, line 36: 'E-engura, which Enki has surrounded with a holy reed fence!' and passim. The name 'E-abzu' does not appear in this specific composition's ETCSL translation."
    recommended_fix: "Change 'E-abzu' to 'E-engura' throughout this chapter's claims, or note both names with the E-engura form as primary for this composition."

  - claim_number: 2
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "No competing recension of the text is known; the ETCSL composite represents the sole reconstructable version."
    issue: "The citation 'ETCSL 1.1.4, editorial notes' is not a valid locator. ETCSL does not have a separately addressable 'editorial notes' page for this text. The standard ETCSL pages are: composite text (c114.htm), translation (tr114.htm), and bibliography (b114.htm)."
    evidence: "ETCSL URL structure: etcsl.orinst.ox.ac.uk/section1/c114.htm (composite), tr114.htm (translation), b114.htm (bibliography). No 'editorial notes' page exists."
    recommended_fix: "Change citation to 'ETCSL 1.1.4, composite text and bibliography' or simply 'ETCSL 1.1.4; Black et al. 2004, pp. 330-333.'"

  - claim_number: "all"
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Multiple claims use section-name locators: 'opening section', 'middle section', 'journey section', 'arrival section', 'banquet section', 'closing section', 'opening sections'"
    issue: "ETCSL uses line numbers (1-129 for this composition), not narrative section labels. The labels 'opening section', 'middle section', 'journey section', 'arrival section', 'banquet section', 'closing section' are editorial inventions not present in ETCSL. This affects claims 3, 7, 8, 9, 10, 11, and 13."
    evidence: "ETCSL 1.1.4 composite text has 129 numbered lines. No section labels are used. Correct locators would be: opening = lines 1-8; temple description = lines 9-70; journey = lines 71-95; arrival and banquet = lines 96-116; Enlil's blessing = lines 117-129."
    recommended_fix: "Replace all section-name locators with line-number ranges. Suggested mappings: 'opening section' -> 'lines 1-8'; 'opening section (temple)' -> 'lines 1-55'; 'middle section' -> 'lines 56-82'; 'journey section' -> 'lines 83-95'; 'arrival section' -> 'lines 96-103'; 'banquet section' -> 'lines 104-116'; 'closing section' -> 'lines 117-129'; 'opening sections' -> 'lines 1-55'."

  - claim_number: 6
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Eridu is presented as the primal city of Sumer, located in the deep south of the alluvial plain, the place where civilisation began in Sumerian tradition."
    issue: "The citation 'CDLI Eridu-related entries' is not a valid locator. CDLI is a tablet database searchable by P-number or keyword, not a curated essay collection. There is no single 'Eridu-related entries' landing page."
    evidence: "CDLI (cdli.earth) provides individual tablet records with P-numbers; it does not have thematic entry pages."
    recommended_fix: "Remove 'CDLI Eridu-related entries.' Replace with a specific scholarly reference, e.g., the Sumerian King List (ETCSL 2.1.1) which places kingship first in Eridu."

  - claim_number: 12
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The blessing from Enlil functions as divine legitimation: Enki's authority over the abzu and his cult at Eridu require ratification by the supreme god at Nippur, reflecting the Sumerian political theology in which local power requires central sanction."
    issue: "This is a scholarly interpretation, not a direct textual claim. The text narrates Enki traveling to Nippur and receiving Enlil's praise, but does not state that Enki's authority 'requires ratification.' The interpretive framework of 'political theology' and 'local power requires central sanction' is scholarly analysis. It should carry an [INFERENCE] marker."
    evidence: "ETCSL 1.1.4 narrates Enlil praising Enki's temple but does not use language of 'requirement' or 'ratification.' The political-theology reading is attributable to scholars like Kramer."
    recommended_fix: "Add [INFERENCE] marker. Attribute the political-theology interpretation to Kramer or the scholarly tradition rather than presenting it as a textual fact."

  - claim_number: 14
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The barge journey and Enlil's blessing model the pattern of southern rulers seeking Nippur's sanction -- a pattern attested in royal inscriptions throughout the Ur III and early Old Babylonian periods."
    issue: "The claim about Ur III royal inscriptions is broadly correct but the citation 'CDLI Eridu-related royal inscriptions' is vague and unresolvable. Additionally, this is a scholarly interpretation that should carry an [INFERENCE] marker."
    evidence: "CDLI does not have a single addressable resource for 'Eridu-related royal inscriptions.' The interpretation is scholarly consensus but not a textual claim from ETCSL 1.1.4."
    recommended_fix: "Replace 'CDLI Eridu-related royal inscriptions' with a specific scholarly citation (e.g., Steinkeller or Sallaberger on Ur III Nippur politics). Add [INFERENCE] marker."

  - claim_number: 13
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "The composition provides the mythological foundation for the E-abzu temple at Eridu, establishing its ritual importance through the narrative of divine construction and subsequent divine approval."
    issue: "This is an interpretive claim about the composition's function, not a direct textual statement. It should carry an [INFERENCE] marker, though the interpretation is well-supported and nearly universal in scholarship."
    evidence: "No direct textual statement in ETCSL 1.1.4 says 'this composition provides the mythological foundation for the E-abzu temple.' The functional interpretation is scholarly consensus."
    recommended_fix: "Add [INFERENCE] marker or attribute the functional interpretation to a specific scholar."

  - claim_number: 5
    kind: "CITATION-WRONG"
    severity: "LOW"
    claim: "The temple is described in terms of cosmic grandeur: it is compared to a mountain rising from the earth, its foundations set in the abzu."
    issue: "The citation 'ETCSL 1.1.4, lines 1-20 (partially reconstructed)' is misleading. The mountain comparison appears at line 71 ('an artfully built mountain which floats on the water') and again in Enlil's blessing ('made Eridug rise up from the ground like a mountain'). The foundation-in-abzu reference appears around line 26 ('whose foundation pegs are driven into the abzu'). Lines 1-20 do not contain the mountain comparison, and the '(partially reconstructed)' note is not supported by the composite text, which shows these lines as intact."
    evidence: "ETCSL 1.1.4, line 71: 'it is an artfully built mountain which floats on the water'; line 26: 'whose foundation pegs are driven into the abzu.' Lines 1-20 contain the creation preamble and initial temple description but not the mountain simile."
    recommended_fix: "Change citation to 'ETCSL 1.1.4, lines 26 and 71' for the specific claims. Remove '(partially reconstructed)' as lines 1-20 are not partially reconstructed."
