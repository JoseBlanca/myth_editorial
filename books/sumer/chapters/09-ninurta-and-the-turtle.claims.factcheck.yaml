supported_claims:
  - claim_number: 1
    claim: "The composition 'Ninurta and the Turtle' is catalogued as ETCSL 1.6.3 and survives only in fragmentary form; the text is heavily damaged and no complete witness exists."
    source_id: "etcsl"
    source_loc: "1.6.3, composite text"
    verbatim_quote: "Segment A: (8 lines fragmentary) ... (unknown no. of lines missing) ... Segment B lines 1-60 ... (unknown no. of lines missing)"
    triangulation: "Confirmed via ETCSL composite text (c163.htm). Text has two segments with 'unknown no. of lines missing' gaps before Segment A, between segments, and after Segment B line 60. CDLI Q000352 confirms the composition at https://cdli.earth/artifacts/composites-score/Q000352."

  - claim_number: 2
    claim: "Few copies survive and the text's limited attestation indicates it circulated less widely than Lugal-e (ETCSL 1.6.2) or Angim (ETCSL 1.6.1) within the scribal curriculum."
    source_id: "etcsl"
    source_loc: "1.6.3, critical edition source list"
    verbatim_quote: "Cuneiform sources: CBS 8319, CBS 15007, CBS 15085, CBS 8319 (+) CBS 15007 (+) CBS 15085, N 7337, Ni 4003 (SLTN 41), Ni 4089 (ISET 1 71), UET 6 2, UET 6 3 *484, UET 6 3 *20"
    triangulation: "ETCSL critical edition (accessed via cgi-bin/etcsl.cgi?text=c.1.6.3&display=Crit) lists 10 source entries, but three CBS tablets form a single join, yielding approximately 7 distinct manuscripts. Lugal-e (1.6.2) has substantially more witnesses. Claim is supported."

  - claim_number: 4
    claim: "Black et al. describe the composition briefly as a text in which Ninurta's heroic deed is undercut by Enki's cunning, situating it as a comic or satirical counterpoint to the martial Ninurta cycle."
    source_id: "black-2004"
    source_loc: "pp. 199-201 (page range unverified — see finding)"
    verbatim_quote: "Training-data recall: Black et al. describe the text as a comic counterpoint in which Ninurta's recovery of the Tablet of Destinies is undercut by Enki's trickery. Exact wording could not be live-verified."
    triangulation: "The characterization of the text as comic/satirical counterpoint to the heroic Ninurta narratives is consistent with the ETCSL text itself and with multiple scholarly sources accessed via web search. Page range pp. 199-201 could not be confirmed and may be incorrect (see CITATION-WRONG finding)."

  - claim_number: 8
    claim: "After recovering the Tablet of Destinies, Ninurta apparently seeks to keep its power for himself rather than returning it to the proper divine authority."
    source_id: "etcsl"
    source_loc: "1.6.3, Segment B lines 25-30"
    verbatim_quote: "The hero secretly was not happy with these promises. Where he stood, he darkened and yellowed ... He uttered a word which has no ... inwardly did not ... He set his sights on the whole world."
    triangulation: "Confirmed via ETCSL translation (tr163.htm). Lines B25-30 clearly describe Ninurta's secret dissatisfaction and ambition after receiving Enki's honors. The vague 'mid-section' citation in the claims document should be specified as lines B25-30."

  - claim_number: 10
    claim: "Enki, god of wisdom and cunning and lord of the abzu, perceives that Ninurta's possession of the Tablet of Destinies threatens the cosmic balance and devises a stratagem to humble the warrior."
    source_id: "etcsl"
    source_loc: "1.6.3, Segment B lines 31-35"
    verbatim_quote: "The great lord Enki intuitively grasped the substance of the plan. In the shrine, in the abzu he stirred up a dark flood-storm."
    triangulation: "Confirmed via ETCSL translation. Lines B31-35 describe Enki's perception and response. Note: the text does not explicitly mention 'cosmic balance' — Enki perceives Ninurta's plan and acts, but the cosmic-balance framing is interpretive."

  - claim_number: 11
    claim: "Enki creates a turtle — a creature fashioned by divine craft — and sets it as a trap for Ninurta."
    source_id: "etcsl"
    source_loc: "1.6.3, Segment B lines 36-46"
    verbatim_quote: "Against Ninurta, Enki fashioned a turtle from the clay of the abzu. Against him he stationed the turtle at an opening, at the gate of the abzu."
    triangulation: "Confirmed via ETCSL translation. The turtle creation and placement as a trap are directly attested in lines B36-46."

  - claim_number: 14
    claim: "Ninurta, the mighty warrior who defeated Anzud and (in Lugal-e) slew the demon Asag, is now trapped in a pit by a turtle — a deliberately comic reversal of his martial prowess."
    source_id: "etcsl"
    source_loc: "1.6.3, Segment B lines 36-46"
    verbatim_quote: "The hero Ninurta fell into it with the turtle. The hero did not know how to get out from ...... The turtle kept on gnawing his feet with its claws (?)."
    triangulation: "Confirmed via ETCSL translation. The comic reversal is directly attested. The cross-reference to Lugal-e (Asag) is from ETCSL 1.6.2, correctly flagged with '(in Lugal-e)' in the claim."

  - claim_number: 18
    claim: "The composition functions as a comic or satirical counterpoint to the heroic Ninurta narratives (Lugal-e and Angim), deliberately deflating martial pride through trickster cleverness."
    source_id: "black-2004"
    source_loc: "pp. 199-201 (page range unverified — see finding)"
    verbatim_quote: "Training-data recall: Black et al. describe the text as 'a comic counterpoint' to the heroic Ninurta narratives. Exact wording not live-verified."
    triangulation: "The comic/satirical characterization is universally accepted in scholarship. ETCSL text itself supports this reading through the juxtaposition of Ninurta's warrior status with his helplessness in the pit. Multiple secondary sources accessed via web search confirm this framing."

findings:
  - claim_number: 5
    kind: "CONTAMINATION"
    severity: "HIGH"
    claim: "The narrative presupposes that Anzud, the divine lion-headed eagle, has stolen the Tablet of Destinies — the artifact conferring supreme cosmic authority on its possessor — from Enlil."
    issue: "The Sumerian text (ETCSL 1.6.3) does not say the Tablet of Destinies was stolen from Enlil. In lines B1-4, the Anzu chick says the tablet and me 'returned to the abzu' — Enki's domain. In this Sumerian composition, the Tablet of Destinies belongs to Enki/the abzu, not to Enlil. The attribution to Enlil comes from the Akkadian Anzu myth, which is explicitly out of scope per scope.md. Enlil is mentioned once in the text (B15-24: 'May your father Enlil do whatever you command') but only as Ninurta's father, not as the tablet's owner. The claim imports a key narrative detail from the excluded Akkadian tradition."
    evidence: "ETCSL 1.6.3, lines B1-4: 'As I let the me go out of my hand, these me returned to the abzu ... This tablet of destinies returned to the abzu.' The abzu is Enki's domain. Multiple scholarly sources confirm that in this Sumerian version, unlike the Akkadian Anzu myth, the tablet belongs to Enki. See also EBSCO Research Starters: 'Imdugud (also called Anzu), a lion-headed bird, stole the Tablet of Destinies from Enki, the water god.'"
    recommended_fix: "Change 'from Enlil' to 'from Enki' or 'from the abzu.' The theft-from-Enlil version is the Akkadian Anzu tradition and must not be imported into the Sumerian text. Add a note that this differs from the better-known Akkadian version where Enlil is the victim of the theft."

  - claim_number: 6
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Ninurta, the warrior god, defeats Anzud and recovers the stolen Tablet of Destinies — an act of heroic service to the divine order."
    issue: "The claim cites 'ETCSL 1.6.3 (narrative premise recoverable from surviving lines)' and Kramer 1961 pp. 82-83. The surviving Sumerian text presupposes these events but does not narrate the combat itself (the opening is heavily damaged). The parenthetical qualification 'narrative premise recoverable from surviving lines' is honest but the claim then states the defeat and recovery as established fact. Kramer 1961 at pp. 82-83 synthesizes Sumerian and Akkadian traditions, making it an unreliable sole witness for the Sumerian narrative. The phrase 'heroic service to the divine order' is interpretive and uncited."
    evidence: "ETCSL 1.6.3 Segment A is '(8 lines fragmentary)' followed by 'unknown no. of lines missing.' The claims document's own LACUNA marker for lines 1-15 states the context for the theft and recovery is 'largely lost.' The text begins in medias res with the aftermath (the Anzu chick's words about the tablet returning to the abzu). Kramer's discussion at these pages draws on Akkadian material."
    recommended_fix: "Reframe as: 'The narrative presupposes that Ninurta has already defeated Anzud and recovered the Tablet of Destinies, though the combat itself is not narrated in the surviving Sumerian text.' Add [INFERENCE:] marker for 'heroic service to the divine order.' Reduce reliance on Kramer 1961 as sole secondary support, or note that his account incorporates Akkadian parallels."

  - claim_number: 13
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The turtle seizes Ninurta — by the feet or legs, according to the surviving text — and drags him into a pit that Enki has dug."
    issue: "Three factual inaccuracies in one claim. (1) The ETCSL text says the turtle grabbed Ninurta's 'tendon from behind,' not 'feet or legs.' The feet are mentioned only later: 'The turtle kept on gnawing his feet with its claws (?).' (2) The text says Ninurta 'fell into' the pit, not that the turtle 'dragged' him in: 'The hero Ninurta fell into it with the turtle.' (3) The pit was not dug by Enki directly; the text says Enki commanded the turtle to dig it: 'He had the turtle scrape the ground with its claws, had it dig an evil pit.' The claim misattributes the body part, the mechanism, and the agency of the pit-digging."
    evidence: "ETCSL 1.6.3, lines B36-46: 'The turtle was able to grab Ninurta's tendon from behind' ... 'He had the turtle scrape the ground with its claws, had it dig an evil pit' ... 'The hero Ninurta fell into it with the turtle' ... 'The turtle kept on gnawing his feet with its claws (?)'"
    recommended_fix: "Revise to: 'The turtle seizes Ninurta by the tendon from behind, according to the surviving text. Enki has the turtle scrape and dig a pit with its claws, and Ninurta falls into it together with the turtle, which continues gnawing at his feet.' This corrects body part, mechanism, and agency."

  - claim_number: 4
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Black et al. describe the composition briefly as a text in which Ninurta's heroic deed is undercut by Enki's cunning, situating it as a comic or satirical counterpoint to the martial Ninurta cycle."
    issue: "The page citation pp. 199-201 for Black et al. 2004 is likely incorrect. Based on Google Books table of contents data, the Ninurta warrior section (Section E) runs from approximately pp. 155-187, and Section F (Love and Sex) begins at p. 188. Pages 199-201 would fall in the Love and Sex section, not the Ninurta section. The substantive claim about the text's characterization is correct, but the page reference appears to point to the wrong part of the book. This same incorrect page range is repeated in claims 14, 15, 18, 19, and 20."
    evidence: "Google Books preview of Black et al. 2004 shows table of contents: Section E (Warrior Gods Nergal, Numushda, and Ninurta) contains Ninurta's exploits at p. 163 and Ninurta's return to Nibru at p. 181. Section F (Love and Sex) begins at p. 188. Pages 199-201 fall within Section F. The ETCSL bibliography for 1.6.3 does not cite Black et al. 2004, listing instead Alster 1972, Bottero/Kramer 1989, and Kramer 1984."
    recommended_fix: "Verify the correct page range for 'Ninurta and the Turtle' in Black et al. 2004 against the physical volume. It likely falls in the range pp. 175-185 within Section E. If the text is not included in Black et al. 2004, the citation must be changed to another source (e.g., Kramer/Maier 1989 pp. 84-86, or Alster 1972 pp. 120-125). Update all claims citing pp. 199-201."

  - claim_number: 15
    kind: "SILENT-BRIDGE"
    severity: "MEDIUM"
    claim: "Trapped in the pit, Ninurta is unable to free himself; the warrior god who conquered the kur is now helpless in a hole dug by the trickster god."
    issue: "Two problems. (1) 'The warrior god who conquered the kur' imports content from ETCSL 1.6.2 (Lugal-e) without marking it as a cross-reference or citation. The kur-conquest is not mentioned anywhere in ETCSL 1.6.3. This is a SILENT-BRIDGE — uncited material from another composition smuggled in without a marker. (2) 'A hole dug by the trickster god' repeats the incorrect agency from claim 13: the ETCSL text says Enki 'had the turtle' dig the pit, not that Enki dug it himself."
    evidence: "ETCSL 1.6.3 does not mention the kur or Ninurta's conquest of it. The kur-conquest is from ETCSL 1.6.2 (Lugal-e). ETCSL 1.6.3 B36-46: 'He had the turtle scrape the ground with its claws, had it dig an evil pit.'"
    recommended_fix: "Revise to: 'Trapped in the pit, Ninurta is unable to free himself — the warrior celebrated in Lugal-e (ETCSL 1.6.2) for conquering the kur is now helpless in a trap devised by the trickster god.' This makes the cross-reference explicit and corrects the digging agency."

  - claim_number: 17
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "[RECONSTRUCTION: Enki likely addresses Ninurta in the pit with a speech rebuking his arrogance]"
    issue: "The ETCSL text actually preserves portions of Enki's speech to Ninurta in the pit (lines B47-54). Enki says: 'From ...... you who set your mind to kill me ... I cut down, I raise up ... Where has your strength fled? Where is your heroism?' Marking attested (though fragmentary) content as RECONSTRUCTION overstates the gap. Additionally, the fill_source references 'narrative pattern consistent with other Enki-as-trickster episodes' rather than a specific Sumerian composition, which does not meet scope.md's standard for reconstruction fills (must be from parallel recensions or in-tradition compositions)."
    evidence: "ETCSL 1.6.3, lines B47-54 contain fragments of Enki's speech. The text is partially preserved, not entirely lost. The RECONSTRUCTION marker implies the speech is entirely conjectural, which contradicts the evidence."
    recommended_fix: "Change to [LACUNA:] for the missing portions of Enki's speech and present the preserved fragments (B47-54) as attested text with appropriate lacuna markers for gaps within the speech. If inferring content beyond what is preserved, use [INFERENCE:] rather than [RECONSTRUCTION:]."

  - claim_number: 19
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The text is didactic in function: it punishes hubris by demonstrating that Ninurta's arrogance after recovering the Tablet of Destinies is checked by Enki's superior cunning — wisdom defeats brute force."
    issue: "The characterization as 'didactic' and the 'wisdom defeats brute force' framing are scholarly interpretations, not statements directly attested in the Sumerian text. The text itself narrates the events without explicitly drawing a moral. The claim presents this interpretive conclusion without an [INFERENCE:] marker."
    evidence: "ETCSL 1.6.3 does not contain an explicit didactic statement or moral conclusion. The ending is lost ('unknown no. of lines missing' after B60). The 'wisdom defeats brute force' framing is a modern scholarly reading."
    recommended_fix: "Add [INFERENCE:] marker: '[INFERENCE: The text appears didactic in function, punishing hubris by demonstrating that warrior arrogance is checked by superior cunning | basis: scholarly consensus (Black et al. 2004); the surviving narrative structure supports this reading | risk: the text's conclusion is lost, so the intended moral cannot be confirmed from the Sumerian alone]'"

  - claim_number: 20
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "Together with Lugal-e and Angim, this composition forms a Ninurta triptych: cosmic battle, triumphant return, and comic deflation — a range of registers that suggests the Sumerian scribes were capable of treating heroism with both exaltation and mockery."
    issue: "The 'Ninurta triptych' characterization and the three-part schema (cosmic battle, triumphant return, comic deflation) are modern scholarly framings, not ancient categorizations. The conclusion about scribal attitudes toward heroism is interpretive. Neither the term 'triptych' nor the conclusion about scribal intent is cited to a specific source. Requires [INFERENCE:] marker."
    evidence: "Black et al. 2004 groups the Ninurta compositions together and contrasts their tones, but the term 'triptych' and the editorial conclusion about scribal attitudes are the claims author's own framing, not directly quoted from any cited source."
    recommended_fix: "Add [INFERENCE:] marker to the editorial conclusion. Clarify whether the 'triptych' concept originates from Black et al. or is the author's own synthesis. If the latter, mark as inference with basis in Black et al.'s grouping of the texts."

  - claim_number: 9
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE: Ninurta's attempt to retain the Tablet of Destinies constitutes the hubristic act that the narrative punishes]"
    issue: "The INFERENCE marker's basis statement says 'The surviving text and scholarly summaries consistently describe Ninurta's ambition as the trigger for Enki's countermeasure.' If the surviving text consistently describes this (and it does — lines B25-30 and B31-35 directly attest Ninurta's ambition and Enki's response), then the core claim is closer to SUPPORTED than inference. The marker and its basis are contradictory."
    evidence: "ETCSL 1.6.3, B25-30: 'The hero secretly was not happy with these promises ... He set his sights on the whole world.' B31-32: 'The great lord Enki intuitively grasped the substance of the plan.' The text directly attests both Ninurta's ambition and Enki's response."
    recommended_fix: "Either (a) remove the [INFERENCE:] marker and present the claim as supported with citation to ETCSL 1.6.3 B25-35 and Black et al. 2004, or (b) downgrade the basis statement to acknowledge that only the 'hubris-punishment' framing (not the ambition itself) is interpretive."
