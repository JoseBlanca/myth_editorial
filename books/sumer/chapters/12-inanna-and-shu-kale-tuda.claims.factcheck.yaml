findings:
  - claim_number: 5
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Shu-kale-tuda looks to the stars for guidance and plants a tree (possibly a poplar or sarbatu-tree) that provides shade and finally allows his garden to flourish."
    issue: "The tree identification as 'sarbatu-tree' is problematic. The term 'sarbatu' is Akkadian, not Sumerian, and does not appear in the ETCSL Sumerian transliteration or translation. The ETCSL text refers to a specific tree but its identification varies in scholarship. Black et al. 2004 may offer a tentative identification, but using an Akkadian botanical term in a Sumerian-only scope context requires verification. The 'poplar' identification is also conjectural. The claim that Shu-kale-tuda looks to the stars for guidance is attested — the text does describe him observing celestial phenomena and learning from the stars — but the tree species designation is unverified."
    evidence: "ETCSL 1.3.3 describes Shu-kale-tuda looking to the heavens and planting a tree that provides shade, but the tree species is given in Sumerian without a secure modern botanical identification. The Akkadian term 'sarbatu' does not appear in ETCSL. Black et al. 2004 p. 79 may use a conjectural English identification."
    recommended_fix: "Replace 'possibly a poplar or sarbatu-tree' with 'a tree whose species is uncertain in modern botanical terms' or use whatever English gloss Black et al. actually provide, without the Akkadian term. If 'sarbatu' is used, add a note that this is an Akkadian botanical term used as a scholarly gloss."

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The first plague affects the wells or water supply of the land: water is turned to blood or becomes otherwise polluted."
    issue: "The phrasing 'water is turned to blood' is not precisely what the ETCSL text says. The ETCSL translation reads more closely as Inanna 'filling the wells of the land with blood' rather than water being 'turned to blood.' The 'turned to blood' phrasing echoes the biblical first plague of Egypt (Exodus 7:20) rather than the Sumerian text's own formulation. The underlying factual claim — that the first plague involves blood contaminating the water supply — is supported, but the specific wording used in the claims document does not accurately represent the ETCSL source. Additionally, the cautious qualifier '(cautious partial translation)' after Black et al. 2004 pp. 80–81 is appropriate given the fragmentary state of this passage."
    evidence: "ETCSL 1.3.3 reads approximately 'she filled all the wells of the Land with blood' rather than 'water is turned to blood.' The distinction is between Inanna actively filling wells with blood (divine affliction) versus water passively transforming into blood (which echoes biblical language more closely)."
    recommended_fix: "Revise to: 'The first plague affects the wells or water supply of the land: Inanna fills the wells with blood.' Remove 'turned to blood' phrasing to avoid unnecessary biblical echo and to match the ETCSL source text more accurately."

  - claim_number: 20
    kind: "SILENT-BRIDGE"
    severity: "HIGH"
    claim: "Shu-kale-tuda goes to the god Enki and seeks his counsel on how to escape Inanna's wrath."
    issue: "This claim states as fact that Shu-kale-tuda goes to 'the god Enki,' but claim 14 earlier in the same document hedges with 'his father (or from Enki, god of wisdom).' The ETCSL text describes Shu-kale-tuda going to 'his father' for advice. Whether this father figure is to be identified with Enki is a scholarly interpretation, not a textual certainty. Some scholars do identify the father with Enki, but the text itself does not explicitly name Enki in the advice-giving passages in all readings. The shift from the hedged claim 14 to the definitive claim 20 constitutes a silent bridge — an uncited factual escalation from possibility to certainty without a marker or additional evidence."
    evidence: "ETCSL 1.3.3 uses the term 'his father' (ab-ba-ni) in the advice passages. Claim 14 correctly hedges '(or from Enki).' Claim 20 drops the hedge entirely and states Enki as certain. The ETCSL composite does mention Enki in later passages where Inanna goes to Enki, but the identification of the father-advisor with Enki is not explicitly stated in the text at the point described by claim 20."
    recommended_fix: "Revise claim 20 to: 'Shu-kale-tuda goes to his father (possibly identified with the god Enki) and seeks counsel on how to escape Inanna's wrath.' Add a [VARIANT:] marker noting the scholarly identification of the father with Enki. Alternatively, if the text does name Enki explicitly at this point in some manuscripts, cite the specific manuscript."

  - claim_number: 2
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The text is classified as single-prevalent-reconstructed: the ETCSL composite is the only standard reconstruction, but significant gaps remain in the plague description sections across all witnesses."
    issue: "The classification 'single-prevalent-reconstructed' matches the brief's own classification and is consistent with the editorial situation described in ETCSL. However, the specific claim that gaps remain 'across all witnesses' could not be verified against the ETCSL manuscript list without web access. The claim is plausible and consistent with the brief but relies on a characterization of the manuscript tradition that could not be independently confirmed."
    evidence: "The brief classifies this text as single-prevalent-reconstructed. ETCSL's presentation of 1.3.3 with extensive lacuna markers is consistent with this classification. No contradictory evidence found."
    recommended_fix: "Retain as-is. Verify against ETCSL manuscript list when web access is available."

  - claim_number: 16
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "[LACUNA] The nature of the second plague is largely lost in the broken text."
    issue: "While it is true that the plague sections are fragmentary in ETCSL 1.3.3, stating that the second plague's nature is 'largely lost' could not be precisely verified without accessing the current state of the ETCSL composite text. Some fragmentary readings may preserve more or less than 'largely lost' implies. The LACUNA marker is appropriately used."
    evidence: "ETCSL 1.3.3 does mark the plague sections as fragmentary. The extent of loss for specifically the second plague versus the first and third could not be calibrated without live text access."
    recommended_fix: "Retain the LACUNA marker. Consider qualifying as 'substantially damaged' rather than 'largely lost' if the ETCSL text preserves partial readings."

  - claim_number: 25
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE] The paradox of the ending — the criminal is condemned but his name is eternally preserved — functions as a literary reflection on the nature of narrative itself."
    issue: "The INFERENCE marker is appropriate for the interpretive claim about 'literary reflection on the nature of narrative itself.' However, the first part — that the text states Shu-kale-tuda's name will not be forgotten — is directly attested in the text and does not need an INFERENCE marker. The marker should apply only to the interpretive gloss, not to the textual fact. As written, the marker scope is slightly too broad but the direction is correct. The risk note ('Some scholars may read this as a standard scribal colophon formula rather than deliberate literary irony') is a fair and useful caveat."
    evidence: "ETCSL 1.3.3 final lines do state that Shu-kale-tuda's name will not be forgotten. The interpretation of this as 'literary reflection on the nature of narrative' is scholarly commentary. The marker is directionally correct but could be more precisely scoped."
    recommended_fix: "No substantive change needed. Consider splitting into two sentences: one stating the textual fact (Shu-kale-tuda's name will not be forgotten, SUPPORTED) and a separate INFERENCE sentence for the literary interpretation."
