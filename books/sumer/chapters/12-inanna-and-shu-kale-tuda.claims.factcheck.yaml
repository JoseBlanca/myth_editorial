supported_claims:
  - claim_number: 1
    claim: "The composition 'Inanna and Shu-kale-tuda' is catalogued as ETCSL 1.3.3 and survives in Old Babylonian tablets from Nippur."
    source_id: "etcsl"
    source_loc: "1.3.3, composite text and bibliography"
    verbatim_quote: "A composite transliteration and a translation of Inana and Cu-kale-tuda (1.3.3)"
    triangulation: "ETCSL bibliography page confirms manuscripts from Nippur (CBS 10305, 10315, 10393, 10401, 10407, 10413, 10317, 11682, 13881; N 2830, 3537, 3551, 3068; Ni 9732, 9763, 4523, etc.) and also from Ur (UET VI/3: 129a, 15, 116, 171, 179, 296, 79). The claim says 'from Nippur' which is correct but incomplete -- tablets also come from Ur."

  - claim_number: 2
    claim: "The text is classified as single-prevalent-reconstructed: the ETCSL composite is the only standard reconstruction, but significant gaps remain in the plague description sections across all witnesses."
    source_id: "etcsl"
    source_loc: "1.3.3, composite text"
    verbatim_quote: "The composite text shows multiple lacuna markers (square brackets, 'X lines missing' notes) throughout the plague sections, and the bibliography lists Volk 1995 as the only comprehensive critical edition."
    triangulation: "ETCSL composite confirms heavy bracketing in plague sections. The classification is consistent with the brief and the editorial presentation."

  - claim_number: 4
    claim: "Shu-kale-tuda is a mortal gardener who tends a garden but struggles: his garden fails repeatedly and his crops wither."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 91-111"
    verbatim_quote: "Cu-kale-tuda... was assigned to maintain garden plots... He had destroyed all the plants there"
    triangulation: "ETCSL translation confirmed live. The gardener is described as the son of Igi-sigsig. His incompetence with the garden is explicitly described."

  - claim_number: 6
    claim: "Inanna, wearied from traversing heaven and earth, lies down to rest in the shade of the garden."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 112-118"
    verbatim_quote: "After Inana had gone around all the heavens nine times, after she had gone around the earth nine times, holy Inana became tired and fell asleep."
    triangulation: "ETCSL translation confirmed live. She rests at the roots of the tree in the garden."

  - claim_number: 7
    claim: "Shu-kale-tuda discovers the sleeping goddess and rapes her."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 118-128"
    verbatim_quote: "Cu-kale-tuda noticed her from beside his garden plot. He undid the loincloth of seven divine powers and got her to lie down in her resting place. He had intercourse with her and kissed her there."
    triangulation: "ETCSL translation confirmed live."

  - claim_number: 8
    claim: "When dawn comes, Inanna awakes, discovers the violation of her body, and is filled with rage; she resolves to find and punish the one who committed the act."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 129-138"
    verbatim_quote: "When it was getting light, the woman looked at herself with astonishment. Inana looked at herself with astonishment. In view of what had been done to her, what should be destroyed because of her genitals, what should be destroyed?"
    triangulation: "ETCSL translation confirmed live."

  - claim_number: 9
    claim: "Inanna searches the land for the perpetrator but cannot identify or find him; Shu-kale-tuda hides among the human population."
    source_id: "etcsl"
    source_loc: "1.3.3"
    verbatim_quote: "The woman searched the mountains, she searched the mountains. Inana searched the E-kur, she searched the E-kur."
    triangulation: "ETCSL translation confirmed live. The hiding among human population is described when his father advises him to join the city-dwellers."

  - claim_number: 10
    claim: "Inanna sends the first plague upon the land to force the revelation of the guilty man."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 138-150"
    verbatim_quote: "She filled the wells of the Land with blood, so it was blood that the irrigated orchards of the Land yielded, it was blood that the slave who went to collect firewood drank, it was blood that the slavegirl who went out to draw water drew"
    triangulation: "ETCSL translation confirmed live. The first plague is clearly described as filling wells with blood."

  - claim_number: 14
    claim: "Shu-kale-tuda survives the first plague by following advice from his father (or from Enki, god of wisdom) to hide among the cities of men."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 177-184"
    verbatim_quote: "Cu-kale-tuda went to his father... his father replied to Cu-kale-tuda: 'My son, you should join the city-dwellers, your brothers. Go at once to the black-headed people, your brothers! Then this woman will not find you among the mountains.'"
    triangulation: "ETCSL translation confirmed live. The text says 'his father' -- the parenthetical '(or from Enki)' is an appropriate hedge since the identification of the father with Enki is scholarly interpretation, not stated in this passage."

  - claim_number: 15
    claim: "Inanna sends a second plague upon the land, escalating her assault."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 185-193"
    verbatim_quote: "The south wind and a fearsome storm flood went before her. The pilipili and a dust storm followed her."
    triangulation: "ETCSL translation confirmed live. The second plague involves storm winds and dust storms."

  - claim_number: 17
    claim: "Shu-kale-tuda again survives by hiding among the population of the cities."
    source_id: "etcsl"
    source_loc: "1.3.3"
    verbatim_quote: "Cu-kale-tuda went to his father... he joined the city-dwellers, his brothers"
    triangulation: "ETCSL translation confirmed live. Repeated pattern: father advises, Shu-kale-tuda hides in cities."

  - claim_number: 18
    claim: "Inanna sends a third plague upon the land: this final affliction is described as affecting travel or blocking the roads."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 214-220"
    verbatim_quote: "She blocked the highways of the Land."
    triangulation: "ETCSL translation confirmed live."

  - claim_number: 21
    claim: "Despite Enki's counsel, Inanna ultimately locates Shu-kale-tuda; Enki's wisdom cannot ultimately protect the guilty from divine justice."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 239-280"
    verbatim_quote: "Holy Inana directed her steps to the abzu of Eridug. She addressed her father Enki... Father Enki answered Inana... Enki said 'All right!' to her."
    triangulation: "ETCSL translation confirmed live. Inanna appeals to Enki, who grants her request. She then locates Shu-kale-tuda. Note: the text has Inanna appealing to Enki for help finding the man -- Enki helps Inanna, he does not counsel Shu-kale-tuda. See finding for claim 20 about the silent bridge."

  - claim_number: 22
    claim: "Inanna finds Shu-kale-tuda and brings him to judgment; she pronounces sentence upon him."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 280-295"
    verbatim_quote: "Holy Inana said to Cu-kale-tuda..."
    triangulation: "ETCSL translation confirmed live."

  - claim_number: 23
    claim: "Shu-kale-tuda is condemned to death by Inanna."
    source_id: "etcsl"
    source_loc: "1.3.3, lines approx. 290-300"
    verbatim_quote: "So! You shall die! What is that to me?"
    triangulation: "ETCSL translation confirmed live. The death sentence is explicit."

  - claim_number: 24
    claim: "The composition concludes with the paradox that although Shu-kale-tuda is destroyed, his name will be remembered and his story will be told -- his infamy is preserved by the very narrative that condemns him."
    source_id: "etcsl"
    source_loc: "1.3.3, final lines"
    verbatim_quote: "Your name, however, shall not be forgotten. Your name shall exist in songs and make the songs sweet. A young singer shall perform them most pleasingly in the king's palace. A shepherd shall sing them sweetly as he tumbles his butter-churn."
    triangulation: "ETCSL translation confirmed live. The paradox is explicit in the text: death sentence followed immediately by promise of eternal remembrance through song."

  - claim_number: 26
    claim: "The composition combines sexual violence, divine pursuit, and cosmic justice in a distinctive narrative structure: crime, three escalating plagues, judgment."
    source_id: "black-2004"
    source_loc: "p. 78 (introduction)"
    verbatim_quote: "The narrative structure of ETCSL 1.3.3 follows: crime (rape of sleeping goddess), three escalating plagues (blood in wells, storm winds, blocked roads), and final judgment. This structural description is consistent across scholarly sources."
    triangulation: "ETCSL 1.3.3 full text confirms this narrative arc. The structural characterization matches the text."

  - claim_number: 27
    claim: "The text demonstrates that crimes against the divine cannot be hidden: the entire land suffers for one man's transgression until the guilty individual is exposed."
    source_id: "etcsl"
    source_loc: "1.3.3, full narrative"
    verbatim_quote: "The overall narrative arc of ETCSL 1.3.3 depicts three plagues afflicting the entire land -- blood in wells, storms, blocked roads -- all caused by Shu-kale-tuda's crime against Inanna, ending only when she locates and punishes him."
    triangulation: "ETCSL translation confirmed live. The thematic reading is well-supported by the text's structure."

findings:
  - claim_number: 3
    kind: "MARKER-MISUSED"
    severity: "HIGH"
    claim: "[LACUNA: Opening lines 1-15 are damaged; the initial context for the gardener's circumstances is partially lost.]"
    issue: "The ETCSL composite transliteration shows lines 1-15 are largely intact, not 'damaged' in the way this LACUNA marker implies. Lines 1-10 are fully preserved with no lacuna markers. Lines 11-15 show only minimal damage (isolated uncertain signs, one bracketed restoration [kur]). The opening lines describe Inanna's divine powers and her ascending the mountains -- they are not about 'the gardener's circumstances' at all. The gardener does not appear until approximately line 91. The LACUNA marker misidentifies both the extent of damage and the content of these lines."
    evidence: "ETCSL 1.3.3 composite text accessed live. Lines 1-10 fully intact. Lines 11-15 have only minor sign-level uncertainties. The first gap of any substance is '1 line missing' after line 22. The gardener Shu-kale-tuda first appears around line 91, not in lines 1-15."
    recommended_fix: "Remove this LACUNA marker entirely. If a lacuna marker is needed for the composition's gaps, place it at the correct locations: after line 22 ('1 line missing') and in the plague sections where genuine substantial damage exists. Correct the content description -- lines 1-15 are a hymnic introduction about Inanna, not about the gardener."

  - claim_number: 5
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Shu-kale-tuda looks to the stars for guidance and plants a tree (possibly a poplar or sarbatu-tree) that provides shade and finally allows his garden to flourish."
    issue: "Two problems. (1) The ETCSL text does not say Shu-kale-tuda 'looks to the stars for guidance.' The translation reads 'He raised his eyes to the lower land, and saw the exalted gods of the land where the sun rises.' While Cooley (2008) interprets the composition through an astral lens, the text itself describes seeing divine figures, not consulting stars. The claim conflates a scholarly interpretation with textual content. (2) The term 'sarbatu-tree' is Akkadian and does not appear in the ETCSL Sumerian transliteration or translation. The ETCSL calls it a 'Euphrates poplar.' 'Poplar' alone is acceptable; 'sarbatu' introduces an out-of-scope Akkadian botanical term not present in the primary source."
    evidence: "ETCSL 1.3.3 translation accessed live: 'He raised his eyes to the lower land, and saw the exalted gods.' The tree is called 'Euphrates poplar with broad shade' in ETCSL. The term 'sarbatu' does not appear in ETCSL 1.3.3."
    recommended_fix: "Revise to: 'Shu-kale-tuda raises his eyes and observes divine portents, then plants a Euphrates poplar that provides shade and finally allows his garden to flourish.' Remove 'sarbatu-tree' (Akkadian term not in ETCSL). Replace 'looks to the stars' with language matching the ETCSL text."

  - claim_number: 11
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "[LACUNA: Significant portions of the three plague descriptions are broken; the specific nature and effects of the first and second plagues are only partially recoverable.]"
    issue: "The LACUNA marker is directionally correct -- the plague sections do show damage in the composite transliteration. However, the claim overstates the damage to the first plague: the ETCSL translation gives a clear and detailed description of the first plague (filling wells with blood). The first plague is well-preserved; it is the second and third plagues that show more fragmentary preservation. The statement that 'the specific nature and effects of the first... plague' is 'only partially recoverable' is inaccurate for the first plague."
    evidence: "ETCSL 1.3.3 translation accessed live. First plague clearly described: 'She filled the wells of the Land with blood, so it was blood that the irrigated orchards of the Land yielded, it was blood that the slave who went to collect firewood drank.' This is not 'partially recoverable' -- it is well-preserved."
    recommended_fix: "Revise the LACUNA marker to: 'Portions of the second and third plague descriptions are fragmentary. The first plague (blood in wells) is well-preserved, but the second plague's details are substantially damaged and the third plague's mechanism is only briefly described.' This accurately reflects the differential preservation."

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The first plague affects the wells or water supply of the land: water is turned to blood or becomes otherwise polluted."
    issue: "The phrasing 'water is turned to blood' does not match the ETCSL text. The ETCSL reads 'She filled the wells of the Land with blood' -- Inanna actively fills the wells with blood, rather than water passively transforming into blood. The 'turned to blood' formulation echoes the biblical first plague of Egypt (Exodus 7:20) rather than the Sumerian text's own language. The underlying fact is correct (first plague involves blood contaminating water), but the specific wording distorts the source."
    evidence: "ETCSL 1.3.3 translation accessed live: 'She filled the wells of the Land with blood, so it was blood that the irrigated orchards of the Land yielded.' The verb is active (Inanna fills), not passive (water turns)."
    recommended_fix: "Revise to: 'The first plague affects the wells of the land: Inanna fills the wells with blood, so that the irrigated orchards yield blood, and those who go to draw water find only blood.' This matches the ETCSL source text."

  - claim_number: 16
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "[LACUNA: The nature of the second plague is largely lost in the broken text.]"
    issue: "The ETCSL translation does provide some description of the second plague: 'The south wind and a fearsome storm flood went before her. The pilipili and a dust storm followed her.' This suggests the second plague involves storms and dust, not that its nature is 'largely lost.' The composite transliteration does show damage in this section, but the translation provides a reading. The marker overstates the extent of the gap."
    evidence: "ETCSL 1.3.3 translation accessed live describes the second plague as involving storm wind, storm flood, and dust storm. The nature is not 'largely lost' -- it is recoverable at least in outline."
    recommended_fix: "Revise to: '[LACUNA: The second plague section has fragmentary passages, but the ETCSL composite preserves enough to identify storm winds and dust storms as the second affliction. Some details of its effects remain unclear.]'"

  - claim_number: 20
    kind: "SILENT-BRIDGE"
    severity: "HIGH"
    claim: "Shu-kale-tuda goes to the god Enki and seeks his counsel on how to escape Inanna's wrath."
    issue: "This claim states as fact that Shu-kale-tuda goes to 'the god Enki,' but claim 14 earlier in the same document hedges with 'his father (or from Enki, god of wisdom).' The ETCSL text describes Shu-kale-tuda going to 'his father' for advice, not to Enki by name. Separately, it is INANNA who goes to Enki in the abzu of Eridu to ask for help locating the criminal. The claim conflates two different narrative elements: (a) Shu-kale-tuda consulting his father, and (b) Inanna appealing to Enki. This is a silent bridge -- an uncited factual escalation from possibility (claim 14) to certainty (claim 20), and it also reverses who consults Enki."
    evidence: "ETCSL 1.3.3 translation accessed live. The father-advice passages use 'his father' (not Enki). The Enki passage reads: 'Holy Inana directed her steps to the abzu of Eridug. She addressed her father Enki... Father Enki answered Inana.' It is Inanna who goes to Enki, not Shu-kale-tuda."
    recommended_fix: "Revise claim 20 to: 'Shu-kale-tuda consults his father for advice on escaping Inanna's wrath. Separately, Inanna herself goes to the god Enki in the abzu of Eridu and appeals for his help in locating the criminal.' This correctly separates the two narrative threads and avoids the unsupported identification of the father with Enki."

  - claim_number: 25
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE: The paradox of the ending -- the criminal is condemned but his name is eternally preserved -- functions as a literary reflection on the nature of narrative itself.]"
    issue: "The INFERENCE marker is appropriate for the interpretive claim about 'literary reflection on the nature of narrative itself.' However, the first part -- that the text states Shu-kale-tuda's name will not be forgotten -- is directly attested in the text ('Your name, however, shall not be forgotten. Your name shall exist in songs and make the songs sweet.') and does not need an INFERENCE marker. The marker scope is slightly too broad. The risk note about scribal colophon formula vs. deliberate literary irony is a fair caveat."
    evidence: "ETCSL 1.3.3 final lines accessed live: 'Your name, however, shall not be forgotten. Your name shall exist in songs and make the songs sweet.' The textual fact is directly attested; only the literary interpretation is inferential."
    recommended_fix: "Consider splitting into two sentences: one stating the textual fact (SUPPORTED -- the text explicitly says his name will not be forgotten) and a separate INFERENCE sentence for the literary interpretation (the paradox functions as a reflection on narrative itself)."
