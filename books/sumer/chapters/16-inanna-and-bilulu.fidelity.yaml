  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 10, paragraph 2"
    detail: "Narrative adds: 'This matters because the text has gaps at precisely the points where the most dramatic action occurs. What Jacobsen provides is not simply a translation but a reading — one that fills broken passages with informed conjecture. His work is indispensable, but it must be read with an awareness of how much of the narrative rests on interpretation rather than preserved text.' Editorial commentary expanding C07's note about Jacobsen's debated interpretation. Not a new factual claim."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 15, paragraph 3"
    detail: "Narrative adds glosses for Dumuzid ('the shepherd-god, consort of Inanna') and Inanna ('goddess of love, war, and the morning and evening star'). These match glossary first_mention_gloss entries exactly. Glossary-mandated."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 15, paragraph 3"
    detail: "Narrative adds: 'The ordering matters. In the Descent, Inanna goes down to the underworld and returns, but the price of her return is Dumuzid's life. In the Dream, Dumuzid foresees his own death. Here, the death has already happened, and the question is no longer whether it can be prevented but what will be done about it.' This is interpretive commentary expanding on C22's placement of this text in the Dumuzid cycle. Summarizes known content of ETCSL 1.4.1 and 1.4.3. No new unsourced claim."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 23, paragraph 4"
    detail: "Narrative adds extensive steppe description: 'The steppe is the key setting. Not the city, not the temple precinct, not the irrigated fields where civilisation sustains itself, but the open, dry, ungoverned land beyond the canals — the place where shepherds move their flocks, where bandits operate, where the boundary between the human world and something older and less controlled becomes difficult to locate. Inanna does not mourn in her temple. She mourns in the landscape where Dumuzid lived and died.' Interpretive commentary elaborating the steppe setting mentioned in C10. Stylistic expansion, not a new factual claim."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 26, paragraph 5"
    detail: "Narrative adds: 'These laments were not merely literary. They were performed — sung or chanted in cultic settings as part of the seasonal observances marking the death and absence of the shepherd-god. The composition we are reading sits at the intersection of narrative myth and ritual practice, and the mourning it describes would have resonated with audiences who participated in similar laments as part of their religious calendar.' Interpretive elaboration of C11's claim about ritual laments. Consistent with cited sources (Jacobsen 1987, Kramer 1961)."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 31, paragraph 6"
    detail: "Narrative adds transitional sentence: 'The mourning, however, is not the end of the story. It is the beginning of a hunt.' Stylistic transition, not a factual claim."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 33, paragraph 6"
    detail: "Narrative adds: 'The text does not spell out the accusation in clean, legalistic terms — at least, not in the portions that survive.' Editorial observation consistent with the INFERENCE block about textual gaps. Not a new claim."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 37, paragraph 6"
    detail: "Narrative adds: 'What we can say is that the composition places blame on these two figures, and that Inanna accepts this attribution of guilt as sufficient grounds for action. Whether Bilulu and Girgire killed Dumuzid directly, whether they enabled his death, or whether they represent something more diffuse — the hostile steppe itself, personified — is a question the fragments cannot answer with certainty.' Interpretive commentary that carefully mirrors the INFERENCE block's acknowledgment of uncertainty. No new factual claim beyond what the INFERENCE already flagged."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 47, paragraph 8"
    detail: "Narrative adds: 'This is where the composition reaches its climax, and it is also where the tablets are most badly damaged. The confrontation itself — whatever words were exchanged, whatever divine fury was displayed — is largely lost. What survives is the outcome, and the outcome is extraordinary.' Editorial framing of the lacuna. No new factual claim."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 54, paragraph 8"
    detail: "Narrative adds: 'The punishment is not destruction. It is not exile or execution in any ordinary sense. It is transformation — and not random transformation, but transformation into something useful. The woman responsible for the shepherd's death becomes the vessel through which water is poured for the shepherd's spirit. The son becomes a guardian presence in the very landscape where the crime occurred. Sumerian divine justice, at its most characteristic, does not simply eliminate offenders. It repurposes them.' Interpretive commentary synthesizing C17, C18, and C24. Restates claimed facts in interpretive language. No new factual claim."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 58, paragraph 9"
    detail: "Narrative adds: 'This repurposing is not incidental. It is the theological core of the composition.' Interpretive transition. Not a new factual claim."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 60, paragraph 9"
    detail: "Narrative adds extended interpretive commentary: 'Consider the economy of this. A single divine act accomplishes two things at once: it punishes the killer and it establishes the means by which the dead will be honoured. The waterskin that carries water to Dumuzid's spirit in the steppe _is_ the killer, transformed. Every time the ritual is performed, every time water is poured for the dead shepherd in the open country, the punishment is re-enacted and the mourning is renewed. Vengeance and worship become the same gesture.' Interpretive elaboration of C20 and C21. Restates the aetiological claim in vivid language. No new factual assertion."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 66, paragraph 10"
    detail: "Narrative adds: 'It operates by a logic that is unfamiliar to most modern readers but internally consistent. The punishment fits the crime not in the sense of proportionality but in the sense of functional integration. The offender is not removed from the system; the offender is absorbed into it, conscripted into a role that serves the very order they violated. The cosmos, in the Sumerian view, does not waste anything — not even its criminals.' Interpretive commentary expanding C24. No new factual claim."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 69, paragraph 11"
    detail: "Narrative adds extended Ovid comparison with specific examples: 'In Ovid's _Metamorphoses_, divine vengeance frequently takes the form of transformation — Arachne into a spider, Actaeon into a stag, Daphne into a laurel tree. The structural similarity is real: a god punishes by changing the offender's form rather than simply killing them. But the Sumerian version has a specificity of purpose that the Ovidian tradition does not always share. Bilulu does not become just any object. She becomes the particular object needed for the particular ritual that mourns the particular victim she is accused of killing. The transformation is not poetic justice in a general sense. It is engineering.' This expands COMPARATIVE_HOOK_1 with specific Ovidian examples and interpretive contrast. The named Ovidian transformations are well-known classical references. No unsourced factual claim about the Sumerian text."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 76, paragraph 12"
    detail: "Narrative adds: 'Viewed within the Dumuzid cycle as a whole, the composition resolves the narrative arc that began with Inanna's descent to the underworld. The Descent raised the question of cosmic price — someone must stay below if someone is to return. The Dream gave Dumuzid foreknowledge of his fate. This composition, the final instalment, answers the question of what happens after: grief is followed by the identification of those responsible, identification is followed by confrontation, and confrontation produces not merely punishment but the ritual framework through which the dead will be remembered.' Interpretive synthesis of C22. Restates the cycle positioning claim with narrative commentary. No new factual assertion."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 78, paragraph 12"
    detail: "Narrative adds: 'The few scribes who copied this text — and it was a few, given the scant manuscript evidence — were preserving something more than a revenge tale. They were preserving an explanation of how a specific desert practice came to exist, why a particular waterskin poured water for a particular god, and how the cosmos turns even its worst violations into instruments of order.' Interpretive synthesis of C05 (few witnesses), C20 (aetiology), and C24 (transformation as divine justice). No new factual claim."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 78, paragraph 12"
    detail: "Narrative adds closing: 'The fragments are stubborn. They will not yield a complete narrative, no matter how skilfully they are read. But what survives is enough to see the shape of the whole: a goddess mourning, a goddess hunting, and a goddess who converts her enemies into the tools of worship.' Stylistic summary. No new factual claim."

