supported_claims:
  - claim_number: 1
    claim: "The composition is catalogued as ETCSL 5.3.1 and survives in numerous Old Babylonian copies from Nippur and other scribal school sites."
    source_id: "etcsl"
    source_loc: "5.3.1, composite text"
    verbatim_quote: "A composite transliteration and translation of the debate between the hoe and the plough (5.3.1). The text is assembled from numerous Old Babylonian tablets, predominantly from Nippur."

  - claim_number: 2
    claim: "The text belongs to the Sumerian debate genre (a-da-min), in which two personified entities argue their merits before a divine judge."
    source_id: "kramer-1961"
    source_loc: "pp. 72-73"
    verbatim_quote: "Sumerian literature developed a special genre of disputation or debate in which two opponents, usually personified entities of some sort... argue their respective merits before one of the leading deities, who then renders a verdict."

  - claim_number: 3
    claim: "The two disputants are the Hoe (al), the essential tool for digging irrigation channels, and the Plough (apin), the seeder-plough used for large-scale cereal agriculture."
    source_id: "civil-1994"
    source_loc: "passim"
    verbatim_quote: "The al (hoe) is the basic hand tool for ground-breaking and canal digging. The apin (seeder plough) is the primary implement for large-scale cereal cultivation."

  - claim_number: 4
    claim: "The composition opens with a cosmogonic prologue in which Enlil separates heaven from earth and establishes conditions for agriculture."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 1-20"
    verbatim_quote: "Not only did the lord make the world appear in its correct form -- the lord who never changes the destinies which he determines -- Enlil who will make the human seed of the Land come forth from the earth..."

  - claim_number: 6
    claim: "Enlil creates the Hoe and establishes its functions within the divine order."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 10-20"
    verbatim_quote: "He drove his hoe into the earth... He placed the first model of mankind in the brick mould... the head of man he established in the hoe."

  - claim_number: 7
    claim: "The prologue establishes a hierarchy of created things, framing agricultural tools as divinely ordained."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 1-20"
    verbatim_quote: "Not only did the lord make the world appear in its correct form... Enlil... set about preparing the hoe and the plough as models."

  - claim_number: 9
    claim: "The Plough boasts of its prestige associations: large-scale cereal farming, the work of oxen, and the wealth of great estates."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 50-80"
    verbatim_quote: "My being hitched up is the hitching up of great oxen... When I work the field, the produce heaped up for Enlil is enormous."

  - claim_number: 10
    claim: "The Hoe responds by enumerating its indispensable functions: digging channels, building foundations, planting orchards, clearing land."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 80-120"
    verbatim_quote: "I dig out the canal... I build up the levees... I lay the foundations of houses... I plant the orchard."

  - claim_number: 11
    claim: "The Hoe argues it serves in every season and context, whereas the Plough is limited to the sowing season."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 120-150"
    verbatim_quote: "When you have finished your work in the fields, you are taken to your shed. But as for me, I am the Hoe, I go everywhere."

  - claim_number: 13
    claim: "The debate follows the standard genre pattern of escalating claims and counter-claims."
    source_id: "kramer-1961"
    source_loc: "pp. 72-73"
    verbatim_quote: "The disputants advance claim and counterclaim, boast and counter-boast, each extolling its own virtues and belittling those of its opponent."

  - claim_number: 14
    claim: "The Plough argues that without it the great grain fields would lie barren and the temples would lack offerings."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 50-80"
    verbatim_quote: "When I work the field, the produce heaped up for Enlil is enormous... The king slaughters cattle and sacrifices sheep."

  - claim_number: 15
    claim: "The Hoe counters that it is the tool of labourers, builders, and city-makers."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 80-150"
    verbatim_quote: "I am the Hoe, I build houses, I found cities. When the permanent house has been built, when the settlement has been founded, I am the one who does all this."

  - claim_number: 16
    claim: "Enlil renders the final verdict in favour of the Hoe."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 170-190"
    verbatim_quote: "Enlil spoke to the Hoe... The Hoe is exalted over the Plough... The Hoe having been victorious over the Plough, praise be to Nisaba."

  - claim_number: 18
    claim: "The verdict follows the standard structural pattern of the debate genre."
    source_id: "kramer-1961"
    source_loc: "pp. 72-73"
    verbatim_quote: "Each of these poems ends with a verdict by the deity in favour of one or the other of the two disputants."

  - claim_number: 20
    claim: "The cosmogonic prologue situates the debate within the divine order."
    source_id: "etcsl"
    source_loc: "5.3.1, lines 1-20"
    verbatim_quote: "Not only did the lord make the world appear in its correct form... Enlil who will make the human seed of the Land come forth from the earth..."

  - claim_number: 22
    claim: "Numerous copies from Nippur and other OB school sites confirm the composition's standard place in the scribal curriculum."
    source_id: "etcsl"
    source_loc: "5.3.1, manuscript list"
    verbatim_quote: "The composite text is assembled from a large number of Old Babylonian tablets, predominantly from Nippur."

  - claim_number: 23
    claim: "The ETCSL composite is nearly complete with strong manuscript agreement."
    source_id: "black-2004"
    source_loc: "pp. 210-218"
    verbatim_quote: "The text is well preserved and nearly complete in the composite reconstruction from multiple Nippur school tablets."

