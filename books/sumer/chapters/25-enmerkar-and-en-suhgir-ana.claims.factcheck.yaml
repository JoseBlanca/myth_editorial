supported_claims:
  - claim_number: 1
    claim: "En-suhgir-ana is lord of Aratta, the distant wealthy city that has been the rival of Uruk throughout the Aratta cycle; he challenges Enmerkar, king of Uruk, to a new contest."
    source_id: "etcsl"
    source_loc: "1.8.2.4, lines 1-39"
    verbatim_quote: "Let him submit to me, let him bear my yoke. If he submits to me, indeed submits to me, then as for him and me -- he may dwell with Inana in the E-jar"

  - claim_number: 2
    claim: "The contest in this composition shifts from the diplomatic and rhetorical exchanges of the preceding Enmerkar poem to a direct sorcery challenge: En-suhgir-ana proposes that the conflict be decided through magical power."
    source_id: "etcsl"
    source_loc: "1.8.2.4, lines 114-150 (sorcery proposal; not lines 1-40 as cited)"
    verbatim_quote: "A sorcerer whose skill was that of a man of Hamazu, Ur-jirnuna, whose skill was that of a man of Hamazu... I will make Unug dig canals. I will make Unug submit to the shrine of Aratta."
    note: "Claim content is broadly correct — the composition does feature a sorcery challenge rather than diplomatic exchange. However, the cited line range (1-40) is wrong; lines 1-40 deal with En-suhgir-ana's boast about intimacy with Inanna, not sorcery. The sorcery element is introduced around line 114. See CITATION-WRONG finding."

  - claim_number: 3
    claim: "Inanna remains the divine patron of Uruk whose favor ensures Enmerkar's ultimate victory, continuing the theological framework established in Enmerkar and the Lord of Aratta."
    source_id: "etcsl"
    source_loc: "1.8.2.4, lines 274-281"
    verbatim_quote: "You are the beloved lord of Inana, you alone are exalted. Inana has truly chosen you for her holy lap, you are her beloved."

  - claim_number: 14
    claim: "When news of Urgirinuna's defeat reaches Aratta, En-suhgir-ana realizes that his magical strategy has failed and that Inanna's protection of Uruk is decisive."
    source_id: "etcsl"
    source_loc: "1.8.2.4, lines 274-281 (not 410-440 as cited)"
    verbatim_quote: "You are the beloved lord of Inana, you alone are exalted. Inana has truly chosen you for her holy lap, you are her beloved."
    note: "Core claim correct. Cited line range 410-440 is impossible in a 283-line text; correct lines are 274-281. See CITATION-WRONG finding."

  - claim_number: 15
    claim: "En-suhgir-ana acknowledges Enmerkar's supremacy, conceding that Inanna's favor belongs to Uruk; this concession resolves the Aratta cycle's overarching contest."
    source_id: "etcsl"
    source_loc: "1.8.2.4, lines 274-281 (not 440-470 as cited)"
    verbatim_quote: "From the moment of conception I was not your equal, you are the older brother. I cannot match you ever."
    note: "En-suhgir-ana's submission is attested. Whether this 'resolves the Aratta cycle' is an interpretive claim. Cited line range 440-470 is impossible; correct range is 274-281. See CITATION-WRONG finding."

  - claim_number: 16
    claim: "The poem ends with an affirmation of Inanna's patronage of Uruk and Enmerkar's divinely endorsed supremacy over Aratta."
    source_id: "etcsl"
    source_loc: "1.8.2.4, lines 281-283"
    verbatim_quote: "In the contest between Enmerkar and En-suhgir-ana, Enmerkar proved superior to En-suhgir-ana. Nisaba, be praised!"
    note: "The ending affirms Enmerkar's superiority. The final praise formula is to Nisaba, not Inanna, which is a nuance the claims document omits but does not contradict the claim."

  - claim_number: 17
    claim: "The contest structure -- sorcery challenge, dispatch of champion, counter-champion, defeat, submission -- follows a clear pattern that the audience would recognize as a test of divine favor."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 97-105 (introduction) -- cannot verify exact page range but structural analysis is consistent with Vanstiphout's known approach"
    verbatim_quote: "N/A -- interpretive/structural claim about literary pattern. The structure is evident in the text itself and is a standard scholarly observation."

  - claim_number: 20
    claim: "The text is well-preserved across Old Babylonian manuscripts and forms part of the edubba curriculum as the concluding piece of the Aratta cycle."
    source_id: "etcsl"
    source_loc: "1.8.2.4, bibliography; CDLI P469675"
    verbatim_quote: "N/A -- metadata claim. ETCSL bibliography lists 32 cuneiform sources. CDLI P469675 lists 37 manuscript witnesses, primarily from Nippur."
    note: "Well-attested (32-37 manuscripts) is confirmed. The claim that it is 'the concluding piece' is debatable. See UNVERIFIED finding."

  - claim_number: 21
    claim: "Vanstiphout's critical edition provides seventy pages of text and commentary, documenting minor variant readings in the sorcery-contest sequence."
    source_id: "vanstiphout-2003"
    source_loc: "pp. 97-169 (claimed)"
    verbatim_quote: "N/A -- bibliographic claim. Vanstiphout 2003 is a 176-page book. If the section covers pp. 97-169, that is approximately 72 pages, consistent with 'seventy pages.'"
    note: "Plausible but cannot be fully verified without physical access to the book. Vanstiphout places Enmerkar and Ensuhgirana as Part I, which may suggest earlier pages rather than pp. 97-169."

  - claim_number: 13
    claim: "Urgirinuna is defeated and dies, her body cast into the river; the threat to Uruk is eliminated by Sagburu's intervention."
    source_id: "etcsl"
    source_loc: "1.8.2.4, line 273 (not 390-410 as cited)"
    verbatim_quote: "She threw her prisoner from the bank of the Euphrates. She seized from him his life-force."
    note: "Core event correct -- sorcerer killed, thrown in river. But pronouns are wrong (Urgirinuna is male, not female), and cited line range 390-410 is impossible. See CITATION-WRONG and FABRICATION findings."

findings:
  - claim_number: 2
    kind: CITATION-WRONG
    severity: HIGH
    claim: "The contest in this composition shifts from the diplomatic and rhetorical exchanges of the preceding Enmerkar poem to a direct sorcery challenge: En-suhgir-ana proposes that the conflict be decided through magical power."
    issue: "Cited line range 1-40 is wrong. Lines 1-40 deal with En-suhgir-ana's boast about intimacy with Inanna, not sorcery. The sorcery element is not introduced until approximately line 114 when the sorcerer Ur-jirnuna is mentioned."
    evidence: "ETCSL 1.8.2.4: 'A sorcerer whose skill was that of a man of Hamazu, Ur-jirnuna' first appears at line 135. Lines 1-40 contain the boasting challenge about Inanna's favors. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Change cited line range from 1-40 to approximately 114-150 for the sorcery proposal."

  - claim_number: 4
    kind: CITATION-WRONG
    severity: HIGH
    claim: "En-suhgir-ana boasts to his advisors that he will defeat Enmerkar through magical means, and he proposes sending a sorcerer to overcome Uruk."
    issue: "Cited line range 40-80 is incorrect. The sorcery proposal does not begin until approximately line 114, when the sorcerer Ur-jirnuna is introduced. Lines 40-80 contain Enmerkar's counter-boast about his intimacy with Inanna. Additionally, it is the minister Ansiga-ria who identifies the sorcerer, not plural 'advisors.'"
    evidence: "ETCSL 1.8.2.4: 'A sorcerer whose skill was that of a man of Hamazu, Ur-jirnuna...' first appears at line 135. Minister Ansiga-ria is the specific figure involved. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Change cited line range to approximately 114-150. Clarify that it is the minister Ansiga-ria who identifies the sorcerer."

  - claim_number: 5
    kind: CITATION-WRONG
    severity: HIGH
    claim: "The advisors of En-suhgir-ana help him identify a suitable champion for the magical contest, settling on a figure with powerful sorcerous abilities."
    issue: "Cited line range 80-120 is incorrect. Lines 80-120 contain Enmerkar's response to En-suhgir-ana's challenge. The identification of the sorcerer occurs around lines 114-150. Additionally, it is the minister Ansiga-ria who is involved, not plural 'advisors.'"
    evidence: "ETCSL 1.8.2.4: the minister Ansiga-ria proposes the sorcerer Ur-jirnuna from Hamazu, around lines 114-150. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Change line range to approximately 114-150. Clarify that it is Ansiga-ria specifically."

  - claim_number: 6
    kind: FABRICATION
    severity: HIGH
    claim: "Urgirinuna, a witch, is dispatched from Aratta to defeat Uruk through sorcery; she is presented as a formidable practitioner of magic."
    issue: "Urgirinuna (ETCSL: Ur-jirnuna) is consistently described as male throughout the ETCSL text, using male pronouns and called a 'sorcerer' -- never 'witch' or 'she.' The claims document systematically misidentifies the sorcerer's gender as female. Additionally, Ur-jirnuna is not dispatched 'from Aratta' -- the text says he came from Hamazu (a destroyed city) and was already in Aratta when he proposed the scheme to the minister Ansiga-ria."
    evidence: "ETCSL 1.8.2.4, line 135: 'A sorcerer whose skill was that of a man of Hamazu, Ur-jirnuna, whose skill was that of a man of Hamazu.' All subsequent references use male pronouns ('he,' 'him,' 'his'). https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Change 'witch' to 'sorcerer' and all female pronouns to male throughout the document. Note that Ur-jirnuna originated from Hamazu and was residing in Aratta."

  - claim_number: 7
    kind: FABRICATION
    severity: HIGH
    claim: "Urgirinuna travels to the territory of Uruk and begins to exercise her magical powers against the city, threatening its livestock, its rivers, and its people."
    issue: "Three errors: (1) The sorcerer travels to Erec (Eresh), described as 'the city of Nisaba,' not directly to Uruk/Unug. Erec is a distinct location in this text. (2) The sorcery targets livestock only (milk, butter from cows and goats) -- there is no mention of threatening 'rivers' or 'people' directly. (3) The sorcerer is male, not female."
    evidence: "ETCSL 1.8.2.4: 'The sorcerer, farmer of the best seeds, directed his steps towards Erec, the city of Nisaba, and reached the animal pen.' The spell: 'Cow, your butter to your shining horn; your milk to your back.' No rivers or people threatened. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Correct location to Erec/Eresh (city of Nisaba). Remove 'rivers' and 'people' from targets of sorcery -- only livestock is affected. Change pronouns to male."

  - claim_number: 8
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "The witch's sorcery threatens the pastoral and agricultural foundations of Uruk's prosperity, including its flocks and waterways."
    issue: "Three problems: (1) The sorcery targets flocks (correct) but not 'waterways' -- no rivers or waterways are threatened. (2) The cited line range 220-250 is wrong; the livestock sorcery occurs approximately at lines 170-205. (3) The sorcerer is male, not a 'witch.'"
    evidence: "ETCSL 1.8.2.4: 'There was no milk in the udder of the cow... There was no milk in the udder of the goat; the day darkened for the kid.' No waterways mentioned. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Remove 'waterways' reference. Correct line range to approximately 170-205. Change 'witch' to 'sorcerer.'"

  - claim_number: 9
    kind: FABRICATION
    severity: HIGH
    claim: "An old woman of Uruk named Sagburu encounters Urgirinuna and recognizes her as a foreign sorceress threatening the city."
    issue: "Multiple errors: (1) ETCSL calls her 'Wise Woman Sajburu,' not 'old woman.' The title 'Wise Woman' implies recognized authority, not humble ordinariness. (2) Sajburu is associated with Erec, not 'Uruk' -- the text says she returned to 'her city, Erec.' (3) Urgirinuna is male, not a 'foreign sorceress.' (4) The cited line range 250-280 is wrong; Sajburu first appears around line 222."
    evidence: "ETCSL 1.8.2.4: 'Wise Woman Sajburu' (first appears at approximately line 222). She returns to 'her city, Erec.' The sorcerer is consistently male. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Change 'old woman' to 'Wise Woman.' Change city to Erec. Change Urgirinuna's gender to male. Correct line range to approximately 222-228."

  - claim_number: 10
    kind: UNVERIFIED
    severity: MEDIUM
    claim: "Sagburu is presented as an unlikely champion -- an elderly woman of no apparent supernatural standing who defeats the powerful witch through superior cunning rather than matching sorcery with sorcery."
    issue: "This characterization is substantially wrong. Sajburu uses magical contests -- she conjures predatory animals from the river (eagle vs. carp, wolf vs. ewe, cow vs. lion, ibex vs. leopard, gazelle vs. tiger) in a direct sorcery-against-sorcery duel. She matches sorcery with sorcery, using superior magic, not 'domestic cunning.' The ETCSL text does not call her 'elderly' or describe her as having 'no supernatural standing.' She is called 'Wise Woman' -- a title that implies recognized magical/wisdom authority."
    evidence: "ETCSL 1.8.2.4, lines 228-248: Sajburu 'made an eagle come out from the water' and a series of predator animals that defeat the sorcerer's creations. This is magical combat, not domestic wisdom. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Rewrite to reflect that Sajburu defeats the sorcerer through superior magical power in a series of five animal-conjuring contests. Remove 'elderly' and 'no supernatural standing.' Acknowledge her title 'Wise Woman.'"

  - claim_number: 11
    kind: UNVERIFIED
    severity: MEDIUM
    claim: "The old woman uses practical wisdom and domestic knowledge to neutralize Urgirinuna's magical attacks one by one, turning the witch's own sorcery against her."
    issue: "Factually wrong about the method. Sajburu uses counter-magic (conjuring predatory animals from the river) to defeat the sorcerer's conjured animals. This is magical combat, not 'practical wisdom and domestic knowledge.' The core structure (defeating attacks 'one by one') is correct -- there are five sequential animal contests."
    evidence: "ETCSL 1.8.2.4, lines 228-248: Series of animal conjurations -- eagle eats carp, wolf eats ewe, lion eats cow, leopard eats ibex, tiger eats gazelle. Each is a counter-summoning, not domestic cunning. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Replace 'practical wisdom and domestic knowledge' with 'superior counter-magic.' Describe the five animal-conjuring contests."

  - claim_number: 12
    kind: FABRICATION
    severity: HIGH
    claim: "Sagburu throws Urgirinuna's magical implements into the river, destroying the witch's power; the Euphrates carries the sorcery away."
    issue: "Factually wrong. Sagburu throws the sorcerer himself (her prisoner) into the Euphrates, not 'magical implements.' The sorcerer is killed. No magical implements are mentioned in the text. Also, the cited line range 360-390 does not exist in a 283-line text."
    evidence: "ETCSL 1.8.2.4, line 273: 'She threw her prisoner from the bank of the Euphrates. She seized from him his life-force.' https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Correct to state that Sagburu throws the sorcerer himself into the Euphrates, killing him. Remove reference to 'magical implements.' Correct line range to approximately line 273."

  - claim_number: 13
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Urgirinuna is defeated and dies, her body cast into the river; the threat to Uruk is eliminated by Sagburu's intervention."
    issue: "Core event correct (sorcerer killed, thrown in river) but: (1) Urgirinuna is male, not female. (2) Cited line range 390-410 is impossible in a 283-line text; correct line is approximately 273."
    evidence: "ETCSL 1.8.2.4, line 273: 'She threw her prisoner from the bank of the Euphrates. She seized from him his life-force.' https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Change all female pronouns for Urgirinuna to male. Correct line range to approximately 273."

  - claim_number: 14
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "When news of Urgirinuna's defeat reaches Aratta, En-suhgir-ana realizes that his magical strategy has failed and that Inanna's protection of Uruk is decisive."
    issue: "Core claim correct but cited line range 410-440 is impossible in a 283-line text. En-suhgir-ana's concession occurs at approximately lines 274-281."
    evidence: "ETCSL 1.8.2.4, lines 274-281: 'You are the beloved lord of Inana, you alone are exalted... I cannot match you ever.' https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Correct line range to approximately 274-281."

  - claim_number: 15
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "En-suhgir-ana acknowledges Enmerkar's supremacy, conceding that Inanna's favor belongs to Uruk; this concession resolves the Aratta cycle's overarching contest."
    issue: "Core claim correct but cited line range 440-470 is impossible in a 283-line text. Correct lines are approximately 274-281."
    evidence: "ETCSL 1.8.2.4, lines 274-281: 'I cannot match you ever.' https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Correct line range to approximately 274-281."

  - claim_number: 18
    kind: UNVERIFIED
    severity: MEDIUM
    claim: "The motif of humble wisdom triumphing over foreign sorcery is the composition's central literary theme: Sagburu's domestic cunning defeats Urgirinuna's exotic magic."
    issue: "The characterization of Sagburu's method as 'domestic cunning' is not supported by the ETCSL text. Sajburu uses counter-sorcery (conjuring predatory animals) to defeat the sorcerer in magical combat. The 'humble wisdom vs. foreign sorcery' framing may reflect one scholarly interpretation but does not match the text's depiction of the contest as sorcery-versus-sorcery."
    evidence: "ETCSL 1.8.2.4, lines 228-248: Sajburu engages in five rounds of magical animal conjuration. This is magical combat, not domestic cunning. https://etcsl.orinst.ox.ac.uk/section1/tr1824.htm"
    recommended_fix: "Revise to acknowledge that Sajburu defeats the sorcerer through superior magic, not 'domestic cunning.' The literary theme may be better described as local/divine-backed sorcery triumphing over foreign sorcery."

  - claim_number: 19
    kind: UNVERIFIED
    severity: LOW
    claim: "The poem affirms that Uruk's strength lies not in matching Aratta's power on its own terms but in possessing a deeper, divinely protected resilience embodied in an ordinary citizen."
    issue: "Partially undermined by the text. Sajburu does match the sorcerer's power on its own terms (magical combat), and she is not described as an 'ordinary citizen' -- she is called 'Wise Woman,' a title suggesting recognized authority. The interpretation may reflect a scholarly framing that requires explicit attribution."
    evidence: "ETCSL 1.8.2.4: Sajburu is consistently titled 'Wise Woman' and engages in direct magical combat."
    recommended_fix: "Attribute this interpretation explicitly to its scholarly source. Acknowledge that Sajburu is a titled figure ('Wise Woman') who defeats the sorcerer through counter-magic."

  - claim_number: 20
    kind: UNVERIFIED
    severity: LOW
    claim: "The text is well-preserved across Old Babylonian manuscripts and forms part of the edubba curriculum as the concluding piece of the Aratta cycle."
    issue: "The text is well-attested (32-37 manuscripts per ETCSL bibliography and CDLI P469675), but calling it 'the concluding piece of the Aratta cycle' is debatable. Vanstiphout 2003 places Enmerkar and Ensuhgirana as Part I of his edition, not the last. The order of the four Aratta compositions is contested among scholars. ETCSL catalogue numbering (1.8.2.4) places it last, but this is a cataloguing convention, not a statement about narrative sequence."
    evidence: "Vanstiphout 2003 table of contents: Part I is Enmerkar and Ensuhgirana, Part II is Enmerkar and the Lord of Aratta, Part III is the Lugalbanda poems. ETCSL catalogue: 1.8.2.1 (Lugalbanda in the Mountain Cave), 1.8.2.2 (Lugalbanda and the Anzud Bird), 1.8.2.3 (Enmerkar and the Lord of Aratta), 1.8.2.4 (Enmerkar and En-suhgir-ana)."
    recommended_fix: "Remove assertion that this is 'the concluding piece.' State instead that it is one of the four Aratta cycle compositions, with its position in the narrative sequence debated by scholars."

  - claim_number: 22
    kind: UNVERIFIED
    severity: LOW
    claim: "This composition closes the Aratta diplomatic cycle that began with Enmerkar and the Lord of Aratta and continued through the two Lugalbanda poems, bringing the contest between Uruk and Aratta to a definitive conclusion in Uruk's favor."
    issue: "Same issue as claim 20. The narrative sequence is not settled. Vanstiphout orders the texts differently from ETCSL. The claim that this poem brings the cycle to a 'definitive conclusion' is an interpretive assertion that should be attributed."
    evidence: "Vanstiphout 2003 places Enmerkar and Ensuhgirana first in his edition, suggesting he may view it differently than as a conclusion."
    recommended_fix: "Attribute this ordering explicitly to a scholarly source or present it as one possible reading."
