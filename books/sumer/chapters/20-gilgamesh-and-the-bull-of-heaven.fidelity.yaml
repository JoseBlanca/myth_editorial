chapter: 20
title: "Gilgamesh and the Bull of Heaven"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.8.1.2, OB tablets from Nippur, later version from Tell Haddad (Me-Turan)"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'catalogued as ETCSL 1.8.1.2 and survives on Old Babylonian tablets from Nippur (Sumerian: Nibru) and a later version from Tell Haddad (ancient Me-Turan).' Faithful."

  - claim_id: C02
    claim_summary: "Heavily damaged, especially in sections describing the confrontation with the bull"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'It is, to put the matter plainly, a ruin. The tablets are heavily damaged, especially in the sections describing the confrontation with the bull itself.' Faithful. The editorial flourish 'a ruin' is stylistic, not a factual distortion."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite text"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, drawing on what survives from each witness.' Faithful."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Sumerian text narrating Inanna sending Bull of Heaven (gud an-na / Gugalanna) against Uruk; Gilgamesh (Bilgames) and Enkidu slay it"
    narrative_location: "line 16 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'a Sumerian text narrating the episode in which Inanna — goddess of love, war, and the morning and evening star — sends the Bull of Heaven against Uruk (Sumerian: Unug)...and Gilgamesh (Sumerian: Bilgames), king of Uruk, two-thirds divine hero, together with his companion Enkidu, slays it.' Also includes 'in Sumerian gud an-na, known in scholarship as Gugalanna.' Faithful."

  - claim_id: C04_LACUNA
    claim_summary: "LACUNA block: three fragmentary versions, Segment B devastation, Segment D combat conclusion, Akkadian Tablet VI must not fill gaps"
    narrative_location: "line 10 (paragraph 2)"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims at line 10."

  - claim_id: C05
    claim_summary: "Inanna sends Bull of Heaven in response to perceived affront or rejection by Gilgamesh"
    narrative_location: "line 19 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'The motivation for Inanna's attack appears to involve a perceived affront or rejection by Gilgamesh.' Also: 'the goddess offended, the king unyielding — but the precise cause is lost.' Faithful."

  - claim_id: C05_INFERENCE
    claim_summary: "INFERENCE: Motivation involves rejection/insult, consistent with broader tradition; precise cause lost in Sumerian version"
    narrative_location: "line 22 (paragraph 5)"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  # === Narrative sequence ===

  - claim_id: C06
    claim_summary: "Bull devours pasture, drinks river, breaks palm trees, submerges Kulaba (Segment B, lines 55-63)"
    narrative_location: "line 26 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'the Bull devours the pasture, drinks the river in great slurps, breaks the palm trees, and submerges Kulaba.' Faithful."

  - claim_id: C07
    claim_summary: "Gilgamesh and Enkidu confront and slay the Bull together; Me-Turan version: Gilgamesh smites skull with axe weighing seven talents, Enkidu hits Inanna with haunch causing her to flee, consign hide and intestines to streets (Segment D, lines 33-53)"
    narrative_location: "line 29 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh and Enkidu confront and slay the Bull of Heaven together...Gilgamesh smites the Bull's skull with his axe weighing seven talents. After the kill, Enkidu hits Inanna with a haunch of the slain beast, causing her to flee. The heroes then consign the Bull's hide and intestines to the streets.' Faithful."

  - claim_id: C08
    claim_summary: "Slaying constitutes direct challenge to divine authority; beast sent by major deity; destruction by mortal heroes dramatises limits of divine power"
    narrative_location: "line 36 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'The slaying of the Bull of Heaven constitutes a direct challenge to divine authority. The beast was sent by a major deity — Inanna, patron of Uruk itself — and its destruction by mortal heroes dramatises, with considerable force, the limits of divine power.' Faithful."

  # === Iconographic and cultural evidence ===

  - claim_id: C09
    claim_summary: "Hero-versus-bull combat imagery common Mesopotamian seal motif from Early Dynastic period; identification with specific Gilgamesh narrative debated except in small number of clear cases"
    narrative_location: "line 41 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'Hero-versus-bull combat imagery is one of the most common Mesopotamian seal motifs, appearing from the Early Dynastic period onward...The identification of generic bull-combat contest scenes with the specific Gilgamesh Bull of Heaven narrative is, however, debated — most such scenes show a conventional struggle without identifying labels, and only a small number of explicitly labeled or contextually clear cases can be linked with confidence to this particular story.' Faithful."

  - claim_id: C10
    claim_summary: "Iconographic prevalence confirms episode was central to Gilgamesh tradition despite poor condition of literary text"
    narrative_location: "line 44 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'the iconographic prevalence of the bull-slaying scene confirms what the broken tablets can only hint at: that this episode was one of the most widely known and most frequently represented elements of the Gilgamesh cycle.' Faithful."

  # === Relationship to the Akkadian tradition ===

  - claim_id: C11
    claim_summary: "Akkadian Gilgamesh Tablet VI has fully developed Bull of Heaven episode; George identifies it as separate literary tradition from Sumerian composition"
    narrative_location: "line 49 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'The Akkadian Gilgamesh epic — specifically Standard Babylonian Tablet VI — contains a fully developed version of the Bull of Heaven episode...George, however, identifies the Akkadian account as a separate literary tradition that developed from, but is not identical to, the Sumerian composition.' Faithful."

  - claim_id: C11_INFERENCE
    claim_summary: "INFERENCE: Common narrative kernel but Akkadian is independent literary development, not a translation; degree of dependence cannot be established"
    narrative_location: "line 52 (paragraph 11)"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Mithras tauroctony, Heracles/Cretan Bull, Theseus/Minotaur, divine weapon defeated by mortal heroes pattern"
    narrative_location: "line 60 (paragraph 12) and lines 62-64 (// comments)"
    status: MAPPED
    notes: "Narrative: 'The Roman cult of Mithras placed the tauroctony — the ritual slaughter of a bull — at the centre of its mysteries. The Greek tradition sent Heracles against the Cretan Bull and Theseus against the Minotaur. The pattern of a divine weapon sent by an offended deity, defeated by mortal heroes, is widespread.' All three comparative hooks present in prose and as // COMPARATIVE-HOOK comments. Faithful."

findings:

  # --- Check 1: Completeness ---

  - id: F01
    check: completeness
    severity: NONE
    detail: "All claims from the approved claims file are present in the narrative. No claims were dropped. The claims file contains 12 substantive claims (C01-C11 plus comparative hooks), 2 INFERENCE blocks, 1 LACUNA block, and 3 COMPARATIVE-HOOK comments. All are mapped."

  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 3, paragraph 1"
    detail: "Narrative adds '(Sumerian: Nibru)' after Nippur. This is a glossary-mandated first-mention gloss. Consistent with glossary entry."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 7, paragraph 2"
    detail: "Narrative adds: 'Three versions survive: one of unknown provenance, the Me-Turan version, and a Nippur Ur III fragment, all substantially fragmentary. Together they preserve enough to reconstruct the outline of the narrative, but not enough to read it continuously.' This restates information from the LACUNA block in narrative prose. Not a new factual claim beyond what is in the claims file."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 12, paragraph 3"
    detail: "Narrative adds: 'The story, insofar as the broken tablets allow us to tell it, goes as follows.' Transitional sentence. Stylistic, no factual content."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 16, paragraph 4"
    detail: "Narrative adds Inanna's glossary gloss: 'goddess of love, war, and the morning and evening star.' This matches the glossary first_mention_gloss exactly. Also adds Gilgamesh gloss: 'king of Uruk, two-thirds divine hero' and Enkidu as 'companion.' These match glossary entries. Adds 'cosmic beast, a weapon of divine wrath sent down from the sky to punish a city' for the Bull of Heaven — this is interpretive elaboration consistent with the claims' 'cosmic beast' characterization."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 19, paragraph 5"
    detail: "Narrative adds: 'the goddess offended, the king unyielding — but the precise cause is lost. The surviving text makes clear that Inanna acts; it does not preserve, in readable form, exactly why.' Interpretive elaboration of the INFERENCE block content. Stylistic expansion, no new factual claim beyond what the INFERENCE already states."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 26, paragraph 6"
    detail: "Narrative adds: 'The devastation is ecological before it is military. The beast does not attack the walls or the soldiers first — it consumes the landscape. The pasture, the water, the trees: the infrastructure of life in a Mesopotamian city, swallowed or shattered by a creature operating on a cosmic scale.' Interpretive commentary on the devastation described in C06. No new factual claim — all elements (pasture, water, trees) are from the source claim."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 29, paragraph 7"
    detail: "Narrative adds: 'The combat itself — the central action of the composition — is where the tablets fail us most severely. The version of unknown provenance is fragmentary in the combat section. But the Me-Turan version, discovered at Tell Haddad, preserves the combat's conclusion.' This restates information from the LACUNA block and C07 in narrative form. Not a new factual claim."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 32, paragraph 7"
    detail: "Narrative adds: 'The detail of the seven-talent axe is characteristic of Sumerian heroic narrative — the weapon is impossibly heavy, the hero impossibly strong, and the text does not pause to explain how a mortal lifts what should be beyond mortal lifting. The haunch thrown at Inanna is a different kind of detail: an act of deliberate insult, a trophy of the kill flung at the deity who sent the beast. She flees. The goddess who dispatched a cosmic weapon retreats before mortal heroes who have broken it.' Interpretive commentary on C07 details. No new factual claims — all narrative elements (seven-talent axe, haunch, fleeing) come from C07."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 36, paragraph 8"
    detail: "Narrative adds: 'A goddess acts; heroes respond; the goddess loses. The pattern is straightforward, and the theological implications are not subtle. There are things that even a god cannot accomplish when a sufficiently determined human stands in the way.' Interpretive elaboration of C08's claim about challenging divine authority and dramatising limits of divine power. Stylistic expansion, not a new factual claim."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 41, paragraph 9"
    detail: "Narrative adds: 'Cylinder seals depicting a hero grappling with a bull turn up across centuries and across the full geographic range of Mesopotamian culture.' Expansion of C09's 'from the Early Dynastic period onward.' The phrase 'across centuries and across the full geographic range' is a reasonable restatement of the claim's temporal scope. Minor amplification."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 44, paragraph 10"
    detail: "Narrative adds: 'The images survived where the words did not. Thousands of seal impressions preserve the scene that the cuneiform tablets have largely lost.' Interpretive commentary on C10. 'Thousands of seal impressions' is a characterization of the iconographic record that is a reasonable inference from 'one of the most common Mesopotamian seal motifs' but adds a quantitative claim not explicitly in the claims file."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 49, paragraph 11"
    detail: "Narrative adds: 'complete with Inanna's courtship, Gilgamesh's rejection speech, and a detailed battle narrative.' This describes the content of Akkadian Tablet VI. The claims say 'fully developed version' without listing these specific elements. However, this is a characterization of the Akkadian text consistent with George 2003, which is cited. Minor amplification."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 49, paragraph 11"
    detail: "Narrative adds: 'It would be tempting to use that version to fill the gaps in the Sumerian text.' Editorial/methodological observation consistent with the LACUNA block's instruction that 'The Akkadian Gilgamesh Tablet VI is a separate tradition and must not be used to fill gaps.' Stylistic."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 54, paragraph 12"
    detail: "Narrative adds: 'The degree of direct literary dependence between the two versions cannot be established, precisely because the Sumerian text is too damaged to permit a detailed comparison. What we have is a Sumerian skeleton and an Akkadian elaboration, and the honest course is to present the skeleton as it is rather than dress it in borrowed flesh.' Restates the INFERENCE block's risk statement ('The degree of direct literary dependence...cannot be established given the fragmentary state of the Sumerian text') in narrative prose with editorial metaphor. No new factual claim."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 58, paragraph 13"
    detail: "Narrative adds a concluding summary paragraph: 'What remains, then, is a composition defined as much by its absences as by its surviving lines. We have the devastation — pastures consumed, rivers drained, palm trees broken, Kulaba submerged. We have the climax — the seven-talent axe, the shattered skull, the haunch thrown at a fleeing goddess. And we have the silence between, where the tablets have crumbled and the narrative is lost.' Recapitulation of previously mapped claims (C06, C07). No new factual content."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 58, paragraph 13"
    detail: "Narrative adds: 'The bull-slaying motif that runs through thousands of cylinder seals — heroes grappling with divine beasts in an image so persistent that it became one of the defining visual signatures of Mesopotamian culture — originated in a story that we can no longer fully read.' Interpretive synthesis of C09 and C10. The claim that the motif 'became one of the defining visual signatures of Mesopotamian culture' is a reasonable inference from 'one of the most common Mesopotamian seal motifs.' No new unsourced factual claim."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 60, paragraph 14"
    detail: "Narrative adds: 'But the Sumerian version, fragmentary as it is, may be the oldest literary instance we possess of a narrative pattern that would prove remarkably durable: the hero who stands against a beast of heaven and wins.' Interpretive framing of the comparative hooks. The claim about 'oldest literary instance' is consistent with the comparative hooks listing parallels from later traditions (Roman Mithras, Greek heroes). Minor interpretive addition."

  # --- Check 3: Fidelity ---

  - id: F19
    check: fidelity
    severity: NONE
    claim_id: C01-C11
    detail: "All claims are faithfully represented in the narrative. No factual distortions detected. The narrative reproduces the claims' factual content accurately while adding stylistic prose and interpretive commentary."

  - id: F20
    check: fidelity
    severity: LOW
    claim_id: C06
    detail: "Claims say 'drinks the river in great slurps.' Narrative reproduces this identically. However, claims say 'The Bull of Heaven descends upon Uruk and causes devastation.' Narrative instead structures this as 'What the Bull does to Uruk, however, survives with striking clarity.' The claim's 'descends upon Uruk' is implied but not explicitly stated. Minor rephrasing; context makes clear the Bull attacks Uruk."

  - id: F21
    check: fidelity
    severity: LOW
    claim_id: C07
    detail: "Claims say 'Gilgamesh and Enkidu confront and slay the Bull of Heaven together.' and then 'the Me-Turan version preserves the combat conclusion.' Narrative faithfully reproduces but adds 'The Me-Turan text is specific about the killing blow' — this is a characterization of the source rather than a distortion. Minor editorial phrasing."

  # --- Glossary compliance ---

  - id: F22
    check: glossary_compliance
    severity: NONE
    detail: >
      Checked all relevant glossary terms appearing in the narrative:
      - Inanna: first mention glossed as 'goddess of love, war, and the morning and evening star' — matches glossary first_mention_gloss exactly. PASS.
      - Gilgamesh: first mention glossed as 'king of Uruk, two-thirds divine hero (Sumerian: Bilgames)' — matches glossary first_mention_gloss exactly. PASS.
      - Enkidu: first mention as 'companion' — glossary says 'companion and servant of Gilgamesh.' Narrative omits 'and servant.' Minor omission but acceptable in context.
      - Uruk: first mention includes '(Sumerian: Unug)' — consistent with glossary. Glossary first_mention_gloss is 'great walled city of southern Mesopotamia, seat of Inanna's temple the E-ana (Sumerian: Unug).' Narrative says 'the great walled city of southern Mesopotamia' at line 16. PASS.
      - Nippur: first mention includes '(Sumerian: Nibru)' at line 3 — consistent with glossary. PASS.

  - id: F23
    check: glossary_compliance
    severity: LOW
    detail: "Enkidu's first mention at line 16 says 'his companion Enkidu.' Glossary first_mention_gloss is 'companion and servant of Gilgamesh.' The omission of 'and servant' is minor; 'companion' is the primary term. Acceptable."

  # --- Forbidden words ---

  - id: F24
    check: forbidden_words
    severity: NONE
    detail: "No forbidden glossary terms found in narrative: no 'Ishtar', 'Ea', 'Ningirsu', 'Ninhursag', 'Tammuz', 'Sin', 'Humbaba', 'cosmic ordinances', 'abyss', 'aura', or 'Anzu'. PASS."

