chapter: 01
title: "Enki and Ninhursaja: The Paradise of Dilmun"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.1.1, OB period tablets from Nippur and Ur (ca. 2000-1600 BCE)"
    narrative_location: "line 2 (paragraph 1)"
    status: MAPPED
    notes: "Narrative says 'catalogued as ETCSL 1.1.1 and survives in multiple Old Babylonian manuscript witnesses on clay tablets from both Nippur...and Ur, dating to the Old Babylonian period (ca. 2000-1600 BCE).' Faithful."

  - claim_id: C02
    claim_summary: "Nippur and Ur are co-equal witnesses; Ur has tribute insertion absent from Nippur"
    narrative_location: "line 2 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The Nippur and Ur recensions represent co-equal witnesses, but they differ in significant ways: the Ur manuscripts include an insertion of international tributes to Dilmun not found in the Nippur copies.' Faithful."

  - claim_id: C03
    claim_summary: "Composite reconstruction from overlapping fragments; gaps remain in Dilmun description and dialogue sections"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'No single tablet preserves the complete composition. The text as scholars read it is a composite reconstruction assembled from these overlapping fragments, with gaps remaining in the Dilmun description and in several dialogue sections.' Faithful."

  - claim_id: C04
