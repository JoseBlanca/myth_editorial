  - claim_id: C16
    claim_summary: "Enki with granddaughter Ninkurra -> Uttu (goddess of weaving)"
    narrative_location: "line 55 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'Enki copulates with his granddaughter Ninkurra, who gives birth to the goddess Uttu, goddess of weaving.' Faithful."

  - claim_id: C17
    claim_summary: "Ninhursaja/Nintud warns Uttu; requires gifts of cucumbers, apples, grapes"
    narrative_location: "line 64 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'Ninhursaja — or Nintud, as the text calls her in this passage — warns Uttu not to yield to Enki unless he brings her gifts of garden produce: cucumbers, apples, and grapes.' Faithful."

  - claim_id: C18
    claim_summary: "Enki brings garden produce; Uttu opens door; copulation"
    narrative_location: "line 64 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'Enki obtains the required garden produce and brings it to Uttu. She opens the door to him. He copulates with her.' Faithful."

  - claim_id: C19
    claim_summary: "Ninhursaja removes semen from Uttu; plants in ground; 8 plants grow"
    narrative_location: "line 70 (paragraph 15)"
    status: MAPPED
    notes: "Narrative: 'Ninhursaja removes Enki's semen from Uttu's body and plants it in the ground, where eight plants grow.' Faithful."

  - claim_id: C20
    claim_summary: "Enki + Isimud (two-faced servant) discover 8 plants; determines nature; eats each"
    narrative_location: "line 73 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'Enki, aided by his minister Isimud — a two-faced servant who acts as Enki's intelligence agent and factotum — discovers the eight plants one by one. He determines the nature of each plant, and then he eats it. One after another, all eight.' Faithful. The glosses 'intelligence agent and factotum' are narrative elaboration of 'two-faced servant' — no factual distortion."

  - claim_id: C21_INFERENCE
    claim_summary: "Eating plants = transgression; decrees fates by consuming; text does not label as forbidden"
    narrative_location: "line 73, line 76 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'The verb the text uses for what Enki does with each plant is to decree its fate — and he decrees their fates by consuming them.' INFERENCE block reproduced at line 76. Faithful."

  - claim_id: C22
    claim_summary: "Ninhursaja curses Enki with death; will not look with 'eye of life'; withdraws"
    narrative_location: "line 79 (paragraph 17)"
    status: MAPPED
    notes: "Narrative: 'Ninhursaja pronounces a curse of death on Enki. She declares that she will not look upon him with the eye of life until he is dying. Then she withdraws from the scene entirely.' Faithful."

  - claim_id: C23
    claim_summary: "After curse, Enki falls gravely ill; 8 ailing body parts revealed in healing dialogue"
    narrative_location: "line 84 (paragraph 18)"
    status: MAPPED
    notes: "Narrative: 'After the curse, he falls gravely ill. Eight parts of his body fail...His ailing body parts are revealed in the healing dialogue that follows.' Faithful."

  - claim_id: C24
    claim_summary: "Great gods sit in dust; Enlil cannot cure; situation hopeless"
    narrative_location: "line 87 (paragraph 19)"
    status: MAPPED
    notes: "Narrative: 'The great gods sit in the dust...Enlil...himself cannot cure Enki. No divine power, no ritual knowledge, no authority in the Sumerian pantheon can undo what Ninhursaja has done.' Faithful."

  - claim_id: C25
    claim_summary: "Fox offers to bring Ninhursaja back; succeeds in persuading her to return"
    narrative_location: "line 90 (paragraph 20)"
    status: MAPPED
    notes: "Narrative: 'It is the fox who breaks the impasse...It offers to bring Ninhursaja back and succeeds in persuading her to return.' Faithful."

  - claim_id: C26
    claim_summary: "Ninhursaja seats Enki beside her vulva; asks which body part hurts"
    narrative_location: "line 95 (paragraph 21)"
    status: MAPPED
    notes: "Narrative: 'Ninhursaja seats Enki beside her vulva and asks him, one by one, which part of his body hurts.' Faithful."

  - claim_id: C27
    claim_summary: "For each of 8 body parts, gives birth to healing deity; name puns on body part; aetiological"
    narrative_location: "line 98 (paragraph 22)"
    status: MAPPED
    notes: "Narrative: 'For each of the eight ailing body parts, Ninhursaja gives birth to a healing deity whose name puns on the body part being cured — an aetiological explanation of these deities' origins and domains.' Faithful."

  - claim_id: C28
    claim_summary: "Ninti = 'Lady of the Rib' and 'Lady of Life'; ti means both rib and life; compared to biblical Eve"
    narrative_location: "line 101 (paragraph 23)"
    status: MAPPED
    notes: "Narrative: 'Among the eight healing deities is Ninti. Her name means both Lady of the Rib and Lady of Life — a double meaning made possible by the Sumerian word ti, which means both rib and life. This pun has been compared to the biblical Eve, who is created from Adam's rib and whose name means living.' Faithful."

  - claim_id: C29_INFERENCE
    claim_summary: "Each deity assigned specific role by Enki; integrating into divine order (scholarly characterisation)"
    narrative_location: "line 104, line 107 (paragraph 24)"
    status: MAPPED
    notes: "INFERENCE block at line 104. Narrative line 107: 'Each newly born deity receives from Enki a specific role or domain, completing a cycle...' Faithful."

  - claim_id: C30
    claim_summary: "Composition functions cosmologically (Dilmun as pure land) and aetiologically (8 healing deities)"
    narrative_location: "line 111 (paragraph 25)"
    status: MAPPED
    notes: "Narrative: 'Cosmologically, it establishes Dilmun as a pure land where sun and fresh water are granted by divine decree — a place set apart from the ordinary world. Aetiologically, it explains the origin of eight healing deities through Ninhursaja's curing of Enki's ailments.' Faithful."

  - claim_id: C31
    claim_summary: "9-day gestation marks Dilmun as space with different temporal rules; paradise/otherworld feature"
    narrative_location: "line 58 (paragraph 13)"
    status: MAPPED
    notes: "Narrative: 'The nine-day gestation period, replacing the normal nine months, marks Dilmun as a space operating under different temporal rules — a feature characteristic of paradise or otherworld narratives across cultures.' Faithful."

  - claim_id: C31_INFERENCE
    claim_summary: "Accelerated gestation as narrative marker of Dilmun's otherworldly temporal nature"
    narrative_location: "line 58"
    status: MAPPED
