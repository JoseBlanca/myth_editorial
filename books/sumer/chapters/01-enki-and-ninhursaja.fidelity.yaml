    narrative_location: "line 61 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'the chain may reflect a mythological theme of divine power concentrating through successive generations rather than a narrative about kinship taboos as moderns would understand them.' Faithful."

  - claim_id: C33
    claim_summary: "Multiple OB copies from Nippur and Ur; wide circulation in edubba curriculum"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'Multiple Old Babylonian copies from both Nippur and Ur scribal schools attest wide circulation of the composition in the edubba curriculum.' Faithful."

  - claim_id: C34
    claim_summary: "Jacobsen and Kramer sustained analyses; one of most discussed Sumerian compositions"
    narrative_location: "line 12 (paragraph 3)"
    status: MAPPED
