    status: MAPPED
    notes: "Narrative: 'In the Nippur text, Dilmun becomes a prosperous harbour and trading port — an emporium on the quay for the land (lines 50-55). The Ur manuscript goes considerably further. An extended insertion (lines 49A-49P) names specific trade partners: Tukric, Meluhha, Magan, and others.' Faithful."

