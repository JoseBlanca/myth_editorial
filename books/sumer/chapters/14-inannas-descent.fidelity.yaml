  # === Theological and literary significance ===

  - claim_id: C64
    claim_summary: "Most important single Sumerian text for understanding Mesopotamian eschatology: nature of death, geography of afterlife, impossibility of free return"
    narrative_location: "line 18 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'It is the most important single Sumerian text for understanding Mesopotamian eschatology: the nature of death, the geography of the afterlife, and the impossibility of free return.' Verbatim match. Faithful."

  - claim_id: C65
    claim_summary: "Sladek's study and continuous engagement since Kramer confirm text's canonical status in Sumerology"
    narrative_location: "line 18 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'Sladek's full philological study and continuous scholarly engagement since Kramer confirm the text's canonical status in Sumerology.' Verbatim match. Faithful."

  - claim_id: C66
    claim_summary: "Jacobsen's literary translation in The Harps That Once... (1987) smooths line-level variants but remains influential"
    narrative_location: "line 18 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'Jacobsen's literary translation in The Harps That Once... (1987) smooths over line-level variants for narrative coherence but remains an influential reading.' Verbatim match. Faithful."

  - claim_id: C67
    claim_summary: "kurgarra and galatur understood as asexual or transgender cultic functionaries in some interpretations; liminal ritual personnel"
    narrative_location: "line 119 (paragraph 28)"
    status: MAPPED
    notes: "Narrative: 'The kurgarra and galatur are understood by some scholars as asexual or transgender cultic functionaries, connecting the text to the broader Mesopotamian tradition of liminal ritual personnel — beings who exist between categories.' Faithful."

  - claim_id: C68_INFERENCE
    claim_summary: "INFERENCE: Composition functions simultaneously as eschatological charter, ritual aetiology, and psychological drama"
    narrative_location: "lines 213-217"
    status: MAPPED
