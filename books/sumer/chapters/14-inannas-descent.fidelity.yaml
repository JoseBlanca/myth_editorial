  # === COMPARATIVE-HOOKs ===

  - claim_id: HOOK_GREEK
    claim_summary: "Greek — Persephone's descent and seasonal return mirrors Dumuzid/Geshtinanna alternation"
    narrative_location: "lines 219 and 227"
    status: MAPPED
    notes: "Narrative (line 219): 'The alternation of Dumuzid and Geshtinanna — six months below, six months above — mirrors the Greek myth of Persephone, who descends to Hades and returns to Demeter, with the seasons tracking her absence and her return.' COMPARATIVE-HOOK comment reproduced at line 227. Faithful."

