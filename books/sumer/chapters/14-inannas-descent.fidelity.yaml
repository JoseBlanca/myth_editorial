  # === Inanna's preparation and decision ===

  - claim_id: C10
    claim_summary: "Inanna resolves to descend to the kur — the nether world, realm of the dead — the domain of her elder sister Ereshkigal"
    narrative_location: "line 28 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'Inanna — goddess of love, war, and the morning and evening star — queen of heaven, wielder of political power and sexual force, resolves to descend to the kur — the nether world, realm of the dead beneath the earth — the domain of her elder sister Ereshkigal, queen of the underworld.' Faithful. Claims say 'queen of heaven, goddess of love, war, and political power'; narrative adds 'morning and evening star' and 'sexual force'. The 'morning and evening star' matches the glossary first_mention_gloss exactly. 'Sexual force' is an elaboration beyond both the claim and the glossary."

  - claim_id: C11
    claim_summary: "Inanna abandons heaven and earth and her seven cities and temples; text enumerates the holy places she forsakes"
    narrative_location: "line 31 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'Inanna abandons heaven and earth and her seven cities and temples to go to the nether world; the text enumerates the holy places she forsakes.' Verbatim match. Faithful."

  - claim_id: C12
    claim_summary: "Inanna gathers the seven me and transforms them into physical adornments: shugurra, measuring rod/line of lapis lazuli, lapis lazuli beads, twin egg-shaped beads, gold ring, breastplate 'Come, man, come', pala-garment of ladyship"
    narrative_location: "line 34 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Inanna gathers the seven me — the divine powers and cultural blueprints that govern civilization — and transforms them into physical adornments. She places the shugurra, the crown of the steppe, on her head. She takes the measuring rod and line of lapis lazuli in her hand. She fastens small lapis lazuli beads around her neck. She sets twin egg-shaped beads upon her breast. She places a gold ring on her hand. She binds a breastplate called \"Come, man, come\" on her chest. She covers her body with the pala-garment of ladyship.' All seven items listed in the same order as claims. Faithful."

  - claim_id: C13
    claim_summary: "Inanna instructs Ninshubur (her faithful sukkal) with contingency plans: if she does not return within three days, go to temples of Enlil, Nanna-Suen, and Enki"
    narrative_location: "line 37 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'She instructs her minister Ninshubur — her faithful sukkal — with detailed contingency plans. If Inanna does not return within three days, Ninshubur must go to the temples of the three great gods and plead for help.' Faithful. The three gods are named in the next sentence (C14)."

  - claim_id: C14
    claim_summary: "Inanna specifies order of appeal: first Enlil in Nippur (Nibru), then Nanna-Suen in Ur, then Enki in Eridu"
    narrative_location: "line 37 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'Inanna specifies the order of appeal: first Enlil — king of the gods, lord of wind and command — in Nippur (Sumerian: Nibru), the religious capital of Sumer; then Nanna-Suen — the moon god, patron of Ur — in his city; then Enki — god of wisdom, fresh water, and cunning, lord of the abzu beneath Eridu, the oldest city in Sumerian tradition.' All three gods named in correct order with their cities. Faithful. Adds glossary-mandated first-mention glosses for Enlil, Nanna-Suen, Enki, Nippur, and Eridu."

