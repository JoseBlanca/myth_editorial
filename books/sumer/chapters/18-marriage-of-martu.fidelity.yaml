chapter: 18
title: "The Marriage of Martu"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "Composition catalogued as ETCSL 1.7.1; survives on Old Babylonian manuscripts; narrative set in Ninab"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The composition known as \"The Marriage of Martu\" is catalogued as ETCSL 1.7.1 and survives on Old Babylonian manuscripts; the narrative is set in the city of Ninab.' Faithful — nearly verbatim from claims."

  - claim_id: C02
    claim_summary: "Well preserved"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The text is well preserved.' Faithful."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite text, supplemented by Black et al. 2004, pp. 156–162"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Black et al. 2004, pp. 156–162.' Faithful — verbatim from claims."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Martu (Akkadian: Amurru) is divine personification of Amorite west, god of nomadic peoples beyond settled Sumer"
    narrative_location: "line 13 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'Martu — known in Akkadian as Amurru — is the divine personification of the Amorite west, the god of nomadic peoples who lived beyond the settled cities of Sumer.' Faithful — verbatim from claims."

  - claim_id: C05
    claim_summary: "Several OB copies survive; ethnographic content attracted scholarly interest as rare Sumerian literary witness to Amorite cultural perception from urban Sumerian viewpoint"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'Several Old Babylonian copies survive, and its ethnographic content has attracted consistent scholarly interest as a rare Sumerian literary witness to Amorite cultural perception from the urban Sumerian viewpoint.' Faithful — verbatim from claims."

  - claim_id: C06
    claim_summary: "Narrative set in ancient city of Ninab during a festival held by Numushda, local deity who serves as father of the bride"
    narrative_location: "line 16 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The narrative is set in the ancient city of Ninab, during a festival held by the god Numushda, the local deity who serves as father of the bride in the story.' Faithful — verbatim from claims."

  # === Narrative sequence ===

  - claim_id: C07
    claim_summary: "A festival is held in Ninab, and Martu attends"
    narrative_location: "line 19 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'A festival is held in Ninab, and Martu attends.' Faithful — verbatim from claims."

  - claim_id: C08
    claim_summary: "During the festival, Martu sees the daughter of Numushda and falls in love, desiring to marry her"
    narrative_location: "line 22 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'During the festival, Martu sees the daughter of Numushda and falls in love with her, desiring to marry her.' Faithful — verbatim from claims."

  - claim_id: C09
    claim_summary: "Martu presents himself as suitor; question of suitability as nomadic god among city-dwellers becomes central dramatic tension"
    narrative_location: "line 27 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Martu presents himself as a suitor, and the question of his suitability — as a nomadic god among settled city-dwellers — becomes the central dramatic tension.' Faithful — verbatim from claims."

  - claim_id: C10
    claim_summary: "Female friend delivers extended warning speech describing Amorite nomadic customs: raw meat, no permanent houses, do not bury dead properly, dig up truffles, lack urban refinements"
    narrative_location: "line 30 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'a female friend...delivers an extended warning speech describing the customs of nomadic Amorite life in vivid ethnographic detail: the Amorites eat raw meat, have no permanent houses, do not bury their dead properly, dig up truffles in the steppe, and lack the refinements of urban civilisation.' Faithful — verbatim from claims."

  - claim_id: C10_LACUNA
    claim_summary: "LACUNA: Portions of friend's warning speech (approx lines 120–140) partially broken"
    narrative_location: "line 33"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C10_VARIANT
    claim_summary: "VARIANT: ETCSL 1.7.1 vs Black et al. 2004 rendering of ethnographic catalogue"
    narrative_location: "line 35"
    status: MAPPED
    notes: "VARIANT block reproduced verbatim from claims."

  - claim_id: C11
    claim_summary: "Friend's speech functions as ethnographic catalogue reflecting urban Sumerian perception of Amorite peoples: nomads defined by what they lack (food preparation, permanent dwelling, funerary rites)"
    narrative_location: "line 39 (paragraph 10) and line 42 (paragraph 11)"
    status: MAPPED
    notes: "Narrative line 39: 'The catalogue of nomadic habits functions as a definition by negation: the Amorites are described not by what they do, but by what they fail to do relative to settled civilisation. They do not prepare food properly. They do not build permanent dwelling. They do not observe funerary rites.' Line 42 repeats: 'The friend's speech functions as an ethnographic catalogue that reflects the urban Sumerian perception of Amorite peoples: the nomads are defined by what they lack relative to settled civilisation, including proper food preparation, permanent dwelling, and funerary rites.' Faithful."

  - claim_id: C12
    claim_summary: "Despite warnings, bride willingly accepts Martu as husband, choosing nomadic god over friend's objections"
    narrative_location: "line 49 (paragraph 13)"
    status: MAPPED
    notes: "Narrative: 'Despite the warnings, the bride willingly accepts Martu as her husband, choosing the nomadic god over the objections raised by her friend.' Faithful — verbatim from claims."

  - claim_id: C13
    claim_summary: "Bride's acceptance constitutes resolution: cultural boundary crossed by voluntary choice, not coercion"
    narrative_location: "line 52 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'The bride's acceptance constitutes the resolution of the narrative: the cultural boundary between settled and nomadic life is crossed by an act of voluntary choice, not coercion.' Faithful — verbatim from claims."

  # === Cultural significance ===

  - claim_id: C14
    claim_summary: "Composition functions as literary comedy of cultural encounter, staging tension between settled Sumerian civilisation and nomadic Amorite world in form of marriage negotiation"
    narrative_location: "line 57 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'The composition functions as a literary comedy of cultural encounter, staging the tension between settled Sumerian civilisation and the nomadic Amorite world in the form of a marriage negotiation.' Faithful — verbatim from claims."

  - claim_id: C15
    claim_summary: "Didactic function lies in bride's willingness to accept integration; may reflect historical Amorite absorption into Mesopotamian urban society during late 3rd / early 2nd millennium BCE"
    narrative_location: "line 60 (paragraph 17)"
    status: MAPPED
    notes: "Narrative: 'The didactic function of the text lies in the bride's willingness to accept integration across cultural boundaries, a message that may reflect the historical reality of Amorite absorption into Mesopotamian urban society during the late third and early second millennium BCE.' Faithful — verbatim from claims."

  - claim_id: C16_INFERENCE
    claim_summary: "INFERENCE: Sympathetic treatment suggests Amorite integration was accepted social reality by OB period; literary tradition could treat with humour rather than anxiety; risk: tone debated"
    narrative_location: "line 63"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Civilised/nomadic bride narratives as ANE theme; marriage across cultural boundaries parallels Greek narratives"
    narrative_location: "lines 71–72"
    status: MAPPED
    notes: "Both COMPARATIVE-HOOK comments are reproduced verbatim from claims. In prose, line 69: 'The pattern — marriage across cultural boundaries as a literary exploration of assimilation — is not unique to Sumer. Greek literature produced its own versions...The civilised-versus-nomadic bride narrative appears across the ancient Near East as a recurring literary form.' Faithful."

findings:

  # --- Check 1: Completeness ---

  - id: F01
    check: completeness
    severity: NONE
    detail: "All claims from the approved claims file are present in the narrative. No claims were dropped. The count includes 3 source overview claims (C01–C03), 3 setting/context claims (C04–C06), 7 narrative sequence claims (C07–C13) plus 1 LACUNA and 1 VARIANT block, 2 cultural significance claims (C14–C15), 1 INFERENCE block (C16), and 2 COMPARATIVE-HOOK comments. Total: 20 discrete claim units, all mapped."

  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 9 (paragraph 2)"
    detail: "Narrative adds: 'What we have here is not a theological hymn or a cosmological treatise. It is something closer to a comedy of manners — a story in which the central question is not whether the universe will survive, but whether a respectable young woman should marry someone whose people eat their meat raw. The stakes are domestic. The implications are not.' This is stylistic/interpretive framing anticipating claims C14 (literary comedy). No new factual claim."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 13 (paragraph 3)"
    detail: "Narrative adds extensive elaboration on who the Amorites were: 'The Amorites were not a single nation in any modern sense. They were the peoples of the western steppe and hill country — semi-nomadic pastoralists who moved with their flocks along the edges of the irrigated lowlands, appearing in Sumerian administrative texts sometimes as trading partners, sometimes as threats, and sometimes simply as people who did things differently.' This expands on the claim that Martu is 'the god of nomadic peoples who lived beyond the settled cities of Sumer.' The characterisation is consistent with standard scholarly understanding of Amorites. Stylistic elaboration."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 13 (paragraph 3)"
    detail: "Narrative adds: 'He is not merely associated with these peoples; he is, in the logic of Sumerian theology, the divine reality of which they are the human expression.' Interpretive commentary on the nature of divine personification consistent with claim C04. Stylistic elaboration."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 16 (paragraph 4)"
    detail: "Narrative adds: 'Numushda is not one of the great gods of the Sumerian pantheon — he is a city god, a local patron, the kind of deity whose importance was enormous within his own walls and negligible outside them. But within Ninab, his festival is the event of the season, and it is to this festival that the god Martu comes.' Editorial characterisation of Numushda's status. The claims say only that he is 'the local deity.' The elaboration is consistent with standard Sumerological understanding of city gods. Stylistic expansion."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 19 (paragraph 5)"
    detail: "Narrative adds: 'The text does not explain why a nomadic god would attend a city festival. It does not need to. The borders between settled and nomadic Mesopotamia were porous in both directions — nomads came to cities to trade, to worship, to find wives — and the story assumes this background without belaboring it.' Editorial commentary. Not a new factual claim about the text; it characterises what the text does not say."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 22 (paragraph 6)"
    detail: "Narrative adds: 'The emotional logic here is swift and uncomplicated. He sees her. He wants her. He decides to pursue her. The Sumerian literary tradition does not, as a rule, spend many lines on the psychology of attraction. Gods and heroes fall in love the way they do everything else — immediately and with complete conviction.' Editorial/interpretive commentary on Sumerian literary conventions. No new factual claim about this text."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 27 (paragraph 8)"
    detail: "Narrative adds: 'This is where the composition finds its real subject. The problem is not that Martu is unworthy in any absolute sense. He is a god, after all. The problem is that he is the wrong kind of god — or rather, the god of the wrong kind of people. He represents everything that urban Sumerians defined themselves against: the open steppe, the absence of walls, the life without grain stores and temple precincts and the accumulated refinements of city existence.' Interpretive expansion of C09. Consistent with claims C11 and C14 about the cultural tension. Stylistic elaboration."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 30 (paragraph 9)"
    detail: "Narrative adds: 'The objections are articulated not by the bride herself, and not by her father Numushda, but by a female friend.' The claims say 'A female friend of the bride delivers an extended warning speech' — the narrative makes explicit that it is not the bride or her father who objects. This is implicit in the claims but made explicit here. Minor clarification, not a new factual claim."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 37 (paragraph 10)"
    detail: "Narrative adds: 'The speech is worth pausing over, because it is one of the most sustained pieces of ethnographic description in the entire Sumerian literary corpus. The friend does not accuse Martu of being evil, or dangerous, or malicious. She accuses him of being uncivilised — which, in the value system of urban Sumer, was considerably worse. Evil could be propitiated. Uncivilised was a condition.' Interpretive commentary consistent with claims C10, C11, and C14. Stylistic elaboration."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 39 (paragraph 10)"
    detail: "Narrative adds detailed expansion of the ethnographic catalogue: 'Every item in the list is a marker of urbanity that the nomads lack...The raw meat is not merely a dietary preference — it is evidence of a people who have not crossed the threshold from nature into culture. The lack of permanent houses is not merely an architectural choice — it is proof that the Amorites have no fixed relationship to the earth, no investment in place, no participation in the great settled project of irrigation and agriculture that defined Sumerian identity.' This is interpretive expansion of C11. Consistent with claims. Stylistic elaboration."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 47 (paragraph 12)"
    detail: "Narrative adds: 'The bride listens to all of this. And then she makes her choice.' Transitional sentence. Stylistic."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 49 (paragraph 13)"
    detail: "Narrative adds: 'The text does not record her reasoning. It does not tell us whether she found the friend's arguments unconvincing, or whether she found them entirely convincing and chose Martu anyway. It simply reports her decision: she will marry him.' Editorial commentary on what the text does not say. Not a new factual claim."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 52 (paragraph 14)"
    detail: "Narrative adds: 'This is the hinge on which the entire composition turns. No one forces the bride. No divine decree compels her. No father sells her or trades her. She chooses, freely and explicitly, to cross the boundary that her friend has just spent an extended speech defining as uncrossable.' Interpretive expansion of C13 (voluntary choice, not coercion). Faithful to claims — the emphasis on voluntariness is the core of C13."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 57 (paragraph 16)"
    detail: "Narrative adds: 'The word \"comedy\" here is used in its structural sense: the story moves from social disruption (an unsuitable suitor appears) toward social integration (the marriage occurs). No one dies. No city is destroyed. The crisis is resolved over the dinner table, not on the battlefield.' Interpretive gloss on the word 'comedy' as used in C14. Stylistic clarification."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 60 (paragraph 17)"
    detail: "Narrative adds: 'By the time the Old Babylonian scribes were copying this composition in their schools, the Amorites were not strangers at the gate. They were the rulers. The First Dynasty of Babylon — the dynasty of Hammurabi himself — was Amorite. The people whom the friend's speech describes as troglodytes who eat raw meat and dig up truffles had, by the early second millennium, conquered and governed the most sophisticated urban civilisation in the world.' This expands on C15 and the INFERENCE block C16. The historical details about the First Dynasty of Babylon being Amorite are explicitly stated in the INFERENCE block's basis. Faithful to claims."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 65 (paragraph 18)"
    detail: "Narrative adds: 'That historical context gives the composition a layer of irony that the original audience would have appreciated. The friend's speech cataloguing Amorite barbarism was being recited in schools run by an Amorite dynasty...The horror at nomadic customs was, by the time of the text's transmission, a literary convention rather than a lived anxiety — a joke whose punchline the audience already knew. The bride was right to accept Martu. History had proved it.' Interpretive expansion of the INFERENCE block C16, which states the literary tradition could treat integration 'with humour rather than anxiety.' Consistent with claims."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 67 (paragraph 19)"
    detail: "Narrative adds: 'Whether the composition was originally composed with this ironic intent, or whether the irony accumulated as the historical situation changed, is a question the tablets cannot answer. What we can say is that the text, as it reached its Old Babylonian form, reads most naturally as a comedy — a story in which the anxieties of cultural encounter are raised, examined, and then dissolved by the simple expedient of a woman deciding that love, or at least preference, outweighs ethnographic objections.' Cautious scholarly commentary consistent with the INFERENCE block's risk note that 'the text's tone is debated.' This is a responsible editorial hedging of the INFERENCE."

  - id: F19
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 69 (paragraph 20)"
    detail: "Narrative adds: 'Greek literature produced its own versions, from the marriages of Greek heroes with foreign princesses to the broader literary tradition of encounters between \"civilised\" and \"barbarian\" peoples.' Expansion of the COMPARATIVE-HOOK about Greek parallels. The claims note 'parallels Greek narratives of marriages between Greeks and barbarians.' The narrative adds 'Greek heroes with foreign princesses' as an illustrative example. Minor amplification consistent with the comparative hook."

  - id: F20
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 69 (paragraph 20)"
    detail: "Narrative adds: 'But the Sumerian version has a directness that is hard to match. There is no ambiguity about what the friend thinks of the Amorites. There is no ambiguity about what the bride decides. And the text, in its compact and well-preserved form, allows the tension between these two positions to speak for itself.' Concluding editorial observation. No new factual claim."

  # --- Check 3: Fidelity ---

  - id: F21
    check: fidelity
    severity: NONE
    detail: "All claims are reproduced with high fidelity. The narrative frequently uses verbatim language from the claims file for the core factual assertions, then adds interpretive and stylistic elaboration around them. No factual distortions were detected."

