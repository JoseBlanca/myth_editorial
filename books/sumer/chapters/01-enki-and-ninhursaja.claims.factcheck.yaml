    evidence: "ETCSL 1.1.1: lines 186-189 describe Ninhursaja removing semen from Uttu's thighs; lines 190-197 describe the eight plants growing. Verified via WebFetch."
    recommended_fix: "Change citation from 'lines 156-175' to 'lines 186-197'."

