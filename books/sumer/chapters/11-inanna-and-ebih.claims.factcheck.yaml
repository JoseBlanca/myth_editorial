supported_claims:
  - claim_number: 1
    claim: "The composition 'Inanna and Ebih' is catalogued as ETCSL 1.3.2 and survives in numerous consistent Old Babylonian copies, making it one of the best-preserved Inanna narratives."
    source_id: "etcsl"
    source_loc: "1.3.2, composite text"
    verbatim_quote: "A composite transliteration and a translation of Inana and Ebih -- ETCSL 1.3.2"
    triangulation: "CDLI confirms Q000339 / P469521 with 88 manuscript exemplars from Nippur, Ur, Isin, Kish, Susa, and other sites. Period: Old Babylonian."

  - claim_number: 2
    claim: "The text is classified as single-prevalent: the numerous OB copies produce a stable composite text with minimal significant variation."
    source_id: "etcsl"
    source_loc: "1.3.2, manuscript list"
    verbatim_quote: "CDLI Literary 000339 (Inanna and Ebih) composite -- 88 identified witnesses"
    triangulation: "CDLI Q000339 confirms 88 manuscript witnesses. The large number of exemplars from multiple sites supports the single-prevalent classification."

  - claim_number: 3
    claim: "The text was part of the standard scribal curriculum, attesting to its recognised pedagogical and literary value."
    source_id: "etcsl"
    source_loc: "1.3.2; CDLI catalogue"
    verbatim_quote: "ETCSL 1.03.02 Inanna and Ebih ('Decad no. 08')"
    triangulation: "CDLI catalogues this composition as 'Decad no. 08,' confirming it was the eighth text in the advanced scribal curriculum (the Decad). Scholarly literature confirms the Decad sequence: Shulgi A, Lipit-Eshtar A, Song of the Hoe, Inanna B, Enlil A, Kesh Temple Hymn, Enki's Journey to Nippur, Inanna and Ebih, Nungal A, Gilgamesh and Huwawa A."

  - claim_number: 4
    claim: "The composition is a sustained exercise in divine martial rhetoric: a hymnic-narrative genre piece that showcases Inanna's self-praising speeches and sublime destructive imagery."
    source_id: "black-2004"
    source_loc: "pp. 71-72"
    verbatim_quote: "Goddess of the fearsome divine powers, clad in terror, riding on the great divine powers, Inana, made perfect by the holy ankar weapon, drenched in blood, rushing around in great battles"
    triangulation: "ETCSL 1.3.2 opening lines confirm the hymnic-martial character. The text alternates between hymnic self-praise and narrative action."

  - claim_number: 5
    claim: "The text opens with an extended hymnic passage praising Inanna's terrifying martial power and her me-lam -- her terrifying divine radiance."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 1-24"
    verbatim_quote: "Goddess of the fearsome divine powers, clad in terror... wearing fearsome terror... wearing daylight and brilliance on earth"
    triangulation: "ETCSL 1.3.2 lines 1-24 confirmed. Note: the term 'me-lam' appears more explicitly at lines 53-58 where Inanna 'bedecked her forehead with terror and fearsome radiance.' The opening section uses related imagery ('clad in terror,' 'wearing fearsome terror') but the Sumerian term me-lam is rendered variably across translations."

  - claim_number: 6
    claim: "Inanna declares her supremacy in battle: she is the goddess who overwhelms lands, who roars at the earth, who crushes those who do not show her proper reverence."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 1-9"
    verbatim_quote: "In heaven and on earth you roar like a lion and devastate the people. Like a huge wild bull you triumph over lands which are hostile to you. You make the people of all the lands prostrate themselves at your feet."

  - claim_number: 8
    claim: "Ebih's luxuriant vegetation, its wild animals, and its general splendour are described; the mountain is presented as flourishing and self-sufficient, indifferent to Inanna's authority."
    source_id: "etcsl"
    source_loc: "1.3.2"
    verbatim_quote: "Its trees grew tall... wild bulls bowed their horns... it was a mountain range that wore a crown on its head towards the clear sky"
    triangulation: "ETCSL 1.3.2 An's speech (lines 112-127) describes Ebih's splendour with abundant vegetation and wildlife imagery."

  - claim_number: 9
    claim: "Inanna is enraged by Ebih's refusal to submit and resolves to destroy the mountain."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 25-36"
    verbatim_quote: "as I, the goddess, approached the mountain it showed me no respect, as I, Inana, approached the mountain it showed me no respect... it did not put its nose to the ground for me, it did not rub its lips in the dust for me"

  - claim_number: 10
    claim: "Inanna travels to the sky god An (Anu), the father of the gods, to seek his support and sanction for her planned assault on Ebih."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 59-79"
    verbatim_quote: "An, my father, I greet you!"
    triangulation: "ETCSL 1.3.2 confirms Inanna addresses An at line 65. Note: An is called 'king of the deities' at line 112, not 'father of the gods.' Inanna calls him 'my father' personally. See also glossary finding below."

  - claim_number: 11
    claim: "An warns Inanna against attacking Ebih, counselling caution: the mountain is fearsome and its power should not be underestimated."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 112-127"
    verbatim_quote: "An, the king of the deities, answered her: 'My little one demands the destruction of this mountain...'"
    triangulation: "ETCSL 1.3.2 line 112 confirmed. An's response warns about the mountain's fearsomeness and questions Inanna's ambition."

  - claim_number: 12
    claim: "Inanna rejects An's warning outright; she declares she will attack Ebih regardless of his counsel."
    source_id: "etcsl"
    source_loc: "1.3.2, line 131"
    verbatim_quote: "The mistress, in her rage and anger, opened the arsenal and pushed on the lapis lazuli gate."
    triangulation: "ETCSL 1.3.2 line 131 confirms Inanna proceeds to attack despite An's warning. She opens her arsenal immediately."

  - claim_number: 15
    claim: "The destruction sequence is described in escalating detail: Inanna sends fire and flood against the mountain, devastating its forests and killing its wildlife."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 131-151"
    verbatim_quote: "She raised a towering flood with evil silt... She poured fire on its flanks and made its smoke dense... She killed its oak trees with drought."
    triangulation: "ETCSL 1.3.2 confirms fire, flood, and drought in the assault sequence. The destruction involves multiple elements: storm, flood, fire, drought."

  - claim_number: 18
    claim: "The mountain Ebih is utterly destroyed; it lies devastated and submissive before Inanna's power."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 145-165"
    verbatim_quote: "The goddess established authority over the mountain. Holy Inana did as she wished."

  - claim_number: 19
    claim: "Inanna declares victory over Ebih, celebrating her triumph in a self-praising speech that mirrors the opening hymnic section."
    source_id: "etcsl"
    source_loc: "1.3.2, lines 152-184"
    verbatim_quote: "Mountain range, because of your elevation, because of your height, because of your attractiveness, because of your beauty... because you did not put your nose to the ground, because you did not rub your lips in the dust, I have killed you and brought you low."
    triangulation: "The closing speech (lines 152-165) echoes the complaint language from lines 25-36, creating a deliberate frame. Lines 182-184 close: 'For destroying Ebih, great child of Suen, maiden Inana, be praised. Nisaba be praised.'"

  - claim_number: 25
    claim: "The rhetorical structure of the text is deliberately escalatory: hymnic opening establishing Inanna's power, the mountain's defiance, An's futile warning, and overwhelming destruction, all framed by matching hymnic passages."
    source_id: "black-2004"
    source_loc: "pp. 71-72"
    verbatim_quote: "The composition begins and ends with hymnic framing passages. The opening celebrates Inanna's terrifying martial power; the closing mirrors this with victory celebration."
    triangulation: "ETCSL 1.3.2 structure confirmed: lines 1-24 (hymnic opening), 25-52 (mountain's defiance), 53-111 (petition to An with repeated elements), 112-130 (An's response), 131-175 (assault and victory), 176-184 (hymnic closing with praise formula)."

findings:
  - claim_number: 7
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Mount Ebih -- a great mountain in the eastern ranges, identified by scholars with the Jebel Hamrin -- refuses to bow before Inanna and does not prostrate itself in reverence."
    issue: "The identification of Ebih with Jebel Hamrin is widely accepted in Assyriological scholarship (Hallo, Lambert, Edzard) but is not universally settled. The ETCSL text itself does not make this modern geographical identification. The citation to Black et al. 2004 p. 72 could not be live-verified for whether it explicitly states this identification. The mountain's refusal to bow is well attested in ETCSL."
    evidence: "Wikipedia article on Ebih cites Hallo and Lambert for the Jebel Hamrin identification. ETCSL 1.3.2 confirms the mountain's defiance: 'it showed me no respect... it did not put its nose to the ground for me.' The geographical identification is a scholarly interpretation, not a textual claim."
    recommended_fix: "Verify that Black et al. 2004 p. 72 explicitly identifies Ebih with Jebel Hamrin. If so, retain. If not, add a more specific scholarly source. The qualifier 'identified by scholars' is appropriate."

  - claim_number: 10
    kind: "GLOSSARY-VIOLATION"
    severity: "LOW"
    claim: "Inanna travels to the sky god An (Anu), the father of the gods, to seek his support and sanction for her planned assault on Ebih."
    issue: "The parenthetical '(Anu)' uses the Akkadian form of the god's name. The glossary.yaml and scope.md consistently exclude Akkadian forms (Ea, Ishtar, Tammuz, Humbaba, Sin, Anzu). 'Anu' is the Akkadian equivalent of Sumerian 'An.' Additionally, 'father of the gods' is not the ETCSL term; the text calls An 'king of the deities' (line 112) and Inanna addresses him as 'my father' personally."
    evidence: "ETCSL 1.3.2 line 112: 'An, the king of the deities, answered her.' scope.md: 'Akkadian/Babylonian literary tradition... Excludes.' Glossary never_use entries: Ea, Ishtar, Tammuz, Humbaba, Sin, Anzu."
    recommended_fix: "Remove the parenthetical '(Anu)' and use 'the sky god An.' Replace 'father of the gods' with 'king of the deities' to match the ETCSL terminology, or mark the 'father' epithet as based on Inanna's personal address."

  - claim_number: 14
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Inanna unleashes her full martial fury against Mount Ebih, attacking with weapons of war and cosmic power."
    issue: "The footnote cites 'lines approx. 100-155' but the actual assault begins at line 131 (Inanna opens the arsenal) with the physical confrontation at line 138. Lines 100-130 contain Inanna's repeated speech and An's response. The line range is misleadingly broad."
    evidence: "ETCSL 1.3.2 line 131: 'The mistress, in her rage and anger, opened the arsenal.' Line 138: 'My lady confronted the mountain range. She advanced step by step.' Lines 100-112 are speech repetition; lines 112-127 are An's response."
    recommended_fix: "Correct the line range to 'lines 131-165' or 'lines 131-175' to accurately reflect where the assault begins."

  - claim_number: 16
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "Inanna pours poison over the mountain's flanks; the vegetation withers and the animals flee or die."
    issue: "The ETCSL text does NOT say Inanna pours poison over the mountain. The text says: (a) 'She poured fire on its flanks and made its smoke dense' and (b) 'From its sides and crevices great serpents spat venom.' The venom/poison comes from serpents, not from Inanna. Inanna pours FIRE, not poison. This conflates two distinct textual elements -- serpent venom and divine fire -- into a fabricated action attributed to Inanna."
    evidence: "ETCSL 1.3.2 line 144: 'From its sides and crevices great serpents spat venom. She damned its forests and cursed its trees. She killed its oak trees with drought. She poured fire on its flanks and made its smoke dense.' Inanna's actions: fire, drought, cursing. Serpents' action: spitting venom."
    recommended_fix: "Rewrite to accurately reflect the ETCSL text: 'Inanna pours fire over the mountain's flanks and kills its trees with drought; from the mountain's crevices, great serpents spit venom.' Cite ETCSL 1.3.2, lines 144-145."

  - claim_number: 17
    kind: "MARKER-FABRICATED"
    severity: "HIGH"
    claim: "[LACUNA: Minor gaps in lines 140-155 affecting the description of Inanna's assault on the mountain; some details of the destruction sequence are broken.]"
    issue: "There are NO lacunae in lines 140-155 of ETCSL 1.3.2. The assault narrative in this range flows continuously without gaps. The actual lacunae in the composition are concentrated in earlier sections: lines 10-22 (cosmic powers), lines 41-44 (weapon preparation), lines 65-88 (declarations and divine authority), and lines 100-107 (repeated speech). The LACUNA marker fabricates gaps where none exist."
    evidence: "Live verification of ETCSL 1.3.2 translation confirms no ellipses ('......') or gap markers in lines 131-165 (the entire assault section). Lacunae are found at lines 10-22, 41-44, 65-88, 100-107, and 121-126 -- all in preparatory/theological sections."
    recommended_fix: "Remove the false LACUNA marker for lines 140-155. If lacunae are to be noted, they should reference the actual gap locations: lines 10-22, 41-44, 65-88, 100-107, and 121-126. The brief's lacunae section should also be corrected."

  - claim_number: 20
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The text closes with a hymnic frame celebrating Inanna's irresistible destructive power: no force in heaven or earth can withstand her once she has resolved to act."
    issue: "The closing section (lines 152-184) does celebrate Inanna's power, but the specific phrasing 'no force in heaven or earth can withstand her once she has resolved to act' is an interpretive summary, not a direct textual claim. The closing lines praise her for 'destroying Ebih' and call her 'great child of Suen, maiden Inana,' but do not make the universal invincibility claim as stated."
    evidence: "ETCSL 1.3.2 closing: 'For destroying Ebih, great child of Suen, maiden Inana, be praised.' The preceding victory speech addresses the defeated mountain specifically, not a universal claim about invincibility."
    recommended_fix: "Add an [INFERENCE:] marker to the phrase 'no force in heaven or earth can withstand her once she has resolved to act,' or rephrase to stay closer to the text: 'The text closes with a hymnic frame celebrating Inanna's triumph over Ebih and praising her as the destroyer of the mountain.'"

  - claim_number: 21
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The composition demonstrates that Inanna acts independently of the divine hierarchy: she defies An's warning, attacks alone, and triumphs, asserting her rank among the gods through deeds rather than permission."
    issue: "The footnote cites 'ETCSL 1.3.2, lines 50-75' for the defiance of An, but An's speech does not begin until line 112 and Inanna's rejection is at line 131. Lines 50-75 contain Inanna's petition TO An, not her defiance OF his warning. The claim content is accurate but the line numbers are wrong."
    evidence: "ETCSL 1.3.2: Inanna addresses An at line 65. An responds at line 112. Inanna proceeds to attack at line 131. Lines 50-75 are her petition, not her defiance."
    recommended_fix: "Correct the line reference to 'lines 112-145' (An's warning through Inanna's assault) or 'lines 131-165' (Inanna's independent action and triumph)."

  - claim_number: 22
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The motif of Inanna as irresistible destroyer is echoed in royal hymns and inscriptions invoking her patronage in warfare."
    issue: "The citation to Kramer 1961 pp. 83-85 is WRONG. Kramer 1961 pp. 83-85 discuss 'Inanna's Descent to the Netherworld,' not 'Inanna and Ebih.' The Inanna and Ebih section in Kramer appears at approximately pp. 82-83 (the third version of the dragon-slaying myth in Chapter III). Additionally, the claim about royal hymns echoing Inanna's martial motif is plausible but Kramer's treatment at pp. 82-83 focuses on the narrative itself, not on royal hymn parallels. The citation also violates the blacklist rule: 'Kramer 1961 cited without ETCSL cross-check.'"
    evidence: "Kramer 1961 Chapter III 'Myths of Kur': Inanna and Ebih appears at pp. 82-83. Inanna's Descent to the Netherworld begins at p. 83 and runs to approximately p. 96. The cited pages 83-85 overlap with the Descent section, not the Ebih section. Verified via earth-history.com reproduction and sacred-texts.com index."
    recommended_fix: "Correct the page reference to pp. 82-83 and add ETCSL cross-reference per blacklist rule. The claim about royal hymns needs a different source -- Kramer does not discuss royal hymn parallels at these pages. Consider citing ETCSL or a more specific secondary source."

  - claim_number: 23
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Kramer identifies the text as key evidence for understanding Inanna's martial aspect, which exists alongside her roles as goddess of love and political power."
    issue: "Same page-citation problem as claim 22. Kramer does discuss Inanna's dual nature ('conceived not only as the goddess of love but also as the goddess of battle and strife') but this appears at pp. 82-83, not pp. 83-85. The cited pages 83-85 correspond to Inanna's Descent. Additionally, Kramer 1961 is cited alone without ETCSL cross-check, violating the blacklist rule."
    evidence: "Kramer 1961 at approximately pp. 82-83: 'Inanna, to judge from our literary material, was conceived not only as the goddess of love but also as the goddess of battle and strife.' This confirms the claim content but not the cited page numbers."
    recommended_fix: "Correct the page reference to pp. 82-83. Add ETCSL cross-reference per blacklist rule."

  - claim_number: 24
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Jacobsen briefly discusses the composition in the context of Inanna's martial character, noting the 'deity vs. mountain' topos as a significant pattern in Sumerian literary tradition."
    issue: "Jacobsen 1987 pp. 112-114 does NOT discuss 'Inanna and Ebih.' These pages contain the beginning of the 'Hymn to Inanna as Warrior, Star, and Bride' -- a translation of a different Sumerian composition (likely an Inanna hymn, not ETCSL 1.3.2). Jacobsen's 'The Harps That Once' does NOT include a translation or discussion of 'Inanna and Ebih' at all, based on the table of contents verified via Google Books and De Gruyter. The 'deity vs. mountain' topos attribution to Jacobsen at these pages appears fabricated."
    evidence: "Jacobsen 1987 table of contents verified: Part Three 'Hymns to Gods' includes 'Hymn to Inanna' at pp. 112-124. This is titled 'Hymn to Inanna as Warrior, Star, and Bride' (De Gruyter listing). The book does not contain 'Inanna and Ebih.' Part Four 'Myths' includes Inanna's Descent (p. 205), Ninurta Myth/Lugal-E (p. 233), but not Inanna and Ebih."
    recommended_fix: "Remove the Jacobsen 1987 citation entirely, as the book does not treat 'Inanna and Ebih.' If the 'deity vs. mountain' topos needs a scholarly reference, find an alternative source (e.g., Attinger's work on this composition, or the ETCSL bibliography which cites Limet 1971 and Bottero & Kramer 1989)."

  - claim_number: 13
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE: Inanna's defiance of An's counsel and her subsequent independent triumph demonstrate her supremacy even over the highest authority in the divine hierarchy.]"
    issue: "The INFERENCE marker is correctly applied -- this is an interpretation. However, characterizing An as 'the highest authority in the divine hierarchy' is debatable. In the Nippur theological tradition, Enlil holds executive authority while An holds nominal supremacy. The ETCSL text itself calls An 'king of the deities' (line 112), which supports the framing, but the risk note understates the scholarly complexity."
    evidence: "ETCSL 1.3.2 line 112: 'An, the king of the deities.' In other Sumerian compositions, Enlil exercises executive power. The inference is reasonable but the hierarchical claim could be more nuanced."
    recommended_fix: "Revise 'the highest authority' to 'the nominal head of the divine hierarchy' or 'the king of the deities.' Strengthen the risk note to acknowledge Enlil's executive role."
