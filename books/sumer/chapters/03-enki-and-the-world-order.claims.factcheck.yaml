supported_claims:
  - claim_number: 1
    claim: "The composition 'Enki and the World Order' is catalogued as ETCSL 1.1.3 and extends to approximately 473 lines."
    source_id: etcsl
    source_loc: "1.1.3, composite text, lines 1-472"
    verbatim_quote: "The ETCSL composite text extends to line 472. The claims document says 'approximately 473 lines' which is close but imprecise; the actual count is 472 lines per the ETCSL composite and the 2025 Cooper critical edition."

  - claim_number: 2
    claim: "The text is reconstructed from multiple Old Babylonian manuscripts from Nippur; no competing recension from another site is known."
    source_id: etcsl
    source_loc: "1.1.3, manuscript list / bibliography page"
    verbatim_quote: "The ETCSL bibliography page for 1.1.3 lists 29 manuscripts. Most are from Nippur (Ni, N, 3N-T series), though some tablets are in collections (CBS, HS, UM, AO series) whose exact provenance is less certain. No competing recension from a non-Nippur site is known; the claim is essentially correct though 'from Nippur' slightly overstates the provenance certainty for all witnesses."

  - claim_number: 4
    claim: "The composition opens with a long self-praise speech by Enki, in which he extols his own wisdom, power, and role as organiser of the cosmos under the authority of Enlil and An."
    source_id: etcsl
    source_loc: "1.1.3, lines 1-60"
    verbatim_quote: "Grandiloquent lord of heaven and earth, self-reliant, Father Enki ... planted in the Abzu, rising over all lands ... I am the principal among all rulers."

  - claim_number: 7
    claim: "Enki travels to Sumer and blesses it, establishing its abundance and declaring its pre-eminence among all lands."
    source_id: etcsl
    source_loc: "1.1.3, lines approx. 80-120"
    verbatim_quote: "He proceeded to the shrine Sumer ... Enki decreed the fate of Sumer: 'Great mountain, land of heaven and earth, trailing glory, bestowing powers on the people from sunrise to sunset.'"

  - claim_number: 8
    claim: "Enki visits Ur and blesses it as a prosperous city of trade and livestock, the seat of the moon god Nanna-Suen."
    source_id: etcsl
    source_loc: "1.1.3, lines approx. 100-120"
    verbatim_quote: "He proceeded to the shrine Ur ... Enki, the lord of the Abzu, decreed its fate: 'City whose lot has been cast, well provided with a crown, rising high to heaven ...'"

  - claim_number: 11
    claim: "Enki blesses Dilmun, the trading island, decreeing that Dilmun's ships shall carry goods between the lands."
    source_id: etcsl
    source_loc: "1.1.3, lines approx. 238-247"
    verbatim_quote: "He cleansed and purified the land Dilmun. He placed Ninsikila in charge of it."

  - claim_number: 13
    claim: "Enki fills the Tigris (Idigna) with sparkling water and appoints the god Enbilulu as its inspector, the 'canal-controller of the gods.'"
    source_id: etcsl
    source_loc: "1.1.3, lines 250-273"
    verbatim_quote: "He stood up full of lust like a rampant bull, lifted his penis, ejaculated and filled the Tigris with flowing water ... Enki placed in charge of all this him who ... submits to verification the devouring force of Tigris and Euphrates ... Enbilulu, the inspector of waterways."

  - claim_number: 15
    claim: "Enki organises brickmaking, building, and construction, assigning the god Kulla to brick-moulding and Mushdamma to architecture."
    source_id: etcsl
    source_loc: "1.1.3, lines 335-348"
    verbatim_quote: "Enki placed in charge of all this him whose sharp-bladed hoe is a corpse-devouring snake, whose brick mould ... -- Kulla, who bricks in the Land ... Enki placed in charge of all this him whose foundations once laid do not sag, whose good houses once built do not collapse ... Mucdama, Enlil's master builder."

  - claim_number: 17
    claim: "After all other gods have received their domains, Inanna comes before Enki to protest that she has been given no clear portfolio or office."
    source_id: etcsl
    source_loc: "1.1.3, lines 387-451"
    verbatim_quote: "Inana came in to see her father Enki in his house, weeping to him ... 'I am holy Inana -- where are my functions?'"

  - claim_number: 18
    claim: "Inanna itemises the powers and offices given to other deities and contrasts them with her own lack of a defined domain."
    source_id: etcsl
    source_loc: "1.1.3, lines 387-430"
    verbatim_quote: "Inanna lists the offices given to other deities and asks Enki 'why have you treated me, the woman, differently?'"

  - claim_number: 19
    claim: "Enki responds to Inanna by listing the powers she does in fact possess — including the ability to destroy the indestructible and to make the powerful weak."
    source_id: etcsl
    source_loc: "1.1.3, lines 440-472"
    verbatim_quote: "Inana, you destroy what should not be destroyed; you create what should not be created."

  - claim_number: 20
    claim: "[INFERENCE: Inanna's complaint and Enki's response position her as the goddess who transcends and destabilises the very categories that Enki has established]"
    source_id: black-2004
    source_loc: "pp. 224-225"
    verbatim_quote: "The ETCSL text places Inanna's complaint as the compositional climax after the entire ordering is complete; Enki's response characterises her powers as paradoxical disruptions of categories. The inference is sound interpretive framing consistent with scholarly readings."

  - claim_number: 21
    claim: "Inanna's complaint at the close of the composition sets up narratively the tensions explored in later Inanna-cycle texts."
    source_id: black-2004
    source_loc: "pp. 224-225"
    verbatim_quote: "This is a scholarly interpretive claim. The thematic connection between Inanna's dissatisfaction here and her aggressive acquisition of the me in 'Inanna and Enki' (ETCSL 1.3.1) and her descent in 'Inanna's Descent' (ETCSL 1.4.1) is a standard scholarly reading."

  - claim_number: 22
    claim: "The composition's length (~470 lines) and its attestation in multiple OB manuscript witnesses from Nippur indicate its importance in the scribal curriculum."
    source_id: etcsl
    source_loc: "1.1.3, manuscript list"
    verbatim_quote: "The ETCSL lists 29 manuscript witnesses for composition 1.1.3. CDLI catalogues it as P469516. The composition extends to 472 lines, confirming it as one of the longest Sumerian narrative compositions."

findings:
  - claim_number: 5
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Enki declares that his father Enlil has entrusted him with the task of organising the world."
    issue: "The claim says 'his father Enlil' but in the ETCSL text and standard Sumerian theology, Enki's father is An, not Enlil. Enlil is Enki's brother. The text says 'My father, the king of heaven and earth' referring to An, and separately describes Enlil as Enki's 'elder brother' who grants him authority. The claim conflates two relationships."
    evidence: "ETCSL 1.1.3: 'Father Enki, whom An has begotten' (opening section). Enlil is described as Enki's 'elder brother, the king of all the lands' who placed the me in Enki's hand. The kinship term 'father' applied to Enlil is incorrect."
    recommended_fix: "Change 'his father Enlil' to 'Enlil, his elder brother' or 'An (his father) and Enlil have entrusted him.' The delegation of authority from Enlil to Enki is correct, but the kinship term is wrong."

  - claim_number: 9
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Enki blesses Meluhha (identified with the Indus Valley region or coastal East Africa), praising its exotic trees, gold, tin, and precious stones."
    issue: "Two problems. (1) The identification of Meluhha with 'coastal East Africa' is a fringe hypothesis; the scholarly consensus identifies Meluhha with the Indus Valley/Harappan region (Parpola, Possehl). Including it as co-equal is misleading. (2) The ETCSL text does not list 'gold, tin, and precious stones' as separate commodities. The actual blessing says 'May your silver be gold, may your copper be tin (and) bronze' — these are transformative wishes, not a list of trade goods. The claim misrepresents the text's content."
    evidence: "ETCSL 1.1.3 Meluhha section: 'Black land, your trees will be large trees ... May your silver be gold, May your copper be tin (and) bronze.' The 'precious stones' are not mentioned in this passage. The trade goods mentioned are trees, reeds, and transformed metals."
    recommended_fix: "Remove 'or coastal East Africa' (or relegate to a footnote as a marginal hypothesis). Correct the trade goods description to match the ETCSL text: Enki blesses Meluhha's trees and wishes its silver to become gold and its copper to become tin and bronze. Remove 'precious stones' unless a specific ETCSL line reference can be provided."

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Enki visits Elam and Markhashi (eastern lands) and decrees their fates, though the passage is partially damaged."
    issue: "The line reference 'lines 160-180' is approximately correct but the content is mischaracterised. In the ETCSL text, Enki does not 'bless' Elam and Marhashi — they are described as enemies to be destroyed: 'Elam and Marhashi were destined to be devoured like fish; a king upon whom Enlil had bestowed might destroyed their houses and walls.' Their precious metal and lapis lazuli are taken as spoils to Nippur for Enlil. The claim implies a neutral 'decreeing of fates' when the text describes conquest and plunder."
    evidence: "ETCSL 1.1.3: 'Elam and Marhashi were destined to be devoured like fish.' Their goods are taken to Nippur. This is a hostile decree, not a blessing analogous to the treatment of Sumer, Ur, Meluhha, or Dilmun."
    recommended_fix: "Rephrase to clarify that Enki decrees a hostile fate for Elam and Marhashi — they are to be conquered and their wealth taken to Nippur. This is a subjugation, not a neutral assignment of destiny."

  - claim_number: 14
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Enki fills the Euphrates (Buranuna) with life-giving water and establishes it as a source of abundance for the land."
    issue: "The ETCSL text does not describe a separate act of filling the Euphrates. The sexually explicit passage at lines 250-266 describes Enki filling the Tigris specifically. The Euphrates is mentioned at line 268 alongside the Tigris ('the devouring force of Tigris and Euphrates') in the Enbilulu appointment passage. The claims document treats the Euphrates as having its own separate section at lines 270-285, but this section actually covers the appointment of Enbilulu over both rivers and the transition to marshlands."
    evidence: "ETCSL 1.1.3, lines 250-266: 'filled the Tigris with flowing water' — only the Tigris is named in the filling act. Lines 267-273: Enbilulu appointed over 'Tigris and Euphrates' together. Lines 274+: marshes and reedbeds. There is no parallel passage where Enki separately fills the Euphrates."
    recommended_fix: "Merge the Tigris and Euphrates claims into one, noting that Enki fills the Tigris and then appoints Enbilulu over both rivers. Or rephrase to say that Enki orders both rivers and appoints Enbilulu as their inspector, noting that the Tigris receives the more dramatic treatment in the text."

  - claim_number: 16
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Enki assigns Utu the sun god to oversee justice and the boundaries between lands."
    issue: "The line reference 'lines 380-390 (approximate)' is wrong. According to the ETCSL text, the Utu passage is at lines 368-380, not 380-390. Lines 380-386 cover Uttu (the weaving goddess), not Utu (the sun god). The claims document's own structure creates a contradiction: it places brickmaking at lines 375-395 (claim 15) and Utu at lines 380-390, creating an impossible overlap. Additionally, the secondary citation is Kramer 1961 pp. 60-61 without ETCSL cross-check, violating the blacklist rule."
    evidence: "ETCSL 1.1.3: Utu is appointed at approximately lines 368-380: 'Enki placed in charge of the whole of heaven and earth the youth Utu, the judge who searches out verdicts for the gods.' Lines 381-386 then cover Uttu the weaving goddess. ETCSL composite text confirms Utu (dutu) appears at lines 362, 375, 379."
    recommended_fix: "Correct line reference to approximately lines 368-380. Remove the '(approximate)' qualifier and verify against the ETCSL composite text. Add ETCSL as primary citation; Kramer 1961 can remain as secondary. The characterisation of Utu's role (justice and boundaries) is correct — Enki entrusted Utu with borders and judging."

  - claim_number: 3
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The composition reveals the Sumerian conception of cosmic bureaucracy more fully than any other single text in the corpus."
    issue: "This is a superlative comparative judgment. While consistent with scholarly consensus about this composition's significance, it is an editorial characterisation. Without access to the exact passage in Black et al. 2004 pp. 215-225, the precise wording cannot be confirmed."
    evidence: "The claim is consistent with how scholars describe this composition. Black et al. 2004 pp. 215-225 covers this text and likely makes a comparable characterisation."
    recommended_fix: "No change needed if Black et al. 2004 pp. 215-225 uses comparable language. Verify against the physical book. Consider softening to 'one of the most complete portraits' if the superlative cannot be confirmed."

  - claim_number: 10
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The me assignments in this composition mirror the temple-administrative hierarchies attested in contemporary royal inscriptions from the Ur III and Old Babylonian periods."
    issue: "Cited only to Kramer 1961 pp. 59-62 with no ETCSL cross-reference, violating the blacklist rule. This is also a comparative-historical claim requiring knowledge of royal inscriptions — it goes beyond what the primary text says. Cannot verify against physical Kramer 1961."
    evidence: "EVIDENCE line: source_id=kramer-1961 ; loc=pp. 59-62. No ETCSL cross-reference. Blacklist rule: 'Kramer 1961 cited without ETCSL cross-check.'"
    recommended_fix: "Add a proper secondary scholarly reference that documents the parallel between me-lists and administrative hierarchies, or mark with [INFERENCE:] since it involves interpretive comparison. Do not cite Kramer 1961 alone for textual claims."

  - claim_number: 6
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "The me — divine powers or cultural blueprints governing civilisation's arts and institutions — are presented as the instruments through which Enki organises the world."
    issue: "The characterisation 'cultural blueprints governing civilisation's arts and institutions' is a scholarly gloss from Black et al. 2004, not a direct translation of what the ETCSL text says at lines 60-80. The text says 'he placed the me in my hand' without elaborating on the me concept in the way the claim does. This blends primary text reference with secondary scholarly interpretation without an [INFERENCE:] marker."
    evidence: "ETCSL 1.1.3 mentions the me being placed in Enki's hands. The elaborate definition is scholarly interpretation, not direct textual content."
    recommended_fix: "Split into two claims: (1) the me are mentioned in this section as instruments Enki wields (textual claim, cite ETCSL), and (2) scholars characterise the me as cultural blueprints governing civilisation (interpretive claim, cite Black 2004). Or add [INFERENCE:] marker."

  - claim_number: 20
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE: Inanna's complaint and Enki's response position her as the goddess who transcends and destabilises the very categories that Enki has established]"
    issue: "The [INFERENCE:] marker is appropriate for the specific framing ('outsider to the system of order'), but the marker text says 'This reading follows Kramer and Black' — if both scholars explicitly make this argument, it could be cited as a supported scholarly interpretation rather than an inference. The risk assessment is appropriately noted."
    evidence: "The marker acknowledges 'This reading follows Kramer and Black but involves interpretive framing of Inanna's theological role.' The ETCSL text ('you destroy what should not be destroyed; you create what should not be created') supports the reading."
    recommended_fix: "If Kramer and Black explicitly characterise Inanna as destabiliser of cosmic categories, convert to a supported claim citing both. If the specific framing is editorial synthesis, the INFERENCE marker is correct. Verify against the sources."

