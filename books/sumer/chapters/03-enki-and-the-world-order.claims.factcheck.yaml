findings:
  - claim_number: 5
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Enki declares that his father Enlil has entrusted him with the task of organising the world."
    issue: "The claim states 'his father Enlil' but in the ETCSL text Enki's father is An (Anu), not Enlil. Enlil is Enki's brother or peer in the Sumerian divine hierarchy. The text says 'My father, the king of heaven and earth' which refers to An, and separately mentions Enlil as granting authority. The claim conflates two different relationships."
    evidence: "ETCSL 1.1.3 opens with references to An as Enki's progenitor: 'Father Enki, whom An has begotten.' Enlil appears as the one who grants Enki authority over the ordering of the world, but is not called Enki's father in this text. In standard Sumerian theology, An is Enki's father; Enlil is his brother."
    recommended_fix: "Change 'his father Enlil' to 'Enlil' or rephrase to 'An (his father) and Enlil have entrusted him with the task of organising the world.' The claim correctly states that Enlil delegated authority to Enki, but the kinship term 'father' is wrong when applied to Enlil."

  - claim_number: 9
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Enki blesses Meluhha (identified with the Indus Valley region or coastal East Africa), praising its exotic trees, gold, tin, and precious stones."
    issue: "The identification of Meluhha with 'coastal East Africa' is a minority view. The mainstream scholarly consensus identifies Meluhha with the Indus Valley / Harappan civilization region. Additionally, 'tin' is not securely attested in the Meluhha blessing passage; the goods mentioned vary across translations."
    evidence: "The Indus Valley identification is standard (Parpola, Possehl). The East Africa hypothesis is very marginal. The specific list 'gold, tin, and precious stones' may not match the ETCSL translation precisely — carnelian and other specific items are mentioned rather than generic 'precious stones.'"
    recommended_fix: "Remove 'or coastal East Africa' (or note it only as a highly marginal hypothesis). Verify the exact trade goods against the ETCSL translation — 'tin' should be checked specifically, as the Meluhha passage emphasizes different commodities."

  - claim_number: 12
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Enki visits Elam and Markhashi (eastern lands) and decrees their fates, though the passage is partially damaged."
    issue: "The line range 160-180 for the Elam and Markhashi passage cannot be precisely confirmed without live ETCSL access. The content is broadly correct — Enki does decree fates for Elam and Markhashi — but the exact line numbers may be off. The ETCSL composite text structure places the foreign lands section in this general area but line numbering varies in different editions."
    evidence: "ETCSL 1.1.3 does include a passage on Elam and Markhashi among the foreign lands that Enki visits. Exact line numbers not independently verified in this audit."
    recommended_fix: "Verify line numbers 160-180 against the live ETCSL composite text. The claim content appears sound but the line reference needs confirmation."

  - claim_number: 16
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Enki assigns Utu the sun god to oversee justice and the boundaries between lands."
    issue: "The line reference 'lines 380-390 (approximate)' is problematic. In the ETCSL composite text, the Utu passage does not clearly fall in lines 380-390. The text around lines 380-395 concerns brickmaking and construction (Kulla and Mushdamma), not Utu. The Utu passage appears earlier in the composition, and its exact location depends on the composite text reconstruction. The '(approximate)' qualifier itself is a red flag — claims documents should have verified line numbers. Additionally, the secondary source cited is Kramer 1961 pp. 60-61 without an ETCSL cross-check, which violates the blacklist rule against citing Kramer alone."
    evidence: "The claims document itself places brickmaking at lines 375-395 (claim 15) and animal husbandry at lines 395-415 (claim 16). The Utu claim at lines 380-390 overlaps with the brickmaking section, suggesting a line-number error. Kramer 1961 is cited as the secondary source without ETCSL verification."
    recommended_fix: "Locate the Utu passage in the ETCSL composite text and correct the line reference. Utu's assignment likely occurs in a different part of the composition. Also add a proper ETCSL cross-reference to satisfy the blacklist rule about not citing Kramer 1961 alone."

  - claim_number: 3
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The composition reveals the Sumerian conception of cosmic bureaucracy more fully than any other single text in the corpus."
    issue: "This is a superlative comparative judgment ('more fully than any other single text'). While it is a reasonable scholarly characterization found in Black et al. 2004, it is an interpretive claim rather than a verifiable fact. Without access to the exact Black 2004 passage, I cannot confirm the precise wording."
    evidence: "The characterization is consistent with scholarly consensus about this composition's importance, but the superlative formulation needs a direct quote from Black et al. 2004 pp. 215-225 to be confirmed."
    recommended_fix: "No change needed if Black et al. 2004 pp. 215-225 uses comparable language. Verify against the physical book."

  - claim_number: 18
    kind: "UNVERIFIED"
    severity: "LOW"
