    status: MAPPED
    notes: "Narrative: 'The journey to the Cedar Forest is described with more attention to the heroes' emotional response as they approach Huwawa's domain -- the forest is a place of dread, and the text dwells on the fear inspired by the guardian's terrifying presence. Version B's journey section has significant textual gaps, and this characterisation is based on surviving portions supplemented by scholarly inference.' Faithful."

