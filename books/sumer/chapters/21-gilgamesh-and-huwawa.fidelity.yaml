  # === Version B — Narrative sequence ===

  - claim_id: C21
    claim_summary: "Version B opens with similar motivation but greater emphasis on psychological dimension: fear, hesitation, emotional burden"
    narrative_location: "line 88 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'Version B opens with a similar motivation -- Gilgamesh's desire to enter the Cedar Mountain and establish a name -- but places greater emphasis on the psychological dimension: fear, hesitation, and the emotional burden of the quest.' Faithful."

  - claim_id: C22
    claim_summary: "Version B journey described with more attention to emotional response; forest is place of dread; significant textual gaps; characterisation based on surviving portions + scholarly inference"
