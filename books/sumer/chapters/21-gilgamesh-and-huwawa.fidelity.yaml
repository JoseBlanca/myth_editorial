  # === Comparison of the two versions ===

  - claim_id: C25
    claim_summary: "Two versions share same narrative kernel but differ in emphasis: Version A foregrounds cleverness of trick and ethical ambiguity; Version B foregrounds psychology of fear and pathos"
    narrative_location: "line 112 (paragraph 21)"
    status: MAPPED
    notes: "Narrative: 'The two versions share the same narrative kernel -- journey, confrontation, trick, decapitation, Enlil's anger -- but differ in emphasis: Version A foregrounds the cleverness of the trick with the auras and the ethical ambiguity of the killing; Version B foregrounds the psychological experience of fear and the pathos of Huwawa's helplessness.' Faithful."

  - claim_id: C26
    claim_summary: "George distinguishes two Sumerian versions from each other and from Akkadian Cedar Forest episode; all three are independent literary treatments of shared tradition"
    narrative_location: "line 12 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'George devotes extensive discussion to distinguishing these two Sumerian versions from each other and from the Akkadian Cedar Forest episode (Tablets IV–V of the Standard Babylonian Gilgamesh epic), demonstrating that all three are independent literary treatments of a shared tradition.' Faithful."

  # === Thematic significance ===

  - claim_id: C27
    claim_summary: "Central question: whether desire for lasting fame can compensate for certainty of death"
    narrative_location: "line 22 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The composition raises the central question of Sumerian heroic literature: whether the desire for lasting fame can compensate for the certainty of death.' Faithful."

  - claim_id: C28
    claim_summary: "Ethical ambiguity of killing is deliberate: Huwawa doing Enlil's duty, trick is dishonourable, Enlil's anger confirms moral cost"
    narrative_location: "line 79 (paragraph 15)"
    status: MAPPED
    notes: "Narrative: 'The ethical ambiguity of this ending is a deliberate feature of the composition, not an accident of transmission. Huwawa was doing the duty Enlil assigned. The trick that disarmed him was dishonourable. And Enlil's anger at the heroes confirms that their victory comes at a moral cost.' Faithful."

  - claim_id: C28_INFERENCE
    claim_summary: "Redistribution of auras suggests aetiological function explaining why natural phenomena possess numinous quality; alternative: divine punishment"
    narrative_location: "line 77"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims. Faithful."

  - claim_id: C29
    claim_summary: "Me-lam wielded by Huwawa represents supernatural power that inheres in gods/kings/sacred objects; its use as bargainable weapon adds distinctive narrative twist"
    narrative_location: "line 55 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'The use of _me-lam_ here adds a distinctive narrative twist to the broader Sumerian understanding of supernatural power: the seven auras, representing the same divine radiance that inheres in gods and kings, can be bargained away like trade goods.' Faithful."

  - claim_id: C30
    claim_summary: "Didactic function in edubba: whether cleverness and ambition justify transgressing divine boundaries — question raised but not resolved"
    narrative_location: "line 115 (paragraph 22)"
    status: MAPPED
    notes: "Narrative: 'The narrative's didactic function in that _edubba_ context may have involved the question of whether cleverness and ambition justify transgressing divine boundaries -- a question the text raises but does not resolve.' Faithful."

  # === COMPARATIVE-HOOK comments ===

