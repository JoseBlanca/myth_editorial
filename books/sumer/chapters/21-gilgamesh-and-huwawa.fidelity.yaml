chapter: 21
title: "Gilgamesh and Huwawa: The Cedar Forest"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "Catalogued as ETCSL 1.8.1.5 (Version A) and ETCSL 1.8.1.5.1 (Version B); OB tablets from Nippur and other sites; Version A better-attested"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'survives in two independent Sumerian compositions: Version A (ETCSL 1.8.1.5, approximately 202 lines) and Version B (ETCSL 1.8.1.5.1, approximately 168 extant lines with additional gaps). Both are Old Babylonian Sumerian texts.' Faithful."

  - claim_id: C02
    claim_summary: "Two distinct Sumerian compositions telling the same story differently; Version A focuses on the trick with the auras, Version B emphasises fear"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'They tell the same story -- a journey, a confrontation, a killing, divine anger -- but they tell it differently... Where Version A foregrounds cleverness -- the trick that disarms a monster -- Version B foregrounds psychology: the fear that precedes the fight.' Faithful."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite text, supplemented by Black et al. 2004, pp. 269–278; George 2003"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Black et al. 2004, pp. 269–278; George 2003.' Verbatim. Faithful."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Two independent Sumerian compositions: Version A (~202 lines) and Version B (~168 extant lines with gaps); both OB Sumerian, independent of Akkadian Cedar Forest episode"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'Version A (ETCSL 1.8.1.5, approximately 202 lines) and Version B (ETCSL 1.8.1.5.1, approximately 168 extant lines with additional gaps). Both are Old Babylonian Sumerian texts, independent of the Akkadian Cedar Forest episode in the Standard Babylonian Gilgamesh epic.' Faithful."

  - claim_id: C05
    claim_summary: "Version A is longer, better preserved, more widely attested in OB copies; one of best-attested Gilgamesh poems"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'Version A is the longer and better preserved, one of the best-attested Gilgamesh poems in the Old Babylonian scribal curriculum, with more surviving copies than nearly any other Gilgamesh composition.' Faithful."

  - claim_id: C06
    claim_summary: "Version B is a shorter, distinct composition with its own manuscript tradition, well attested but fewer surviving copies than Version A"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'Version B is shorter, a distinct composition with its own manuscript tradition, well attested in its own right, though with fewer surviving copies than Version A.' Faithful."

  - claim_id: C07
    claim_summary: "Gilgamesh (Sumerian: Bilgames), king of Uruk (Sumerian: Unug), driven by desire for lasting fame as response to inevitability of death — central thematic concern"
    narrative_location: "line 19 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh (Sumerian: Bilgames), king of Uruk (Sumerian: Unug), announces his determination to journey to the Cedar Forest and establish a lasting name, explicitly citing mortality as his motivation: since death is inevitable, fame is the only enduring legacy.' And line 22: 'the driving force of the entire narrative is...the desire for lasting fame as a response to the inevitability of death.' Faithful."

  - claim_id: C08
    claim_summary: "Huwawa (not Humbaba) is fearsome guardian of Cedar Forest, appointed by Enlil, who wields seven supernatural terrors — manifestations of me-lam"
    narrative_location: "line 40 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Huwawa (not Humbaba, which is the later Akkadian form of the name) is the fearsome guardian of the Cedar Forest, appointed by Enlil...who wields seven supernatural terrors. These terrors are manifestations of _me-lam_ -- the terrifying divine radiance that emanates from gods, monsters, and sacred objects.' Faithful."

  - claim_id: C09
    claim_summary: "Enkidu serves as Gilgamesh's companion and guide through mountain passes to Cedar Forest"
    narrative_location: "line 31 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'Enkidu, companion and guide of Gilgamesh, serves as his partner through the mountain passes leading to the Cedar Forest.' Faithful."

