    claim_summary: "Hero vs. monstrous forest guardian (Beowulf); quest for immortal fame/kleos (Achilles); trick stripping supernatural powers (Samson & Delilah); ethical ambiguity of heroic kill"
    narrative_location: "lines 26, 44, 53, 82, 118"
