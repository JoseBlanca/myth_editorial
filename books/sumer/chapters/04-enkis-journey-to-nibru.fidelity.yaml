      location: "narrative line 20"
      text: >
        Modern archaeology has largely confirmed this claim to antiquity:
        Eridu is among the oldest known settlements in southern
        Mesopotamia. The Sumerians put it first in their king lists, and
        they were not wrong about the chronology, even if they expressed
        it in theological rather than archaeological terms.
      note: >
        Introduces a specific factual assertion about archaeological
        confirmation and king lists not present in the approved claims.
        While this is well-established scholarly knowledge, it is an
        unsourced factual claim going beyond the claims file. Consider
        adding a footnote or a corresponding claim.

    - id: "ADD-02"
      severity: "LOW"
      location: "narrative line 3"
      text: >
        the kind of thing scribal students copied and recopied until
        they knew it by heart
      note: >
        Editorial colour derived from the approved claim about it being
        a standard curriculum text. No new factual assertion.

    - id: "ADD-03"
      severity: "LOW"
      location: "narrative line 17"
      text: >
        This is not a building as we would understand it. It is a
        structure that reaches down into the freshwater deep and up
        toward the heavens, anchoring the cosmic order at the point
        where underground water meets the surface world.
      note: >
        Interpretive elaboration on the approved claim about cosmic
        grandeur and abzu foundations. Stays within the claim's scope.

    - id: "ADD-04"
      severity: "LOW"
      location: "narrative line 28"
      text: >
        The route is straightforward, and the text does not linger on
        intermediate stops. This is not a wandering odyssey but a
        purposeful transit — a god going from his home to the seat of
        central authority.
      note: >
        Editorial characterisation of the journey, directly derived
        from the claim that the route goes directly from Eridu to
        Nippur.

    - id: "ADD-05"
      severity: "LOW"
      location: "narrative line 33"
      text: >
        Extended discussion of the Eridu-Nippur axis as a defining
        structure of Sumerian political life; no king could rule
        legitimately without Nippur's approval.
      note: >
        Elaboration on the approved claim about political geography and
        central sanction. Editorial voice expanding on the claim's core
        point without introducing new mythological content.

    - id: "ADD-06"
      severity: "LOW"
      location: "narrative line 41"
      text: >
        The provisions he loaded at Eridu were not for the journey.
        They were for this moment — tribute from the southern city to
        the central authority. The banquet is the diplomatic instrument
        through which Enki makes his case. He does not argue. He feeds.
      note: >
        Interpretive framing of the banquet claim. Consistent with the
        approved claims about offerings and the legitimation function.

    - id: "ADD-07"
      severity: "LOW"
      location: "narrative line 44"
      text: >
        Extended reflection on the climax: Enki is a great god yet
        cannot simply declare his own authority; he must travel to
        Nippur and receive it from Enlil.
      note: >
        Editorial expansion of the divine legitimation claim.
        Restates the approved claim in more vivid terms without
        adding new factual content.

    - id: "ADD-08"
      severity: "LOW"
      location: "narrative line 47"
      text: >
        This is not a peculiarity of myth. It mirrors exactly how
        Sumerian politics worked in practice. A city could have its own
        god, its own temple, its own priesthood — but without
        recognition from the religious centre at Nippur, none of it
        carried full weight.
      note: >
        Elaboration on the approved claim about political theology and
        central sanction. Consistent interpretation, no new facts.

    - id: "ADD-09"
      severity: "LOW"
      location: "narrative line 58"
      text: >
        Extended reflection on 62 manuscript witnesses and scribal
        pedagogy: scribes were the administrators who learned about
        divine legitimation by copying a story about divine
        legitimation.
      note: >
        Editorial observation derived from the curriculum-text claim.
        The connection between content and pedagogy is interpretive
        but does not introduce new mythological or historical facts.

