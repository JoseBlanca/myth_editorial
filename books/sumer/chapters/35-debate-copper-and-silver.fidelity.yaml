# Narrative Fidelity Report — Chapter 35: The Debate between Copper and Silver
# Compares approved claims against the narrative prose.

chapter: 35
title: "The Debate between Copper and Silver"
claims_file: books/sumer/chapters/35-debate-copper-and-silver.claims.approved.adoc
narrative_file: books/sumer/chapters/35-debate-copper-and-silver.adoc
glossary_file: books/sumer/glossary.yaml
reviewed_on: 2026-04-17

summary:
  overall_assessment: "needs_attention"
  headline: >
    The narrative is broadly consistent with the approved claims on the
    main substantive points — the ETCSL catalogue number, the fragmentary
    state, the two personified metals, Copper's agricultural-utility
    argument, Silver's prestige argument, Enlil as judge, and Copper as
    winner. However, the claims document contains a significant internal
    contradiction about the verdict: it states in the source overview
    that "Copper wins, with Enlil as judge", but later in the "Lacunae
    and missing verdict" section asserts that "the identity of the judge
    and the winner cannot be determined from the surviving evidence".
    The narrative follows the first position (Copper wins, Enlil judges)
    and flatly contradicts the second. The narrative also adds several
    substantive details not present in the approved claims: CDLI
    manuscript count (eleven witnesses, all from Nippur), the Nuska
    minister detail, the direct quotation from Segment I, the specific
    catalogue of tools (hoes, adzes, axes, sickles), Copper's
    counter-insult about Silver being buried in the cattle-pen, van
    Dijk 1953 and Civil reconstructions, and the observation that
    Copper is the only debate poem in which the second speaker wins.
    Several of these additions carry their own footnote citations and
    appear defensible, but they are not warranted by the approved
    claims as written.
  total_claims_checked: 13
  supported: 8
  contradicted: 2
  partially_supported: 3
  unsupported_additions: 8

