# ──────────────────────────────────────────────────────────────────────
# RECOMMENDED ACTIONS (in priority order)
# ──────────────────────────────────────────────────────────────────────

recommended_actions:

  - priority: 1
    action: >
      Resolve the internal contradiction in the claims document
      regarding the verdict. The "Source overview" section states
      "the verdict is preserved: Copper wins, with Enlil as judge",
      while the "Lacunae and missing verdict" section asserts "the
      identity of the judge and the winner cannot be determined from
      the surviving evidence". These are mutually exclusive. The
      narrative clearly follows the first position and quotes
      Segment I. Verify against ETCSL 5.3.6 Segment I whether the
      verdict line ("Strong Copper had the lead over Silver in
      Enlil's house — Father Enlil be praised!") is in fact preserved.
      If yes, delete the LACUNA block and the "unknown judge"
      paragraph from the claims document. If no, the narrative has
      fabricated the verdict and must be revised to acknowledge the
      lost ending.

  - priority: 2
    action: >
      Add Copper's retaliatory insult about Silver being buried in
      the cattle-pen (A05) to the approved claims, or remove it from
      the narrative. The passage is vivid and rhetorically central
      to Copper's case; if it is in the source, it deserves a
      dedicated claim.

  - priority: 3
    action: >
      Reconcile the catalogue of copper tools (A04) with claim C06
      and C07. The narrative lists hoes, adzes, axes, sickles with
      specific agricultural functions (chopping weeds, making
      ploughs, chopping firewood, reaping grain). The claim lists
      a different set of tasks (ploughing, digging canals, tilling
      fields) and includes weapons. Revise the claims to match the
      source specifics, or revise the narrative to cover the claims'
      tasks (especially canal-digging, which is a prominent
      Mesopotamian theme).

  - priority: 4
    action: >
      Either add the Nuska detail, the Segment I direct quotation,
      and the second-speaker-wins observation (A06) to the approved
      claims, or remove them from the narrative. All three are
      footnoted and likely defensible, but they are editorial
      additions relative to the claims as written.

  - priority: 5
    action: >
      Either add van Dijk 1953 and Civil (A07) to the transmission
      claims and the bibliography, or remove them from the narrative.
      The current claim that ETCSL is "the only available
      reconstruction... without additional manuscript evidence" is
      in tension with the narrative's scholarly apparatus.

  - priority: 6
    action: >
      Consider strengthening the narrative's rendering of Silver's
      argument to include the "exchange value" / "standard medium of
      exchange" axis (C08). As currently written, the narrative
      frames Silver almost entirely around ceremony and display,
      which weakens the use-value/exchange-value inference (INF01)
      that the final paragraph builds on.

  - priority: 7
    action: >
      Add Copper's CDLI manuscript count (A01) to the claims with
      its source citation, or remove from the narrative. The
      quantitative detail (eleven witnesses, Nippur-only, compared
      with sixty or seventy for other debates) is a useful and
      verifiable fact but currently unsupported by the approved
      claims.

  - priority: 8
    action: >
      Optionally add a brief appositive gloss for Nuska at first
      mention in the verdict section, or add Nuska to the glossary.
