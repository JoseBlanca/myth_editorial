  - id: A06
    narrative_location: "Section 'The verdict'"
    content: >
      "Enlil, calling his minister Nuska..." and the direct quotation
      "Strong Copper had the lead over Silver in Enlil's house --
      Father Enlil be praised!" and "it is the only [Sumerian debate
