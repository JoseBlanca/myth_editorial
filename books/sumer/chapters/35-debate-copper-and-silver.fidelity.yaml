      defensible but should be added to the claims; if not, they
      are fabrications.

  - id: A07
    narrative_location: "Section 'The composition in context', paragraph 2"
    content: >
      "van Dijk's 1953 edition and Civil's reconstructions"
    risk: moderate
    notes: >
      Van Dijk 1953 (pp. 58–64) and Civil are named as scholarly
