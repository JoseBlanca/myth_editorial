      narrative notably does NOT include weapons).

  - id: A05
    narrative_location: "Section 'Copper's reply', paragraph 2"
    content: >
      Copper's counter-insult: "the palace is Silver's station, and
      banquets are Silver's assigned task -- but what happens to
      Silver when the banquet is over? Someone digs a hole in the
      middle of the cattle-pen and buries it. Someone pours clay on
