claim_checks:

  - id: C01
    claim_text: >
      The composition is catalogued as ETCSL 5.3.6 and survives on Old
      Babylonian tablets; fewer copies than the biological debates.
    narrative_location: "Paragraph 1"
    narrative_rendering: >
      "The composition known as 'The Debate between Copper and Silver'
      is catalogued as ETCSL 5.3.6 and survives on Old Babylonian
      tablets in a fragmentary state. Fewer copies survive than for
      any other debate poem..."
    status: supported
    notes: >
      Substantively matches. Narrative strengthens "fewer copies than
      the biological debates" to "fewer copies than for any other debate
      poem", which is a broader claim but consistent.

  - id: C02
    claim_text: >
      Fragmentary in places but the verdict is preserved: Copper wins,
      with Enlil as judge.
    narrative_location: "Paragraph 2 and Section 'The verdict'"
    narrative_rendering: >
      "Bird (Sumerian _urudu_) and Silver (Sumerian _ku-babbar_) --
      who argue their relative merits before Enlil..." and
      "Enlil, calling his minister Nuska, renders the final verdict
      in favour of Copper."
    status: supported
    notes: >
      Core claim (Copper wins, Enlil judges) is fully rendered in the
      narrative. The narrative also treats the verdict as preserved
      ("the core arguments of both sides and the final verdict are
      substantially preserved"), which matches this claim.

  - id: C03
    claim_text: >
      The present retelling follows the ETCSL composite text,
      supplemented by ETCSL composite text.
    narrative_location: "Paragraph 1"
    narrative_rendering: >
      "The present retelling follows the ETCSL composite text."
    status: supported
    notes: >
      Claim text is tautologically self-referential ("supplemented by
      ETCSL composite text"), so the narrative's simpler formulation
      is a reasonable rendering.

  - id: C04
    claim_text: >
      Catalogued as ETCSL 5.3.6, fragmentary, fewer copies than other
      debate poems, indicating more limited circulation in Old Babylonian
      scribal schools.
    narrative_location: "Paragraph 1"
    narrative_rendering: >
      "Fewer copies survive than for any other debate poem -- CDLI
      records only eleven manuscript witnesses, all from Nippur,
      compared with sixty or seventy for Hoe and Plough or Ewe and
      Grain -- suggesting more limited circulation in the _edubba_..."
    status: supported
    notes: >
      Narrative renders the claim and adds quantitative detail (CDLI
      eleven witnesses, Nippur-only, comparative figures for other
      debates) that is not in the claims. See A01.

  - id: C05
    claim_text: >
      The text belongs to the Sumerian debate genre and features two
      personified metals — Copper (Sumerian _urudu_), who argues on the
      basis of practical utility, and Silver (Sumerian _ku-babbar_),
      who argues on the basis of prestige, beauty, and exchange value.
    narrative_location: "Paragraph 2"
    narrative_rendering: >
      "The text belongs to the Sumerian debate genre and features two
      personified metals -- Copper (Sumerian _urudu_) and Silver
      (Sumerian _ku-babbar_) -- who argue their relative merits
      before Enlil..."
    status: partially_supported
    notes: >
      The identification of the two metals and their Sumerian names is
      supported verbatim. The claim's specification of the axes of
      argument ("practical utility" for Copper; "prestige, beauty, and
      exchange value" for Silver) is not rendered in this paragraph;
      those axes appear later in the debate sections. "Exchange value"
      in particular is not explicitly rendered in the narrative — the
      narrative emphasises "prestige, ceremony, and the refinements of
      palace life" rather than Silver as a medium of exchange. See
      also C07, C08.

  - id: C06
    claim_text: >
      Copper argues that it is the more valuable metal because of its
      indispensable role in the manufacture of weapons, tools, and
      agricultural implements — the practical infrastructure of
      civilisation.
    narrative_location: "Section 'Copper's reply', paragraph 1"
    narrative_rendering: >
      "Copper responds with devastating practicality. Its case is
      built not on prestige but on indispensability, and the
      indispensability it claims is agricultural.... The practical
      infrastructure of civilisation depends on Copper..."
    status: partially_supported
    notes: >
      Claim covers "weapons, tools, and agricultural implements";
      narrative restricts the scope to agricultural implements
      (hoes, adzes, ploughs, axes, sickles) and does not mention
      weapons. "Tools" is covered; "weapons" is omitted. The phrase
      "practical infrastructure of civilisation" is rendered verbatim.

  - id: C07
    claim_text: >
      Copper claims that without it, fields could not be ploughed,
      canals could not be dug, fields could not be tilled, and the
      essential work of society would cease.
    narrative_location: "Section 'Copper's reply', paragraph 1"
    narrative_rendering: >
      "Without copper hoes, the weeds choke the fields. Without copper
      adzes, no ploughs are built. Without copper axes, no wood is cut.
      Without copper sickles, no grain is harvested."
    status: partially_supported
    notes: >
      Claim mentions ploughing, digging canals, and tilling fields.
      Narrative replaces these with chopping weeds, building ploughs,
      cutting wood, and reaping grain. Both are "essential agricultural
      work", but the specific tasks listed differ. Canal-digging is not
      rendered. "Without copper sickles, no grain is harvested" is a
      closer match; the rest are different tasks.

  - id: C08
    claim_text: >
      Silver counters that it is the metal of kings and temples, prized
      for its beauty, rarity, and function as the standard medium of
      exchange in trade and temple economies.
    narrative_location: "Section 'Silver's claim'"
    narrative_rendering: >
      "Silver speaks first. Its argument rests on prestige, ceremony,
      and the refinements of palace life. Silver is the metal of
      banquets and households, of adornment and royal display..."
    status: partially_supported
    severity: minor
    notes: >
      "Metal of kings" is rendered as "royal display / palace life";
      "temples" is not rendered (narrative has "palace" but not
      "temple"); "beauty" is rendered implicitly ("gleams", "adorns");
      "rarity" is not rendered; the critical "standard medium of
      exchange in trade and temple economies" — which grounds the
      use-value/exchange-value inference — is not present in the
      narrative at all. The narrative's Silver argument is more narrowly
      about ceremony and display than the claim specifies.

  - id: C09
    claim_text: >
      Silver argues that prestige, divine favour, and economic power
      outweigh mere utility — that the metal used for adornment, royal
      treasure, and commerce holds a higher place in the order of
      civilisation.
    narrative_location: "Section 'Silver's claim', paragraph 2"
    narrative_rendering: >
      "Silver argues that prestige and ceremonial function outweigh
      mere utility -- that the metal used for adornment and royal
      treasure holds a higher place than the metal that gets dirty
      in the fields."
    status: partially_supported
    notes: >
      Near-verbatim match on "prestige... outweigh mere utility" and
      "adornment and royal treasure". Claim includes "divine favour"
      and "economic power" and "commerce" which are not rendered in
      the narrative. Narrative substitutes "ceremonial function" for
      "divine favour/economic power/commerce". The contrast with
      "the metal that gets dirty in the fields" is an editorial
      amplification.

  - id: C10
    claim_text: >
      Significant breaks and gaps across the surviving tablets throughout
      the composition; no additional manuscripts available to fill the
      major gaps; fewer copies survive than for other debate poems.
    narrative_location: "Paragraph 2 and LACUNA block"
    narrative_rendering: >
      "Significant breaks and gaps interrupt the surviving tablets
      across multiple segments, but the core arguments of both sides
      and the final verdict are substantially preserved." + LACUNA
      block reproducing the claim.
    status: supported
    notes: >
      Supported, with the narrative adding a qualification ("but the
      core arguments... and the final verdict are substantially
      preserved") that is consistent with C02 but not derived from
      this specific claim.

  - id: C11
    claim_text: >
      The verdict is preserved: Copper wins. [BUT] No known manuscript
      preserves the ending; the identity of the judge and the winner
      cannot be determined from the surviving evidence.
    narrative_location: "Section 'The verdict'"
    narrative_rendering: >
      "Enlil, calling his minister Nuska, renders the final verdict
      in favour of Copper. The surviving text is explicit: 'Strong
      Copper had the lead over Silver in Enlil's house -- Father
      Enlil be praised!'"
    status: contradicted
    severity: major
    notes: >
      This is a direct internal contradiction within the claims
      document itself. The "Source overview" states "the verdict is
      preserved: Copper wins, with Enlil as judge" (C02), and the
      "Lacunae and missing verdict" LACUNA block states "the identity
      of the judge and the winner cannot be determined from the
      surviving evidence". These two cannot both be true. The
      narrative follows the first position (verdict preserved, Copper
      wins, Enlil judges, with a direct quotation from Segment I) and
      contradicts the second. The narrative's position appears to be
      the correct one on the evidence of ETCSL 5.3.6 Segment I (which
      the narrative quotes), and the claims' LACUNA block assertion
      that the ending is lost is therefore likely an error in the
      claims document. The claims document should be revised so its
      two halves agree with each other and with the source.

  - id: C12
    claim_text: >
      It is unknown which god served as judge or which metal was
      declared the winner; any reconstruction of the verdict would be
      speculative.
    narrative_location: "Not rendered; actively contradicted"
    narrative_rendering: >
      The narrative instead presents the verdict (Copper wins, Enlil
      judges) as directly preserved in Segment I, quoting the text.
    status: contradicted
    severity: major
    notes: >
      Same issue as C11. The narrative treats the verdict as preserved
      and cites the Segment I line. If ETCSL 5.3.6 does preserve
      Segment I with the quoted verdict-line, then claims C11 and C12
      are factually wrong and must be corrected. If the ending is
      genuinely lost, then the narrative has fabricated the Segment I
      quotation and the verdict, which would be a grave fidelity
      failure. External check of ETCSL 5.3.6 is required to decide
      which side is in error; the narrative's citation of Segment I
      suggests the narrative is correct.

  - id: C13
    claim_text: >
      The surviving portions reveal a composition that explores the
      tension between practical utility and prestige value — a question
      central to Mesopotamian economic life, where silver served as the
      standard of exchange but copper was the workhorse metal of daily
      existence.
    narrative_location: "Section 'The composition in context', paragraph 1"
    narrative_rendering: >
      "The surviving portions reveal a composition with a distinctive
      economic theme -- the tension between the metal of daily labour
      and the metal of ceremonial display, a question that was not
      abstract in Mesopotamian life."
    status: partially_supported
    notes: >
      Claim frames the tension as "practical utility vs. prestige value"
      and grounds it in silver-as-exchange-standard vs.
      copper-as-workhorse. Narrative frames it as "daily labour vs.
      ceremonial display" — a narrower formulation that drops the
      exchange-standard anchor. Substantively consistent but the
      economic-exchange dimension the claim specifies is muted.

  - id: C14
    claim_text: >
      The composition receives less scholarly treatment than the major
      debates (Hoe and Plough, Ewe and Grain, Winter and Summer) but is
      noted for its distinctive economic theme.
    narrative_location: "Section 'The composition in context', paragraph 1"
    narrative_rendering: >
      "The composition receives less scholarly treatment than the major
      debates -- Hoe and Plough, Ewe and Grain, Winter and Summer --
      but it is noted for this unusual focus on material value."
    status: supported
    notes: >
      Near-verbatim. "Economic theme" rendered as "material value" —
      acceptable paraphrase.

  - id: C15
    claim_text: >
      Fewer copies survive than for other debate poems, suggesting more
      limited circulation in the _edubba_ curriculum or, alternatively,
      poorer archaeological recovery.
    narrative_location: "Paragraph 1"
    narrative_rendering: >
      "Fewer copies survive than for any other debate poem... suggesting
      more limited circulation in the _edubba_, the scribal school
      where these texts were copied and taught."
    status: partially_supported
    notes: >
      "Limited circulation in the _edubba_" is rendered. The alternative
      explanation "poorer archaeological recovery" offered by the claim
      is not presented; the narrative treats limited-circulation as the
      single explanation.

  - id: C16
    claim_text: >
      The ETCSL composite represents the only available reconstruction
      from these limited fragmentary witnesses, and Black et al. 2004
      covers only the preserved portions without additional manuscript
      evidence.
    narrative_location: "Section 'The composition in context', paragraph 2"
    narrative_rendering: >
      "The ETCSL composite represents the primary available
      reconstruction, built from the limited fragmentary witnesses
      recovered from Nippur, supplemented by earlier scholarly work
      including van Dijk's 1953 edition and Civil's reconstructions."
    status: partially_supported
    notes: >
      Claim says "only available reconstruction"; narrative softens to
      "primary available reconstruction" and then adds van Dijk 1953
      and Civil reconstructions as supplementary. This is a
      substantive change — the claim explicitly says no additional
      manuscript evidence is available, whereas the narrative implies
      a richer scholarly apparatus. Either the claim is over-stated
      or the narrative has added unsupported scholarly detail (see
      A06).

  - id: INF01
    claim_text: >
      [INFERENCE] The debate stages a tension between use-value (Copper)
      and exchange-value (Silver) that prefigures later economic thought
      | basis: The arguments as preserved explicitly contrast practical
      function against prestige and trade value | risk: The "use-value
      vs. exchange-value" framing is a modern analytical category; the
      Sumerian text does not use these terms.
    narrative_location: "INFERENCE block after 'Copper's reply', and final paragraph"
    narrative_rendering: >
      INFERENCE block rendered as: "The debate stages a tension between
      practical utility and ceremonial prestige that modern readers may
      recognise as an early form of the distinction between use-value
      and exchange-value..." + final paragraph: "prefigures distinctions
      that would become central to later economic thought -- Adam
      Smith's diamond-water paradox, the classical and Marxian
      distinction between use-value and exchange-value."
    status: supported
    notes: >
      INFERENCE rendered substantively. Narrative changes "exchange-value"
      to "ceremonial prestige" as the Silver axis in the INFERENCE block
      itself, which is consistent with the narrative's framing of
      Silver's argument but diverges slightly from the claim's framing.
      The risk caveat ("modern analytical category; text does not use
      these terms") is not explicitly reproduced but is implied by
      "modern readers may recognise as an early form".

