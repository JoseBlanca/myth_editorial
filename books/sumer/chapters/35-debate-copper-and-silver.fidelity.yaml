    risk: moderate
    notes: >
      The Nuska detail, the Segment I direct quotation, and the
      meta-observation about second-speaker-wins are all absent from
      the claims. Footnoted to Segment I. These details depend
      critically on whether Segment I is preserved (see C11, C12).
