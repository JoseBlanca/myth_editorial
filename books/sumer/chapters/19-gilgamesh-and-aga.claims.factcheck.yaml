supported_claims:
  - claim_number: 1
    claim: "Gilgamesh is king of Uruk, a semi-divine hero who rules the great walled city."
    source_id: "etcsl"
    source_loc: "1.8.1.1, lines 1-5"
    verbatim_quote: "The envoys of Aga, the son of En-me-barage-si, came from Kish to Gilgamesh in Unug"

  - claim_number: 2
    claim: "Aga is king of Kish, the rival city whose hegemony Gilgamesh challenges."
    source_id: "etcsl"
    source_loc: "1.8.1.1, lines 1-5"
    verbatim_quote: "The envoys of Aga, the son of En-me-barage-si, came from Kish to Gilgamesh in Unug"

  - claim_number: 3
    claim: "ETCSL 1.8.1.1 is the shortest and most cohesive of the Sumerian Gilgamesh poems, approximately 115 lines, unique in containing no supernatural elements."
    source_id: "george-2003"
    source_loc: "vol. 1, pp. 141-142"
    verbatim_quote: "The poem is the shortest of the Sumerian narratives about Bilgames and is remarkable for containing no divine or supernatural element"

  - claim_number: 5
    claim: "Aga sends envoys demanding Uruk's submission — specifically corvee labour for Kish."
    source_id: "etcsl"
    source_loc: "1.8.1.1, lines 1-12"
    verbatim_quote: "The envoys of Aga... let us submit to the house of Kish, let us not smite it with weapons"

