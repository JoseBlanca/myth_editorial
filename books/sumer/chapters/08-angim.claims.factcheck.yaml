    claim: "Ninlil, queen of the gods and consort of Enlil, plays a significant role in welcoming and soothing Ninurta -- she receives him with maternal warmth that helps dissipate his martial fury."
    issue: "The mother figure who welcomes and soothes Ninurta in ETCSL 1.6.1 is Ninmah (a name of Ninhursaja, the mother goddess), NOT Ninlil. This is a significant factual error. Ninlil is Enlil's consort but she is not the maternal figure in this composition. In Sumerian tradition, Ninurta's mother is Ninmah/Ninhursaja (or Bau in the Lagash tradition of Ningirsu). Cooper 1978 and the ETCSL composite both identify Ninmah as the deity who receives Ninurta."
    evidence: "ETCSL 1.6.1 names Ninmah as the figure who receives Ninurta upon his return. Cooper 1978 confirms the mother figure is Ninmah. Black et al. 2004 pp. 197-198 describe the reception scene with Ninmah. Ninlil and Ninhursaja/Ninmah are distinct deities in the Sumerian pantheon."
