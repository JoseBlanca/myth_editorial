    evidence: "ETCSL 1.6.1 lines 10-25 describe Ninurta's trophies but the specific phrase 'Asag's weapons' could not be confirmed. The text describes war spoils and captured enemies/stones more broadly."
    recommended_fix: "Revise to 'Ninurta is laden with the trophies of battle: he carries the spoils of the kur, displaying them as evidence of his martial triumph.' Remove the unverified claim about 'Asag's weapons' or verify against the ETCSL composite text."

