supported_claims:
  - claim_number: 2
    claim: "The text is attested in multiple Old Babylonian manuscripts and was a recognised component of the scribal curriculum, though it is less heavily copied than Lugal-e (ETCSL 1.6.2)."
    source_id: etcsl
    source_loc: "1.6.1, bibliography page (b161.htm)"
    verbatim_quote: "ETCSL bibliography lists approximately 40 manuscripts from CBS, HS, N, Ni, UET, and 3N-T collections. CDLI lists 48 tablets associated with Cooper 1978, predominantly from Nippur (OB period), confirming wide OB attestation. The Lugal-e bibliography lists approximately 90 manuscripts, confirming Angim is less heavily copied."

  - claim_number: 3
    claim: "A bilingual Sumerian-Akkadian version of the composition exists, but only the Sumerian text falls within the scope of the present work."
    source_id: etcsl
    source_loc: "1.6.1; Cooper 1978 critical edition"
    verbatim_quote: "CDLI lists tablets from both Old Babylonian and Neo-Assyrian periods (Nineveh provenance), indicating bilingual transmission. Multiple sources confirm the existence of a bilingual Sumerian-Akkadian version."

  - claim_number: 7
    claim: "Ninurta's homeward march is described in terms of overwhelming, terrifying martial splendour: his me-lam (divine radiance of terrible power) blazes with such intensity that it alarms all who behold it."
    source_id: etcsl
    source_loc: "1.6.1, lines 25-50"
    verbatim_quote: "Your radiance has covered Enlil's temple like a cloak (Nuska's speech, line ~83). Lines 25-50 describe the terrifying panoply including the creatures and spoils Ninurta brings forth."

  - claim_number: 8
    claim: "The warrior god is accompanied by the full panoply of battle: storms, weapons, captured enemies, and divine radiance that causes the landscape itself to tremble."
    source_id: etcsl
    source_loc: "1.6.1, lines 30-55"
    verbatim_quote: "Lines 30-40 catalog the supernatural creatures Ninurta brings forth: Six-headed wild ram, Warrior dragon, Magilum boat, Bison, Mermaid, White substance, Strong copper, Anzud bird, Seven-headed serpent. Lines 52-63 describe these trophies hung on his chariot components."

  - claim_number: 9
    claim: "The gods themselves -- including the great deities of the pantheon -- are alarmed by Ninurta's approach; his uncontained battle-fury threatens the cosmic order he has just saved."
    source_id: etcsl
    source_loc: "1.6.1, lines ~119-127"
    verbatim_quote: "The gods have become worried and flee (?) to the mountain ranges. They beat their wings like a flock of small birds. They stand hiding in the grass like wild bulls. (lines 119-124, per ETCSL translation)"

  - claim_number: 13
    claim: "Ninurta arrives at Nippur (Nibru), the sacred city of Enlil, where the Ekur temple stands as the centre of the Sumerian divine order."
    source_id: etcsl
    source_loc: "1.6.1, lines 73-101"
    verbatim_quote: "As the sovereign swept on like the deluge, as Ninurta, storm of the rebellious land, swept on ... Nuska, the chancellor of Enlil, came forth from the E-kur to meet him. (lines 73-79) ... Ninurta put the whip and goad away ... He directed his captive wild bulls into the temple. (lines 98-107)"

  - claim_number: 14
    claim: "The arrival is described as a ceremonial event: Ninurta enters the city precincts and approaches the Ekur."
    source_id: etcsl
    source_loc: "1.6.1, lines 98-107"
    verbatim_quote: "While these words were yet in Nuska's mouth, Ninurta put the whip and goad away ... He directed his captive wild bulls into the temple. He directed his captive cows, like the wild bulls, into the temple. He laid out the booty of his plundered cities."

  - claim_number: 15
    claim: "Ninlil, queen of the gods and consort of Enlil, plays a significant role in welcoming and soothing Ninurta -- she receives him with maternal warmth that helps dissipate his martial fury."
    source_id: etcsl
    source_loc: "1.6.1, lines 108-112"
    verbatim_quote: "The great mother Ninlil, from within her Ki-ur, spoke admiringly to lord Ninurta: 'O wild bull, with fierce horns raised, son of Enlil, you have struck blows in the mountains.' (lines 108-112, ETCSL composite confirms: 'ama gal dnin-lil2-le cag4 ki-ur3-a-ni-ta')"

  - claim_number: 19
    claim: "Angim functions as a sustained meditation on the danger of divine martial power: the gods' own champion, having saved the cosmos, now threatens it with the very force that achieved that salvation."
    source_id: black-2004
    source_loc: "pp. 181-186 (introduction)"
    verbatim_quote: "Multiple scholarly sources describe Angim as centered on the theme of the warrior god's terrifying return and the gods' fearful response to his uncontrolled martial power. The Britannica entry states Nusku 'ordered him to cease his warlike clamour and not scare Enlil and the other gods.'"

  - claim_number: 21
    claim: "The composition is attested in multiple Old Babylonian manuscripts, and the existence of a bilingual version indicates sustained scribal interest extending into the later Akkadian-speaking period."
    source_id: etcsl
    source_loc: "1.6.1, bibliography; CDLI publication listing"
    verbatim_quote: "ETCSL bibliography lists ~40 manuscripts. CDLI lists 48 tablets from multiple collections including Old Babylonian (Nippur) and Neo-Assyrian (Nineveh) periods, confirming sustained scribal interest across periods."

  - claim_number: 17
    claim: "The composition concludes with a hymnic passage celebrating Ninurta in his now-pacified state -- the terrifying warrior reintegrated into the divine order as Enlil's obedient champion."
    source_id: etcsl
    source_loc: "1.6.1, lines 195-208"
    verbatim_quote: "When Ninurta entered E-cumeca, his beloved temple, alone, he told his wife, young lady Ninnibru, what was in his heart ... Lord who has destroyed the mountains, who has no rival ... it is sweet to praise you. Line 208: Cir-gida of Ninurta."

findings:
  # ---- Pass 1: Claim-level verification (start to end) ----

  - claim_number: 1
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "The composition known as 'Angim' (from its incipit, conventionally rendered 'Angim dimma,' meaning 'on a day that was') is catalogued as ETCSL 1.6.1 and extends to approximately 206 lines."
    issue: "The translation of the incipit is fabricated. The Sumerian 'an-gim dim2-ma' means 'created like An' (an = the god An / heaven; gim = like; dim = to create/fashion), NOT 'on a day that was.' The ETCSL translation opens: 'Created like An, O son of Enlil, Ninurta, created like Enlil.' Cooper 1978 confirms this. Additionally, the line count is wrong: ETCSL composite text has 208 lines, not 'approximately 206.' The ETCSL catalogue number (1.6.1) is correct."
    evidence: "ETCSL 1.6.1 line 1 transliteration: 'an-gin7 dim2-ma dumu den-lil2-la2.' Translation: 'Created like An, O son of Enlil.' Cooper 1978 title: 'The Return of Ninurta to Nippur: an-gim dim-ma.' Wikipedia: 'Its ancient title, an-gim dím-ma, Created like the god An.' ETCSL composite text ends at line 208. https://etcsl.orinst.ox.ac.uk/section1/c161.htm"
    recommended_fix: "Replace 'meaning \"on a day that was\"' with 'meaning \"created like An\"' citing Cooper 1978 and the ETCSL translation. Change '206 lines' to '208 lines' per the ETCSL composite."

  - claim_number: 4
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Jacobsen identifies Angim as the sequel to Lugal-e, treating the two compositions as a narrative pair: the cosmic battle (Lugal-e) followed by the triumphant but dangerous homecoming (Angim)."
    issue: "Jacobsen 1987 does NOT include Angim as a separate chapter or section. The Google Books table of contents confirms: 'The Ninurta Myth Lugale' begins at p. 233, the next entry 'Enmerkar and the Lord of Aratta' begins at p. 275. Angim is not listed. The cited page range 'pp. 233-234' is the opening of Jacobsen's Lugal-e treatment. Any discussion of Angim on those pages would be at most a passing mention in the introductory context of Lugal-e, not a sustained identification of Angim as a sequel. The scholarly claim about the two texts forming a narrative pair is broadly supported by other scholars, but attributing it specifically to Jacobsen 1987 pp. 233-234 is unverified."
    evidence: "Google Books table of contents for Jacobsen 1987: 'The Ninurta Myth Lugale' at p. 233, 'Enmerkar and the Lord of Aratta' at p. 275. No separate Angim entry. https://books.google.es/books?id=L-BI0h41yCEC"
    recommended_fix: "Either verify by direct consultation of pp. 233-234 that Jacobsen does discuss Angim there, or replace the citation with Cooper 1978 (who treats Angim as the critical edition) or Black et al. 2004 pp. 181-186 (which introduces Angim in context of the Ninurta cycle). Add a [VARIANT:] or [INFERENCE:] marker if the sequel characterization is interpretive."

  - claim_number: 5
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The narrative opens with Ninurta departing the kur (the mountain / hostile realm) after his victory over Asag and the stone army, as narrated in Lugal-e (ETCSL 1.6.2)."
    issue: "The opening of Angim (lines 1-10) does NOT describe Ninurta 'departing the kur after his victory over Asag.' The text opens with hymnic praise: 'Created like An, O son of Enlil, Ninurta, created like Enlil, born by Nintud, mightiest of the Anuna gods, who came forth from the mountain range.' There is no explicit mention of Asag in the opening lines. The ETCSL composite text for lines 1-15 confirms no reference to Asag. The connection to Lugal-e and the Asag battle is scholarly inference (valid but should be marked). The cited line range 'lines 1-10' does not support the specific claim about departing after the Asag victory."
    evidence: "ETCSL 1.6.1 line 1: 'an-gin7 dim2-ma dumu den-lil2-la2' — 'Created like An, O son of Enlil.' Lines 1-15 contain hymnic praise of Ninurta's divine attributes. No mention of Asag. https://etcsl.orinst.ox.ac.uk/section1/tr161.htm"
    recommended_fix: "Revise to note that the text opens with hymnic praise of Ninurta, who 'came forth from the mountain range.' The connection to the Asag battle narrated in Lugal-e is scholarly context (Cooper 1978, Black et al. 2004), not stated in the opening lines. Add [INFERENCE:] marker for the Asag/Lugal-e connection, or cite a scholarly source that makes this link explicit."

  - claim_number: 6
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Ninurta is laden with the trophies of battle: he carries the defeated Asag's weapons and the spoils of the kur, displaying them as evidence of his martial triumph."
    issue: "The claim that Ninurta carries 'the defeated Asag's weapons' is not supported by lines 10-25. Lines 30-40 catalog the supernatural creatures Ninurta brings forth (Six-headed wild ram, Warrior dragon, Magilum boat, Bison, Mermaid, etc.) and lines 52-63 describe them hung on his chariot. These are trophies/captured creatures, not 'Asag's weapons.' Asag is not mentioned by name in these sections."
    evidence: "ETCSL 1.6.1 lines 30-40 list: Six-headed wild ram, Warrior dragon, Magilum boat, Bison, Mermaid, White substance, Strong copper, Anzud bird, Seven-headed serpent. Lines 55-63 describe placement on chariot components. No mention of 'Asag's weapons.' https://etcsl.orinst.ox.ac.uk/section1/tr161.htm"
    recommended_fix: "Replace 'the defeated Asag's weapons' with 'captured supernatural creatures and war spoils from the kur.' The specific creatures (Six-headed wild ram, Warrior dragon, Anzud bird, etc.) are the trophies, not Asag's personal weapons."

  - claim_number: 10
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The text describes the gods cowering, hiding, or reacting with visible anxiety as Ninurta draws near to Nippur -- the religious capital and seat of his father Enlil."
    issue: "The content is broadly supported but the cited line range (lines 60-85) is inaccurate. The gods' fearful reactions are most vividly described in lines 119-127 (within Ninurta's own speech to Ninlil): 'The gods have become worried and flee (?) to the mountain ranges. They beat their wings like a flock of small birds. They stand hiding in the grass like wild bulls.' The cited range 60-85 partially overlaps with the lacuna zone (lines 80-100) flagged in the LACUNA marker."
    evidence: "ETCSL 1.6.1 lines 119-124: 'The gods have become worried and flee (?) to the mountain ranges. They beat their wings like a flock of small birds. They stand hiding in the grass like wild bulls.' https://etcsl.orinst.ox.ac.uk/section1/tr161.htm"
    recommended_fix: "Update the line reference from 'lines 60-85' to 'lines 119-127' where the gods' fear is most explicitly described, or cite the Nuska warning section (lines 83-91) where Nuska tells Ninurta not to frighten the gods."

  - claim_number: 11
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Enlil, king of the gods and father of Ninurta, perceives the danger posed by his son's unchecked martial rage and takes action to address it."
    issue: "The cited line range 'lines 100-130' is too broad and inaccurate for this specific claim. The ETCSL text shows that it is Nuska (Enlil's chancellor) who meets Ninurta before he reaches Nippur (lines 76-79) and warns him (lines 83-91). The text says Nuska 'came forth from the E-kur to meet him' — the Britannica entry says Nuska 'ordered him to cease his warlike clamour.' There is no clear passage in lines 100-130 where Enlil himself 'perceives the danger' and 'takes action.' Enlil receives Ninurta in the temple (lines 102-107) but the 'action' is Nuska's initiative, not an Enlil-dispatches-messenger scene as described."
    evidence: "ETCSL 1.6.1 lines 76-79: Nuska came forth from the E-kur to meet Ninurta. Lines 83-91: Nuska warns Ninurta about his radiance and asks him not to frighten Enlil. Britannica: 'Nusku ordered him to cease his warlike clamour and not scare Enlil and the other gods.' https://etcsl.orinst.ox.ac.uk/section1/tr161.htm"
    recommended_fix: "Revise to clarify that Nuska (Enlil's chancellor) takes the initiative to meet Ninurta and warn him, rather than Enlil personally perceiving the danger. The action is diplomatic mediation by Nuska, not a direct Enlil intervention in lines 100-130."

  - claim_number: 12
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "Enlil dispatches his minister Nusku to meet Ninurta and convey a message intended to soothe the warrior's fury and channel his return into an orderly, celebratory arrival."
    issue: "The ETCSL text does NOT describe Enlil 'dispatching' Nuska. Lines 76-79 state: 'Nuska, the chancellor of Enlil, came forth from the E-kur to meet him.' Nuska acts on his own initiative (or implicitly at Enlil's standing authority), not via an explicit dispatch scene. Furthermore, Nuska's message is a WARNING, not a soothing message — he tells Ninurta to stop being frightening ('Do not frighten your father in his residence. Do not frighten Enlil in his residence'). The characterization of the message as 'intended to soothe' reverses the actual dynamic: Nuska demands Ninurta calm down, rather than soothing him. The Jacobsen 1987 pp. 233-234 citation is also problematic (see finding for claim 4)."
    evidence: "ETCSL 1.6.1 lines 76-79: 'Nuska, the chancellor of Enlil, came forth from the E-kur to meet him.' Lines 83-91: 'Your radiance has covered Enlil's temple like a cloak ... Do not frighten your father in his residence.' Britannica: Nusku 'ordered him to cease his warlike clamour.' https://etcsl.orinst.ox.ac.uk/section1/tr161.htm"
    recommended_fix: "Replace 'Enlil dispatches his minister Nusku' with 'Nuska, Enlil's chancellor, comes forth from the Ekur to meet Ninurta.' Replace 'convey a message intended to soothe the warrior's fury' with 'warns Ninurta to cease his warlike clamour and not frighten Enlil and the other gods.' The tone is admonitory, not soothing."

  # ---- Pass 2: Triangulation of references ----

  # ETCSL 1.6.1: Valid composition. Translation at tr161.htm, composite at
  # c161.htm. 208 lines confirmed. Bibliography at b161.htm lists ~40
  # manuscripts. CDLI Cooper 1978 publication page lists 48 tablets.
  # All ETCSL line ranges checked against live text.

  # Black et al. 2004 pp. 192-198: WRONG. Multiple independent sources
  # (Wikipedia, academic citations, LOC table of contents reference)
  # confirm Angim appears at pp. 181-186 in Black et al. 2004, within
  # section E "The Warrior Gods Nergal, Numushda, and Ninurta." The
  # preceding Lugal-e is at pp. 163-180. Pages 192-198 likely correspond
  # to a different composition in the book.

  - claim_number: "black-2004-page-range"
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Multiple claims cite Black et al. 2004 at pp. 192-198 (claims 1, 2, 3, 5, 6, 7, 8, 9, 10, 11, 13, 14, 15, 17, 18, 19)."
    issue: "The page range pp. 192-198 for Angim in Black et al. 2004 appears to be wrong. Multiple independent sources confirm that Angim (Ninurta's Return to Nibru) appears at pp. 181-186 in the book, within section E 'The Warrior Gods Nergal, Numushda, and Ninurta.' The preceding composition Lugal-e (Ninurta's Exploits) occupies pp. 163-180. Pages 192-198 likely correspond to a different section of the anthology."
    evidence: "Wikipedia Angim article, academic citations, and search results consistently reference pp. 181-186 for Angim in Black et al. 2004. The LOC table of contents reference and OUP metadata confirm section E covers the Ninurta compositions. https://en.wikipedia.org/wiki/Angim"
    recommended_fix: "Replace all citations of 'Black et al. 2004, pp. 192-198' with 'Black et al. 2004, pp. 181-186' throughout the claims document and brief. Verify by direct consultation of the book."

  # Jacobsen 1987 pp. 233-234: The table of contents shows "The Ninurta
  # Myth Lugale" at p. 233, next section at p. 275. Angim is NOT a
  # separate entry. Any Angim discussion is at most introductory context.
  # See finding for claim 4.

  # Kramer 1961 pp. 80-83: Chapter III "Myths of Kur" discusses Ninurta's
  # battle with kur but whether Angim specifically (rather than the broader
  # Ninurta-kur tradition or what became Lugal-e) is discussed on these
  # pages could not be page-level verified.

  # ---- Pass 3: Contamination scan ----
  # No contamination detected. All cited material is from in-scope Sumerian
  # sources. The bilingual Akkadian version is correctly flagged as out of
  # scope. Comparative hooks (Achilles, Cuchulainn, Norse berserker,
  # Zeus/Ares) are properly marked as COMPARATIVE-HOOK comments, not
  # factual claims.

  # ---- Pass 4: Marker integrity ----

  - claim_number: "INFERENCE-1"
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE:] marker after claim 10 about the gods' fear constituting the central dramatic tension."
    issue: "The marker is correctly applied — this IS an inference from structural analysis. However, the marker cites 'Black et al. 2004 p. 192' which should be 'p. 181' (see page-range finding above). The inference itself is well-supported by the text's structure and scholarly consensus."
    evidence: "The INFERENCE marker is properly used. Page reference needs correction."
    recommended_fix: "Update the Black et al. 2004 page reference from p. 192 to the correct page within pp. 181-186."

  - claim_number: "LACUNA-RECONSTRUCTION-inconsistency"
    kind: "MARKER-MISUSED"
    severity: "MEDIUM"
    claim: "LACUNA marker (after claim 8) and RECONSTRUCTION marker (after claim 12) both reference lines 80-100 but describe different content in the gap."
    issue: "The LACUNA marker says lines 80-100 contain 'portions of the triumphal procession description.' The RECONSTRUCTION marker says the gap contains 'Enlil's speech to Nusku and Nusku's relay to Ninurta.' These cannot both be correct for the same lines. The ETCSL composite text shows that lines 76-79 introduce Nuska's arrival, and lines 80-97 contain Nuska's speech to Ninurta (with some unclear lines marked in the ETCSL composite at lines 83-91). Lines 80-100 are NOT primarily 'triumphal procession description' — they are the Nuska dialogue section. The lacuna is less extensive than claimed: ETCSL marks individual unclear lines (e.g., lines 18-23 have 'unclear' markers) rather than a continuous 80-100 gap."
    evidence: "ETCSL 1.6.1 composite text shows lines 76-97 as the Nuska encounter/warning section, not 'triumphal procession.' Lines 18-23 have marked unclear passages. The claimed continuous lacuna at 80-100 is overstated. https://etcsl.orinst.ox.ac.uk/section1/c161.htm"
    recommended_fix: "Revise both markers. The LACUNA should reference the actual unclear/damaged passages (scattered, e.g., lines 18-23, 41-46, 64-72 have unclear portions) rather than claiming a continuous 80-100 gap. The RECONSTRUCTION marker should be removed or revised since lines 80-100 contain Nuska's warning speech, which is largely extant."

  # ---- Pass 5: Reverse-order second pass ----

  - claim_number: 22
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Kramer includes Angim in his overview of the Ninurta myths, situating it within the broader cycle of warrior-god narratives that forms a major strand of Sumerian literary output."
    issue: "Kramer 1961 Chapter III 'Myths of Kur' discusses Ninurta's battle with kur, but the specific claim that pp. 80-83 discuss Angim specifically (as opposed to the broader Ninurta-kur battle tradition, which predates the separation of Lugal-e from Angim in modern scholarship) could not be page-level verified. Kramer's 1961 discussion predates Cooper's 1978 critical edition of Angim. Per sources.yaml, Kramer should not be cited alone without an ETCSL cross-check."
    evidence: "Kramer 1961 discusses Ninurta myths in Chapter III. Cooper 1978 is the standard critical edition of Angim. Whether Kramer specifically distinguishes Angim from Lugal-e on pp. 80-83 is uncertain given the 1961 date predates Cooper's 1978 work."
    recommended_fix: "Add an ETCSL cross-reference alongside Kramer per the sources.yaml rule. Verify whether Kramer on pp. 80-83 discusses Angim specifically or the broader Ninurta cycle."

  - claim_number: 20
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The composition complements Lugal-e by addressing what the longer text leaves implicit: the problem of what happens when the warrior returns home still burning with battle-fury."
    issue: "The scholarly characterization is reasonable and broadly supported, but the specific attribution to Jacobsen 1987 pp. 233-234 is problematic. Jacobsen's book does not include Angim as a separate section. The cited pages are the opening of his Lugal-e treatment. The characterization may derive from Cooper 1978 or Black et al. 2004 rather than Jacobsen."
    evidence: "Jacobsen 1987 table of contents shows no Angim entry. Pages 233-234 open the Lugal-e section. Cooper 1978 (the critical edition) or Black et al. 2004 pp. 181-186 are more likely sources for this characterization."
    recommended_fix: "Replace the Jacobsen citation with Cooper 1978 or Black et al. 2004 pp. 181-186 (corrected page range). Verify the source of the 'complements Lugal-e' characterization."

  - claim_number: 18
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The closing lines praise both Ninurta's martial prowess and the restored harmony of the divine household, framing the narrative as a movement from dangerous excess to sanctioned order."
