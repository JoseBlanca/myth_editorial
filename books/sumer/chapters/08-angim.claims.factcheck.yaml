findings:
  # ---- Pass 1: Claim-level verification (start to end) ----

  - claim_number: 1
    kind: "FABRICATION"
    severity: "HIGH"
    claim: "The composition known as 'Angim' (from its incipit, conventionally rendered 'Angim dimma,' meaning 'on a day that was') is catalogued as ETCSL 1.6.1 and extends to approximately 206 lines."
    issue: "The translation of the incipit 'Angim dimma' as 'on a day that was' is fabricated. The Sumerian 'an-gim dim2-ma' does NOT mean 'on a day that was.' Cooper's 1978 critical edition (The Return of Ninurta to Nippur: an-gim dim-ma, Analecta Orientalia 52) is the standard reference. The Sumerian 'an-gim' means 'like An/heaven'; 'dim2-ma' relates to a verbal root meaning to fashion/create or (in another reading) to roar. No standard scholarly source renders this incipit as 'on a day that was.' The ETCSL catalogue number (1.6.1) and the approximate line count of ~206 are correct."
    evidence: "Cooper, J.S., The Return of Ninurta to Nippur: an-gim dim-ma (Analecta Orientalia 52, Rome, 1978). The Sumerian sign AN can mean 'heaven' or the god An; GIM is the equative postposition 'like.' No scholarly source translates the incipit as 'on a day that was.'"
    recommended_fix: "Replace 'meaning \"on a day that was\"' with a correct rendering. Safest approach: 'from its Sumerian incipit an-gim dim2-ma' without a contested English gloss, citing Cooper 1978 as the critical edition. Alternatively gloss as 'like An/heaven' following Cooper's analysis."

  - claim_number: 6
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Ninurta is laden with the trophies of battle: he carries the defeated Asag's weapons and the spoils of the kur, displaying them as evidence of his martial triumph."
