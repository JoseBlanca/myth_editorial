    detail: "Narrative adds 'This is a composition in which myth and administration converge. The poet who catalogued Nanna's cargo was not merely describing a divine journey; he was encoding the economic reality of the Ur-Nippur relationship into a sacred narrative. The cattle and grain loaded onto the god's barge were the same cattle and grain loaded onto actual barges that made the same journey along the same canals. The myth did not merely reflect the practice. It sanctioned it.' Interpretive/thematic commentary elaborating on the INFERENCE at C09. No new factual claim."

