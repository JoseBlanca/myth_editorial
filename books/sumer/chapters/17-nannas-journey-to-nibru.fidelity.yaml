  # === Cultic and political significance ===

  - claim_id: C21
    claim_summary: "Ritual-aetiological function primary; mythic charter for regular delivery of offerings from Ur to Nippur's Ekur"
    narrative_location: "line 69 (paragraph 12)"
    status: MAPPED
    notes: "Narrative says 'Its ritual-aetiological function is primary: it provides a mythic charter for the regular delivery of offerings from Ur to Nippur's Ekur temple, mapping divine action onto attested cultic practice.' Faithful."

  - claim_id: C22
    claim_summary: "Royal-legitimation through reciprocal logic; secular power depends on religious sanction"
    narrative_location: "line 72 (paragraph 12)"
    status: MAPPED
    notes: "Narrative says 'The royal-legitimation function operates through the reciprocal logic of the journey itself: Ur sends offerings to Nippur and receives Enlil's blessing in return, encoding the dependence of secular power on religious sanction.' Faithful."

  - claim_id: C23
    claim_summary: "Barge procession parallels real ritual practice; admin texts document divine barge journeys"
    narrative_location: "line 75 (paragraph 12)"
    status: MAPPED
    notes: "Narrative says 'The barge procession described in the text has parallels in real ritual practice: administrative texts from the Ur III and Old Babylonian periods document divine barge journeys and offering deliveries between major Sumerian cities.' Faithful."

  - claim_id: C24
    claim_summary: "Manuscript distribution at both Nippur and Ur; valued at both ends of cultic relationship"
    narrative_location: "line 84 (paragraph 13)"
    status: MAPPED
    notes: "Narrative says 'The composition's manuscript distribution — attested at both Nippur and Ur — indicates it was valued at both the sending and receiving ends of the cultic relationship it describes.' Faithful."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOK_1
    claim_summary: "Egyptian barque of Ra parallel — divine river journey by barque as ritual and cosmic act"
    narrative_location: "line 89 (paragraph 14), line 91 (// comment)"
    status: MAPPED
    notes: "Narrative says 'In Egypt, the barque of Ra made its daily solar journey along the celestial Nile, and the great festival processions at Thebes carried the divine images by river between temples. The structural parallel is genuine: in both traditions, a god's journey by water is simultaneously a physical transit, a ritual performance, and a statement about the order of the cosmos.' COMPARATIVE-HOOK comment reproduced at line 91. Faithful."

  - claim_id: COMPARATIVE_HOOK_2
    claim_summary: "Offering processions between cult centres as mythic charter for real economic exchange"
    narrative_location: "line 93 (paragraph 14), line 95 (// comment)"
    status: MAPPED
    notes: "Narrative discusses the Sumerian version's distinctive practical character: 'offering processions between cult centres...are, at bottom, economic transactions dressed in theological language.' COMPARATIVE-HOOK comment reproduced at line 95. Faithful."

