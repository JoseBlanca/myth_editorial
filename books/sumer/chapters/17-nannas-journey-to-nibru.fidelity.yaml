  - claim_id: C04
    claim_summary: "Nanna-Suen is moon god, patron of Ur (Urim), son of Enlil, lord of Nippur (Nibru)"
    narrative_location: "line 11 (paragraph 3), line 15 (paragraph 4)"
    status: MAPPED
    notes: "Narrative line 15: 'Nanna-Suen — the moon god, son of Enlil, king of the gods, lord of wind and command, supreme authority in Nippur — is the patron deity of Ur.' Line 11 introduces Ur as 'Ur (Sumerian: Urim).' Faithful. Enlil glosses from glossary."

  - claim_id: C05
    claim_summary: "Multiple OB copies from Nippur and Ur scribal schools, confirms edubba curriculum"
    narrative_location: "line 2 (paragraph 1)"
    status: MAPPED
    notes: "Narrative says 'Multiple Old Babylonian copies from Nippur (Sumerian: Nibru)...and from Ur scribal schools confirm its place in the edubba curriculum, the standard body of texts that trainee scribes copied and studied.' Faithful."

  - claim_id: C06
    claim_summary: "Political/cultic axis between Ur and Nippur, Ur III royal ideology, Ekishnugal, Ekur"
    narrative_location: "line 11 (paragraph 3)"
    status: MAPPED
    notes: "Narrative says 'Ur (Sumerian: Urim)...seat of Nanna's temple the Ekishnugal — was the economic powerhouse...Nippur was the religious capital...seat of Enlil's temple (the Ekur). The axis between these two cities was central to Ur III royal ideology: Ur supplied the wealth, Nippur supplied the sanction.' Claims say 'Ekishnugal' and 'Ekur'; narrative matches. Faithful."

