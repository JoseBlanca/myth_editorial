  # --- Glossary compliance ---

  - id: F30
    check: glossary_compliance
    severity: NONE
    detail: >
      Checked all relevant glossary terms appearing in the narrative:
      - Anzud: first mention glossed as 'the divine lion-headed eagle' -- matches glossary exactly. PASS.
      - Aratta: first mention glossed as 'the distant, wealthy city beyond the ranges' -- partial match; glossary says 'distant, fabulously wealthy city beyond the mountains, rival of Uruk.' Minor: 'ranges' vs 'mountains', 'wealthy' vs 'fabulously wealthy', 'rival of Uruk' omitted. Acceptable for narrative flow.
      - me-lam: first mention glossed as 'the supernatural splendor that emanated from gods, sacred objects, and beings of cosmic power' -- glossary says 'the terrifying divine radiance that emanates from gods, monsters, and sacred objects.' Minor rewording: 'supernatural splendor' vs 'terrifying divine radiance', 'beings of cosmic power' vs 'monsters.' Acceptable variation.

  - id: F31
    check: glossary_compliance
    severity: LOW
    detail: >
      Inanna: first mention at line 86 glossed as 'the goddess of love and war, patron of Uruk,
      whose temple the E-ana stood at the heart of the city.' Glossary first_mention_gloss says
      'goddess of love, war, and the morning and evening star.' The narrative omits 'and the
      morning and evening star' but adds patron/temple information (consistent with Uruk glossary
      entry). The omission of the star association is a minor gap.

  - id: F32
    check: glossary_compliance
    severity: LOW
    detail: >
      Lugalbanda: no first-mention gloss provided in narrative. Glossary says 'soldier and later
      king of Uruk, father of Gilgamesh in tradition.' The narrative introduces him contextually
      as 'a soldier in Enmerkar's army' (line 8), which partially captures the glossary but omits
      'later king of Uruk' and 'father of Gilgamesh in tradition.' This may be intentional for
      the paired composition (the Mountain Cave chapter may carry the full gloss).

  - id: F33
    check: glossary_compliance
    severity: LOW
    detail: >
