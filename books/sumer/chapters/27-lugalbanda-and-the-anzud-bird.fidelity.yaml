    status: MAPPED
    notes: "Narrative: 'The army of Uruk was stalled before Aratta, unable to complete its campaign...He needed a messenger to travel back to Uruk and consult Inanna...about how to proceed.' Faithful."

  - claim_id: C18_LACUNA
    claim_summary: "Minor gaps in lines 350-380"
    narrative_location: "line 94"
    status: MAPPED
    notes: "LACUNA block reproduced from claims."

