    status: MAPPED
    notes: "Narrative: 'Lugalbanda volunteered. His supernatural speed made him the only soldier capable of making the journey in time.' and 'Lugalbanda ran to Uruk and delivered the message.' Faithful."

  # === Inanna's counsel ===

  - claim_id: C20
    claim_summary: "Inanna receives Lugalbanda, gives counsel for Enmerkar on how to overcome Aratta's defenses"
    narrative_location: "line 100 (paragraph 23)"
    status: MAPPED
    notes: "Narrative: 'Inanna received Lugalbanda and gave him counsel for Enmerkar: she instructed the army on how to overcome Aratta's defenses.' Faithful."

  - claim_id: C21
    claim_summary: "Lugalbanda races back with Inanna's message; round trip impossible without Anzud's gift"
    narrative_location: "line 103 (paragraph 24)"
    status: MAPPED
    notes: "Narrative: 'Lugalbanda raced back to the army with Inanna's message, completing the round trip that would have been impossible without the Anzud's gift.' Faithful."

  - claim_id: C22
    claim_summary: "Composition concludes with Lugalbanda's indispensable role confirmed; piety and reciprocity rather than martial prowess"
    narrative_location: "line 106 (paragraph 25)"
    status: MAPPED
    notes: "Narrative: 'The composition concludes with Lugalbanda's indispensable role confirmed: the abandoned soldier had become Enmerkar's most valuable asset through piety and reciprocity rather than martial prowess.' Faithful."

  # === Themes: reciprocity and piety ===

  - claim_id: C23
    claim_summary: "Narrative arc from abandoned soldier to indispensable messenger driven by reciprocity theme"
    narrative_location: "line 111 (paragraph 26)"
    status: MAPPED
    notes: "Narrative: 'The narrative arc of this composition -- from abandoned soldier to indispensable messenger -- is driven entirely by the reciprocity theme. Lugalbanda's unsolicited care for the Anzud chick earned a supernatural reward that determined the outcome of Enmerkar's campaign.' Faithful."

  - claim_id: C24
    claim_summary: "Lugalbanda's choice to request speed rather than wealth or power demonstrates valorization of practical humility"
    narrative_location: "line 68 (paragraph 14), line 116 (paragraph 27)"
    status: MAPPED
    notes: "Narrative line 68: 'Lugalbanda's request demonstrates the composition's valorization of practical humility over conventional heroic ambition.' Line 116: 'Lugalbanda's choice to request speed rather than wealth or power demonstrates this principle at its most explicit.' Faithful; expressed in two places."

  - claim_id: C25
    claim_summary: "Piety and reciprocity toward divine rewarded; Lugalbanda's humility contrasts with martial valor in heroic poetry"
    narrative_location: "line 111 (paragraph 26)"
    status: MAPPED
    notes: "Narrative: 'The text teaches that piety and reciprocity toward the divine are rewarded with supernatural gifts, and Lugalbanda's humility contrasts sharply with the martial valor typically celebrated in heroic poetry.' Faithful."

  # === Textual transmission ===

  - claim_id: C26
    claim_summary: "One of most heavily attested Sumerian narrative compositions; numerous OB manuscripts from Nippur and other scribal centers"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'It is one of the most heavily attested Sumerian narrative compositions, preserved in numerous Old Babylonian manuscripts from Nippur and other scribal centers.' Faithful."

  - claim_id: C27
    claim_summary: "Jacobsen literary translation (pp. 320-344) emphasizes poetic dimension; Vanstiphout critical edition (pp. 215-275) documents variant readings"
    narrative_location: "line 11 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'Jacobsen's literary translation (pp. 320--344) emphasizes the poetic dimension of the encounter, while Vanstiphout's critical edition (pp. 215--275) documents minor variant readings in the Anzud-encounter and gift-granting scenes.' Faithful."

  - claim_id: C28
    claim_summary: "Paired with Lugalbanda in Mountain Cave; narrative diptych within Aratta cycle linking personal story to Uruk-Aratta contest"
    narrative_location: "line 8 (paragraph 2), line 119 (paragraph 28)"
