    notes: "Narrative line 8: 'Together, the two compositions form a narrative diptych within the Aratta cycle, linking Lugalbanda's personal story to the larger contest between Uruk and Aratta.' Line 119: 'This composition, paired with \"Lugalbanda in the Mountain Cave,\" forms a narrative diptych within the Aratta cycle.' Faithful."

  # === Comparative hooks ===

