  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Lugalbanda alone in mountains, separated from Enmerkar's army marching toward Aratta; picks up from end of Mountain Cave"
    narrative_location: "line 17 (paragraph 4), line 22 (paragraph 5)"
    status: MAPPED
    notes: "Narrative line 17: 'Lugalbanda was alone in the mountains, separated from Enmerkar's army, which continued its march toward Aratta.' Line 22: 'The composition picks up directly from the end of the preceding text.' Faithful."

  - claim_id: C04_LACUNA
    claim_summary: "Opening lines (1-15) partially damaged"
    narrative_location: "line 20"
    status: MAPPED
    notes: "LACUNA block reproduced from claims."

  - claim_id: C05
    claim_summary: "Lugalbanda wanders mountains alone, surviving through resourcefulness and piety"
    narrative_location: "line 22 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'Lugalbanda wandered the mountains, surviving through the resourcefulness and piety he had demonstrated in the preceding composition.' Faithful."

  # === Discovery of the Anzud nest ===

  - claim_id: C06
    claim_summary: "Lugalbanda discovers nest of the Anzud bird -- enormous divine eagle -- high in mountains while parents away hunting"
    narrative_location: "line 29 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'He discovered a nest -- not the nest of any ordinary bird, but the nest of the Anzud, the divine lion-headed eagle, an enormous creature of terrifying power whose wingspan darkened the mountains.' Faithful. Narrative adds 'lion-headed' (matches glossary first_mention_gloss) and 'whose wingspan darkened the mountains' (stylistic elaboration). The claims say 'enormous divine eagle'; narrative says 'divine lion-headed eagle' -- both correct per glossary."

  - claim_id: C07
    claim_summary: "Nest contains single chick left alone while parents forage; Lugalbanda approaches"
    narrative_location: "line 29 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'the parent birds were away. They had gone hunting, leaving behind a single chick.' Faithful."

  # === Lugalbanda honors the chick ===

  - claim_id: C08
    claim_summary: "Lugalbanda paints chick's eyes with kohl and dabs white cedar scent onto its head, honoring it as divine being"
    narrative_location: "line 39 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'He painted its eyes with kohl -- the cosmetic preparation that in Mesopotamian practice signified honor and beauty -- and dabbed white cedar scent onto its head, honoring it as a divine being.' Faithful."

  - claim_id: C09
    claim_summary: "Lugalbanda prepares choice foods: cakes of honey-kneaded dough, salt meat, sheep's fat; ritual deference due to god's offspring"
    narrative_location: "line 42 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'He prepared choice foods for the chick: cakes of honey-kneaded dough, salt meat, and sheep's fat, treating the young bird with the ritual deference due to a god's offspring.' Faithful."

  - claim_id: C10
    claim_summary: "Care presented as act of reciprocity in advance; honoring chick creates obligation parent must fulfill"
    narrative_location: "line 45 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'The care Lugalbanda lavished on the Anzud chick was presented as an act of reciprocity in advance. By honoring the chick, he created an obligation that the parent bird would be compelled to fulfill.' Faithful."

  # === Return of the Anzud bird ===

  - claim_id: C11
    claim_summary: "Anzud returns, finds chick well-fed, adorned, cared for; overjoyed"
    narrative_location: "line 52 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'The Anzud bird came back to its nest and found its chick well-fed, adorned, and cared for. The joy was immediate and unmistakable.' Faithful."

  - claim_id: C12
    claim_summary: "Parent Anzud described with terrifying divine radiance (me-lam); enormous power"
    narrative_location: "line 54 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'The text pauses to describe the parent Anzud with its terrifying divine radiance -- the _me-lam_, the supernatural splendor that emanated from gods, sacred objects, and beings of cosmic power.' Faithful. Slight rewording of glossary gloss (see F32 below)."

  - claim_id: C13
    claim_summary: "Anzud grateful, offers Lugalbanda a reward, asks him to name his desire"
    narrative_location: "line 58 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'The Anzud bird, grateful for the care shown to its chick, offered Lugalbanda a reward and asked him to name his desire.' Faithful."

  # === The gift of supernatural speed ===

  - claim_id: C14
    claim_summary: "Lugalbanda asks for supernatural speed -- tireless, matchless swiftness -- rather than wealth, weapons, or other conventional rewards"
    narrative_location: "line 65 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'He asked for supernatural speed -- the ability to travel with tireless, matchless swiftness across any terrain.' Faithful."

  - claim_id: C15
    claim_summary: "Anzud grants gift; Lugalbanda runs without tiring, faster than any being; transforms from stranded soldier to extraordinary messenger"
    narrative_location: "line 71 (paragraph 15)"
    status: MAPPED
    notes: "Narrative: 'Lugalbanda would run without tiring, his feet carrying him faster than any other being -- a supernatural endowment that transformed him from a stranded soldier into an extraordinary messenger.' Faithful."

  - claim_id: C16
    claim_summary: "Anzud imposes secrecy condition: must not reveal source of speed"
    narrative_location: "line 74 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'The Anzud bird imposed a single prohibition: Lugalbanda must not reveal the source of his speed to anyone. The gift must remain secret.' Faithful."

  - claim_id: C16_INFERENCE
    claim_summary: "Secrecy condition creates narrative tension and divine taboo; common motif"
    narrative_location: "line 77"
    status: MAPPED
    notes: "INFERENCE block reproduced from claims."

  # === Lugalbanda rejoins the army ===

  - claim_id: C17
    claim_summary: "Lugalbanda crosses mountain terrain with supernatural speed, rejoins army; companions astonished"
    narrative_location: "line 83 (paragraph 18)"
    status: MAPPED
    notes: "Narrative: 'He crossed the mountain terrain that separated him from Enmerkar's army and rejoined his companions, who were astonished by his survival and arrival.' Faithful."

  - claim_id: C18
    claim_summary: "Army of Uruk stalled before Aratta; Enmerkar needs messenger to consult Inanna in Uruk"
