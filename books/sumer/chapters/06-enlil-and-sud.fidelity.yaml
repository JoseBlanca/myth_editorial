additions:
  status: "MINOR-ISSUES"
  high_severity: 0
  medium_severity: 0
  low_severity: 12
  items:
    - id: "ADD-01"
      severity: "LOW"
      location: "narrative line 9"
      text: >
        Where chapter 5 gave us a god who took what he wanted and was
        punished for it, this composition gives us the same god learning
        -- or at least demonstrating -- a different way. The pairing is
        not accidental. The two texts concern the same divine couple,
        and the Old Babylonian scribal curriculum preserved both of
        them. Together, they form a diptych: one panel showing how not
        to do it, the other showing how it ought to be done.
      note: >
        Editorial elaboration on the approved claim about the contrast
        between chapters 5 and 6. The diptych metaphor is interpretive
        language but does not introduce new factual content. Consistent
        with the claims and the INFERENCE marker about contrasting
        exempla.

    - id: "ADD-02"
      severity: "LOW"
      location: "narrative line 14"
      text: >
        Eresh is the home of Nisaba, goddess of grain and writing, and
        of her daughter Sud. It is not Nippur. Enlil is away from his
        seat of power, a visitor in someone else's city, and the
        narrative makes this displacement felt. He is not surrounded by
        his assembly, not seated in the E-kur, not dispensing decrees.
        He is on the road, and what he encounters there will test
        whether the king of the gods can behave like something other
        than a king.
      note: >
        Interpretive elaboration on the approved claim about Enlil
        travelling to Eresh. The observation about displacement and the
        E-kur follows from the glossary entry for Nippur and the claim
        about Eresh being Nisaba's city. No new mythological content.

    - id: "ADD-03"
      severity: "LOW"
      location: "narrative line 17"
      text: >
        The approach is blunt. There is no preamble, no negotiation, no
        intermediary. Enlil sees a young woman and tells her what he
        wants. If the reader has just finished chapter 5, the scene
        carries an unmistakable echo. The king of the gods, encountering
        a young goddess, making a direct sexual advance -- the pattern
        is identical to the canal scene in "Enlil and Ninlil." The text
        seems to be setting up the same catastrophe.
      note: >
        Editorial commentary drawing the explicit parallel to chapter 5
        that the approved claims establish. The canal scene reference is
        consistent with the approved claims about the contrast between
        the two texts. No new factual content.

    - id: "ADD-04"
      severity: "LOW"
      location: "narrative line 22"
      text: >
        The refusal is sharp and articulate. Sud does not merely
        decline; she tells him why his behaviour is unacceptable. She
        has standing in her community, she has a mother, she has a
        name... And here the two narratives diverge. In "Enlil and
        Ninlil," the refusal was overridden. In "Enlil and Sud," it
        holds.
      note: >
        Interpretive expansion on the approved claim about Sud's
        rejection. The contrast with Enlil and Ninlil is consistent
        with the approved comparative claims. No new factual assertions.

    - id: "ADD-05"
      severity: "LOW"
      location: "narrative line 29"
      text: >
        Nusku is Enlil's trusted vizier, the god who carries messages
        and executes commands on Enlil's behalf. His dispatch to Nisaba
        is not a casual errand. It is a formal diplomatic mission...
        The shift from direct proposition to mediated courtship is the
        hinge on which the entire story turns. Enlil does not try
        again. He does not insist. He changes his approach entirely.
      note: >
        Elaboration on the approved claim about Enlil sending Nusku.
        The description of Nusku as vizier is consistent with standard
        Sumerological understanding. The structural observation about
        the narrative hinge is editorial, not factual.

    - id: "ADD-06"
      severity: "LOW"
      location: "narrative line 34"
      text: >
        This is worth pausing over. Nisaba is not merely a mother in
        the domestic sense. She is the patron deity of the scribal
        craft, the goddess who presides over the edubba... The fact
        that the marriage negotiations pass through her is doubly
        significant... The marriage of Enlil and Sud will not be an
        impulse acted upon. It will be a documented transaction,
        handled by the deity who invented documentation.
      note: >
        Extended interpretive commentary on the approved claims about
        Nisaba's dual nature. Consistent with both the Nisaba claims
        and the glossary. The observation about "documented transaction"
        is a literary flourish, not a new factual assertion.

    - id: "ADD-07"
      severity: "LOW"
      location: "narrative line 37"
      text: >
        For the scribal students copying this text in the edubba, the
        resonance would have been immediate. Their own patroness was
        the one who set the terms of the most important divine marriage
        in the pantheon. Every time they picked up a stylus, they were
        under her authority.
      note: >
        Pedagogical elaboration consistent with the approved claims
        about Nisaba as patron of the scribal craft and the cultural
        function of the composition. No new factual claims.

    - id: "ADD-08"
      severity: "LOW"
      location: "narrative line 44"
      text: >
        The catalogue is detailed, and the detail is the point. This is
        not a vague mention of "gifts." The text enumerates specific
        items -- types of metal, categories of cloth, kinds of food --
        with the exhaustiveness of an inventory. The effect is
        deliberately cumulative.
      note: >
        Editorial emphasis on the approved claim about the gift
        catalogue. The rhetorical framing is interpretive but the
        factual content (enumerated specific items) is consistent with
        the claim about jewellery, precious metals, fine garments, and
        food provisions.

    - id: "ADD-09"
      severity: "LOW"
      location: "narrative line 46"
      text: >
        This correspondence is not a coincidence. The composition is
        modelling ideal behaviour, and the model it chooses is the
        legal one. A proper Sumerian marriage required a bride-price
        paid by the groom's family to the bride's family... What Enlil
        does in the mythological narrative is exactly what a wealthy
        Sumerian household head would do in practice.
      note: >
        Interpretive expansion on the approved claim about bride-price
        conventions and the INFERENCE marker about the gift-list as
        literary model. Consistent with both. No new factual content.

    - id: "ADD-10"
      severity: "LOW"
      location: "narrative line 52"
      text: >
        The acceptance is Nisaba's act, not Sud's. This, too, follows
        Sumerian legal custom precisely. The bride's consent was
        mediated through her family -- specifically through the senior
        female authority in the household... The arrangement is
        contractual, and the contracting parties are Enlil (represented
        by Nusku) and Nisaba.
      note: >
        Editorial commentary on the approved claim about Nisaba
        accepting on behalf of her daughter. The observation about
        Sumerian legal custom is consistent with the approved claims
        about marriage protocol. No new mythological content.

    - id: "ADD-11"
      severity: "LOW"
      location: "narrative line 62"
      text: >
        The significance of this cannot be overstated. In Sumerian
        thought, a name was not a label. It was an identity -- a set
        of powers, functions, and relationships embedded in the word
        itself. To change a name was to change the nature of the being
        who bore it. Sud was a young goddess in her mother's city.
        Ninlil is the queen of the gods... It transforms her into a
        different kind of being.
      note: >
        Interpretive elaboration on the approved claims about the
        renaming as theological act. Consistent with the claim that
        Sud acquires divine status through sacred marriage. The
        observation about Sumerian naming philosophy is a reasonable
        contextual gloss, not a new factual assertion.

    - id: "ADD-12"
      severity: "LOW"
      location: "narrative line 76"
      text: >
        The pairing is especially pointed because both texts were part
        of the Old Babylonian scribal curriculum at Nippur. The same
        students who copied the tale of Enlil's transgression also
        copied the tale of his proper courtship... One text shows the
        cost of acting without restraint. The other shows the reward
        of acting within the system.
      note: >
        Expansion on the approved INFERENCE marker about the two
        compositions as contrasting exempla in the scribal curriculum.
        Stays within the scope of the inference and its stated basis.
        No new factual content.

