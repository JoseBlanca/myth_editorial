chapter: 15
title: "Dumuzid's Dream"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "Catalogued as ETCSL 1.4.3; survives on OB tablets; critical edition by Alster (1972)"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The composition known to scholars as \"Dumuzid's Dream\" is catalogued as ETCSL 1.4.3 and comprises approximately 260 lines in the composite text, surviving on Old Babylonian tablets.' and 'Bendt Alster's 1972 monograph provides the critical edition.' Faithful."

  - claim_id: C02
    claim_summary: "Generally well-preserved"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The text is generally well-preserved.' Faithful, verbatim."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite text + Black et al. 2004 pp. 71-77 + Alster 1972"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Black et al. 2004, pp. 71–77; Alster 1972.' Faithful, verbatim."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Composition comprises approximately 260 lines in the composite text"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'comprises approximately 260 lines in the composite text.' Faithful."

  - claim_id: C05
    claim_summary: "Well-attested in OB copies; part of broader Dumuzid dying-god tradition in scribal curriculum"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The text is well-attested in Old Babylonian copies and forms part of the broader Dumuzid dying-god tradition in the scribal curriculum.' Faithful, verbatim."

  - claim_id: C06
    claim_summary: "Alster 1972 monograph is critical edition and foundational philological study"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'Bendt Alster's 1972 monograph provides the critical edition and remains the foundational philological study.' Faithful. Adds Alster's first name 'Bendt' — trivial biographical detail."

  - claim_id: C07
    claim_summary: "Text classified as single-prevalent; broad manuscript agreement; no substantive narrative divergence"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'It is classified as single-prevalent: there is broad manuscript agreement and no substantive narrative divergence among witnesses, as confirmed by Alster's collation.' Faithful, verbatim from claims."

  - claim_id: C08
    claim_summary: "Narrative set against background of Inanna's Descent (ETCSL 1.4.1); Dumuzid marked as Inanna's substitute; galla demons coming to seize him"
    narrative_location: "line 13 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'The narrative is set against the background of Inanna's Descent (ETCSL 1.4.1): Dumuzid — the shepherd-god and consort of Inanna — has been marked as Inanna's substitute in the underworld, and the galla demons — underworld demons who enforce the laws of the dead — are coming to seize him.' Faithful. Adds glossary-mandated first-mention glosses for Dumuzid and galla."

  # === The prophetic dream ===

  - claim_id: C09
    claim_summary: "Dumuzid, shepherd-god and consort of Inanna, has terrifying prophetic dream and awakes in distress"
    narrative_location: "line 18 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'Dumuzid has a terrifying prophetic dream and awakes in distress.' Faithful. 'Shepherd-god and consort of Inanna' covered in C08 mapping at line 13."

  - claim_id: C10
    claim_summary: "Dumuzid summons sister Geshtinanna and recounts dream, asking her to interpret it"
    narrative_location: "line 20 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'He summons his sister Geshtinanna — goddess and sister of Dumuzid, who will later share his time in the underworld — and recounts the dream to her, asking her to interpret it.' Faithful. Adds glossary-mandated first-mention gloss for Geshtinanna."

  - claim_id: C11
    claim_summary: "Dream contains symbolic images: reeds rise, single reed trembles, twin reeds removed, trees rise, water poured on holy hearth"
    narrative_location: "line 22 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'The dream contains a sequence of symbolic images: reeds rise around him, a single reed trembles, twin reeds are removed one by one, trees rise around him, and water is poured on his holy hearth.' Faithful, verbatim from claims."

  - claim_id: C12
    claim_summary: "Dream images include: drinking cup falls from peg, shepherd's crook vanishes, eagle seizes lamb, falcon catches sparrow, goats drag beards in dust, sheep paw ground with bent limbs"
    narrative_location: "line 24 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'His drinking cup falls from its peg. His shepherd's crook vanishes. An eagle seizes a lamb from the sheepfold. A falcon catches a sparrow. His goats drag their beards in the dust. His sheep paw the ground with their bent limbs.' Faithful, all six images present."

  - claim_id: C13
    claim_summary: "Churning stick lies on ground, cup no longer pours; images dismantle pastoral symbols of Dumuzid's shepherd identity"
    narrative_location: "line 24 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'The churning stick lies on the ground and the cup no longer pours. The images systematically dismantle the pastoral symbols of Dumuzid's identity as shepherd — crook, cup, flock, dairy tools — stripping away every emblem of the life he is about to lose.' Faithful. Adds 'stripping away every emblem' as stylistic elaboration."

  # === Geshtinanna's interpretation ===

  - claim_id: C14
    claim_summary: "Geshtinanna interprets each dream image as foretelling Dumuzid's doom: galla demons coming"
    narrative_location: "line 28 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Geshtinanna interprets each dream image as foretelling Dumuzid's doom: the galla demons are coming to seize him.' Faithful, verbatim."

  - claim_id: C15_LACUNA
    claim_summary: "LACUNA: Lines 45-55 in dream-interpretation partially damaged; Alster 1972 collates witnesses to fill most gaps"
    narrative_location: "line 30"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C16
    claim_summary: "Geshtinanna tells Dumuzid each pastoral symbol represents specific element of capture: reeds are demons, fallen cup is overthrown status, scattered flock is dispersed protection"
    narrative_location: "line 32 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'Geshtinanna tells Dumuzid that each pastoral symbol undone in the dream represents a specific element of his impending capture: the reeds are the demons, the fallen drinking cup is his overthrown status, the scattered flock is his dispersed protection.' Faithful, verbatim."

  # === Flight and transformations ===

  - claim_id: C17
    claim_summary: "Dumuzid flees across the steppe, pursued by galla demons"
    narrative_location: "line 40 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'Dumuzid flees across the steppe, pursued by the galla demons.' Faithful, verbatim."

  - claim_id: C18
    claim_summary: "Dumuzid appeals to sun god Utu (brother of Inanna, thus brother-in-law) to transform him"
    narrative_location: "line 40 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'He appeals to the sun god Utu — brother of his wife Inanna and thus his brother-in-law — to transform him so he may escape.' Faithful."

  - claim_id: C19
    claim_summary: "Utu grants transformation: hands changed to gazelle hands (hooves), feet to gazelle feet"
    narrative_location: "line 42 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'Utu grants the transformation: Dumuzid's hands are changed into gazelle hands — hooves — and his feet into gazelle feet, enabling him to run.' Faithful, verbatim."

  - claim_id: C20
    claim_summary: "Dumuzid flees to succession of hiding places, repeatedly requesting and receiving further transformations"
    narrative_location: "line 46 (paragraph 13)"
    status: MAPPED
    notes: "Narrative: 'Dumuzid flees to a succession of hiding places, repeatedly requesting and receiving further transformations to escape the pursuing galla.' Faithful, verbatim."

  - claim_id: C21
    claim_summary: "Flight described in repetitive formulaic pattern: reach refuge, galla find him, flee again — emphasising inescapability of fate"
    narrative_location: "line 46 (paragraph 13)"
    status: MAPPED
    notes: "Narrative: 'The flight is described in a repetitive formulaic pattern: Dumuzid reaches a refuge, the galla find him, he flees again.' and 'The pattern emphasises the inescapability of his fate — not through argument but through demonstration.' Faithful."

  # === Geshtinanna's loyalty and the sheepfold ===

  - claim_id: C22
    claim_summary: "Dumuzid hides in the sheepfold of his sister Geshtinanna"
    narrative_location: "line 52 (paragraph 15)"
    status: MAPPED
    notes: "Narrative: 'Dumuzid hides in the sheepfold of his sister Geshtinanna.' Faithful, verbatim."

  - claim_id: C23
    claim_summary: "Galla interrogate Geshtinanna; she refuses to betray brother despite threats"
    narrative_location: "line 54 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'The galla demons arrive and interrogate Geshtinanna, demanding to know Dumuzid's location; she refuses to betray her brother despite their threats.' Faithful, verbatim."

  - claim_id: C24
    claim_summary: "A friend/companion of Dumuzid (unnamed) betrays him to galla, revealing hiding place"
    narrative_location: "line 56 (paragraph 17)"
    status: MAPPED
    notes: "Narrative: 'A friend or companion of Dumuzid — sometimes identified as his unnamed friend — betrays him to the galla, revealing his hiding place.' Faithful, verbatim."

  # === Capture ===

  - claim_id: C25
    claim_summary: "Galla seize Dumuzid; capture fulfils every element of prophetic dream"
    narrative_location: "line 62 (paragraph 19)"
    status: MAPPED
    notes: "Narrative: 'The galla demons seize Dumuzid; the capture fulfils every element of the prophetic dream.' Faithful, verbatim."

  - claim_id: C26
    claim_summary: "Dumuzid taken to nether world; narrative closes with inevitability of dream's fulfilment confirmed"
    narrative_location: "line 64 (paragraph 20)"
    status: MAPPED
    notes: "Narrative: 'Dumuzid is taken to the nether world; the narrative closes with the inevitability of the dream's fulfilment confirmed.' Faithful, verbatim."

  # === Theological and literary significance ===

  - claim_id: C27
    claim_summary: "Composition dramatises inevitability of death through prophetic dream that unfolds exactly as foretold; foreknowledge does not enable escape"
    narrative_location: "line 68 (paragraph 21)"
    status: MAPPED
    notes: "Narrative: 'The composition dramatises the inevitability of death through a prophetic dream that unfolds exactly as foretold; foreknowledge does not enable escape.' Faithful, verbatim."

  - claim_id: C28
    claim_summary: "Alster's monograph established text as key exemplar of Sumerian oral-poetic technique: formulaic repetitions, catalogue of transformations, dream-interpretation genre reflect oral compositional patterns"
    narrative_location: "lines 3, 46, 72 (paragraphs 1, 13, 23)"
    status: MAPPED
    notes: "Narrative at line 3: 'a work that established this composition as a key exemplar of Sumerian oral-poetic technique.' Line 46: 'Alster's monograph identified these formulaic repetitions...as reflecting oral compositional patterns.' Line 72: 'The formulaic repetitions of the flight sequence, the catalogue of transformations, and the dream-interpretation genre all reflect oral compositional patterns that Alster's monograph was the first to analyse systematically in this text.' Faithful, claim fully covered across multiple locations."

  - claim_id: C29
    claim_summary: "Contrast between Geshtinanna's absolute loyalty and friend's betrayal constitutes emotional and ethical core of narrative"
    narrative_location: "line 58 (paragraph 18)"
    status: MAPPED
    notes: "Narrative: 'The contrast between Geshtinanna's absolute loyalty and the friend's betrayal constitutes the emotional and ethical core of the narrative.' Faithful, verbatim."

  - claim_id: C30
    claim_summary: "Jacobsen discusses composition in context of Dumuzid cycle's pastoral imagery and tension between steppe (pastoral freedom) and underworld (inescapable fate)"
    narrative_location: "line 70 (paragraph 22)"
    status: MAPPED
    notes: "Narrative: 'Jacobsen discusses the composition in the context of the Dumuzid cycle's pastoral imagery and the tension between the steppe — pastoral freedom, the open space where a shepherd and his flock move under the sky — and the underworld, where that freedom ends.' Faithful. Adds evocative glosses for 'steppe' and 'underworld' as stylistic elaboration."

  - claim_id: C31_INFERENCE
    claim_summary: "INFERENCE: Transformation motif may reflect older stratum of dying-god tradition in which deity literally identified with steppe animals"
    narrative_location: "line 44"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOK_ANE
    claim_summary: "Prophetic dreams foretelling inescapable death across ANE literature, including Gilgamesh's dreams"
    narrative_location: "line 76 (paragraph 24)"
    status: MAPPED
    notes: "Narrative: 'Prophetic dreams foretelling inescapable death appear across ancient Near Eastern literature, most notably in the dreams of Gilgamesh and Enkidu in the Gilgamesh tradition, where foreknowledge likewise fails to prevent the dreamer's fate.' Faithful. Adds Enkidu as additional example, consistent with the Gilgamesh tradition."

  - claim_id: COMPARATIVE_HOOK_GREEK
    claim_summary: "Tragic foreknowledge echoes Greek tragic heroes (Cassandra, Oedipus) who cannot escape fates despite knowing them"
    narrative_location: "line 78 (paragraph 25)"
    status: MAPPED
    notes: "Narrative: 'Cassandra sees Troy's destruction and cannot prevent it; Oedipus flees the prophecy and runs directly into its fulfilment — and the structural parallel with Dumuzid's situation is close enough to suggest that the question itself is fundamental.' Faithful."

  - claim_id: COMPARATIVE_HOOK_BETRAYAL
    claim_summary: "Betrayal by companion while loyal sibling protects parallels Judas/Peter and Irish myth patterns"
    narrative_location: "line 78 (paragraph 25)"
    status: MAPPED
    notes: "Narrative: 'The betrayal by a companion while a loyal sibling protects resonates beyond Mesopotamia as well — the pattern of steadfast kin and faithless friend appears in traditions as widely separated as the Irish hero-tales and the Gospel narratives.' Faithful. 'Gospel narratives' covers the Judas/Peter reference implicitly."

  - claim_id: COMPARATIVE_HOOKS_COMMENTS
    claim_summary: "Three // COMPARATIVE-HOOK comments at end of file"
    narrative_location: "lines 82-84"
    status: MAPPED
    notes: "All three // COMPARATIVE-HOOK comments are reproduced verbatim at the end of the narrative. Faithful."

