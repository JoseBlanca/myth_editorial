findings:

  # --- Check 1: Completeness ---

  - id: F01
    check: completeness
    severity: NONE
    detail: "All 28 claims (including 2 INFERENCE blocks, 1 LACUNA block, 1 VARIANT block, and 3 COMPARATIVE-HOOK comments) from the approved claims file are present in the narrative. No claims were dropped."

  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 8 (paragraph 2)"
    detail: "Narrative adds an entire editorial paragraph: 'That last point requires emphasis. Every other Sumerian poem about Gilgamesh involves the gods, the underworld, monsters, or some combination of all three. This one does not. There are no divine interventions, no prophetic dreams, no supernatural adversaries. There are only two cities, two kings, two political assemblies, and a wall.' This is interpretive emphasis of claim C02/C28 (no supernatural elements). No new factual claim; stylistic elaboration of already-approved content."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 12 (paragraph 3)"
    detail: "Narrative adds: 'These are the only two characters who truly matter, and the composition wastes no time establishing their positions. Gilgamesh rules the south. Aga claims supremacy over all of Sumer. Something has to give.' Editorial transition summarising claims C04 and C05. No new factual claim."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 20 (paragraph 5)"
    detail: "Narrative adds editorial paragraph: 'The historical kernel deserves a moment's attention. Kish and Uruk were both real cities. The Sumerian King List records dynasties at both, and the struggle between them for hegemony over the Sumerian plain is attested in sources well beyond this poem.' Elaboration of C07 (historical kernel, real political tensions). The reference to the Sumerian King List is a commonly known fact consistent with the claim's content. Minor amplification."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 20 (paragraph 5)"
    detail: "Narrative adds: 'roughly the middle of the third millennium BCE' as a dating for the Early Dynastic period. This is standard scholarly knowledge consistent with the claim's reference to the Early Dynastic period. Not a new unsourced assertion."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 20 (paragraph 5)"
    detail: "Narrative adds: 'The poem is not history in any modern sense. But it is not fantasy either. It occupies a category that the Sumerians understood better than we do: the literary encoding of political memory.' Interpretive commentary on C07's 'historical kernel' characterisation. No new factual claim."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 24 (paragraph 6)"
    detail: "Narrative adds explanation of corvee labour: 'The demand is not for tribute in gold or grain. It is for labour -- the most direct assertion of political dominance available in a society where the great public works (canals, temples, fortification walls) were built by the conscripted muscle of subject populations.' Interpretive gloss on 'corvee labour' from C08. Historically accurate general context, not a new textual claim."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 24 (paragraph 6)"
    detail: "Narrative adds: 'To accept Kish's demand would be to acknowledge Uruk as a subordinate city. To refuse it would be to invite war.' Logical implications of the corvee demand as stated in C08. Interpretive summary."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 27"
    detail: "Narrative adds: 'What Gilgamesh does next is the most politically remarkable passage in the entire Sumerian literary corpus. He does not simply decide. He consults.' Editorial emphasis on the assembly consultation. Interpretive characterisation consistent with C13 and C26."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 29 (paragraph 7)"
    detail: "Narrative adds: 'Their reasoning is pragmatic and conservative: Kish is powerful, war is uncertain, and the costs of resistance may exceed the costs of compliance. These are the arguments of men who have lived long enough to know what wars do to cities.' Interpretive elaboration of C10's 'advising that Uruk should yield rather than risk war.' Colorful characterisation, no new factual claim."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 33 (paragraph 8)"
    detail: "Narrative adds: 'Their reasoning is equally characteristic: they are the ones who would do the fighting, and they would rather fight than dig canals for a foreign king.' Interpretive elaboration of C12. Consistent with the corvee context in C08."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 42 (paragraph 10)"
    detail: "Narrative adds extended editorial analysis of the assembly structure: 'What we have here is a king who does not rule by fiat... He has the authority to make the decision himself... he chooses to consult two distinct bodies before acting... This is not consensus. It is deliberation... A king who consults is not a weak king... legitimacy derives not from unilateral decree but from the process of hearing competing counsel.' This is interpretive commentary expanding on C13, C14_INFERENCE, C26, and C27. No new factual claims; thematic analysis of established claims."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 46 (paragraph 11)"
    detail: "Narrative adds: 'He sides with the warriors against the elders. The text does not criticise the elders for their caution or praise the young men for their boldness. Both positions are presented as legitimate political counsel, and Gilgamesh's choice between them is precisely that -- a choice, not a correction.' Interpretive elaboration consistent with C27 (both positions presented as legitimate). No new factual claim."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 52 (paragraph 12)"
    detail: "Narrative adds: 'The consequences of Gilgamesh's decision arrive promptly. The young men urged war; war has come. The elders warned of conflict; they were right about that, at least. But the composition is not interested in proving either faction correct. It is interested in what happens next: a siege, and the question of who will break first.' Editorial transition. Interpretive, no new factual claim."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 55 (paragraph 13)"
    detail: "Narrative adds: 'This is one of the few appearances of Enkidu in Sumerian narrative where he functions not as a wild man or a tragic hero but as a military subordinate -- a counsellor and officer in a political crisis. The composition's resolutely human register extends to its treatment of Enkidu: he is not the man of the wilderness here. He is a man on a wall.' Interpretive characterisation of C17. The observation about Enkidu's role is consistent with the claims file's 'companion and adviser' and the composition's lack of supernatural elements (C28)."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 58 (paragraph 14)"
    detail: "Narrative adds: 'The moment is compressed and difficult to interpret in detail -- the text moves quickly, and the exact sequence of actions is not entirely clear. What is clear is that the wall of Uruk is the stage on which the crisis plays out. Men appear on it; the enemy reacts; the dynamics of the siege shift with each appearance.' Interpretive commentary on the Birhurturre episode (C18). Consistent with LACUNA block (C19_LACUNA) acknowledging textual difficulties."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 65 (paragraph 15)"
    detail: "Narrative adds extended editorial paragraph: 'This is the climax of the composition, and it is worth noting what does not happen. No god intervenes. No supernatural weapon is deployed. No prayer is answered by divine fire. Gilgamesh simply appears on the wall, and the effect of his presence -- his physical stature, his royal bearing, the sheer fact of him standing above the battlements -- is enough. In a corpus where divine radiance routinely flattens armies and monsters die under enchanted weapons, this is startlingly naturalistic. The king stands on his wall. The enemy falters. The mechanism is charisma, not magic.' Interpretive emphasis of C21 combined with C28. No new factual claim."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 72 (paragraph 16)"
    detail: "Narrative adds: 'The siege ends, and Uruk has won. The young men were right: resistance was possible. The elders were not wrong: war did come. But the city held, and the king of Kish is now a prisoner in the city he came to subjugate.' Editorial summary connecting C22 to earlier assembly claims. No new factual claim."

  - id: F19
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 75 (paragraph 17)"
    detail: "Narrative adds: 'The text is explicit: Gilgamesh owes Aga something. The exact nature of the prior obligation is not fully spelled out -- the text compresses what was presumably a well-known backstory into a few lines -- but the implication is clear. Aga had done Gilgamesh a favour at some earlier point, and Gilgamesh, now holding Aga's life in his hands, chooses to repay it.' Elaboration of C23 and C24_INFERENCE. The claim already states 'acknowledging a prior debt of gratitude' and the inference block discusses the unclear prior obligation. Narrative restates rather than adds new facts."

  - id: F20
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 80 (paragraph 18)"
    detail: "Narrative adds editorial analysis: 'This is not mercy in the sentimental sense. It is the application of a political principle: that relationships between rulers are governed by reciprocal obligation, and that a debt of gratitude survives even war. Gilgamesh could have executed Aga and eliminated Kish's challenge permanently. Instead, he released a defeated enemy and, in doing so, demonstrated something more valuable than mere military supremacy. He demonstrated that he understood the rules of the game -- that kingship in Sumer was not simply a matter of force but of conduct.' Interpretive expansion of C23 and C24_INFERENCE. The inference block already identifies 'reciprocal obligation.' No new factual claim."

  - id: F21
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 84 (paragraph 18)"
    detail: "Narrative adds: 'The ending is swift -- two or three lines of praise after a hundred lines of political narrative. But the brevity is appropriate. The point has been made. Uruk is free. Gilgamesh is king. Kish's claim to hegemony has been tested and broken.' Editorial commentary on C25. The 'two or three lines' is consistent with 'lines 113-115' in the claim. No new factual claim."

  - id: F22
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 89 (paragraph 19)"
    detail: "Narrative adds: 'This is not a text that advocates democracy. It is a text that advocates a specific model of kingship: one in which the king listens before he acts, draws his mandate from the young warriors rather than the cautious elders, defends his city's autonomy against imperial claims, and tempers victory with reciprocal obligation. Every element of the narrative supports this model. The assemblies exist so that Gilgamesh can be seen consulting them. The elders' caution exists so that Gilgamesh can be seen overruling it. Aga's capture exists so that Gilgamesh can be seen releasing him. The composition is not describing how Sumerian politics worked. It is prescribing how a great king ought to behave.' Interpretive synthesis of C26, C27, and C23. No new factual claim; thematic analysis."

  - id: F23
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 92 (paragraph 20)"
    detail: "Narrative adds: 'This is the Gilgamesh poem that reads most like a political treatise. There is no monster to slay, no underworld to visit, no divine verdict to receive. There is only a demand, a deliberation, a siege, a capture, and a release. The entire arc of the narrative could have happened -- and something very like it probably did happen, at some point in the long rivalry between Uruk and Kish during the Early Dynastic period. The scribes who preserved this text in their schools were not copying a fairy tale. They were copying a lesson in statecraft.' Interpretive synthesis of C28 and C07. No new factual claim."

  - id: F24
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 95 (paragraph 21)"
    detail: "Narrative adds a closing editorial paragraph: 'And it remains, across four thousand years, a remarkably coherent one. The problem the text poses -- how should a ruler respond when a more powerful neighbour demands submission? -- is not a problem that belongs exclusively to the third millennium BCE. The solution it proposes -- consult widely, choose boldly, defend stubbornly, and treat the defeated enemy with a magnanimity that creates obligation rather than resentment -- is a political philosophy, not merely a plot. The 115 lines of Gilgamesh and Aga contain no gods, no monsters, and no magic. They contain something rarer in the ancient literary record: a theory of governance.' Thematic conclusion synthesising multiple approved claims. No new factual assertion."

