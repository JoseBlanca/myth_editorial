    claim_summary: "Gilgamesh (Bilgames) king of Uruk (Unug), semi-divine hero, rules walled city of southern Mesopotamia"
    narrative_location: "line 12 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh (Sumerian: Bilgames) is king of Uruk (Sumerian: Unug), a semi-divine hero who rules the great walled city of southern Mesopotamia.' Verbatim from claims. Faithful."

  - claim_id: C05
    claim_summary: "Aga is king of Kish, rival city, hegemony over Sumerian city-states challenged by Gilgamesh"
    narrative_location: "line 12 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'Aga is king of Kish, the rival city whose hegemony over the Sumerian city-states Gilgamesh challenges.' Verbatim from claims. Faithful."

  - claim_id: C06
    claim_summary: "ETCSL 1.8.1.1 shortest/most cohesive, ~115 lines, no supernatural elements whatsoever"
    narrative_location: "line 16 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The composition ETCSL 1.8.1.1 is the shortest and most cohesive of the Sumerian Gilgamesh poems, approximately 115 lines, and is unique among Gilgamesh narratives in containing no supernatural elements whatsoever.' Verbatim from claims. Faithful."

  - claim_id: C07
    claim_summary: "Well attested in OB copies, historical kernel, real Uruk-Kish tensions in Early Dynastic period"
    narrative_location: "line 16 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The text is well attested in Old Babylonian copies and was valued for its historical kernel: it reflects real political tensions between the city-states of Uruk and Kish in the Early Dynastic period.' Verbatim from claims. Faithful."

  # === Narrative sequence: The demand and the assemblies ===

  - claim_id: C08
    claim_summary: "Aga sends envoys demanding Uruk's submission — corvee labour for Kish"
    narrative_location: "line 24 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'Aga, king of Kish, sends envoys to Uruk demanding the city's submission -- specifically, that Uruk perform corvee labour for Kish.' Verbatim from claims. Faithful."

  - claim_id: C09
    claim_summary: "Gilgamesh presents demand to assembly of elders, seeking their counsel"
    narrative_location: "line 29 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh first presents Kish's demand to the assembly of elders of Uruk, seeking their counsel.' Verbatim from claims. Faithful."

  - claim_id: C10
    claim_summary: "Elders counsel submission, advise yielding and performing labour rather than risk war"
    narrative_location: "line 29 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'The assembly of elders counsels submission to Kish, advising that Uruk should yield and perform the demanded labour rather than risk war.' Verbatim from claims. Faithful."

  - claim_id: C11
    claim_summary: "Dissatisfied, Gilgamesh brings matter to assembly of fighting men (young men)"
    narrative_location: "line 33 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Dissatisfied with the elders' counsel, Gilgamesh then brings the matter before the assembly of fighting men (the young men of the city), presenting the same demand.' Verbatim from claims. Faithful."

  - claim_id: C12
    claim_summary: "Young men endorse resistance, urge Gilgamesh not to submit to Kish"
    narrative_location: "line 33 (paragraph 8)"
