    narrative_location: "line 37 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'The bicameral structure -- elders counselling caution, young men urging war -- has been widely discussed as evidence for early political assemblies and proto-democratic institutions in Sumer.' Verbatim from claims. Faithful."

  - claim_id: C14_INFERENCE
