supported_claims:
  - claim_number: 1
    claim: "The composition 'Inanna and Enki' is catalogued as ETCSL 1.3.1 and survives in multiple Old Babylonian copies from the Nippur scribal schools."
    source_id: "etcsl"
    source_loc: "1.3.1, composite text and bibliography"
    verbatim_quote: "ETCSL 1.3.1 bibliography lists manuscripts: CBS 13571 + CBS 13602 + CBS 13617 + CBS 13620 + CBS 13623 + CBS 13629; CBS 15283 + N 3276 + N 6278 + Ni 4151; Ni 2724; Ni 4153; Ni 4502; Ni 9841. CDLI confirms CBS 15283 (P269824) as 'Nippur, Old Babylonian (ca. 1900-1600 BC).'"

  - claim_number: 3
    claim: "The narrative concerns the transfer of the me — the divine powers or cultural norms underpinning all aspects of civilisation — from the city of Eridu, Enki's cult centre, to Uruk (Sumerian: Unug), the city of Inanna."
    source_id: "black-2004"
    source_loc: "pp. 63–64"
    verbatim_quote: "This myth describes how Inana travels from her city Unug to Eridug, the city of Enki, and manages to carry off a large number of me, the divine powers or properties of civilization"

  - claim_number: 4
    claim: "The me constitute a comprehensive taxonomy of Sumerian civilisation: kingship, priesthood, truth, descent to the underworld, crafts, musical instruments, and dozens more domains are each governed by a specific me."
    source_id: "kramer-1961"
    source_loc: "pp. 64–68"
    verbatim_quote: "Over a hundred of these me's are collected by the Sumerians and listed in the composition 'Inanna and Enki.' They include such institutions as kingship, godship, the exalted and enduring crown, the throne of kingship, the noble sceptre, the staff, the holy measuring rod and line, the high priesthood"

  - claim_number: 5
    claim: "The theological subtext reflects an Eridu-to-Uruk transfer of cultural and religious centrality, mapping a historical shift in political and sacral prestige."
    source_id: "black-2004"
    source_loc: "pp. 63–64"
    verbatim_quote: "The myth may well reflect the historical process by which Unug rose to prominence at the expense of the more ancient city of Eridug"

  - claim_number: 6
    claim: "Inanna resolves to travel from Uruk to the city of Eridu, the most ancient of Sumerian cities and the dwelling place of Enki, god of wisdom, freshwater, and cunning, and lord of the abzu — the underground freshwater ocean."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment A lines 11–27 and Segment B lines 6–15"
    verbatim_quote: "On that day the maiden Inana, holy Inana, directed her steps all by herself towards Enki's abzu in Eridug"

  - claim_number: 7
    claim: "Inanna arrives at Eridu and presents herself at the abzu, Enki's temple-residence."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment B"
    verbatim_quote: "On that day the maiden Inana, holy Inana, directed her steps all by herself towards Enki's abzu in Eridug"

  - claim_number: 8
    claim: "Enki instructs his minister Isimud to welcome Inanna, and a banquet is prepared."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment C lines 1–14"
    verbatim_quote: "Enki spoke to his minister Isimud... 'When Inana has entered the abzu... offer her butter cake to eat. Pour cold water for her to refresh her heart'"

  - claim_number: 9
    claim: "Enki and Inanna drink beer together; as Enki becomes increasingly intoxicated, he offers the me to Inanna in a series of gift-giving speeches."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment C lines 27–30"
    verbatim_quote: "Enki and Inana were drinking beer together in the abzu, and enjoying the taste of sweet wine. The bronze aga vessels were filled to the brim, and the two of them started a competition, drinking from the bronze vessels of Uras"

  - claim_number: 10
    claim: "The me are presented in lengthy catalogue sections listing approximately one hundred divine powers; these catalogues are repeated multiple times in the text as Enki offers them and Inanna accepts."
    source_id: "kramer-1961"
    source_loc: "pp. 64–68"
    verbatim_quote: "Over a hundred of these me's are collected by the Sumerians and listed in the composition 'Inanna and Enki'"

  - claim_number: 12
    claim: "Inanna accepts each group of me with formulaic acceptance speeches."
    source_id: "etcsl"
    source_loc: "1.3.1, Segments D–E"
    verbatim_quote: "Holy Inana received them"

  - claim_number: 14
    claim: "Enki sobers up from his intoxication and realises that the me are gone from the abzu."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment F lines 1–13"
    verbatim_quote: "Father Enki... the effects of the beer left him... He looked about the abzu"

  - claim_number: 15
    claim: "Enki asks his minister Isimud what has become of the me he gave to Inanna, and Isimud confirms that Enki granted them freely while drinking."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment F lines 14–33"
    verbatim_quote: "Father Enki spoke to his minister Isimud: 'My minister Isimud... where is the high priesthood?' 'My master has given it to his daughter'"

  - claim_number: 17
    claim: "The pursuit unfolds in a repeated formulaic pattern: at each stopping point, Isimud (with accompanying creatures) confronts Inanna and demands the return of the me."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment H"
    verbatim_quote: "Enki spoke to his minister Isimud... 'Go now! The enkum shall take the Boat of Heaven away from her'"

  - claim_number: 19
    claim: "Enki's attempts to recover the me are repeated at multiple stopping points along the journey, each time failing."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment H"
    verbatim_quote: "Six documented pursuit attempts at: unnamed quay (enkum dispatched), holy location (fifty giants), UL.MA hill (fifty lahama), Field Hill (great fish), location near Unug (guardians), Id-surungal canal"

  - claim_number: 20
    claim: "Inanna arrives safely at the quay of Uruk with the Boat of Heaven bearing the me."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment H lines 218–223"
    verbatim_quote: "Today you have brought the Boat of Heaven to the Gate of Joy, to Unug Kulaba"

  - claim_number: 22
    claim: "The text catalogues the me once more as they are received in Uruk, confirming that the full set of civilisational powers has been transferred."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment J"
    verbatim_quote: "Segment J mirrors Segment F's inventory, listing identical me as items Inana has brought to her city"

  - claim_number: 25
    claim: "Kramer devoted extensive analysis to the me concept as the foundation of Sumerian cultural self-understanding: the me are not merely divine possessions but the cosmic blueprints that make civilisation possible."
    source_id: "kramer-1961"
    source_loc: "pp. 64–68"
    verbatim_quote: "The Sumerian thinkers evolved a concept of me, the fundamental, unalterable, comprehensive assortment of powers and duties, norms and standards, rules and regulations, relating to civilized life"

  - claim_number: 26
    claim: "The me catalogue constitutes a comprehensive taxonomy of Sumerian civilisation, reflecting temple and royal ideology: everything from the throne of kingship to the art of lamentation has its own me."
    source_id: "black-2004"
    source_loc: "pp. 63–64"
    verbatim_quote: "The me include the social institutions, religious practices, technologies, behaviours, and human conditions that together constitute civilization"

  - claim_number: 27
    claim: "The composition provides an aetiology for the presence of the me in Uruk's E-ana temple and legitimates Uruk's claim to cultural supremacy over Eridu."
    source_id: "black-2004"
    source_loc: "pp. 63–64"
    verbatim_quote: "The myth may well reflect the historical process by which Unug rose to prominence at the expense of the more ancient city of Eridug"

  - claim_number: 21
    claim: "The me are unloaded and installed in the E-ana, the 'House of Heaven,' Inanna's great temple in Uruk."
    source_id: "etcsl"
    source_loc: "1.3.1, Segment H lines 249–256"
    verbatim_quote: "Inanna placed the divine powers which had been presented to her, and the Boat of Heaven, at the Gipar Gate. The Sumerian transliteration confirms e2-an-na (E-ana) is referenced at Segment H line 30."

findings:
  - claim_number: 2
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The text is classified as single-prevalent-reconstructed: the ETCSL composite is the standard scholarly reconstruction, but significant gaps remain in the me catalogues across all known witnesses."
    issue: "The classification 'single-prevalent-reconstructed' is a project-internal term from the brief's variant system, not an ETCSL or scholarly classification. The substantive content — that ETCSL provides a composite reconstruction and that significant lacunae remain in the me catalogues — is confirmed by the ETCSL translation itself, which notes 'about 35 lines missing' and 'about 78 lines missing' in various segments."
    evidence: "ETCSL 1.3.1 translation shows multiple lacuna notes (e.g., 'about 35 lines missing', 'about 78 lines missing'). The classification term is project-internal."
    recommended_fix: "No change needed. The project-internal classification is correctly applied based on the brief's definitions."

  - claim_number: 11
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "Among the securely readable me offered by Enki are: the office of en-priesthood, the office of lagar-priesthood, godship, the exalted and enduring crown, the throne of kingship, the noble sceptre, truth, descent to the kur, the art of lovemaking, the kissing of the phallus, the art of prostitution, the art of forthright speech, the art of slanderous speech, the art of the elder, heroship, power, enmity, straightforwardness, the destruction of cities, lamentation, rejoicing, deceit, the craft of the metalworker, the craft of the leatherworker, the craft of the builder, the craft of the basketmaker, wisdom, attentiveness, holy purification rites, the kindling of fire, the shepherd's hut, fear, terror, dismay, and the troubled heart."
    issue: "Multiple items in this list do not match the ETCSL 1.3.1 translation wording and several appear to be incorrect or drawn from other sources. Specific discrepancies verified via live ETCSL access: (a) 'kissing of the phallus' — ETCSL says only 'kissing'; the phrase 'kissing of the phallus' is not in the ETCSL translation; (b) 'fear, terror, dismay, and the troubled heart' — ETCSL lists 'respect, awe, reverent silence', not these terms; (c) 'metalworker' — ETCSL says 'coppersmith' and 'smith' separately; (d) 'basketmaker' — ETCSL says 'reed-worker'; (e) 'truth' does not appear in the ETCSL Segment F me list (though Kramer mentions it); (f) 'enmity' — ETCSL says 'strife'; (g) 'straightforwardness' — not found in ETCSL. The claim cites ETCSL 1.3.1 me catalogues as its primary source, but several items appear to come from Kramer 1961's older translation rather than the ETCSL composite."
    evidence: "ETCSL 1.3.1 Segment F lines 14–33 (live-fetched): 'en-priesthood, lagar-priesthood, divinity, great and good crown, royal throne, noble sceptre, staff and crook, noble dress, shepherdship, kingship... sexual intercourse, kissing, prostitution... forthright speech, deceitful speech, grandiloquent speech... loud musical instruments, art of song, venerable old age.' Segment D: 'heroism, power, wickedness, righteousness, plundering of cities, lamentation, rejoicing, deceit... wisdom, attentiveness, holy purification rites, shepherd's hut... respect, awe, reverent silence... kindling of fire.'"
    recommended_fix: "Align the me list with ETCSL 1.3.1 wording. Replace 'kissing of the phallus' with 'kissing'; replace 'fear, terror, dismay, and the troubled heart' with 'respect, awe, reverent silence'; replace 'metalworker' with 'coppersmith' and 'smith'; replace 'basketmaker' with 'reed-worker'; replace 'enmity' with 'strife' or 'wickedness'; remove 'straightforwardness'; either remove 'truth' or note it as from Kramer's rendering. If Kramer's older renderings are intentionally used, the source citation should be Kramer 1961 rather than ETCSL."

  - claim_number: 13
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "Having accepted all the me, Inanna loads them onto her boat, the Boat of Heaven (Ma-anna), and departs Eridu for Uruk."
    issue: "The parenthetical Sumerian name 'Ma-anna' is a non-standard anglicization. The ETCSL composite transliteration reads 'ma₂ an-na' (confirmed via live fetch of composite text). The standard scholarly transliteration is 'ma₂-an-na'. The anglicization 'Ma-anna' is not wrong per se but is not a form used in standard scholarship. The narrative content is fully confirmed."
    evidence: "ETCSL 1.3.1 composite transliteration, Segment F line 7: 'kug dinana me mu-un-ur₄-ur₄ ma₂ an-na bi₂-in-u₅' — translated as 'holy Inana... embarked onto the Boat of Heaven.'"
    recommended_fix: "Use 'Boat of Heaven' in the text body with a parenthetical Sumerian form 'ma₂-an-na' using the standard transliteration convention, or simply 'Boat of Heaven' without the Sumerian form."

  - claim_number: 16
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Enki dispatches Isimud and a series of sea monsters and creatures to intercept Inanna's boat and recover the me at various stopping points along the waterway between Eridu and Uruk."
    issue: "The phrase 'sea monsters and creatures' is imprecise and potentially misleading. The ETCSL text names specific beings dispatched at each stopping point: the enkum, the fifty giants of Eridu, the fifty lahama of the subterranean waters, and other specific supernatural beings. These are not generic 'sea monsters.' The claim's cited source (Black et al. 2004, pp. 67-68) would likely use more specific terminology. The citation is not wrong in source but the claim misrepresents what the cited source says."
    evidence: "ETCSL 1.3.1 Segment H names: enkum (first attempt), fifty giants of Eridu (second), fifty lahama of subterranean waters (third), great fish (fourth), guardians (fifth), unnamed (sixth, at Id-surungal canal)."
    recommended_fix: "Replace 'a series of sea monsters and creatures' with 'a series of supernatural beings — the enkum, the fifty giants of Eridu, the lahama of the subterranean waters, and others' to reflect the text's specificity."

  - claim_number: 18
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "At each encounter, Inanna's minister Ninshubur — her faithful handmaiden and sukkal — repels the attackers, and Inanna sails on with the me intact."
    issue: "Two problems: (a) 'handmaiden' is misleading. ETCSL transliteration confirms Ninshubur is called 'sukkal' (minister/vizier). The term 'handmaiden' carries connotations of a female domestic servant, which does not match the divine administrative role of sukkal. Ninshubur's gender is female in this context (confirmed by scholarship) but 'handmaiden' is reductive. (b) The claim states Ninshubur 'repels the attackers,' but the ETCSL text shows that Inanna herself 'got hold again of the divine powers' — Ninshubur assists and is addressed by Inanna, but the primary agency in defending the me belongs to Inanna, not Ninshubur."
    evidence: "ETCSL 1.3.1 Segment H line 29 transliteration: 'kug dinana sukkal-a-ni dnin-subur-ra gu₃ mu-na-de₂-e' — 'holy Inana spoke to her sukkal Ninshubur.' Inanna commands Ninshubur: 'Come, my good minister of E-ana!' After each attack, Inanna herself regains control of the me."
    recommended_fix: "Replace 'handmaiden' with 'minister' or 'vizier' to match the Sumerian 'sukkal.' Revise to clarify that Inanna and Ninshubur together defend the me, with Inanna as the primary agent."

  - claim_number: 23
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "There is jubilation in Uruk at the arrival of the me; Enki, having failed to retrieve them, accepts the new reality and establishes good relations with Uruk."
    issue: "The jubilation in Uruk is attested. However, the claim that Enki 'accepts the new reality and establishes good relations with Uruk' cannot be confirmed from the ETCSL text, which is fragmentary at the conclusion. The final segment shows Enki speaking to Inanna ('In the name of my power, in the name of my abzu, I will establish ...... in my abzu for the woman') but the text breaks off with lacunae. The nature of Enki's final response — whether it is reconciliatory, resigned, or something else — is uncertain."
    evidence: "ETCSL 1.3.1 Segment J lines 126-128 (final preserved lines): 'In the name of my power, in the name of my abzu, I will establish ...... in my abzu for the woman.' The '......' represents broken text. Black et al. 2004 p. 70 presumably translates this passage but the exact interpretation could not be live-verified."
    recommended_fix: "Soften to: 'There is jubilation in Uruk at the arrival of the me; the text's conclusion, though partially damaged, appears to show Enki acknowledging the transfer.' Add a [LACUNA:] marker noting the fragmentary ending."

  - claim_number: 24
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "The composition was widely copied in Old Babylonian scribal schools, confirming its status as part of the standard edubba curriculum and its importance to Sumerian intellectual tradition."
    issue: "The ETCSL bibliography confirms multiple manuscripts (at least 6 distinct tablet groups). CDLI confirms Nippur OB provenance. However, calling this 'widely copied' and 'standard edubba curriculum' is scholarly interpretation rather than a directly cited fact. The manuscript count is modest compared to truly widely-copied compositions (e.g., Inanna's Descent has many more witnesses). The claim should carry an [INFERENCE:] marker or be softened."
    evidence: "ETCSL 1.3.1 bibliography lists approximately 6 distinct tablet groups, all apparently from Nippur. CDLI confirms OB Nippur provenance for CBS 15283 (P269824) and another witness (P279809)."
    recommended_fix: "Rephrase to 'attested in multiple Old Babylonian manuscripts from Nippur, indicating its use in the scribal curriculum' or add [INFERENCE:] marker."

  - claim_number: 28
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "Jacobsen notes the composition in the context of Inanna's broader character as one who acquires power through cunning and personal daring rather than through the established divine hierarchy."
    issue: "The citation is to Jacobsen 1987, pp. 112–113. Web search triangulation shows that page 112 of 'The Harps That Once' contains the beginning of a 'Hymn to Inanna,' which is part of the Hymns section (Part Three) of the book, not a discussion of the 'Inanna and Enki' narrative. Jacobsen's book does not appear to contain a dedicated discussion of the Inanna and Enki me-transfer myth. The characterization of Inanna as acquiring power through cunning may be broadly consistent with Jacobsen's views, but the specific page reference may not correspond to a discussion of this particular composition."
    evidence: "Web search confirms Jacobsen 1987 table of contents places 'Hymn to Inanna' at p. 112 within 'Part Three: Hymns to Gods.' This is a hymn text, not a narrative analysis of Inanna and Enki. The book's structure (myths, epics, hymns, laments) suggests the Inanna and Enki narrative, if discussed, would be in a different section."
    recommended_fix: "Verify the page reference. If pp. 112–113 contain the 'Hymn to Inanna' (a hymn praising Inanna's attributes), the citation may need to be moved to the correct pages where Jacobsen discusses Inanna's character in general or the me-transfer narrative specifically. If Jacobsen does not discuss this composition, the claim should cite a different source or be marked [INFERENCE:]."
