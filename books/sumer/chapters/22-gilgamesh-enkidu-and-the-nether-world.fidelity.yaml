chapter: 22
title: "Gilgamesh, Enkidu, and the Nether World"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.8.1.4, numerous OB tablets from multiple sites"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The composition is catalogued as ETCSL 1.8.1.4 and survives on numerous Old Babylonian tablets from multiple sites.' Verbatim from claims. Faithful."

  - claim_id: C02
    claim_summary: "Composite text assembled from many overlapping witnesses; opens with cosmogonic prologue; basis for Tablet XII"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The text scholars read is a composite assembled from these many overlapping witnesses; no single manuscript preserves the whole.' Faithful. The cosmogonic prologue and Tablet XII relationship are covered in lines 11 and 14."

  - claim_id: C03
    claim_summary: "Retelling follows ETCSL composite + Black et al. 2004, pp. 285-296"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Black et al. 2004, pp. 285-296.' Verbatim. Faithful."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Approximately 303 lines in ETCSL composite; Gadotti 2014 gives ca. 330 lines from 74 manuscripts; widely attested from Nippur and other sites"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'approximately 303 lines in the ETCSL composite, with Gadotti's 2014 critical edition drawing on seventy-four manuscripts to produce a text of some 330 lines.' Faithful."

  - claim_id: C05
    claim_summary: "Composite-editorial classification: ETCSL composite draws on numerous OB tablets; no single manuscript preserves the whole"
    narrative_location: "line 7 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'This is a composite-editorial text: the ETCSL composite draws on numerous Old Babylonian tablets to produce the standard scholarly text, and the continuous narrative that results is a modern editorial achievement, not something any ancient scribe held in his hands.' Faithful with stylistic elaboration."

  - claim_id: C06
    claim_summary: "Structurally tripartite: cosmogonic prologue, huluppu-tree narrative, nether-world descent-and-report"
    narrative_location: "line 11 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'The composition is structurally tripartite: a cosmogonic prologue describing the separation of heaven and earth; a huluppu-tree narrative involving Inanna and Gilgamesh; and a nether-world descent-and-report sequence involving Enkidu's ghost.' Verbatim from claims. Faithful."

  # === Cosmogonic prologue ===

  - claim_id: C07
    claim_summary: "Opens with cosmogonic prologue describing primordial separation of heaven (An) and earth (Ki)"
    narrative_location: "line 20 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'The composition opens not with Gilgamesh but with the cosmos. In the beginning...heaven was separated from earth, and earth was separated from heaven.' Faithful. The parenthetical '(An)' and '(Ki)' from the claim are rendered as named actors in the narrative."

  - claim_id: C08
    claim_summary: "An carried off heaven, Enlil carried off earth, kur given to Ereshkigal as a prize — tripartite cosmology"
    narrative_location: "line 20 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'An carried off heaven, Enlil...carried off earth, and the kur...was given to Ereshkigal...as a prize.' Faithful."

  - claim_id: C09
    claim_summary: "Enki sets sail for the kur; sea attacks his boat — keel trembles like butted by turtles, waves like wolves"
    narrative_location: "line 29 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'Enki...sets sail for the kur, and the sea attacks his boat. The keel trembles as if butted by turtles, and waves at the bow rise to devour the king like wolves.' Faithful."

  - claim_id: C10
    claim_summary: "Cosmogonic prologue integral to composition, not a later scribal addition; establishes cosmological framework"
    narrative_location: "line 26 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'The cosmogonic prologue should be treated as integral to the composition, not as a later scribal addition, because it establishes the cosmological framework — the existence and nature of the kur — that the entire subsequent narrative depends on.' Verbatim from claims. Faithful."

  # === The huluppu tree ===

  - claim_id: C11
    claim_summary: "Huluppu tree found by Inanna on the bank of the Euphrates after primordial events"
    narrative_location: "line 38 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'Inanna...finds a huluppu tree on the bank of the Euphrates after these primordial events.' Faithful."

  - claim_id: C12
    claim_summary: "Inanna transplants huluppu tree to holy garden in Uruk; intends throne and bed"
    narrative_location: "line 38 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'She transplants the huluppu tree to her holy garden in Uruk...intending to fashion from it a throne and a bed when it has grown to maturity.' Faithful."

  - claim_id: C13
    claim_summary: "Three creatures infest the tree: uncharmable serpent at roots, Anzud bird in crown, phantom maid (ki-sikil-lil-la) in trunk"
    narrative_location: "line 42 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'A serpent that cannot be charmed nests at its roots. An Anzud bird...sets its young in the crown. And a phantom maid — ki-sikil-lil-la, sometimes identified with Lilith, though this connection is contested — builds her dwelling in the trunk.' Faithful. Uses 'Anzud bird' not 'Anzu' — glossary compliant."

  - claim_id: C14
    claim_summary: "Inanna weeps; Gilgamesh kills serpent; Anzud bird flees to mountains; phantom maid flees to wilderness"
    narrative_location: "line 47 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'Inanna weeps and appeals for help. Gilgamesh...responds. He kills the serpent at the roots, causing the Anzud bird to flee with its young to the mountains and the phantom maid to flee to the wilderness.' Faithful."

  - claim_id: C15
    claim_summary: "Gilgamesh fells tree; gives trunk to Inanna for throne and bed; fashions ellag and ekidma (pukku and mekku) from roots and crown"
    narrative_location: "line 53 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh fells the huluppu tree and gives the trunk to Inanna for her throne and bed. From the roots and crown of the tree, he fashions two objects for himself: the ellag and the ekidma — often rendered in scholarship as pukku and mekku.' Faithful."

  - claim_id: C16_INFERENCE
    claim_summary: "Identification of pukku and mekku uncertain: ball and mallet, drum and drumstick, or unknown ritual objects"
    narrative_location: "line 53 (paragraph 12), line 56"
    status: MAPPED
    notes: "Narrative: 'What these objects are, precisely, is one of the most debated questions in Sumerian philology. Proposals include a ball and mallet used in a competitive game, a drum and drumstick, or ritual objects of unknown function.' INFERENCE block reproduced at line 56. Faithful."

  # === The loss of the ritual objects ===

  - claim_id: C17
    claim_summary: "Gilgamesh uses pukku and mekku oppressively; young men and women of Uruk complain"
    narrative_location: "line 60 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'He uses them in a manner that oppresses the young men and women of Uruk — the text describes their complaints about his behaviour.' Faithful."

  - claim_id: C18
    claim_summary: "As consequence of citizens' cries, pukku and mekku fall into the nether world"
    narrative_location: "line 63 (paragraph 15)"
    status: MAPPED
    notes: "Narrative: 'As a consequence of the citizens' cries, the pukku and mekku fall into the nether world, beyond Gilgamesh's reach.' Faithful."

  - claim_id: C19
    claim_summary: "Gilgamesh sits at gate of nether world and laments; cannot retrieve objects"
    narrative_location: "line 66 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh sits at the gate of the nether world and laments. He cannot retrieve them himself.' Faithful."

  # === Enkidu's descent ===

  - claim_id: C20
    claim_summary: "Enkidu volunteers to descend to nether world to retrieve pukku and mekku"
    narrative_location: "line 71 (paragraph 17)"
    status: MAPPED
    notes: "Narrative: 'Enkidu...volunteers to descend to the nether world to retrieve the pukku and mekku.' Faithful."

  - claim_id: C21
    claim_summary: "Gilgamesh gives Enkidu detailed taboo instructions: no clean clothes, no fine oil, no throw-sticks, no cornel-wood stick, no sandals, no noise, no kissing/hitting wife or child"
    narrative_location: "line 74 (paragraph 18)"
    status: MAPPED
    notes: "Narrative: 'He must not wear clean clothes. He must not anoint himself with fine oil. He must not hurl throw-sticks. He must not hold a cornel-wood stick. He must not wear sandals. He must not make noise. He must not kiss his wife. He must not hit his wife. He must not kiss his child. He must not hit his child.' All taboos from the claim are enumerated. Faithful."

  - claim_id: C21_LACUNA
    claim_summary: "LACUNA: Portions of lines 150-175 partially damaged; numerous OB tablets allow reconstruction"
    narrative_location: "line 80"
    status: MAPPED
    notes: "LACUNA block reproduced from claims. Faithful."

  - claim_id: C22
    claim_summary: "Enkidu descends and systematically breaks every taboo"
    narrative_location: "lines 82-84 (paragraphs 19-20)"
    status: MAPPED
    notes: "Narrative: 'Enkidu descends. And he breaks every one of the taboos. He does everything that Gilgamesh warned him against — systematically, completely.' Faithful."

  - claim_id: C23
    claim_summary: "Enkidu seized by nether world; cannot return; trapped among dead"
    narrative_location: "line 87 (paragraph 20)"
    status: MAPPED
    notes: "Narrative: 'The nether world seizes Enkidu. He cannot return to the living. He is trapped among the dead.' Faithful."

  # === The appeal to the gods ===

  - claim_id: C24
    claim_summary: "Gilgamesh appeals to Enlil in Nippur; Enlil does not help"
    narrative_location: "line 94 (paragraph 22)"
    status: MAPPED
    notes: "Narrative: 'He approaches Enlil in Nippur (Sumerian: Nibru), the religious capital of Sumer, and pleads for help in recovering Enkidu. Enlil does not help.' Faithful."

  - claim_id: C25
    claim_summary: "Gilgamesh approaches Enki in Eridu; Enki instructs Utu to open a hole for Enkidu's ghost"
    narrative_location: "line 97 (paragraph 23)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh then approaches Enki in Eridu...Enki agrees to help...He instructs the sun god Utu to open a hole in the nether world through which Enkidu's ghost can rise.' Faithful."

  - claim_id: C26
    claim_summary: "Utu opens hole; ghost (gidim) of Enkidu rises from nether world"
    narrative_location: "line 104 (paragraph 25)"
    status: MAPPED
    notes: "Narrative: 'Utu opens a hole in the earth, and the ghost — the gidim — of Enkidu rises from the nether world.' Faithful."

  - claim_id: C27
    claim_summary: "Gilgamesh and ghost of Enkidu embrace — reunion between living and dead"
    narrative_location: "line 107 (paragraph 26)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh and the ghost of Enkidu embrace — a moment of reunion between the living and the dead.' Faithful."

  # === Catalogue of the dead ===

  - claim_id: C28
    claim_summary: "Gilgamesh questions Enkidu's ghost; extended catalogue of dead organised by manner of death, number of children, social status"
    narrative_location: "line 116 (paragraph 28)"
    status: MAPPED
    notes: "Narrative: 'an extended catalogue of the dead, a systematic report on the fates of the deceased organised by manner of death, number of children, and social status.' Faithful."

  - claim_id: C29
    claim_summary: "Seven sons: throne and listens to judgments; stillborn plays at table of gold/silver with honey and ghee; unburied dead eat scraps in street"
    narrative_location: "lines 125, 128, 131 (paragraphs 29-31)"
    status: MAPPED
    notes: "Narrative presents all three examples: 'He who had seven sons sits on a throne as a companion of the gods and listens to judgments' (line 125); 'The stillborn child...plays at a table of gold and silver laden with honey and ghee' (line 128); 'the unburied dead...eat the scraps and crumbs tossed out in the street' (line 131). Faithful. Narrative also adds the progression from one to seven sons (he who had one son, two sons, three sons) which elaborates the claim's general statement about 'those who died with many sons fare better.' These details are consistent with the cited source lines 260-290."

  - claim_id: C29_LACUNA
    claim_summary: "LACUNA: Parts of lines 240-270 fragmentary in some witnesses"
    narrative_location: "line 121"
    status: MAPPED
    notes: "LACUNA block reproduced from claims. Faithful."

  - claim_id: C30
    claim_summary: "Catalogue constitutes most detailed Sumerian eschatological text; systematic taxonomy by social and biographical categories"
    narrative_location: "line 134 (paragraph 32)"
    status: MAPPED
    notes: "Narrative: 'The catalogue constitutes the most detailed Sumerian eschatological text: a systematic taxonomy of the afterlife organised by social and biographical categories.' Verbatim from claims. Faithful."

  - claim_id: C31
    claim_summary: "Overall picture: conditional welfare based on earthly circumstances — children, burial status, manner of death"
    narrative_location: "line 137 (paragraph 32)"
    status: MAPPED
    notes: "Narrative: 'The overall picture of the nether world is characterised by conditional welfare based on earthly circumstances: the quality of the afterlife depends primarily on the number of one's children, burial status, and manner of death during life.' Verbatim from claims. Faithful."

  # === Relationship to the Akkadian tradition ===

  - claim_id: C32
    claim_summary: "Akkadian Tablet XII is partial translation of this Sumerian composition — descent-and-report section; direct, selective rendering into Akkadian"
    narrative_location: "line 14 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'Akkadian Tablet XII of the Standard Babylonian Gilgamesh epic is a partial translation of this Sumerian composition — specifically, of the descent-and-report section — appended to the epic as a supplement. It is not a variant of the Sumerian text but a direct, if selective, rendering into Akkadian.' Verbatim from claims. Faithful."

  - claim_id: C33
    claim_summary: "Cosmogonic prologue and huluppu-tree narrative not included in Tablet XII; begins only at Enkidu's descent"
    narrative_location: "line 14 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The cosmogonic prologue and the huluppu-tree narrative that open the Sumerian composition are not included in Akkadian Tablet XII, which begins only at the point of Enkidu's descent.' Verbatim from claims. Faithful."

  # === Thematic significance ===

  - claim_id: C34
    claim_summary: "Nether world's existence coeval with cosmos; assigned to Ereshkigal from the beginning"
    narrative_location: "line 149 (paragraph 34)"
    status: MAPPED
    notes: "Narrative: 'The nether world's existence is coeval with the cosmos: it came into being at the moment of the primal separation of heaven and earth and was assigned to Ereshkigal from the beginning.' Faithful."

  - claim_id: C35_INFERENCE
    claim_summary: "Huluppu-tree episode encodes Inanna's dependence on male heroic action; origin of objects whose loss drives second half"
    narrative_location: "line 50"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims, with footnote. Faithful."

  - claim_id: C36
    claim_summary: "Taboo catalogue functions as guide to boundary between life and death; each prohibition marks living, each violation marks transition to trapped dead"
    narrative_location: "line 77 (paragraph 18)"
    status: MAPPED
    notes: "Narrative: 'The taboo catalogue functions as a guide to the boundary between life and death: each prohibition marks a behaviour that identifies the living person, and each violation marks the transition from living visitor to trapped dead.' Faithful."

  - claim_id: C37
    claim_summary: "Eschatological vision is composition's most significant cultural contribution: afterlife depends on biographical facts, not moral conduct"
    narrative_location: "line 144 (paragraph 33)"
    status: MAPPED
    notes: "Narrative: 'This eschatological vision is the composition's most significant cultural contribution: the idea that the quality of one's death and afterlife depends on specific biographical facts — number of children, manner of death, proper burial — rather than on moral conduct during life.' Faithful."

  - claim_id: C38_INFERENCE
    claim_summary: "Absence of moral judgement in catalogue represents fundamentally different eschatological logic from moral-desert traditions"
    narrative_location: "line 140"
    status: MAPPED
    notes: "INFERENCE block reproduced from claims. Faithful."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Five hooks: Odyssey Book 11 (Nekyia), Aeneid Book 6, catalogue structure parallel to Odyssey 11/Aeneid 6, cosmogonic prologue (ANE/IE motif), sacred tree parallels Yggdrasil"
    narrative_location: "lines 32, 45, 102, 110, 119"
    status: MAPPED
    notes: "All five comparative hooks from the claims are present as // COMPARATIVE-HOOK comments in the narrative at the appropriate locations. Faithful."

