    detail: "Narrative adds: 'In the beginning — in those days, in those far-off days, in those nights, in those far-off nights — heaven was separated from earth.' The formula 'in those days, in those far-off days' is a well-known Sumerian literary opening formula present in the ETCSL text. Consistent with the cited source lines 1-13."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 24, paragraph 6"
    detail: "Narrative adds: 'Three gods, three domains, three acts of division, and the universe as the Sumerians understood it is complete. Heaven above. Earth in the middle. The nether world below. The critical point is not merely architectural but temporal: the nether world is not a later addition to the cosmos, not a corruption or a punishment. It is coeval with creation...' Interpretive elaboration of C08 and C34. The coeval-with-creation point is explicitly stated in claims (C34). No new factual claim."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 29, paragraph 7"
    detail: "Narrative adds: 'A primordial conflict, a journey by the god of wisdom toward the nether world, an ocean that fights back — a reference to a tradition whose full context is lost to us.' The claim itself says 'a reference to a primordial conflict whose full context is lost.' Rephrased elaboration. Faithful."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 36, paragraph 8"
    detail: "Narrative adds: 'After the cosmogonic prologue, the narrative shifts from the universal to the particular — from the origin of the cosmos to a single tree on the bank of a river.' Transitional editorial commentary. No new factual claim."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 38, paragraph 9"
    detail: "Narrative adds: 'A throne: the instrument of authority. A bed: the instrument of union. The two objects that define Inanna's double sovereignty over political power and sexual force, and both of them will come from this tree, if the tree will grow.' Interpretive commentary on the throne-and-bed motif. Consistent with INFERENCE C35 about Inanna's aspirations."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 42, paragraph 10"
    detail: "Narrative adds: 'Root, crown, and trunk: the three zones of the tree are occupied, each by a creature that refuses to yield — a vertical cosmology in miniature, echoing the tripartite division of the cosmos that opened the composition.' Interpretive commentary drawing a structural parallel. No new factual claim."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 47, paragraph 11"
    detail: "Narrative adds: 'The hero does not negotiate with the tree's inhabitants. He removes the keystone creature, and the structure of infestation collapses.' Interpretive observation on the narrative mechanics. No new factual claim."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 53, paragraph 12"
    detail: "Narrative adds: 'What the text makes clear is that these objects matter — they are made from the sacred tree, they are Gilgamesh's personal possessions, and they will drive everything that follows.' Editorial framing. No new factual claim."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 60, paragraph 14"
    detail: "Narrative adds: 'Whether the oppression involves forced labour, compulsory participation in a game, or some form of ritualized dominance, the citizens cry out.' Acknowledges interpretive uncertainty consistent with the claim's 'the text describes their complaints about his behaviour.' Also adds: 'The universe, in Sumerian narrative, listens when people suffer — not always with sympathy, but it listens.' Interpretive commentary."

