  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 71, paragraph 17"
    detail: "Narrative adds: 'The offer is made without hesitation. Gilgamesh cannot go; Enkidu will go in his place.' Minor editorial characterization. No new factual claim."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 74, paragraph 18"
    detail: "Narrative adds: 'Clean clothes, fragrant oil, sandals, the sounds of daily life, the touch of family — these are the signatures of a person who belongs above, who eats, who loves, who moves through the world as someone with a body and a place. To do any of these things in the nether world is to declare yourself alive, and to declare yourself alive among the dead is to be seized by the dead and made one of them.' Interpretive elaboration consistent with claim C36 about the taboo catalogue functioning as a guide to the boundary between life and death."

  - id: F19
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 77, paragraph 18"
    detail: "Narrative adds: 'The nether world operates on recognition. It identifies the living by what the living do, and if you do what the living do, you are identified and seized.' Interpretive commentary expanding on C36. No new factual claim."

  - id: F20
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 84, paragraph 20"
    detail: "Narrative adds enumeration of specific violations: 'He wears clean clothes. He anoints himself. He carries a stick. He wears sandals. He makes noise. He touches wife and child.' These mirror the taboo list from C21 and are consistent with the source lines 185-210. No unsourced addition."

  - id: F21
