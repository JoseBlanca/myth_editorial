chapter: 25
title: "Enmerkar and En-suhgir-ana: The Sorcery Contest"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.8.2.4, survives on OB tablets"
    narrative_location: "line 2 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The composition is catalogued as ETCSL 1.8.2.4 and survives on Old Babylonian tablets.' Verbatim match with claim. Faithful."

  - claim_id: C02
    claim_summary: "Generally well-preserved"
    narrative_location: "line 2 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'Generally well-preserved.' Verbatim match. Faithful."

  - claim_id: C03
    claim_summary: "Retelling follows ETCSL composite + Vanstiphout 2003 pp. 97-169 + Black et al. 2004 pp. 252-261"
    narrative_location: "line 2 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by Vanstiphout 2003, pp. 97--169; Black et al. 2004, pp. 252--261.' Faithful."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "En-suhgir-ana is lord of Aratta; challenges Enmerkar to a new contest"
    narrative_location: "line 18 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'En-suhgir-ana is lord of Aratta, the distant wealthy city that has been the rival of Uruk throughout the Aratta cycle; he challenges Enmerkar, king of Uruk, to a new contest.' Verbatim match with claim. Faithful."

  - claim_id: C05
    claim_summary: "Contest shifts from diplomatic/rhetorical exchanges to sorcery challenge"
    narrative_location: "line 18 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The contest in this composition shifts from the diplomatic and rhetorical exchanges of the preceding Enmerkar poem to a direct sorcery challenge: the conflict is decided through magical power rather than rhetoric.' Verbatim match with claim. Faithful."

  - claim_id: C06
    claim_summary: "Inanna remains divine patron of Uruk; ensures Enmerkar's victory"
    narrative_location: "line 22 (paragraph 5)"
    status: MAPPED
    notes: "Narrative: 'Inanna -- goddess of love, war, and the morning and evening star -- remains the divine patron of Uruk whose favour ensures Enmerkar's ultimate victory, continuing the theological framework established in Enmerkar and the Lord of Aratta.' Faithful. First-mention gloss added from glossary."

  # === The sorcery challenge ===

  - claim_id: C07
    claim_summary: "En-suhgir-ana boasts; minister Ansiga-ria identifies sorcerer Ur-jirnuna from Hamazu"
    narrative_location: "line 27 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'En-suhgir-ana boasts that he will defeat Enmerkar through magical means; his minister Ansiga-ria identifies a sorcerer, Urgirinuna, from the destroyed city of Hamazu, as a champion for the magical contest.' Faithful in substance. Note: claims use 'Ur-jirnuna' while narrative uses 'Urgirinuna' -- naming discrepancy flagged below. Also, narrative adds 'from the destroyed city of Hamazu' here, merging detail from claim C08."

  # === Dispatch of Urgirinuna ===

  - claim_id: C08
    claim_summary: "Ur-jirnuna, male sorcerer from destroyed city of Hamazu, dispatched to defeat Uruk"
    narrative_location: "line 30 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'Urgirinuna, a male sorcerer originally from the destroyed city of Hamazu, is dispatched to defeat Uruk through sorcery; he is presented as a formidable practitioner of magic.' Faithful. Same naming discrepancy (Urgirinuna vs Ur-jirnuna)."

  - claim_id: C09
    claim_summary: "Ur-jirnuna travels to Eresh (city of Nisaba); magic against livestock -- cows' milk to horns, goats' milk to backs"
    narrative_location: "line 35 (paragraph 8)"
    status: MAPPED
    notes: "Narrative: 'Urgirinuna travels to Eresh -- the city of the goddess Nisaba -- not directly to Uruk, and begins to exercise his magical powers against the livestock.' and 'The cows' milk goes to their horns. The goats' milk goes to their backs.' Faithful."

  - claim_id: C10
    claim_summary: "Sorcerer's magic threatens pastoral foundations of region's prosperity"
    narrative_location: "line 38 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'The sorcerer's magic threatens the pastoral foundations of the region's prosperity, disrupting the milk production of cows and goats.' Faithful."

  # === Sagburu defeats the sorcerer ===

  - claim_id: C11
    claim_summary: "Wise Woman Sagburu of Eresh encounters Ur-jirnuna; recognises him as foreign sorcerer"
    narrative_location: "line 43 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'Wise Woman Sagburu of Eresh encounters Urgirinuna and recognises him as a foreign sorcerer threatening the region.' Faithful."

  - claim_id: C12
    claim_summary: "Sagburu defeats sorcerer in five animal-conjuring contests: eagle vs carp, wolf vs ewe, cow vs lion, ibex vs leopard, gazelle vs tiger"
    narrative_location: "line 53 (paragraph 12)"
    status: MAPPED
    notes: "Narrative: 'Sagburu defeats the sorcerer through superior counter-magic in a series of five animal-conjuring contests: she conjures predatory animals from the river -- eagle against carp, wolf against ewe, cow against lion, ibex against leopard, gazelle against tiger -- each of which overcomes the sorcerer's conjured creature.' Faithful. All five pairings match the claims exactly."

  - claim_id: C13
    claim_summary: "Sagburu throws sorcerer from bank of Euphrates; seizes life-force; kills him"
    narrative_location: "line 60 (paragraph 13)"
    status: MAPPED
    notes: "Narrative: 'After defeating Urgirinuna's magical creatures one by one, Sagburu throws the sorcerer himself from the bank of the Euphrates and seizes his life-force, killing him.' Faithful."

  # === En-suhgir-ana's submission ===

  - claim_id: C14
    claim_summary: "News of defeat reaches Aratta; En-suhgir-ana realises magical strategy failed; Inanna's protection decisive"
    narrative_location: "line 65 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'When news of Urgirinuna's defeat reaches Aratta, En-suhgir-ana realises that his magical strategy has failed and that Inanna's protection of Uruk is decisive.' Faithful."

  - claim_id: C15
    claim_summary: "En-suhgir-ana acknowledges supremacy: 'From the moment of conception I was not your equal, you are the older brother. I cannot match you ever.'"
    narrative_location: "line 68 (paragraph 15)"
    status: MAPPED
    notes: "Narrative: 'En-suhgir-ana acknowledges Enmerkar's supremacy, declaring \"From the moment of conception I was not your equal, you are the older brother. I cannot match you ever.\"' Direct quotation matches claim exactly. Faithful."

  - claim_id: C16
    claim_summary: "Poem ends with affirmation of Inanna's patronage and Enmerkar's divinely endorsed supremacy over Aratta"
    narrative_location: "line 71 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'The poem ends with an affirmation of Inanna's patronage of Uruk and Enmerkar's divinely endorsed supremacy over Aratta.' Faithful."

  # === Literary significance ===

  - claim_id: C17
    claim_summary: "Contest structure (sorcery challenge, dispatch, counter-champion, defeat, submission) follows pattern recognised as test of divine favour"
    narrative_location: "line 13 (paragraph 3)"
    status: MAPPED
    notes: "Narrative: 'The contest structure -- sorcery challenge, dispatch of champion, counter-champion, defeat, submission -- follows a clear pattern that the audience would have recognised as a test of divine favour.' Faithful. Placed in the source overview/introduction section rather than after the narrative, but content matches."

  - claim_id: C18
    claim_summary: "Central literary theme: local divinely backed sorcery triumphs over foreign sorcery; Sagburu titled 'Wise Woman' defeats through counter-magic not domestic cunning"
    narrative_location: "line 48 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'The composition's central literary theme is local, divinely backed sorcery triumphing over foreign sorcery: Sagburu, titled \"Wise Woman,\" defeats Urgirinuna through superior counter-magic rather than domestic cunning.' Faithful."

  - claim_id: C19
    claim_summary: "Uruk's strength in divinely protected resilience; Sagburu is titled figure of recognised authority defeating foreign sorcerer through superior magical power"
    narrative_location: "line 43 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'The poem affirms that Uruk's strength lies in possessing a deeper, divinely protected resilience; Sagburu is a titled figure of recognised authority who defeats the foreign sorcerer through superior magical power.' Faithful."

  # === Textual transmission ===

  - claim_id: C20
    claim_summary: "Well-preserved across OB manuscripts (32-37 witnesses); part of edubba curriculum as one of four Aratta cycle compositions"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The text is well-preserved across Old Babylonian manuscripts -- between thirty-two and thirty-seven witnesses -- and forms part of the edubba curriculum as one of the four Aratta cycle compositions, with its position in the narrative sequence debated by scholars.' Faithful."

  - claim_id: C21
    claim_summary: "Vanstiphout's critical edition provides seventy pages of text and commentary; minor variant readings in sorcery-contest sequence"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'Vanstiphout's critical edition provides seventy pages of text and commentary, documenting minor variant readings in the sorcery-contest sequence.' Faithful."

  - claim_id: C22
    claim_summary: "One of the four Aratta cycle texts; ends with En-suhgir-ana's submission, bringing contest to conclusion in Uruk's favour"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'This composition is the last of the four Aratta cycle texts; it ends with En-suhgir-ana's submission to Enmerkar, bringing the contest between Uruk and Aratta to a conclusion in Uruk's favour.' Claim says 'one of the four'; narrative says 'the last of the four.' The addition of 'last' is a factual claim not present in the approved claims -- flagged below."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Moses vs Egyptian magicians; Elijah vs Baal prophets; local wise woman defeats foreign sorcerer (worldwide folklore); sorcery as proxy warfare"
    narrative_location: "lines 78-80 (comments), lines 82-84 (prose)"
    status: MAPPED
    notes: "All three COMPARATIVE-HOOK comments are present verbatim at lines 78-80. The Moses/Pharaoh and Elijah/Baal parallels are expanded in prose at lines 82-83. The wise woman motif is developed at line 84. The proxy warfare motif is implicit in the narrative's discussion of sorcery as conflict between kingdoms. Faithful."

findings:

  # --- Check 1: Completeness ---

  - id: F01
    check: completeness
    severity: NONE
    detail: "All 22 claims (C01-C22, plus COMPARATIVE_HOOKS) from the approved claims file are present in the narrative. No claims were dropped."

  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: MEDIUM
    narrative_location: "line 8, paragraph 2"
    detail: "Narrative says 'This composition is the last of the four Aratta cycle texts.' Claims say 'one of the four Aratta cycle texts.' The word 'last' introduces a specific sequencing claim not in the approved claims. The brief's special_instructions note 'This is the final composition in the Aratta diplomatic cycle,' which supports this characterisation, but the approved claims deliberately use the weaker 'one of.' This is a factual addition sourced from the brief rather than the claims file."

  - id: F03
    check: no_additions
    type: NAME-FORM
    severity: MEDIUM
    narrative_location: "throughout (lines 27, 30, 35, 43, 48, 53, 56, 58, 60, 65, 86)"
    detail: "The approved claims consistently use the ETCSL-corrected form 'Ur-jirnuna' (the form established during factchecking as matching the source text). The narrative consistently uses the pre-correction form 'Urgirinuna' (matching the brief and pre-factcheck claims). This is a systematic naming discrepancy: the narrative does not reflect the corrected name form from the approved claims."
    flagged: true

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 13, paragraph 3"
    detail: "Narrative adds: 'After the lengthy diplomatic exchanges and impossible riddles of the preceding poem, the Aratta cycle takes a sharp turn. There are no more messengers trudging across seven mountain ranges with speeches compressed into their memories. There are no more verbal contests in which the medium of communication itself becomes the issue.' Interpretive transition summarising the shift from the previous poem. No new factual claim; stylistic elaboration of C05."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 18, paragraph 4"
    detail: "Narrative adds: 'The shift says something about where the rivalry stands. Diplomacy has been tried and has failed to settle the question permanently. Riddles have been posed and answered. Writing itself has been invented in the course of the argument, and still the lord of Aratta has not conceded final defeat. Now En-suhgir-ana raises the stakes by moving the competition onto entirely different ground.' Interpretive commentary contextualising the sorcery shift. No new factual claim about this specific text."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 22, paragraph 5"
    detail: "Narrative adds: 'Her role here is less visible than in the preceding poem. She does not appear on stage to direct events or whisper instructions to her champion. Her presence is structural rather than dramatic -- felt in the outcome, not in the action.' Interpretive characterisation of Inanna's role. Not a new factual claim; editorial commentary on C06."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 27, paragraph 6"
    detail: "Narrative adds: 'The choice of champion is significant. En-suhgir-ana does not propose to work the sorcery himself. He delegates the task to a specialist -- a hired weapon, imported from outside Aratta's own territory.' Interpretive elaboration of C07. No new factual assertion."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 30, paragraph 7"
    detail: "Narrative adds: 'His origin matters. Hamazu is destroyed -- Urgirinuna is a man without a city, a specialist whose skills are available to whoever can afford them. He belongs to no polity. He owes allegiance to no god's temple. He is, in the logic of the narrative, a free agent of considerable power and no particular loyalty...' Extended interpretive commentary on the significance of being from a destroyed city. Not a new factual claim; thematic elaboration of C08."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 35, paragraph 8"
    detail: "Narrative adds: 'The target selection is methodical. He does not march to the gates of Uruk and challenge its king to a duel... The phrasing is precise and surreal -- the magic does not kill the animals but rearranges their biology, redirecting what should flow into udders into useless extremities. It is not destruction but perversion, the subversion of natural order by supernatural means.' Interpretive analysis of the sorcery mechanics. Consistent with the claim's description of milk redirection. No new factual claim."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 38, paragraph 9"
    detail: "Narrative adds: 'The strategy is more sophisticated than it appears. In a society where wealth is measured in livestock and grain, where the temple economy depends on dairy offerings and pastoral surplus... It is sorcery as economic warfare, and it works.' Interpretive analysis of the sorcery as economic warfare. Elaboration of C10. No new factual claim."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 43, paragraph 10"
    detail: "Narrative adds: 'She is titled \"Wise Woman\" -- a designation that carries formal authority, not merely a description of her character.' Interpretive gloss on the title. Consistent with C19's statement that she is 'a titled figure of recognised authority.' No new factual claim."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 48, paragraph 11"
    detail: "Narrative adds: 'Note what the poem does not do. It does not send Enmerkar himself to face the sorcerer, or summon a warrior, or invoke Inanna directly. The champion who rises to meet En-suhgir-ana's hired sorcerer is a woman from a provincial city -- not the capital, not the royal court, but Eresh. The asymmetry is deliberate.' Interpretive commentary emphasising the literary structure. Stylistic elaboration of C18 and C19."

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "lines 56-58, paragraph 12"
    detail: "Narrative adds extended analysis of the five duels: 'The duels deserve attention... Each round reverses expectations... A cow against a lion -- the domestic animal against the king of beasts, and somehow the cow prevails... Sagburu's magic does not simply overpower Urgirinuna's; it inverts the natural hierarchy, turning the apparently weaker creature into the dominant one.' Interpretive literary analysis of the contest pattern. No new factual claim beyond C12."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 60, paragraph 13"
    detail: "Narrative adds: 'The killing is blunt. After five rounds of elaborate magical combat, the final act is physical... The transition from magical subtlety to bodily violence is jarring, and presumably intentional. The sorcerer has been defeated on his own terms, through five demonstrations that his magic is inferior. The physical killing that follows is not the victory itself but the conclusion drawn from it.' Interpretive commentary on the narrative transition from magical to physical violence. Stylistic elaboration of C13."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 65, paragraph 14"
    detail: "Narrative adds: 'The recognition is immediate. There is no second attempt, no alternative plan... Not because Urgirinuna was weak, but because what he faced was not simply another sorcerer. What he faced was the structural advantage of a city whose goddess has chosen to protect it.' Interpretive commentary on C14. No new factual claim."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 68, paragraph 15"
    detail: "Narrative adds: 'The concession is total. Not \"I lost this round\" but \"I was never your equal.\" The language of brotherhood is significant: in Sumerian political rhetoric, the older brother is the legitimate authority, the one who commands by right of precedence.' Interpretive commentary on the 'older brother' language. The claim about Sumerian political rhetoric regarding 'older brother' as legitimate authority is a contextual scholarly observation consistent with the sources but not explicitly stated in the claims."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 71, paragraph 16"
    detail: "Narrative adds: 'It is a conclusion that the cycle has been building toward through every messenger dispatch, every riddle, every diplomatic exchange, and now through this final, decisive test.' Interpretive summary placing C16 in the context of the Aratta cycle. No new factual claim."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 76, paragraph 17"
    detail: "Narrative adds a full paragraph summarising the Aratta cycle arc: 'The composition's place within the Aratta cycle gives it a significance that extends beyond its individual narrative. The cycle has traced a complete arc: from Enmerkar's initial prayer to Inanna demanding Aratta's submission, through the messenger exchanges and riddle contests, through the invention of writing, and now to this final proof...' Interpretive synthesis placing the composition in cycle context. No new factual claim about this specific text."

  - id: F19
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "lines 82-83, paragraph 18"
    detail: "Narrative adds extended discussion of comparative parallels: 'Later traditions would produce their own versions: Moses confronting the magicians of Pharaoh... Elijah challenging the prophets of Baal on Mount Carmel... The pattern is the same. Two powers, each claiming divine backing, submit their claims to a contest of supernatural force.' This expands the COMPARATIVE-HOOK comments into full prose. Consistent with the hooks and their cited sources. No unsourced factual claim."

  - id: F20
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 84, paragraph 19"
    detail: "Narrative adds thematic analysis of Sagburu as champion: 'What distinguishes this Sumerian version is its choice of champion. Sagburu is not a king, not a priest, not a prophet summoned from the wilderness with fire in his eyes. She is a Wise Woman of a provincial city... The poem's argument is not that Uruk possesses a mightier sorcerer than Aratta. Its argument is that Uruk does not need one.' Interpretive literary analysis. Consistent with C18 and C19. No new factual claim."

  - id: F21
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 86, paragraph 20"
    detail: "Narrative adds: 'The sorcerer came from a destroyed city. He had no patron, no roots, no divine protector. He had technique -- impressive, formidable technique -- and nothing else. Sagburu had technique as well, but she also had something Urgirinuna lacked: a place.' Thematic recapitulation contrasting rootless sorcerer with rooted defender. Interpretive elaboration of C08, C11, C18. No new factual claim."

  - id: F22
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 88, paragraph 21"
    detail: "Narrative adds: 'The tablets endured. Between thirty-two and thirty-seven manuscript witnesses preserve the composition in the scribal curriculum, copied by students who understood that the story was an argument about the nature of legitimate power.' Restates C20 with interpretive framing. No new factual claim."

