supported_claims:
  - claim_number: 1
    claim: "Nanna-Suen is the moon god, patron deity of the city of Ur (Sumerian: Urim), and son of Enlil, chief god of the Sumerian pantheon and lord of Nippur (Sumerian: Nibru)."
    source_id: "etcsl"
    source_loc: "1.5.1, lines 1-10"
    verbatim_quote: "Princely son, … Suen … the lord of Urim … the son of Enlil"

  - claim_number: 2
    claim: "The composition ETCSL 1.5.1 survives in multiple Old Babylonian copies from Nippur and Ur scribal schools, confirming its place in the edubba curriculum."
    source_id: "etcsl"
