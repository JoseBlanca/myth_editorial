findings:
  - claim_number: 5
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The text catalogues the specific goods loaded onto Nanna's barge: cattle, sheep, grain, dairy products, and other agricultural produce, presented in itemised lists that mirror the administrative offering records attested in Ur III economic texts."
    issue: "The first half (goods on the barge) is supported by ETCSL 1.5.1. However, the second citation 'CDLI administrative corpus for Ur-Nippur deliveries' is vague and non-verifiable. CDLI is a tablet database searchable by P-number; it does not have a single addressable resource for 'Ur-Nippur deliveries'. The claim that the literary lists 'mirror' administrative records is a scholarly interpretation requiring a specific secondary source."
    evidence: "CDLI (cdli.ucla.edu) is a catalogue of individual tablets, not a curated essay resource. No stable URL corresponds to 'CDLI administrative corpus for Ur-Nippur deliveries'."
    recommended_fix: "Remove 'CDLI administrative corpus for Ur-Nippur deliveries' as a citation. Cite ETCSL 1.5.1 alone for the textual content. For the interpretive claim about paralleling administrative records, add a specific scholarly reference (e.g., Sallaberger on Ur III cult administration) or mark with [INFERENCE]."

  - claim_number: 10
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The itinerary, with its sequence of named cities and waterways, provides evidence for the actual geography and canal network of the Ur-Nippur corridor as understood in the Old Babylonian period."
    issue: "The citation 'Kramer 1961, pp. 47-49' is problematic. In Kramer's Sumerian Mythology (rev. ed. 1961), the pages around 47-49 fall within the chapter discussing cosmogonic myths, not the Nanna-Nippur journey text. Kramer discusses Nanna's journey to Nippur elsewhere in his work (primarily in later publications such as 'The Sumerians', 1963, rather than in 'Sumerian Mythology'). The page reference may be misattributed. Additionally, the interpretive claim about 'evidence for actual geography' is a scholarly inference not directly stated by the text."
    evidence: "Kramer 1961 (Sumerian Mythology, rev. ed.) table of contents: Chapter II 'Myths of Origins' covers the bulk of pp. 30-75. The Nanna journey text is not a primary subject of this book. Kramer's more detailed treatment of this composition appears in 'The Sumerians' (1963), not 'Sumerian Mythology' (1961)."
    recommended_fix: "Verify the Kramer page reference against the physical text. If using Kramer, cite 'The Sumerians' (1963) if that is the actual source, or replace with a more precise reference. Also consider marking the geographical-evidence interpretation as [INFERENCE]."

  - claim_number: 15
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The blessing encompasses agricultural abundance, commercial prosperity, and military security for Ur and its people, granted through Enlil's supreme divine authority."
    issue: "The claim is broadly consistent with the blessing section of ETCSL 1.5.1, but the specific characterisation of 'commercial prosperity' and 'military security' as distinct categories of the blessing may be an over-schematisation. The text's blessing focuses heavily on agricultural and pastoral abundance. 'Military security' as a distinct blessing theme is less clearly attested in the standard translation. The citation to Black et al. 2004 pp. 153-155 is plausible but cannot be verified without the physical book."
    evidence: "ETCSL 1.5.1 blessing section emphasises abundance of herds, grain, and fish. 'Military security' as a named blessing category may overstate the text."
    recommended_fix: "Soften 'military security' to reflect the text more precisely, or verify against Black et al. 2004 pp. 153-155 and add the exact wording used there."

  - claim_number: 16
    kind: "SILENT-BRIDGE"
    severity: "HIGH"
    claim: "The blessing functions as a legitimation device: Enlil's endorsement of Ur through Nanna validates the political and cultic pre-eminence of Ur within the Sumerian city-state system."
    issue: "This is a scholarly interpretation about the composition's political function, not a textual claim. It is not marked with [INFERENCE] despite being an analytical conclusion rather than something directly stated in the text. The text narrates a blessing; it does not state that the blessing 'functions as a legitimation device' or 'validates political pre-eminence'. This is a silent bridge — an interpretive claim presented as factual without an explicit marker."
    evidence: "ETCSL 1.5.1 does not contain the phrase 'legitimation' or any metaliterary commentary on its own function. The political interpretation is scholarly analysis."
    recommended_fix: "Add an [INFERENCE] marker: '[INFERENCE: The blessing functions as a legitimation device ... | basis: Scholarly consensus (Black et al. 2004 pp. 147-148) interprets the text as encoding Nippur's sanction of Ur | risk: The text itself does not state this function explicitly]'."

  - claim_number: 18
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The composition's ritual-aetiological function is primary: it provides a mythic charter for the regular delivery of offerings from Ur to Nippur's Ekur temple, mapping divine action onto attested cultic practice."
    issue: "The CDLI citation ('administrative corpus, Ur-Nippur deliveries') is vague and non-verifiable as a specific source. CDLI is a tablet-by-tablet database. Additionally, the claim that this function is 'primary' is an interpretive judgment. The ETCSL citation (lines 1-100) supports the narrative content but not the metaliterary claim about the composition's function."
    evidence: "CDLI does not have a curated landing page for 'Ur-Nippur deliveries'. The functional interpretation requires a scholarly secondary source."
    recommended_fix: "Replace 'CDLI administrative corpus' with a specific scholarly source on Ur III cult administration (e.g., Sallaberger 1993 or Sigrist). Mark the 'primary function' claim as [INFERENCE] with attribution to the interpreting scholar."

  - claim_number: 19
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: "The royal-legitimation function operates through the reciprocal logic of the journey: Ur sends offerings to Nippur and receives Enlil's blessing in return, encoding the dependence of secular power (Ur) on religious sanction (Nippur)."
    issue: "This is a scholarly interpretation consistent with Black et al. 2004 pp. 147-148, but the specific language of 'reciprocal logic' and 'secular power vs. religious sanction' is modern analytical vocabulary. The citation is plausible, but the claim should carry an [INFERENCE] marker since it is analytical rather than textual."
    evidence: "The text narrates gifts given and blessings received. The reciprocal-logic framing is scholarly interpretation, not a textual statement."
    recommended_fix: "Add [INFERENCE] marker or attribute the interpretation explicitly to Black et al. 2004."

  - claim_number: 20
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The barge procession described in the text has parallels in real ritual practice: administrative texts from the Ur III and Old Babylonian periods document divine barge journeys and offering deliveries between major Sumerian cities."
    issue: "The claim is broadly correct -- divine barge processions are attested in Ur III administrative records -- but the citations are imprecise. 'CDLI' alone is not a verifiable citation; it is a database of hundreds of thousands of tablets. 'Kramer 1961, pp. 47-49' is the same problematic reference noted in claim 10: these pages in Sumerian Mythology likely do not discuss this specific topic."
    evidence: "CDLI has no single resource for 'divine barge journeys'. The Kramer 1961 page range is suspect as noted in claim 10."
    recommended_fix: "Replace with specific scholarly references on Ur III divine barge processions, such as Sallaberger's work on cult calendars, or Cohen 1993 on cultic calendars. Correct or remove the Kramer 1961 pp. 47-49 reference."

  - claim_number: 6
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: "[INFERENCE: The detailed gift catalogue closely parallels real cultic offerings documented in administrative tablets...]"
    issue: "The INFERENCE marker is correctly applied in principle, but the 'basis' field cites 'Administrative texts from the Ur III period' without any specific source reference. For the marker to be useful, the basis should cite a specific publication or tablet group rather than gesturing vaguely at an entire administrative corpus."
    evidence: "The basis field reads: 'Administrative texts from the Ur III period attest to regular deliveries of goods from Ur to Nippur's Ekur temple.' This is true but non-verifiable without a specific citation."
    recommended_fix: "Add a specific scholarly reference in the basis field, e.g., Sallaberger 1993 or Sigrist on the Drehem archive, to make the inference's foundation verifiable."
