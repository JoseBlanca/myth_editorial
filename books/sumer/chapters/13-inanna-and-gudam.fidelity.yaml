    detail: "Narrative adds 'indicating either extremely limited circulation or catastrophic preservation failure' as an explanation for why few manuscripts survive. This phrase is actually present verbatim in the claims file (C05), so it is not an addition — it is a faithful reproduction."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 3, paragraph 1"
    detail: "Narrative adds 'in the classification used throughout this book' after 'single-prevalent-reconstructed text.' This is a cross-referencing editorial phrase, not a new factual claim."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 15, paragraph 2"
    detail: "Narrative adds glossary-mandated first-mention glosses: Uruk described as 'great walled city of southern Mesopotamia, seat of Inanna's temple the E-ana (Sumerian: Unug)' — this matches the glossary first_mention_gloss exactly. Inanna described as 'goddess of love, war, and the morning and evening star' — matches glossary exactly. Required by glossary protocol."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 15, paragraph 2"
    detail: "Narrative adds: 'Uruk is the city of Inanna...and so the threat to the city is a threat to the goddess herself.' This is an inference clearly warranted by the claims: Uruk is described as 'Inanna's city' in C09. Stylistic elaboration."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 15, paragraph 2"
    detail: "Narrative adds: 'The opening that would have told us where Gudam came from and what kind of creature it was is largely destroyed. We are left with a monster already rampaging and no backstory to explain it.' Editorial commentary restating the LACUNA block at line 13 in prose form. Not a new factual claim."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 22, paragraph 3"
    detail: "Narrative adds: 'The middle of the story — which presumably contained the most dramatic material — is substantially broken. We can infer from what survives at either end that the basic narrative shape follows a pattern well attested in Mesopotamian literature: a patron deity defends her city against a monstrous threat. But the details of how Inanna confronted the monster are lost.' This is a prose restatement of the LACUNA block (C10_LACUNA) and INFERENCE block (C11_INFERENCE). No new factual claims — it restates the inference and lacuna in narrative form."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 26, paragraph 4"
    detail: "Narrative adds: 'What does survive is the resolution, and it contains a surprise. It is not Inanna herself who strikes the decisive blow.' Editorial framing and emphasis. Not a new factual claim."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 26, paragraph 4"
    detail: "Narrative adds: 'What follows is equally unexpected.' Transitional editorial phrase. Not a new factual claim."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 29, paragraph 5"
    detail: "Narrative adds: 'This is a remarkable outcome by the standards of monster-slaying narrative anywhere. The monster is not killed but rehabilitated, conscripted into the service of the very city it had been devouring. The predator becomes a guard dog. Whether the original text developed this irony at greater length is impossible to say — the fragments do not permit it.' This is interpretive/thematic commentary on C12. The observation that the monster is 'rehabilitated' rather than killed is directly warranted by the claim. The 'guard dog' metaphor is a stylistic characterization. No new factual claims."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 35, paragraph 6"
    detail: "Narrative adds: 'appearing in traditions from Marduk's defeat of Tiamat in Babylon onward.' The Marduk/Tiamat reference is not in the claims file but is a well-known scholarly example of the Chaoskampf pattern referenced in the COMPARATIVE-HOOK. This is consistent with the Kramer 1961 citation and is common scholarly knowledge."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 39, paragraph 7"
    detail: "Narrative adds: 'What makes this particular version distinctive — to the extent that the fragments allow any judgement at all — is the mercy. In most versions of this pattern, the monster dies. Here, it lives, pardoned and put to work. Whether that detail reflects a theological principle, a narrative taste, or simply the idiosyncrasy of one Sumerian scribe is a question the tablets, in their present condition, cannot answer.' This is interpretive/thematic commentary synthesizing C12 and the COMPARATIVE-HOOK observations. The observation about 'most versions' of the pattern is a reasonable scholarly generalization. The closing question is appropriately hedged. No new factual claims."

