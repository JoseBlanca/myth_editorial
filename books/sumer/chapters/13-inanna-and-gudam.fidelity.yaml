  - claim_id: C07
    claim_summary: "Text classified as single-prevalent-reconstructed: only known version, reconstructed from very limited fragments"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'It is the only known version, reconstructed from very limited fragments — a single-prevalent-reconstructed text, in the classification used throughout this book.' Faithful. Adds editorial phrase 'in the classification used throughout this book' which is a cross-reference to the book's methodology — not a new factual claim."

  # === Narrative fragments ===

  - claim_id: C08_LACUNA
    claim_summary: "LACUNA: Opening lines 1-20 heavily damaged; origin and nature of Gudam only partially described"
    narrative_location: "line 13"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims. Faithful."

  - claim_id: C09
    claim_summary: "Gudam is a fearsome monster that terrorises Uruk (Unug), Inanna's city; devours the city's food and drink"
    narrative_location: "line 15 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'A fearsome monster or creature called Gudam terrorises Uruk (Sumerian: Unug)...devouring the city's food and drink.' Faithful. Adds glossary-mandated first-mention glosses for Uruk and Inanna."

  - claim_id: C10_LACUNA
    claim_summary: "LACUNA: Central narrative substantially broken; details of rampage and confrontation largely lost"
    narrative_location: "line 18"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims. Faithful."

  - claim_id: C11_INFERENCE
    claim_summary: "INFERENCE: Surviving fragments indicate patron deity defends city against monstrous threat — a basic pattern of divine urban protection"
    narrative_location: "line 20"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims. Faithful."

  - claim_id: C12
    claim_summary: "Junior fisherman of Inanna strikes Gudam with double-axe; Gudam pleads for mercy; Inanna spares him, sentencing him to live near Zabalam, protecting Uruk"
    narrative_location: "line 26 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'A junior fisherman of Inanna strikes Gudam down with a double-axe...Gudam, defeated, pleads with Inanna for mercy — and she grants it. Rather than destroying the creature, she sentences him to live near Zabalam, where he is to serve as a protector of her city Uruk.' Faithful. All key elements preserved: fisherman, double-axe, plea for mercy, Zabalam, protective role."

  - claim_id: C13_LACUNA
    claim_summary: "LACUNA: Conclusion is fragmentary; resolution and hymnic closing mostly lost"
    narrative_location: "line 31"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims. Faithful."

  # === Significance ===

  - claim_id: C14
    claim_summary: "Shortest and most damaged text in the Inanna cycle; only broadest narrative shape recoverable"
    narrative_location: "line 3 (paragraph 1) and line 35 (paragraph 6)"
    status: MAPPED
    notes: "Narrative paragraph 1: 'This is, in short, the shortest and most damaged text in the Inanna cycle.' Paragraph 6: 'Only the broadest narrative shape — monster threatens city, goddess defeats monster — can be recovered with confidence from the surviving fragments.' Faithful."

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Mesopotamian Chaoskampf pattern (patron deity slays monster); Greek parallel (Athena and monsters)"
    narrative_location: "lines 35-36 and lines 41-42"
    status: MAPPED
    notes: "Narrative line 35: 'The pattern of a patron deity protecting a city by subduing a monstrous threat is one of the most widespread motifs in Near Eastern mythology, appearing in traditions from Marduk's defeat of Tiamat in Babylon onward.' Line 35: 'The Greek tradition offers its own parallels — Athena and the various monsters of the Athenian mythological landscape follow a structurally similar pattern.' COMPARATIVE-HOOK comments reproduced at lines 41-42. Faithful."

findings:

