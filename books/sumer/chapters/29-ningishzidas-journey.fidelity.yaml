    severity: LOW
    claim_id: C15
    detail: "Claims say 'OB Nippur manuscripts are the sole witnesses'; narrative says 'The Old Babylonian manuscripts are the sole witnesses' (dropping 'Nippur'). This is actually more consistent with C01, which establishes that manuscripts come from multiple sites including Ur. The claims text at C15 appears internally inconsistent with C01 on this point; the narrative follows C01 and is more accurate."

  # --- Check 4: Glossary compliance ---

  - id: F21
    check: glossary_compliance
    severity: LOW
    detail: >
      Checked all relevant glossary terms appearing in the narrative:
      - Ningishzida: Glossary first_mention_gloss is 'god of the underworld, a judge among the dead.'
        Narrative first substantive mention (line 14): 'an underworld god described in the Sumerian
        tradition as "lord of the good tree," a deity associated with the nether world and with
        vegetation.' This follows the claims (C04) rather than the glossary gloss. The claims
        description is source-specific (from ETCSL 1.7.3 and Jacobsen 1987), while the glossary
        gloss reflects his broader role. The narrative omits 'a judge among the dead.' This is a
        minor deviation — the claims-specific description is appropriate for this composition, but
        the glossary gloss could have been incorporated alongside it.
      - galla demons: first mention glossed as 'underworld demons who enforce the laws of the dead'
        — matches glossary first_mention_gloss exactly. PASS.
      - Inanna: mentioned at line 14 ('Inanna chose to descend') and line 45 ('Inanna descended
        and was killed'). No first_mention_gloss provided for Inanna in this chapter, but Inanna
        has been glossed in earlier chapters. Acceptable for a chapter-29 reference. PASS.
      - Dumuzid: mentioned at line 39 ('the Dumuzid lament tradition') and line 45 ('Dumuzid was
        seized and dragged below'). No first_mention_gloss provided, but Dumuzid has been glossed
        in earlier chapters. Acceptable. PASS.

