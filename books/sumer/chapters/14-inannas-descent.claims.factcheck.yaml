    kind: UNVERIFIED
    severity: MEDIUM
    claim: "Ningishzida is mentioned alongside Dumuzid in some underworld passages as a chthonic deity who dwells below."
    issue: "In the ETCSL composite of Inanna's Descent (1.4.1), Ningishzida is not prominently mentioned. The association of Ningishzida and Dumuzid as underworld deities appears in other compositions (notably the Adapa myth and Gudea Cylinder texts) and in Jacobsen's broader discussion of underworld theology. The claim that Ningishzida appears 'in some underworld passages' of this specific composition may overstate his presence in ETCSL 1.4.1 specifically."
    evidence: "Jacobsen 1987, pp. 225–228 discusses Ningishzida in the context of underworld deities broadly, but the reference may be to passages outside ETCSL 1.4.1 proper."
    recommended_fix: "Verify whether Ningishzida is actually named in the ETCSL 1.4.1 composite text. If the reference is to Jacobsen's broader discussion rather than to this specific composition, rephrase to clarify the source of the association."

  - claim_number: 60
    kind: UNVERIFIED
    severity: MEDIUM
    claim: "The dead in the underworld eat dust and clay and are clothed in feathered garments like birds — standard Mesopotamian underworld imagery shared with other compositions."
    issue: "The 'dust and clay' and 'feathered garments' imagery is well-attested Mesopotamian underworld description, but it appears most prominently in the Akkadian Descent of Ishtar (which is out of scope per scope.md) and in Enkidu's Dream in Gilgamesh, Enkidu and the Netherworld. In the Sumerian Inanna's Descent (ETCSL 1.4.1), this specific imagery may not appear in the extant lines. The claim cites Jacobsen 1987, pp. 210–211, but Jacobsen may be drawing on broader Mesopotamian underworld descriptions rather than quoting ETCSL 1.4.1 specifically."
    evidence: "The 'feathered garments like birds' description appears in the Akkadian Descent of Ishtar: 'they are clothed, like birds, with garments of wings.' This is an out-of-scope text per scope.md."
    recommended_fix: "Verify whether the dust/clay/feathered-garment imagery appears in the Sumerian ETCSL 1.4.1 text specifically. If it derives from the Akkadian Descent of Ishtar or from Gilgamesh, Enkidu and the Netherworld (ETCSL 1.8.1.4), this must be clearly attributed to the correct source and not silently imported from the Akkadian version."

