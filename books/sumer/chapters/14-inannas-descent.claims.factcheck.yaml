    kind: UNVERIFIED
    severity: MEDIUM
    claim: "Inanna enters the throne room and Ereshkigal rises from her throne in anger."
    issue: "The ETCSL text is more nuanced than 'Ereshkigal rises from her throne in anger.' In the Sumerian text, it is Inanna who attempts to sit on Ereshkigal's throne, which provokes the judgment. The phrasing 'Ereshkigal rises from her throne in anger' may conflate two distinct actions. ETCSL describes Inanna crouching down naked, then attempting to take Ereshkigal's throne."
    evidence: "ETCSL 1.4.1: 'Then she made her sister Erec-ki-gala rise from her throne, and instead she sat on her throne.' The text suggests Inanna forces Ereshkigal from the throne, not that Ereshkigal rises in anger."
    recommended_fix: "Revise to accurately reflect the ETCSL text: Inanna, stripped naked, enters the throne room and sits on Ereshkigal's throne — this is the transgression that triggers the Annunaki's judgment."

  - claim_number: 41
    kind: UNVERIFIED
    severity: LOW
    claim: "As Inanna returns to the upper world accompanied by the galla demons, she encounters various deities at each of her cities."
    issue: "The claim is broadly correct but vague. The ETCSL text specifies Inanna visits specific cities and encounters specific individuals (Ninshubur, Shara, Lulal, then Dumuzid). The claim says 'various deities at each of her cities' without naming them, though subsequent claims (42–44) provide specifics."
    evidence: "No issue with accuracy, but the claim is overly generic as a standalone factual assertion."
    recommended_fix: "No factual correction needed; subsequent claims provide the specifics."

  - claim_number: 48
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "Utu transforms Dumuzid's hands and feet into the hands and feet of a snake (or gazelle, depending on manuscript), allowing him to flee from the galla."
    issue: "The standard ETCSL translation of 1.4.1 has Dumuzid asking Utu to change his hands and feet into those of a gazelle (not a snake). The 'snake' variant is not the primary reading in the ETCSL composite. In the ETCSL text, Dumuzid says 'change my hands into gazelle hands, change my feet into gazelle feet.' The snake transformation appears in the related Dumuzid's Dream texts (ETCSL 1.4.3), not in the main Inanna's Descent composite. The claim conflates two different compositions."
    evidence: "ETCSL 1.4.1: 'Change my hands into gazelle hands, change my feet into gazelle feet.' The snake transformation is from the Dumuzid's Dream cycle, not the Inanna's Descent composite."
    recommended_fix: "Correct to state that ETCSL 1.4.1 has the gazelle transformation as the primary reading. If the snake variant exists in some witnesses of 1.4.1 specifically, cite Sladek 1974 with the specific manuscript sigla. Otherwise, note that the snake motif belongs to the related Dumuzid's Dream texts (ETCSL 1.4.3)."

  - claim_number: 56
    kind: CONTAMINATION
    severity: HIGH
    claim: "This alternation provides the aetiological basis for the seasonal death and return of Dumuzid, grounding the wailing cult and the pastoral cycle of the agricultural year."
    issue: "The claim cites Kramer 1961, pp. 83–96 as its sole evidence source (EVIDENCE line: source_id=kramer-1961). Per sources.yaml blacklist rules, 'Kramer 1961 cited without ETCSL cross-check' is explicitly prohibited: 'Readings superseded by 40+ years of collation; never cite Kramer alone for textual claims.' While the claim also cites ETCSL and Jacobsen in its footnote, the EVIDENCE metadata line points only to Kramer. Furthermore, Kramer's interpretation of Dumuzid as a straightforward 'dying-and-rising vegetation god' has been substantially critiqued and revised by later scholarship (including Jacobsen 1987 who offered a more nuanced reading, and more recent work questioning the vegetation-deity framework)."
    evidence: "sources.yaml blacklist: 'Kramer 1961 cited without ETCSL cross-check — Readings superseded by 40+ years of collation; never cite Kramer alone for textual claims.'"
    recommended_fix: "Change the EVIDENCE metadata line to point to ETCSL 1.4.1 and/or Jacobsen 1987 as the primary evidence source. Retain Kramer only as a supplementary reference in the footnote. Consider nuancing the 'vegetation deity' framing, which derives primarily from Kramer's now-dated interpretive framework."

