    claim: "Inanna, queen of heaven, goddess of love, war, and political power, resolves to descend to the kur — the nether world, realm of the dead beneath the earth — the domain of her elder sister Ereshkigal."
    source_id: "etcsl"
    source_loc: "1.4.1, lines 1-13"
