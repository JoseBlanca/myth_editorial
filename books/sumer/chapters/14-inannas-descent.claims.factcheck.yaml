findings:
  - claim_number: 1
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "The Sumerian composition 'Inanna's Descent to the Nether World' is catalogued as ETCSL 1.4.1 and comprises approximately 415 lines in the composite text."
    issue: "The ETCSL composite text contains approximately 412 lines (final reference is lines 411-412), not 415. The ETCSL catalogue number 1.4.1 is correct."
    evidence: "ETCSL composite text (https://etcsl.orinst.ox.ac.uk/section1/c141.htm) ends at line 412. OMNIKA reports 412-414 depending on variant counting."
    recommended_fix: "Change '415 lines' to 'approximately 412 lines' to match the ETCSL composite."

  - claim_number: 2
    kind: CITATION-WRONG
    severity: HIGH
    claim: "Over forty Old Babylonian tablets and fragments preserve portions of this composition, making it the most extensively attested Sumerian literary text."
    issue: "CDLI Q000343 lists 58 individual tablet witnesses, not 'over forty.' Sladek 1974 worked with 29 artifacts (36 fragments), but subsequent discoveries and the ETCSL apparatus reference 'over fifty' witnesses. The number has grown significantly since Sladek."
    evidence: "CDLI composite P468903 / Q000343 (https://cdli.earth/artifacts/468903) lists 58 witnesses. OMNIKA and ETCSL references consistently say 'over fifty cuneiform artifacts.'"
    recommended_fix: "Change 'over forty' to 'over fifty' (or 'approximately sixty' per CDLI). The description 'most extensively attested' remains defensible given the tablet count."

  - claim_number: 9
    kind: CITATION-WRONG
    severity: HIGH
    claim: "Inanna gathers the seven me of the divine office and transforms them into physical adornments: she places the shugurra (crown of the steppe) on her head, takes the measuring rod and line of lapis lazuli in her hand, fastens small lapis lazuli beads around her neck, sets twin egg-shaped beads upon her breast, places a gold ring on her hand, binds a breastplate called 'Come, man, come' on her chest, and covers her body with the pala-garment of ladyship."
    issue: "Multiple errors against the ETCSL translation: (1) ETCSL says 'turban, headgear for the open country' — not 'shugurra (crown of the steppe)' which is the Wolkstein-Kramer rendering. (2) The claim lists only 7 items but the ETCSL lists more: turban, wig, lapis-lazuli beads, twin egg-shaped beads, pala dress, mascara ('Let a man come, let him come'), pectoral ('Come, man, come'), golden ring, and measuring rod and line — that is 9 items. (3) The ETCSL calls it a 'pectoral,' not a 'breastplate.' (4) The claim omits the wig and mascara entirely."
    evidence: "ETCSL translation lines 14-25: 'She put a turban, headgear for the open country, on her head. She took a wig for her forehead. She hung small lapis-lazuli beads around her neck. She fastened twin egg-shaped beads on her breast. She covered her body with the pala dress, the garment of ladyship. She put mascara which is called \"Let a man come, let him come\" on her eyes. She pulled the pectoral which is called \"Come, man, come\" over her breast. She placed a golden ring on her hand. She held the lapis-lazuli measuring rod and measuring line in her hand.'"
    recommended_fix: "Replace 'shugurra (crown of the steppe)' with 'turban, headgear for the open country' (ETCSL wording) or note that 'shugurra' is the Wolkstein-Kramer term. Add the wig and mascara to the list. Change 'breastplate' to 'pectoral.' Acknowledge that the text lists more than seven discrete items even though the text says 'seven divine powers.'"

  - claim_number: 17
    kind: CITATION-WRONG
    severity: HIGH
    claim: "At the first gate, the shugurra (crown) is removed from Inanna's head; when she asks why, she is told: 'Be silent, Inanna. The powers of the nether world are perfect. The rites of the nether world must not be questioned.'"
    issue: "Two problems: (1) The ETCSL says 'turban, headgear for the open country' — not 'shugurra.' (2) The quoted formula is the Wolkstein-Kramer rendering. The ETCSL wording is: 'Be satisfied, Inana, a divine power of the underworld has been fulfilled. Inana, you must not open your mouth against the rites of the underworld.' The claim quotes a different translation while citing ETCSL."
    evidence: "ETCSL translation: 'the turban, headgear for the open country, was removed from her head... Be satisfied, Inana, a divine power of the underworld has been fulfilled. Inana, you must not open your mouth against the rites of the underworld.'"
    recommended_fix: "Use the ETCSL wording when citing ETCSL. If the Wolkstein-Kramer rendering is preferred for literary reasons, cite that source instead. Change 'shugurra' to 'turban' or note the terminological difference."

  - claim_number: 18
    kind: CITATION-WRONG
    severity: HIGH
    claim: "At the second gate, the measuring rod and line of lapis lazuli are removed from her hand."
    issue: "Wrong item at this gate. Per the ETCSL translation, at the second gate the small lapis-lazuli beads are removed from her neck (not the measuring rod). The ETCSL gate order is: Gate 1 turban, Gate 2 small lapis-lazuli beads, Gate 3 twin egg-shaped beads, Gate 4 pectoral, Gate 5 golden ring, Gate 6 measuring rod and line, Gate 7 pala dress."
    evidence: "ETCSL translation gate sequence: Gate 1: 'the turban, headgear for the open country, was removed from her head.' Gate 2: 'the small lapis-lazuli beads were removed from her neck.' Gate 3: 'the twin egg-shaped beads were removed from her breast.' Gate 4: 'the Come, man, come pectoral was removed from her breast.' Gate 5: 'the golden ring was removed from her hand.' Gate 6: 'the lapis-lazuli measuring rod and measuring line were removed from her hand.' Gate 7: 'the pala dress, the garment of ladyship, was removed from her body.'"
    recommended_fix: "Correct the entire gate sequence to match the ETCSL translation order. The measuring rod is removed at Gate 6, not Gate 2."

  - claim_number: 19
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "At the third gate, the small lapis lazuli beads are removed from her neck."
    issue: "Per ETCSL, the small lapis-lazuli beads are removed at the second gate, not the third. At the third gate, the twin egg-shaped beads are removed."
    evidence: "ETCSL translation: Gate 2 'the small lapis-lazuli beads were removed from her neck' / Gate 3 'the twin egg-shaped beads were removed from her breast.'"
    recommended_fix: "Correct gate numbering to match ETCSL sequence."

  - claim_number: 20
    kind: UNVERIFIED
    severity: LOW
    claim: "At the fourth gate, the twin egg-shaped beads are removed from her breast."
    issue: "Per ETCSL, the twin egg-shaped beads are removed at the third gate, and the pectoral at the fourth gate. The item is correct but the gate number is wrong."
    evidence: "ETCSL: Gate 3 has twin egg-shaped beads; Gate 4 has the pectoral."
    recommended_fix: "Correct to match ETCSL gate order."

  - claim_number: 21
    kind: UNVERIFIED
    severity: LOW
    claim: "At the fifth gate, the gold ring is removed from her hand."
    issue: "The gold ring is indeed removed at Gate 5 in the ETCSL sequence. This claim is actually correct for the ETCSL order."
    evidence: "ETCSL: Gate 5 'the golden ring was removed from her hand.' Confirmed correct."
    recommended_fix: "No change needed for this specific claim."

  - claim_number: 22
    kind: UNVERIFIED
    severity: LOW
    claim: "At the sixth gate, the breastplate 'Come, man, come' is removed from her chest."
    issue: "Per ETCSL, at Gate 6 the measuring rod and line are removed (not the breastplate/pectoral). The pectoral ('Come, man, come') is removed at Gate 4. Also, ETCSL calls it a 'pectoral,' not a 'breastplate.'"
    evidence: "ETCSL: Gate 4 'the Come, man, come pectoral was removed from her breast.' Gate 6 'the lapis-lazuli measuring rod and measuring line were removed from her hand.'"
    recommended_fix: "Correct gate assignment and terminology."

  - claim_number: 23
    kind: UNVERIFIED
    severity: LOW
    claim: "At the seventh gate, the pala-garment of ladyship is removed from her body; Inanna enters the throne room of the nether world naked and stripped of all divine power."
    issue: "The pala dress at Gate 7 is correct per ETCSL. However, the claim says she 'enters the throne room naked' — the ETCSL says 'After she had crouched down and had her clothes removed, they were carried away.' The claim is substantively correct but the phrase 'stripped of all divine power' is interpretive rather than textual."
    evidence: "ETCSL: 'the pala dress, the garment of ladyship, was removed from her body.'"
    recommended_fix: "Gate 7 item is correct. Minor interpretive note only."

  - claim_number: 26
    kind: CITATION-WRONG
    severity: HIGH
    claim: "Inanna enters the throne room and Ereshkigal rises from her throne in anger."
    issue: "The claim reverses the action. Per ETCSL, it is INANNA who makes Ereshkigal rise from the throne, and INANNA who sits on the throne instead. Ereshkigal does not 'rise in anger' — she is displaced by Inanna."
    evidence: "ETCSL 1.4.1, lines 164-166: 'Then she made her sister Erec-ki-gala rise from her throne, and instead she sat on her throne.' It is Inanna who usurps the throne; the Anuna then judge her for this act."
    recommended_fix: "Correct to: 'Inanna forces Ereshkigal to rise from her throne and sits upon it herself. The Anuna judges then render their decision against her.'"

  - claim_number: 28
    kind: UNVERIFIED
