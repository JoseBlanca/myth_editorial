glossary_compliance:
  enki:
    status: ok
    notes: >
      Used in the chosen form "Enki" with the approved first-mention
      gloss "god of wisdom, fresh water, and cunning, lord of the abzu
      beneath Eridu" (paragraph 2).
  enlil:
    status: ok
    notes: >
      Used in the chosen form "Enlil" (paragraph 2 and verdict section).
      First-mention gloss ("king of the gods, lord of wind and command,
      supreme authority in Nippur") is NOT supplied on first use. If
      chapter 34 is a reader's first encounter with Enlil in book
      reading order, the gloss should be added. If earlier chapters
      have already introduced Enlil, this is acceptable.
  abzu:
    status: ok
    notes: >
      Used italicized and glossed in paragraph 2 ("lord of the abzu
      beneath Eridu"). The full first-mention gloss from the glossary
      ("the abzu — the underground freshwater ocean beneath Eridu,
      Enki's domain") is partially rendered; acceptable given likely
      prior introduction in earlier chapters.
  edubba:
    status: ok
    notes: >
      Used italicized and glossed on first mention in paragraph 2
      ("the edubba -- the scribal school where these texts were copied
      and taught"), matching the glossary exactly.
  eridu:
    status: ok
  nippur:
    status: ok
    notes: >
      "E-kur, the temple of Enlil at Nippur" is correctly rendered; no
      need to re-gloss Nippur if introduced earlier in the book.

# ──────────────────────────────────────────────────────────────────────
# RECOMMENDED ACTIONS (in priority order)
# ──────────────────────────────────────────────────────────────────────

recommended_actions:

  - priority: 1
    action: >
      Resolve the Enki-vs-Shulgi judge discrepancy. The approved claims
      say Enki judges; the narrative says Shulgi judges with Enki behind
      the scenes. These cannot both stand. Either (a) revise the claims
      to reflect Shulgi as judge (if that is the accurate reading of
      ETCSL 5.3.5 — which would align with the text's Ur III context
      and is consistent with Black et al. 2004), or (b) revise the
      narrative to restore Enki as the direct verdict-giver. Until
      resolved, the chapter cannot be published.

  - priority: 2
    action: >
      Fix claim C10 in the approved claims document. The attributes
      "flight, song, and beauty" belong to Bird, not Fish. The narrative
      already reads correctly; the claim text is defective and should be
      rewritten (likely: "Fish initiates the dispute by attacking Bird,
      denouncing it as noisy, gluttonous, and a pest trapped by farmers
      and fowlers" — or whatever the source actually supports).

  - priority: 3
    action: >
      Reconcile the specific insult content in C13 and C14 with the
      narrative. Either the claims should be revised to list the
      narrative's specifics (smell / flabby mouth; sweeper-boy with
      nets) or the narrative should add the claim's specifics (cold,
      slimy, mute / scratches in dirt, devours worms, fouls nest). The
      current state has the narrative using details that are not
      warranted by the claims.

  - priority: 4
    action: >
      Either add Bird's retaliation (snatching Fish's spawn) to the
      approved claims, or remove it from the narrative. Same principle
      applies to Shulgi's direct verdict speech and the Ur III political
      framing.

  - priority: 5
    action: >
      Consider adding the Enlil first-mention gloss if chapter 34 is
      encountered before the chapters that introduce Enlil in the book
      reading order.
