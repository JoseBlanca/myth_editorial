unsupported_additions:

  - id: A01
    narrative_location: "Paragraph 2 (doxology)"
    content: >
      "The composition closes with a doxology praising Father Enki --
      god of wisdom, fresh water, and cunning, lord of the abzu beneath
      Eridu -- whose wisdom is understood to have guided the king's
      judgment."
    risk: moderate
    notes: >
      Not in approved claims. Serves to reconcile the narrative's
      Shulgi-as-judge choice with the claims' Enki-as-judge. Needs
      source support if retained. Also introduces the glossary
      first-mention gloss for Enki.

  - id: A02
    narrative_location: "Paragraph 3"
    content: >
      "Ur III political context in which the text was composed and
      positions Shulgi's authority as divinely inspired: Enki's wisdom
      stands behind the royal verdict, acknowledged in the closing
      doxology but not exercised directly."
    risk: high
    notes: >
      Substantive interpretive claim with no support in the approved
      claims document. The Ur III dating and the "divinely inspired
      authority" framing are editorial additions that need either a
      source citation or removal.

  - id: A03
    narrative_location: "Section 'The dispute', paragraph 1"
    content: >
      "Fish addresses Bird murderously, accusing it of being noisy,
      gluttonous, and a pest caught in the traps of farmers and fowlers."
    risk: moderate
    notes: >
      The claim C10 frames Fish's opening as self-praise through
      "flight, song, beauty"; the narrative reframes it as an attack on
      Bird. Flagged as an "unsupported addition" in the sense that the
      attack framing is not in the claims — though this may be the
      narrative correcting a defective claim.

  - id: A04
    narrative_location: "Section 'Escalation: physical aggression', paragraph 2"
    content: >
      "Bird retaliates by snatching Fish's spawn from the water,
      gathering them all together. The violence is now reciprocal..."
    risk: moderate
    notes: >
      The approved claims document only records Fish destroying Bird's
      eggs (C15). Reciprocal violence by Bird against Fish's spawn is
      not in the claims. If this is in the source, the claims document
      should be updated to include it; otherwise the narrative should
      drop it.

  - id: A05
    narrative_location: "Section 'The verdict', paragraph 1"
    content: >
      Shulgi's judgment speech: "To strut about in the E-kur is a glory
      for Bird, for its singing is sweet. At Enlil's holy table, Bird
      takes precedence."
    risk: moderate
    notes: >
      Specific verdict language not in claims. Depends on whether Shulgi
      is in fact the judge (see C05/C06/C17/C18) — if he is, the speech
      content is still an unsourced addition relative to the claims.

  - id: A06
    narrative_location: "Section 'The composition in context', last two paragraphs"
    content: >
      Comparative treatment of Aesopic fables and the Panchatantra as
      running prose ("Aesop's animals suffer consequences; they do not
      destroy each other's offspring and then petition a king for a
      verdict").
    risk: low
    notes: >
      The claims file contains COMPARATIVE-HOOK entries pointing at
      Aesop and Panchatantra, so the comparison is pre-authorised in
      principle. The specific language and framing ("petition a king")
      is new and aligns with the narrative's Shulgi framing rather than
      the claims' Enki framing.

