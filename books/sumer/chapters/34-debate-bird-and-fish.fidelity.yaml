# Narrative Fidelity Report — Chapter 34: The Debate between Bird and Fish
# Compares approved claims against the narrative prose.

chapter: 34
title: "The Debate between Bird and Fish"
claims_file: books/sumer/chapters/34-debate-bird-and-fish.claims.approved.adoc
narrative_file: books/sumer/chapters/34-debate-bird-and-fish.adoc
glossary_file: books/sumer/glossary.yaml
reviewed_on: 2026-04-17

summary:
  overall_assessment: "needs_attention"
  headline: >
    The narrative departs significantly from the approved claims on the
    identity of the judge. The claims state twice that Enki renders the
    verdict; the narrative instead places King Shulgi on the bench, with
    Enki reduced to a background doxology. Several insult details in the
    narrative also differ from the specifics given in the claims, and the
    narrative adds material (Bird retaliating, Ur III framing, the
    comparison with Hoe-Plough / Ewe-Grain / Winter-Summer) that has no
    warrant in the approved claims.
  total_claims_checked: 18
  supported: 13
  contradicted: 3
  partially_supported: 2
  unsupported_additions: 6

# ──────────────────────────────────────────────────────────────────────
# CLAIM-BY-CLAIM CHECK
# ──────────────────────────────────────────────────────────────────────

claim_checks:

  - id: C01
    claim_text: >
      The composition is catalogued as ETCSL 5.3.5 and survives on Old
      Babylonian tablets.
    narrative_location: "Paragraph 1 (opening)"
    narrative_rendering: >
      "The composition known as 'The Debate between Bird and Fish' is
      catalogued as ETCSL 5.3.5 and survives on Old Babylonian tablets."
    status: supported
    notes: "Verbatim match."

  - id: C02
    claim_text: >
      Exceptionally well-preserved; notable for its rich technical
      vocabulary for fauna.
    narrative_location: "Paragraph 1"
    narrative_rendering: >
      "It is exceptionally well-preserved and notable for its rich
      technical vocabulary for fauna."
    status: supported

  - id: C03
    claim_text: >
      The present retelling follows the ETCSL composite text, supplemented
      by Black et al. 2004, pp. 234–240.
    narrative_location: "Paragraph 1"
    narrative_rendering: >
      "The present retelling follows the ETCSL composite text,
      supplemented by Black et al. 2004, pp. 234–240."
    status: supported

  - id: C04
    claim_text: >
      Survives in multiple well-preserved Old Babylonian copies,
      indicating active use in the edubba scribal schools.
    narrative_location: "Paragraph 2"
    narrative_rendering: >
      "The composition survives in multiple well-preserved Old Babylonian
      copies, indicating active use in the edubba -- the scribal school
      where these texts were copied and taught."
    status: supported

  - id: C05
    claim_text: >
      Two divine personifications — Bird (mušen) and Fish (ku₆) — argue
      their relative merits before the god Enki, who renders the final
      verdict.
    narrative_location: "Paragraph 2"
    narrative_rendering: >
      "Bird (Sumerian mušen) and Fish (Sumerian ku₆) -- who argue their
      relative merits and bring their case before King Shulgi, who
      renders the final verdict."
    status: contradicted
    severity: major
    notes: >
      The claim explicitly identifies Enki as the judge. The narrative
      replaces Enki with King Shulgi and reduces Enki to a guiding
      presence behind the king's judgment via a closing doxology. This
      is a substantive change of the verdict-bearer, not a stylistic
      variation. If Shulgi is the correct judge according to the source,
      the claims document itself needs revision; if the claims are
      correct, the narrative must be revised. The narrative's framing
      paragraph treats Shulgi-as-judge as a settled fact ("the first and
      only time in the surviving debate corpus, a human king sits in
      judgment over two divine personifications") and builds further
      interpretation on it.

  - id: C06
    claim_text: >
      The choice of [judge] distinguishes this debate from others in the
      genre and reflects the aquatic domain of the dispute: Enki, god of
      wisdom and the abzu, is the appropriate deity to adjudicate a
      contest involving creatures of the water and the air.
    narrative_location: "Paragraph 3"
    narrative_rendering: >
      "The choice of King Shulgi as judge distinguishes this debate from
      others in the genre. In the preceding compositions -- Hoe and
      Plough, Ewe and Grain, Winter and Summer -- a deity rendered the
      final verdict. Here, for the first and only time in the surviving
      debate corpus, a human king sits in judgment over two divine
      personifications."
    status: contradicted
    severity: major
    notes: >
      The claim's rationale ("reflects the aquatic domain of the dispute;
      Enki is the appropriate deity") is replaced in the narrative by a
      completely different rationale ("reflects the Ur III political
      context... positions Shulgi's authority as divinely inspired"). The
      narrative's comparison with Hoe-Plough / Ewe-Grain / Winter-Summer
      is not present in the approved claims.

  - id: C07
    claim_text: >
      The composition opens with a description of the natural order
      established by the gods, in which Bird and Fish each have their
      proper domain — the sky and the waters respectively.
    narrative_location: "Section 'The natural order', paragraph 1"
    narrative_rendering: >
      Matches claim closely; adds elaborative imagery ("like instruments
      calibrated for distinct tasks") consistent with the claim.
    status: supported

  - id: C08
    claim_text: >
      Bird is described in its natural habitat: nesting in the reeds,
      singing at dawn, filling the marshes with its cries.
    narrative_location: "Section 'The natural order', paragraph 2"
    narrative_rendering: >
      "Bird occupies its natural habitat among the reeds..."
    status: partially_supported
    notes: >
      Narrative mentions the reed habitat but omits "singing at dawn" and
      "filling the marshes with its cries" — specific details promised by
      the claim. Minor gap, not a contradiction.

  - id: C09
    claim_text: >
      Fish is described in its domain: swimming in the deep waters,
      abundant in the rivers and canals, a source of purity and
      sustenance.
    narrative_location: "Section 'The natural order', paragraph 2"
    narrative_rendering: >
      "Fish inhabits the deep waters, abundant in the rivers and canals.
      Each is a source of sustenance in its own right..."
    status: partially_supported
    notes: >
      "Purity" as an attribute of Fish in the prologue is dropped from
      the narrative here (though it appears later in the dispute
      section). Acceptable consolidation.

  - id: C10
    claim_text: >
      Fish initiates the dispute by claiming superiority through flight,
      song, and beauty — it soars above the world, sings praises to the
      gods, and adorns the landscape.
    narrative_location: "Section 'The dispute', paragraphs 1–2"
    narrative_rendering: >
      Narrative has Fish initiate the dispute with an attack on Bird
      (accusations of noise, gluttony, being caught in traps). Bird then
      responds with boasts about beauty, song, and presence in the E-kur.
    status: contradicted
    severity: note_in_claims
    notes: >
      The claims document itself contains an internal inconsistency: it
      attributes "flight, song, and beauty" to Fish, which is clearly a
      mis-labelling (these are Bird's attributes). The narrative has
      silently corrected the claims by giving those attributes to Bird,
      and by reframing Fish's opening as an attack rather than
      self-praise. The correction is almost certainly the right reading
      of the source, but the narrative diverges from the literal text of
      the approved claims. The claims document should be fixed so that
      claim and narrative align. Flagged as "contradicted" against the
      literal claim text, with the understanding that the claim is the
      defective party.

  - id: C11
    claim_text: >
      Fish responds by claiming superiority through purity, abundance,
      and its association with Enki's sacred waters — fish are offerings
      fit for the gods and a staple of the temple economy.
    narrative_location: "Section 'The dispute', paragraph 3"
    narrative_rendering: >
      "Fish responds in kind -- claiming superiority through purity,
      abundance, and its association with sacred waters. Fish are
      offerings fit for the gods and a staple of the temple economy."
    status: supported
    notes: >
      Narrative drops the possessive "Enki's" before "sacred waters".
      Minor stylistic choice; no substantive difference.

  - id: C12
    claim_text: >
      The debate escalates from polite self-praise to increasingly
      personal and aggressive insults, with each contestant denigrating
      the other's appearance, habits, and social worth.
    narrative_location: "Section 'The dispute', paragraph 4"
    narrative_rendering: >
      "The debate escalates from self-praise to increasingly personal
      and aggressive insults, with each contestant denigrating the
      other's appearance, habits, and social worth."
    status: supported
    notes: >
      Claim says "polite self-praise"; narrative says "self-praise" and
      elsewhere calls the early rounds "almost civil". Substantively
      consistent. Note that claim C10 framing as "polite self-praise" is
      at tension with narrative C10 framing as Fish-attacks-first.

  - id: C13
    claim_text: >
      Bird mocks Fish as a cold, slimy, mute creature trapped in the
      water, unable to see the sky or experience the world above.
    narrative_location: "Section 'The dispute', paragraph 5"
    narrative_rendering: >
      "Bird mocks Fish for its smell -- awful enough to make people
      throw up, to make them bare their teeth in disgust. Its mouth is
      flabby. Its appearance is repulsive."
    status: partially_supported
    severity: minor
    notes: >
      Same general function (Bird mocks Fish's physical qualities) but
      the specific insults differ completely. Claim specifies "cold,
      slimy, mute... trapped in the water... unable to see the sky";
      narrative specifies "smell... flabby mouth... repulsive appearance".
      Neither set of details is in the other. The narrative's details
      appear to derive from the source (Black 2004 translation of the
      passage), but they do not match the approved claim text. Either
      the claim should be revised to match the source, or the narrative
      should add the details the claim specifies.

  - id: C14
    claim_text: >
      Fish mocks Bird as a screeching, filthy creature that scratches in
      the dirt, devours worms, and fouls its own nest.
    narrative_location: "Section 'The dispute', paragraph 6"
    narrative_rendering: >
      "Fish retorts that Bird is gluttonous, malformed, filling the
      courtyard with droppings. The little sweeper-boy sets nets in the
      house and chases Bird with ropes."
    status: partially_supported
    severity: minor
    notes: >
      Same function, but specifics differ. Claim says "screeching,
      filthy... scratches in the dirt, devours worms, fouls its own
      nest". Narrative says "gluttonous, malformed, fouls the
      courtyard... chased by the sweeper-boy with nets and ropes". No
      overlap in specific details except the general notion of filth.
      As with C13, the narrative's specifics seem defensible from the
      source but do not match the approved claim.

  - id: C15
    claim_text: >
      The debate transcends verbal argument and escalates into physical
      violence: Fish destroys Bird's eggs.
    narrative_location: "Section 'Escalation: physical aggression', paragraph 1"
    narrative_rendering: >
      "Fish destroys Bird's nest, turning the well-built construction of
      brushwood into a haunted ruin. Fish smashes the eggs Bird has laid
      and throws them into the sea."
    status: supported
    notes: >
      Narrative expands beyond the claim (destruction of nest + throwing
      eggs into the sea), but this is consistent amplification rather
      than contradiction.

  - id: C16
    claim_text: >
      The escalation from rhetoric to physical destruction is exceptional
      within the debate genre; most other Sumerian debates remain verbal,
      making the Bird-Fish contest distinctive for its dramatic violence.
    narrative_location: "Section 'Escalation: physical aggression', paragraph 3"
    narrative_rendering: >
      "This escalation from rhetoric to physical destruction is
      exceptional within the debate genre. Most other Sumerian debates
      remain verbal, making the Bird-Fish contest distinctive for its
      dramatic violence."
    status: supported
    notes: >
      Near-verbatim match. Narrative adds elaborative examples naming
      specific other debates (Hoe-Plough, Ewe-Grain, Winter-Summer) —
      these are not in the claim but are consistent general-knowledge
      supplements.

  - id: C17
    claim_text: >
      Enki renders the final verdict in favour of Bird, declaring Bird
      the winner of the contest.
    narrative_location: "Section 'The verdict', paragraph 1"
    narrative_rendering: >
      "King Shulgi, son of Enlil, renders the final verdict in favour of
      Bird, declaring Bird the winner of the contest."
    status: contradicted
    severity: major
    notes: >
      Same substitution as in C05/C06: Enki replaced by Shulgi. The
      narrative then supplies Shulgi's judgment speech ("To strut about
      in the E-kur..."), reinforcing the substitution with verbal
      content not present in the approved claims.

  - id: C18
    claim_text: >
      After the verdict, Fish accepts Bird's superiority, and the two
      creatures are reconciled under Enki's authority.
    narrative_location: "Section 'The verdict', paragraph 2"
    narrative_rendering: >
      "After the verdict, Fish accepts Bird's superiority, and the two
      creatures are reconciled under Shulgi's authority."
    status: contradicted
    severity: major
    notes: >
      "Enki's authority" is replaced by "Shulgi's authority". The
      narrative then layers a doxology to Enki as wisdom-behind-the-king,
      which is an additional framing not in the claims.

  - id: C19
    claim_text: >
      The composition served a didactic function in the edubba, teaching
      scribal students the rich vocabulary of natural history.
    narrative_location: "Section 'The composition in context', paragraph 1"
    narrative_rendering: >
      "The composition served a didactic function in the edubba,
      teaching scribal students the rich vocabulary of natural history..."
    status: supported

  - id: C20
    claim_text: >
      Text praised by modern scholars for vivid imagery, escalating
      rhetoric, and dramatic intensity; one of the most literarily
      accomplished debate poems in the Sumerian corpus.
    narrative_location: "Section 'The composition in context', paragraph 2"
    narrative_rendering: >
      Matches claim; narrative adds comparative commentary on Hoe-Plough,
      Ewe-Grain, Winter-Summer as "clever / systematic / rigorous" vs
      Bird-Fish as "dramatic".
    status: supported
    notes: "Claim supported; elaboration is editorial but reasonable."

  - id: C21
    claim_text: >
      Multiple well-preserved copies confirm the composition's active
      use in Old Babylonian scribal schools.
    narrative_location: "Section 'The composition in context', paragraph 3"
    status: supported

  - id: C22
    claim_text: >
      Minor translational differences between ETCSL and Black et al. 2004
      in animal epithets do not affect the narrative substance.
    narrative_location: "Section 'The composition in context', paragraph 3"
    status: supported

