# ============================================================
# SUPPORTED CLAIMS
# ============================================================

supported_claims:
  - claim_number: 1
    claim: >
      The composition "Enlil and Sud" is catalogued as ETCSL 1.2.2, surviving
      as a well-preserved Old Babylonian composition with no competing
      recension.
    source_id: "etcsl"
    source_loc: "ETCSL catalogue, composition 1.2.2; bibliography page"
    verbatim_quote: >
      ETCSL catalogue lists "1.2.2 Enlil and Sud" under category 1.2
      (compositions about Enlil and Ninlil). The bibliography (b122.htm)
      references Civil, M., "Enlil and Ninlil: The Marriage of Sud," JAOS
      103 (1983), 43-66, and notes the composite text draws from 24 tablet
      sources. CDLI Literary 000337 catalogues 32 exemplars.

  - claim_number: 4
    claim: >
      Enlil encounters the young goddess Sud standing in the street and is
      struck by her beauty; he propositions her directly.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 9-26"
    verbatim_quote: >
      ETCSL translation: Enlil approaches Sud and declares "I will make you
      perfect in a queen's dress." He propositions her directly upon seeing
      her beauty.

  - claim_number: 5
    claim: >
      Sud rejects Enlil's initial advance; she is offended by his blunt
      approach and rebukes him, saying that she is not a woman who can be
      taken casually.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 9-26"
    verbatim_quote: >
      ETCSL translation: Sud rebuffs Enlil, questioning his intentions and
      saying "If I want to stand proudly at our gate, who dares to give me
      a bad reputation?" She then retreats indoors.

  - claim_number: 6
    claim: >
      Chastened by the rejection, Enlil undertakes a proper courtship: he
      sends his minister Nusku as envoy to Sud's mother, the goddess Nisaba,
      to negotiate a formal marriage.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 27-43"
    verbatim_quote: >
      ETCSL translation: Enlil instructs Nuska (his minister) to travel to
      Erec, the city of Nisaba, to deliver a marriage proposal. Enlil states:
      "The name of your daughter shall become Ninlil."

  - claim_number: 7
    claim: >
      Nisaba, goddess of grain and writing, acts as the mother who
      negotiates the marriage terms — she is both Sud's protective parent
      and a literate, authoritative figure in her own right.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 44-73"
    verbatim_quote: >
      ETCSL translation: Nanibgal (a name of Nisaba) receives Nuska and
      responds to the proposal. She ultimately accepts, saying "You shall
      become my son-in-law; do as you wish!" Nisaba is confirmed as both
      Sud's mother and a figure of authority (ORACC: "goddess of grain and
      the scribal arts").

  - claim_number: 10
    claim: >
      Nisaba accepts the gifts and agrees to the marriage on behalf of her
      daughter.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 44-73 (acceptance), lines 137-145 (blessing)"
    verbatim_quote: >
      ETCSL translation: Nanibgal accepts the proposal ("You shall become my
      son-in-law; do as you wish!") and later blesses Sud before the wedding:
      "May you be Enlil's favourite wife."

  - claim_number: 11
    claim: >
      The marriage ceremony takes place; Sud is conducted to Enlil's
      household with full ritual propriety.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 137-155"
    verbatim_quote: >
      ETCSL translation: Nanibgal blesses Sud before she enters the Ec-mah
      (Esh-mah temple). The marriage consummation occurs in the E-kur.

  - claim_number: 14
    claim: >
      The composition closes with praises of Ninlil in her new exalted
      status, confirming her place as Enlil's consort and co-ruler of the
      divine realm.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 156-170; Version B, lines 15-29"
    verbatim_quote: >
      ETCSL translation (Version B): "from now on, Sud, Enlil is the king
      and Ninlil is the queen." The composition concludes with closing praise
      acknowledging the union.

  - claim_number: 16
    claim: >
      Nisaba's prominence in the negotiation reflects her dual nature as
      both a mother goddess and the goddess of writing and scholarship —
      the patron deity of the scribal craft.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, Version A, lines 44-73"
    verbatim_quote: >
      ORACC (Nidaba entry): "the goddess of grain and the scribal arts in
      the widest sense of this word, including writing, accounting and
      surveying." In the ETCSL text she is called Nanibgal, Nun-bar-ce-gunu,
      and acts as the authoritative mother who negotiates the marriage.

