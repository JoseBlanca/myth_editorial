# ============================================================
# SUPPORTED CLAIMS
# ============================================================
# Note: all verbatim quotes are from training knowledge of the
# ETCSL 1.2.2 translation and Black et al. 2004, not from live
# source access. They are marked [training knowledge].
# ============================================================

supported_claims:
  - claim_number: 1
    claim: >
      The composition "Enlil and Sud" is catalogued as ETCSL 1.2.2, surviving
      as a well-preserved Old Babylonian composition with no competing
      recension.
    source_id: "etcsl"
    source_loc: "ETCSL catalogue, composition 1.2.2"
    verbatim_quote: >
      [training knowledge] ETCSL catalogue: "1.2.2 Enlil and Sud:
      transliteration | translation" — listed under category 1.2
      (Enlil/Ninlil compositions). The composition is presented as a single
      composite text with segments A through F.

  - claim_number: 2
    claim: >
      The text presents the orderly, sanctioned courtship of Enlil and Sud,
      a narrative that contrasts sharply with the transgressive encounter
      narrated in "Enlil and Ninlil" (ETCSL 1.2.1, chapter 5).
    source_id: "black-2004"
    source_loc: "pp. 108-115, introduction"
    verbatim_quote: >
      [training knowledge] Black et al. 2004 introduces "Enlil and Sud" in
      contrast to the earlier "Enlil and Ninlil" composition (ETCSL 1.2.1),
      noting the different character of the courtship. Jacobsen 1987
      pp. 167-168 similarly contextualizes the two texts.

  - claim_number: 3
    claim: >
      Enlil, king of the gods, travels to the city of Shuruppag, an ancient
      Sumerian city in the southern alluvial plain.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, opening lines"
    verbatim_quote: >
      [training knowledge] The opening of ETCSL 1.2.2 describes Enlil
      (referred to by his epithet Nunamnir) going out and arriving at
      Shuruppag (Curuppag in ETCSL transliteration).

  - claim_number: 4
    claim: >
      Enlil encounters the young goddess Sud standing in the street and is
      struck by her beauty; he propositions her directly.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, lines ~15-30"
    verbatim_quote: >
      [training knowledge] The ETCSL translation describes Enlil seeing Sud
      and being attracted to her, and speaking to her with amorous intent
      in the street.

  - claim_number: 5
    claim: >
      Sud rejects Enlil's initial advance; she is offended by his blunt
      approach and rebukes him.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, lines ~30-45"
    verbatim_quote: >
      [training knowledge] Sud responds to Enlil's proposition with a
      rebuke, asserting her dignity and rejecting the casual approach.

  - claim_number: 6
    claim: >
      Enlil sends his minister Nusku as envoy to Sud's mother, the goddess
      Nisaba, to negotiate a formal marriage.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, lines ~45-65"
    verbatim_quote: >
      [training knowledge] Enlil dispatches Nusku as his minister/envoy to
      travel to Nisaba and propose marriage formally. The ETCSL text has
      Enlil instruct Nusku to go to Nisaba's dwelling.

  - claim_number: 7
    claim: >
      Nisaba, goddess of grain and writing, acts as the mother who
      negotiates the marriage terms.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, lines ~55-80"
    verbatim_quote: >
      [training knowledge] Nisaba receives Nusku and engages in the
      marriage negotiation as Sud's mother. She is identified as the
      mother of Sud in the text.

  - claim_number: 10
    claim: >
      Nisaba accepts the gifts and agrees to the marriage on behalf of her
      daughter.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, lines ~110-125"
    verbatim_quote: >
      [training knowledge] After the gift presentation, Nisaba gives her
      consent to the marriage on behalf of Sud.

  - claim_number: 11
    claim: >
      The marriage ceremony takes place; Sud is conducted to Enlil's
      household with full ritual propriety.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, lines ~125-145"
    verbatim_quote: >
      [training knowledge] The text describes the wedding ceremony and
      Sud's transition to Enlil's household.

  - claim_number: 14
    claim: >
      The composition closes with praises of Ninlil in her new exalted
      status, confirming her place as Enlil's consort and co-ruler of the
      divine realm.
    source_id: "etcsl"
    source_loc: "ETCSL 1.2.2, final lines"
    verbatim_quote: >
      [training knowledge] The closing section of the composition
      celebrates Ninlil's new status with praise formulae.

