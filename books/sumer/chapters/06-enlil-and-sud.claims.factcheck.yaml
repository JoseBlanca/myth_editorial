findings:
  # --- Pass 1: Claim-level verification (start to end) ---

  - claim_number: 1
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: >
      The composition extends to approximately 170 lines.
    issue: >
      The ETCSL composite text has Version A Segment A running from lines
      1-170 with significant lacunae (7 missing lines after line 49, gaps
      at lines 124-136, 146-155, and "unknown no. of lines missing" after
      line 170), plus a short Segment B, and a separate Version B of ~31
      lines. Saying "approximately 170 lines" is roughly correct for
      Version A Segment A alone, but the total composition is larger when
      counting Version B and the continuation after line 170. The claim is
      not wrong but is imprecise.
    evidence: >
      ETCSL 1.2.2 translation page: Version A has lines 1-170 with "unknown
      no. of lines missing" at the end, plus Segment B. Version B adds
      lines 1-31. The total attested line count exceeds 170.
    recommended_fix: >
      Revise to: "Version A of the composite text extends to at least 170
      numbered lines (with additional lines lost at the end), plus a variant
      Version B of approximately 31 lines."

  - claim_number: 2
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: >
      The text presents the orderly, sanctioned courtship of Enlil and
      Sud — a narrative that contrasts sharply with the transgressive
      encounter narrated in "Enlil and Ninlil" (ETCSL 1.2.1, chapter 5).
    issue: >
      The citation "Black et al. 2004, pp. 108-115" is incorrect. Multiple
      scholarly cross-references confirm the "Enlil and Sud" section in
      Black et al. 2004 runs from pages 106-112, not 108-115. The citation
      "Jacobsen 1987, pp. 167-168" refers to his section on "Enlil and
      Ninlil" (a different composition), not "Enlil and Sud" — Jacobsen does
      not include a separate "Enlil and Sud" translation. The claim itself
      (contrast between the two compositions) is well-attested in
      scholarship, but both citations are wrong.
    evidence: >
      WebSearch triangulation: multiple scholarly citations reference
      Black et al. 2004: 106-112 for "Enlil and Sud." Jacobsen 1987 table
      of contents places "Enlil and Ninlil" starting at p. 167; there is no
      "Enlil and Sud" section in the book.
    recommended_fix: >
      Change Black et al. 2004 citation to "pp. 106-112." For Jacobsen
      1987, either remove the citation (since he does not treat "Enlil and
      Sud" directly) or clarify it as "pp. 167-180 (Enlil and Ninlil, for
      context on Enlil's marriages)."

  - claim_number: 3
    kind: "FABRICATION"
    severity: "HIGH"
    claim: >
      Enlil, king of the gods, travels to the city of Shuruppag, an ancient
      Sumerian city in the southern alluvial plain.
    issue: >
      The ETCSL 1.2.2 text does NOT place the story in Shuruppag. Enlil
      travels to EREC (Eresh), the city of Nisaba. The composite Sumerian
      text references "erec2-ki" (Erec) repeatedly (lines 29, 45, 113, 117,
      123, 127, 130) and never mentions Shuruppag. Enlil explicitly instructs
      Nuska: "I want you to go back to Erec, the city of Nisaba, the city
      whose foundations are august." The confusion likely arises because Sud
      was ALSO known in a separate scholarly tradition as the patron goddess
      of Shuruppag, but this is a theological identification external to the
      ETCSL 1.2.2 narrative text.
    evidence: >
      ETCSL 1.2.2 translation (fetched via WebFetch): "I want you to go
      back to Erec, the city of Nisaba." Composite text (c122.htm): "erec2-
      ki-ce3" appears at lines 29, 45, 113, 117, 123, 127, 130. No
      Shuruppag (cu-kur-ru) appears anywhere in the composite text.
    recommended_fix: >
      Replace "Shuruppag" with "Erec" (ETCSL form) or "Eresh" throughout.
      The title "The Courtship in Shuruppag" should be revised to "The
      Courtship in Eresh." If the Sud-Shuruppag association is to be
      mentioned, it must be presented as a scholarly identification separate
      from the narrative setting, not as the story's location.

  - claim_number: 8
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: >
      Enlil sends a lavish array of bridal gifts to Nisaba and to Sud's
      household, including jewellery, precious metals, fine garments, and
      food provisions.
    issue: >
      The gift catalogue in ETCSL 1.2.2 (lines 103-136) does include
      precious metals and food provisions, but the specific categories
      listed in the claim do not match the ETCSL text precisely. The actual
      gift list includes: wild animals (bulls, deer, elephants, gazelles,
      bears, foxes, tigers, etc.), dairy products (cheeses, milk, butter,
      eggs), fruits (dates, figs, pomegranates, plums, almonds, Dilmun
      dates), and precious materials (ores from Harali, rock-crystal, gold,
      silver). "Jewellery" and "fine garments" are not prominent categories
      in the actual gift list (though Nusku does bring some jewellery
      earlier). The line range cited (80-110) is also slightly off; the main
      gift catalogue runs from approximately lines 103-136.
    evidence: >
      ETCSL 1.2.2 translation (fetched): "wild bulls, red deer, elephants,
      fallow deer, gazelles, bears, wild sheep and rams, lynxes, foxes, wild
      cats, tigers" (lines 103-113); "Large cheeses, mustard-flavoured
      cheeses, small cheeses, milk, cold hard-boiled eggs, butter" (lines
      114-117); "dates, figs, large pomegranates, jipar fruits, plums,
      halub nuts, almonds, acorns, Dilmun dates" (lines 118-123); "Ores
      from Harali, rock-crystal, gold, silver" (lines 124-136).
    recommended_fix: >
      Revise the gift categories to match the ETCSL text: wild animals,
      dairy products, fruits, and precious minerals/metals. Update line
      range to "lines 103-136." Remove "jewellery" and "fine garments"
      from the main gift-list claim (jewellery appears earlier in Nusku's
      initial embassy, not in the main bridal gift catalogue).

  - claim_number: 9
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: >
      The gift catalogue follows the pattern of Sumerian bride-price
      conventions attested in legal and administrative texts from the same
      period.
    issue: >
      Cited as "Black et al. 2004, pp. 108-115 (introduction)." The page
      range is incorrect — should be pp. 106-112. More importantly, while
      Black et al. 2004 provides an introduction to the composition, the
      specific claim about correspondence with legal bride-price conventions
      cannot be verified as appearing on those pages without direct book
      access. The interpretive claim may be a scholarly inference rather
      than a direct statement from the cited source.
    evidence: >
      WebSearch confirms Black et al. 2004 page range for "Enlil and Sud"
      is pp. 106-112, not 108-115.
    recommended_fix: >
      Correct page range to "pp. 106-112." If the bride-price convention
      claim cannot be verified as explicitly stated in Black et al. 2004,
      add an [INFERENCE:] marker.

  - claim_number: 12
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: >
      Upon her marriage to Enlil, Sud is formally renamed Ninlil — "Lady of
      the Wind/Air" — taking the feminine counterpart of Enlil's name and
      becoming queen of the gods.
    issue: >
      The renaming to Ninlil is confirmed by ETCSL 1.2.2. However, the text
      ALSO grants Sud the name/role "Ezina" (the grain goddess): "be Ezina,
      the growing grain, the life of Sumer." The claim omits this important
      parallel naming. The etymology "Lady of the Wind/Air" is a common
      scholarly interpretation (NIN = lady, LIL = wind/air) but the ETCSL
      text does not etymologize the name in the renaming passage. The
      meaning of "lil" is debated (wind, air, breath, spirit, open
      atmosphere). Citing this as definitive is misleading.
    evidence: >
      ETCSL 1.2.2 Version B: "from now on, Sud, Enlil is the king and
      Ninlil is the queen." Also: "be Ezina, the growing grain, the life
      of Sumer." The Ezina naming is a significant element omitted from the
      claim. Etymology of Ninlil as "Lady of the Wind/Air" is standard
      (NIN = lady, LIL = wind/air) but not universally agreed upon.
    recommended_fix: >
      Add mention of the Ezina naming alongside the Ninlil naming. Qualify
      the etymology as "commonly interpreted as 'Lady of the Wind/Air'"
      rather than presenting it as definitive.

  - claim_number: 13
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: >
      The renaming is presented as a theological act, not merely a change of
      personal name: Sud acquires the divine status, prerogatives, and
      cosmic role of Ninlil through the act of sacred marriage.
    issue: >
      This claim contains significant interpretive content ("theological
      act," "sacred marriage") that goes beyond direct textual description
      but is not marked with [INFERENCE:]. The ETCSL text does describe
      bestowal of powers alongside the name change (e.g., determining
      fates, apportioning divine powers), but the framing as "theological
      act" and "sacred marriage" applies modern analytical categories.
    evidence: >
      ETCSL 1.2.2: Enlil declares "She shall determine fates. She shall
      apportion the divine powers among the Anuna." This confirms bestowal
      of prerogatives but the terms "theological act" and "sacred marriage"
      are scholarly constructs not found in the Sumerian text.
    recommended_fix: >
      Add an [INFERENCE:] marker, or rephrase to describe what the text
      actually narrates (bestowal of name, roles, and prerogatives) without
      the interpretive framing.

  - claim_number: 15
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: >
      The two Enlil marriage narratives present complementary models: "Enlil
      and Ninlil" narrates a transgressive union followed by divine
      punishment and exile, while "Enlil and Sud" presents the same divine
      pair united through proper courtship, negotiation, and ritual.
    issue: >
      The contrast between the two compositions is well-established in
      scholarship and verified through ETCSL access to both texts. However,
      the specific "complementary models" framing and the citation to
      "Jacobsen 1987, pp. 167-168" is problematic: Jacobsen treats "Enlil
      and Ninlil" at those pages, not "Enlil and Sud." The Black et al. 2004
      page citation (pp. 108-109) is also incorrect (should be pp. 106-107).
    evidence: >
      ETCSL 1.2.1 (Enlil and Ninlil): confirmed to narrate transgression
      and exile. ETCSL 1.2.2 (Enlil and Sud): confirmed to narrate formal
      courtship. The contrast is real. But Jacobsen 1987 does not contain
      an "Enlil and Sud" section; pp. 167ff. are "Enlil and Ninlil."
    recommended_fix: >
      Correct Black et al. citation to pp. 106-107. For Jacobsen, either
      remove or clarify: "Jacobsen 1987, pp. 167-180 (Enlil and Ninlil
      section; no separate treatment of Enlil and Sud)."

  - claim_number: 17
    kind: "CITATION-WRONG"
    severity: "LOW"
    claim: >
      The composition models the ideal divine marriage protocol that earthly
      ceremonies reflect, including bride-price, envoy negotiations, maternal
      consent, and a naming ceremony.
    issue: >
      Citation "Black et al. 2004, pp. 108-115" should be pp. 106-112.
      The claim itself is a reasonable interpretive summary of the
      composition's content, which does include all these elements.
    evidence: >
      WebSearch triangulation confirms Black et al. 2004 page range is
      pp. 106-112.
    recommended_fix: >
      Correct page citation to "pp. 106-112."

  - claim_number: 18
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: >
      The courtship protocol mirrors attested Sumerian marriage customs,
      making this text a primary source for reconstructing OB marriage
      ritual and gender norms in divine narrative.
    issue: >
      The citation "ETCSL 1.2.2, commentary" is problematic. ETCSL provides
      transliterations and translations with bibliography references but
      does not include the kind of extended cultural analysis claimed here.
      The page citation to Black et al. 2004 (pp. 108-115) is also
      incorrect (should be pp. 106-112).
    evidence: >
      ETCSL format confirmed via WebFetch: the site provides composite
      text, translation, and bibliography — not interpretive commentary of
      the kind described.
    recommended_fix: >
      Remove "ETCSL 1.2.2, commentary" citation. Attribute this cultural
      analysis solely to "Black et al. 2004, pp. 106-112" or to Civil
      1983 (JAOS 103, pp. 43-66).

