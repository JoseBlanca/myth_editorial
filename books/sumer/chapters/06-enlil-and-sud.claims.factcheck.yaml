    recommended_fix: >
      Verify the specific gift categories against ETCSL 1.2.2 and adjust
      the list to match the items actually mentioned in the translation.

  - claim_number: 9
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: >
      The gift catalogue follows the pattern of Sumerian bride-price
      conventions attested in legal and administrative texts from the same
      period.
    issue: >
      This scholarly interpretive claim is attributed to Black et al. 2004,
      pp. 108-115 (introduction). Without access to the book, the specific
      attribution cannot be confirmed. The general scholarly observation
      about bride-price parallels is plausible but the page reference needs
      verification.
    evidence: >
      Unable to verify against Black et al. 2004 directly. The claim is a
      reasonable scholarly interpretation but the specific page attribution
      is unconfirmed.
    recommended_fix: >
      Verify that Black et al. 2004 pp. 108-115 introduction specifically
      discusses the correspondence between the gift-list and legal
      bride-price conventions.

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: >
      Sud is formally renamed Ninlil — "Lady of the Wind/Air" — taking the
      feminine counterpart of Enlil's name.
    issue: >
      The etymology "Lady of the Wind/Air" is a common popular interpretation
      but is philologically debated. "Nin" means "lady/queen" and "lil" has
      been variously interpreted as "wind," "air," "breath," "spirit," or
      "open atmosphere" by different scholars. The ETCSL text bestows the
      name Ninlil but may not gloss it with this specific etymology. The
      claim presents one interpretation as definitive without noting the
      debate. This is not a factual error in the claim itself (the renaming
      is genuine) but the etymological gloss may be editorially misleading.
    evidence: >
      Training knowledge: the meaning of "lil" in Sumerian is debated.
      Jacobsen has proposed "open air/atmosphere"; others use "wind/air."
      The ETCSL text itself does not etymologize the name in the renaming
      passage.
    recommended_fix: >
      Qualify the etymological gloss as "often interpreted as 'Lady of the
      Wind/Air'" rather than stating it as a definitive meaning, or note the
      scholarly debate.

  - claim_number: 13
    kind: "MARKER-MISUSED"
    severity: "LOW"
    claim: >
      The renaming is presented as a theological act, not merely a change of
      personal name: Sud acquires the divine status, prerogatives, and cosmic
      role of Ninlil through the act of sacred marriage.
    issue: >
      This claim contains significant interpretive content ("theological act,"
      "sacred marriage") that goes beyond direct textual description, but is
      not marked with [INFERENCE:]. The ETCSL text does describe bestowal of
      powers alongside the name change, so the claim has partial textual
      basis. However, the framing as "theological act" and "sacred marriage"
      applies modern analytical categories not found in the Sumerian text.
    evidence: >
      The ETCSL text enumerates powers/prerogatives given to the renamed
      Ninlil. The terms "theological act" and "sacred marriage" are scholarly
      constructs, not textual language.
    recommended_fix: >
      Add an [INFERENCE:] marker, or attribute the "theological act" and
      "sacred marriage" characterizations to a specific scholarly source, or
      rephrase to describe what the text actually narrates (bestowal of name
      and powers) without the interpretive framing.

  - claim_number: 15
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: >
      The two Enlil marriage narratives present complementary models: "Enlil
      and Ninlil" narrates a transgressive union followed by divine
      punishment and exile, while "Enlil and Sud" presents the same divine
      pair united through proper courtship, negotiation, and ritual.
    issue: >
      The characterization of the two texts as "complementary models" is a
      scholarly interpretation attributed to Black et al. 2004 pp. 108-109
      and Jacobsen 1987 pp. 167-168. Without access to these sources, the
      specific framing cannot be verified. The general contrast between the
      two compositions is well-established in scholarship, but the word
      "complementary" implies intentional pairing which is debatable.
    evidence: >
      Training knowledge confirms scholars regularly contrast these two
      compositions, but the specific "complementary models" framing and
      page attributions cannot be live-verified.
    recommended_fix: >
      Verify the "complementary models" characterization against Black et al.
      2004 pp. 108-109 and Jacobsen 1987 pp. 167-168.

  - claim_number: 18
    kind: "UNVERIFIED"
    severity: "LOW"
    claim: >
      The courtship protocol mirrors attested Sumerian marriage customs,
      making this text a primary source for reconstructing OB marriage ritual
      and gender norms in divine narrative.
    issue: >
      This scholarly assessment cites "ETCSL 1.2.2, commentary; Black et al.
      2004, pp. 108-115." The citation to "ETCSL 1.2.2, commentary" is
      problematic: ETCSL provides transliterations and translations with
      bibliographic references but does not typically offer the kind of
      extended cultural analysis described here.
    evidence: >
      ETCSL's format does not include extensive interpretive commentary.
      The cultural analysis claim is better attributed solely to Black et al.
      2004 or another specific scholarly source.
    recommended_fix: >
      Remove or revise the citation to "ETCSL 1.2.2, commentary" — attribute
      this cultural analysis claim solely to Black et al. 2004 or to a named
      scholarly source.

