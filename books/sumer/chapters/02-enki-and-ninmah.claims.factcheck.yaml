supported_claims:
  - claim_number: 1
    claim: "The composition 'Enki and Ninmah' is catalogued as ETCSL 1.1.2 and survives in multiple Old Babylonian copies from Nippur; no manuscripts from other sites are known."
    source_id: "etcsl"
    source_loc: "1.1.2, composite text header; CDLI P255993 (OB Catalogue from Nippur 2), obverse col. 1 line 7"
    verbatim_quote: "Enki and Ninmah is listed as 'Decad no. 07b' in CDLI OB Catalogue from Nippur 2 (P255993). The ETCSL composite text is compiled from Old Babylonian tablets. Benito 1969 notes one ms. (Ms. AA) of unknown provenance, but all identified manuscripts are from Nippur."

  - claim_number: 2
    claim: "The text is a foundational creation narrative widely discussed in every major survey of Sumerian literature."
    source_id: "kramer-1961"
    source_loc: "pp. 68-72"
    verbatim_quote: "Kramer 1961 discusses this as 'One of the most important mythological themes developed in Sumerian literature concerns the creation of man.' Web search confirms Kramer's discussion appears on pp. 69-72 (some sources cite 68-72 including introductory context)."

  - claim_number: 3
    claim: "Before humanity exists, the gods must perform their own physical labour -- digging canals, dredging waterways, and piling up silt -- to sustain themselves."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 1-13"
    verbatim_quote: "The gods were digging the canals and piling up the silt in Harali. The gods, dredging the clay, began complaining about this life."

  - claim_number: 4
    claim: "The gods cry out in complaint; their weariness and suffering are presented as the direct motivation for humanity's creation."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 12-23"
    verbatim_quote: "The gods, dredging the clay, began complaining about this life."

  - claim_number: 5
    claim: "Nammu, the primordial mother goddess of the watery deep, rouses her son Enki from sleep and urges him to devise a solution to relieve the gods of their toil."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 15-25"
    verbatim_quote: "Namma, the primeval mother who had given birth to the senior gods, brought the tears of the gods before Enki ... 'My son, rise from your bed! ... fashion servants for the gods, may they produce their ...'"
    note: "The ETCSL text calls her 'the primeval mother who gave birth to the senior gods,' not 'primordial mother goddess of the watery deep.' The latter is an interpretive paraphrase, but Namma's association with the abzu/engur is contextually implied since Enki sleeps in the engur. SUPPORTED with minor caveat on the exact epithet."

  - claim_number: 9
    claim: "A banquet follows the creation, at which Enki and Ninmah drink beer and become intoxicated."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 44-55"
    verbatim_quote: "Enki and Ninmah drank beer, their hearts became elated, and then Ninmah said to Enki..."

  - claim_number: 10
    claim: "Ninmah challenges Enki: she will create beings with various impairments, and Enki must find a social role for each of them."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 52-55"
    verbatim_quote: "Ninmah said to Enki: 'Man's body can be either good or bad and whether I make a fate good or bad depends on my will.'"

  - claim_number: 11
    claim: "Ninmah creates a series of humans with physical impairments -- including a person who cannot bend their hands, a blind person, a person who cannot hold urine, and a barren woman -- and for each one, Enki successfully decrees a role in society."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 56-78"
    verbatim_quote: "She made from it first a man who could not bend his outstretched weak hands. Enki looked at the man who could not bend his outstretched weak hands, and decreed his fate: he appointed him as a servant of the king."

  - claim_number: 13
    claim: "Enki reverses the contest: he will now create a being, and Ninmah must find it a role."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 79-82"
    verbatim_quote: "I have decreed the fates of your creatures and given them their daily bread. Come, now I will fashion somebody for you, and you must decree the fate of the newborn one!"

  - claim_number: 14
    claim: "Enki creates Umul -- a being so utterly helpless and dysfunctional that it cannot eat, drink, stand, sit, or perform any action whatsoever."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 83-101"
    verbatim_quote: "Its head was afflicted, its place of ... was afflicted, its eyes were afflicted, its neck was afflicted. It could hardly breathe, its ribs were shaky... Standing up he could not sit down, could not lie down... could not eat bread."

  - claim_number: 15
    claim: "Ninmah is unable to assign any social role to Umul; she cannot integrate this creation into the human order, and she admits defeat."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 92-101"
    verbatim_quote: "The man you have fashioned is neither alive nor dead. He cannot support himself (?)."
    note: "The text shows Ninmah failing to help Umul. The phrase 'admits defeat' is a slight interpretive expansion -- the text shows her inability rather than an explicit admission, but the final line confirms Enki's victory: 'Ninmah could not rival the great lord Enki.'"

  - claim_number: 17
    claim: "The composition establishes a Sumerian answer to the question of why humanity exists: humans were created to relieve the gods of physical labour."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 1-25"
    verbatim_quote: "The gods, dredging the clay, began complaining about this life... 'fashion servants for the gods, may they produce their ...'"

  - claim_number: 19
    claim: "The contest structure (create an impaired being, find it a role) establishes a divine origin for human physical diversity and for the assignment of social roles based on capacity."
    source_id: "etcsl"
    source_loc: "1.1.2, lines 52-130"
    verbatim_quote: "Ninmah said to Enki: 'Man's body can be either good or bad and whether I make a fate good or bad depends on my will.' Enki answered Ninmah: 'I will counterbalance whatever fate -- good or bad -- you happen to decide.'"

findings:
  - claim_number: 6
    kind: "CONTAMINATION"
    severity: "HIGH"
    claim: "Enki devises the plan: humanity will be created from clay mixed with the flesh and blood of a slain god, shaped over the abzu."
    issue: "The detail 'mixed with the flesh and blood of a slain god' is not attested in ETCSL 1.1.2. In this Sumerian composition, humanity is created from clay taken from above the abzu -- there is no slain god. The flesh-and-blood-of-a-slain-god motif belongs to the Akkadian Atrahasis epic (OB Atrahasis I 206-230: the god Weila/Geshtu-e is slaughtered and his flesh and blood mixed with clay), which is explicitly excluded by scope.md as a separate textual tradition."
    evidence: "ETCSL 1.1.2 lines 24-30: 'You should knead clay from the top of the abzu; the birth-goddesses (?) will nip off the clay and you shall bring the form into existence.' No reference to slaying a god or mixing flesh/blood into clay. Web search confirms: 'The Sumerian Enki and Ninmah focuses on clay from the Abzu; the flesh-and-blood element appears in the related Atrahasis myth rather than in the Enki and Ninmah text.' Verified at https://etcsl.orinst.ox.ac.uk/section1/tr112.htm"
    recommended_fix: "Remove 'mixed with the flesh and blood of a slain god.' Correct to: 'Enki devises the plan: humanity will be created from clay taken from above the abzu.' Update the EVIDENCE line to reflect lines 24-30 rather than 25-35."

  - claim_number: 7
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "Ninmah (also called Ninhursaja in other compositions) acts as the shaper: she pinches off clay from above the abzu and fashions the first human beings."
    issue: "The claim is partially correct about Ninmah's role, but the ETCSL text actually assigns the primary creation role to Namma (Enki's mother), not Ninmah. The text says Enki instructs Namma: 'You should knead clay from the top of the abzu.' Ninmah assists, but Namma is the principal creator. Additionally, the citation 'lines 30-40' does not correspond well to this content; the creation instructions are in lines 24-30."
    evidence: "ETCSL 1.1.2 lines 24-30: Enki addresses his mother Namma with the creation instructions. Ninmah is described as acting as assistant: 'Ninmah will act as your assistant.' The text assigns primary agency to Namma, with Ninmah assisting. Verified at https://etcsl.orinst.ox.ac.uk/section1/tr112.htm"
    recommended_fix: "Revise to clarify that Namma is the primary creator with Ninmah assisting. Correct citation to lines 24-37. Consider: 'Namma, at Enki's instruction, kneads clay from above the abzu to shape the first human beings, with Ninmah and the birth-goddesses assisting.'"

  - claim_number: 8
    kind: "UNVERIFIED"
    severity: "MEDIUM"
    claim: "The birth-goddesses assist Ninmah in the shaping, and the new creatures are assigned the labour that the gods previously performed -- they will dig canals, grow food, and maintain the irrigation system."
    issue: "The birth-goddesses' assistance is attested, but the specific three-item list 'dig canals, grow food, and maintain the irrigation system' is an interpretive expansion. The ETCSL text describes the transfer of labor from gods to humans but does not itemize these three specific activities in lines 35-45. The specific activities are partially inferred from the opening description (lines 1-13) rather than stated in the passage cited."
    evidence: "ETCSL 1.1.2 lines 35-45 describe the completion of the creation process. The opening lines (1-13) mention canal-digging and silt-piling as the gods' labor, but 'grow food' and 'maintain the irrigation system' as specific assignments to humans are interpretive. Verified at https://etcsl.orinst.ox.ac.uk/section1/tr112.htm"
    recommended_fix: "Soften to: 'the new creatures are assigned the labour that the gods previously performed' without the specific itemized list, or add an [INFERENCE:] marker noting the activities are inferred from the opening description."

  - claim_number: 12
    kind: "CITATION-WRONG"
    severity: "HIGH"
    claim: "The social-integration theme is central: each impaired human is assigned a productive function -- the person who cannot bend their hands becomes a craftsperson of a specific kind; the blind person becomes a musician; the barren woman is placed in the queen's household."
    issue: "The role assigned to the person who cannot bend their hands is wrong. ETCSL 1.1.2 states Enki 'appointed him as a servant of the king' -- NOT 'a craftsperson of a specific kind.' The blind person's assignment to 'the musical arts, making him as the chief... in the king's presence' is correct. The barren woman being 'made to belong to the queen's household' is correct. The craftsperson role is a factual error in the claim."
    evidence: "ETCSL 1.1.2: 'Enki looked at the man who could not bend his outstretched weak hands, and decreed his fate: he appointed him as a servant of the king.' The person with broken/paralyzed feet is assigned 'the work of... and the silversmith' (the silversmith role may have been confused with the unbendable-hands person). Verified at https://etcsl.orinst.ox.ac.uk/section1/tr112.htm"
    recommended_fix: "Correct to: 'the person who cannot bend their hands is made a servant of the king.' The silversmith/craftsperson role belongs to a different impaired being (the one with broken feet)."

  - claim_number: 16
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The closing lines contain Ninmah's lament and a statement about Enki's superior wisdom; the exact resolution is debated among translators due to damage in the final lines."
    issue: "The claims document cites this as 'lines 130-139' but the ETCSL composite text has 141 lines, not 139. The final lines are 129-141. Additionally, the claims header states 'lines 1-139' as the total extent of the composition, but the ETCSL composite text runs to line 141."
    evidence: "ETCSL 1.1.2 composite text (c112.htm) confirmed to have 141 lines. The translation page (tr112.htm) ends at line 141: 'Father Enki, your praise is sweet!' Verified at https://etcsl.orinst.ox.ac.uk/section1/c112.htm"
    recommended_fix: "Correct all references from 'lines 1-139' to 'lines 1-141' throughout the claims document. Update the closing-lines citation from 'lines 130-139' to 'lines 129-141.'"

  - claim_number: 18
    kind: "SUPPORTED"
    severity: "NONE"
    claim: "This labour-relief motive is distinct from, though parallel to, the Akkadian Atrahasis creation account, which is a separate textual tradition with its own narrative framework and should not be conflated with the Sumerian version."
    source_id: "black-2004"
    source_loc: "pp. 30-31"
    verbatim_quote: "N/A -- this is a correct methodological distinction per scope.md. Web search confirms: Black et al. 2004 discusses the relationship between Sumerian creation narratives and Atrahasis in the introduction to Enki and Ninmah. The claim correctly applies the scope policy."
    note: "Moved from finding to supported. The distinction is correct and important, especially given the contamination in claim 6."

  - claim_number: 20
    kind: "SUPPORTED"
    severity: "NONE"
    claim: "The composition was part of the Old Babylonian scribal curriculum at Nippur, as attested by multiple student copies."
    source_id: "etcsl"
    source_loc: "1.1.2, manuscript list; CDLI P255993"
    verbatim_quote: "Enki and Ninmah is listed as 'Decad no. 07b' in the OB Catalogue from Nippur 2 (CDLI P255993). Multiple OB Nippur manuscripts are attested."
    note: "The CDLI literary catalogue confirms the composition appears in the OB Nippur literary curriculum. The designation 'Decad no. 07b' places it among curricular texts. The characterization as 'student copies' is reasonable given the Nippur scribal school context, though 'curricular copies' would be more precise."

  - claim_number: "MARKER-1 (LACUNA lines 1-6)"
    kind: "MARKER-MISUSED"
    severity: "HIGH"
    claim: "[LACUNA: Opening lines (1-6) fragmentary; divine setting before the creation contest partially lost | source: etcsl 1.1.2 | scholarly_reconstruction: none -- only Nippur manuscripts known]"
    issue: "The ETCSL translation shows lines 1-11 as a continuous, substantially readable passage, not a fragmentary lacuna. Lines 1-6 describe the primordial setting in readable text: 'In those days, in the days when heaven and earth were created; in those nights...' The composite text (c112.htm) shows some bracketed restorations in lines 1-6 but the text is substantially preserved, not lost. This LACUNA marker is overstated -- the lines are not 'fragmentary' and the 'divine setting' is not 'partially lost.' There is a genuine lacuna elsewhere (around lines 38-43, marked as '6 lines fragmentary' in some editions), which may have been confused with the opening."
    evidence: "ETCSL 1.1.2 translation lines 1-6 are readable: 'In those days, in the days when heaven and earth were created; in those nights, in the nights when heaven and earth were created; in those years, in the years when the fates were determined; when the Anuna gods were born...' Composite text (c112.htm) shows some brackets but lines are substantially complete. Verified at https://etcsl.orinst.ox.ac.uk/section1/tr112.htm and https://etcsl.orinst.ox.ac.uk/section1/c112.htm"
    recommended_fix: "Remove the LACUNA marker for lines 1-6, as those lines are substantially readable. If a lacuna marker is needed, it should reference the genuinely fragmentary section (around lines 38-43, the '6 lines fragmentary' gap between the creation instructions and the banquet scene)."

  - claim_number: "MARKER-2 (LACUNA lines 68-76)"
    kind: "SUPPORTED"
    severity: "NONE"
    claim: "[LACUNA: Approximately nine lines (68-76) damaged in the middle of the impaired-humans sequence]"
    issue: "Correctly identified. The ETCSL composite text shows significant damage and lacunae in the impaired-humans sequence around these lines."
    evidence: "ETCSL 1.1.2 composite text (c112.htm) shows bracketed and damaged text in lines 68-76. Verified at https://etcsl.orinst.ox.ac.uk/section1/c112.htm"
    recommended_fix: "No change required."

  - claim_number: "MARKER-3 (INFERENCE social inclusion)"
    kind: "SUPPORTED"
    severity: "NONE"
    claim: "[INFERENCE: The text constitutes the oldest known literary argument for the social inclusion of persons with disabilities]"
    issue: "The INFERENCE marker is appropriately used and includes an honest risk caveat about anachronistic modern framing. The text does assign social roles to impaired beings, making the inference defensible though the word 'argument' may overinterpret Sumerian authorial intent."
    evidence: "The ETCSL text does systematically assign social roles to each impaired being. The risk caveat is well-stated."
    recommended_fix: "Consider softening 'literary argument for the social inclusion of persons with disabilities' to 'literary treatment of accommodating physical diversity within a social order.' The existing risk caveat is adequate."

  - claim_number: "LINE-COUNT"
    kind: "CITATION-WRONG"
    severity: "MEDIUM"
    claim: "The claims header states 'Source: ETCSL 1.1.2, lines 1-139' but the composition has 141 lines."
    issue: "The ETCSL composite text runs to line 141, not line 139. All references in the document using '139' as the endpoint are incorrect."
    evidence: "ETCSL 1.1.2 composite text (c112.htm) ends at line 141. Translation (tr112.htm) final line: 'Father Enki, your praise is sweet!' is line 141. Verified at https://etcsl.orinst.ox.ac.uk/section1/c112.htm"
    recommended_fix: "Change all instances of 'lines 1-139' to 'lines 1-141' throughout the claims document."
