      - Ningishzida: first mention glossed as 'god of the underworld, a judge among the dead' at line 44 — matches glossary exactly. PASS.
      - Inanna: mentioned at line 44 in Ereshkigal's gloss as 'elder sister of Inanna' and at line 47 in the Inanna's Descent comparison — no standalone first-mention gloss provided, but Inanna appears here as a reference within another deity's gloss and in cross-composition commentary. Acceptable in context. PASS.
      - Huwawa: mentioned at line 29 as 'slain Huwawa in the Cedar Forest' — no first-mention gloss provided, but this is a passing reference to events from another chapter. Acceptable in context. PASS.

