chapter: 23
title: "The Death of Gilgamesh"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.8.1.3, fragmentary tablets from Nippur and Tell Haddad (ancient Me-Turan)"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'catalogued as ETCSL 1.8.1.3 and survives on fragmentary tablets from Nippur (Sumerian: Nibru) and Tell Haddad (ancient Me-Turan).' Adds the glossary-mandated Sumerian form '(Sumerian: Nibru)' for Nippur. Faithful."

  - claim_id: C02
    claim_summary: "Fragmentary; Nippur and Tell Haddad versions differ significantly in ritual content"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'It is fragmentary; the Nippur and Tell Haddad versions differ significantly in ritual content.' Faithful verbatim."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite text, supplemented by ETCSL composite text"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative: 'The present retelling follows the ETCSL composite text, supplemented by ETCSL composite text.' Faithful verbatim. Note: this wording appears to contain a tautological error ('supplemented by ETCSL composite text') inherited from the claims file — the narrative reproduces it faithfully."

  - claim_id: C04
    claim_summary: "Two co-equal witnesses: Nippur OB tablets and Tell Haddad version published by George"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The text survives in two co-equal witnesses: a Nippur version known from fragmentary Old Babylonian tablets, and a Tell Haddad version published and analysed by George.' Faithful verbatim."

  - claim_id: C05_LACUNA_1
    claim_summary: "LACUNA: Nippur manuscripts extensively damaged; funeral and underworld sequences heavily broken"
    narrative_location: "line 12"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C06_LACUNA_2
    claim_summary: "LACUNA: Tell Haddad ritual content partially damaged; divine judgement scene incomplete"
    narrative_location: "line 14"
    status: MAPPED
    notes: "LACUNA block reproduced verbatim from claims."

  - claim_id: C07
    claim_summary: "Tell Haddad tablets significantly expanded scholarly knowledge; added ritual/funerary content not in Nippur"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative: 'The discovery of the Tell Haddad tablets significantly expanded scholarly knowledge of this composition, adding ritual and funerary content not attested in the Nippur fragments.' Faithful verbatim."

  # === Setting and context ===

  - claim_id: C08
    claim_summary: "Composition narrates death of Gilgamesh (Sumerian: Bilgames) and reception as judge among the dead"
    narrative_location: "line 20 (paragraph 4)"
    status: MAPPED
    notes: "Narrative: 'The composition ETCSL 1.8.1.3 narrates the death of Gilgamesh (Sumerian: Bilgames) -- king of Uruk who confronts his mortality and is received as a judge among the dead -- and his reception in the nether world.' Adds 'king of Uruk who confronts his mortality' as a gloss. Faithful."

  - claim_id: C09_VARIANT
    claim_summary: "VARIANT: Nippur as base vs Tell Haddad expanded ritual content; both co-equal"
    narrative_location: "line 25"
    status: MAPPED
    notes: "VARIANT block reproduced verbatim from claims."

  # === Narrative sequence: Confronting mortality ===

  - claim_id: C10
    claim_summary: "Gilgamesh confronted with inevitability of death; gods decreed even greatest hero must die"
    narrative_location: "line 29 (paragraph 6)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh, having achieved great deeds during his life, is confronted with the inevitability of his own death -- the gods have decreed that even the greatest hero must die.' Faithful verbatim."

  - claim_id: C11
    claim_summary: "Dream or divine communication: immortality not granted to mortals; gods reserved eternal life for themselves"
    narrative_location: "line 32 (paragraph 7)"
    status: MAPPED
    notes: "Narrative: 'The text appears to include a dream or divine communication in which Gilgamesh is told that immortality is not granted to mortals, however great their accomplishments -- the gods have reserved eternal life for themselves.' Faithful verbatim."

  - claim_id: C12_INFERENCE
    claim_summary: "INFERENCE: Divine decree echoes theme from Gilgamesh and Huwawa — fame, not eternal life, compensates mortality"
    narrative_location: "line 35"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  # === Narrative sequence: Funeral and offerings ===

  - claim_id: C13
    claim_summary: "Elaborate funeral preparations including offerings to gods of nether world"
    narrative_location: "line 41 (paragraph 9)"
    status: MAPPED
    notes: "Narrative: 'The text describes elaborate funeral preparations for Gilgamesh, including offerings to the gods of the nether world.' Faithful verbatim."

  - claim_id: C14
    claim_summary: "Tell Haddad preserves more funerary ritual detail: offerings to Ereshkigal, Ningishzida, and others; formal protocol for reception of dead king"
    narrative_location: "line 44 (paragraph 10)"
    status: MAPPED
    notes: "Narrative: 'The Tell Haddad version preserves substantially more detail about the funerary ritual: offerings are presented to major underworld deities including Ereshkigal -- queen of the underworld, elder sister of Inanna -- Ningishzida -- god of the underworld, a judge among the dead -- and other divine figures, in what appears to be a formal protocol for the reception of a dead king.' Adds glossary-mandated first-mention glosses for Ereshkigal and Ningishzida. Faithful."

  - claim_id: C15
    claim_summary: "Gilgamesh presents gifts to underworld deities; parallels gift-giving in other Sumerian texts"
    narrative_location: "line 47 (paragraph 11)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh presents gifts to the underworld deities -- a ritual sequence that parallels the gift-giving protocols attested in other Sumerian literary and liturgical texts concerning the nether world.' Faithful verbatim."

  # === Narrative sequence: Reception as underworld judge ===

  - claim_id: C16
    claim_summary: "After death, Gilgamesh received as figure of authority; granted status of judge among the dead"
    narrative_location: "line 52 (paragraph 13)"
    status: MAPPED
    notes: "Narrative: 'After death, Gilgamesh is received in the nether world not as an ordinary shade but as a figure of authority: he is granted the status of a judge among the dead.' Faithful verbatim."

  - claim_id: C17
    claim_summary: "Gilgamesh placed alongside Ningishzida and other underworld deities; transformed from mortal hero to figure with permanent divine function"
    narrative_location: "line 55 (paragraph 14)"
    status: MAPPED
    notes: "Narrative: 'Gilgamesh's elevation to judge of the dead places him alongside Ningishzida and other underworld deities, transforming him from a mortal hero into a figure with a permanent divine function in the afterlife.' Faithful verbatim."

  - claim_id: C18_INFERENCE
    claim_summary: "INFERENCE: Elevation functions as apotheosis — partial divinisation while still confined to nether world"
    narrative_location: "line 58"
    status: MAPPED
    notes: "INFERENCE block reproduced verbatim from claims."

  - claim_id: C19
    claim_summary: "Eschatological function: death absolute but extraordinary merit earns elevated status as judge"
    narrative_location: "line 66 (paragraph 16)"
    status: MAPPED
    notes: "Narrative: 'The composition's eschatological function is to assert that even for the greatest hero, death is absolute -- but that extraordinary merit can earn an elevated status within death's domain, as a judge and authority among the dead rather than a mere shade.' Faithful verbatim."

  - claim_id: C20
    claim_summary: "Royal-legitimation function: text legitimises cult of dead kings and ritual obligations of living toward deceased rulers"
    narrative_location: "line 69 (paragraph 17)"
    status: MAPPED
    notes: "Narrative: 'The royal-legitimation function is significant: by showing Gilgamesh received as a divine judge in the nether world, the text legitimises the cult of dead kings and the ongoing ritual obligations of the living toward deceased rulers.' Faithful verbatim."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Heracles/Olympus, Norse Valhalla, Minos/Rhadamanthys/Aeacus judges, Egyptian mortuary cult parallels"
    narrative_location: "lines 60-61, 72"
    status: MAPPED
    notes: "All four comparative hooks are present in the narrative as // COMPARATIVE-HOOK comments: Heracles' death (line 60), Norse Valhalla (line 61), Minos et al. as judges (line 63 — in the claims but present at line 61 area in narrative), Egyptian mortuary cult (line 72). Faithful."

findings:

  # --- Check 1: Completeness ---

  - id: F01
    check: completeness
    severity: NONE
    detail: "All 20 claims (including VARIANT blocks, LACUNA blocks, INFERENCE blocks, and COMPARATIVE-HOOK comments) from the approved claims file are present in the narrative. No claims were dropped."

  # --- Check 2: No additions ---

  - id: F02
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 3, paragraph 1"
    detail: "Narrative adds '(Sumerian: Nibru)' after Nippur. This is the glossary-mandated first-mention Sumerian form. Trivially editorial."

  - id: F03
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 8, paragraph 2"
    detail: "Narrative adds: 'Neither is subordinate to the other; each preserves material the other has lost.' This is an editorial restatement of the co-equal witnesses claim and the VARIANT block's rationale. Not a new factual claim."

  - id: F04
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 16, paragraph 3"
    detail: "Narrative adds a transitional paragraph: 'Both versions are broken. The Nippur manuscripts have multiple large gaps; the Tell Haddad version preserves material the Nippur tablets have lost, but it too is damaged, particularly in the ritual columns and the divine judgement scene. What follows is the story as it can be recovered from two incomplete witnesses.' This restates information from the LACUNA blocks in editorial prose. No new factual claim."

  - id: F05
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 20, paragraph 4"
    detail: "Narrative adds 'king of Uruk who confronts his mortality' as a parenthetical gloss on Gilgamesh. Consistent with glossary (first_mention_gloss: 'king of Uruk, two-thirds divine hero'). Trivially editorial."

  - id: F06
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 23, paragraph 5"
    detail: "Narrative adds: 'Every other Sumerian Gilgamesh narrative is about what the hero does with his life. This one is about what happens when the life ends. The answer the Sumerian poets gave is both bleaker and more generous than one might expect. Death is absolute. Even for Gilgamesh. But death is not featureless, and the dead are not all equal.' Interpretive thematic introduction that summarizes the composition's eschatological argument (C19). Stylistic elaboration, not a new factual claim."

  - id: F07
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 29, paragraph 6"
    detail: "Narrative adds: 'There is no sudden reversal, no enemy to fight, no stratagem that might succeed. Gilgamesh has slain Huwawa in the Cedar Forest, has crossed mountains and rivers, has done everything that a mortal can do to distinguish himself -- and none of it changes the fundamental arithmetic. Mortals die. He is mortal. Therefore he will die.' The reference to slaying Huwawa is consistent with other Gilgamesh compositions in the book. The rest is interpretive elaboration of C10. No new factual claim about this composition."

  - id: F08
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 32, paragraph 7"
    detail: "Narrative adds: 'The mechanism is characteristically Sumerian: a direct statement of cosmic law, delivered without apology. The gods live forever. Men do not. The boundary is not a wall to be scaled but a fact to be absorbed.' Interpretive commentary on C11. Stylistic elaboration."

  - id: F09
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 37-38, paragraph 8"
    detail: "Narrative adds: 'This is the lesson the tradition has been teaching across every Gilgamesh composition: fame, not eternal life, is the only compensation for mortality. The Death of Gilgamesh is the composition in which that bargain comes due. The name will be spoken. The hero will not be there to hear it.' This restates the INFERENCE block C12 in editorial prose. No new factual claim."

  - id: F10
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 41, paragraph 9"
    detail: "Narrative adds: 'Here the two versions diverge most sharply. The Nippur fragments preserve the fact of the funeral but little of its substance. The Tell Haddad version preserves substantially more: a detailed protocol of offerings, a formal procedure for the reception of a dead king.' This restates information from the VARIANT block and C14 in editorial prose. No new factual claim."

  - id: F11
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 44, paragraph 10"
    detail: "Narrative adds glossary-mandated first-mention glosses: 'Ereshkigal -- queen of the underworld, elder sister of Inanna' and 'Ningishzida -- god of the underworld, a judge among the dead.' Both match the glossary exactly. Mandated editorial content."

  - id: F12
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 44, paragraph 10"
    detail: "Narrative adds: 'The ritual follows a sequence -- deity by deity, gift by gift -- that suggests a well-established liturgical tradition. Ereshkigal receives her offerings first. Ningishzida receives his. Other divine figures, whose names the damaged tablets only partially preserve, receive theirs in turn. A dead king does not simply arrive in the underworld. He is processed.' Interpretive elaboration of C14's 'formal protocol for reception of a dead king.' The ordering (Ereshkigal first, then Ningishzida) is a reasonable reading of the George reference but is not explicitly stated in the claims."
    flagged: true

  - id: F13
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 47, paragraph 11"
    detail: "Narrative adds: 'The parallel with Inanna's Descent is worth noting. When Inanna descended, she passed through seven gates and was stripped of everything. When Gilgamesh descends, he brings gifts. The living goddess entered the realm of the dead and lost everything; the dead king enters and gives everything. Both are acts of submission to the underworld's authority, but the forms differ. Inanna went alive and unwilling. Gilgamesh goes dead and, if not willing, at least prepared.' Cross-reference to another composition in the book, drawing a thematic parallel. This is interpretive commentary and not a new factual claim about the Death of Gilgamesh text itself."

  - id: F14
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 52, paragraph 13"
    detail: "Narrative adds: 'This is both less and more than immortality. Less, because Gilgamesh is still dead -- he does not return to the world of the living, does not sit among the gods in heaven. More, because within the domain of the dead he is not merely one shade among millions. He has a function. He has authority. He judges.' Interpretive commentary on C16, restating the eschatological argument of C19. No new factual claim."

  - id: F15
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 55, paragraph 14"
    detail: "Narrative adds: 'In life, he was two-thirds divine and one-third mortal -- a fraction that made him the greatest of heroes but did not save him from the arithmetic of death. In the underworld, the fraction shifts. He is not a god, but he exercises a divine function, judging the dead alongside figures who are gods. Death took everything from him except his merit, and his merit has earned him a role that will last as long as the dead keep coming -- which is to say, forever.' The 'two-thirds divine' detail is from the glossary (first_mention_gloss: 'king of Uruk, two-thirds divine hero'). The rest is interpretive elaboration of C17 and C18. No new factual claim."

  - id: F16
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 66, paragraph 16"
    detail: "Narrative adds: 'The text does not deny death, does not soften it, does not promise resurrection. What it promises is distinction -- that the difference between a great life and an ordinary one persists beyond the grave. Gilgamesh is dead, but he is not merely dead. He is dead and judging.' Interpretive restatement of C19. Stylistic elaboration."

  - id: F17
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 69, paragraph 17"
    detail: "Narrative adds: 'This is not simply a story about one hero's fate. It is a charter for an institution. If Gilgamesh exercises divine authority in the underworld, then all dead kings participate in that reflected authority, and the living owe them something -- offerings, rituals, the ongoing maintenance of their cult. The theology serves the institution, and the institution serves the theology, and the text encodes both.' Interpretive elaboration of C20. The word 'charter' and 'institution' are interpretive characterizations, not new factual claims."

  - id: F18
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "lines 76-80, final paragraphs"
    detail: "Narrative adds two concluding editorial paragraphs reflecting on the text's damage and thematic significance. The first ('The damage to this text is, in one sense, appropriate...') is a meta-literary observation. The second ('But what survives is enough...') summarizes the narrative arc using only elements already established in the claims. These paragraphs introduce no new factual claims about the source text."

  - id: F19
    check: no_additions
    type: CLAIM-ADDED
    severity: LOW
    narrative_location: "line 80, final paragraph"
    detail: "Narrative adds: 'It is not immortality. The Sumerian poets were too clear-eyed for that. But it is the next best thing, and the fact that these poets -- writing four thousand years ago, in a language that would itself die -- understood the difference between eternal life and eternal significance may be the most durable thing about this broken, fragmentary, indispensable text.' Thematic conclusion that does not introduce new factual claims. Stylistic elaboration."

  # --- Check 3: Fidelity ---

  - id: F20
    check: fidelity
    severity: NONE
    detail: "All claims are reproduced verbatim or with only glossary-mandated additions. No distortions, misstatements, or alterations of factual content were detected. The narrative closely follows the claims text, often reproducing it word-for-word."

