chapter: 26
title: "Lugalbanda in the Mountain Cave"
date: "2026-04-16"

claim_mapping:

  # === Source overview ===

  - claim_id: C01
    claim_summary: "ETCSL 1.8.2.1, OB tablets from Nippur and Ur"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative says 'catalogued as ETCSL 1.8.2.1 and survives on Old Babylonian tablets from Nippur (Sumerian: Nibru) -- the religious capital of Sumer, seat of Enlil's temple the E-kur -- and from Ur.' Faithful."

  - claim_id: C02
    claim_summary: "Reconstructed from fragments; some segments unclear; part of linked pair with Lugalbanda and the Anzud Bird"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative says 'The text is reconstructed from fragments; some segments remain unclear, and the narrative is incomplete at both ends. It is the first half of a linked pair, the second being Lugalbanda and the Anzud Bird (ETCSL 1.8.2.2).' Faithful."

  - claim_id: C03
    claim_summary: "Present retelling follows ETCSL composite + Vanstiphout 2003, pp. 97-131 + Black et al. 2004, pp. 262-268"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative says 'The present retelling follows the ETCSL composite text, supplemented by Vanstiphout 2003, pp. 97--131; Black et al. 2004, pp. 262--268.' Faithful."

  # === Setting and context ===

  - claim_id: C04
    claim_summary: "Lugalbanda is a soldier in Enmerkar's army, marching toward Aratta across mountainous terrain"
    narrative_location: "line 18 (paragraph 3)"
    status: MAPPED
    notes: "Narrative says 'Lugalbanda -- soldier and later king of Uruk, father of Gilgamesh in tradition -- served in the army of Enmerkar, king of Uruk, who was leading his forces across mountainous terrain toward the distant city of Aratta.' Faithful."

  - claim_id: C05_LACUNA
    claim_summary: "LACUNA: Opening lines 1-30 partially damaged in Nippur manuscripts"
    narrative_location: "line 16"
    status: MAPPED
    notes: "LACUNA block reproduced from claims."

  - claim_id: C06
    claim_summary: "Army on military campaign against Aratta; part of Aratta cycle alongside two Enmerkar poems"
    narrative_location: "line 18 (paragraph 3)"
    status: MAPPED
    notes: "Narrative says 'The campaign belongs to the larger Aratta cycle alongside the two Enmerkar compositions, which describe the rivalry between the two cities in terms of wit and diplomacy.' Faithful."

  # === Lugalbanda's illness and abandonment ===

  - claim_id: C07
    claim_summary: "Lugalbanda falls gravely ill during march through mountains, unable to continue"
    narrative_location: "line 24 (paragraph 4)"
    status: MAPPED
    notes: "Narrative says 'During the march through the mountains, Lugalbanda fell gravely ill and was unable to continue with the army.' Faithful."

  - claim_id: C08
    claim_summary: "Comrades leave him in mountain cave with provisions of food, drink, and bedding, expecting death"
    narrative_location: "line 27 (paragraph 5)"
    status: MAPPED
    notes: "Narrative says 'His comrades, unable to carry him and unwilling to delay the campaign, left Lugalbanda in a mountain cave with provisions of food, drink, and bedding, expecting that he would die.' Faithful."

  - claim_id: C09
    claim_summary: "Text describes Lugalbanda's isolation and suffering in the cave with vivid detail"
    narrative_location: "line 30 (paragraph 6)"
    status: MAPPED
    notes: "Narrative says 'The text describes Lugalbanda's isolation and suffering in the cave with vivid detail: he lay alone in the wilderness, cut off from his companions and from the civilisation of Uruk.' Faithful."

  # === Lugalbanda's piety and offerings ===

  - claim_id: C10
    claim_summary: "Lugalbanda prays to Utu, Inanna, and Nanna-Suen asking for aid"
    narrative_location: "line 37 (paragraph 8)"
    status: MAPPED
    notes: "Narrative says 'Lugalbanda prayed. He addressed the celestial deities -- Utu the sun god, Inanna, and Nanna-Suen (the moon god, son of Enlil and Ninlil, patron of Ur) -- asking for their aid.' Faithful."

  - claim_id: C11_INFERENCE
    claim_summary: "INFERENCE: Lugalbanda's piety correct even in wilderness; proper devotion rewarded outside temple"
    narrative_location: "line 40"
    status: MAPPED
    notes: "INFERENCE block reproduced from claims."

  # === Divine healing ===

  - claim_id: C12
    claim_summary: "Utu responds first; Inanna accepts tears next; Nanna-Suen accepts tears and grants life"
    narrative_location: "line 44 (paragraph 9)"
    status: MAPPED
    notes: "Narrative says 'Utu, the sun god, responded first to Lugalbanda's prayers and sent down divine encouragement; Inanna accepted his tears next; and Nanna-Suen accepted his tears and granted him life.' Faithful."

  - claim_id: C13_VARIANT
    claim_summary: "VARIANT: ETCSL composite (Nippur) vs Vanstiphout divergences in healing sequence"
    narrative_location: "line 42"
    status: MAPPED
    notes: "VARIANT block reproduced from claims."

  - claim_id: C14
    claim_summary: "Divine healing restores full health; emerges from cave; consumes plants and water; speeds away 'like a horse of the mountains'"
    narrative_location: "line 50 (paragraph 10)"
    status: MAPPED
    notes: "Narrative says 'The divine healing restored Lugalbanda to full health; he emerged from the mountain cave, consumed life-saving plants and water, and sped away \"like a horse of the mountains.\"' Faithful."

  # === Lugalbanda alone in the wilderness ===

  - claim_id: C15
    claim_summary: "After recovery, alone in mountains; bakes bread and forages"
    narrative_location: "line 55 (paragraph 11)"
    status: MAPPED
    notes: "Narrative says 'After his recovery, Lugalbanda found himself alone in the mountains, separated from the army which had continued its march toward Aratta. He baked bread and foraged in the wilderness.' Faithful."

  - claim_id: C16
    claim_summary: "Catches wild bull and goats, demonstrating resourcefulness"
    narrative_location: "line 58 (paragraph 12)"
    status: MAPPED
    notes: "Narrative says 'Lugalbanda caught a wild bull and goats in the wilderness, demonstrating his resourcefulness as a survivor.' Faithful."

  - claim_id: C17
    claim_summary: "Dream vision from Zangara; instructed to sacrifice animals; performs sacrifices and banquet invoking An, Enlil, Enki, and Ninhursaja"
    narrative_location: "line 61 (paragraph 13)"
    status: MAPPED
    notes: "Narrative says 'Then Lugalbanda received a dream vision from the god Zangara, who instructed him to sacrifice the animals he had caught; he performed the sacrifices and made a banquet invoking An, Enlil...Enki...and Ninhursaja.' Faithful."

  - claim_id: C18
    claim_summary: "Fragmentary content (lines 394-499, Segment B); sets up continuation in Lugalbanda and the Anzud Bird"
    narrative_location: "line 66 (paragraph 14)"
    status: MAPPED
    notes: "Narrative says 'The composition continues beyond this point, but the surviving text grows increasingly fragmentary. Content involving demonic beings and divine incantations occupies lines 394--499, followed by a fragmentary Segment B with an unknown number of lines missing; the narrative sets up the continuation in Lugalbanda and the Anzud Bird.' Faithful."

  # === Themes ===

  - claim_id: C19
    claim_summary: "Central theme: individual endurance in isolation; survival depends on personal piety and divine favour, not military prowess or social standing"
    narrative_location: "line 71 (paragraph 15)"
    status: MAPPED
    notes: "Narrative says 'The central theme of the composition is individual endurance in isolation: Lugalbanda's survival depends entirely on personal piety and divine favour, not on military prowess or social standing.' Faithful."

  - claim_id: C20
    claim_summary: "Correct ritual behaviour (sincere prayer) rewarded even outside temple or city, in the wilderness"
    narrative_location: "line 47 (paragraph 9)"
    status: MAPPED
    notes: "Narrative says 'The divine healing sequence demonstrates that correct ritual behaviour -- sincere prayer -- is rewarded even when performed outside temple or city, in the raw wilderness.' Faithful."

  # === Textual transmission ===

  - claim_id: C21
    claim_summary: "Text reconstructed from Nippur and Ur fragments; ETCSL composite is best available reconstruction"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Covered in paragraph 1 narrative: 'The text is reconstructed from fragments' and 'ETCSL composite text.' Faithful."

  - claim_id: C22
    claim_summary: "Presence in both Nippur and Ur scribal schools indicates edubba curriculum circulation"
    narrative_location: "line 3 (paragraph 1)"
    status: MAPPED
    notes: "Narrative says 'The presence of manuscripts at both Nippur and Ur scribal schools indicates that the linked Lugalbanda pair circulated as part of the edubba curriculum.' Faithful."

  - claim_id: C23
    claim_summary: "Vanstiphout's critical edition (pp. 97-131) documents divergences between Nippur and Ur traditions"
    narrative_location: "line 8 (paragraph 2)"
    status: MAPPED
    notes: "Narrative says 'Vanstiphout's critical edition provides thorough philological treatment, documenting divergences between the Nippur and Ur textual traditions.' Faithful."

  # === Comparative hooks ===

  - claim_id: COMPARATIVE_HOOKS
    claim_summary: "Moses/Hagar (Genesis 21), Romulus and Remus, piety rewarded in extremity"
    narrative_location: "lines 76, 80-82"
    status: MAPPED
    notes: "All three comparative hooks appear in the narrative final paragraphs: Moses in the desert and Hagar's ordeal (Genesis 21), Romulus and Remus, piety rewarded in extremity. Also present as // COMPARATIVE-HOOK comments at lines 80-82. Faithful."

