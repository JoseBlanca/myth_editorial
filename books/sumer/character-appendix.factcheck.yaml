# MEDIUM-SEVERITY FINDINGS
# ─────────────────────────────────────────────────────────────────────────

findings_medium:

  - id: M1
    category: physical-description-sourcing
    severity: MEDIUM
    affected_entry: "Anzud"
    extract: >-
      "*Physical description.* Lion-headed eagle of enormous wingspan; the
      parent bird radiates the _me-lam_, the divine radiance that emanates
      from gods, monsters, and sacred objects.footnote:[ETCSL 1.8.2.2,
      lines 140–160; Jacobsen 1987, pp. 329–332.]"
      (appendix line 921)
    finding: >-
      The "lion-headed eagle" identification is not stated in the Sumerian
      narrative at ETCSL 1.8.2.2, lines 140–160 — those lines describe the
      me-lam. The lion-headed-eagle identification is drawn from the
      wider iconographic tradition (cylinder seals; the Imdugud relief
      from Tell al-'Ubaid). Chapter 27 (27-lugalbanda-and-the-anzud-bird.edited.adoc
      line 29) asserts "divine lion-headed eagle" with a citation to
      ETCSL 1.8.2.2 lines 30–70 + Jacobsen 1987 pp. 322–325. The source
      of the lion-head identification is Jacobsen's commentary, not the
      Sumerian text itself. This is not a fabrication — it is a
      well-attested scholarly reading — but the appendix citation pins
      the identification to line numbers that do not support it.
    verdict: "! CITATION-WRONG (partially)"
    recommendation: >-
      Either (a) make the iconographic basis explicit ("Lion-headed eagle
      in the associated visual tradition; the Sumerian text at ETCSL
      1.8.2.2 describes the me-lam but not a lion head") or (b) restrict
      the description to what the Sumerian text itself supports
      (enormous wingspan, radiance) and drop the lion-head detail from
      the "physical description" section, or (c) keep the lion-head and
      cite Jacobsen 1987 with a note that it is the scholarly-iconographic
      identification.

  - id: M2
    category: physical-description-sourcing
    severity: MEDIUM
    affected_entry: "Bilulu"
    extract: >-
      "Jacobsen's reconstruction from the fragmentary text identifies her
      as an old woman of the steppe; beyond that, her appearance is not
      described." (appendix line 712)
    finding: >-
      This is correctly flagged as "Jacobsen's reconstruction," which is
      the right treatment. The chapter carries the same framing (ch 16
      line 33 and inference-marker at line 35). No issue with the
      description itself, but the citation is to Jacobsen 1987 pp.
      318–320 — this is in-scope as secondary commentary. Note that
      "old woman" is an interpretive categorisation, not a physical
      portrait. Keep as is but perhaps reword "her appearance is not
      described" to "a specific physical portrait is not provided" since
      "old woman" is itself a physical-description phrase.
    verdict: "✓ SUPPORTED with minor wording tension"
    recommendation: low-priority editorial smoothing only.

  - id: M3
    category: missing-character
    severity: MEDIUM
    affected_chapters: "ch 22 (Gilgamesh, Enkidu, and the Nether World); ch 14"
    finding: >-
      The "serpent that cannot be charmed" infesting the roots of the
      huluppu tree (ch 22, line 42) is one leg of the three-part infestation;
      Anzud and the phantom maid get their own appendix entries but the
      serpent does not. If the rule is "any named or category-identified
      creature in a chapter gets an entry," the serpent is a borderline case.
      Similar borderline cases: Gugalanna (named in ch 14 / in appendix
      Bull-of-Heaven entry line 947 where appendix notes the identification
      is by scholarly convention — this is handled reasonably); the Annunaki
      collective (line 143 of ch 14, "The Annunaki decree…") is collective and
      appropriately omitted.
    verdict: "? UNVERIFIED (scope/completeness judgement)"
    recommendation: >-
      Consider adding a serpent entry under Creatures and Monsters with a
      "no physical description" notice; or explicitly document the rule
      that generic unnamed creatures (serpent, friend-of-Dumuzid, etc.)
      are omitted.

  - id: M4
    category: physical-description-claim-without-footnote
    severity: MEDIUM
    affected_entry: "Sharur"
    extract: >-
      "*Physical description.* No physical description survives in the
      in-scope sources beyond its identity as a mace."
      (appendix line 1017)
    finding: >-
      This sentence asserts a physical fact ("its identity as a mace") but
      carries no footnote. The mace identification is well attested
      (Sharur is the standard Sumerian sentient-mace of Ninurta), but per
      the handoff spec, every physical-description sentence should cite
      an in-scope primary source. The Ninurta entry's me-lam claim is
      footnoted; Sharur's mace identification is not.
    verdict: "? UNVERIFIED (footnote missing)"
    recommendation: >-
      Add a footnote, e.g., "footnote:[ETCSL 1.6.2, passim — Sharur is
      consistently named and functions as Ninurta's mace-weapon; see
      Black et al. 2004, pp. 163–165.]"

  - id: M5
    category: physical-description-claim-without-footnote
    severity: MEDIUM
    affected_entry: "Huwawa"
    extract: >-
      "*Physical description.* No physical description survives in the
      in-scope sources beyond the attribution of the seven auras. (The
      familiar Akkadian portrait of a giant with a lion's face belongs
      to _Humbaba_ in the Akkadian tradition, which is out of scope.)"
      (appendix line 978)
    finding: >-
      Same class of issue as M4: the physical-description sentence lacks
      its own footnote. The seven-auras attestation IS footnoted in the
      preceding header sentence (line 976), but a reader checking the
      physical-description block for evidentiary anchoring finds no
      citation.
    verdict: "? UNVERIFIED (footnote missing)"
    recommendation: >-
      Copy the header's citation, or add "see note 1 above," or inline
      footnote:[ETCSL 1.8.1.5, lines 90–160] to the physical-description
      sentence.

  - id: M6
    category: physical-description-claim-without-footnote
    severity: MEDIUM
    affected_entry: "Enkidu"
    extract: >-
      "*Physical description.* No physical description survives in the
      in-scope sources. (The Sumerian texts in scope do not describe his
      body; the familiar hairy, wild-man portrait belongs to the Akkadian
      Gilgamesh tradition, which is out of scope for this volume.)"
      (appendix line 738)
    finding: >-
      Physical-description sentence lacks a citation. The disavowal of
      the Akkadian portrait is helpful and scope-compliant, but the
      negative claim (that Sumerian texts do not describe his body)
      should carry a citation pointing to the compositions in which he
      appears (ETCSL 1.8.1.1, 1.8.1.2, 1.8.1.4, 1.8.1.5) so the
      negative claim is falsifiable.
    verdict: "? UNVERIFIED (footnote missing; negative claim)"
    recommendation: >-
      Add a citation covering the Sumerian Enkidu loci.

  - id: M7
    category: cross-reference-chapter-number-ordering
    severity: MEDIUM
    affected_entries: "Enki, An, Enlil, Nanna-Suen (and a few others)"
    finding: >-
      Several "Appears in" bullet lists are not in strict chapter-number
      order. Example: under Enki the bullets run ch 01–04, 09, 10, 12, 14,
      22, 24, 28, 26, 34, 32 — chapter 26 falls after ch 28, and chs 32
      and 34 come after chs 22/24. Under An the ordering runs 08, 11, 07,
      22, 26, 28 — similarly out of order. Under Enlil the ordering is
      mostly sequential but 22 precedes 17 in some readings; spot checks
      show at least 4 entries with jumbled chapter order.
    verdict: "? UNVERIFIED (editorial consistency)"
    recommendation: >-
      Sort every "Appears in" list in ascending chapter number. Low
      severity alone but compounds with H1 — once cross-refs are made
      functional, ordering becomes user-visible.

  - id: M8
    category: citation-without-in-scope-primary
    severity: MEDIUM
    affected_entries: "Death of Gilgamesh appearances (Ereshkigal, Ningishzida, Gilgamesh)"
    finding: >-
      For The Death of Gilgamesh (ch 23), three appendix entries cite
      only "George 2003, vol. 1, pp. 200–206" or 200–208 with no ETCSL
      reference (see Ereshkigal line 176, Ningishzida line 418, Gilgamesh
      entry for ch 23 line 791). ETCSL catalogues this as 1.8.1.3, and
      the entry for Gilgamesh ch 23 does cite ETCSL 1.8.1.3. The
      Ereshkigal and Ningishzida ch 23 bullets do not cite ETCSL at
      all — only George 2003. George 2003 is a "reference" tier source
      whose scope.md permission is restricted to its treatment of the
      Sumerian poems; it is not a primary translation. The citation is
      not scope-violating (George treats the Sumerian Death of Gilgamesh),
      but appendix practice elsewhere pairs George with an ETCSL locus.
    verdict: "? UNVERIFIED (citation-weakness, not wrong)"
    recommendation: >-
      Add ETCSL 1.8.1.3 alongside George 2003 citations for the ch 23
      bullets in the Ereshkigal and Ningishzida entries, and the Relevance
      footnote of Gilgamesh ("George 2003, vol. 1, pp. 141–208" → add
      ETCSL 1.8.1.1–1.8.1.5 range).

