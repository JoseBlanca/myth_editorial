# LOW-SEVERITY FINDINGS
# ─────────────────────────────────────────────────────────────────────────

findings_low:

  - id: L1
    category: glossary-rendering-inconsistency
    severity: LOW
    finding: >-
      Glossary renderings are respected throughout — spot checks against
      glossary.yaml confirm that Inanna (not Ishtar), Enki (not Ea),
      Huwawa (not Humbaba), Anzud (not Anzu), Dumuzid (not Tammuz),
      Ninhursaja (not Ninhursag), and Nanna-Suen (not Sin) are used
      consistently. The "never_use" items from glossary.yaml are correctly
      avoided in positive contexts, and where Akkadian forms appear
      (Humbaba on line 978, Tammuz nowhere, Ishtar nowhere), they are
      marked as out-of-scope comparanda, not as renderings of the
      Sumerian figure. Technical terms me, kur, abzu, me-lam, edubba,
      galla, huluppu all appear italicised as the glossary prescribes.
    verdict: "✓ SUPPORTED"
    recommendation: none.

  - id: L2
    category: terminology-minor
    severity: LOW
    affected_entry: "Ninshubur"
    extract: >-
      "Inanna's faithful minister and _sukkal_, her handmaiden"
      (appendix line 498)
    finding: >-
      "Handmaiden" is a gendered reading. Scholarship is split on
      Ninshubur's gender (Inanna-cycle Ninshubur is typically rendered
      feminine, but cross-cycle Ninshubur can be masculine). Jacobsen
      1987 pp. 213–218 treats her as feminine in the Inanna context,
      so this is defensible, but the appendix does not footnote the
      gender reading.
    verdict: "? UNVERIFIED (minor)"
    recommendation: low priority — optional footnote pointing to the
      gender reading, or use a gender-neutral term like "personal
      attendant."

  - id: L3
    category: chapter-title-consistency
    severity: LOW
    finding: >-
      Chapter-titles in the cross-references sometimes differ in minor
      ways from the actual chapter section headings. Examples:
      - Appendix uses "_Inanna's Descent to the Nether World_" (ch 14);
        chapter heading is "Inanna's Descent to the Nether World"
        (match — good).
      - Appendix uses "_The Flood Story: The Eridu Genesis_" (ch 28);
        chapter 28 heading is "The Eridu Flood Story" (minor mismatch).
      - Appendix uses "_Ninurta's Exploits_" (ch 07); chapter 7 heading
        is "Lugal-e: Ninurta's Exploits" (paratext differs).
      - Appendix uses "_Ninurta's Return to Nibru_" (ch 08); chapter 8
        heading is "Angim: Ninurta's Return to Nibru" (same pattern).
      These are cosmetic — the compositions are unambiguous — but if the
      anchor fix (H1) uses section-title xrefs rather than block ids,
      exact string match would be required.
    verdict: "△ INTERNAL-VARIANCE (cosmetic)"
    recommendation: >-
      If the H1 fix uses [[ch-NN-slug]] anchors, this can be ignored.
      If it uses section-title xrefs, harmonise the titles.

  - id: L4
    category: claim-in-relevance-section
    severity: LOW
    affected_entry: "Gilgamesh"
    extract: >-
      "the bargain that his tradition insists on — fame, not eternal
      life, as the only compensation for mortality."
      (appendix line 794)
    finding: >-
      "Fame-not-immortality" is a central reading of the AKKADIAN
      Gilgamesh epic (George 2003, vol. 1, pp. 95–100). In the Sumerian
      poems, the theme is present in _Death of Gilgamesh_ (he is granted
      rule over the dead and his name is remembered) but phrased
      differently. The appendix's citation to "George 2003, vol. 1,
      pp. 141–208" covers the Sumerian section of George (which is
      precisely the part in scope), so this is defensible, but the
      bargain-framing language reads Akkadian-epic-coded to a careful
      ear. This is not a contamination per se — George's Sumerian
      discussion does touch these themes — but the sentence would be
      sharper if re-grounded in the Sumerian Death of Gilgamesh ending.
    verdict: "? UNVERIFIED (reading is defensible but Akkadian-coded phrasing)"
    recommendation: >-
      Consider replacing "fame, not eternal life, as the only
      compensation for mortality" with phrasing that foregrounds the
      Sumerian Death of Gilgamesh (rule over the dead, the remembered
      name, the elaborate funerary cult) rather than the Akkadian
      wisdom-literature moral.

  - id: L5
    category: claim-in-appears-in
    severity: LOW
    affected_entry: "Inanna (ch 22 appearance)"
    extract: >-
      "finds the huluppu tree on the Euphrates and appeals to Gilgamesh
      to clear it of its infesting creatures." (appendix line 224)
    finding: >-
      Chapter 22 line 38 actually describes the tree as being on "the
      bank of the Euphrates" where "the primal waters have deposited it"
      — the tree is floating/deposited, and Inanna transplants it. The
      appendix phrasing "finds the huluppu tree on the Euphrates" is
      correct as summary but omits the transplantation-to-Uruk step that
      is central to the episode. Minor: would not flag alone; noting
      here because the Inanna entry is long and detail-dense.
    verdict: "✓ SUPPORTED (minor compression)"
    recommendation: none required; optional polish.

  - id: L6
    category: historical-date-claim
    severity: LOW
    affected_entry: "Ur-Namma"
    extract: >-
      "Historical founder of the Third Dynasty of Ur (reigned ca.
      2112–2095 BCE)" (appendix line 878)
    finding: >-
      Dates are middle-chronology and widely used. Not contaminated;
      aligns with standard scholarship. No issue; noted for completeness
      because the appendix carries a specific numeric claim.
    verdict: "✓ SUPPORTED"
    recommendation: none.

  - id: L7
    category: citation-tier-mix
    severity: LOW
    affected_entries: "multiple"
    finding: >-
      Many entries cite only Kramer 1961 as a single-source footnote
      (Ninti line 525, 531; Ziusudra relevance line 912; Enmerkar line
      692 Aga relevance). scope.md's blacklist explicitly warns: "Kramer
      1961 cited without ETCSL cross-check." The affected entries are:
        - Ninti (line 531): cites ETCSL 1.1.1 + Kramer — OK.
        - Ziusudra relevance (line 912): Kramer 1961, pp. 97–101 +
          Jacobsen 1987 — OK.
        - Aga relevance (line 692): George 2003 + Kramer 1961 — OK.
        - Gudam header and physical-description (lines 812, 814): cites
          ETCSL only; relevance cites Black 2004 + Kramer. OK.
      No entry was found citing Kramer 1961 alone without a primary
      cross-check. Flag retained at LOW because a tight review pass is
      worthwhile.
    verdict: "✓ SUPPORTED (spot-check)"
    recommendation: none required; suggest a global pass ensuring
      Kramer is always paired with ETCSL or Black et al.

  - id: L8
    category: appendix-ordering
    severity: LOW
    finding: >-
      Within each category (Deities, Heroes and Mortals, Creatures and
      Monsters, Personified Concepts) entries are alphabetised with
      occasional exceptions:
        - Nanna-Suen appears under N between Nammu and Nanshe — OK
          (N-a-n ordering).
        - Ninazu / Ningishzida / Ninhursaja / Ninkurra / Ninlil / Ninmah
          / Ninsar / Ninshubur / Ninsikila / Ninti / Ninurta — OK.
        - Lord of Aratta is alphabetised under L (good).
        - Phantom maid (ki-sikil-lil-la) is alphabetised under K for the
          Sumerian name — the heading is "Phantom maid (ki-sikil-lil-la)"
          but appears between Kurgarra and Sharur, i.e., sorted as if by
          "ki-sikil-lil-la." Inconsistent with other entries where the
          English heading is the sort key. Low severity.
      Overall alphabetical integrity is good.
    verdict: "△ INTERNAL-VARIANCE (minor)"
    recommendation: none required.

# ─────────────────────────────────────────────────────────────────────────
# SYSTEMATIC OBSERVATIONS (for human reviewer)
# ─────────────────────────────────────────────────────────────────────────

systematic_observations:

  - observation: >-
      The appendix's discipline around "Physical description" sections is
      generally strong. Every entry carries an explicit "No physical
      description survives" or a minimal attested descriptor with a
      citation. No fabricated bodies, no "may have been depicted as…",
      no "likely appeared…" language. The two famous Akkadian-derived
      bodies (Enkidu's hairy wild-man, Humbaba's lion-face) are
      explicitly disavowed and their out-of-scope origin named. This
      is exactly the posture the handoff requested.

  - observation: >-
      Sumerian physical descriptors that DO appear — Inanna's seven
      regalia items (shugurra, measuring rod, lapis beads, breastplate
      "Come, man, come," pala-garment), Anzud's wingspan and me-lam,
      Bull of Heaven's devouring-scale, Ur-Namma's crushed-vessel simile,
      Lugalbanda's horse-of-the-mountains simile, Ninurta's blazing
      me-lam, Isimud's two faces, galatur/kurgarra as small and
      sexless, Dumuzid's throne and splendid garments — all trace back
      to the chapter retellings and carry ETCSL or Black et al.
      citations. Every one verified against the chapter text.

  - observation: >-
      No source from the blacklist appears. No Sitchin, no Wikipedia, no
      worldhistory.org. No citation of Enuma Elish / Atrahasis as
      Sumerian. No Adapa. No Ishtar. No Akkadian Ishtar's Descent.

  - observation: >-
      The largest vulnerability in the appendix is not fabrication risk
      but infrastructure risk: H1 (broken cross-references) affects the
      entire document and will be visible to any reader the moment the
      EPUB or HTML is opened. Any correction pass should fix H1 first;
      the substantive claims in the appendix are largely sound.

  - observation: >-
      Consider a brief editorial note at the top of the appendix
      clarifying the inclusion rule ("every named divine or mortal
      figure who acts in a chapter; generic creatures and collective
      groups excluded"). This would preempt questions about Shulgi,
      the serpent, the Annunaki, etc. — see H2 and M3.

