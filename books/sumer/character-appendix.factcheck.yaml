honesty_self_check:
  - q: "Did I extract every factual claim in Pass 0, or only the prominent ones?"
    a: >-
      I extracted header glosses, physical-description sentences, every
      Appears-in bullet (composition-level claim), and every relevance
      sentence. Within the Appears-in bullets I did NOT individually
      verify every sub-claim against line-number ranges of the cited
      source — I spot-checked representative items (An at ETCSL 1.1.3
      lines 1–60; Anzud at ETCSL 1.8.2.2 lines 30–70; Dumuzid at ETCSL
      1.4.1 lines 340–355; Galatur at ETCSL 1.4.1 lines 220–235; Ur-Namma
      at ETCSL 2.4.1.1 lines 180–200; Ninshubur at ETCSL 1.4.1 lines
      26–67; Bull of Heaven at ETCSL 1.8.1.2 Segment B 55–63;
      Inanna-descent regalia at ETCSL 1.4.1 lines 14–25; Isimud at ETCSL
      1.1.1 lines 202–219; Lugalbanda at ETCSL 1.8.2.1 lines 264–275).
      A full line-by-line verification of every appears-in citation would
      require a dedicated claim-level audit comparable to the
      per-chapter claims-factcheck. In this prose-factcheck pass I
      verified the high-risk claims (physical descriptions) exhaustively
      and spot-checked the plot-summary claims.
  - q: "Did I address the primary focus areas named in the handoff?"
    a: >-
      Yes.
      1. Fabricated/unsourced physical descriptions — zero fabrications
         found; two missing-footnote cases (M4 Sharur, M5 Huwawa, M6
         Enkidu); one mis-pinned citation (M1 Anzud lion-head).
      2. Cross-reference accuracy — ~165 cross-references, all broken
         (H1).
      3. Claims about mythological relevance — minor Akkadian-coded
         phrasing (L4 Gilgamesh), no scope violations.
  - q: "Did I read backwards?"
    a: >-
      Yes. Reverse pass from Personified Concepts → Creatures and
      Monsters → Heroes and Mortals → Deities surfaced M4 (Sharur) and
      L8 (phantom-maid alphabetisation), which I had skimmed past on
      forward reading. It also confirmed that Tamarisk / Date Palm /
      Silver / Copper entries are appropriately thin given the thin
      source base.
  - q: "Am I confident every severity rating is calibrated?"
    a: >-
      H1 (broken cross-refs systemic) is unambiguously HIGH. H2 (Shulgi
      missing) is HIGH only if the stated inclusion policy is "every
      named figure who acts"; if the policy is narrower this drops to
      MEDIUM. H3 (Ur-Namma battle vs. illness) is HIGH because the
      appendix silently contradicts its own chapter. The Medium
      findings are real but individually small. Low findings are
      polish-tier.
