---
# Prose-factcheck report for character-appendix.adoc
# Book: Sumerian mythology (in-scope: ca. 2600–1600 BCE Sumerian literary tradition)
# Checker: run in fresh conversation, per prose-factcheck skill rules.

meta:
  document: "character-appendix.adoc"
  document_path: "/home/jose/escritos/myth_editorial/books/sumer/character-appendix.adoc"
  document_lines: 1129
  claims_extracted: 362   # entries x (header claim + physical-description claim + appears-in + relevance) averaged
  approach: >-
    Pass 0 extracted: (a) every header gloss, (b) every physical-description
    claim (the skill's stated primary risk), (c) every appears-in bullet with
    its cited composition + source, (d) every relevance claim. Pass 1 verified
    each physical description and every claim that asserts a footnoted fact.
    Pass 2 triangulated a sample of cross-references against chapters. Pass 4
    verified cross-references, glossary renderings, and scope-compliance of
    citations. Pass 5 performed a reverse-order second pass focusing on the
    lower-profile entries most likely to have been skimmed in forward reading.
  scope_check: >-
    No citation in the appendix appeals to Standard Babylonian Gilgamesh,
    Enuma Elish, Atrahasis, Akkadian Descent of Ishtar, or Hittite/Hurrian
    material as a source for Sumerian content. George 2003 is cited, but
    scope.md permits George 2003 "for its treatment of the Sumerian poems";
    every appendix citation to George 2003 is attached to a Sumerian-tradition
    composition (Gilgamesh-Aga, Gilgamesh-Huwawa, Bull of Heaven, Death of
    Gilgamesh, Gilgamesh-Enkidu-Nether World). Akkadian traditions are
    explicitly disavowed in two places (Enkidu, Huwawa) — this is compliant.

# ─────────────────────────────────────────────────────────────────────────
# HIGH-SEVERITY FINDINGS (systematic, must be addressed before release)
# ─────────────────────────────────────────────────────────────────────────

findings_high:

  - id: H1
    category: cross-reference-integrity
    severity: HIGH
    scope: systemic
    affected_entries: "all 83 character entries; ~165 cross-references"
    claim: >-
      Every "Appears in" bullet uses the form <<ch-NN-slug, …>> — e.g.
      <<ch-14-inannas-descent, _Inanna's Descent to the Nether World_>> —
      which is an AsciiDoc cross-reference to an anchor id.
    finding: >-
      NONE of the referenced anchors exist. Grep across the entire
      books/sumer/ tree (both chapters/*.edited.adoc and chapters/*.grammar-checked.adoc)
      returns zero matches for any [[ch-NN-slug]] block-id declaration. Each
      chapter file begins with "== Chapter Title" and no [[ch-*]] anchor is
      placed above or within the chapter. The comparative chapter
      (comparative.edited.adoc) likewise has no [[ch-*]] anchor.
    verdict: "! CITATION-WRONG (systemic)"
    evidence:
      - "Grep '^\\[\\[ch-' over books/sumer/ → 0 matches."
      - "Grep '^\\[\\[' over books/sumer/chapters/*.edited.adoc → 0 matches."
      - "books/sumer/chapters/01-enki-and-ninhursaja.edited.adoc line 1: '== Enki and Ninhursaja: The Paradise of Dilmun' — no preceding anchor."
      - "books/sumer/comparative.edited.adoc line 1: '== Comparative Perspectives: Sumer and Its Neighbours' — no preceding anchor."
    impact: >-
      When the book is built, every one of these cross-references will render
      as a dangling link — either a visible red "anchor id not found" in
      AsciiDoctor output or a silent broken link in EPUB/HTML. The character
      appendix is effectively un-navigable.
    recommendation: >-
      Either (a) add [[ch-NN-slug]] block anchors to every chapter file at the
      section title (matching exactly the slug used in the appendix), or
      (b) rewrite the cross-references to target the actual section titles
      via xref syntax. Option (a) is safer because it stabilises the ids
      against future title edits.
    extract_sample: >-
      "* <<ch-14-inannas-descent, _Inanna's Descent to the Nether World_>>"
      (appendix line 50 and ~50 other locations)

  - id: H2
    category: missing-character
    severity: HIGH
    scope: entry-missing
    affected_chapter: "ch 34 (Debate between Bird and Fish)"
    claim: >-
      The appendix Bird, Fish, and Enki entries all state that King Shulgi
      renders the verdict in _The Debate between Bird and Fish_
      (appendix lines 1036, 1038, 1075, and 104 — Enki's "closing doxology
      praises 'Father Enki' whose wisdom guided Shulgi's judgment").
    finding: >-
      Shulgi is a named historical figure (second king of Ur III, reigned
      ca. 2094–2046 BCE) who acts as judge within a composition that is in
      scope. He appears by name in chapter 34 (line 59, verdict-rendering
      context), and he is also the implicit royal patron under whom
      Sumerian court literature of the Ur III period was produced.
      The appendix covers historical Ur-Namma (entry 'Ur-Namma'), so there
      is an established precedent for including named Ur III royalty. No
      entry for Shulgi exists.
    verdict: "? UNVERIFIED (completeness gap)"
    recommendation: >-
      Add a Heroes and Mortals entry for Shulgi, citing ETCSL 5.3.5 as the
      primary attestation and noting the brother compositions (5.3.5, 5.3.6
      — Copper and Silver's closing doxology may also reference him;
      verify). Physical description: none survives in the in-scope
      compositions themselves (royal hymns with physical imagery are in the
      wider Shulgi-hymn corpus, out of scope here per scope.md's exclusion
      of royal hymns without embedded narrative).

  - id: H3
    category: hedged-reconstruction-framed-as-neutral-description
    severity: HIGH
    scope: single entry
    affected_entry: "Ur-Namma"
    extract: >-
      "* <<ch-30-death-of-ur-namma, _The Death of Ur-Namma_>> — dies
      (apparently in battle), is prepared with elaborate funerary rites …"
      (appendix line 884)
    finding: >-
      The parenthetical "(apparently in battle)" is hedged reconstruction
      language of exactly the kind the prose-factcheck handoff flags as
      primary-risk. The chapter explicitly states "The text describes
      Ur-Namma dying of illness. He lies sick, abandoned on the battlefield
      'like a crushed vessel'" (30-death-of-ur-namma.edited.adoc line 18).
      The chapter's own inference-marker notes that military-defeat context
      is inferred from the imagery, not stated (line 21). The appendix
      flattens this hedge into a neutral-tone parenthetical that
      over-commits to the battle reading.
    verdict: "△ INTERNAL-VARIANCE with chapter"
    recommendation: >-
      Change "dies (apparently in battle)" to either "dies of illness,
      abandoned on the battlefield" (matches chapter) or omit the
      circumstance entirely and let the chapter carry the hedge. Either
      way, avoid the appendix silently asserting what the chapter flags
      as uncertain.

