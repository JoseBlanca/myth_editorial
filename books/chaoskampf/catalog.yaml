# Chaoskampf catalog — final tiers reflecting the 2026-04-23 DECIDE decisions.
# Replaces the draft in books/upcoming_books/chaoskampft.txt.
# Every entry will be expanded into a full brief at the chapter-briefs stage.

meta:
  stage: scope-lock
  version: v1
  date: 2026-04-23
  author: Jose Blanca
  source: DECISION_REPORT.md + research/ notes

core:
  # Cosmogonic subtype
  - id: ninurta-asag
    title: "Ninurta vs. Asag"
    tradition: Sumerian
    primary_source: "Lugal-e (ETCSL 1.6.2)"
    approx_date: "Old Babylonian copies of Ur III original, c. 2000 BCE"
    subtype: cosmogonic
    key_scholars: ["van Dijk", "Annus", "Wakeman", "Forsyth"]

  - id: ninurta-anzu
    title: "Ninurta vs. Anzû"
    tradition: Sumerian / Akkadian
    primary_source: "Anzû Epic (Akkadian, with older Sumerian background)"
    approx_date: "Old Babylonian–Middle Babylonian"
    subtype: sovereignty
    key_scholars: ["Lambert", "Annus", "Vogelzang"]

  - id: marduk-tiamat
    title: "Marduk vs. Tiamat"
    tradition: Babylonian
    primary_source: "Enūma Eliš (seven tablets)"
    approx_date: "Composition late 12th c. BCE; extant copies Neo-Assyrian / Neo-Babylonian"
    subtype: cosmogonic
    key_scholars: ["Lambert", "Jacobsen", "Foster", "Wakeman", "Day"]

  - id: kumarbi-ullikummi
    title: "Kumarbi Cycle (esp. Song of Ullikummi)"
    tradition: Hurro-Hittite
    primary_source: "Hittite tablets (KUB/KBo), including Song of Ullikummi, Song of Hedammu, Kingship in Heaven"
    approx_date: "Middle/New Hittite, c. 16th–13th c. BCE"
    subtype: sovereignty
    key_scholars: ["Hoffner", "Beckman", "López-Ruiz", "West", "Burkert"]

  - id: illuyanka
    title: "Tarḫunna / Teshub vs. Illuyanka"
    tradition: Hittite
    primary_source: "CTH 321 (KBo 3.7, KUB 17.5, KUB 17.6)"
    approx_date: "Middle/New Hittite, c. 16th–13th c. BCE"
    subtype: cyclical_ritual
    key_scholars: ["Beckman", "Hoffner", "Watkins", "Haas"]

  - id: baal-yamm-lotan
    title: "Baal vs. Yamm / Baal vs. Lotan"
    tradition: Ugaritic
    primary_source: "Ugaritic Baal Cycle (KTU 1.1–1.6); Lotan passage KTU 1.5 i 1–3"
    approx_date: "Late Bronze Age, c. 1350–1200 BCE"
    subtype: sovereignty
    key_scholars: ["Smith", "Pitard", "Pardee", "Day", "Wyatt"]

  - id: zeus-typhon
    title: "Zeus vs. Typhon"
    tradition: Greek
    primary_source: "Hesiod Theogony 820–880; Apollodorus 1.6.3; Nonnus Dionysiaca 1–2"
    approx_date: "c. 700 BCE – 5th c. CE"
    subtype: sovereignty
    key_scholars: ["West", "Burkert", "Fontenrose", "Ogden", "Watkins"]

  - id: indra-vrtra
    title: "Indra vs. Vṛtra"
    tradition: Vedic / Indo-Iranian
    primary_source: "Rigveda, esp. 1.32; 1.80; 2.11–12; 4.18; 5.32; 6.17; 8.96; 10.113"
    approx_date: "c. 1500–1200 BCE (oral composition)"
    subtype: cosmogonic_sovereignty
    key_scholars: ["Jamison", "Brereton", "Benveniste", "Renou", "Watkins", "Witzel"]

  - id: thraetaona-azidahaka
    title: "Thraētaona vs. Aži Dahāka"
    tradition: Iranian / Avestan
    primary_source: "Avesta (Yašt 5, 9, 14, 15, 17, 19); Pahlavi Bundahišn"
    approx_date: "Avestan corpus c. 2nd–1st millennium BCE; Bundahišn late Sasanian"
    subtype: sovereignty
    key_scholars: ["Watkins", "Skjærvø", "Hintze", "Lincoln", "Boyce"]

  - id: ra-apep
    title: "Ra vs. Apep"
    tradition: Egyptian
    primary_source: "Pyramid Texts, Coffin Texts, Book of the Dead, Amduat, Book of Gates, Bremner-Rhind Papyrus"
    approx_date: "c. 2400 BCE – 4th c. BCE"
    subtype: cyclical_maintenance
    key_scholars: ["te Velde", "Assmann", "Hornung", "Borghouts"]

  - id: yhwh-leviathan-rahab
    title: "YHWH vs. Leviathan / Rahab"
    tradition: Hebrew Bible
    primary_source: "Psalm 74:12–17; Psalm 89:9–13; Isaiah 27:1; Isaiah 51:9–10; Job 26:12–13; Job 41; Habakkuk 3"
    approx_date: "c. 8th–4th c. BCE"
    subtype: cosmogonic_kingship
    key_scholars: ["Gunkel", "Day", "Wakeman", "Ballentine", "Batto"]
    note: "Gunkel's original anchor case. Distinct from Revelation 12 — this entry covers the Hebrew Bible corpus."

  - id: revelation-12-dragon
    title: "Michael vs. the Red Dragon"
    tradition: New Testament / Early Christian
    primary_source: "Revelation 12:3–9"
    approx_date: "c. 90–95 CE"
    subtype: eschatological
    key_scholars: ["Yarbro Collins", "Aune", "Day", "Bauckham"]
    note: "NT eschatologisation of Leviathan/Rahab. The 12:9 'ancient serpent' identification makes the lineage explicit."

  - id: thor-jormungandr
    title: "Thor vs. Jörmungandr"
    tradition: Old Norse
    primary_source: "Hymiskviða; Völuspá 56; Gylfaginning 34, 46–48, 51; Húsdrápa (Úlfr Uggason); Iconography (Altuna, Hørdum, Gosforth, Ardre VIII)"
    approx_date: "Skaldic c. 850–1000 CE; Eddic 10th–13th c. CE"
    subtype: eschatological
    key_scholars: ["Simek", "Lindow", "Clunies Ross", "Meulengracht Sørensen", "Watkins"]

  - id: gonggong
    title: "Gonggong and the broken pillar"
    tradition: Chinese
    primary_source: "Huainanzi 3, 6; Lienü zhuan; Shanhaijing"
    approx_date: "Han compilation of earlier material, c. 2nd c. BCE – 1st c. CE"
    subtype: cosmogonic
    key_scholars: ["Lewis", "Birrell", "Allan", "Mathieu"]

  - id: huitzilopochtli-coatepec
    title: "Huitzilopochtli vs. Coyolxauhqui and the Centzon Huitznahua (Coatepec)"
    tradition: Mexica / Aztec
    primary_source: "Florentine Codex Book 3; Historia General (Sahagún)"
    approx_date: "16th-c. recording of pre-Conquest tradition"
    subtype: cosmogonic_political
    key_scholars: ["Matos Moctezuma", "Carrasco", "López Austin", "Olivier"]
    note: "Templo Mayor is the mountain; state-foundation combat of the Mexica."

related:
  # Kept from current draft
  - id: cipactli
    title: "Cipactli (dismemberment-cosmogony boundary case)"
    tradition: Mexica / Aztec
    caveat: "Dismemberment without combat; kept to mark the boundary of the motif family."
    key_scholars: ["Olivier", "López Austin", "León-Portilla"]

  - id: pariacaca-amaru
    title: "Pariacaca vs. amaru"
    tradition: Andean (Huarochirí)
    primary_source: "Huarochirí Manuscript (Quechua, c. 1608)"
    caveat: "Huaca succession, not primordial chaos."
    key_scholars: ["Salomon", "Urioste", "Taylor", "Dean"]

  - id: bakunawa
    title: "Bakunawa and the eclipse"
    tradition: Philippine (Visayan / Bikol)
    caveat: "Eclipse aetiology + ritual noise-making; no hero slaying."
    key_scholars: ["Eugenio", "Ramos", "Demetrio", "Meñez"]

  - id: perun-veles
    title: "Perun vs. Veles"
    tradition: Slavic (reconstructed)
    caveat: "Ivanov/Toporov reconstruction; contested by Jakobson, Lajoye, Kapović."
    key_scholars: ["Ivanov", "Toporov", "Jakobson", "Lajoye", "Kapović"]

  - id: vahagn-vishaps
    title: "Vahagn vs. the vishaps"
    tradition: Armenian
    caveat: "Epithet (*Vishapakagh*) + cult evidence secure; narrative text lost. Kept RELATED (user decision 2026-04-23)."
    key_scholars: ["Russell", "Petrosyan"]

  - id: frashokereti
    title: "Frashokereti — the eschatological renovation"
    tradition: Iranian / Zoroastrian
    caveat: "Pendant to the Thraētaona entry, not standalone. Kərəsāspa slays the released Aži Dahāka."
    key_scholars: ["Boyce", "Skjærvø", "Hintze", "Daryaee"]

  # Added from missing-stories sweep
  - id: trita-aptya
    title: "Trita Āptya vs. the three-headed serpent"
    tradition: Vedic (pre-Indra stratum)
    key_scholars: ["Dumézil", "Watkins"]

  - id: krishna-kaliya
    title: "Krishna vs. Kāliya"
    tradition: Bhakti-era Vaishnavism
    primary_source: "Bhāgavata Purāṇa 10.15–16; Harivaṃśa; Viṣṇu Purāṇa"
    key_scholars: ["Bryant", "Doniger", "Couture"]

  - id: beowulf
    title: "Beowulf vs. Grendel and the Dragon"
    tradition: Old English
    primary_source: "Beowulf MS (Cotton Vitellius A.xv)"
    key_scholars: ["Tolkien 1936", "Watkins", "Fontenrose", "Orchard"]

  - id: sigurd-fafnir
    title: "Sigurd vs. Fáfnir"
    tradition: Norse / Germanic
    primary_source: "Fáfnismál; Völsunga saga; Nibelungenlied (parallels)"
    key_scholars: ["Watkins (ch. 42)", "Dronke", "Byock"]

  - id: herakles-hydra-ladon-geryon
    title: "Herakles vs. the Hydra; Ladon; Geryon"
    tradition: Greek
    primary_source: "Hesiod Theogony; Apollodorus; Apollonius"
    key_scholars: ["Fontenrose", "Watkins (cattle-raid)", "Ogden"]
    note: "Treat as a sub-cluster — three serpent-combats, one hero, varied function."

  - id: perseus-ketos
    title: "Perseus vs. Ketos (and Medusa)"
    tradition: Greek
    key_scholars: ["Fontenrose", "Ogden"]
    note: "Archetype for St. George."

  - id: kadmos-dragon
    title: "Kadmos vs. the dragon of Ares"
    tradition: Greek
    key_scholars: ["Fontenrose", "Vian", "Ogden"]

  - id: bellerophon-chimaera
    title: "Bellerophon vs. the Chimaera"
    tradition: Greek
    key_scholars: ["Ogden"]

  - id: cacus
    title: "Cacus vs. Hercules"
    tradition: Italic / Roman
    primary_source: "Virgil Aeneid 8; Ovid Fasti 1"
    key_scholars: ["Dumézil", "Feeney"]

  - id: apollo-python
    title: "Apollo vs. Python"
    tradition: Greek
    demoted_from: core
    reason: "Cult-foundation at Delphi, not cosmogony (Fontenrose, Ogden). User decision 2026-04-23: demote to RELATED."
    primary_source: "Homeric Hymn to Apollo; Apollodorus 1.4.1; Ovid Met. 1.438–451; Pausanias 10.6.5–6"
    key_scholars: ["Fontenrose", "Ogden", "Watkins"]

  - id: st-george-michael
    title: "St. George and the Michael-lineage"
    tradition: Christian (late-antique to medieval)
    primary_source: "Passio S. Georgii; Legenda Aurea; Byzantine iconography"
    key_scholars: ["Ogden 2021", "Walter"]
    note: "Extends the Revelation 12 CORE entry forward as reception/mutation."

  - id: lugh-balor
    title: "Lugh vs. Balor (Second Battle of Mag Tuired)"
    tradition: Irish
    primary_source: "Cath Maige Tuired"
    key_scholars: ["Dumézil", "Mac Cana", "Gray"]

  - id: dobrynya-zmey-gorynych
    title: "Dobrynya Nikitich vs. Zmey Gorynych"
    tradition: East Slavic bylina
    key_scholars: ["Ivanov", "Toporov", "Propp"]
    note: "Reflex of the Perun-Veles pattern."

  - id: mapuche-kai-tren
    title: "Kai-Kai vs. Tren-Tren"
    tradition: Mapuche
    key_scholars: ["Foerster", "Schindler", "Bacigalupo"]
    note: "Two-serpent cosmogony; the only well-attested South American entry outside the Andes."

  - id: quetzalcoatl-tezcatlipoca
    title: "Quetzalcoatl vs. Tezcatlipoca (the Suns)"
    tradition: Mexica / Aztec
    primary_source: "Leyenda de los Soles; Historia de los Mexicanos por sus pinturas"
    key_scholars: ["Carrasco", "López Austin", "Nicholson"]

  - id: hou-yi
    title: "Hou Yi and the suns / monsters"
    tradition: Chinese
    primary_source: "Huainanzi 8; Shanhaijing; Chuci 'Tian wen'"
    key_scholars: ["Birrell", "Lewis", "Mathieu"]

  - id: welsh-red-white-dragon
    title: "Red dragon vs. white dragon"
    tradition: Brittonic
    primary_source: "Historia Brittonum; Lludd and Llefelys (Mabinogion)"
    key_scholars: ["Ogden 2021", "Davies"]

  - id: batraz
    title: "Batraz and the Nart combats"
    tradition: Caucasian / Scytho-Alanic (Ossetian Nart sagas)
    key_scholars: ["Dumézil", "Colarusso"]

  - id: marduk-labbu
    title: "Marduk (?) vs. Labbu"
    tradition: Akkadian (fragmentary)
    key_scholars: ["Wakeman", "Lambert"]
    note: "Single fragmentary tablet; present the fragmentary status explicitly."

  - id: erlik-ulgen
    title: "Erlik vs. Ülgen"
    tradition: Altaic / Turkic-Mongol
    key_scholars: ["Eliade", "Harva"]

  - id: horus-seth
    title: "Horus vs. Seth"
    tradition: Egyptian
    primary_source: "Pyramid Texts; Contendings of Horus and Seth (Chester Beatty I)"
    caveat: "Debated — Seth is ambivalent (both Apep-slayer and Osiris-murderer). Nuanced RELATED (te Velde 1967)."
    key_scholars: ["te Velde", "Griffiths"]

  - id: susanoo-orochi
    title: "Susanoo vs. Yamata no Orochi"
    tradition: Japanese
    demoted_from: core
    reason: "Japanese-specialist scholarship (Naumann, Isomae, Como, Ooms) frames as sword-etiology / metallurgical / imperial-legitimation; chaoskampf reading is a Western-comparativist minority. User decision 2026-04-23."
    primary_source: "Kojiki 1.19–1.20; Nihon Shoki Book I variant accounts"
    key_scholars: ["Naumann", "Philippi", "Littleton", "Isomae", "Como"]

  - id: bida
    title: "Bida and the founding of Wagadu (the inversion)"
    tradition: Soninke (West African)
    note: "Reverse chaoskampf: slaying the serpent ends prosperity. Kept RELATED (user decision 2026-04-23) as the anchor case for the dedicated inversion chapter."
    key_scholars: ["Conrad", "Dieterlen", "Belcher", "Monteil"]

  - id: vainamoinen-iku-turso
    title: "Väinämöinen vs. Iku-Turso"
    tradition: Finnic (Kalevala)
    note: "Transformed variant: shamanic binding, not slaying; embedded in Lönnrot's 1849 editorial synthesis. Kept RELATED (user decision 2026-04-23) with that transformation made explicit."
    key_scholars: ["Siikala", "Honko", "Kuusi"]

contrastive:
  # Cases kept specifically *because* area specialists reject the chaoskampf framing.
  # These are not failed examples; they are the evidence that the category has limits.
  - id: nanabozho-mishipeshu
    title: "Nanabozho and Mishipeshu (the refusal)"
    tradition: Anishinaabe / Ojibwe
    note: "Kept as contrastive case (user decision 2026-04-23). Johnston, T. Smith, Vizenor and Hallowell's 'other-than-human persons' framework reject chaos-vs-order mapping; the Thunderer / Underwater-manitouk dialectic is necessary, not adversarial."
    key_scholars: ["Hallowell", "Johnston", "T. Smith", "Vizenor"]

  - id: mwindo-kirimu
    title: "Mwindo and Kirimu (the inverted moral)"
    tradition: Nyanga (Central African)
    note: "Hero is *punished* by the sky-god for the Kirimu-killing. Inverse moral valence. Kept as contrastive case (researcher recommendation, user to confirm)."
    key_scholars: ["Biebuyck", "Mateene", "Okpewho", "Scheub", "Belcher"]

provisional_critique:
  # Entries whose primary function is methodological, not narrative.
  - id: rainbow-serpent-critique
    title: "The Rainbow Serpent problem (methodological critique)"
    tradition: pan-Aboriginal Australian (challenging that very label)
    note: "Kept as dedicated methodological chapter (user decision 2026-04-23). Yingarna, Ngalyod, Wanambi, Wagyl, Yulunggul are distinct ancestral beings flattened by Radcliffe-Brown's 1926 pan-Aboriginal label. Chapter foregrounds the appropriation critique of Merlan, Morphy, Keen, Rose — it does not present any of these figures as chaoskampf exemplars."
    key_scholars: ["Radcliffe-Brown (as critiqued)", "Merlan", "Morphy", "Keen", "Rose"]

  - id: yu-great-sidebar
    title: "Yu the Great (hydraulic ordering — sidebar)"
    tradition: Chinese
    note: "Sidebar only (user decision 2026-04-23), placed in the comparative section on ordering-subtypes to contrast hydraulic-ordering (Yu) with combat-ordering (Gonggong). Not presented as chaoskampf."
    key_scholars: ["Lewis", "Allan", "Mathieu"]

excluded:
  - id: mucalinda
    reason: "Protection narrative, not combat (DeCaroli, Strong)."
  - id: antaboga
    reason: "Cosmogonic support-serpent, no combat episode (Hooykaas, Zoetmulder)."
  - id: whowie
    reason: "Local dangerous-creature tale; colonial-appropriation via Unaipon/Ramsay Smith."
  - id: rama-ravana
    reason: "Heroic epic, not cosmogonic."
  - id: garuda-nagas
    reason: "Inter-species enmity, not order-establishing."
  - id: gilgamesh-bull-of-heaven
    reason: "Hero-initiation; fold into Humbaba if retained."
  - id: humbaba
    reason: "Forsyth includes, but Andrew George and most Assyriologists dissent; omit unless a specific comparative use-case emerges."
  - id: nergal-erra
    reason: "Inverse structure, no monster-adversary."
  - id: fionn-aillen
    reason: "Initiation tale (Nagy)."
  - id: welsh-afanc
    reason: "Regional folk-monster without cosmic stakes."
  - id: sedna
    reason: "Dismemberment without combatant hero."
  - id: maui-fishing
    reason: "Trickster-demiurge; no chaos-monster."
  - id: yoruba-sango
    reason: "Storm-god theophany without canonical dragon-combat."
  - id: korean-foundation
    reason: "No storm-vs-serpent chaoskampf in the founding myth corpus."
  - id: thunderbird-whale
    reason: "Ludwin et al. geomythology reading is contested; keep only if methodological chapter wants a PNW case."
  - id: lac-long-quan
    reason: "Foundation-combat but low-medium evidence; may reconsider later."

counts:
  core: 15
  related: 30
  contrastive: 2
  provisional_critique: 2
