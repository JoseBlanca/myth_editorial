        notes: >
          113 footnotes in the narrative; 113 footnotes in the claims. Every narrative
          footnote matches its corresponding claims footnote verbatim.

verdict_rationale: >
  The narrative scores PASS on all three checks with one exception: tehôm is marked as
  bold (*tehôm*) in the single body-prose occurrence at line 107 rather than italic (_tehôm_)
  as required by the v1-locked glossary. This is the same mechanical AsciiDoc markup error
  identified in Ch08 (ISSUE-01 of that audit), inherited from the approved claims file itself.
  Because the glossary policy is v1-locked and the error is book-wide, the verdict is REVISE
  (not MAJOR-REVISE): the fix is a single find-and-replace in body prose only (one occurrence),
  with no content changes needed. All substantive checks pass cleanly: 113/113 claims covered,
  both markers verbatim, Yarbro Collins / Aune balance preserved without adjudication, inverted-
  royal-legitimation correctly attributed as book synthesis, Hyginus / Apollodorus distinction
  intact, cross-references within authorised scope, no banned terms, RSV citation discipline
  maintained, footnote count exact.
