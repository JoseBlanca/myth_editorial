findings:
  check_1_completeness:
    result: PASS
    notes: >
      All 113 claims mapped to narrative locations. The narrative reproduces the claims in
      section order without omission: source overview (15 claims, lines 6-43), text walk
      (37 claims, lines 47-122), Yarbro Collins reading (22 claims, lines 126-171), Aune
      eclectic reading (19 claims including VARIANT and INFERENCE, lines 175-217), combat-
      myth function (14 claims, lines 221-253), reception and forward links (6 claims,
      lines 258-285), with comparative hooks preserved as AsciiDoc comments (lines 287-291).
      Footnote count: 113 on both sides — exact match.

  check_2_no_additions:
    result: PASS
    sub_checks:
      yarbro_collins_aune_balance:
        result: PASS
        notes: >
          Both readings presented in dedicated sections ("The Yarbro Collins reading —
          Leto-Apollo-Python primary substrate" and "The Aune eclectic reading — Jewish,
          Greek, Egyptian streams") of approximately equal depth. The VARIANT marker at
          narrative lines 204-205 explicitly states "The chapter does not adjudicate; per
          brief special_instructions, both are presented as serious scholarly framings of
          the same material." No adjudication introduced.
      inverted_royal_legitimation_attribution:
        result: PASS
        notes: >
          The "inverted royal-legitimation" formulation is correctly attributed at narrative
          line 235: "with what this book describes as an inverted structure," with the
          footnote explicitly stating "The 'inverted royal-legitimation' formulation is this
          book's analytical synthesis." The formulation is never attributed to Yarbro Collins
          or any other scholar.
      apollodorus_hyginus_distinction:
        result: PASS
        notes: >
          The Hyginus / Apollodorus distinction is precisely preserved at narrative line 142:
          Hyginus Fabulae 140 = "Python (acting on an oracle that he would be killed by
          Leto's offspring) pursues the pregnant Leto"; Apollodorus Bibliotheca 1.4.1 =
          "preserves the Apollo-slays-Python-at-Delphi denouement (in Apollodorus's earlier
          passage Hera, not Python, drives Leto from place to place)." No conflation. Matches
          claims line 184 verbatim.
      cross_references:
        result: PASS
        notes: >
          Cross-references present: Part II C4 (narrative line 265), Part II C6 (line 270),
          Part I cluster 4 / Greek family chapter (line 272), Part I cluster 7 / Egyptian
          (line 274), Ch10 (line 281), Ch08 comment-hook (line 287). All five authorised by
          comparative hooks in the claims file (lines 363-367). No Ch11, no C2, no
          unauthorised references.
      etymological_glosses:
        result: PASS
        notes: >
          Greek terms glossed in the narrative: ὁ δράκων (line 6), ἡ γυνή (line 47),
          *stephanos* / διάδημα (line 49), *megas* / *purros* / *drakōn* (line 56),
          τέκνον ἄρρεν (line 63), ὁ ὄφις ὁ ἀρχαῖος (line 82), διάβολος / σατανᾶς
          (line 90), Μιχαήλ (lines 6, 77), *diadēma* (line 212). All are claims-supplied;
          none are invented by the drafter. Hebrew *śāṭān* (lines 92, 97) is claims-supplied.
      banned_terms:
        result: PASS
        notes: >
          'chaos-figure' does not appear. 'YHWH' does not appear. 'Yahweh' appears once
          at line 244 in a cross-reference to the Hebrew Bible corpus ("Yahweh's defeat of
          Leviathan / Rahab"), which is exactly the permitted use (glossary: "Yahweh in body
          prose only when cross-referencing Hebrew Bible"). NRSV appears twice: once in the
          translation-policy claim at line 35 (correct historical-context use) and once in
          the footnote at line 35. No verse quotations are labeled NRSV; all are labeled RSV.

  check_3_fidelity:
    result: PASS
    sub_checks:
      variant_marker:
        result: PASS
        notes: >
          VARIANT marker (narrative lines 204-205) is verbatim identical to claims lines
          261-262, including the footnote at narrative line 205 / claims line 262.
      inference_marker:
        result: PASS
        notes: >
          INFERENCE marker (narrative lines 208-210) is verbatim identical to claims lines
          265-267, including the footnote at narrative line 209 / claims line 266.
      meaning_preserving_paraphrases:
        result: PASS
        notes: >
          The narrative is overwhelmingly a verbatim lift from the claims. The one added
