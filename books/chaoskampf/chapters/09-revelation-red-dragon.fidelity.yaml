  issues_summary:
    - id: ISSUE-01
      severity: REVISE
      category: glossary-markup
      description: >
        The glossary (v1-locked) specifies that tehôm must be italicised (_tehôm_)
        throughout body prose. The narrative uses *tehôm* (AsciiDoc bold) at line 107
        in the one body-prose occurrence of the term. The same markup error is present
        in the approved claims file at claims line 140, meaning the narrative faithfully
        reproduced the source, but the output violates the glossary policy. The fix is
        mechanical: replace *tehôm* with _tehôm_ at narrative line 107.
      fix: >
        Replace *tehôm* with _tehôm_ at narrative line 107. Do not alter the term in
        footnote brackets or AsciiDoc comment lines. Only one body-prose occurrence.

    - id: ISSUE-02
      severity: NOTE
      category: addition-ok
      description: >
        One paragraph at narrative line 43 has no footnote and does not appear in the
        claims document: "Two features of this dossier set it apart from most of the
        combat-myths gathered in this book. The first is the chapter's status as canonical
        scripture in continuous transmission — a textual situation closer to Genesis or the
        Psalter than to the fragmentary cuneiform witnesses behind earlier chapters. The
        second is the doubled-up scholarly framing: a single twentieth-century monograph
        and a near-contemporary three-volume commentary represent two organising principles
        for the same set of textual data, and both are taken seriously here." This is a
        chapter-level orientation sentence added by the drafter. It introduces no new
        factual claims, accurately summarises the chapter's framing per the brief, and
        requires no footnote because it makes no attributed claims. NOTE only; no action
        required.

