# ── VERDICT BREAKDOWN ──────────────────────────────────────────────────────────
# REVISE (not MAJOR-REVISE): 1 FABRICATION (HIGH) + 1 SILENT BRIDGE (triggers
# REVISE regardless). No contamination. Fabrication count = 1, which is below
# the ≥3 HIGH threshold for MAJOR-REVISE. The fabrication is a specific error
# about who bestows the fiftieth name on Marduk, not a structural claim.
# Silent bridge is a plot claim about Esarra being Anu's earthly counterpart
# that is asserted without a marker despite being an interpretive inference.

# ── PASS 1: CLAIM-BY-CLAIM VERDICTS ───────────────────────────────────────────
# Only findings (non-✓ verdicts) are enumerated fully. Supported claims are
# tallied above and noted in the supported_claims section.

findings:
  - id: F01
    severity: HIGH
    verdict: "✗ FABRICATION"
    location: "Tablet VII, fifty names section"
    claim_text: >
      "The fiftieth name is bestowed by Anšar himself, who declares Marduk's
      name 'Asaru' or, in some witnesses, names him with the formula that closes
      the catalogue."
    problem: >
      This claim conflates two separate events and introduces a fabricated detail.
      (1) The fiftieth name in Tablet VII is NOT bestowed by Anšar; it is Anu who
      bestows the number 'fifty' on Marduk (the following claim, also by the writer,
      correctly states this: "Anu then bestows the number fifty on Marduk"). Multiple
      triangulation sources confirm it is Anu, not Anšar, who calls Marduk by the
      fifty-count formula at the close. Anšar's role is as the convener who dispatches
      the chain of champions and summons the assembly — he is not the final
      name-bestower. (2) "Asaru" is the FIRST name, not the fiftieth. The claim
      appears to confuse the opening of the fifty-names list (where Asaru / Asari
      is described as the first name glossed in Tablet VII) with the fiftieth.
      Sources: multiple summaries of the fifty-names passage confirm Asaru/Asari
      as the first name in the sequence; the final names are given to Marduk by
      Anu who 'bestowed the number fifty' as the capping title.
    fix_required: >
      Delete the claim about Anšar bestowing the fiftieth name. The following
      claim (Anu bestowing the number fifty) is correct and should stand. The
      incorrect claim creates a direct contradiction with its immediate successor.
      If the writer intended to say that Anšar opens the fifty-names ceremony
      (which is plausible given his role in Tablet III), that should be cited to
      a specific Lambert/Foster page and marked UNVERIFIED pending access.

  - id: F02
    severity: MEDIUM
    verdict: "△ INTERNAL-VARIANCE"
    location: "Tablet IV, Marduk's chariot horses"
    claim_text: >
      "Marduk mounts his storm-chariot, drawn by four named horses — Killer,
      Pitiless, Trampler, and Fleet — and sets out to confront Tiamat."
    problem: >
      The horse names are a translation choice, and the fourth horse's name is
      contested across translations. Multiple independent translators render the
      four horses as: "Killer, Pitiless, Trampler, and Haste/Flier/Swift/Fleet."
      'Fleet' is one attested rendering but not the universal one. The claim
      presents one translation choice as if it were a fixed textual datum, without
      noting the variance. This is not a fabrication — the four-horse combat chariot
      is textually secure — but the specific name 'Fleet' needs a citation to Foster
      2005's specific wording, since Foster's rendering of the fourth horse may
      differ from Lambert's.
    fix_required: >
      Either cite Foster 2005 p. 457 specifically and note that Foster renders
      the fourth horse's name as 'Fleet' (if that is accurate to Foster's text),
      or add a footnote acknowledging the translation variance across editions.

  - id: F03
    severity: MEDIUM
    verdict: "△ INTERNAL-VARIANCE"
    location: "Tablet V, cosmogony from Tiamat's body"
    claim_text: >
      "He coils her tail to form the cosmic bond, the *durmahu*, that links the
      heavens and the earth at the horizon."
    problem: >
      The term *durmahu* is used here as a gloss for Tiamat's coiled tail = the
      cosmic bond at the horizon. Secondary sources do not independently corroborate
      this specific identification. The word *durmahu* is attested as a Babylonian
      priestly/temple title in other contexts. Its use as the specific cosmic-bond
      element in this cosmogony passage may reflect Lambert's or Foster's rendering
      of a specific Akkadian term, but the sources consulted note 'durmahu' only
      in non-cosmic contexts. The cosmogony from Tiamat's body (head, thighs,
      eyes/rivers) is textually secure; the specific 'durmahu' label for the
      tail-as-horizon element is uncorroborated and may be a paraphrase that
      conflates Lambert's commentary with the text itself.
    fix_required: >
      If Foster 2005 p. 464 uses the term 'durmahu' in translating the tail
      passage, cite the exact page. If it is Lambert's commentary term, mark it
      as such. If the term does not appear in either primary translation, remove
      the gloss or replace with a description of the function without the label.

  - id: F04
    severity: MEDIUM
    verdict: "△ INTERNAL-VARIANCE"
    location: "Tablet III, assembly scene"
    claim_text: >
      "The repetition is structurally important: the catalogue of monsters and
      the substance of Marduk's terms are repeated four times across the first
      four tablets."
    problem: >
      The claim is cited to "Foster 2005, pp. 441–442, 443–444, 450–453, 458–459,
      on the four-fold repetition." The page range 458–459 is in Tablet IV, but the
      Tablet IV section of the claims does not show a further repetition of the
      monster catalogue at that point — it shows the combat itself. The claim may
      be conflating the structural repetitions (Tablet I creation of monsters, Tablet
      I Ea's report, Tablet II Ea's report to Anšar, Tablet III Kaka's report to
      the elder gods) with Foster's pagination. The 'four times' count is plausible
      given the genre, but the citation to pp. 458–459 as a fourth instance is
      potentially wrong — that range is the combat scene, not a repetition of the
      monster list. This is an internal citation inconsistency, not a plot error.
    fix_required: >
      Verify the four page ranges. If pp. 458–459 does not contain a repetition
      of the monster catalogue, replace with the correct Foster page for the fourth
      instance (probably Tablet II, around pp. 443–444 or a cross-reference within
      Tablet III).

  - id: F05
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Source overview section"
    claim_text: >
      "Lambert's 2013 manuscript catalogue lists more than seventy witnesses to
      Enūma Eliš, drawn from Assyrian and Babylonian libraries."
    problem: >
      The claim of 'more than seventy witnesses' is cited to Lambert 2013 pp. 3–15.
      The publisher description of Lambert 2013 notes '70 plates' (primarily
      hand-copies of exemplars), but plates ≠ manuscript witnesses; some plates
      cover multiple witnesses or fragments, and some witnesses may lack plates.
      The '70 plates' figure from the publisher description does not directly
      confirm '70+ witnesses.' The claim is plausible — this is roughly the scale
      of the Enūma Eliš manuscript tradition — but cannot be confirmed without
      access to pp. 3–15. Severity LOW because the claim is consistent with what
      is known about the manuscript tradition and no contrary evidence exists.
    fix_required: >
      If access to Lambert 2013 pp. 3–15 confirms '70+ witnesses', no change
      needed. If the actual count is different (e.g., 'approximately 60' or
      'over eighty'), correct the number. Flag for human review against pp. 3–15.

  - id: F06
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Setting and context section"
    claim_text: >
      "Anzû, the lion-headed eagle of the earlier Anzû Epic, appears in the
      catalogue of Tiamat's monsters: he has been demoted from rebel-protagonist
      to subordinate creature."
    problem: >
      The claim that Anzû appears specifically in Tiamat's monster catalogue in
      Tablet I of Enūma Eliš is stated with confidence but is not independently
      confirmed by the triangulation sources consulted. The monster list from
      multiple translations (Hydra, Dragon, Hairy Hero, Great Demon, Savage Dog,
      Scorpion-man, Fierce Demons, Fish-man, Bull-man) does not mention Anzû by
      name in any version reviewed. The connection between the Anzû Epic and Enūma
      Eliš is textually secure (shared Tablet of Destinies motif, structural
      parallels), but Anzû as a named individual member of Tiamat's army needs
      direct textual verification. This may reflect Lambert's commentary rather
      than the text itself, or it may be a conflation with the 'lahmu-monsters'
      in the list.
    fix_required: >
      Verify against Lambert 2013 Tablet I and Foster 2005 pp. 441–442 that Anzû
      (by name) appears in Tiamat's monster list. If he does not appear by name
      but is interpreted by Lambert as one of the listed creatures, change the
      claim to reflect that interpretive status and add an INFERENCE marker.
      If Anzû does not appear at all in Tablet I, remove this claim.

  - id: F07
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "The akītu festival context section"
    claim_text: >
      "The akītu also included a ritual humiliation and reinstatement of the king:
      the king was stripped of his insignia, struck on the cheek, and restored —
      a performance that subordinated the human king to Marduk's cosmic kingship."
    problem: >
      The 'struck on the cheek' detail is commonly cited in popular and secondary
      accounts of the akītu ritual but is contested in specialist scholarship.
      Lambert 2013 pp. 463–465 is cited, but the detail is not independently
      corroborated from that source without direct access. The 'Babylonian akitu
      festival' scholarship (e.g., Pongratz-Leisten) notes the humiliation rite
      but its exact form and whether it included a physical blow is debated. Since
      this chapter's primary source for the akītu context is Lambert pp. 463–465,
      and access is not available, this remains UNVERIFIED LOW.
    fix_required: >
      Verify against Lambert 2013 pp. 463–465 that the king-struck-on-cheek detail
      is attested in the ritual texts Lambert discusses. If it is, no change. If
      Lambert's text is more cautious, adjust the claim to match Lambert's formulation.

  - id: F08
    severity: LOW
    verdict: "⚠ SILENT BRIDGE"
    location: "Tablet VI, Esagil section"
    claim_text: >
      "Esagil is constructed as the cosmic counterpart of the Apsû above and the
      Esarra of Anu — the three-tier structure that mirrors Anšar / Anu / Ea
      theogonically."
    problem: >
      The claim that Esarra is 'the earthly counterpart of the heavenly Esagil-above'
      and that the three-tier structure 'mirrors Anšar / Anu / Ea theogonically'
      is a structural-interpretive claim that goes beyond a plot description. The
      three-tier cosmological interpretation is an analytic claim about the theology
      of Enūma Eliš, not a direct textual statement. It is not marked [INFERENCE].
      The claim at p. 471 (Esarra = Anu's temple paralleling Marduk's seat) may
      reflect Lambert's or Foster's reading rather than explicit text. This is a
      silent bridge: an analytic/interpretive claim embedded without a marker in
      a fact-claims document that should distinguish text from interpretation.
    fix_required: >
      Add [INFERENCE:] marker to the Esagil-as-cosmic-counterpart-of-Apsû claim,
      specifying the basis (Lambert 2013 Tablet VI commentary or Foster 2005
      pp. 471–472 headnote). Alternatively, if the text explicitly names the
      three-tier structure, cite the specific line.

  - id: F09
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Tablet VI, human creation"
    claim_text: >
      "The Anunnaki, the gods of the underworld, undertake the construction;
      they make bricks, raise walls, and build Esagil over the course of two years."
    problem: >
      The 'two years' for the construction of Esagil is a specific detail cited
      to Foster 2005 pp. 471–472 and Lambert 2013 Tablet VI. This detail is not
      confirmed in any of the triangulation sources consulted. The construction of
      Esagil by grateful gods is well-attested, but the specific 'two years'
      duration may be an error or a misread of a passage about another construction
      event. Severity LOW because the detail is internally consistent and small
      enough to not affect the argument, but it needs direct text verification.
    fix_required: >
      Verify the 'two years' against Foster 2005 pp. 471–472. If the text says
      something different (e.g., 'for a year' or gives a different period), correct
      accordingly.

  - id: F10
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Tablet I, Marduk's birth"
    claim_text: >
      "Marduk's mother is Damkina, Ea's consort, and his birth at the centre of
      the Apsû is signalled by elaborate praise-formulae."
    problem: >
      Damkina as Marduk's mother and Ea's consort is correct and well-attested.
      'Birth at the centre of the Apsû' is consistent with the text. But 'elaborate
      praise-formulae' as the specific signal is a paraphrase — the text's actual
      signal is the detailed physical description of Marduk's exceptional form
      (four eyes, four ears, etc.). The claim is not wrong but 'praise-formulae'
      is vague enough to potentially mislead. This is a minor phrasing issue.
    fix_required: >
      Minor: consider specifying 'praise-formulae that describe his exceptional
      physical form' to match the specific textual content.

