# ── PASS 4: MARKER INTEGRITY ──────────────────────────────────────────────────
marker_integrity:
  lacunae:
    - marker_id: "LACUNA-1"
      location: "Tablet V astronomical/calendrical passage"
      assessment: "VALID"
      notes: >
        The Tablet V lacuna for the lunar-calendar section is real. The claim that
        'Lambert's critical score integrates Neo-Assyrian and Neo-Babylonian witnesses
        to reconstruct the affected passages' is plausible and consistent with Lambert's
        editorial method. The marker is well-placed and the scholarly_reconstruction
        claim is appropriately cautious. One additional note from secondary sources:
        a Sultantepe duplicate of Tablet V is attested, which helps fill gaps — this
        corroborates the 'in-tradition fills available: yes' designation in the brief.
    - marker_id: "LACUNA-2"
      location: "Tablet VII closing fifty-names passage"
      assessment: "VALID"
      notes: >
        The Tablet VII lacuna is real; name-explications in the closing sequence are
        known to be partially broken. The Assyrian/Babylonian manuscript overlap as
        a reconstruction source is correct. However, this LACUNA marker follows
        immediately after the FABRICATION (F01) about Anšar bestowing the fiftieth
        name. If F01 is corrected, the LACUNA should be reviewed to ensure it still
        accurately describes what is missing after the correction.

  inferences:
    - marker_id: "INFERENCE-1"
      location: "Tablet I, Tiamat's reframing of the younger gods as rebels"
      assessment: "VALID AND WELL-BRIDGED"
      notes: >
        The [INFERENCE] marker correctly identifies that Tiamat's 'reframing' of
        the younger gods as rebels is an interpretive reading, not a textually
        explicit statement. The basis (Foster 2005 pp. 441–442 and Ballentine 2015
        ch. 1) is appropriate. The risk note ('the surviving text does not explicitly
        mark this as a reframing') is honest. This is one of the two required INFERENCE
        markers and it is properly deployed.
    - marker_id: "INFERENCE-2"
      location: "Variants section, Nebuchadnezzar I commissioning hypothesis"
      assessment: "VALID AND WELL-BRIDGED"
      notes: >
        The [INFERENCE] marker correctly flags the commissioning hypothesis as
        consensus-not-unanimous. The basis (Lambert 2013 introduction surveying the
        dating debate) is appropriate. The risk note (Kassite and later Neo-Babylonian
        alternatives) accurately represents the state of the debate as confirmed by
        triangulation. This is the second required INFERENCE marker and is properly deployed.

  variant_marker:
    marker_id: "VARIANT-1"
    location: "Gunkel and Ballentine debate section"
    assessment: "VALID"
    notes: >
      The [VARIANT] marker correctly presents the Gunkel 1895 chaos-versus-order
      reading and Ballentine 2015 alternative-sovereign reading as two competing
      scholarly interpretations. The 'chosen: both' decision is correct given the
      brief's explicit instruction to engage both readings in the body. The basis
      for the variant is clearly stated.

  silent_bridges:
    - location: "Tablet VI, Esagil three-tier cosmology claim"
      assessment: "MEDIUM — silent bridge detected (see F08)"
      notes: >
        The analytic claim about the three-tier cosmological structure mirroring
        Anšar/Anu/Ea theogonically is an interpretive inference presented without
        a marker. This is the one silent bridge detected in the chapter.

  additional_marker_issue:
    - issue: "LACUNA-2 adjacency to FABRICATION F01"
      severity: MEDIUM
      notes: >
        The LACUNA-2 marker ('some name-explications partially broken') appears
        after the fabricated fiftieth-name-by-Anšar claim. When F01 is corrected,
        the surrounding text should be reviewed to ensure LACUNA-2 still accurately
        describes the state of the passage after the false attribution is removed.

