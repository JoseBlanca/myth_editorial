verdict_rationale: >
  The narrative scores PASS on all three checks with one exception: tehôm is consistently
  marked as bold (*tehôm*) in body prose rather than italic (_tehôm_) as required by the
  v1-locked glossary. This is a mechanical AsciiDoc markup error affecting 8 lines. Because
  the glossary policy is v1-locked and the error is book-wide, the verdict is REVISE (not
  MAJOR-REVISE): the fix is a simple find-and-replace in body prose only, with no content
  changes needed. All substantive checks (completeness, no manufactured combat narrative,
  Day/Ballentine balance, inference marker fidelity, RSV citation discipline, cross-reference
  scope, banned-term compliance) pass cleanly.
