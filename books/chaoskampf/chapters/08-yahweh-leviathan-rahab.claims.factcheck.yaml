findings:
  - id: F01
    severity: MEDIUM
    type: glossary-policy-violation
    location: line 387
    text: '"the deep gives forth its voice"'
    description: >
      Body-prose paraphrase of Hab 3:9–10 uses "the deep" where v1-locked
      glossary policy requires *tehôm* (italicised with circumflex) in all body
      prose. "The deep" is reserved for inside direct biblical quotations only.
    required_fix: >
      Change "the deep gives forth its voice" to "*tehôm* gives forth its voice"
      (or rephrase to avoid the phrase entirely if the paraphrase is inaccurate).
    blocking: false

  - id: F02
    severity: MEDIUM
    type: translation-attribution-error
    location: "lines 50, 91, 100, 109, 141, 144, 179, 185, 217, 258, 261, 267, 302, 305, 343, 384, 390, 532"
    description: >
      The claims attribute all biblical quotations to "NRSV translation...as quoted
      in Day 1985." Day 1985 was published in 1985; the NRSV was not published until
      1989. Day used RSV throughout his monograph. The claim at line 50 attempts a
      caveat ("citing NRSV (and the older RSV in earlier sections)") but this is
      internally confused — Day cannot cite a translation that did not yet exist.
      The individual quoted texts are close to or identical in RSV and NRSV, so
      the substantive biblical content is not wrong, but the attribution chain is
      inaccurate and will mislead readers checking sources.
    required_fix: >
      Standardise attribution to one of:
      (a) "RSV translation, as quoted in Day 1985" — for claims whose evidence
          is grounded in Day; or
      (b) "NRSV" cited as the modern scholarly standard, independent of Day — for
          the chapter draft's own quotations.
      The two should not be conflated. The claims should note: Day 1985 uses RSV;
      the chapter draft may adopt NRSV as the modern standard, but must then cite
      NRSV directly, not via Day.
    blocking: false

  - id: F03
    severity: MEDIUM
    type: factual-error
    location: line 364
    text: >
      "The Leviathan of Job 41 is described as a created creature — Yahweh's
      'first of the great acts of God' in the sequence concluding the Yahweh
      speeches"
    description: >
      In NRSV (and RSV), "It is the first of the great acts of God" appears at
      Job 40:19, referring to BEHEMOTH, not Leviathan. The Yahweh speeches treat
      Behemoth first (Job 40:15–24) and Leviathan second (Job 41). Job 41:33
      says of Leviathan "on earth it has no equal, a creature without fear" —
      not "first of the great acts of God." The claim conflates the two creatures.
      Leviathan IS described as a created creature in Job 41 (a valid claim),
      but the specific phrase "first of the great acts of God" is mistakenly
      attributed to it when it belongs to Behemoth at 40:19.
    required_fix: >
      Remove the quotation "first of the great acts of God" from the Leviathan
      description. The accurate claim is that Leviathan in Job 41 is presented
      as a created creature whose fabrication is Yahweh's sole prerogative — this
      is supported by Job 41:33 and by Day 1985 ch. 4. The "first of the great
      acts" language should either be dropped or attributed correctly to Behemoth
      (Job 40:19) in a comparative note.
    blocking: false

supported_claims:
  # A representative sample of well-supported claims with verbatim evidence.
  # All 187 claims were reviewed; the following capture the key load-bearing
  # philological and structural claims.

  - claim_summary: "Psalm 74:14 has 'heads' in the plural, making Leviathan multi-headed"
    verdict: SUPPORTED
    evidence: >
      NRSV Ps 74:14: "you crushed the heads of Leviathan." Hebrew rāʾšê (construct
      plural of rōʾš) is clearly plural. Day 1985 ch. 1 draws the parallel with
      Ugaritic Lôtan's seven heads in KTU 1.5 (*šlyṭ d šbʿt rašm*).

  - claim_summary: "Isaiah 27:1 uses a future verb — combat projected to the eschatological future"
    verdict: SUPPORTED
    evidence: >
      NRSV Isa 27:1: "On that day the Lord...will punish Leviathan...and he will kill
      the dragon." Both main verbs are future (yipqōd / yāhǎrōg). Contrast with Ps
      74:13–14 and Job 26:12–13, which use perfect/preterite forms referring back to
      a past event. Day 1985 ch. 3 identifies this as the temporal reorientation
      that projects the combat forward.

  - claim_summary: "The Ugaritic epithet pair bṯn brḥ / bṯn ʿqltn appears in KTU 1.5 and corresponds verbatim to Isa 27:1 and Job 26:13"
    verdict: SUPPORTED
    evidence: >
      Smith 1994, Ugaritic Baal Cycle I, KTU 1.5.i.1–3: the Lôtan passage uses
      bṯn brḥ ("fleeing/twisting serpent") and bṯn ʿqltn ("twisting/coiling
      serpent"). Isa 27:1 nāḥāš bārîaḥ / nāḥāš ʿăqallātôn and Job 26:13 nāḥāš
      bārîaḥ are the Hebrew reflexes. Day 1985 ch. 3 identifies this as one of
      the most philologically precise cross-tradition correspondences in the corpus.

  - claim_summary: "Psalm 104:26 presents Leviathan as a playful created creature, not a primordial adversary"
    verdict: SUPPORTED
    evidence: >
      NRSV Ps 104:26: "There go the ships, and Leviathan that you formed to sport
      in it." The Hebrew yāṣartā ("you formed") places Leviathan firmly in the
      category of created creatures. Day 1985 ch. 2 uses "demythologisation" for
      this re-framing.

  - claim_summary: "Isaiah 51:10 maps the Rahab combat onto the exodus crossing of the Sea of Reeds"
    verdict: SUPPORTED
    evidence: >
      NRSV Isa 51:9–10: "Was it not you who cut Rahab in pieces, who pierced the
      dragon? Was it not you who dried up the sea...who made the depths of the sea
      a way for the redeemed to cross over?" The exodus allusion is explicit in
      "a way for the redeemed to cross over." Day 1985 ch. 3 reads this as the
      strongest evidence for the combat-exodus identification.

  - claim_summary: "Genesis 1:2 tehôm is a linguistic cognate of Akkadian Tiamat"
    verdict: SUPPORTED
    evidence: >
      Gunkel 1895 Teil I and Day 1985 ch. 2 both confirm the Semitic cognancy:
      Hebrew tehôm and Akkadian Tiāmat share a common root *t(i)hm-/*tihm-
      ("sea/deep"). The cognancy is now treated as a secure philological observation
      independent of any inferences drawn from it.

  - claim_summary: "Habakkuk 3 does not name Leviathan, Rahab, or Tannīn; combat is against unnamed rivers and sea"
    verdict: SUPPORTED
    evidence: >
      NRSV Hab 3:8, 15: "your wrath against the rivers...your rage against the sea"
      and "you trampled the sea with your horses." No named adversary (Leviathan,
      Rahab, Tannīn, Yam) appears. Day 1985 ch. 5 and Ballentine 2015 ch. 7 both
      note this as a distinguishing feature of Habakkuk 3 within the corpus.

  - claim_summary: "Ballentine's disagreement with Day is interpretive, not philological"
    verdict: SUPPORTED
    evidence: >
      Ballentine 2015 ch. 1 explicitly accepts the Lôtan/Leviathan cognancy and
      the verbatim epithet correspondences. Ch. 2 locates the disagreement at the
      level of the organising category ("chaos" vs. "rival sovereignty"), not at
      the level of the philological observations. Claims at lines 472 and 505–508
      accurately characterise the nature of the disagreement.

  - claim_summary: "Day 1985 identifies Psalm 74:12–17 as the strongest single piece of evidence for a Hebrew combat-cosmogony tradition"
    verdict: SUPPORTED
    evidence: >
      Day 1985 ch. 1 develops this argument at length: the combination of multi-headed
      Leviathan, explicit dragon-crushing, sea-dividing, and immediate cosmogonic
      continuation (Ps 74:15–17 establishing day/night/seasons) makes it the most
      densely evidenced passage in the corpus. The claim is accurately attributed.

  - claim_summary: "The corpus consists of allusions, not a narrative — the chapter does not reconstruct a single combat story"
    verdict: SUPPORTED
    evidence: >
      Day 1985 ch. 1; Ballentine 2015 ch. 2. Both scholars agree the Hebrew Bible
      preserves no extended narrative combat episode comparable to Enūma Eliš or
      KTU 1.2. The philological character of the corpus as allusive is the foundational
      methodological observation on which both framings build. NRSV text of all seven
      passages confirms the allusive, retrospective character of the relevant verses.

verdict_summary:
  verdict: REVISE
  rationale: >
    Zero HIGH severity findings. Zero silent bridges. Zero contamination.
    Two MEDIUM findings (F01: tehôm policy violation at line 387; F03: Job 40/41
    Behemoth/Leviathan phrase misattribution at line 364) and one MEDIUM translation-
    attribution issue (F02: "NRSV as quoted in Day 1985" is anachronistic across
    all quotation footnotes). Under the verdict rules, 1–2 HIGH OR >3 MEDIUM
    triggers REVISE; this audit has 0 HIGH and exactly 3 MEDIUM, triggering REVISE.
    All three findings are easily correctable at the claims-revision stage before
    chapter-draft.
  ready_for_chapter_draft: false
  required_before_draft:
    - "F01: Change 'the deep gives forth its voice' to '*tehôm* gives forth its voice' at line 387."
    - >
      F02: Standardise translation attribution. Replace 'NRSV translation...as quoted
      in Day 1985' throughout with either 'RSV translation, as quoted in Day 1985'
      (for claims grounded in Day) or cite NRSV directly as the modern scholarly
      standard. Do not attribute the 1989 NRSV to the 1985 Day monograph.
    - >
      F03: Remove 'first of the great acts of God' from the Leviathan/Job 41 claim
      at line 364. That phrase (Job 40:19 NRSV) belongs to Behemoth. Replace with
      accurate characterisation of Leviathan's status in Job 41 (e.g., Job 41:33
      'on earth it has no equal, a creature without fear').
  blocking_issues: none
  special_instructions_compliance:
    honest_framing: COMPLIANT
    day_ballentine_no_adjudication: COMPLIANT
    no_reconstruction: COMPLIANT
    lacuna_policy: COMPLIANT
    tehom_policy: MOSTLY COMPLIANT (one violation, F01)
    yahweh_not_yhwh: COMPLIANT
    chaos_figure_banned: COMPLIANT
    comparative_hooks_count: 5 (required minimum met)
