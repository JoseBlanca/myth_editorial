translation_provenance_audit:
  finding: MEDIUM
  id: F02
  severity: MEDIUM
  description: >
    The claims consistently attribute biblical quotations to "NRSV translation...
    as quoted in Day 1985." Day 1985 was published in 1985; the NRSV was not
    published until 1989. Day therefore used the RSV (Revised Standard Version)
    throughout his monograph, not the NRSV. The claim at line 50 attempts to
    paper over this by noting Day "citing NRSV (and the older RSV in earlier
    sections)," but this caveat is internally confused — Day 1985 cannot cite
    the 1989 NRSV. In practice, the RSV and NRSV are very close and most
    quotations read identically, so the actual quoted text is likely accurate.
    However, the translation attribution "NRSV as quoted in Day 1985" is
    anachronistic and will confuse readers checking Day against the NRSV.
  required_fix: >
    Change attribution formula to "RSV translation, as quoted in Day 1985; NRSV
    rendering is identical / nearly identical." Where a quotation is cited as
    "NRSV as quoted in Day 1985," the chapter-draft must use the RSV text Day
    actually quotes, or cite the NRSV independently as the modern scholarly
    standard and not attribute it to Day 1985.
  blocking: false
  affects_claims_at_lines: 50, 91, 100, 109, 141, 144, 179, 185, 217, 258, 261,
    267, 302, 305, 343, 384, 390, 532

day_ballentine_balance_audit:
  verdict: COMPLIANT
  notes: >
    Both Day and Ballentine are given substantive, non-adjudicating treatment
    across all seven passages. Every passage section closes with Ballentine's
    counter-reading presented at equal length and specificity to Day's reading.
    The chapter explicitly refuses to adjudicate at line 511 ("The chapter does
    not resolve the Day-Ballentine disagreement: per the brief special_instructions,
    this is the single most contested case in the book for the term Chaoskampf").
    The two INFERENCE markers frame both readings as analytic constructs. The
    Ballentine terminological proposal ("conflict myth") is presented substantively
    at lines 499, 524. FULLY COMPLIANT with brief special_instructions.

