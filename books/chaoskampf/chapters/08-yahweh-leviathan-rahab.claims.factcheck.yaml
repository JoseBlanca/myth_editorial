  stage: claims-factcheck
  chapter: "08-yahweh-leviathan-rahab"
  chapter_title: "Yahweh vs. Leviathan and Rahab: The Hebrew Bible Combat Corpus"
  auditor_model: "claude-sonnet-4-6"
  writer_model: "claude-opus-4-7"
