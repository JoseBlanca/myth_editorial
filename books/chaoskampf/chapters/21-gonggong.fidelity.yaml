findings:
  - kind: NAVIGATIONAL-SENTENCES
    severity: NOTE
    claim_number: ~
    narrative_location: "lines 6, 9, 12, 15, 18, 21, 24, 39, 48, 58, 61, 64, 68, 71, 102, 105, 111, 117, 149, 173, 183"
    issue: >
      Twenty-one unfootnoted navigational, orienting, or marker-introduction
      sentences appear in the narrative without claims-document counterparts.
    detail: >
      The writer's consistent style is to introduce each major claim with a
      short unfootnoted reader-facing sentence (e.g., "The fullest single account
      is in the Huainanzi", "A third witness is the Shanhaijing", "The repair,
      however, does not undo the combat") before the substantive footnoted sentence.
      Additionally, three sentences introduce INFERENCE/LACUNA markers with
      flagging language ("The 'single connected cosmogony' framing is, it should
      be flagged, an editorial reading..."; "The two-templates framing should be
      marked as the chapter's own articulation..."; "The reconstruction-from-Han-
      compilations character of the Gonggong narrative is registered explicitly in
      the [LACUNA] marker that follows."), and two sentences introduce the VARIANT
      block and the four-way-grouping paragraph. None of these sentences introduce
      factual assertions absent from the approved claims.
    recommended_fix: >
      No action required. All unfootnoted sentences are legitimate navigational
      bridges or marker-introduction sentences. NOTE severity only.

  - kind: WORD-COUNT-OVERAGE
    severity: NOTE
    claim_number: ~
    narrative_location: "whole chapter"
    issue: >
      Narrative word count (8,126 words) exceeds the formula baseline (56 claims
