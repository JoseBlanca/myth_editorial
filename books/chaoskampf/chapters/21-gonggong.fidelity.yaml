      Every narrative paragraph was checked against the claims document.
      Several unfootnoted navigational or framing sentences appear in the
      narrative that are absent from the claims body; all were examined for
      new factual content:
      (1) Narrative line 6 opening sentence: "This chapter tells a Chinese
          story in which a water-god named Gonggong loses a fight with a
          sky-emperor, and reacts to the loss by butting the cosmic pillar
          with his head." This sentence is a reader-facing retelling of the
          narrative plot, entirely derived from footnoted claims in the same
          paragraph. No unfootnoted fact introduced.
      (2) Narrative line 9: "The story does not survive in the form most
          readers might hope for." — orienting sentence. No factual content
          beyond what the attached footnote establishes.
      (3) Narrative line 12: "The fullest single account is in the *Huainanzi*
          (淮南子, 'Master of Huainan')." — intro to the attached footnoted claim.
          No new fact.
      (4) Narrative line 15: "A parallel Han account is the *Lienü zhuan*..." —
          sentence opener for the attached footnoted claim. No new fact.
      (5) Narrative line 18: "A third witness is the *Shanhaijing*..." — sentence
          opener for the attached footnoted claim. No new fact.
      (6) Narrative line 21: "A fourth witness, somewhat later, is the *Liezi*..."
          — sentence opener for the attached footnoted claim. No new fact.
      (7) Narrative line 24: "The four compilations do not all tell the same story,
          and they do not all preserve the same parts of it." — unfootnoted
          sentence preceding the attached footnoted claim. No new fact; the
          observation is directly authorised by the claims' own language about
          the multiple-mini-traditions character of the corpus.
      (8) Narrative line 39: "Beyond the China-specific scholarship the chapter
          draws on a broader comparative anchor." — intro sentence before the
          Forsyth claim. No new fact.
      (9) Narrative line 48: "What follows works through the story in order. The
          next section introduces the combatants — Gonggong, the sky-emperor, the
          broken pillar — and then the chapter takes up the *Huainanzi* combat,
          Nüwa's repair, the parallel *Lienü zhuan* version with its Yu sequel,
          the embedded sidebar on Yu's hydraulic alternative, and the closing
          sections on cultural function and on the chapter's place within the
          wider book." — chapter-navigation bridge. No factual assertions; all
          sections named are established in the claims.
      (10) Narrative line 58: "Gonggong's opponent, in the most widely attested
           version of the combat, is the sky-emperor Zhuanxu." — intro sentence
           preceding the attached footnoted claim. No new fact.
      (11) Narrative line 61: "Zhuanxu is not however the only opponent named in
           the surviving corpus." — transition sentence. No new fact.
      (12) Narrative line 64: "The competing opponent-traditions can be set out
           side by side as follows." — marker-introduction sentence. No new fact.
      (13) Narrative line 68: "The third major figure in the story is not a
           combatant but the goddess who picks up the pieces." — intro sentence
           preceding the Nüwa claim. No new fact.
      (14) Narrative line 71: "The pillar Gonggong breaks is the geographical and
           cosmological centre of the story." — intro sentence preceding the Mount
           Buzhou claim. No new fact.
      (15) Narrative line 102: "Nüwa's smelting of the patch is paired with a
           second, more architectural intervention." — intro sentence preceding the
           turtle-leg claim. No new fact.
      (16) Narrative line 105: "The repair, however, does not undo the combat." —
           intro sentence preceding the partial-repair claim. No new fact.
      (17) Narrative line 111: "The 'single connected cosmogony' framing is, it
           should be flagged, an editorial reading rather than a single-quotable
           phrase from the Han sources themselves." — marker-introduction sentence
           preceding INFERENCE-1. No new fact; properly contextualises the marker.
      (18) Narrative line 117: "The other principal Han version of the story does
           not end with Nüwa." — intro sentence preceding the *Lienü zhuan* claim.
           No new fact.
      (19) Narrative line 149: "The two-templates framing should be marked as the
           chapter's own articulation rather than a directly attested feature of
           the Han sources." — marker-introduction sentence preceding INFERENCE-2.
           No new fact.
      (20) Narrative line 173: "The four-way grouping itself is the present book's
           own editorial synthesis rather than a claim attributable to any one of
           the chapter's sources, and the [INFERENCE] marker that follows makes the
           attribution discipline explicit." — marker-introduction sentence
           preceding INFERENCE-3. No new fact.
      (21) Narrative line 183: "The reconstruction-from-Han-compilations character
           of the Gonggong narrative is registered explicitly in the [LACUNA]
           marker that follows." — marker-introduction sentence preceding LACUNA.
           No new fact.
