findings:
  - id: FIND-01
    severity: HIGH
    category: cross-reference-broken | citation-wrong
    claim_anchor: line 392 (§VI, "principal independent attestations" enumeration)
    description: |
      Ch39 line 392 enumerates "the principal independent attestations
      on which the book's typological argument rests" with four parens-
      ed Ch-number cross-references that are systematically wrong:
        (a) "the Chinese Ying Long and Gong Gong material (Ch28)"
        (b) "the Mexica Coatlicue / Coyolxauhqui material (Ch29)"
        (c) "the Andean material (Ch26)"
        (d) "the Mwindo material from the Banyanga of central Africa
             (Ch27 / Ch38 §VI)"
    issue: |
      Three of the four Ch-number cross-references at line 392 do not
      resolve to the Part-I chapter that treats the named material:
        (a) Ch28 is *bida-wagadu* (West-African Bida Cycle), not
            Chinese Gonggong / Ying Long material; the Gonggong material
            is at Ch21 (chapters/21-gonggong.adoc).
        (b) Ch29 is *mwindo-kirimu* (Nyanga Mwindo Epic), not Mexica
            Coatlicue / Coyolxauhqui material; the Mexica material is
            at Ch24 (chapters/24-huitzilopochtli-coatepec.adoc) and
            Ch25 (chapters/25-mesoamerican-cluster.adoc).
        (d) Ch27 is *mapuche-kai-tren* (Mapuche Kai-Tren), not Mwindo
            material; the Mwindo material is at Ch29
            (chapters/29-mwindo-kirimu.adoc).
      Only (c) is correct: Ch26 = pariacaca-amaru (Andean Pariacaca-
      Amaru). The error pattern suggests an off-by-N drift across the
      Part-I non-Mediterranean chapter listing, consistent with a
      writer-side miscount rather than an attribution drift on
      substance. The named materials (Gonggong, Coatlicue/Coyolxauhqui,
      Mwindo) are attested in the book's catalogue, just not at the
      chapter numbers cited. The §VI bounded-scope argument
      ("independent attestations carry the book's strongest cross-
      cultural typological weight") is itself materially correct; only
      the chapter-pointer book-keeping is wrong.

      The Ch38 §VI back-reference for the Mwindo-as-non-IE-control case
      is correct (Ch38 §VI is the "Mwindo problem as a control"
