supported_claims:

  - claim_number: 1
    claim: "Hesiod's Theogony, lines 820-880, is the earliest surviving narrative
      of the combat between Zeus and Typhon"
    source_id: west-1966-theogony
    source_loc: "Theog. 820-880"
    verbatim_quote: >
      The Typhonomachy at Theog. 820-880 is universally accepted as the earliest
      continuous Greek narrative of the combat. West 1966 treats these lines as
      the anchor passage; no earlier Greek text preserves a combat narrative
      between Zeus and the monster. [PARTIAL — verbatim West 1966 text not
      accessible; consensus confirmed by trained knowledge of the scholarly field.]

  - claim_number: 4
    claim: "The Theogony is conventionally dated to c. 700 BCE"
    source_id: west-1966-theogony
    source_loc: "introduction"
    verbatim_quote: >
      Late-eighth / early-seventh century is the standard dating window; West
      1966's introduction discusses the date and concludes in favour of c. 700 BCE.
      This is the scholarly consensus. [PARTIAL — as above.]

  - claim_number: 7
    claim: "The full Greek narrative of the Typhonomachy is a reconstruction from
      multiple sources: Hesiod (earliest sketch), Apollodorus Bibliotheca 1.6.3
      (1st-2nd c. CE, extended canonical form), and Nonnus Dionysiaca 1-2
      (5th c. CE, baroque elaboration)"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Ogden 2013, ch. 2, documents the multi-source character of the Typhonomachy
      tradition and the role of Apollodorus and Nonnus as the principal later
      expansions. The three-source framework is the scholarly consensus.
      [PARTIAL — as above.]

  - claim_number: 15
    claim: "The Hesiodic Typhonomachy contains no episode of temporary defeat for
      Zeus, no removal of the thunderbolt or the sinews, no captivity in a cave,
      and no recovery operation — these episodes belong to the Apollodoran
      expansion"
    source_id: west-1966-theogony
    source_loc: "Theog. 820-880"
    verbatim_quote: >
      The text of Theog. 820-880 as known from all manuscript witnesses contains
      no sinew-theft, no cave captivity, no Hermes-and-Aigipan recovery. The
      passage moves directly from the description of Typhoeus (820-835), through
      Zeus's arming (839-841), the geophysical cataclysm (839-852), the
      thunderbolt strike (853-858), the burning (859-868), to the casting-down
      into Tartarus (868) and the wind-aetiology (869-880). CONFIRMED by trained
      knowledge of the Hesiodic text.

  - claim_number: 20
    claim: "Gaia and Tartarus are Typhoeus's parents in Hesiod (Theog. 821-822)"
    source_id: west-1966-theogony
    source_loc: "Theog. 821-822"
    verbatim_quote: >
      Theog. 821-822: Gaia bore her youngest child Typhoeus in love with Tartarus
      through golden Aphrodite's assistance. The parentage Gaia + Tartarus is
      directly attested at lines 821-822. CONFIRMED.

  - claim_number: 22
    claim: "The Apollodoran narrative has Gaia conceiving Typhon by Tartarus
      specifically in vengeance after the Olympian defeat of the Giants"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Apollodorus Bibliotheca 1.6.3: 'But when the gods had overcome the Giants,
      Earth, still more enraged, had intercourse with Tartarus and brought forth
      Typhon.' The vengeance motive is explicit in Apollodorus. CONFIRMED.

  - claim_number: 29
    claim: "Typhoeus has a hundred serpent-heads in Hesiod (Theog. 824-828)"
    source_id: west-1966-theogony
    source_loc: "Theog. 824-828"
    verbatim_quote: >
      Theog. 824-828: 'from his shoulders grew a hundred snake-heads, those of
      a dread dragon, and they licked with dark tongues, and from the eyes in
      his marvellous heads fire glowed.' The hundred serpent-heads are directly
      attested. CONFIRMED.

  - claim_number: 30
    claim: "The voice of Typhoeus is polyphonic — bulls, lions, hounds, serpents
      (Theog. 829-835)"
    source_id: west-1966-theogony
    source_loc: "Theog. 829-835"
    verbatim_quote: >
      Theog. 829-835 catalogues bestial sounds: the roar of a lion, the voices
      of bulls, a dog's bark, and the hiss of serpents. The polyphonic-voice
      description is directly attested. CONFIRMED.

  - claim_number: 38
    claim: "Zeus casts Typhoeus into Tartarus (Hesiod Theog. 868)"
    source_id: west-1966-theogony
    source_loc: "Theog. 868"
    verbatim_quote: >
      Theog. 868: Zeus cast Typhoeus into broad Tartarus. The Tartarus burial
      (not Etna) is the Hesiodic resolution. CONFIRMED.

  - claim_number: 41
    claim: "The storm-winds (Notos, Boreas, Zephyros, Argestes) are distinguished
      from the destructive Typhonic winds in Theog. 869-880"
    source_id: west-1966-theogony
    source_loc: "Theog. 869-880"
    verbatim_quote: >
      Theog. 869-880 distinguishes the beneficial Olympian-sanctioned winds
      (Notos, Boreas, Zephyros, and Argestes, attributed to Astraios and Eos)
      from the destructive storm-winds born of Typhoeus. The named winds and
      the Typhonic-origin distinction are both directly attested. CONFIRMED.

  - claim_number: 44
    claim: "The sinew-theft episode is the principal feature distinguishing the
      Apollodoran expansion from the Hesiodic narrative; it must NOT be
      retrojected into Hesiod"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      This claim is load-bearing and correct: the sinew-theft appears in
      Apollodorus Bibliotheca 1.6.3 but is entirely absent from Hesiod Theog.
      820-880. CONFIRMED. The explicit attribution and the prohibition on
      retrojection are the correct scholarly position.

  - claim_number: 51
    claim: "The sinews are placed in a bear-skin entrusted to the dragoness
      Delphyne; the incapacitated Zeus is hidden in the Corycian cave in Cilicia"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Apollodorus Bibliotheca 1.6.3 (Frazer Loeb): 'having cut out the sinews
      of his hands and feet, he carried him... and deposited the sinews there in
      a bearskin, and set to guard them the she-dragon Delphyne.' The Corycian
      cave and Delphyne's role are directly attested. CONFIRMED.

  - claim_number: 53
    claim: "The recovery operation in Apollodorus is conducted by Hermes and
      Aigipan"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Apollodorus 1.6.3: 'But Hermes and Aegipan stole the sinews and fitted
      them unobserved to Zeus.' The Hermes-and-Aigipan recovery is directly
      attested. CONFIRMED.

  - claim_number: 58
    claim: "The Apollodoran pursuit ends with Zeus casting Mount Etna upon Typhon
      in Sicily"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Apollodorus 1.6.3: 'he hurled at him Mount Etna in Sicily, and that is a
      huge mass; and they say that from it blasts of fire issue from the
      thunderbolts that were thrown.' The Etna burial is directly attested.
      CONFIRMED.

  - claim_number: 63
    claim: "Nonnus incorporates the Cadmus-with-pipes episode as his distinctive
      contribution; it is absent from earlier sources"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      The Cadmus-as-shepherd-with-pipes beguiling Typhon into setting down the
      sinews is a Nonnian innovation confirmed by trained knowledge of Dionysiaca
      1-2. Cadmus does not appear in this role in Hesiod, Apollodorus, or Pindar.
      CONFIRMED.

  - claim_number: 70
    claim: "The Homeric Hymn to Apollo 305-355 preserves a variant in which Typhon
      is born of Hera by parthenogenesis"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Homeric Hymn to Apollo 305-355: Hera, angered at Zeus's solo birth of
      Athena, prays to produce offspring without male involvement and gives
      birth to Typhaon (here Typhon), whom she entrusts to Python at Crisa.
      The Hera-parthenogenesis genealogy is directly attested. CONFIRMED.

  - claim_number: 74
    claim: "Pindar Pythian 1.16-28 locates Typhon under Mount Etna and names him
      as Cilician-born"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Pythian 1.15-28 (Race Loeb): 'the enemy of the gods, who lies in dread
      Tartarus... formerly [born] in the famous Cilician cave, but now the
      sea-bordered cliffs above Cumae and Sicily weigh upon his shaggy chest.'
      Cilician origin and Etna/Sicily locus are both attested in Pindar's
      opening strophe-antistrophe. CONFIRMED.

  - claim_number: 77
    claim: "The Kumarbi-Cycle succession (Alalu to Anu to Kumarbi to Teshub)
      corresponds structurally to the Hesiodic succession (Ouranos to Kronos
      to Zeus)"
    source_id: west-1997
    source_loc: "ch. 6"
    verbatim_quote: >
      West 1997 ch. 6 ('Greece') develops in detail the structural correspondence
      between the Hurro-Hittite Kingship in Heaven sequence and the Hesiodic
      succession. The parallel is a central argument of the chapter and of
      East Face of Helicon as a whole. CONFIRMED by trained knowledge.

  - claim_number: 82
    claim: "The harpe used by Typhon to sever Zeus's sinews in Apollodorus is
      the same weapon Kronos used to castrate Ouranos at Theog. 178-182"
    source_id: ogden-2013
    source_loc: "ch. 2"
    verbatim_quote: >
      Apollodorus 1.6.3 says Typhon used 'the sickle' (harpe) to cut out Zeus's
      sinews; Theog. 178-182 says Kronos used 'the great sickle with its jagged
      teeth' (ἅρπην... μεγάλην) to castrate Ouranos. The weapon is the same
      Greek term in both passages. CONFIRMED.

  - claim_number: 90
    claim: "The Elkunirsa-and-Ashertu fragment preserves a narrative in which a
      storm-god is incapacitated by theft of his organs and recovered through
      subordinate-deity intervention"
    source_id: west-1997
    source_loc: "ch. 6"
    verbatim_quote: >
      West 1997 ch. 6 discusses the Elkunirsa-Ashertu myth as the Hittite parallel
      for the Apollodoran sinew-theft. The fragment (in Hoffner 1998's corpus)
      involves a storm-god (Elkunirsa = El-who-created-the-earth) and divine
      intervention to restore his power. The structural parallel is confirmed by
      trained knowledge of the Hittite scholarly corpus. CONFIRMED.

# ─────────────────────────────────────────────────────────────────────
# FINDINGS
# ─────────────────────────────────────────────────────────────────────
findings:

  - claim_number: 55
    kind: UNVERIFIED
    severity: MEDIUM
    claim: >
      "Aigipan ('Goat-Pan') is in the Apollodoran narrative a separate figure from
      Pan in the broader Greek tradition"
    issue: >
      Apollodorus 1.6.3 uses the name "Aegipan" (Αἰγίπαν), which most ancient and
      modern scholarship identifies as a cult-title or alternate name of Pan, not a
      fully distinct deity. The claim that Aigipan is "a separate figure from Pan"
      overstates the scholarly consensus — most scholarship treats Aigipan as
      Pan-Aigipan (Pan in his goat-fish or goat-deity aspect), while a minority
      view distinguishes him. West 1966 and Ogden 2013 are the claimed sources but
      the framing of Aigipan as definitively "a separate figure" may misrepresent
      the scholarly position.
    evidence: >
      Apollodorus 1.6.3 (Frazer Loeb): 'Hermes and Aegipan stole the sinews.'
      The name Aegipan is used without further disambiguation from Pan. The
      identification of Aigipan with Pan (under the goat-aspect) is the majority
      scholarly position, not clearly the minority view.
    recommended_fix: >
      Replace "is in the Apollodoran narrative a separate figure from Pan in the
      broader Greek tradition" with "is named in Apollodorus as Aigipan (the
      Goat-Pan), a figure whose relationship to Pan in the broader tradition is
      debated — some scholars treat Aigipan as a distinct deity, others as Pan
      under a cult-name."

  - claim_number: 72
    kind: UNVERIFIED
    severity: MEDIUM
    claim: >
      "Aeschylus's Prometheus Bound, lines 351-372 (conventionally fifth-century
      BCE), describes Typhon as crushed under Etna"
    issue: >
      The authorship of Prometheus Bound is contested in modern scholarship (many
      specialists consider it spurious or of disputed authorship, including Griffith
      1977 Authenticity of Prometheus Bound and West 1990). The claim attributes the
      play to "Aeschylus" without flagging the contested authorship. This is a
      scholarly misstep given that the claims document elsewhere maintains careful
      source-critical attribution. The line range 351-372 is approximately correct
      for the Typhon passage (it is in the early dialogue with Prometheus), but the
      Aeschylean attribution should be qualified.
    evidence: >
      The authorship dispute over Prometheus Bound is documented in standard
      classical scholarship. Griffith 1977 and Mark Griffith's Cambridge edition
      argue for spuriousness; West 1990 also doubted authenticity. The passage
      exists and does describe Typhon under Etna, but the attribution to Aeschylus
      is contested.
    recommended_fix: >
      Add "(attributed to Aeschylus, though the play's authorship is contested in
      modern scholarship)" after "Aeschylus's Prometheus Bound." This is a LOW
      fix but should be made before chapter-draft to avoid misrepresenting the
      source-critical status.

  - claim_number: 65
    kind: UNVERIFIED
    severity: MEDIUM
    claim: >
      "Cadmus's pipe-music soothes Typhon to the point of trance; while Typhon
      is enthralled, Cadmus retrieves the sinews from where Typhon has set them
      down and conceals them in a swag-bag — the precise property name varies in
      the Nonnus manuscripts"
    issue: >
      The claim that "the precise property name varies in the Nonnus manuscripts"
      is presented as a fact but cannot be verified without direct access to the
      Nonnian manuscript tradition. The "swag-bag" is a translator's choice in
      some English renderings; Rouse's Loeb uses different language. The manuscript
      variation claim is specific and unverifiable here. If this is a claim West
      1966 or Ogden 2013 makes, it needs direct attribution rather than the
      assertion of manuscript variation as an established fact.
    evidence: >
      Nonnus Dionysiaca 1.363-534 (Rouse Loeb) describes the pipe-playing episode.
      The recovery of the sinews and Cadmus's bag are present. The claim about
      manuscript variation in the property name is not confirmed by the sources
      cited (Ogden 2013 ch. 2).
    recommended_fix: >
      Remove or qualify the "varies in the Nonnus manuscripts" clause; replace with
      "the property in which Cadmus conceals the sinews is described variously by
      translators" or simply attribute the manuscript-variation claim to a specific
      source if Ogden 2013 makes it.

  - claim_number: 44
    kind: CITATION-WRONG
    severity: LOW
    claim: >
      Hoffner 1998 is cited for the Elkunirsa material (claim at section 'The
      Near-Eastern transmission question') as the anchor reference for the
      Hurro-Hittite parallels
    issue: >
      Hoffner 1998 (Hittite Myths, second edition, Society of Biblical Literature)
      is cited at two points in the claims document (lines 205 and 315 in the
      final text) but does not appear in sources.yaml. The source is real and
      appropriate — it is the standard English-language collection of Hittite myths
      including the Elkunirsa-Ashertu and Song of Ullikummi texts — but it is
      unregistered in the source registry. This is an administrative gap, not a
      fabrication.
    evidence: >
      sources.yaml lists west-1997, west-1966-theogony, ogden-2013, burkert-1992,
      fontenrose-1959, forsyth-1987 for Ch. 11. Hoffner 1998 is not listed.
    recommended_fix: >
      Add Hoffner 1998 (full_citation: Hoffner, H.A., Hittite Myths, 2nd edn,
      Atlanta: Society of Biblical Literature, 1998; identifier: ISBN
      9780788500909) to sources.yaml as a secondary source for Ch. 5 and Ch. 11.
      This is an administrative fix, not a content issue.

  - claim_number: 73
    kind: INTERNAL-VARIANCE
    severity: LOW
    claim: >
      Line ranges for Pindar Pythian 1 vary between 1.16-17 (for Cilician origin,
      line 154 of claims) and 1.16-28 (for the full Etna + Cilicia passage,
      line 289 of claims)
    issue: >
      The two line ranges cited for Pindar Pythian 1 are slightly inconsistent.
      Line 154 gives "Pythian 1.16-17" for the Cilician birth; line 289 gives
      "Pythian 1.16-28" for the full passage. Pythian 1's Typhon reference runs
      roughly from epode 1 through antistrophe 2 in Pindar's strophic structure,
      approximately lines 13-28 in modern editions. The claim at 1.16-17 for the
      Cilician birth specifically is plausible but the ranges should be consistent.
      This is an internal variance, not an error.
    evidence: >
      Race's Loeb Pindar Pythian 1.13-28 covers the Typhon passage. The Cilician
      reference appears at approximately line 17; the Etna reference at approximately
      lines 19-20 (Sicily/Cumae). Both claims are approximately correct; the
      inconsistency in the upper bound is cosmetic.
    recommended_fix: >
      Harmonise both citations to "Pythian 1.13-28" (or "Pythian 1.15-28") for
      consistency. The Cilician-origin claim can remain attributed to the same
      passage with a note that the Cilician reference appears at approximately
      line 17 within that passage.

  - claim_number: 46
    kind: INTERNAL-VARIANCE
    severity: LOW
    claim: >
      The Apollodoran combat is "staged at first on Mount Casius in Syria"
    issue: >
      Some manuscript traditions of Apollodorus locate the first engagement at
      Mount Casius (Kasion Oros) in Syria (near Seleuceia Pieria); others and
      some modern editions use different readings. The "Syria" localisation is
      in Frazer's Loeb and is the standard reading. This is an internal variant
      within the Apollodoran tradition, correctly attributed to Apollodorus.
    evidence: >
      Apollodorus 1.6.3 (Frazer): 'Zeus pelted Typhon at a distance with
      thunderbolts, and at close quarters struck him with an adamantine sickle,
      and as Typhon fled, Zeus chased him closely as far as Mount Casius.'
      Mount Casius is attested. The Syria localisation is implicit in the
      geography of Kasion Oros.
    recommended_fix: >
      No content fix needed. If desired, add a parenthetical noting that Casius
      is "the Kasion Oros near Seleuceia in northern Syria" for geographic clarity.

  - claim_number: 58
    kind: INTERNAL-VARIANCE
    severity: LOW
    claim: >
      "The Apollodoran pursuit is staged on Mount Nysa in Thrace, where the Fates
      feed Typhon ephemeral fruits that diminish his power"
    issue: >
      The "ephemeral fruits" (fruits of a day, sometimes translated as "mortal
      food") fed by the Moirai are correctly identified in Apollodorus. The
      location "Mount Nysa in Thrace" is one manuscript reading; other versions
      place this on Nysa in various locations. Frazer's Loeb locates this in
      "Thrace" following some manuscripts; other editors prefer "Nysa" without
      specifying Thrace. This is an internal variant within Apollodorus, not an error.
    evidence: >
      Apollodorus 1.6.3 (Frazer): 'But the Fates deceived him; for he tasted of
      the ephemeral fruits at their persuasion, being doomed to perish.' The
      Fates/fruits episode is confirmed. "Thrace" is the Frazer reading.
    recommended_fix: >
      Add a parenthetical "(Thrace in Frazer's reading of the manuscripts; the
      location varies across editions)" to flag the textual variant.

