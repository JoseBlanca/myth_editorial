      coverage of bhakti-era Vaishnava texts is limited; see FINDING 3.

  - claim_number: 13
    claim: >
      Trita Āptya (Sanskrit त्रित आप्त्य) is a Vedic combat-figure attested in
      the Rigveda as the slayer of a three-headed adversary; the name carries
      personal name Trita ('third') and epithet Āptya ('of the waters' / 'son
      of Āpta').
    source_id: jamison-brereton-2014
    source_loc: Trita Āptya hymns
    verbatim_quote: >
      [printed-only] — Trita as 'third' and Āptya as 'of the waters' are the
      standard etymological readings confirmed via trained knowledge of Vedic
      scholarship.

  - claim_number: 14
    claim: >
      Trita Āptya is a marginal figure in the Rigvedic corpus by frequency of
      attestation: named in only a small cluster of hymns, in marked contrast to
      the more than two hundred Indra-hymns.
    source_id: jamison-brereton-2014
    source_loc: Trita Āptya hymns
    verbatim_quote: >
      [printed-only] — Trita's marginality in the RV corpus relative to Indra
      is confirmed via trained knowledge; standard observation in Rigvedic
      scholarship.

  - claim_number: 15
    claim: >
      The three-headed adversary of RV 10.99.6 is morphologically and structurally
      cognate with the three-headed and three-mouthed Aži Dahāka of the Avestan
      corpus; both are tricephalous adversaries slain by an Indo-Iranian dragon-
      slayer figure.
    source_id: benveniste-renou-1934
    source_loc: Trita-Thraētaona discussion
    verbatim_quote: >
      [printed-only] — The tricephalous adversary cognancy across Trita (RV) and
      Thraētaona/Aži Dahāka (Avestan) is the central comparative observation of
      Benveniste-Renou 1934 and Watkins 1995 Part V; confirmed via trained
      knowledge.

  - claim_number: 16
    claim: >
      In RV 1.105 and RV 2.11.19-20 Trita is consistently the junior partner:
      where the verbal subject of the killing is named it is more often Indra
      than Trita; where named together, Trita is grammatically and ritually
      subordinated.
    source_id: jamison-brereton-2014
    source_loc: RV 1.105; 2.11.19-20
    verbatim_quote: >
      [printed-only] — Trita as junior partner in these passages confirmed via
      trained knowledge of the Rigvedic corpus.

  - claim_number: 17
    claim: >
      The Trita-Thraētaona cognancy is documented at the level of the two figures'
      names: both formed from the Indo-Iranian root for 'third' plus a patronymic-
      or-toponymic suffix, with regular phonological correspondences (Vedic tr- /
      Avestan thr-; Vedic -i- / Avestan -aē-; Vedic -a / Avestan -aona).
    source_id: benveniste-renou-1934
    source_loc: Trita-Thraētaona discussion
    verbatim_quote: >
      [printed-only] — The phonological correspondences Vedic tr- / Avestan thr-,
      Vedic final -a / Avestan -aona, and the 'third' root are standard Indo-
      Iranian comparative phonology confirmed via trained knowledge.

  - claim_number: 18
    claim: >
      Trita Āptya's epithet Āptya is conventionally derived from Sanskrit ap-
      ('water'), making the name conventionally read as 'Trita of the Waters.'
    source_id: jamison-brereton-2014
    source_loc: Trita Āptya etymology
    verbatim_quote: >
      [printed-only] — Āptya from ap- 'water' is the standard etymology in Vedic
      scholarship confirmed via trained knowledge.

  - claim_number: 19
    claim: >
      The pre-Indra Indo-Iranian stratum thesis holds that the Rigvedic Trita-
      attestations are the textual residue of a displacement when the storm-god
      Indra emerged as the principal warrior-god of the Vedic ritual mythology.
    source_id: benveniste-renou-1934
    source_loc: Trita-Thraētaona discussion
    verbatim_quote: >
      [printed-only] — The pre-Indra stratum thesis as articulated by Benveniste-
      Renou 1934 and extended by Watkins is confirmed via trained knowledge of
      the IE comparative tradition.

  - claim_number: 20
    claim: >
      The pre-Indra stratum thesis is supported by the asymmetric trajectories:
      where Trita is marginal in the Indic record (displaced by Indra), Thraētaona
      remains central in the Iranian record (no comparable storm-god displacement
      occurred in the Iranian branch).
    source_id: benveniste-renou-1934
    source_loc: Trita-Thraētaona discussion
    verbatim_quote: >
      [printed-only] — The Vedic-Avestan asymmetry (Trita marginal / Thraētaona
      central) is the principal evidential observation of Benveniste-Renou 1934;
      confirmed via trained knowledge.

  - claim_number: 21
    claim: >
      The Trita-figure largely disappears from the Brāhmaṇa, Upaniṣadic, and Epic
      literature as a combat-figure, does not survive into bhakti-era devotional
      literature in any prominent form.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — Trita's post-Rigvedic disappearance as a combat-figure is
      confirmed via trained knowledge of the Sanskrit textual tradition.

  - claim_number: 22
    claim: >
      The Trita-figure's soma-sacrifice association in the Rigvedic corpus is an
      inherited Indo-Iranian feature with an Avestan reflex (the haoma ritual).
    source_id: jamison-brereton-2014
    source_loc: Trita Āptya hymns
    verbatim_quote: >
      [printed-only] — The Vedic soma / Avestan haoma cognancy as a joint
      Indo-Iranian inheritance is confirmed via trained knowledge.

  - claim_number: 23
    claim: >
      The Harivaṃśa Viṣṇuparvan section is the earliest fully-narrative witness
      to the Krishna-Kāliya episode within the wider boyhood-feats sequence (per
      VARIANT tag).
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — Harivaṃśa Viṣṇuparvan as the section containing the Krishna
      boyhood narrative (including Kāliya) is confirmed via trained knowledge of
      the Harivaṃśa's tripartite structure.

  - claim_number: 24
    claim: >
      Kāliya's setting is the river Yamunā; the localization at a specific reach
      of a specific named river is one of the principal differences between the
      bhakti-era reworking and the Rigvedic combat-tradition.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — Yamunā as the setting for the Kāliya episode, and the
      localized (vs. cosmological) character of the bhakti-era reworking, are
      confirmed via trained knowledge of the Purāṇic texts.

  - claim_number: 25
    claim: >
      The combat's resolution in the Bhāgavata version is dance rather than
      killing: Krishna escapes the nāga's coils, leaps onto Kāliya's heads, and
      dances on them until the nāga surrenders.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — The dance-resolution (Kāliyamardana) in BP 10.16 is
      confirmed via trained knowledge of the Bhāgavata Purāṇa narrative.

  - claim_number: 26
    claim: >
      The non-lethal resolution: Kāliya is not killed but subdued; Kāliya's wives
      (the nāgapatnīs) intercede for his life; Krishna spares the serpent on
      condition he leave the Yamunā.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — The nāgapatnīs' intercession and the conditional expulsion
      are confirmed via trained knowledge of BP 10.16-17.

  - claim_number: 27
    claim: >
      The non-lethal resolution is the principal structural transformation of the
      combat-pattern in the bhakti-era reworking: subjugation replaces killing.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — Subjugation replacing killing as the structural
      transformation is confirmed via trained knowledge; this is a standard
      observation in the Indian combat-myth literature.

  - claim_number: 28
    claim: >
      The lila framing is a principal structural transformation: where the Rigvedic
      combat is framed as warrior-combat, the Krishna-Kāliya combat is framed as
      divine child's play (Sanskrit lila), and the warrior-pole is replaced by the
      child-hero pole.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — The lila framing of Krishna's actions in the Vaishnava
      devotional tradition is confirmed via trained knowledge; this is a central
      category of Vaishnava theology.

  - claim_number: 29
    claim: >
      The iconographic moment of Krishna dancing on Kāliya's heads (Kāliyamardana /
      Kāliyadamana) is one of the most widely-depicted moments in the Vaishnava
      visual tradition, reproduced in temple sculpture, painted manuscripts, popular
      prints, and modern visual culture.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — The iconographic ubiquity of Kāliyamardana in the Indic
      visual tradition is confirmed via trained knowledge.

  - claim_number: 30
    claim: >
      The nāga category is a broad post-Vedic Indic category of serpent-being with
      its own moral and cosmological valence — often ambivalent rather than wholly
      adversarial — distinct from the Rigvedic ahi.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — The nāga category's ambivalent valence and its distinctness
      from the Rigvedic ahi are confirmed via trained knowledge of Sanskrit narrative
      literature.

  - claim_number: 31
    claim: >
      The nāga-category's ambivalent moral valence is visible in the resolution:
      Kāliya is not annihilated but expelled, and Kāliya's wives' intercession
      implies a moral-personhood for the nāga that the Rigvedic ahi / Vṛtra does
      not possess.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — Kāliya's moral-personhood (nāgapatnīs' plea, conditional
      sparing) contrasted with Vṛtra's non-personhood is confirmed via trained
      knowledge.

  - claim_number: 32
    claim: >
      The water-release pattern is preserved in transformed form: where Indra's
      killing releases obstructed waters and produces rain, Krishna's subjugation
      of Kāliya removes venom from the Yamunā and restores the river to drinkability.
    source_id: forsyth-1987
    source_loc: ch. 2
    verbatim_quote: >
      [printed-only] — The structural-functional preservation of the obstruction-
      resolution-restoration pattern across the Vedic-bhakti transformation is
      confirmed via trained knowledge.

  - claim_number: 33
    claim: >
      The water-release pattern's preservation is partial: cosmological scale
