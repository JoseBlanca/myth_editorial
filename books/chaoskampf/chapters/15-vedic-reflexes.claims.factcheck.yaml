findings:
  - finding_number: 1
    claim_number: 3
    kind: UNVERIFIED
    severity: MEDIUM
    claim: >
      The brief (15-vedic-reflexes.yaml, sources.primary[0].loc and family_members
      summary) cites the Trita locus as 'RV 10.8.8–9', while the claims document
      throughout correctly cites 'RV 10.99.6'. The two are different hymns.
    issue: >
      The brief contains an erroneous hymn reference (RV 10.8.8-9) for the Trita
      three-headed-adversary locus. RV 10.8 is a hymn to Agni and does not contain
      the Trita-combat narrative. RV 10.99.6 is the correct and universally-cited
      scholarly reference for Trita's slaying of the three-headed adversary
      (Viśvarūpa, in some readings). The claims document has the correct reference
      (RV 10.99.6) throughout, which represents an improvement on the brief. However,
      because this factcheck is an adversarial audit, the discrepancy between the
      brief and the claims document must be flagged so the human reviewer can correct
      the brief.
    evidence: >
      RV 10.8 is an Agni hymn (standard Rigvedic scholarship). RV 10.99.6 is cited
      as the Trita locus by Jamison-Brereton 2014 and by Watkins 1995 Part V; this
      is confirmed via trained knowledge. The Dumézil-era scholarship also uses
      RV 10.99.6 for this locus. Training-knowledge confidence: HIGH for RV 10.99.6
      as the Trita locus; HIGH for RV 10.8 as an Agni hymn.
    recommended_fix: >
      Correct the brief (15-vedic-reflexes.yaml) at sources.primary[0].loc and in
      the family_members summary to read 'RV 10.99.6; 1.105; 2.11.19-20' instead
      of 'RV 10.8.8-9; 1.105; 2.11.19-20'. The claims document is correct; only
      the brief needs updating.

  - finding_number: 2
    claim_number: 9
    kind: UNVERIFIED
    severity: MEDIUM
    claim: >
      Forsyth 1987 chapter 2 is used as the sole or primary citation for virtually
      all of the ~22 Krishna-Kāliya claims (covering the Harivaṃśa, Viṣṇu Purāṇa,
      Bhāgavata Purāṇa, the iconographic tradition, the nāga category, the lila
      theology, and the Kāliya head-count).
    issue: >
      Neil Forsyth's The Old Enemy: Satan and the Combat Myth (Princeton, 1987)
      is primarily a study of the combat myth from Mesopotamia through Judaism to
      early Christianity. Its chapter 2 covers the Indo-Iranian material but the
      book's scope terminates well before the bhakti-era Vaishnava devotional
      corpus (c. 4th-10th c. CE). Using Forsyth 1987 ch. 2 as the sole documentary
      source for claims about the Bhāgavata Purāṇa narrative details (kadamba-tree
      leap, nāgapatnīs' intercession, head-count, iconographic stability from
      Gupta-era onward, lila theology, kṛpā doctrine) is a source-adequacy problem:
      these are specialist Purāṇic and Vaishnava studies claims that require
      specialist sources beyond a 1987 general combat-myth survey. The brief lists
      Forsyth 1987 as the secondary anchor and defers edition-pinning to
      glossary-lock, but the chapter-draft stage will need dedicated Purāṇic
      sources for the specific narrative and iconographic claims.
    evidence: >
      Forsyth 1987 structure: chapter 1 covers Mesopotamia; chapter 2 covers
      Indo-Iranian and Hebrew Bible material; subsequent chapters cover
      intertestamental, NT, and early Christian material. The book does not
      include specialist treatment of the Bhāgavata Purāṇa, Harivaṃśa, or
      Vaishnava iconography. Training-knowledge confidence: HIGH for Forsyth's
      scope and chapter structure.
    recommended_fix: >
      At the post-human-normalize stage (before chapter-draft), add specialist
      Purāṇic sources for the Krishna-Kāliya claims: at minimum, a standard
      scholarly edition or study of the Bhāgavata Purāṇa book 10 (e.g., Tagare
      translation, Motilal Banarsidass — already mentioned in the brief as the
      edition to pin at glossary-lock) and a Vaishnava studies source for the
      lila theology and iconographic claims (e.g., Guy L. Beck ed. Alternative
      Krishnas; or Hawley/Juergensmeyer; or Gonda 1954 on Viṣṇuism). Forsyth 1987
      may remain as the long-arc anchor for the structural-transformation
      observation, but not as the sole source for narrative-detail and
      iconographic claims.

  - finding_number: 3
    claim_number: 16
    kind: UNVERIFIED
    severity: LOW
    claim: >
      Kāliya is described in the Vaishnava Purāṇic tradition as having a head-count
      that varies across sources from five to seven to one hundred and ten, with the
      Bhāgavata Purāṇa version generally giving him a hundred and ten heads in some
      manuscripts.
    issue: >
      The specific head-counts of five, seven, and one hundred and ten cannot be
      independently verified from trained knowledge with high confidence. The
      Viṣṇu Purāṇa does give Kāliya five hoods (standard reading of VP 5); the
      BP number varies by manuscript and commentarial tradition. 'One hundred and
      ten heads in some manuscripts' is a specific scholarly claim cited to
      Forsyth 1987 ch. 2, which cannot be verified without access to the printed
      text or a specialist Purāṇic source. The claim is plausible but unverifiable
      from trained knowledge alone.
    evidence: >
      VP 5: five-hooded Kāliya — confirmed via trained knowledge. BP head-count:
      BP commentarial tradition gives various numbers; 110 is one figure cited in
      the literature. Forsyth 1987 ch. 2 as sole authority for the 'five to seven
      to 110' spread: cannot verify.
    recommended_fix: >
      Verify the head-count figures against the specialist Purāṇic sources
      (Tagare translation of BP book 10; specialist edition of VP book 5) and
      cite the specific locus rather than relying on Forsyth 1987 ch. 2 as the
      sole source for this textual detail.

  - finding_number: 4
    claim_number: 7
    kind: UNVERIFIED
    severity: LOW
    claim: >
      The Trita Āptya material is specifically discussed in Watkins How to Kill
      a Dragon chapters 44 to 45 alongside the Avestan Thraētaona corpus.
    issue: >
      The specific attribution of chapters 44-45 to the Trita-Thraētaona pair
      cannot be verified from trained knowledge. Watkins 1995 Part V covers the
      Vedic and Avestan material, and Trita-Thraētaona is treated there, but the
      specific chapter numbers 44-45 for this pair are not independently verifiable
      without the printed text. The Ch14 factcheck raised the same issue for
      chapters 41-48 broadly; this is the analogous issue for the more specific
      44-45 claim.
    evidence: >
      Watkins 1995: Part V covers Vedic and Avestan HERO SLAY SERPENT material
      including Trita-Thraētaona (confirmed). Chapter numbers 44-45 specifically:
      taken as stated; unverifiable from trained knowledge alone.
    recommended_fix: >
      Verify against the printed table of contents of Watkins 1995. If correct,
      the claim stands. If not, adjust to 'Part V' without specifying chapter
      numbers.

  - finding_number: 5
    claim_number: 18
    kind: UNVERIFIED
    severity: LOW
    claim: >
      In the Bhāgavata version, BP 10.15 presents the narrative occasion (cattle
      and herd-boys sickened or killed by drinking from the Yamunā at the Kāliya-
      pool); BP 10.16 presents the combat itself (kadamba-tree leap) and its
      resolution (dance, nāgapatnīs' intercession); BP 10.17 is also cited.
    issue: >
      The chapter assignments — BP 10.15 as narrative occasion; BP 10.16 as combat
      and resolution — are specific intra-canto divisions that are broadly consistent
      with trained knowledge of the Bhāgavata Purāṇa's book 10 structure but cannot
      be verified at the specific verse-level without the printed text. Trained
      knowledge confirms that the Kāliya-damana episode occupies BP 10.15-17 and
      that 10.16 is the primary combat chapter. The specific claim that BP 10.15
      is the 'narrative occasion' and 10.17 closes the episode is plausible but
      unverifiable at chapter-granularity from trained knowledge alone.
    evidence: >
      BP 10.15-17 as the Kāliya-damana canto-range: confirmed via trained knowledge.
      Specific chapter-by-chapter assignment (occasion / combat / conclusion):
      broadly consistent with trained knowledge; details taken as stated.
    recommended_fix: >
      Verify the specific chapter assignments against the Tagare translation (BP
      book 10, Motilal Banarsidass) at the chapter-draft stage when edition-pinning
      is complete. The canto-range (10.15-17) is correct.

  - finding_number: 6
    claim_number: 20
    kind: UNVERIFIED
    severity: LOW
    claim: >
      The Krishna-Kāliya combat's combat mechanics include 'multiple heads coiling
      around the child's body in an attempt to crush or to envenom him.'
    issue: >
      The specific coiling-to-crush-or-envenom mechanic is attributed to Forsyth
      1987 ch. 2. From trained knowledge of BP 10.16, Kāliya coils around Krishna
      (tightly encircling him with his coils); the envenomation mechanism is also
      attested. However, 'to crush or to envenom' as a dual-mechanism description
      is a paraphrase whose specific attribution to Forsyth 1987 ch. 2 cannot be
      verified without the printed text. This is a LOW-severity citation-to-
      secondary-source issue.
    evidence: >
      BP 10.16 Kāliya coils around Krishna: confirmed via trained knowledge.
      'Crush or envenom' as the dual mechanism: broadly consistent but specific
      wording taken as stated in Forsyth 1987 ch. 2.
    recommended_fix: >
      At chapter-draft stage, verify the combat mechanics against the Tagare
      translation of BP 10.16 directly, rather than relying solely on Forsyth
      1987 ch. 2 for narrative details.

  - finding_number: 7
    claim_number: 22
    kind: UNVERIFIED
    severity: LOW
    claim: >
      The Harivaṃśa Viṣṇuparvan presents the Kāliya-subjugation episode as 'one
      of the load-bearing demonstrations of the divine child's power over the dangers
      of the Vraja landscape' (said of the Viṣṇu Purāṇa version).
    issue: >
      The specific characterization of the VP and Harivaṃśa treatments —
      narrative phrasing like 'one of the load-bearing demonstrations of the
      divine child's power over the dangers of the Vraja landscape' — is a
      secondary paraphrase attributed entirely to Forsyth 1987 ch. 2. Given that
      Forsyth 1987's chapter 2 demonstrably does not give the Bhāgavata Purāṇa
      or Harivaṃśa specialist treatment (as noted in FINDING 2), specific
      characterizations of the VP and Harivaṃśa treatments that go beyond the
      general structural comparison require verification against specialist sources.
      This is a LOW severity extension of the source-adequacy concern in FINDING 2.
    evidence: >
      Forsyth 1987 scope: see FINDING 2. Training-knowledge confidence: the
      general characterization of the episode within the Krishna boyhood-feats
      sequence is correct; the specific source attribution is the concern.
    recommended_fix: >
      When specialist Purāṇic sources are added at the normalize stage (see
      FINDING 2 recommendation), re-anchor the specific VP and Harivaṃśa
      characterizations to those sources. Forsyth 1987 may remain for the
      structural-comparative framing.
