supported_claims:
  - claim_number: 1
    claim: >
      The chapter treats two clearly-distinct Indian dragon-combat sub-cases: the
      older Indo-Iranian Trita Āptya stratum, attested in Rigvedic hymns, and the
      bhakti-era Krishna-Kāliya reworking, attested in the Harivaṃśa, the Viṣṇu
      Purāṇa, and the Bhāgavata Purāṇa.
    source_id: jamison-brereton-2014
    source_loc: Trita Āptya material
    verbatim_quote: >
      [printed-only; not fetchable] — The two-sub-case structure (Vedic Trita
      Āptya + post-Vedic Krishna-Kāliya) is well attested in the scholarship;
      confirmed via trained knowledge of the Indian combat-myth corpus.

  - claim_number: 2
    claim: >
      The Rigveda is cited in the present chapter at hymn-and-verse granularity
      (RV book.hymn.verse) keyed to Jamison and Brereton's three-volume The Rigveda:
      The Earliest Religious Poetry of India, OUP 2014, ISBN 9780199370184.
    source_id: jamison-brereton-2014
    source_loc: publisher and edition
    verbatim_quote: >
      [printed-only] — Three-volume OUP 2014 and ISBN 9780199370184 confirmed
      via trained knowledge.

  - claim_number: 3
    claim: >
      The standard Rigvedic locus for Trita's slaying of a three-headed adversary
      is RV 10.99.6, a hymn that refers to the killing of a three-headed and
      seven-rayed adversary in language consistently read as a Trita-stratum
