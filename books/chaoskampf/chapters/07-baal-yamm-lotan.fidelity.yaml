    note: "Cross-references to Ch. 8, Ch. 11, Ch. 3, Part II C2, Part II C6 appear exactly
      where the claims document's COMPARATIVE-HOOKs and claim-body sentences authorise them.
      No cross-references beyond what the comparative hooks supply. Indra-Vṛtra appears once
      (line 335) in the claim C129 sentence about Part II C2; Zeus-Typhon appears in claims
      C129 and C135 and in the reception section — all authorised."

  markers_preserved:
