findings:
  - kind: IMPLICIT-ADDITION
    severity: LOW
    claim_number: ~
    narrative_location: "lines 55–56"
    issue: "Unfootnoted editorial bridge paragraph introduces a structural frame ('Two features
      of this dossier set the framing for everything that follows') before the Setting section."
    detail: "The paragraph at lines 55–56 summarises two features already present in the
      source-overview claims (the single named scribe / six-tablet provenance, and the
      kingship-redistribution reading), then states 'The chapter is built around that second
      feature.' This is a structural connector, not a new factual assertion. No new facts are
      introduced beyond what claims C1–C21 and C34–C35 contain. No footnote required."
    recommended_fix: "No change required. The paragraph is an acceptable editorial frame with
      no new factual content."

  - kind: IMPLICIT-ADDITION
    severity: LOW
    claim_number: ~
    narrative_location: "lines 96–98, 166–170, 234, 276, 297, 342, 368"
    issue: "Multiple unfootnoted analytical bridge paragraphs consolidate already-stated claims
      into structural summaries ('The cast assembled here matters…', 'It is worth pausing on
      the two-mace combat…', 'The two movements of the Cycle taken together…', 'The discipline
      imposed by the brief…', 'The position taken here is therefore…', 'The accumulated
      weight of Ballentine's four observations…', 'The triangulation that closes the chapter…')."
    detail: "Each of these paragraphs draws exclusively on facts stated in the claims-body
      sentences immediately preceding them. No new sources are introduced; no new factual
      assertions are made. The paragraphs function as argumentative summaries and explicit
      policy-transparency statements, not as new content. All meet the Gunkel-Ballentine
      section's authorised scope (the debate section does not expand beyond what the claims
      document supplies). This is consistent with how prior chapters handled connective prose
      (cf. ch06 fidelity)."
    recommended_fix: "No change required."

additional_checks:
  lotan_retrospective:
    status: PASS
    note: "The Lôtan passage (lines 236–276) is strictly retrospective throughout. The combat
      itself is never narrated. The passage at lines 240–241 names Lôtan's epithets and
      seven-headed form as on-text Ugaritic facts from Smith & Pitard. Lines 247–250 present
      the passage as a retrospective taunt by Mot recalling Lôtan's defeat as past event.
      Line 257 explicitly states the combat 'is not narrativised.' Line 259 explicitly
      declines to import from Hebrew Bible or Mesopotamian parallels. Line 273 states the
      handling is 'deliberately minimal.' Lines 276–277 provide an unfootnoted methodological-
      hygiene paragraph that reinforces the retrospective-only constraint without adding new
      claims. No Baal-Lôtan combat is narrated at any point."

  no_hebrew_bible_backfill:
    status: PASS
    note: "The Hebrew Bible (Day 1985) enters the narrative only in: (a) the source-overview
      section as a statement that Day 1985 is the principal 20th-century monograph on the
      Ugaritic–Hebrew-Bible continuity (claim C16), (b) the Lôtan section where the
      linguistic cognancy ltn ↔ lwytn and shared seven-headedness are stated as Ugaritic
      facts without importing Hebrew Bible combat narratives into the Ugaritic story, and
      (c) the reception section (claims C132–C137) which explicitly identifies Day 1985
      as forward-link to Ch. 8 and reserves Hebrew Bible combat narratives there. No Psalm 74,
      Isaiah 27, or Job 41 narrative content is narrated as Ugaritic material."

  no_mesopotamian_backfill:
    status: PASS
    note: "Marduk-Tiamat appears at lines 159 and 360–361 as an explicitly labelled typological
      contrast (no creation-from-the-corpse motif in Ugaritic; Marduk-Tiamat comparison is
      typological, not transmission claim). The Anzû comparison at line 139 is explicitly
      labelled 'structural-typological' and 'comparative note rather than a transmission
      claim,' matching claim C55 exactly. No Mesopotamian narrative content is backfilled
      into the Ugaritic story."

  gunkel_ballentine_scope:
    status: PASS
    note: "The Gunkel-Ballentine section (lines 299–342) stays within the scope of claims
      C115–C131. No additional scholarly sources are introduced beyond those in the claims
      document. Forsyth ch. 3's anticipation of Ballentine is in claim C122. Wakeman's
      pre-Ballentine value is in claim C131. The unfootnoted synthesis paragraph at line 342
      draws exclusively on content from the immediately preceding claims."

  cross_references:
