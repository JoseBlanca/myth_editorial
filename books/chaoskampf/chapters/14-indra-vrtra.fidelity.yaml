findings:
  - kind: IMPLICIT-ADDITION
    severity: MEDIUM
    claim_number: ~
    narrative_location: "line 49"
    issue: >
      Unfootnoted navigational paragraph introduces no factual claim but is not present
      in the claims document.
    detail: >
      Narrative line 49: "The story, as the Rigveda preserves it, is therefore something
      the chapter has to assemble. What follows takes the Vedic combat in five stages:
      the hymn-cycle method itself, the setting and ritual context, Rigveda 1.32 as the
      primary witness, the seven supplementary hymns, and the Watkins formula as the
      Vedic instance of an inherited Indo-European poetic line. A typological section
      then asks how the combat does cosmogonic work without doing cosmogony in the
      Mesopotamian sense, and a final section bounds off the post-Vedic brahminicide
      reframing as a clearly later transformation that must not be merged with the
      Rigvedic combat." The claims document has no corresponding paragraph. However,
      this is a chapter-navigation bridge that introduces no factual assertions beyond
      what the claims establish. All sections named are attested in the claims. No
      action required.
    recommended_fix: >
      No action required. This is a legitimate transitional bridge. NOTE severity only.

  - kind: CLAIM-DISTORTED
    severity: MEDIUM
    claim_number: 14
    narrative_location: "line 43"
    issue: >
      Minor paraphrase changes "any comparable ancient corpus" to "any comparable corpus
      from the same period", slightly narrowing the comparand set.
    detail: >
      Claims line 54: "...generally regarded as preserving the text more faithfully than
      any comparable ancient corpus..."
      Narrative line 43: "...generally regarded as preserving the text more faithfully
      than any comparable corpus from the same period..."
      The factual claim (exceptional Rigvedic preservation) is unchanged but "from the
      same period" is narrower than "ancient". Both phrasings support the same
      substantive point; no reader would be misled.
    recommended_fix: >
      Restore "ancient" in place of "from the same period" to match the claims verbatim:
      "...more faithfully than any comparable ancient corpus..."
