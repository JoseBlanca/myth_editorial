  honesty_self_check:
    q1_skipped_claims: >
      No claims skipped. All 141 claims were mapped individually to narrative locations.
      Footnote counts were verified programmatically (141 on each side — exact match).
      Both INFERENCE markers and both VARIANT markers were compared character-by-character
      against the claims document; all four are verbatim identical.
      All 4 COMPARATIVE-HOOK lines were verified verbatim identical.
    q2_additions_check: >
      Every narrative paragraph was checked against the claims document. One unfootnoted
      transitional paragraph at narrative line 49 was evaluated: "The story, as the
      Rigveda preserves it, is therefore something the chapter has to assemble. What
      follows takes the Vedic combat in five stages: the hymn-cycle method itself, the
      setting and ritual context, Rigveda 1.32 as the primary witness, the seven
      supplementary hymns, and the Watkins formula as the Vedic instance of an inherited
      Indo-European poetic line. A typological section then asks how the combat does
      cosmogonic work without doing cosmogony in the Mesopotamian sense, and a final
      section bounds off the post-Vedic brahminicide reframing as a clearly later
      transformation that must not be merged with the Rigvedic combat." This introduces
      no factual claim (it is a chapter-navigation bridge summarising sections that are
      all established in the claims), has no footnote, and requires no action.
      The critical verifier hints were checked explicitly:
      (1) áhann áhim formula at RV 1.32.2, verse 1 as announcing frame — preserved correctly
          at narrative lines 134 and 281.
      (2) Dānu "cow above her calf" at RV 1.32.9 (not 1.32.8) — preserved correctly at
          narrative line 167.
      (3) Fifteen-verse arc summary "body-and-water tableau (vv. 7–9, with the Dānu image
          at v. 9)" — preserved verbatim at narrative line 188.
      (4) Post-Vedic brahminicide reframing (ŚBr 1.6.3–4; MBh Udyogaparvan 9–18) clearly
          bounded in its own sub-section and not merged with Rigvedic combat — confirmed.
      (5) Cosmologically-active-but-not-cosmogonic typology marked with INFERENCE-2 as
          editorial synthesis — confirmed verbatim.
      (6) Vedic-Iranian cognancy section: ahi/aži, vṛtrahán/Vərəθraγna, Trita Āptya/
          Thraētaona — all present and correctly rendered.
    q3_distortion_check: >
      All prose claims were checked for meaning preservation. The overwhelming majority
      are verbatim or near-verbatim lifts from the claims. Two minor paraphrase variations
      were identified and evaluated:
      (1) "any comparable ancient corpus" (claims) → "any comparable corpus from the same
          period" (narrative line 43). The scope of the comparison set is slightly
          narrowed (from all ancient corpora to those from the same period), but the
          factual claim — that the Rigveda is exceptionally well-preserved — is not
          distorted. This is a MEDIUM finding (nuance shift).
      (2) "Watkins's monograph is printed-only" (claims) → "Watkins's monograph is also
          printed-only" (narrative line 19). The word "also" is a prose connective
          referring back to the Jamison-Brereton monograph; no factual shift.
      The missing "=== Source overview" section header (present in claims, absent in
      narrative) is a structural markup omission but does not drop any claim, since all
      141 source-overview claims appear in the narrative body.
    q4_same_model: >
      No. The narrative was produced by Claude Opus 4.7 in a separate session. This
      audit is conducted by Claude Sonnet 4.6 in a fresh conversation with no memory
      of writing the narrative. The review is valid.

  issues_summary:
    - id: ISSUE-01
      severity: NOTE
      category: addition-ok
      description: >
        One sentence-group at narrative line 49 has no footnote and does not appear in
        the claims document. It is a chapter-navigation transition ("The story, as the
        Rigveda preserves it, is therefore something the chapter has to assemble. What
        follows takes the Vedic combat in five stages..."). It introduces no factual
        claims, accurately reflects the chapter structure authorised by the claims and
        brief, and needs no footnote. NOTE only; no action required.
    - id: ISSUE-02
      severity: MEDIUM
      category: nuance-paraphrase
      description: >
        At narrative line 43, the claims phrase "any comparable ancient corpus" has
        been rendered as "any comparable corpus from the same period". The factual
        claim (exceptional preservation) is unchanged, but "from the same period"
        slightly narrows the comparand set relative to "ancient". The sentence reads:
        "...generally regarded as preserving the text more faithfully than any
        comparable corpus from the same period..." whereas the claims read "...than any
        comparable ancient corpus...". This is a nuance shift, not a factual distortion.
        Recommended fix: restore "ancient" in place of "from the same period" for
        verbatim fidelity, though the factual claim is sound as written.
    - id: ISSUE-03
      severity: NOTE
      category: markup-improvement
      description: >
        The narrative uses *Śatapatha Brāhmaṇa* and *Mahābhārata* (AsciiDoc bold
        markup, rendering as typographic emphasis) consistently throughout, whereas
        the claims apply this markup inconsistently (e.g. claims line 85 lacks the
        asterisks; claims line 392 includes them). The narrative's consistent markup
        is more correct and uniform. No action required.
    - id: ISSUE-04
      severity: NOTE
      category: structural-markup
      description: >
        The "=== Source overview" section header is present in the claims file (line 13)
        but absent from the narrative. All 141 source-overview claims are present in the
        narrative body; the missing header is a structural markup omission that does not
        drop any content. NOTE only; no action required.

