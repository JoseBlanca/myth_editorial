      Day', and as the Day of Finnish Culture)"
    problem: >
      The date 28 February does NOT commemorate the 1849 *Uusi Kalevala*. Per
      Wikipedia *Kalevala Day*: the date 28 February commemorates the day in
      **1835** when Elias Lönnrot signed the preface to the first edition (the
      1835 *Vanha Kalevala*), NOT the 1849 New Kalevala. The 1849 New Kalevala's
      preface is dated April 1849. While Kalevala Day today celebrates the
      Kalevala broadly (both editions), the date itself derives from the 1835
      preface signature. The chapter conflates the two editions and the
      commemoration date.
    evidence: >
      Wikipedia *Kalevala Day*: "Kalevala Day is celebrated on 28 February...
      The date is based on the day in 1835 when Elias Lönnrot signed the preface
      to the first edition of the *Kalevala*." Lönnrot "signed the preface on
      28 February 1835, a date later celebrated as Kalevala Day."
    recommended_fix: >
      Correct the year from "28 February 1849" to "28 February 1835" and reframe
      the parenthetical to clarify that the date commemorates Lönnrot's signing
      the preface to the first edition. Suggested replacement: "the *Kalevala*
