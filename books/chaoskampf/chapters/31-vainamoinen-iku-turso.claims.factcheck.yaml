  - id: FC-02
    severity: HIGH
    category: CITATION-WRONG
    location: >
      §Lönnrot's Kalevala: the 1835 Vanha and the 1849 Uusi editions, line 139
      (the claim about Kalevalan päivä's commemorated edition and date).
    claim_text: >
      "the *Kalevala* has been the central text of Finnish-national identity
