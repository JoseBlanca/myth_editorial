    triangulations_assumed: >
      (1) IKU-TURSO LOCATION IN KALEVALA: The chapter claims Iku-Turso "appears
      principally in the *Kalevala*'s 50th canto (in the 1849 *Uusi Kalevala*
      numbering)". Per Wikipedia *Iku-Turso (creature)* and *Cantos of the Kalevala*:
      Iku-Turso appears principally in **Cantos II (2) and XLII (42)** of the New
      Kalevala — specifically Canto 42 (Sampo theft), where Louhi summons Iku-Turso
      to devour the Kalevala heroes returning with the Sampo, and where Väinämöinen
      grabs him by the ears and binds him with magical words to never return from
      the bottom of the sea. Canto 50 is the final canto (Marjatta and Väinämöinen's
      departure) — not the Iku-Turso encounter. This is a HIGH-SEVERITY content
      error requiring correction. FINDING FC-01 (HIGH).
      (2) KALEVALA DAY DATE: The chapter claims the *Kalevala* "has been the central
      text of Finnish-national identity since the 1849 *Uusi Kalevala* (with the
      publication date — 28 February 1849 — celebrated annually in Finland as
      *Kalevalan päivä*, 'Kalevala Day')". Per Wikipedia *Kalevala Day*: the date
      28 February commemorates Lönnrot's signing the preface to the **first edition
      (1835 Vanha Kalevala)**, NOT the 1849 publication. The 1849 New Kalevala was
      published later in the year (the preface to the New Kalevala is dated April
      1849). Kalevala Day was established to celebrate Finnish culture broadly, but
      the date itself derives from the 1835 preface signature. This is a HIGH-
      SEVERITY content error. FINDING FC-02 (HIGH).
      (3) KALEVALA EDITION VERSE COUNTS: The chapter says the 1835 Vanha Kalevala
      has approximately 12,000 lines and the 1849 Uusi Kalevala has approximately
      22,800 lines. Per Wikipedia *Kalevala*: 1835 = 12,078 verses; 1849 = 22,795
      verses. The chapter's rounded approximations are correct. PASS.
      (4) KALEVALA EDITION CANTO COUNTS: The chapter says the 1835 Vanha Kalevala
      has 32 cantos and the 1849 Uusi Kalevala has 50 cantos. Per Wikipedia: 32
      poems / 50 poems (*runot*). The chapter correctly notes the terminological
      complication that *runot* refers both to the rune-tradition's individual
      songs and to the Kalevala's editorial cantos. PASS.
      (5) LÖNNROT BIOGRAPHICAL CLAIMS: The chapter claims Lönnrot lived 1802-1884,
      was a Finnish physician/philologist/folklore-collector, and conducted eleven
      major collecting tours across Karelia, Ingria, and northern Finland between
      1828 and 1844. All four claims verified per Wikipedia *Elias Lönnrot* and
      Britannica: Lönnrot lived 9 April 1802 – 19 March 1884; he was a polymath
      physician, philologist, and folklore-collector; he conducted eleven field
      trips between 1828-1844, primarily to Karelia. PASS on all biographical
      claims.
      (6) ARHIPPA PERTTUNEN OF LATVAJÄRVI: The chapter names Arhippa Perttunen of
      Latvajärvi in Viena Karelia as one of the most famous named singers from
      whom Lönnrot recorded. Per Wikipedia *Arhippa Perttunen*: Perttunen
      (1769-1841) was a Karelian runic singer from the village of Latvajärvi in
      Vuokkiniemi parish, Vienan Karjala (White Karelia). The chapter's
      characterisation is accurate (the village name Latvajärvi is correct; the
      parish is Vuokkiniemi, but the chapter's "Latvajärvi in Viena Karelia"
      formulation is the standard short form). PASS.
      (7) ONTREI MALINEN OF VUONNINEN: The chapter names Ontrei Malinen of
      Vuonninen as another principal named singer. Per Kalevalaseura and other
      sources: Ontrei Malinen (1780-1855), met by Lönnrot in 1833 in the village
      of Vuonninen, Archangel/Viena Karelia. Väinämöinen was Malinen's chief hero.
      PASS.
      (8) FINNISH LITERATURE SOCIETY (SKS) FOUNDED 1831: Verified per Wikipedia
      *Finnish Literature Society* and the SKS official website: the Suomalaisen
      Kirjallisuuden Seura was founded in 1831 in Helsinki. The chapter's
      characterisation as "the institutional support for the collection" is
      accurate per the SKS's "About us" page noting the Kalevala among its first
      publications. PASS.
      (9) GRAND DUCHY OF FINLAND DATES: The chapter says "Finland was a Grand
      Duchy of the Russian Empire from 1809 to 1917". Verified per Wikipedia
      *Grand Duchy of Finland*: established 1809 (Treaty of Fredrikshamn, 17
      September 1809), ended 1917 (Finnish Declaration of Independence, 6 December
      1917). PASS.
      (10) MIKAEL AGRICOLA NEW TESTAMENT: The chapter says Finnish "had a written
      form (in Latin script, used principally for ecclesiastical material) since
      Mikael Agricola's 16th-century New Testament translation". Verified per
      Wikipedia *Se Wsi Testamenti* and *Mikael Agricola*: published in 1548
      (manuscript completed 1543; printed in Stockholm). The 16th-century dating
      is correct. PASS.
      (11) IKU-TURSO ETYMOLOGY: The chapter says Iku-Turso is "a compound of
      *iku-* 'eternal, perpetual' and *Turso*, the proper name of the sea-monster
      figure". Per Wikipedia *Iku-Turso (creature)*: the name means "the eternal
      Turso" (or "the eternal walrus/giant"; *tursas* originally meant walrus in
      Finnish). The chapter's gloss is accurate at the level of "iku- = eternal;
      Turso = name of the figure". The deeper *tursas* etymology (Turso/tursas =
      walrus or sea giant) is not addressed but the chapter's gloss is not wrong.
      PASS — minor INFO note that the Turso/tursas etymology could be expanded.
      (12) SUOMEN KANSAN VANHAT RUNOT (SKVR) DATES: The chapter says SKVR is the
      "Finnish Literature Society's *Suomen Kansan Vanhat Runot* multi-volume
      edition, 1908-1948 + index volumes". Per Wikipedia *Suomen kansan vanhat
      runot*: published 1908-1948 (in approximately 32 physical volumes containing
      the original 14 volumes of poems); a supplement (not "index volumes") was
      added in 1997. The chapter's "1908-1948" is correct; the "+ index volumes"
      formulation is a slight imprecision (it was a 1997 supplement, not an index
      volume per se), but is not substantively wrong. INFO note registered.
      (13) SKS FOLKLORE ARCHIVES IN HELSINKI: The chapter says the rune-collection
      material is "now archived primarily in the SKS Folklore Archives in
      Helsinki". Per the SKS website: the Folklore Archives were founded in 1937
      and were merged in 2016 with the SKS Literature Archives to form the new
      SKS Archives. The chapter's reference to "SKS Folklore Archives" is the
      historical name; the current institutional name is "SKS Archives". This is
      a minor INFO-level imprecision, not a content error.
      (14) HONKO 1990 AND DUBOIS 2006: The named-but-flagged secondary anchors.
      Honko 1990, *Religion, Myth and Folklore in the World's Epics: The Kalevala
      and its Predecessors* (Berlin: De Gruyter / Mouton de Gruyter, 1990; ISBN
      9783110122534): verified. The chapter's title rendering is accurate. DuBois
      2006, *Lyric, Meaning, and Audience in the Oral Tradition of Northern
      Europe* (Notre Dame: University of Notre Dame Press, 2006; ISBN
      9780268025892): verified. Both are correctly handled per the named-but-
      flagged secondary-anchor pattern (no EVIDENCE token routes through either)
      following the Ch23 FC-02 / Ch26 FC-02 / Ch27 / Ch28 / Ch30 precedent. PASS.
    verbatim_quote_policy: >
