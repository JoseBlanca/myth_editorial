# ─────────────────────────────────────────────────────────────────────────────
# FINDINGS
# ─────────────────────────────────────────────────────────────────────────────

findings:

  - id: FC-01
    severity: HIGH
    category: CITATION-WRONG
    location: >
      §Lönnrot's Kalevala: the 1835 Vanha and the 1849 Uusi editions, line 133
      (the claim about the *Kalevala*'s Iku-Turso material's canto location).
    claim_text: >
      "Iku-Turso appears principally in the *Kalevala*'s 50th canto (in the 1849
      *Uusi Kalevala* numbering) and in adjacent passages connected with the
      Sampo-cycle and the Pohjola material"
    problem: >
      The canto location is wrong. Iku-Turso does NOT appear principally in the
      Kalevala's 50th canto. Per Wikipedia *Iku-Turso (creature)* and Wikipedia
      *Cantos of the Kalevala*: Iku-Turso appears principally in **Cantos II (2)
      and XLII (42)** of the New Kalevala. In Canto II, Iku-Turso rises from the
      sea and burns a stack of hay, from which the giant oak grows. In Canto 42
      (the Sampo-cycle, as the chapter correctly identifies), Louhi (mistress of
      Pohjola) summons Iku-Turso to devour the Kalevala heroes returning with the
      Sampo, and Väinämöinen grabs him by the ears and binds him with magical
      words to never return from the bottom of the sea. Canto 50 is the final
      canto (Marjatta and Väinämöinen's departure), not the Iku-Turso encounter.
      The chapter correctly identifies the Sampo-and-Pohjola material as the
      narrative context of the Iku-Turso subjugation, but assigns it to the wrong
      canto number.
    evidence: >
