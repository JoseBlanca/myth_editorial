summary: |
  Ch35 is a tightly-disciplined comparative chapter that delivers the
  Ballentine-2015 alternative-sovereign reading as the principal
  interpretive frame for the sovereignty-combat subtype, develops the
  Anzû-to-Marduk genealogy at length as the chapter's worked example,
  and explicitly tightens the chaos-terminology discipline relative to
  Ch34 (C1) per the brief's special_instructions. All 19 unique
  source_ids resolve in sources.yaml and all 19 COMPARATIVE-HOOK
  chapter-references resolve in toc.yaml. Of the 81 paragraph-claims
  with 133 EVIDENCE tokens, 76 route through Part-I anchor source_ids
  that are documented to support the specific claim. Five MEDIUM
  findings (one citation-wrong on Hoffner section number §16 vs §15
  Ullikummi, one attribution-drift on Hesiod-vs-Apollodorus motive for
  Typhon's conception, one epithet-error on Ninurta as "lord of
  Nippur" vs Ch2's "warrior-god of Nippur", one marker-syntax issue
  on both [SPECULATION:] blocks using "warrant"/"risk" labels in
  place of "counterargument", and one banned-term leakage in §I body
  prose where the brief restricts scare-quoted "chaos" to §II/§VI),
  three LOW findings (Vṛtra hymn-list omission of 1.80 and 5.32; Job
  26/41 corpus-listing compression; Vṛtra "serpent-demon" gloss), and
  three NOTE-level structural observations (cross-chapter Vṛtra-list
  alignment; optional INFERENCE-marker forwarding for Nebuchadnezzar I
  hypothesis; positive doubled-token coverage in §V). Most consequential
  single finding: FIND-01, the §I/§III Hoffner-1998 §16-vs-§15 section-
  number error on the *Song of Ullikummi*, which is a citation-wrong
  finding that could mislead readers tracing the reference back to
  Hoffner's edition. Per the verdict rule "PASS if zero HIGH and ≤3
  MEDIUM; otherwise REVISE", the chapter has zero HIGH findings but
  accumulates 5 MEDIUM findings, which crosses the ≤3-MEDIUM threshold
  and triggers REVISE. All five MEDIUM findings are small and
  verbatim-substitutable, and none affect the chapter's central
  argument or its source-ID discipline; the chapter's comparative-
  typology discipline, the strict in-scope / out-of-scope citation-
  pairing on transmission claims, the correct framing of §II around
  Ballentine and §IV around the Anzû-to-Marduk genealogy, the
  resolved-source-IDs registry-check, the resolved-TOC cross-
  references, and the substantively-correct seven-case per-tradition
  synthesis are all sound. The five MEDIUM fixes should be applied in
  the post-human-normalize pass before the chapter advances to
  claims-approved. Final verdict: REVISE.
