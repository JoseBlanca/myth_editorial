findings:
  - id: FIND-01
    severity: MEDIUM
    category: citation-wrong | section-number-error
    claim_anchor: line 88 (§I, fifth case — Teshub-Ullikummi)
    description: |
      Ch35 line 88 introduces the fifth case as: "the Hurro-Hittite
      Kumarbi Cycle (Hoffner 1998 §16, *Song of Ullikummi*)" and the
      footnote and EVIDENCE token both cite "Hoffner, H.A., *Hittite
      Myths*, 2nd ed. (...), 1998), §16 (*Song of Ullikummi*)".
    issue: |
      Section-number error. In Hoffner 1998 (and as attested in
      ch-05-kumarbi-ullikummi.claims.approved.adoc), the *Song of
      Ullikummi* is **§15**, not §16; **§16** is the *Song of Hedammu*.
      Ch5's claims-approved attests this at lines 80, 86 (§15 = Ullikummi)
      and at line 83 (§16 = Hedammu), and the EVIDENCE-token loc fields
      throughout Ch5 use §15 for all Ullikummi-related claims.
    evidence: |
      From chapters/05-kumarbi-ullikummi.claims.approved.adoc line 80:
        "Ea, the Akkadian wisdom-god, ... is the agent of the decisive
        intervention that breaks Ullikummi: ... [footnote:][Hoffner 1998,
        §15 (Song of Ullikummi), on Ea's counselor and agent role.]"
      From the same file line 83:
        "[footnote:][Hoffner 1998, §16 (Song of Hedammu), on Šauška/
        Ishtar as Teshub's sister and the seductress of Hedammu.]"
      And from line 18 (cycle song-roster):
        "Kingship in Heaven (the cycle frame), the Song of Ullikummi,
        the Song of Hedammu, the Song of the Sea, the Song of LAMMA,
        and the Song of Silver."
      The cycle's song-numbering in Hoffner 1998 is therefore: §14
      Kingship in Heaven, §15 Song of Ullikummi, §16 Song of Hedammu,
      §17 Song of the Sea, §18 Song of LAMMA / Silver. Ch35's "§16
      (*Song of Ullikummi*)" misnumbers the song.
    recommended_fix: |
      Replace every occurrence of "Hoffner 1998 §16" / "§16, *Song of
      Ullikummi*" / "loc=§16, Song of Ullikummi" in Ch35 with §15.
      Specifically:
        line 88 body: "(Hoffner 1998 §16, *Song of Ullikummi*)"
          → "(Hoffner 1998 §15, *Song of Ullikummi*)"
        line 88 footnote: "§16 (*Song of Ullikummi*)"
          → "§15 (*Song of Ullikummi*)"
        line 89 EVIDENCE: "loc=§16, Song of Ullikummi"
          → "loc=§15, Song of Ullikummi"
        line 186 footnote: "Hoffner 1998, *Hittite Myths*, §16 on
          Teshub-Ullikummi without cosmogonic outcome"
          → "Hoffner 1998, *Hittite Myths*, §15 on Teshub-Ullikummi
          without cosmogonic outcome"

  - id: FIND-02
    severity: MEDIUM
    category: attribution-drift
    claim_anchor: line 65 (§I, second case — Zeus-Typhon)
    description: |
      Ch35 line 65: "Typhon is a hundred-headed serpent-limbed monster
      generated by Gaia and Tartarus **precisely to challenge Olympian
      sovereignty**, and Zeus's victory with the thunderbolt seals the
      establishment of his rule…". Footnote cites "West 1966, *Hesiod:
      Theogony* (...), critical edition with commentary on Theogony
      820–880 on the Typhonomachy as the climactic sovereignty-combat
      of the Hesiodic succession narrative".
    issue: |
      Attribution drift on Hesiod via West 1966. The motive-clause "to
      challenge Olympian sovereignty" is **Apollodorian** (Bibliotheca
      1.6.3 — vengeance after the Olympian defeat of the Giants), not
      Hesiodic. Hesiod names Typhoeus as Gaia's last and youngest
      offspring without giving the generative motive. Ch11 claims-
      approved is explicit on this distinction.
    evidence: |
      From chapters/11-zeus-typhon.claims.approved.adoc line 71:
        "Gaia, the primordial earth-goddess, is named explicitly in
        Hesiod as Typhoeus's mother; she conceives him in her later
        relationship with Tartarus, and the parental pairing earth-and-
        underworld is itself a marker of the monster's chthonic origin."
      And from line 74:
        "The pairing of Gaia and Tartarus as Typhoeus's parents is
        Hesiodic; in Apollodorus *Bibliotheca* 1.6.3, Gaia conceives
        Typhon by Tartarus specifically in vengeance after the Olympian
        defeat of the Giants, **providing a generative motive that
        Hesiod does not name in lines 820–822**."
      The "precisely to challenge Olympian sovereignty" motive in Ch35
      §I is therefore drift-attributed to Hesiod / West 1966; the
      challenge-motive belongs to Apollodorus.
    recommended_fix: |
      Either (a) split the citation across the two anchors and demote
      the motive-clause to the Apollodoran source, or (b) drop the
      motive-clause and let the structural function speak for itself.
      Verbatim-substitutable replacement (option b):
        "Typhon is a hundred-headed serpent-limbed monster generated
        by Gaia and Tartarus as Gaia's last and youngest offspring
        (Theogony 820–822), and Zeus's victory with the thunderbolt
        seals the establishment of his rule over gods and humans —
        the combat is the final and most dangerous episode of the
        succession-and-sovereignty narrative…"
      Or option (a), keeping the motive but doubled-tokening it:
        "Typhon is a hundred-headed serpent-limbed monster generated
        by Gaia and Tartarus (Theogony 820–822); Apollodorus 1.6.3
        further specifies that the conception was in vengeance after
        the Olympian defeat of the Giants, supplying the challenge-
        motive that Hesiod does not name."
        // EVIDENCE: source_id=west-1966-theogony ; loc=Theogony 820-822, Hesiodic parentage
        // EVIDENCE: source_id=ogden-2013 ; loc=ch. 2, Apollodoran challenge-motive

  - id: FIND-03
    severity: MEDIUM
    category: attribution-drift | epithet-error
    claim_anchor: line 95 (§I, sixth case — Ninurta-Anzû)
    description: |
      Ch35 line 95: "the Sumerian warrior-god (son of Enlil, **lord of
      Nippur**) defeats the lion-headed eagle-monster Anzû". The
      parenthetical attributes the title "lord of Nippur" to Ninurta.
    issue: |
      Attribution drift / epithet error. Ch2 claims-approved attests
      Ninurta as **"warrior-god of Nippur"**, not as **"lord of Nippur"**.
      "Lord of Nippur" is conventionally Enlil's title (Enlil being the
      head of the Mesopotamian pantheon and patron-god of Nippur);
      Ninurta is Enlil's son and the warrior-god *associated with*
      Nippur but not its lord. Additionally, calling Ninurta "the
      Sumerian warrior-god" is a minor framing drift in the immediate
      context of the **Standard Babylonian** Anzû Epic (the Akkadian-
      language redaction). Ch2 frames Ninurta as figuring in "both the
      Sumerian and Akkadian literary traditions".
    evidence: |
      From chapters/02-ninurta-anzu.claims.approved.adoc line 62:
        "Ninurta is the **warrior-god of Nippur**, son of Enlil, and
        the champion sent out to defeat enemies of the divine order in
        both the Sumerian and Akkadian literary traditions.[footnote:
        ...; Annus 2001, introduction on Ninurta's Nippur-warrior
        identity.]"
    recommended_fix: |
      Replace the parenthetical "(son of Enlil, lord of Nippur)" with
      "(son of Enlil, warrior-god of Nippur)". Verbatim-substitutable
      replacement of the line 95 opening:
        "The sixth case is Ninurta against Anzû in the Standard
        Babylonian Anzû Epic, where the warrior-god of Nippur (son of
        Enlil) defeats the lion-headed eagle-monster Anzû — originally
        a minor divine servitor — who has stolen the Tablet of Destinies
        from Enlil; …"

  - id: FIND-04
    severity: MEDIUM
    category: marker-syntax | speculation-marker
    claim_anchor: lines 249 and 292 (§IV and §V SPECULATION blocks)
    description: |
      Both [SPECULATION:] blocks in Ch35 use non-standard pipe-field
      labels in place of the required "counterargument" sub-field.
      Per the chapter-claims skill (and per the prompt's marker-
      integrity check #5: "[SPECULATION: ... | basis: ... |
      counterargument: ...]"), the third pipe-field must be labelled
      `counterargument`.
    issue: |
      - Line 249 (§IV SPECULATION): the third pipe-field is labelled
        "warrant for the speculation: ..." instead of "counterargument:
        ...". The content under that label is itself a *warrant*
        (supporting argument from Lincoln 2012), not a counterargument;
        the block lacks a counterargument as a separate field.
      - Line 292 (§V SPECULATION): the third pipe-field is labelled
        "risk: ..." (using the [INFERENCE:] convention) instead of
        "counterargument: ...". The content is closer to a methodological
        caveat than to a counterargument, and the block again lacks a
        true counterargument as a separate field.
      The Ch34 [SPECULATION:] block (chapters/34-C1-combat-as-cosmogony.
      claims.adoc line 213) uses "counterargument:" correctly as the
      third pipe-field, providing the in-house precedent.
    evidence: |
      Ch34 (precedent), claims line 213:
        "[SPECULATION: the convergence of three independent traditions ...
         | basis: Lincoln 2012's political-ideological reading ...
         | counterargument: the political-charter reading does not by
         itself explain why the charter takes the specific form of a
         combat-with-monstrous-adversary ... ]"
      Ch35, claims line 249 (the §IV SPECULATION):
        "[SPECULATION: that the sovereignty-to-cosmogony escalation ...
         | basis: the parallel structural-and-verbal reproduction with
         cosmogonic-element addition is documented ...
         | warrant for the speculation: the Lincoln 2012 political-
         ideological reading would predict ...]"
      Ch35, claims line 292 (the §V SPECULATION):
        "[SPECULATION: that the residual typological coherence ...
         | basis: the documented transmission lines explain much of the
         coherence but not all ...
         | risk: that the transmission-vs-typology balance is impossible
         to settle definitively ...]"
    recommended_fix: |
      Re-label the third pipe-field as "counterargument:" in both
      blocks and supply substantive counter-content where the current
      text is warrant or methodological caveat. Verbatim-substitutable
      examples:
        Line 249 (§IV) third pipe-field replacement:
          "| counterargument: the deliberate-engineering reading is
          tightly tied to the specific Babylonian theological-political
          context (Marduk-elevation under Nebuchadnezzar I) and may
          not generalise; the Yahweh-Leviathan-Rahab eschatological
          reuse in Isaiah 27 lacks the line-by-line structural-and-
          verbal reproduction that documents the Anzû-to-*Enūma Eliš*
          escalation, and applying the escalation-template across the
          corpus risks projecting the Babylonian pattern onto less-
          documented cases."
        Line 292 (§V) third pipe-field replacement:
          "| counterargument: that the residual independent-typology
          component is itself an artefact of asymmetric documentation
          rather than a real category — what looks like residual
          typological recurrence may simply be undocumented further
          contact, in which case the cluster's coherence would reduce
          fully to transmission-network effects and the typological
          claim would lose its independent warrant."

