findings:
  - id: F1
    type: IMPLICIT-ADDITION
    severity: MEDIUM
    location: "narrative line 23-24"
    section: "Source overview"
    narrative_text: |
      "the same royal collection that gave back to modern scholarship the bulk of the Standard
      Babylonian *Gilgamesh* and substantial parts of *Enūma Eliš*"
    claims_doc_text: |
      "The Standard Babylonian copies cluster heavily in the Nineveh libraries of the seventh
      century BCE, including the library of Ashurbanipal."
      (claims line 27)
    issue: |
      The narrative adds that Ashurbanipal's library also contained Gilgamesh and Enūma Eliš.
      This is accurate background knowledge but is not an approved claim. It introduces two
      named compositions (Gilgamesh, Enūma Eliš) in a context where the claims doc makes no
      such assertion. A reader could infer a source-relationship not established in this chapter.
    fix: "Remove the parenthetical from 'including the library of Ashurbanipal.' and stop there,
      or obtain a claims-doc amendment supporting the addition."

  - id: F2
    type: IMPLICIT-ADDITION
    severity: MEDIUM
    location: "narrative line 50-51"
    section: "Source overview"
    narrative_text: |
      "— the long line that runs from Ninurta through Marduk, the Hebrew Leviathan passages,
      and ultimately the red dragon of Revelation 12"
    claims_doc_text: |
      "Forsyth's *The Old Enemy* treats the Anzû narrative as a structural bridge between the
      Sumerian Ninurta cycle and the later Judeo-Christian combat tradition."
      (claims line 54)
    issue: |
      The narrative expands Forsyth's claim by naming specific downstream destinations —
      Leviathan, Revelation 12 — that are not in the approved claims. While Forsyth ch. 2
      does cover this material (and the book treats Revelation 12 in a later chapter), the
      claims doc for this chapter does not name these specifics. The additions cross from
      narrative expansion into unsupported factual assertion about what Forsyth's chapter argues.
    fix: "Truncate after 'Judeo-Christian combat tradition' to match the claims-doc scope,
      or add a claims-doc amendment naming Leviathan and Revelation 12 as Forsyth ch. 2 contents."

  - id: F3
    type: IMPLICIT-ADDITION
    severity: MEDIUM
    location: "narrative line 53-55"
    section: "Source overview"
    narrative_text: |
      "JoAnn Scurlock and Richard Beal's 2013 volume on the Chaoskampf hypothesis — introduced
      in this book's front matter as one of the two landmarks of the recent critique — contains
      chapters that engage the Anzû Epic as part of the Mesopotamian combat-myth corpus."
    claims_doc_text: |
      "Scurlock and Beal's volume on the Chaoskampf hypothesis includes chapters that engage the
      Anzû Epic as part of the Mesopotamian combat-myth corpus."
      (claims line 57-58)
    issue: |
      The narrative adds "introduced in this book's front matter as one of the two landmarks
      of the recent critique." This is an editorial cross-reference to the book's introduction
      chapter — not an approved claim about the Scurlock & Beal volume. It may be accurate (the
      introduction does treat Scurlock & Beal as a landmark), but it is not in the claims doc
      for this chapter.
    fix: "Remove the parenthetical cross-reference or add an approved claims-doc amendment."

  - id: F4
    type: IMPLICIT-ADDITION
    severity: LOW
    location: "narrative line 17"
    section: "Source overview"
    narrative_text: |
      "Witnesses to the composition span the Old Babylonian, Middle Babylonian, and Neo-Assyrian
      periods, a spread of roughly a thousand years."
    claims_doc_text: |
      "Witnesses to the composition span the Old Babylonian, Middle Babylonian, and Neo-Assyrian
      periods, with the bulk of the Standard Babylonian text reconstructed from the Neo-Assyrian
      royal libraries."
      (claims line 21)
    issue: |
      "A spread of roughly a thousand years" is arithmetic (OB ~2000–1600 BCE to Neo-Assyrian
      ~900–600 BCE) not in the claims doc. It is likely accurate but is an unsupported addition.
      Severity LOW because it is a logically derived summary, not a new factual claim.
    fix: "Delete 'a spread of roughly a thousand years' or verify and add to claims doc."

  - id: F5
    type: IMPLICIT-ADDITION
    severity: MEDIUM
    location: "narrative line 71"
    section: "Setting and context"
    narrative_text: |
      "The Tablet of Destinies — Akkadian *dup šīmāti*, 'tablet of fates' — is the divinely
      held object that confers universal decree-power."
    claims_doc_text: |
      "The Tablet of Destinies is the divinely held object that confers universal decree-power;
      possession of it is, functionally, kingship over the cosmos."
      (claims line 74)
    issue: |
      The Akkadian term and gloss "Akkadian *dup šīmāti*, 'tablet of fates'" is not in the
      approved claims. It is linguistically accurate but constitutes an unsupported factual
      addition (a philological claim about the Akkadian title). "Tablet of fates" in lowercase
      as a gloss is not the proscribed "Tablet of Fates" substitution, but its addition as an
      etymology-claim is not approved.
    fix: "Remove the Akkadian gloss or add an approved claims-doc amendment citing the Akkadian
      term (with a source, e.g., Annus 2001 glossary)."

  - id: F6
    type: IMPLICIT-ADDITION
    severity: LOW
    location: "narrative line 266"
    section: "Function and interpretation"
    narrative_text: |
      "This is the Ninurta whom the Marduk chapter will meet again, translated into a new pantheon."
    claims_doc_text: |
      "The narrative establishes Ninurta as model king: the warrior who defends the order of the
      assembly, follows the counsel of the wise god, and restores the instruments of rule to their
      rightful place."
      (claims line 269)
    issue: |
      The forward-reference to the Marduk chapter is an editorial addition not in the claims doc.
      It is an intra-book navigation sentence, not a factual claim, so severity is LOW.
    fix: "Remove or quarantine as an editorial comment."

  - id: F7
    type: CLAIM-DISTORTED
    severity: MEDIUM
    location: "narrative line 47-48"
    section: "Source overview"
    narrative_text: |
      "Scholarship treats the Anzû Epic as the direct Mesopotamian antecedent of the combat in
      *Enūma Eliš*, the Babylonian creation epic in which Marduk will defeat Tiamat's general
      Qingu and reclaim the Tablet of Destinies."
    claims_doc_text: |
      "Scholarship treats the Anzû Epic as the direct Mesopotamian antecedent of the combat in
      *Enūma Eliš*, in which Marduk will defeat Qingu and reclaim the Tablet of Destinies."
      (claims line 51)
    issue: |
      The narrative inserts "Tiamat's general" as a descriptor for Qingu. In Enūma Eliš, Qingu
      is more accurately Tiamat's consort / champion (not 'general'), and more importantly this
      characterization is not in the approved claims. The claims doc names Qingu without a role
      descriptor; the narrative adds one that may not be textually accurate for an Akkadian text
      not yet treated in this chapter. Severity MEDIUM because it introduces a role characterization
      (general vs. consort/champion) that diverges from standard Assyriology usage.
    fix: "Remove 'Tiamat's general' and restore to plain 'Qingu' as in the claims doc."

  - id: F8
    type: IMPLICIT-ADDITION
    severity: MEDIUM
    location: "narrative line 314"
    section: "Reception within the Mesopotamian tradition"
    narrative_text: |
      "The warrior becomes younger, the adversary becomes larger, the stakes become more cosmic."
    claims_doc_text: |
      "Scholarship traces a deliberate literary line from *Lugal-e* (Ninurta vs. Asag) to the
      Anzû Epic (Ninurta vs. Anzû) to *Enūma Eliš* (Marduk vs. Tiamat and Qingu), with each
      composition reusing and outbidding its predecessor."
      (claims line 317-318)
    issue: |
      The narrative adds an interpretive sentence summarising the escalation ("warrior becomes
      younger, adversary becomes larger, stakes become more cosmic") that is not in the claims doc.
      This is a substantive scholarly interpretation — an additional claim about the trajectory of
      the literary genealogy — without an approved-claims basis. It may be supportable from Annus
      2001 or Lambert 2013, but it is not in the approved claims for this chapter.
    fix: "Remove the interpretive sentence or add an approved claims-doc amendment with a specific
      source citation."

