  - id: FIND-03
    claim_number: 47  # paragraph in §I, "Huitzilopochtli case introduction"
    claim_excerpt: >
      ...preserved in the *Florentine Codex* Book 3 ("The Origin of the
      Gods") of Sahagún (1545–1590)...
    line_in_input: 98
    evidence_token: "source_id=matos-moctezuma-templo-mayor ; loc=interpretive chapters on Coatepec as Templo Mayor"
    kind: WORDING-AMBIGUITY
    severity: LOW
    issue: >
      The phrasing "Sahagún (1545–1590)" is ambiguous: a careful reader
      may read this as Sahagún's lifespan (Sahagún was born c. 1499 and
      died 1590), but the dates 1545-1590 actually denote the period of
      compilation of the *Historia general* / *Florentine Codex* by
      Sahagún with his Nahua collaborators. Ch24's claims-approved line
      36 disambiguates with the explicit phrasing "compiled with Nahua
      informants between approximately 1545 and 1590 CE". The Ch34
      compression loses the disambiguation.
    evidence: >
      Ch24 claims-approved line 36: "the *Historia general de las cosas
      de Nueva España* of the Franciscan friar Bernardino de Sahagún,
      compiled with Nahua informants between approximately 1545 and 1590
      CE..." Sahagún's actual lifespan is c. 1499-1590.
    recommended_fix: >
      Replace "the *Florentine Codex* Book 3 ('The Origin of the Gods')
      of Sahagún (1545–1590)" with "the *Florentine Codex* Book 3 ('The
      Origin of the Gods'), compiled by Sahagún with Nahua informants
      between c. 1545 and 1590 CE" — matching Ch24's disambiguating
      phrasing.

  - id: FIND-04
    claim_number: 86  # paragraph in §V, "structural-parallel claim re West 2007"
    claim_excerpt: >
      The Indra-Vṛtra case has been compared structurally to Marduk-
      Tiamat by West 2007 and others — both are storm-god-defeats-water-
      or-water-obstruction combats — but the structural parallel does not
      carry a transmission claim: the present comparative-mythology
      consensus (West 2007; Watkins 1995) treats the Indra-Vṛtra material
      as a primary witness to the Indo-European HERO SLAY SERPENT formula
      and as a structural parallel to (rather than a member of) the
      Mesopotamian cosmogonic-combat tradition.
    line_in_input: 284
    evidence_token: "source_id=watkins-1995 ; loc=chs. 41-48, structural-parallel without transmission"
    kind: TOKEN-COVERAGE
    severity: LOW
    issue: >
      The body prose names "West 2007" twice as a load-bearing source for
      the structural-parallel reading, and the footnote at line 284 cites
      "West, M.L., *Indo-European Poetry and Myth* (Oxford: Oxford
      University Press, 2007), ch. 6 on Indra-Vṛtra and Marduk-Tiamat as
      structural parallels without transmission". West 2007 is registered
      in sources.yaml (line 139: id: west-2007). The paragraph would
      benefit from an explicit `source_id=west-2007` EVIDENCE token to
      match the body-prose attribution. Without it, the named-but-flagged
      pattern technically applies (West 2007 is in sources.yaml so it can
      be tokenised; the absence of a token is therefore a token-coverage
      gap rather than a strict policy violation). The watkins-1995 token
      that is present covers the philological-formula side of the
      paragraph but not the West-2007-specific structural-parallel
      framing.
    evidence: >
      Body prose at line 284: "by West 2007 and others" and "the present
      comparative-mythology consensus (West 2007; Watkins 1995)".
      Footnote at the same line cites West 2007 ch. 6 explicitly. The
      single EVIDENCE token at line 285 routes through watkins-1995.
    recommended_fix: >
      Add a second EVIDENCE token: `// EVIDENCE: source_id=west-2007 ;
      loc=ch. 6, Indra-Vṛtra and Marduk-Tiamat as structural parallels
      without transmission` immediately before or after the existing
      watkins-1995 token. Alternatively, weaken the body-prose attribution
      to "Watkins 1995 and the wider comparative-mythology consensus"
      without naming West 2007 as a load-bearing source — but the West
      2007 framing is genuinely useful for the section's argument so the
      token-addition is the cleaner fix.

  - id: FIND-05
    claim_number: 14  # paragraph in §I, "Mesopotamian centre of attestation"
    claim_excerpt: >
      ...the Mesopotamian centre of attestation (Babylonia and Sumer) and
      the Han-Chinese centre of attestation are separated by approximately
      6,000 kilometres of intervening territory across which no continuous
      documentary trail of the cosmogonic-combat narrative exists, and the
      Mexica centre of attestation is separated from both by the trans-
      Pacific or trans-Atlantic distance with no pre-Columbian
      transmission route plausibly reconstructible...
    line_in_input: 219
    evidence_token: "source_id=lewis-2006-flood ; loc=chs. 2-3, Chinese-tradition autonomy"
    kind: WORDING-IMPRECISION
    severity: LOW
    issue: >
      Two minor imprecisions: (a) "approximately 6,000 kilometres" is
      approximately right for Babylon (~33°N, 44°E) to Han Chang'an
      (~34°N, 109°E) — actually closer to 5,500-6,500 km depending on
      route; the figure is acceptable but the chapter does not anchor it
      to a specific source (it is offered as a geographical fact).
      (b) "trans-Pacific or trans-Atlantic distance" — the natural
      route between Mesoamerica and either Mesopotamia or Han China is
      trans-Atlantic (via Africa) or via the overland-Asia-then-Pacific
      crossing. The "or" in "trans-Pacific or trans-Atlantic" is
      under-specified; the chapter probably means "no plausible
      pre-Columbian route, whether trans-Pacific or trans-Atlantic, is
      reconstructible". The current phrasing is grammatically correct
      but slightly awkward.
    evidence: >
      Geographical fact verifiable from any standard atlas; the chapter
      does not commit a factual error. The wording is the issue.
    recommended_fix: >
      Optional: re-phrase to "the Mexica centre of attestation is
      separated from both by Atlantic and Pacific distances with no
      pre-Columbian transmission route plausibly reconstructible across
      either ocean". Or leave as-is: this is a wording quibble at LOW
      severity and is not worth a revision pass on its own.

  - id: FIND-06
    claim_number: 46  # paragraph in §I, "Marduk's full cosmogonic-and-sovereign work"
    claim_excerpt: >
      Marduk's cosmogonic work in *Enūma Eliš* extends beyond the body-
      dismemberment: he sets the stations of the moon, the constellations,
      and the calendar in Tablet V; he founds Babylon and his own temple
      Esagil in Tablet VI as the cosmic axis; he creates humans from the
      blood of the executed Qingu (Tiamat's appointed consort-general) so
      that they may take on the labour the gods had been performing; and
      he receives the fifty names of the older deities in Tablet VII as
      the consummation of his cosmogonic-and-sovereign work.
    line_in_input: 60
    evidence_token: "source_id=foster-2005 ; loc=Tablets V-VII, Marduk's full cosmogonic-and-sovereign work"
    kind: PAIRING-COMPLETENESS
    severity: LOW
    issue: >
      This load-bearing §I claim about Marduk's full cosmogonic-and-
      sovereign work is anchored to a single in-scope EVIDENCE token
      (foster-2005). The footnote also cites Lambert 2013 Tablets V-VII
      but no second EVIDENCE token routes through lambert-2013 here. For
      a §I-compressed-summary paragraph that integrates four distinct
      load-bearing claims (calendrical work; Esagil-founding; human
      creation from Qingu's blood; fifty-names doxology) the
      single-token coverage is thin. Adding a lambert-2013 token would
      strengthen the doubled-token discipline without changing the claim.
    evidence: >
      The four facts compressed into the paragraph are independently
      attested in Ch3's claims-approved through both Foster 2005 and
      Lambert 2013, and the footnote at line 60 cites both. The
      single-token EVIDENCE coverage is a token-discipline gap, not a
      substantive attribution issue.
    recommended_fix: >
      Add `// EVIDENCE: source_id=lambert-2013 ; loc=Tablets V-VII,
      cosmogonic-and-sovereign work` as a second EVIDENCE token after
      the existing foster-2005 token. This is a small fix that
      strengthens the doubled-token discipline applied to the rest of
      §I.

