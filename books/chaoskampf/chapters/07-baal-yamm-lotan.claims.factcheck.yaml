findings:
  - id: M01
    severity: MEDIUM
    type: internal-variance
    location: "§Movement I, para 7 (KTU 1.2 i) — 'a striking-action that ʿAnat and Athtart restrain'"
    description: >
      The claims text states that Baal's striking-action toward Yamm's messengers
      was restrained by 'ʿAnat and Athtart.' Web sources attribute the restraining
      role differently: one search summary says 'another deity (likely El or Athirat)
      restrains him.' The Wikipedia Baal Cycle article does not specify the restraining
      figure. Smith 1994 Vol. I KTU 1.2 i commentary (not directly accessible) is the
      primary source. The precise identity of the restraining figure in the tablet is a
      recognised philological crux: some interpreters read ʿAnat and Athtart as the
      restrainers, others read Athirat/El. The claim as written (ʿAnat and Athtart)
      is one of the standard scholarly readings and is not contradicted by the primary
      source — it is consistent with Smith 1994 Vol. I — but web triangulation yields
      conflicting secondary accounts. The claim should carry a footnote flagging the
      interpretive variant at draft stage.
    required_action: >
      At chapter-draft, add a footnote to the restraining-figure claim noting that
      secondary sources diverge on whether the restrainers are ʿAnat and Athtart or
      El/Athirat, and citing Smith 1994 KTU 1.2 i commentary for the reading adopted.
      No change to the claims skeleton needed — the flag is a draft-stage footnote
      instruction.
    fix_mechanical: false

  - id: UV-01
    severity: UNVERIFIED LOW
    type: unverified
    location: "§Source overview, para 8 — Attanu-Purulinni as 'supervising chief priest'"
    description: >
      The colophon-level detail that Ilimilku wrote under the supervision of 'the
      chief priest Attanu-Purulinni' is not confirmed by any freely accessible web
      source. Ilimilku and Niqmaddu are confirmed; Attanu-Purulinni is not independently
      triangulated. The detail originates from Smith 1994 Vol. I colophon commentary
      and is not contradicted. UNVERIFIED LOW — not a load-bearing narrative claim.
    required_action: >
      No change needed. At chapter-draft, ensure the footnote for this claim cites
      Smith 1994 Vol. I introduction/colophon section specifically rather than
      the general introduction.
    fix_mechanical: false

  - id: UV-02
    severity: UNVERIFIED LOW
    type: unverified
    location: "§Movement I, para on ymlk formula"
    description: >
      The claim that the kingship formula 'ymlk' is reused first for Yamm then for
      Baal as a 'lexical demonstration' of the rival-sovereignty frame rests on Smith
      1994 Vol. I KTU 1.2 iv commentary, which is not directly accessible. Web
      sources confirm Baal is proclaimed king after the combat but do not confirm the
      specific Ugaritic word ymlk as the formula Smith analyses. The structural
      argument is independently confirmed; the specific formula-level claim is UNVERIFIED
      LOW and not load-bearing for the chapter's argument.
    required_action: >
      No change needed. The claim is correctly sourced to Smith 1994 and appropriately
      calibrated at the column-level commentary rather than sub-line fabrication.
    fix_mechanical: false

  - id: UV-03
    severity: UNVERIFIED LOW
    type: unverified
    location: "§Movement II — Kothar's forge residences (Memphis and Crete)"
    description: >
      The passing claim (§Setting para 10) that Kothar's residences are located at
      'Memphis and Crete in the geographical apparatus' is a standard Ugaritic
      scholarship point but is not directly confirmed by web triangulation for this
      chapter. It is consistent with Kothar-wa-Khasis Wikipedia ('associated with
      Crete, Memphis, and Sumeria') and with Smith 1994. Not load-bearing for the
      narrative. UNVERIFIED LOW.
    required_action: None needed.
    fix_mechanical: false

  - id: UV-04
    severity: UNVERIFIED LOW
    type: unverified
    location: "§Movement I — Baal's parentage 'bn dgn' formula treatment by Smith"
    description: >
      The claim that Smith 'treats the bn dgn ("son of Dagan") epithet as a stable
      Ugaritic formula whose theological implications he discusses at length, without
      trying to harmonise it into a single genealogical model' is a characterisation
