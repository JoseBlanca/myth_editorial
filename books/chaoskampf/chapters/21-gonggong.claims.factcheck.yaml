summary:
  verdict: MINOR-REVISE
  verdict_reason: >
    Two HIGH findings (FC-01 and FC-02) are present. FC-01 is a citation-scope error:
    Forsyth 1987 "The Old Enemy: Satan and the Combat Myth" is described as covering
    "non-Near-Eastern combat-myth" and used as a comparative anchor for the Gonggong
    narrative, but the book traces the combat myth from Sumer through Judeo-Christian
    apocalyptic and does not treat Chinese material; the loc tag "on non-Near-Eastern
    combat-myth" is inaccurate. FC-02 is a false-attribution error: the four-way
    Part II C1 comparative grouping (Gonggong / Marduk / Ninurta / Huitzilopochtli)
    is attributed to "Lewis 2006's framing" but Lewis 2006 is a Chinese-tradition
    specialist monograph that does not make comparative arguments extending to
    Mesoamerican combat-myth; the four-way grouping is the present book's own
    editorial framework. Both HIGH findings are point errors (2 claims each) rather
    than systemic errors across the whole document; the 49 other claims are well-
    supported. The document is strong overall and the HIGH findings are correctable
    without requiring a restructure. MINOR-REVISE is appropriate: the HIGH findings
    must be addressed before chapter draft, but the document's main body is sound.

  reconstruction_framing_assessment: PASS
  reconstruction_framing_notes: >
    The Gonggong narrative uses LACUNA (not RECONSTRUCTION) for the composite-text-witness
    gap, which is correct per the task instructions: the gap is bridged by scholarly synthesis
    across Han compilation-witnesses, not by in-tradition gap-filling of a continuous but
    partial text, making LACUNA the appropriate marker. The two INFERENCE markers are correctly
    deployed for the two synthesis-readings (combat-and-repair as two stages of one cosmogony;
    Gonggong/Yu as two coexisting templates) with fully populated basis and risk fields.
    No RECONSTRUCTION marker is present — correctly so, since the Gonggong narrative is
    genuinely attested in Han sources rather than reconstructed. The body claims about the
    Huainanzi and Lienü zhuan versions use appropriate source-attribution language rather
    than presenting the Han compilations as directly transcribing a hypothetical original.
    This is the chapter's greatest strength.

  invariant_check: >
    CONFIRMED. 56 footnotes / 56 EVIDENCE tokens. 1:1 invariant holds exactly.

  findings_summary:
    total: 5
    HIGH: 2      # FC-01 (Forsyth 1987 scope mislabelled as "non-Near-Eastern"),
                 # FC-02 (Lewis 2006 falsely credited with four-way C1 comparative grouping)
    MEDIUM: 2    # FC-03 (five-coloured stones / wuxing connection in Birrell 1993
                 #         unverified at chapter level),
                 # FC-04 (Lewis 2006 chs. 2-3 cited for Nüwa human-creation detail
                 #         outside flood-myths scope)
    LOW: 1       # FC-05 (Liezi's "Daoist-philosophical framing" characterisation
                 #         unverified in Birrell 1993 cosmogony chapters)
    claims_with_issues: 7
    claims_without_issues: 49

  most_consequential_finding: >
    FC-01: Forsyth 1987 "The Old Enemy: Satan and the Combat Myth" is cited twice as
    a "general comparative anchor" for the Gonggong narrative's place in the "comparative
    dragon-combat corpus" under the loc "on non-Near-Eastern combat-myth." The book's
    scope (per sources.yaml) is "Sumer through Judeo-Christian apocalyptic" — it does not
    treat Chinese Gonggong material and is not a valid anchor for East Asian combat-myth
    claims. The claims document should either restrict Forsyth to the Near-Eastern /
    Judeo-Christian comparative background (his actual coverage) or find an alternative
    source that genuinely surveys combat-myth across non-cognate traditions including
    East Asian cases.
