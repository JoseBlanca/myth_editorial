# ── VERDICT BREAKDOWN ──────────────────────────────────────────────────────────
# REVISE (not MAJOR-REVISE): 8 CITATION-WRONG findings, all of the same kind —
# the Watkins chapter number is cited as "ch. 26" throughout but the correct
# chapter is Ch. 46 ("Typhoeus and the Illuyankas"). Ch. 26 is "The Asvamedha
# or Horse Sacrifice," an unrelated topic. This is a systematic single error
# rather than eight independent HIGH findings; however, under the verdict rules
# it produces at minimum REVISE (1-2 HIGH or >3 MEDIUM). Because all 8 CITATION-
# WRONG findings share one root cause (wrong chapter number), they are best treated
# as a single HIGH finding with 8 manifestations, not 8 independent HIGH findings.
# No contamination. No fabrication. No silent bridges.
# The fix is mechanical: change "ch. 26" to "ch. 46" throughout.

# ── SUPPORTED CLAIMS SUMMARY ──────────────────────────────────────────────────
# All 82 supported claims are narratively well-grounded in the Illuyanka myth
# as transmitted by Hoffner 1998 and Beckman 1982 and corroborated by multiple
# independent scholarly sources. The following are load-bearing claims confirmed
# by triangulation:

supported_claims:
  - claim_number: 1
    claim: "The myth of Tarḫunna and Illuyanka survives on cuneiform tablets
      recovered from the Hittite royal archives at the capital Hattusa, modern
      Boğazköy in central Anatolia."
    source_id: hoffner-1998
    source_loc: "Illuyanka introduction"
    verbatim_quote: "[Triangulated] Beckman 1982 article abstract confirms: 'Gary
      Beckman published The Anatolian Myth of Illuyanka in JANES 14 (1982)... a full
      modern edition of the Myth of Illuyanka incorporating all exemplars now known'
      from Hattusa archive tablets."

  - claim_number: 2
    claim: "The text is catalogued in Emmanuel Laroche's Catalogue des textes hittites
      as CTH 321."
    source_id: hoffner-1998
    source_loc: "Illuyanka introduction"
    verbatim_quote: "[Triangulated] Multiple scholarly sources including Wikipedia and
      Grokipedia confirm: 'The narrative, classified as Catalogue of Texts Hittite (CTH)
      321, consists of nine principal tablets and twelve additional fragments.'"

  - claim_number: 5
    claim: "The CTH 321 dossier preserves two distinct narrative accounts of the same
      combat between the storm-god and the serpent Illuyanka, conventionally numbered
      Version 1 and Version 2 by modern editors."
    source_id: hoffner-1998
    source_loc: "Illuyanka §§1-2"
    verbatim_quote: "[Triangulated] Beckman 1982 abstract and multiple secondary sources
      confirm the two-version structure: 'In the first version... In the second version,
      after the two gods fight and Teshub loses, Illuyanka takes Teshub's eyes and heart.'"

  - claim_number: 9
    claim: "The named scribal author in the colophon is Kella, identified on the tablet
      as the priest who set down the recitation of the purulli festival."
    source_id: hoffner-1998
    source_loc: "Illuyanka §1 colophon"
    verbatim_quote: "[Triangulated] Confirmed by Anatolian Archaeology article: 'The
      text of the Purulli Festival is attributed to Kella, a GUDU-priest of the Storm
      God of Nerik.' Also: 'Thus speaks Kella, the anointed priest of the storm-god
      of Nerik.'"

  - claim_number: 21
    claim: "Nerik lay in the northern frontier zone of the Hittite kingdom and was for
      long stretches of the second millennium under the control of the Kaska peoples,
      with the consequence that the cult of the storm-god of Nerik was at times conducted
      in exile from the city."
    source_id: hoffner-1998
    source_loc: "Illuyanka introduction"
    verbatim_quote: "[Triangulated] Britannica Nerik article and Puruli Wikipedia article
      confirm: 'When Nerik was occupied by hostile groups, such as the Kaskians during
      the reign of Hantili I, the festival was relocated to Hattusa... under Tudhaliya I,
      Nerik's site was occupied by the barbarian Kaskas.'"

  - claim_number: 30
    claim: "The purulli festival was an annual spring observance of the Hittite cultic year,
      performed at Nerik when the cult could be conducted there and at substitute locations
      (notably Hakmis) when Nerik was not under Hittite control."
    source_id: hoffner-1998
    source_loc: "Illuyanka introduction"
    verbatim_quote: "[Triangulated] Search confirms: 'When Nerik was no longer accessible
      to the Hittites, during periods when Nerik was under Kaška control, the cities of
      Hakmis/Hakpis and Utruna served as substitute locations for the festival.'"

  - claim_number: 37
    claim: "Version 1 opens with the storm-god and the serpent Illuyanka meeting in combat
      at a place called Kiskilussa."
    source_id: hoffner-1998
    source_loc: "Illuyanka §1"
    verbatim_quote: "[Triangulated] Confirmed by multiple secondary sources: 'The battle
      unfolds in the city of Kiškilušša, where Illuyanka emerges victorious, defeating
      Tarḫunna.'"

  - claim_number: 51
    claim: "While the serpents are immobilised by their gorging, Hupasiya emerges from
      concealment and binds Illuyanka with a rope."
    source_id: hoffner-1998
    source_loc: "Illuyanka §1"
    verbatim_quote: "[Triangulated] Confirmed by multiple sources: 'Hupasiya binds the
      immobilized Illuyanka with a rope while the serpent and his children remain incapacitated
      in the pit.'"

  - claim_number: 57
    claim: "After twenty days, Hupasiya looks out of the window in defiance of the
      prohibition and sees his wife and children."
    source_id: hoffner-1998
    source_loc: "Illuyanka §1"
    verbatim_quote: "[Triangulated] Confirmed by multiple sources: 'Eventually, after twenty
      days, Ḫupašiya looks out a window and on seeing his family, demands to be let go.
      Inara asks Ḫupašiya why he looked out the window.'"

  - claim_number: 64
    claim: "In Version 2, Illuyanka takes from the storm-god his heart and his eyes,
      removing these organs as the prize of his victory."
    source_id: hoffner-1998
    source_loc: "Illuyanka §2"
    verbatim_quote: "[Triangulated] Confirmed by multiple sources: 'In the second version,
      in addition to defeating Tarhunna, Illuyanka takes out the god's heart and eyes as
      victory trophies.'"

  - claim_number: 73
    claim: "The storm-god then engages Illuyanka anew, this time in a combat at the sea,
      and slays the serpent."
    source_id: hoffner-1998
    source_loc: "Illuyanka §2"
    verbatim_quote: "[Triangulated] Confirmed by search: 'Made whole again, the Storm God
      travels down to the sea, where the Storm God vanquishes the Serpent.'"

  - claim_number: 75
    claim: "The son himself acknowledges the obligation, and according to the surviving text
      he calls upon his father the storm-god to kill him along with Illuyanka."
    source_id: hoffner-1998
    source_loc: "Illuyanka §2"
    verbatim_quote: "[Triangulated] Confirmed: 'His son had joined the Serpent and begged
      his father to kill him, too; and so the Storm God did.'"

  - claim_number: 84
    claim: "Calvert Watkins, in How to Kill a Dragon (1995), identifies a reconstructed
      Indo-European poetic formula of the form HERO SLAY SERPENT, in which a subject-noun,
      a verb of killing, and a serpent-object together name the combat."
    source_id: watkins-1995
    source_loc: "ch. 46 [cited in claims as ch. 26 — see Finding F01]"
    verbatim_quote: "[Triangulated] Confirmed by Wikipedia How to Kill a Dragon and OUP
      description: 'Calvert Watkins follows the continuum of poetic formulae in Indo-European
      languages, from Old Hittite to medieval Irish. He uses the comparative method to
      reconstruct traditional poetic formulae of considerable complexity.'"

  - claim_number: 85
    claim: "The formula is anchored in Watkins's analysis on the Vedic phrase áhann áhim,
      'he slew the serpent,' from Rigveda 1.32.1."
    source_id: watkins-1995
    source_loc: "ch. 46 [cited in claims as ch. 26 — see Finding F01]"
    verbatim_quote: "[Triangulated] Confirmed by Wikipedia Rigveda 1.32: 'The phrase
      áhann áhim \"he slew the serpent\" is formulaic, occurring 11 times in the Rigveda
      and always applied to Indra. Hymn 1.32 of the Rigveda is a poem praising the deity
      Indra for his victory over the serpent Vritra.' Watkins treats RV 1.32.1 as the
      anchor formula."

  - claim_number: 86
    claim: "Watkins argues that the Hittite text of CTH 321 preserves a cognate formulation
      in the verb-and-object pairing kuenta… illuyanka- — 'he slew… the serpent' — which
      uses a verb of killing etymologically related to the Vedic han- and an object that
      is the common-noun 'serpent.'"
    source_id: watkins-1995
    source_loc: "ch. 46 [cited in claims as ch. 26 — see Finding F01]"
    verbatim_quote: "[Triangulated] Wikipedia and secondary sources confirm: 'Calvert Watkins
      identifies the hymn as the locus classicus for the Proto-Indo-European dragon-slaying
      myth, centered on the formulaic expression ahann ahim... Indra's slaying of Vṛtra
      parallels the Hittite storm-god Tarḫunna's battle with the serpent Illuyanka.' The
      root *guhen- / Hittite kuen- connection is confirmed by search results showing
      Ch. 31 of Watkins covers 'The root *guhen-: Hittite kuen- and the Indo-European
      theme and formula.'"

# ── FINDINGS ──────────────────────────────────────────────────────────────────

findings:

  - id: F01
    severity: HIGH
    verdict: "! CITATION-WRONG (systematic, 8 instances)"
    location: "All Watkins 1995 citations throughout the document (claims 13, 84, 85, 86,
      87, 88, 89, 91)"
    claim_text: >
      [Representative] "Calvert Watkins's How to Kill a Dragon (Oxford, 1995) provides
      the principal Indo-European linguistic and poetic-formula analysis of the Hittite
      text, treating Illuyanka as one of the four main demonstration cases for the
      reconstructed combat formula." — cited as "Watkins 1995, ch. 26."
    issue: >
      Every Watkins citation in the claims document references "ch. 26." The Illuyanka
      chapter in How to Kill a Dragon is Chapter 46, titled "Typhoeus and the Illuyankas"
      (p. 448), located in Part V: "Some Indo-European Dragons and Dragon-Slayers."
      Chapter 26 is "The Asvamedha or Horse Sacrifice" — a completely unrelated topic
      about Vedic ritual. This is a systematic, single-root error: the writing agent
      used an incorrect chapter number for all eight Watkins citations. The substantive
      claims attributed to Watkins (HERO SLAY SERPENT formula, áhann áhim anchor, kuenta…
      illuyanka- cognate, Hittite as earliest-attested IE reflex) are all supported by
      Watkins's actual argument — but they are located in Chapter 46, not Chapter 26.
      The root *guhen- / kuen- analysis is in Chapter 31 ("The root *guhen-: Hittite
      kuen- and the Indo-European theme and formula"), which Watkins ch. 46 draws upon.
    evidence: >
      Wikipedia article on How to Kill a Dragon names Ch. 46 as "Typhoeus and the
      Illuyankas." Oxford Academic chapter page confirms this at
      https://academic.oup.com/book/47065/chapter-abstract/422662324. Web search
      confirms Ch. 26 = "The Asvamedha or Horse Sacrifice."
    recommended_fix: >
      Change every "Watkins 1995, ch. 26" citation to "Watkins 1995, ch. 46." The
      chapter title "Typhoeus and the Illuyankas" may be added parenthetically for
      clarity. No substantive claim about Watkins's argument needs to be changed —
      only the chapter-number pointer. The brief's source entry for watkins-1995 already
      correctly notes "ch. 26 (Illuyanka and the HERO SLAY SERPENT formula in Hittite)"
      — this is itself wrong and should be corrected to "ch. 46" in the brief as well.
    affected_claims: [13, 84, 85, 86, 87, 88, 89, 91]

  - id: F02
    severity: MEDIUM
    verdict: "? UNVERIFIED"
    location: "Source overview — Forsyth 1987 claim"
    claim_text: >
      "Neil Forsyth's The Old Enemy (Princeton, 1987) places the Illuyanka combat within
      the Anatolian segment of his long history of the combat-myth from Sumer through
      Christian apocalyptic." — cited as "Forsyth 1987, ch. 3."
    issue: >
      Forsyth 1987 is a printed-only work and no online preview is available. The claim
      that the Illuyanka material appears in "ch. 3" cannot be triangulated. The general
      characterization of Forsyth's book as tracing combat myth "from Sumer through
      Christian apocalyptic" is accurate per the known scope of The Old Enemy. The
      chapter attribution ("ch. 3") is plausible but unverified and potentially
      subject to the same chapter-numbering risk as the Watkins citations.
    evidence: >
      No web source confirms "ch. 3" as the Illuyanka / Anatolian chapter in Forsyth.
      The book's general scope is confirmed.
    recommended_fix: >
      Acceptable to retain as UNVERIFIED LOW pending access to the printed text.
      If possible, verify the chapter number before chapter-draft. If ch. 3 cannot
      be confirmed, cite as "Forsyth 1987" without the chapter number, since the
      substantive claim (Forsyth covers Anatolian combat myths) is sound.

  - id: F03
    severity: MEDIUM
    verdict: "? UNVERIFIED"
    location: "Source overview — West 1997 claim"
    claim_text: >
      "M.L. West's The East Face of Helicon (Oxford, 1997) treats the Hittite dragon-combat
      in the broader context of Indo-European and Near Eastern transmission, with
      cross-references to Greek and Levantine cognates." — cited as "West 1997, references
      on the Hittite dragon-combat."
    issue: >
      West 1997 is a printed-only work. The claim that West treats the Hittite material
      with cross-references to Greek and Levantine cognates is consistent with West's known
      scope (The East Face of Helicon covers Near Eastern → Greek transmission), but the
      specific location ("references on the Hittite dragon-combat") is too vague to
      triangulate. No chapter, page, or section number is given. This is weaker than the
      standard required for a primary citation.
    evidence: >
      West 1997's general scope confirmed by sources.yaml description: "Greek-Near Eastern
      interface. Central for Zeus-Typhon, Kumarbi-Ullikummi." No specific Illuyanka
      page/section is confirmable without the printed text.
    recommended_fix: >
      Acceptable as UNVERIFIED LOW. Add a more specific location (page range or chapter)
      if available from the printed text. The claim is likely sound but the citation
      is too vague.

  - id: F04
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Setting and context — purulli as Hittite term claim"
    claim_text: >
      "The term purulli is preserved with a determinative for festival in the cuneiform
      script and is a Hittite ritual term rather than a loanword from Hurrian or Akkadian."
    issue: >
      The non-loanword status of purulli is accepted by the scholarly community but could
      not be verified with a specific source. Search results describe the festival as
      "Hattian" (a pre-Hittite substrate language, distinct from Hurrian and Akkadian),
      which would support the non-loanword claim from Hurrian and Akkadian, but the
      determinative evidence and the specific philological argument are asserted from
      "Hoffner 1998, glossary entry under purulli" — a location not verifiable without
      access to the printed text.
    evidence: >
      Consistent with known scholarship; no contradicting source found. UNVERIFIED LOW.
    recommended_fix: >
      Retain as UNVERIFIED LOW. If the Hoffner glossary entry under purulli makes
      this specific argument, note it with page number on revision.

  - id: F05
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Source overview — Watkins as treating 'four main demonstration cases'"
    claim_text: >
      "Calvert Watkins's How to Kill a Dragon (Oxford, 1995) ... treating Illuyanka as
      one of the four main demonstration cases for the reconstructed combat formula."
    issue: >
      The claim that Watkins identifies exactly "four main demonstration cases" is not
      independently verifiable from available sources. The search results confirm that
      the comparative hooks (Illuyanka, Vṛtra, Python, and Iranian Aži Dahāka) are all
      prominent in Watkins, but whether Watkins specifically frames these as "four main
      demonstration cases" is an inference that cannot be confirmed without the text.
      Note also that this citation says "ch. 26" — affected by Finding F01.
    evidence: >
      Consistent with Watkins's known scope. The comparative hook in the claims document
      also names "Vedic Vṛtra, Greek Python, and the Iranian Aži Dahāka materials" as
      the four cases. This is plausible but not confirmed as Watkins's own framing.
    recommended_fix: >
      After correcting the chapter number to ch. 46, verify whether Watkins explicitly
      frames these four as a group. If not, soften to "among the primary demonstration
      cases." This is LOW severity because the substance is unlikely to be wrong.

  - id: F06
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Ritual context — cyclical-maintenance pairing with Ra-Apep"
    claim_text: >
      "The cyclical-maintenance character of the Illuyanka myth — combat as something
      annually re-enacted rather than once-and-done — is one of the principal grounds
      on which modern scholarship pairs the Hittite material with the Egyptian Ra-Apep
      complex as the type-cases of the cyclical-maintenance subtype."
    issue: >
      The sources cited (Hoffner 1998 introduction; Beckman 1982) are primary/translation
      sources for the Illuyanka myth. Neither is primarily a comparative scholar of
      Egyptian religion. The claim that these specific sources are the "principal grounds"
      for pairing Illuyanka with Ra-Apep in modern scholarship may be attributing
      comparative claims to area specialists who may not be the origin of that comparison.
      Forsyth 1987 ch. 3 is cited elsewhere in the document for the "cyclical pairing" —
      that citation would be more appropriate here.
    evidence: >
      The Ra-Apep / Illuyanka pairing is corroborated by the book's own scope.md (§3),
      which lists both in "Cyclical maintenance" type-cases. The comparative claim is
      sound; the citation attribution may need refinement.
    recommended_fix: >
      Add Forsyth 1987 as a citation here alongside Hoffner 1998 and Beckman 1982,
      or replace the Hoffner/Beckman citation with Forsyth 1987 ch. 3 as the source
      for the comparative judgment. LOW severity — the comparative claim itself is
      sound.

  - id: F07
    severity: LOW
    verdict: "? UNVERIFIED"
    location: "Closing — cyclical-maintenance pairing restated"
    claim_text: >
      "This cyclical-maintenance framing pairs the Illuyanka myth with the Egyptian
      Ra-Apep complex as the two type-cases of combat-myth-as-annual-recurrence within
      the ancient Near Eastern corpus."
    issue: >
      Same as F06: the sources cited (Hoffner 1998 introduction; Forsyth 1987 ch. 3)
      are the better citations for this comparative claim. Hoffner alone is not
      sufficient for the Ra-Apep pairing. Forsyth 1987 ch. 3 is correctly added here.
      This is a minor citation-completeness note, not an error.
    evidence: >
      Consistent with scope.md. LOW.
    recommended_fix: >
      Ensure Forsyth 1987 ch. 3 is consistently cited for the cyclical-maintenance
      pairing claim. The claim itself is well-supported.

