unverified_medium_claims:
  - loc: "§ Structural features — tripartite combat structure attributed to Annus 2001"
    summary: "The claim attributes 'tripartite combat structure' (failed first attack / wisdom intervention / successful second) as 'the standard pattern Annus 2001 identifies'"
    severity: MEDIUM
    note: >
      Annus 2001 is about the Anzû Epic and its cuneiform text; the claim
      attributes to Annus a characterisation of 'the standard pattern of the
      Mesopotamian combat-myth.' This is a reasonable inference from Annus's
      comparative introduction, but sub-section granularity for Annus 2001
      is unverifiable without print access and the specific claim that Annus
      uses the label 'tripartite combat structure' is higher risk than a
      Hoffner section-level citation. Acceptable as UNVERIFIED MEDIUM given
      the structural observation is independently corroborated by the texts
      themselves; does not need correction if softened to 'Annus 2001 and
      others identify.'

# ─────────────────────────────────────────────────────────────────────────────
# FINDINGS
# ─────────────────────────────────────────────────────────────────────────────

findings:

  - id: FC-01
    severity: MEDIUM
    category: glossary-violation / factual-error
    location: "§ Teshub's first attack — bull names"
    claim_as_written: >
      "Teshub's bull-team, Šeri and Tella, draw his combat-chariot in the
      engagement; the bulls are named in the text as Teshub's standard mounts."
    finding: >
      Teshub's standard bull-team is Šeri and Ḫurri, not Šeri and Tella/Tilla.
      Multiple independent sources confirm: Wikipedia (Teshub): 'Teshub's
      chariot was pulled by two bulls, Šeri and Ḫurri.' Wikipedia (Šeri and
      Ḫurri): the standard pair. In the Song of Ullikummi specifically, the
      second bull is referred to as Tilla, not Tella — and Tilla is described
      as 'best attested as an independent god in texts from Nuzi' and a
      possible regional variant rather than a standard epithet.
      The claims document writes 'Tella', which is neither the standard form
      (Ḫurri) nor the Ullikummi-specific variant spelling (Tilla).
      This is a factual error with a glossary dimension: the bull-pair is a
      named entity and 'Tella' is not the correct name in any attested form.
    required_fix: >
      Correct to: 'Teshub's bull-team, Šeri and Ḫurri (in the Song of
      Ullikummi, the second bull is identified as Tilla, a regional variant),
      draw his combat-chariot.' The parenthetical acknowledges the Ullikummi-
      specific variant without misidentifying the standard pair.
    blocks_chapter_draft: false
    note: >
      This is correctable within the claims document. Does not rise to HIGH
      because it is a name-form error rather than a substantive claim error,
      and the Ullikummi-specific variant 'Tilla' vs. 'Tella' is a minor
      transcription difference. However, the substitution of 'Tella' for the
      standard 'Ḫurri' is a factual inaccuracy that must be corrected.

  - id: FC-02
    severity: MEDIUM
    category: nuance / oversimplification
    location: "§ Cycle preserved without explicit liturgical/festival rubric"
    claim_as_written: >
      "The cycle is preserved without an explicit liturgical or festival rubric
      in the surviving record, and is best classified as scribal-literary
      narrative rather than ritual recitation, in contrast to the Babylonian
      Enūma Eliš which has a documented akītu performance context."
    finding: >
      Web search returns the qualification: 'the Kumarbi Cycle was probably
      performed as part of the "Ritual for Mt. Ḫazzi"' (citing a ritual text
      KUB 44.7 — the same tablet associated with the Song of the Sea). The
      Song of the Sea is connected to a 'celebration connected to Mount Hazzi
      according to a ritual text.' This does not falsify the claim outright —
      the 'probably' hedge indicates scholarly uncertainty and the cycle lacks
      the explicit rubric that Enūma Eliš has for the akītu. However, the
      absolute statement 'preserved without an explicit liturgical or festival
      rubric' may need the qualifier: 'though a late ritual text (KUB 44.7)
      associates at least one song in the cycle with performance at Mount
      Ḫazzi.' The comparison to Enūma Eliš remains valid, but the claim's
      absoluteness is slightly overstated.
    required_fix: >
      Add bracketed qualifier: '... without an explicit liturgical or festival
      rubric [though KUB 44.7 associates the Song of the Sea with a
      celebration at Mount Ḫazzi, a ritual context that is at most partial
      for the cycle as a whole] ...'
    blocks_chapter_draft: false

  - id: FC-03
    severity: MEDIUM
    category: secondary-attribution
    location: "§ Structural features — Annus 2001 tripartite structure"
    claim_as_written: >
      "The Song of Ullikummi has a tripartite combat structure: a failed first
      attack, a wisdom-counsellor's intervention, and a successful second attack
      — the same structure that Annus 2001 identifies as the standard pattern
      of the Mesopotamian combat-myth."
    finding: >
      The structural observation is sound and independently supportable from
      the texts themselves (Anzû Epic, Enūma Eliš, Ullikummi all use this
      pattern). However, attributing to Annus 2001 specifically the label
      'standard pattern of the Mesopotamian combat-myth' is sub-section
      granularity in a print-only source inaccessible for verification.
      Annus 2001 is an edition of the Anzû Epic cuneiform text; its
      introduction may make comparative observations, but the exact wording
      of the structural claim is unverifiable. This is UNVERIFIED MEDIUM
      rather than an error, but the attribution should be softened.
    required_fix: >
      Soften to: '... the same tripartite structure observable across the
      Mesopotamian combat-myth corpus (cf. Annus 2001 introduction)' or
      attribute the observation more broadly: '...identified by Mesopotamian
      scholars as the standard pattern (Annus 2001; cf. Foster 2005).'
    blocks_chapter_draft: false

low_severity_notes:

  - id: N-01
    category: terminological-note
    location: "§ Source overview — 'Song of Going Forth' as cycle frame"
    note: >
      Current scholarship uses 'Song of Going Forth' (or 'Song of Emergence')
      as an alternative title for the Kingship in Heaven text (CTH 344) as a
      whole, not only its transitional portion. A 2021 JANER article is titled
      'The Hittite Theogony or Song of Going Forth (CTH 344).' The claims
      document's identification of 'a passage sometimes treated as a separate
      "Song of Going Forth"' within §14 follows Hoffner's organisation but
      sits in terminological tension with the wider scholarly usage. No
      correction required; a footnote acknowledgment at chapter-draft stage
      would be appropriate.

  - id: N-02
    category: factual-precision
    location: "§ Setting and context — Teshub as Hurrian, Tarḫunna as Hittite-language equivalent"
    note: >
      The distribution claim ('Teshub dominates in the Hurrian-language
      passages and in Hittite-language adaptations that retain the Hurrian
      name') is consistent with the glossary instruction and with general
      Hittitological practice. No error; notation only.

  - id: N-03
    category: structural-observation
    location: "§ [INFERENCE] — tripartite cycle of cosmographic domains"
    note: >
      The [INFERENCE] marker at the Song of Hedammu section correctly
      identifies the structural-typological basis of the claim and flags
      the risk. The inference is well-marked and does not constitute a silent
      bridge. No correction needed.

  - id: N-04
    category: scope-consistency
    location: "§ Comparative-hook: Norse (Ullikummi / Jörmungandr typology)"
    note: >
      The [COMPARATIVE-HOOK] correctly labels the Norse parallel as
      'typological rather than genealogical' and states that 'any
      historical-transmission claim from Hurrian to Norse would be
      unsustainable.' This is fully consistent with scope.md §
      'Reconstruction policy' and the book's transmission-corridor argument.
      No correction needed; flag for chapter-draft author to ensure the
      typological-only framing is preserved in prose.

