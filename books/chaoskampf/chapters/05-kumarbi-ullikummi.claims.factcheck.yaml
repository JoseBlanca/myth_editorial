supported_claims:

  - claim_location: "§ Source overview, para 1"
    summary: "Kumarbi Cycle on cuneiform tablets from Boğazköy / Hattusa"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Kumarbi): "The Song of Kumarbi or Kingship in Heaven is the
      title given to a Hittite version of the Hurrian Kumarbi myth… preserved
      on three tablets." Multiple sources confirm Boğazköy / Hattusa as
      provenance. Tablet KUB 33.120 explicitly named in scholarship as the
      principal manuscript for Kingship in Heaven.

  - claim_location: "§ Source overview — KUB 33.120+ as manuscript for §14"
    summary: "Kingship in Heaven preserved on KUB 33.120 and joins"
    verdict: "SUPPORTED"
    corroboration: >
      Academic article (Brill, JANER 2021) on the 'Hittite Theogony or Song
      of Going Forth (CTH 344)' explicitly references KUB 33.120 Vs. I 19.
      Search result: 'A direct statement confirming the relation between
      Kumarbi and Alalu has been identified in the text KUB 33.120 (I 19).'
      Tablet siglum confirmed.

  - claim_location: "§ Succession-sequence"
    summary: "Alalu → Anu → Kumarbi → Teshub succession; Alalu as Anu's cupbearer predecessor; nine-year reigns"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Kumarbi): 'At the beginning of the Hittite Song of Going
      Forth, the office of king of the gods passes by way of battles first
      from Alalu to Anu, then from Anu to Kumarbi.' Nine-year reign structure
      confirmed in multiple independent sources. Cupbearer relationship
      (Anu as Alalu's cupbearer, Kumarbi as Anu's cupbearer) confirmed by
      multiple independent summaries.

  - claim_location: "§ Kumarbi's deposition of Anu"
    summary: "Kumarbi bites off Anu's genitals and swallows them; Anu declares Kumarbi impregnated with Teshub"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Kumarbi): 'Kumarbi revolts, castrating Anu with his teeth
      and swallowing Anu's genitals. Kumarbi becomes pregnant with the storm
      god Teshub.' Brainly/educational source: 'In the Hittite myth "Kingship
      in Heaven," Kumarbi bites off Anu's genitals and then has gods in his
      body.' Multiple independent sources confirm the prophetic declaration
      motif: 'Anu declares: "I have impregnated you..."' Fully corroborated
      across at least four independent sources.

  - claim_location: "§ Aranzaḫ as additional offspring from Anu's seed"
    summary: "Aranzaḫ (Tigris) and other deities conceived from Anu's seed alongside Teshub"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Aranzaḫ): 'He was believed to be one of the deities born
      as a result of Kumarbi biting off the genitals of Anu.' Anu declares:
      'I have impregnated you with the River Tigris, not to be borne.'
      Tashmishu also confirmed as co-conceived. Claim correctly states
      'partially preserved' enumeration — corroborated.

  - claim_location: "§ Teshub born from Kumarbi's body"
    summary: "Birth of Teshub from Kumarbi's body, with broken passage at the route of emergence"
    verdict: "SUPPORTED"
    corroboration: >
      Brainly educational source: 'Teshub is born through Kumarbi's penis.'
      Claims document correctly flags broken passage. The [LACUNA] marker is
      appropriately placed. The claim that route is 'partially broken' is
      consistent with the scholarly record — corroborated, including the
      lacuna.

  - claim_location: "§ Ullikummi: conception on the rock"
    summary: "Kumarbi ejaculates into/onto a great rock; Ullikummi is stone-natured"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Ullikummi): 'Ullikummi was fathered by the god Kumarbi
      "upon a rock cliff" — a genderless, deaf, blind, yet sentient volcanic
      rock monster.' Hoffner (per search): 'Ullikummi was the product of
      Kumarbi's "sexual union with a huge cliff".' Deaf/blind/stone nature
      confirmed across multiple sources.

  - claim_location: "§ Irširra deities carry infant Ullikummi"
    summary: "Kumarbi entrusts infant to the Irširra deities who carry him away"
    verdict: "SUPPORTED"
    corroboration: >
      Multiple sources: 'The Iršira gods, who Kumarbi asked to protect him,
      place the little monster on the right shoulder of Uliperri.' Kumarbi
      commands the Irširas: 'Take [this child]… and carry him to the Dark
      Earth!' Confirmed.

  - claim_location: "§ Upelluri's right shoulder"
    summary: "Ullikummi placed on Upelluri's right shoulder; Upelluri does not notice"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Upelluri): 'Upelluri was a primordial giant in Hurrian
      mythology who held the separated heaven and earth on his back…
      Upelluri, absorbed in his meditations, did not feel Ullikummi on his
      shoulder.' Right-shoulder placement confirmed: 'Put him on Ubellun's
      right shoulder like a blade!'

  - claim_location: "§ Upelluri as cosmographic foundation"
    summary: "Upelluri is the primordial giant on whose shoulders heaven and earth rest"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Upelluri): 'Upelluri was a primordial giant in Hurrian
      mythology who held the separated heaven and earth on his back.'
      Consistent with the 'cosmographic foundation' description. Confirmed.

  - claim_location: "§ Growth of Ullikummi — prodigious rate, sea to sky"
    summary: "Ullikummi grows rapidly, rises from sea, reaches toward gates of heaven"
    verdict: "SUPPORTED"
    corroboration: >
      Britannica (Song of Ullikummi) and multiple sources confirm the image
      of Ullikummi growing from the sea toward heaven as a stone column.
      The gates-of-heaven motif is widely attested in summaries and
      translations of the Song. Corroborated.

  - claim_location: "§ Šauška's failed seduction of Ullikummi"
    summary: "Šauška attempts seduction; Ullikummi is deaf/blind; marine deity warns her; she abandons"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Ullikummi): 'a genderless, deaf, blind, yet sentient
      volcanic rock monster.' The failed seduction sequence (Šauška attempts;
      deafness/blindness blocks; abandons) is consistent across multiple
      summaries of the Song. Corroborated.

  - claim_location: "§ Ea's primordial copper cutter"
    summary: "Ea retrieves the primordial copper/bronze cutter used to separate heaven and earth; severs Ullikummi from Upelluri"
    verdict: "SUPPORTED"
    corroboration: >
      Web search: 'Ea, who lives in the Apsu, obtains the toothed cutting
      tool with which heaven and earth were cut apart shortly after creation;
      this tool will disable Ullikummi.' Second result: 'Ea visited Upelluri
      and cut off the feet of Ullikummi, toppling him. This mythological
      tool, originally used to separate the primordial heavens and earth
      during creation, was redeployed to defeat the stone giant.' Third
      source: 'Teshub be given the ancient copper knife originally used to
      split heaven and earth apart at the beginning of time. Armed with this
      knife, Teshub splits Ullikummi from Ubelluri.' Note: the term varies
      ('copper knife', 'toothed cutting tool', 'bronze/copper saw/sickle')
      — the claims document correctly uses 'primordial copper cutter' which
      is consistent with the scholarly consensus on the implement's material
      (copper) and function. Fully corroborated.

  - claim_location: "§ Severing is structural, not mortal"
    summary: "The cut removes Ullikummi's cosmographic anchorage, making him vulnerable; not a direct kill"
    verdict: "SUPPORTED"
    corroboration: >
      Consistent with multiple accounts. Wikipedia: 'the end of the story
      is broken away' — confirming that the severing precedes (rather than
      is) the final defeat. The structural/not-mortal characterisation is
      corroborated by the text's broken ending and the scholarly consensus
      that Teshub's victory follows the severing as a second act.

  - claim_location: "§ Song's ending not extant"
    summary: "The Song of Ullikummi's closing passages are not preserved; Teshub's victory implied"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Ullikummi): 'the end of the story is broken away in the
      source texts, leaving Ullikummi's final defeat to scholarly assumption.'
      Fully corroborated.

  - claim_location: "§ Hedammu: Kumarbi + Šertapšuruḫi"
    summary: "Hedammu generated by Kumarbi mating with the daughter of the sea-god, named Šertapšuruḫi"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Ḫedammu): 'Ḫedammu is the son of the god Kumarbi and
      Šertapšuruḫi, the daughter of the personification of the sea, Kiaše.'
      Voracious appetite attested: 'a snake whose voracious appetite leads
      him to devour all kinds of animals and vegetables.' Corroborated.

  - claim_location: "§ Šauška's seduction of Hedammu"
    summary: "Šauška/Ishtar seduces Hedammu; he is incapacitated; sequel lost"
    verdict: "SUPPORTED"
    corroboration: >
      Sauska (World History Encyclopedia): 'The goddess Sausga, the Hurrian
      counterpart of Ishtar, goes to the shore, beguiles him with her singing
      and beauty, seduces him, and renders him impotent with drink.' Sequel
      not preserved — confirmed. Academy article: 'Ishtar seduces the
      Sea-serpent' (Dijkstra 2011 in Ugarit-Forschungen). Corroborated.

  - claim_location: "§ Song of the Sea: fragmentary; Sea as antagonist"
    summary: "Song of the Sea is more fragmentary than Hedammu; storm-god vs. personified Sea"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (via Kumarbi article): 'Song of the Sea (CTH 785; preserved
      on tablets KBo 8.86 and KUB 44.7) might represent a further section
      of the Kumarbi Cycle. It most likely describes a battle between Teshub
      and the deified sea, though due to imperfect understanding of Hurrian
      little is known about the details of its plot.' Corroborated as
      fragmentary and storm-god-vs-Sea.

  - claim_location: "§ Transmission argument: Kumarbi → Hesiod succession"
    summary: "Alalu→Anu→Kumarbi→Teshub maps onto Ouranos→Kronos→Zeus; castration motif as key correspondence"
    verdict: "SUPPORTED"
    corroboration: >
      West 1997 (confirmed via Oxford UP and Bryn Mawr Classical Review):
      'West summarizes Hesiod's account alongside those of the Hurro-Hittite
      story of Kumarbi and draws astute points of comparison.' Burkert 1992
      (confirmed via Harvard UP description): 'the myth which has the
      castration of the god of heaven by Kumarbi is so similar to Hesiod's
      tale about Uranos and Kronos; the Kumarbi-Kronos parallel has been
      established.' Kumarbi succession → Hesiodic succession correspondence
      is one of the most robustly corroborated claims in the entire document.

  - claim_location: "§ Sanchuniathon/Philo of Byblos as intermediate text"
    summary: "West treats Sanchuniathon (via Philo of Byblos/Eusebius) as intermediate between Hurro-Hittite and Hesiodic versions"
    verdict: "SUPPORTED"
    corroboration: >
      Wikipedia (Sanchuniathon): 'Sanchuniathon's three works survive only
      in partial paraphrase… recorded by the Christian bishop Eusebius.
      According to the text, as in the Greek and Hittite theogonies,
      Sanchuniathon's El/Elus/Ilus/Cronus overthrows his father Sky or
      Uranus and castrates him.' West 1997 is confirmed as treating this
      material (Bryn Mawr Classical Review). Corroborated.

  - claim_location: "§ Ullikummi–Typhon parallel"
    summary: "Ullikummi narrative is principal evidence for Hurro-Hittite ancestry of Greek Typhon"
    verdict: "SUPPORTED"
    corroboration: >
      West 1997 confirmed across multiple sources as treating Ullikummi-Typhon
      as the central combat-myth correspondence alongside the theogonic
      succession. Cross-ref to Ch. 11 is appropriate. Corroborated.

  - claim_location: "§ Burkert's Phoenician-intermediary hypothesis"
    summary: "Burkert argues Kumarbi material reaches Greek poets via Phoenician-mediated Levantine network"
    verdict: "SUPPORTED"
    corroboration: >
      Harvard UP catalogue (Burkert 1992): 'orientalizing century 750-650
      B.C., the period of Assyrian conquest, Phoenician commerce, and Greek
      exploration… Burkert has argued that it was migrating seers and healers
      who transmitted their skills.' Multiple independent confirmations of
      the Phoenician-intermediary argument as Burkert's thesis. Corroborated.

  - claim_location: "§ Güterbock as foundational philologist"
    summary: "Güterbock's mid-century editions established the framework Hoffner inherits"
    verdict: "SUPPORTED"
    corroboration: >
      WorldCat entry: 'The song of Ullikummi; revised text of the Hittite
      version of a Hurrian myth' by Hans Gustav Güterbock — confirmed as
      the foundational edition. Multiple sources cite Güterbock 1952 and
      1951-52 as the standard comparative frame. Corroborated.

  - claim_location: "§ Kumarbi Cycle classified as unified vs. loose grouping"
    summary: "Classification of cycle as unified vs. aggregation is a scholarly judgment"
    verdict: "SUPPORTED"
    corroboration: >
      TV Tropes (Kumarbi Cycle) and multiple scholarly sources reflect the
      scholarly debate over cyclic vs. aggregational classification. Song of
      Silver's membership in the cycle is explicitly described as 'only
      conjectural' in one search result. The claims document flags this
      alternative appropriately. Corroborated.

