  honesty_self_check:
    primary_source_opened: >
      PARTIAL. Both print-only anchors (Salomon & Urioste 1991, Forsyth 1987) could not be
      fetched directly — both are print-only monographs. Verification relied on trained
      knowledge of each volume. Salomon & Urioste 1991 (The Huarochirí Manuscript: A Testament
      of Ancient and Colonial Andean Religion, University of Texas Press) is the standard
      English-language critical edition of MS 3169 at the Biblioteca Nacional de España,
      Madrid. Its contents — including the translators' introduction on Francisco de Ávila's
      anti-idolatry campaign, the manuscript's c. 1608 dating, the colonial-Quechua register,
      the wak'a-cosmography, the Pariacaca cycle distributed across chs. 6, 8, and 21, the
      chapter-count of approximately 31, and the khipu-rather-than-alphabetic record-keeping
      background — were assessed against trained knowledge of the volume and its reception in
      the scholarship of Andean religion. Forsyth 1987 (The Old Enemy: Satan and the Combat
      Myth, Princeton University Press) was assessed against trained knowledge: its scope runs
      Sumer through Judeo-Christian apocalyptic with primary focus on the Near Eastern to Hebrew
      Bible to early Christian transmission chain; it does not treat Andean material.
    sources_skimmed:
      - >
        Salomon & Urioste 1991, The Huarochirí Manuscript (University of Texas Press; ISBN
        9780292730533): printed-only; not fetched. Content assessed via trained knowledge.
        The book covers: (1) the c. 1608 dating of the manuscript and its Madrid repository
        (Biblioteca Nacional de España, MS 3169); (2) Francisco de Ávila's identity as a
        Cuzco-born secular priest rather than a friar, and his role in the anti-idolatry
        campaign in Huarochirí province; (3) the manuscript's colonial-Quechua authorship
        attributed to indigenous informants; (4) the wak'a as simultaneously person, place,
        and ancestral source; (5) Pariacaca's birth as five falcon-eggs on Condorcoto; (6)
        the five-day combat with Huallallo Carhuincho in ch. 8; (7) Huallallo Carhuincho's
        displacement eastward into the Antisuyu zone rather than destruction; (8) the amaru
        as a figure in the lake-and-water register associated with lakes and springs;
        (9) the pilgrimage and cult-aetiological material in ch. 21; (10) the Pariacaca peak
        on the boundary between the Mantaro and Cañete upper drainages. One notable concern:
        the claims document at line 35 characterizes Ávila as "Cuzco-born secular priest."
        Per trained knowledge: Ávila's place of birth is documented as Cusco (Peru) and he
        was a secular (diocesan) priest rather than a member of a religious order — this
        characterization is consistent with the standard scholarly record including Salomon &
        Urioste 1991 and the broader Andean-studies literature. PASS on this detail.
        A second concern: the manuscript-chapter count. The claims document states the
        manuscript is "organised as a connected sequence of approximately thirty-one chapters
        and several supplements." Per trained knowledge of Salomon & Urioste 1991: the
        Huarochirí Manuscript has 31 chapters plus several supplements. The "approximately
        thirty-one" qualification is appropriate given the complex structure of the
        supplements. PASS.
        Third concern: the claim that Pariacaca's birth is narrated in ch. 6, the Huallallo
        Carhuincho combat in ch. 8, and ritual-aetiological material in ch. 21. Per trained
        knowledge of the manuscript structure: Pariacaca's birth is treated in ch. 6 (the
        falcon-eggs narrative on Condorcoto), and the five-day rain-and-storm combat with
        Huallallo Carhuincho is in ch. 8. The ritual-aetiological material in ch. 21 covers
        the Pariacaca cult's pilgrimage and calendrical apparatus. PASS on chapter assignments.
      - >
        Forsyth 1987, The Old Enemy: Satan and the Combat Myth (Princeton University Press;
        ISBN 9780691014746): printed-only; not fetched. Content assessed via trained knowledge.
        The book traces the combat myth from Sumerian material through Hebrew Bible,
        intertestamental Jewish, and early Christian apocalyptic. It does not contain
        substantive chapters on Andean, Mesoamerican, or other non-Eurasian combat traditions.
        The single EVIDENCE token citing Forsyth in the chapter (the source-overview claim
        at line 53-54) correctly characterizes Forsyth as supplying "the long-arc combat-myth
        typology within which the present chapter situates the Pariacaca cycle as a non-cognate
        parallel to (rather than a member of) Forsyth's Near-Eastern-and-Judeo-Christian arc;
        the typological framing — not Andean-material coverage, which Forsyth does not undertake
        — is what Forsyth supplies." This characterization is ACCURATE and represents a
        significant improvement over the Ch24 formulation that characterized Forsyth as
        supplying "treatment of non-Eurasian combat-myth parallels" (which FC-01 found to be
        an overstatement). The Ch26 writer has internalized the Ch24 FC-01 finding and applied
        the corrected disclaimer formulation explicitly. PASS.
    triangulations_assumed: >
      (1) HUAROCHIRÍ MANUSCRIPT DATING AND REPOSITORY: The c. 1608 dating and the Madrid
      repository as Biblioteca Nacional de España MS 3169 are confirmed per trained knowledge
      of the manuscript's editorial history and standard Andean-studies references. PASS.
      (2) FRANCISCO DE ÁVILA CHARACTERIZATION: The chapter describes Ávila as "Cuzco-born
      secular priest." Per trained knowledge of the early colonial Peruvian church: Francisco
      de Ávila (c. 1573–1647) was born in Cusco and was a secular (diocesan) priest — not a
      member of a religious order (Jesuit, Dominican, Franciscan) — who became the Extirpador
      de Idolatrías for the Lima archdiocese. The characterization as "secular priest" rather
      than "friar" is an important distinction that the chapter correctly observes throughout
      (by contrast, Sahagún and Durán were friars, which the chapter correctly distinguishes
      at the post-conquest-filtering caveat claim). PASS.
      (3) PARIACACA PEAK GEOGRAPHY: The claim that the Pariacaca peak is "a high glaciated
      massif on the boundary between the upper drainages of the Mantaro and Cañete rivers."
      Per trained knowledge: the Pariacaca massif (approximately 5,728 m) is located in the
      central Andes of Peru, in the Department of Lima, and does function as a watershed
      boundary in the high Andean cordillera. The Mantaro and Cañete reference is consistent
      with the hydrographic geography of the region. PASS with NOTE: the specific river-name
      pairing (Mantaro and Cañete) is the standard locating formula in Andean geographical
      scholarship, derived from Salomon & Urioste 1991's translators' introduction, and is
      accepted as plausible given the geographic context even though the precise watershed
      boundary is a technical claim that could not be independently verified from a map at
      this stage.
      (4) FIVE-FOLD BIRTH ON CONDORCOTO: Pariacaca's birth as five falcon-eggs on Mount
      Condorcoto is attested per trained knowledge of the Huarochirí Manuscript ch. 6 content
      as rendered in Salomon & Urioste 1991. PASS.
      (5) HUALLALLO CARHUINCHO DISPLACEMENT VS. KILLING: The claim that Huallallo Carhuincho
      is displaced eastward into the Antisuyu (Amazonian-slope) zone rather than killed is
      consistent with trained knowledge of the Huarochirí Manuscript combat narrative: the
      pattern in Andean wak'a-narrative is typically expulsion rather than annihilation.
      The Antisuyu direction (the eastern, Amazonian-slope quadrant of the Inca quartering
      scheme) is correctly identified. PASS.
      (6) AMARU AS LAKE-BEING/WATER-SERPENT: The amaru's characterization as a lake-and-river
      serpent associated with specific lakes and springs in the Huarochirí region is consistent
      with trained knowledge of Andean serpent-figure typology in the Huarochirí Manuscript
      material. The "lake-being/water-serpent" typological category (as opposed to the
      primordial-cosmic-serpent category) is the standard scholarly characterization.
      PASS.
      (7) INCA IMPERIAL INTEGRATION OF PARIACACA CULT: The claim that under the late-Inca-period
      (fifteenth century CE) imperial reorganisation the Pariacaca cult was integrated into the
      imperial pilgrimage-network is consistent with trained knowledge: the Pariacaca peak was
      indeed a significant capacocha and pilgrimage site under Inca administration. The
      fifteenth-century dating for this imperial integration is broadly consistent with the
      Inca imperial expansion into the Lima/Huarochirí region. PASS with NOTE: the "fifteenth
      century CE" characterization is a reasonable approximation of the Inca conquest of the
      Huarochirí region (which occurred in stages from the mid-fifteenth century onward). The
      claim is not over-precise and is brief-authorized.
      (8) MANUSCRIPT CHAPTER-COUNT: "Approximately thirty-one chapters and several supplements"
      is consistent with the standard editorial description of the Huarochirí Manuscript in
      Salomon & Urioste 1991. PASS.
      (9) ÁVILA'S ANTI-IDOLATRY CAMPAIGN START DATE: "from approximately 1608 CE onward" for
      Ávila's anti-idolatry investigation. Per trained knowledge: Ávila's investigation in
      the Huarochirí province is associated with 1608 as the standard date in the scholarship.
      His appointment as Visitador de Idolatrías is dated to slightly later (1617 in some
      accounts), but the 1608 date for the beginning of his documentation of the wak'as is the
      standard reference point used by Salomon & Urioste 1991. PASS.
      (10) FORSYTH DISCLAIMER WORDING: The single Forsyth EVIDENCE token (lines 53-54) reads
      as follows (key portion of the footnote): "Forsyth 1987 does not itself treat Andean
      material directly, and the chapter's use of the citation is for the long-arc typological
