findings:

  - id: FC-01
    severity: LOW
    category: unverified
    location: >
      §"The Huarochirí region and the wak'a-cosmography" — the body claim on Pariacaca's
      triple identity, EVIDENCE token: source_id=salomon-urioste-huarochiri ; loc=Huarochirí
      Manuscript chs. 6, 8. Specifically: "the eponymous Pariacaca peak in the western
      Cordillera, a high glaciated massif on the boundary between the upper drainages of
      the Mantaro and Cañete rivers."
    claim_text: >
      "Pariacaca himself is, in the manuscript, simultaneously a person (a divine figure born
      and acting in narrative time), a mountain (the eponymous Pariacaca peak in the western
      Cordillera, a high glaciated massif on the boundary between the upper drainages of the
      Mantaro and Cañete rivers), and an ancestral wak'a of the Yauyos people of the
      Huarochirí region..."
    problem: >
      The Pariacaca peak's identification as lying on "the boundary between the upper drainages
      of the Mantaro and Cañete rivers" is a specific hydrographic claim that cannot be
      independently verified from sources available to this auditor at the claims stage. The
      Pariacaca massif (approximately 5,728 m) is located in the Department of Lima, Peru, and
      does function as a high Andean watershed feature. The Mantaro River is the major river of
      the Junín region to the east; the Cañete River drains the western slopes toward the
      Pacific. The claim that the Pariacaca peak specifically marks the watershed boundary
      between these two river systems is plausible given the Andean geography, but the precise
      river-name pairing has not been independently verified from a hydrographic source. The
      claim is anchored to Salomon & Urioste 1991 chs. 6, 8, which is the correct source for
      geographical claims about the Pariacaca peak. This is LOW — the geographic detail is
      plausible, brief-consistent, and source-anchored to the correct authority; but it cannot
      be confirmed at verbatim-quote precision from this audit context.
    evidence: >
      Salomon & Urioste 1991, translators' introduction, is known to identify the Pariacaca
      massif as a watershed peak in the western Cordillera of central Peru. The specific
      Mantaro/Cañete river pairing is the standard Andean geographical locating formula for
      this massif in the scholarship. Per trained knowledge: the Cañete River drains the
      western Andean slopes toward the Pacific; the Mantaro is the major river system to
      the east. A watershed identification of the Pariacaca peak as sitting between these
      two systems is geographically consistent with the massif's known location.
    recommended_fix: >
      Before chapter-draft, confirm the precise Mantaro/Cañete watershed claim against
      Salomon & Urioste 1991 translators' introduction (where the geography of the Pariacaca
      peak is laid out in some detail) and against a modern Andean hydrographic reference.
      If the specific Mantaro/Cañete pairing is in Salomon & Urioste 1991 as stated, this
      finding becomes a PASS. If the actual watershed boundary involves a different river on
      either side (e.g., the Rímac rather than the Cañete for the Pacific-slope drainage
      in this portion of the cordillera), revise the claim accordingly. This is a
      LOW-priority fix that can be held to the post-human-normalize stage.

  - id: FC-02
    severity: NOTE
    category: note
    location: >
      sources.yaml — Taylor and Dean are not in the source registry. Also: Bray and
      MacCormack named in brief special_instructions but absent from both sources.yaml
      and the body of the claims document.
    claim_text: >
      (APPROPRIATION-FLAG body text) "with the further area-specialists Gérald Taylor in his
      Lima IFEA critical edition of the Huarochirí Manuscript and Carolyn Dean on Andean
      ritual-political imagination, named in the brief's special_instructions."
    problem: >
      Gérald Taylor (Ritos y tradiciones de Huarochirí, Lima: IFEA, 1987/2008) and Carolyn
      Dean (A Culture of Stone: Inka Perspectives on Rock, Durham: Duke University Press,
      2010) are named in the APPROPRIATION-FLAG body text as area specialists whose reading
      supports the wak'a-succession framing. However, neither appears in sources.yaml. The
      chapter handles this correctly via the named-but-flagged pattern (per Ch23 FC-02
      precedent), naming the scholars in body prose without routing EVIDENCE tokens through
      them. This is a pipeline-management NOTE rather than a factual finding: the named-but-
      flagged pattern is the established solution, and no body claim is unsupported.
      Additionally, Bray (Tamara Bray, on Inca objects) and MacCormack (Sabine MacCormack,
      on pre-Columbian Andean religion) are named in the brief's special_instructions as
      "cite by name in the first factual pass as relevant" — neither appears in the claims
      document. This is acceptable given the "as relevant" qualifier; neither is load-bearing
      for any specific claim in the chapter. NOTE rather than finding.
    evidence: >
      sources.yaml: no entry for Taylor, Dean, Bray, or MacCormack. Brief special_instructions:
      "Area-specialist citation policy applies: cite Salomon, Urioste, Taylor, Dean, and (as
      relevant) Bray or MacCormack by name in the first factual pass." The APPROPRIATION-FLAG
      body text names Salomon, Urioste, Taylor, and Dean but not Bray or MacCormack —
      consistent with the "as relevant" condition on the latter two. The named-but-flagged
      pattern (Taylor, Dean) is the established pipeline precedent per Ch23 FC-02.
    recommended_fix: >
      Before the chapter-draft stage, add the following entries to sources.yaml:
        id: taylor-ritos
        source_tier: primary-translation
        author: "Taylor, Gérald"
        title: "Ritos y tradiciones de Huarochirí"
        year: 1987 (revised 2008)
        full_citation: "Taylor, G. (trans. and ed.), Ritos y tradiciones de Huarochirí:
          Manuscrito quechua de comienzos del siglo XVII (Lima: IFEA / IEP, 1987;
          revised ed. 2008)."
        notes: "French-Peruvian Andeanist's parallel Spanish/Quechua critical edition of
          the Huarochirí Manuscript. Cited alongside Salomon & Urioste 1991 in area-
          specialist literature on the Pariacaca cycle."
        id: dean-culture-stone
        source_tier: secondary
        author: "Dean, Carolyn"
        title: "A Culture of Stone: Inka Perspectives on Rock"
        year: 2010
        full_citation: "Dean, C., A Culture of Stone: Inka Perspectives on Rock
          (Durham: Duke University Press, 2010)."
        notes: "Andean ritual-political imagination; area-specialist anchor for the
          wak'a-succession reading of the Pariacaca material."
      This is a LOW-priority pipeline-management fix, not a factual error. The named-but-
      flagged pattern is acceptable at the claims stage; the sources.yaml additions are
      needed before chapter-draft.

