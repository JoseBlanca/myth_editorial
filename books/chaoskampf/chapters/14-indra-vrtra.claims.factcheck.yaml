findings:
  - claim_number: 36
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "RV 1.32.8 names Vṛtra's mother Dānu and stages her over the body of her
      slain son: Dānu lies above Vṛtra 'as a cow above her calf'."
    issue: >
      In Jamison-Brereton's translation, the Dānu-over-Vṛtra passage with the
      cow-and-calf simile falls in verse 9 (RV 1.32.9), not verse 8. Verse 8 in J-B
      describes the aftermath of the killing (the waters' condition). The verse-8
      attribution is repeated three times in the claims document (lines 176, 177, 180)
      and also carried into the arc summary at line 197 ("vv. 7–8 with the Dānu
      image"), which places Dānu one verse too early. This is a consistent off-by-one
      error in the J-B verse numbering for this passage.
    evidence: >
      In all standard Rigveda editions (Geldner, Grassmann, J-B), the verse
      traditionally numbered RV 1.32.9 reads (J-B paraphrase): "Lying there like
      reeds, the waters of Manu covered Vṛtra. Dānu lay covered as if (she were)
      a cow with her calf." Verse 8 precedes this and addresses Indra's victory
      over other forces. Training-knowledge confidence: HIGH.
    recommended_fix: >
      Change all three instances of "RV 1.32.8" (the Dānu verse) to "RV 1.32.9".
      Update the arc summary at line 197 from "body-and-water tableau (vv. 7–8
      with the Dānu image)" to "body-and-water tableau (vv. 7–9 including the Dānu
      image)" or "body-and-water tableau (vv. 7–9, with Dānu-over-Vṛtra at v. 9)".

  - claim_number: 52
    kind: CITATION-WRONG
    severity: MEDIUM
    claim: "The áhann áhim formula is attested at RV 1.32.1 (and in the second verse,
      depending on the editorial division of the line) as the announcing-line of the
      Vṛtra-hymn."
    issue: >
      This claim (at line 290) is internally inconsistent with the document's own
      earlier claim at line 143, which correctly states that the áhann áhim killing
      formula falls "in the second verse" (RV 1.32.2). Verse 1 contains the
      announcement of deeds (vīryà), not the killing-formula itself. By citing
      "RV 1.32.1 (and in the second verse)" the document creates a false ambiguity
      about whether the formula is in verse 1 or verse 2. In Jamison-Brereton and in
      Watkins's own treatment, the áhan áhim formula proper appears in verse 2.
      The citation "RV 1.32.1" is therefore wrong as a location for the formula.
    evidence: >
      RV 1.32.1 (J-B): announces the hymn's theme and names Indra as vajra-wielder
      (no killing formula). RV 1.32.2 (J-B): "He slew the serpent lying on the
      mountain [áhan áhim śayānam]... Tvaṣṭṛ fashioned the resonant bolt for him."
      The killing formula is unambiguously in verse 2. The document's line 143
      correctly identifies this; line 290 contradicts it. Training-knowledge
      confidence: HIGH.
    recommended_fix: >
      At line 290, revise to: "The áhann áhim formula is attested at RV 1.32.2
      as the killing-line of the Vṛtra-hymn, with verse 1 supplying the announcing
      frame." Remove the parenthetical ambiguity about verse 1. This aligns the
      passage with the correct statement at line 143 and with Watkins's own treatment.

  - claim_number: 84
    kind: UNVERIFIED
    severity: LOW
    claim: "The Mahābhārata Udyogaparvan 9–18 develops the brahminicide-and-expiation
      narrative more extensively."
    issue: >
      The specific chapter range 9–18 within the Udyogaparvan for the Vṛtra
      brahminicide narrative cannot be independently verified from trained knowledge
      with high confidence. The MBh Udyogaparvan does contain a Vṛtra narrative,
      but the exact chapter range varies by recension and edition (Critical Edition
      vs. vulgate). The claim cites Forsyth 1987 ch. 2 as its sole authority for
      this textual locus — an in-scope secondary source describing a primary text —
      which is permissible under the citation discipline but leaves the specific
      chapter range unverifiable without the printed Forsyth or the MBh text.
    evidence: >
      The brahminicide narrative in the Udyogaparvan is a well-established motif
      in the Mahābhārata. The chapter range 9-18 is plausible for the vulgate
      Udyogaparvan but cannot be confirmed without the primary text or Forsyth.
    recommended_fix: >
      Add a note that the chapter range 9–18 follows Forsyth 1987's reference and
      has not been independently verified against the Critical Edition. Alternatively,
      widen the reference to "Udyogaparvan (chapters treating the Vṛtra narrative)"
      without committing to the specific range.

  - claim_number: 12
    kind: UNVERIFIED
    severity: LOW
    claim: "Lambert's Babylonian Creation Myths published by Eisenbrauns in 2013 as
      Mesopotamian Civilizations 16."
    issue: >
      Lambert 2013 as an Eisenbrauns publication on Babylonian Creation Myths /
      Enūma Eliš is confirmed. The specific designation "Mesopotamian Civilizations
      16" as the series volume number cannot be independently verified from trained
      knowledge. The Mesopotamian Civilizations series exists and Lambert's volume
      is in it, but the number 16 is unverifiable without the printed text.
    evidence: >
      Lambert, W.G., Babylonian Creation Myths, Eisenbrauns 2013 — confirmed.
      "Mesopotamian Civilizations" as the series — confirmed. Volume number "16" —
      unverifiable from trained knowledge alone.
    recommended_fix: >
      Verify the series volume number against the printed book or its publisher
      catalogue page. If confirmed as vol. 16, the claim stands. If not, remove
      the volume number and cite as "Mesopotamian Civilizations series."

  - claim_number: 53
    kind: UNVERIFIED
    severity: LOW
    claim: "Watkins's monograph treats chapters 41 to 48 as the Vedic Vṛtra-combat
      section anchoring the HERO SLAY SERPENT formula."
    issue: >
      The attribution of chapters 41–48 specifically to the Vṛtra material cannot
      be verified from trained knowledge with full confidence. Watkins 1995 How to
      Kill a Dragon is a large monograph (~500 pp.) with many chapters; that it
      treats Indra-Vṛtra as the anchor case is well established, but the specific
      chapter numbers 41-48 are stated by the claims document without a
      verifiable trail. This is a LOW severity issue because (a) the source is
      printed-only per the brief discipline and (b) Watkins's coverage of the
      Vedic material is itself well-established.
    evidence: >
      Watkins 1995 contents: Indra-Vṛtra treatment confirmed as the anchor case;
      exact chapter numbers taken as stated.
    recommended_fix: >
      Verify the chapter numbers against the printed table of contents. The claim
      is plausible and the source is in-scope; this is a routine verification task
      for human review.

  - claim_number: 70
    kind: UNVERIFIED
    severity: LOW
    claim: "Vedic ahi and Avestan aži are regular phonological reflexes of a common
      Indo-Iranian *ajhi-."
    issue: >
      The specific reconstructed proto-form written as *_ajhi-_ may not match
      modern Indo-Iranian comparative phonology conventions. The standard
      Proto-Indo-Iranian reconstruction for the serpent-word ancestral to both
      Vedic ahi and Avestan aži is more typically written *H1ĵhi- or *Haĵi- in
      modern notation (reflecting the laryngeal and the palatal affricate), while
      the 1934 Benveniste-Renou notation would have used different conventions.
      The form *ajhi- is a plausible older convention but may not be the form
      Benveniste and Renou themselves used. This is a LOW issue: the cognacy claim
      is correct; only the specific proto-form notation is potentially dated.
    evidence: >
      ahi (Vedic) / aži (Avestan) cognacy: confirmed, standard. The proto-form
      notation *ajhi- vs modern *H1ĵhi-: cannot confirm without Benveniste-Renou
      printed text.
    recommended_fix: >
      Either verify the exact proto-form notation against Benveniste-Renou 1934
      and update if needed, or replace with a notation-neutral statement such as
      "the two terms are regular phonological reflexes of a shared Indo-Iranian
      proto-form" without committing to a specific transliteration convention.
