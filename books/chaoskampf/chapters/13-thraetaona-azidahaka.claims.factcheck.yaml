  - claim_ref: "Source overview / Gunkel 1895 as Endzeit anchor"
    claim_text: >
      The chapter's anchor for the eschatological dimension is Hermann Gunkel's
      Schöpfung und Chaos in Urzeit und Endzeit, whose Teil II treats the Endzeit
      eschatological combat material in the context of the Urzeit-Endzeit parallelism.
    verdict: SUPPORTED
    source: "sources.yaml (gunkel-1895)"
    note: >
      Gunkel 1895 in sources.yaml confirmed. Teil II of Schöpfung und Chaos treats
      Revelation 12 as the New Testament Chaoskampf instance and surveys Iranian
      eschatological combat material (including Frashokereti) as comparative context
      for the Urzeit-Endzeit parallelism. The claim that Teil II is the Endzeit-combat
      anchor is standard. Verified via trained knowledge of Gunkel's argument.

  - claim_ref: "Setting / Zoroastrian dualism — Ahura Mazdā vs. Angra Mainyu"
    claim_text: >
      The Zoroastrian religious framework within which the Thraētaona-Aži Dahāka
      combat is set is dualistic: the cosmos is the arena of a structural opposition
      between the supreme creator-god Ahura Mazdā and the evil spirit Angra Mainyu.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934 (trained knowledge of standard Zoroastrian studies)"
    note: >
      The Zoroastrian dualistic framework (Ahura Mazdā / Angra Mainyu) is one of the
      most securely attested features of the tradition across the Avestan corpus,
      the Bundahišn, and Dēnkard. Standard in every treatment of Zoroastrian religion.

  - claim_ref: "Setting / Ahura Mazdā as Wise Lord / Ohrmazd in Pahlavi"
    claim_text: >
      Ahura Mazdā — Avestan for 'Wise Lord' — is the supreme creator-god of the
      Zoroastrian tradition; in the Pahlavi tradition the same figure appears under
      the Middle Persian name Ohrmazd.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; glossary.yaml"
    note: >
      Ahura Mazdā = 'Wise Lord' is the standard etymology (Avestan ahura = lord,
      Mazdā = wise). Ohrmazd is the standard Middle Persian form. Confirmed.

  - claim_ref: "Setting / Angra Mainyu as evil spirit / Ahriman in Pahlavi"
    claim_text: >
      Angra Mainyu — Avestan for 'the evil spirit' — is the cosmic adversary of
      Ahura Mazdā; in the Pahlavi tradition the same figure appears under the Middle
      Persian name Ahriman.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; glossary.yaml"
    note: >
      Standard Avestan etymology confirmed. Ahriman as Middle Persian form confirmed.

  - claim_ref: "Setting / Aži Dahāka as creature of Angra Mainyu"
    claim_text: >
      The dragon Aži Dahāka is in the Avestan and Pahlavi traditions a creature of
