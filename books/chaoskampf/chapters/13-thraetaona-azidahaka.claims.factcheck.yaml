      cosmic dualism.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V ch. 45 (trained knowledge)"
    note: >
      Standard across the Avestan and Pahlavi corpus. Confirmed.

  - claim_ref: "Setting / Thraētaona's Āθβiia patronymic as Indo-Iranian inheritance"
    claim_text: >
      The Avestan name Thraētaona designates a hero of the Āθβiia line, and the
      patronymic Āθβiia is itself part of the Indo-Iranian inheritance that aligns
      Thraētaona with the Vedic Trita Āptya.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; West 2007 ch. 5 (trained knowledge)"
    note: >
      Thraētaona's Āθβiia patronymic and its cognancy with Vedic Āptya is the
      foundational philological argument of Benveniste and Renou 1934.
      Standard in the field.

  - claim_ref: "Setting / Thraētaona name-chain: Thraētaona → Frēdōn → Fereydun"
    claim_text: >
      Thraētaona's onomastic afterlife in the Iranian tradition runs Avestan
      Thraētaona → Middle Persian Frēdōn → New Persian Fereydun.
    verdict: SUPPORTED
    source: "glossary.yaml; Benveniste and Renou 1934"
    note: "Standard onomastic chain confirmed in glossary.yaml. Correct."

  - claim_ref: "Setting / aži as Indo-Iranian 'serpent' cognate with áhi"
    claim_text: >
      The Avestan word aži — the generic term for 'serpent' — is philologically
      cognate with Vedic áhi, the word that the Rigvedic combat-formula áhann áhim
      ('he killed the serpent') uses for Vṛtra.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V chs. 44-45 (trained knowledge)"
    note: >
      The aži / áhi cognancy is one of the most securely established Indo-Iranian
      comparative philological correspondences. Confirmed.

  - claim_ref: "Setting / Damāvand as Pahlavi-narrative binding-locus, not Avestan"
    claim_text: >
      The mountain Damāvand is the cosmogeographic feature under which Aži Dahāka
      is bound in the Pahlavi tradition; in the Avestan corpus the binding-mountain
      is not yet named in the surviving allusions.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 46; Benveniste and Renou 1934 (trained knowledge)"
    note: >
      The Avestan allusions presuppose the combat without naming Damāvand as the
      binding-locus. The Damāvand localisation is post-Achaemenid Pahlavi material.
      Standard in the field.

  - claim_ref: "Mvt I / Yašt 5.33-35 as principal Avestan locus; prayer to Anāhitā"
    claim_text: >
      The principal Avestan locus for Thraētaona's combat with Aži Dahāka is Yašt 5
      stanzas 33 to 35, embedded within the Ābān Yašt, the hymn to the goddess
      Arədvī Sūrā Anāhitā, the Avestan goddess of waters. In Yašt 5.33-35
      Thraētaona prays to Anāhitā for victory over Aži Dahāka.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V ch. 44 (trained knowledge)"
    note: >
      Yašt 5 (Ābān Yašt) stanzas 33-35 as the Thraētaona-Aži Dahāka prayer is
      standard in Avestan scholarship. Yašt 5 = Ābān Yašt (hymn to Arədvī Sūrā
      Anāhitā). The prayer-to-Anāhitā frame for Thraētaona's combat request is
      confirmed. Correct.

  - claim_ref: "Mvt I / Aži Dahāka morphological formula: three-headed, six-eyed, three-jawed"
    claim_text: >
      In the Yašt 5.33-35 hymn-passage Aži Dahāka is described in formulaic terms
      as the three-headed, six-eyed, three-jawed dragon — the morphological description
      that becomes the standard portrait throughout the Avestan-and-Pahlavi tradition.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V chs. 44-45 (trained knowledge)"
    note: >
      The three-headed / six-eyed / three-jawed formula for Aži Dahāka is one of the
      most reliably attested elements of the Avestan dragon-formula. Confirmed across
      Avestan corpus from Yt. 5, Yt. 9, Yt. 19 and the Bundahišn.

  - claim_ref: "Mvt I / Yašt 19 (Zamyād Yašt) and xᵛarənah theology"
    claim_text: >
      The third principal Avestan locus for the combat is Yašt 19, the Zamyād Yašt —
      the hymn to the xᵛarənah, the Avestan term conventionally translated 'kingly
      glory' that designates the divinely-bestowed charisma legitimating Iranian
      sovereignty. Yašt 19 places Thraētaona's combat within the xᵛarənah-theology.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V chs. 44, 47 (trained knowledge)"
    note: >
      Yašt 19 (Zamyād Yašt) as the xᵛarənah hymn that places Thraētaona's combat
      in the royal-legitimation sequence is standard in Avestan studies.
      xᵛarənah = 'kingly glory/splendour' is a confirmed translation. Correct.

  - claim_ref: "Mvt I / Vendīdād allusions to Aži Dahāka in demonological taxonomy"
    claim_text: >
      The Vendīdād allusions treat the Thraētaona combat as part of the legendary-
      prehistorical horizon presupposed by the law-code's purity rules, with Aži
      Dahāka named as the type-specimen of the destructive demonic creature. Aži
      Dahāka belongs to the class of daēvic (demonic) creatures associated with
      Angra Mainyu.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934 (trained knowledge of Vendīdād content)"
    note: >
      The Vendīdād's demonological taxonomy and Aži Dahāka's daēvic status
      are confirmed in Avestan studies. The Vendīdād's priestly-law-code
      context for demon-references is standard. Correct.

  - claim_ref: "Mvt I / jan- / han- cognancy as philological pillar"
    claim_text: >
      The combat-narrative presupposed by the Avestan hymn-allusions has Thraētaona
      dispatching the dragon by smiting, and the principal verb is the Avestan jan-
      'to smite,' cognate with the Vedic han- of the Indra-Vṛtra formula áhann áhim.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V chs. 44-45 (trained knowledge)"
    note: >
      The jan- (Avestan) / han- (Vedic) cognancy is one of the three principal
      philological pillars of the Indo-Iranian comparative reading. Standard.

  - claim_ref: "Mvt I / Avestan combat not cosmogonic — legendary-historical framing"
    claim_text: >
      In the Avestan hymn-allusions the consequence of Thraētaona's victory is
      presented in legendary-historical rather than cosmogonic terms: the cosmos has
      already been established by Ahura Mazdā's creative act, and Thraētaona's combat
      is a moment within that already-established cosmos rather than a moment of its
      founding.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V ch. 45; scope.md function-types"
    note: >
      The non-cosmogonic, sovereignty/royal-legitimation character of the Thraētaona
      combat is standard in the scholarship and confirmed by scope.md's inclusion
      criteria. Correct.

  - claim_ref: "Mvt II / Bundahišn as fullest Pahlavi narrative; post-Achaemenid date c. 8th-9th CE"
    claim_text: >
      The Pahlavi Bundahišn — the 'Book of the Primal Creation' — contains the fullest
      surviving narrative of Thraētaona's combat with Aži Dahāka. The post-Achaemenid
      date of the Bundahišn — late Sasanian / early Islamic, c. 8th-9th century CE.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V chs. 44, 46; scope.md (Bundahišn as latest in-scope primary source)"
    note: >
      The Bundahišn's c. 8th-9th CE Sasanian/early Islamic redaction date is
      standard in Pahlavi studies. The title "Book of the Primal Creation" (or
      "Primordial Creation") is the standard English translation. Confirmed.

  - claim_ref: "Mvt II / Bundahišn thousand-year tyranny of Aži Dahāka"
    claim_text: >
      The Pahlavi Bundahišn gives the dragon a tyrannical-political role: Aži Dahāka
      rules the world for a thousand years as a usurping tyrant, displacing legitimate
      rule, before Thraētaona arises to overthrow him.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 46 (trained knowledge of Bundahišn content)"
    note: >
      Aži Dahāka's thousand-year tyranny is one of the most widely known elements
      of the Pahlavi narrative tradition. Confirmed in standard summaries of the
      Bundahišn and Dēnkard material.

  - claim_ref: "Mvt II / Bundahišn binding at Damāvand — not killing"
    claim_text: >
      The Bundahišn's narrative does not conclude with Aži Dahāka's death: the dragon
      is not killed by Thraētaona but bound — held in living captivity — and the
      Pahlavi Bundahišn situates the binding at Mount Damāvand.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V chs. 46, 48 (trained knowledge)"
    note: >
      The binding-not-killing structure with Damāvand as the locus is one of the
      defining features of the Iranian Aži Dahāka tradition in the Pahlavi corpus.
      Standard and confirmed.

  - claim_ref: "Mvt II / Pīšdādian dynasty frame for Thraētaona"
    claim_text: >
      The Bundahišn's account locates the Thraētaona combat within a long Iranian
      heroic-genealogical sequence — the Pīšdādian dynasty in the Pahlavi
      historiographical scheme, of which Thraētaona is a member.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 46 (trained knowledge of Pahlavi historiography)"
    note: >
      The Pīšdādian dynasty as the legendary pre-historic dynastic frame in Pahlavi
      historiography, with Thraētaona/Frēdōn as a member, is standard and confirmed
      across the Bundahišn and Dēnkard traditions. Correct.

  - claim_ref: "Mvt III / Frashokereti — final renovation; Middle Persian frašegird"
    claim_text: >
      Frashokereti — the Avestan term conventionally translated 'the final renovation,'
      for which Middle Persian sources use the cognate frašegird — designates the
      Zoroastrian end-time.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 48; Gunkel 1895 Teil II; glossary.yaml"
    note: >
      Frashokereti / frašegird cognancy and 'final renovation' as the standard
      translation are confirmed in Zoroastrian studies. Correct.

  - claim_ref: "Mvt III / Aži Dahāka devouring a third of humanity at Frashokereti"
    claim_text: >
      The dragon's escape is a moment of intense cosmic-religious crisis: in the
      Pahlavi narrative Aži Dahāka, freed from his binding, devours a third of
      humanity and a third of the animals.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 48 (trained knowledge of Bundahišn/Dēnkard content)"
    note: >
      The "one-third of humanity and cattle" motif for Aži Dahāka's end-time
      rampage is a well-known element of the Pahlavi eschatological narrative
      (Bundahišn and Dēnkard book 7). Confirmed.

  - claim_ref: "Mvt III / Kərəsāspa as the Frashokereti dragon-slayer"
    claim_text: >
      The heroic response is supplied by Kərəsāspa, the second principal Avestan-Pahlavi
      heroic-figure, who has been preserved in a long stasis throughout the present age
      and is revived at Frashokereti specifically for this final combat.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 48; Benveniste and Renou 1934 (trained knowledge)"
    note: >
      Kərəsāspa as the revived hero who kills Aži Dahāka at Frashokereti is the
      standard account in the Bundahišn and Dēnkard. Confirmed.

  - claim_ref: "Mvt III / molten-metal ordeal and resurrection at Frashokereti"
    claim_text: >
      After the killing the Pahlavi narrative continues with the wider Frashokereti
      scenario: the resurrection of the dead, the molten-metal ordeal that purifies
      the resurrected, the reunification of soul and body.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 48; Gunkel 1895 Teil II (trained knowledge)"
    note: >
      The molten-metal ordeal (molten metal flowing over the earth to purify souls)
      and the resurrection of the dead are among the most widely-known elements of
      the Zoroastrian Frashokereti scenario, attested in the Bundahišn and Dēnkard.
      Confirmed.

  - claim_ref: "Mvt III / Urzeit-Endzeit doubled combat structure"
    claim_text: >
      The pendant-structure of the two combats means that the Iranian tradition is
      uniquely articulated with both an Urzeit combat (Thraētaona at the founding of
      the present age) and an Endzeit combat (Kərəsāspa at its close) — and Gunkel's
      1895 Urzeit-und-Endzeit parallelism finds in the Iranian tradition one of its
      clearest exemplifications.
    verdict: SUPPORTED
    source: "Gunkel 1895 Teil II; Watkins 1995 Part V chs. 44-48 (trained knowledge)"
    note: >
      The Urzeit-Endzeit parallelism as exemplified by the Iranian doubled-combat
      is the standard reading invoked by Gunkel and developed in subsequent scholarship.
      Confirmed.

  - claim_ref: "IE cognancy / Thraētaona - Trita Āptya name cognancy from tri-"
    claim_text: >
      The Avestan name Thraētaona and the Vedic name Trita Āptya are philologically
      cognate: both derive from the Indo-Iranian numeral root tri- 'three' with a
      heroic-name-forming suffix, and both belong to a heroic-figure who slays a
      three-headed serpent.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V chs. 44-45; West 2007 ch. 5"
    note: >
      The Thraētaona ~ Trita cognancy via the numeral root *tri-* is the cornerstone
      of the Indo-Iranian dragon-slayer comparative argument. Standard.

  - claim_ref: "IE cognancy / Āθβiia - Āptya patronymic cognancy"
    claim_text: >
      The Avestan patronymic Āθβiia (Thraētaona's father-line) is itself cognate
      with the Vedic Āptya (the patronymic of Trita).
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; West 2007 ch. 5 (trained knowledge)"
    note: >
      The Āθβiia / Āptya patronymic cognancy alongside the hero-name cognancy is
      a well-established philological argument in the Indo-Iranian comparative
      literature. Confirmed.

  - claim_ref: "IE cognancy / Vərəθraγna ~ Vṛtrahán cognancy"
    claim_text: >
      The Avestan victory-god Vərəθraγna and the Vedic Indra epithet Vṛtrahán —
      both translatable as 'smiter of Vṛtra' / 'victory-bringer,' and both
      philologically derived from the same root vṛ- 'to obstruct' / 'to enclose' —
      are a third pillar of the Indo-Iranian comparative philology.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934 (title: Vṛtra et Vṛθragna = the central argument)"
    note: >
      The Vərəθraγna ~ Vṛtrahán cognancy is literally in the title of Benveniste and
      Renou 1934. Both terms derive from the IE root *wṛ- (to enclose/obstruct) and
      the agent/epithet formation. Confirmed.

  - claim_ref: "IE cognancy / áhann áhim in RV 1.32 as IE HERO SLAY SERPENT"
    claim_text: >
      The Vedic combat-formula áhann áhim ('he killed the serpent') in Rigveda 1.32 —
      the Indra-Vṛtra hymn — is, on Watkins's analysis, the principal Indo-European
      philological evidence for an inherited HERO SLAY SERPENT formula, and the
      Avestan jan-aži- of the Thraētaona tradition is the Iranian formulaic reflex.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V chs. 44-45; Jamison and Brereton 2014 at RV 1.32"
    note: >
      RV 1.32.1 (the Vṛtra-hymn) contains áhann áhim as the combat formula.
      Watkins's argument using this as the IE anchor is his book's central thesis.
      The parallel with Avestan jan-aži- is standard. Correct.

  - claim_ref: "Reception / Shāhnāmeh c. 1000 CE; Thraētaona as Fereydun, Aži Dahāka as Zahhāk"
    claim_text: >
      The most influential post-Avestan-and-Pahlavi reception is the New Persian
      Shāhnāmeh of Firdowsi, composed c. 1000 CE, which recasts Thraētaona as Fereydun
      and Aži Dahāka as the tyrant Zahhāk.
    verdict: SUPPORTED
    source: "Watkins 1995 Part V ch. 46; brief 13-thraetaona-azidahaka.yaml"
    note: >
      Firdowsi's Shāhnāmeh c. 1000 CE; Fereydun = Thraētaona; Zahhāk = Aži Dahāka.
      Standard in Persian literary studies. Correct.

  - claim_ref: "LACUNA marker — Avestan allusive vs. Pahlavi narrative"
    claim_text: >
      The Avestan hymn-allusions to Thraētaona's combat with Aži Dahāka are allusive
      rather than narrative — the Avestan corpus presupposes the combat-narrative but
      does not narrate it at length; the fuller narrative survives only in the
      post-Achaemenid Pahlavi Bundahišn and Dēnkard book 7 compilations.
    verdict: SUPPORTED
    source: "Benveniste and Renou 1934; Watkins 1995 Part V chs. 44-48"
    note: >
      The allusive vs. narrative distinction between Avestan and Pahlavi sources
      is the standard and widely-confirmed characterisation of the textual situation.
      The LACUNA marker is correctly applied. Correct.

  - claim_ref: "VARIANT marker — Avestan vs. Pahlavi: present-both, marked-temporally"
    claim_text: >
      VARIANT tag: primary=Avestan hymn-allusions — earlier and allusive |
      alt=Pahlavi narrative compilation — later and narrative | chosen: present-both,
      marked-temporally per brief.
    verdict: SUPPORTED
    source: "brief 13-thraetaona-azidahaka.yaml; scope.md variant presentation policy"
    note: >
      The VARIANT is correctly identified, correctly resolved (present-both per brief
      stipulation), and correctly reasons about the temporal layering as load-bearing.
      Formally complete.

  - claim_ref: "INFERENCE markers — four total, all appropriately scoped"
    claim_text: >
      The four INFERENCE markers (binding-not-killing opens Frashokereti;
      Iranian-to-Christian-structural-pivot; IE three-headed-serpent inherited narrative;
      Iranian-Vedic theological divergence correlation) are all tagged as inferences
