findings:

  - id: FC-01
    severity: HIGH
    category: citation_wrong
    location: >
      §"Movement II — The Pahlavi narrative" — claim at file line 225 beginning
      "The political-historical context in which the Pahlavi Bundahišn was redacted…"
    claim_text: >
      The political-historical context in which the Pahlavi Bundahišn was redacted —
      late Sasanian Iran and the early Islamic centuries — shaped the narrative's
      emphases: the royal-legitimation function-type that the xᵛarənah-theology of
      Yašt 19 already underwrites receives in the Pahlavi narrative a more concrete
      tyrant-overthrow articulation that maps onto Sasanian-period legitimation
      discourse.footnote:[Forsyth 1987, on the late-Sasanian and early-Islamic context
      of the Bundahišn redaction; Lincoln 2012, on Iranian combat-myth as
      political-ideological discourse (cited via Forsyth 1987 and Watkins 1995).]
    problem: >
      The footnote cites Lincoln 2012 as "cited via Forsyth 1987 and Watkins 1995."
      This is a chronological impossibility: Forsyth 1987 was published 25 years
      before Lincoln 2012. A 1987 publication cannot provide access to a 2012 one.
      Lincoln 2012 (Gods and Demons, Priests and Scholars, University of Chicago Press)
      is an independently in-scope source in sources.yaml ("Treats combat myths as
      political-ideological") and should be cited directly on its own authority, not
      attributed to a citation chain that runs backwards in time. This makes the
      Lincoln 2012 reference non-functional as a citation: a reader following the
      footnote's logic would be unable to locate the Lincoln 2012 argument because
      the intermediate works (Forsyth 1987, Watkins 1995) predate it by decades.
      The substance of the claim (Sasanian legitimation context for the Bundahišn;
      combat-myth as political-ideological discourse) is well-supported and accurate;
      the citation machinery is broken.
    evidence: >
      Lincoln 2012 = Bruce Lincoln, Gods and Demons, Priests and Scholars: Critical
      Explorations in the History of Religions (Chicago: University of Chicago Press,
      2012). Forsyth 1987 = Neil Forsyth, The Old Enemy (Princeton: PUP, 1987).
      Watkins 1995 = Calvert Watkins, How to Kill a Dragon (OUP, 1995). Publication
      dates confirm the anachronism: 1987 and 1995 precede 2012 and cannot cite it.
    required_fix: >
      Remove the "cited via Forsyth 1987 and Watkins 1995" parenthetical and cite
      Lincoln 2012 directly: "Lincoln 2012, on Iranian combat-myth as
      political-ideological discourse." If a citation chain is desired, the direction
      should be reversed: "Lincoln 2012, which refines and systematises the
      political-ideological reading that Forsyth 1987 and others anticipated."
      The EVIDENCE comment (source_id=forsyth-1987) should also add lincoln-2012
      as a co-cited source.

  - id: FC-02
    severity: MEDIUM
    category: imprecision
    location: >
      §"Movement I — Thraētaona's combat in the Avestan tradition" — claims at file
      lines 114-121 concerning Yašt 14 (the Bahrām Yašt) and Thraētaona's combat.
    claim_text: >
      The second principal Avestan locus for the combat is Yašt 14, the Bahrām Yašt —
      the hymn to Vərəθraγna…Yašt 14 places the Thraētaona-Aži Dahāka combat within
      the wider Avestan theology of victorious-warrior force, presenting Vərəθraγna as
      the divine power behind heroic victories and Thraētaona's combat as one of the
      principal exemplary cases of that divine victory-power in heroic action.
    problem: >
      Yašt 14 (the Bahrām Yašt) is indeed a hymn to Vərəθraγna and does mention
      various heroic exemplars of victorious force, but Thraētaona is not a
      prominently-featured figure in Yašt 14 in the way the claim suggests. The
      primary Avestan loci where Thraētaona's combat with Aži Dahāka is explicitly
      named are Yašt 5 (the prayer to Anāhitā) and Yašt 19 (the xᵛarənah theology);
      Yašt 14 focuses on Vərəθraγna's numerous incarnation-forms (bird, bull, stallion,
      ram, buck, wind, young man, boar, etc.) and on victorious-warrior power more
      broadly. The framing that Yašt 14 "places the Thraētaona-Aži Dahāka combat
      within the wider Avestan theology of victorious-warrior force" is a valid
      inferential reading — the theology of Yt. 14 provides the background for
      understanding Thraētaona's combat — but it overstates the degree to which
      Yašt 14 specifically references Thraētaona's combat as one of its principal
      exemplary cases. The claim functions better as an INFERENCE about the Yašt 14
      theological context than as a direct report of what Yašt 14 contains.
      Note: Benveniste and Renou 1934 is the cited anchor, and their monograph does
      treat the Vərəθraγna / Vṛtrahán cognancy with Yašt 14 as the Avestan anchor;
      the imprecision is in how the claim describes Yašt 14's content rather than in
      the philological cognancy argument itself, which is correct.
    evidence: >
      Standard description of Yašt 14 (Bahrām Yašt) in Avestan scholarship (Darmesteter
      translation; standard Avestan encyclopaedia entries): the hymn catalogues
      Vərəθraγna's ten incarnation-forms and praises victorious-warrior force; heroic
      exemplars appear in the framing stanzas. Thraētaona's combat with Aži Dahāka
      is not among the hymn's principal exemplary episodes. Contrast Yašt 5.33-35
      (explicit prayer of Thraētaona to Anāhitā for victory over Aži Dahāka) and
      Yašt 19 (explicit xᵛarənah-theology passage placing Thraētaona's combat in
      the heroic sequence).
    required_fix: >
      Revise the Yašt 14 claim to reflect that Yašt 14 provides the theological
      framework of Vərəθraγna's victorious force within which Thraētaona's combat
      should be understood, rather than stating that Yašt 14 directly features
      Thraētaona's combat as one of its principal exemplary cases. Suggested revision:
      "Yašt 14 provides the theological grounding for heroic victory in the Avestan
      corpus — the Vərəθraγna-theology that informs Thraētaona's combat — even if
      the specific Thraētaona-Aži Dahāka narrative is more explicitly treated in Yašt 5
      and Yašt 19." Alternatively, the claim could be restructured as an INFERENCE
      rather than a direct claim about Yašt 14's content.

  - id: FC-03
    severity: MEDIUM
    category: imprecision
    location: >
      §"Movement II — The Pahlavi narrative" — claim at file line 193-194 beginning
      "The combat itself in the Bundahišn is a single-combat…"
    claim_text: >
      The combat itself in the Bundahišn is a single-combat — Thraētaona alone
      confronts Aži Dahāka — and the narrative emphasises Thraētaona's mace and bow
      as the instruments of the killing, with the mace-attack as the central
      narrative beat.
    problem: >
      The Bundahišn and related Pahlavi texts (Dēnkard, Pahlavi Rivayats) describe
      Thraētaona as using his mace (Avestan vazra-, Middle Persian warz / gurz) as
      the primary weapon in the combat — specifically a mace that in some versions
      of the tradition has a cow-head (gav-sar) or is associated with the bull
      Srisok. The "bow" is not a well-attested weapon for Thraētaona's combat
      against Aži Dahāka in the Bundahišn. The Shāhnāmeh reception does give
      Fereydun (= Thraētaona) a cow-headed mace without emphasising a bow.
      The bow appears more prominently as a weapon in some Avestan hero-traditions
      (e.g., Kərəsāspa's traditions involve club and other weapons) but the
      "mace and bow" pairing for Thraētaona's specific Bundahišn combat is not
      the standard scholarly account. "Mace" alone, with the mace-attack as central,
      is the standard formulation. Including the bow alongside the mace
      overstates the textual evidence.
    evidence: >
      Bundahišn content as standardly described in West 1971 (Pahlavi Texts, Sacred
      Books of the East), Anklesaria 1956 (Bundahišn edition), and summarised in
      Watkins 1995 Part V ch. 46: Thraētaona strikes Aži Dahāka three times with
      his mace; the mace is the load-bearing weapon. The bow is not mentioned as
      a co-equal weapon in the standard scholarly summaries of the Bundahišn combat
      sequence. Note: trained knowledge at medium-high confidence; the bow's
      absence in the Bundahišn narrative is the standard scholarly reading, but
      since Watkins 1995 ch. 46 is the chapter's primary anchor and cannot be
      directly verified, this finding is rated MEDIUM rather than HIGH.
    required_fix: >
      Remove "and bow" from the weapons list. Revise to: "the narrative emphasises
      Thraētaona's mace as the instrument of the combat, with the mace-attack as the
      central narrative beat." If a dual-weapon tradition is attested in a specific
      Pahlavi text, that text should be named; if Watkins 1995 ch. 46 mentions both
      mace and bow, the writer should add a parenthetical noting the specific
      Pahlavi variant. As written, the "mace and bow" formulation exceeds what the
      standard scholarly account of the Bundahišn supports.

  - id: FC-04
    severity: MEDIUM
    category: imprecision
    location: >
      §"Indo-Iranian cognancy" — claims at file lines 330-334 about RV 10.8.8-9
      and Trita Āptya as dragon-slayer of Viśvarūpa.
    claim_text: >
      Vedic Trita Āptya is the older Indo-Iranian dragon-slayer figure that the
      Indra-Vṛtra material superseded: in the Rigveda, Trita is preserved as a
      marginal figure who shares some of Indra's combat-attributes (RV 10.8.8-9
      in particular has Trita slaying a three-headed serpent)…
      Rigveda 10.8.8-9 — the principal Vedic locus for Trita Āptya as dragon-slayer
      — has Trita slaying a three-headed serpent named Viśvarūpa ("of all forms")
      who is the son of Tvaṣṭṛ.
    problem: >
      The claim identifies RV 10.8.8-9 as the principal Vedic locus for Trita Āptya
      as dragon-slayer and for the killing of the three-headed Viśvarūpa. Per trained
      knowledge of the Rigveda (and corroborated by Jamison and Brereton 2014 as the
      cited anchor): RV 10.8 is an Agni hymn. The mention of Trita in RV 10.8 relates
      to Agni's cosmogonic role and Trita's associations with purification and fire,
      not primarily to a dragon-slaying. The three-headed Viśvarūpa (son of Tvaṣṭṛ)
      is more canonically associated with Indra's killing at RV 10.8.8-9 and in related
      passages. Trita's dragon-slaying tradition is more directly attested at
      RV 10.99.6 (where Trita slays a three-headed, six-eyed adversary) and possibly
      at RV 1.158 and RV 5.41. The citation of RV 10.8.8-9 as "the principal Vedic
      locus for Trita Āptya as dragon-slayer" is imprecise: it conflates a passage
      that involves Trita tangentially with the specific Viśvarūpa-slaying tradition
      that the chapter is invoking. The parallel with Aži Dahāka's three-headed-ness
      is correct in substance (there is a Trita-dragon-slaying tradition in the RV
      involving a three-headed adversary), but the citation of RV 10.8.8-9 as its
      principal Vedic locus is less accurate than RV 10.99.6 would be.
      Note: Watkins 1995 and Benveniste and Renou 1934 are cited alongside
      Jamison-Brereton; if those printed anchors specifically cite 10.8.8-9 for
      Trita, the writer may have followed that scholarly consensus even if it is
      not the strongest textual locus. This finding is therefore a MEDIUM imprecision,
      not a fabrication.
    evidence: >
      Jamison and Brereton 2014, Vol. 3, RV 10.8 (Agni hymn): Trita appears in
      connection with Agni's cosmogonic purification role; the specific Viśvarūpa
      three-headed-serpent narrative is not the primary content of 10.8. Contra:
      RV 10.99.6 (standard locus for Trita as dragon-slayer): "Trita, the first
      to perform the deed, smote the three-headed serpent" (standard summary of
      the passage). Watkins 1995 Part V ch. 45 (as described in the field) treats
      the Trita-dragon-slayer tradition with RV 10.8 and other passages; if Watkins
      specifically uses 10.8.8-9, his usage of that locus is the anchor for the
      claim's citation. However the claim's statement that 10.8.8-9 "in particular
      has Trita slaying a three-headed serpent" overstates the direct content of
      that specific passage as a dragon-slaying locus.
    required_fix: >
      Either (a) verify through Jamison and Brereton 2014 or Watkins 1995 ch. 45
      that RV 10.8.8-9 specifically attests Trita slaying a three-headed serpent;
      or (b) change the locus to RV 10.99.6, which is the more direct Vedic locus
      for Trita as three-headed-serpent slayer. Suggested revision: "RV 10.99.6
      in particular has Trita slaying a three-headed adversary, with the three-
      headed character of the serpent providing the structural parallel to Aži
      Dahāka's three-headed-ness." If Watkins 1995 ch. 45 specifically treats
      10.8.8-9, note both loci and distinguish their content.

