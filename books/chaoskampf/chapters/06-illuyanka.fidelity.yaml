findings:
  - kind: IMPLICIT-ADDITION
    severity: LOW
    claim_number: ~
    narrative_location: "line 41"
    issue: "Unfootnoted editorial summary paragraph with no corresponding claim recaps two
      facts already in claims (on-tablet colophon, side-by-side preservation) as structural
      preface to chapter body."
    detail: "Narrative line 41: 'Two features of this dossier set it apart from most of the
      combat-myths gathered in this book. The first is the on-tablet ritual colophon that
      names the festival to which the recitation belongs. The second is the side-by-side
      preservation of two versions whose scribes did not feel obliged to choose between them.
      The chapter is built around those two features.' This paragraph contains no new factual
      assertions — both features are covered in claims C6, C7, C8 — but it introduces no
      footnote and is not itself a claim. It functions as a purely structural connector."
    recommended_fix: "No change required. The paragraph introduces no new facts and serves as
      an acceptable editorial frame between the source-overview and the setting section.
      A footnote is not required for purely structural connector paragraphs. If the house
      style demands a footnote on all substantive assertions, add a cross-reference note."

  - kind: GLOSSARY-VIOLATION
    severity: LOW
    claim_number: 22
    narrative_location: "line 24 (and in LACUNA 1 body at line 129)"
    issue: "'purulli' appears without italics in two non-heading locations in the body prose."
    detail: "Line 24: '...the recitation of the purulli festival.' (not _purulli_). The claims
      document also lacks italics at this point (claims line 33: 'recitation of the purulli
      festival'), so this is a deficiency present in the claims that was faithfully reproduced
      in the narrative. The LACUNA 1 marker at line 129 also contains 'purulli' without
      italics, but markers are not body prose and their format follows the claims exactly.
      The section heading at line 192 ('purulli at Nerik') is a heading and does not require
      italics. All body-prose uses of 'purulli' as a free-standing term — lines 22, 52, 56,
      59, 61, 64, 66, 131, 173, 194, 206, 208, 210, 245 — are correctly italicised as
      _purulli_. Only the two anomalous instances at line 24 are in non-italic form, matching
      the claims exactly."
    recommended_fix: "Italicise 'purulli' at narrative line 24: change 'recitation of the
      purulli festival' to 'recitation of the _purulli_ festival'. This also corrects the
      upstream deficiency in the claims document (claims line 33). Low severity because it
      is the only inconsistency in a document that handles 'purulli' correctly on all other
      occasions."

