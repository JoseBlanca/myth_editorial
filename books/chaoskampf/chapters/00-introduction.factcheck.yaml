  - id: C001
    paragraph: "I, paragraph 1"
    location: "Line 6 — 'In Babylon, probably some time in the late second millennium BCE'"
    claim: "Enūma Eliš was composed in the late second millennium BCE (Kassite or early post-Kassite period)."
    source_cited: "Lambert 2013, pp. 3–15"
    verdict: "△ INTERNAL-VARIANCE"
    severity: low
    evidence: |
      The mainstream dating is late second millennium BCE, often cited as Kassite
      or early post-Kassite. Scholarly debate places it between ~1500 and ~1060 BCE;
      the Nebuchadnezzar I hypothesis (c. 1100 BCE) competes with the Kassite
      hypothesis. Lambert 2013 (pp. 3–15) discusses the manuscript tradition and
      dating. The chapter's framing is defensible and consistent with Lambert's
      presentation.
    recommendation: "Acceptable as written; a short footnote qualifying the Nebuchadnezzar I alternative would strengthen it."

