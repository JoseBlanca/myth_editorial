    verdict: "△ INTERNAL-VARIANCE"
    severity: medium
    evidence: |
      The cognacy claim is widely accepted in Semitic comparative linguistics
      (both derive from Proto-Semitic *ti'āmatum). Day 1985, pp. 49–52 qualifies
      it: the cognacy is phonologically defensible but the mythological
      inheritance is less certain. The chapter correctly parenthesizes '(they
      are)' while noting Day's qualification in the footnote. The parenthetical
      statement 'they are' is stronger than Day 1985 actually asserts. Day
      says the cognacy 'has been qualified but not overturned.'
    recommendation: |
      LOW severity. The sentence 'tehôm and Tiamat might be linguistically
      cognate (they are)' would be more accurate as 'tehôm and Tiamat might be
      linguistically cognate (the philological case is strong but remains
      debated)' — but the footnote already hedges appropriately.

