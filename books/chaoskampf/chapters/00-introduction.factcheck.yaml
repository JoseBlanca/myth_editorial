  - id: C074
    paragraph: "VII, paragraph 2"
    location: "Line 110 — 'Siegfried kills the dragon Fáfnir in the Nibelungenlied'"
    claim: "Siegfried kills the dragon Fáfnir in the Nibelungenlied."
    source_cited: "No citation"
    verdict: "△ INTERNAL-VARIANCE"
    severity: medium
    evidence: |
      This is a potential conflation. In the Old Norse Eddic tradition (Völsung
      saga, Fáfnismál), it is SIGURD who kills Fáfnir. In the Middle High German
      Nibelungenlied, Siegfried is the counterpart character, but Fáfnir does not
      appear in the Nibelungenlied by name — Siegfried's dragon-slaying backstory
      is referenced but not narrated in the Nibelungenlied itself. The glossary
      locks the distinction: 'Sigurd is the Old Norse form used for the earlier
      Eddic material in this book; Siegfried is retained where the Middle High
      German Nibelungenlied is in view.' Using 'Fáfnir' in a Nibelungenlied
      context thus conflates the Eddic and MHG traditions. The footnote
      immediately following correctly explains the Sigurd/Siegfried distinction,
      but the sentence itself is internally contradictory on this point.
    recommendation: |
      MEDIUM severity: Rephrase as 'Sigurd kills the dragon Fáfnir in the
      Völsunga saga' or acknowledge that the Nibelungenlied does not narrate
      Fáfnir's slaying directly. The sentence as written says 'Siegfried kills
      Fáfnir in the Nibelungenlied' which is technically inaccurate.

