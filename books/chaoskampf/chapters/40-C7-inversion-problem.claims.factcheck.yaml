findings:
  - id: FIND-01
    severity: MEDIUM
    category: contamination | category-import-drift
    claim_anchor: line 63 (§I, Bida — Soninke covenant-frame paragraph)
    description: |
      Ch40 line 63 describes the Soninke / Wagadu narrative's
      cosmographic situation as "the wak'a-rich Sahelian landscape of
      Soninke ethnogeographic memory rather than a cosmogonically-
      emerging cosmos". The compound "wak'a-rich Sahelian landscape"
      imports the Andean Quechua category *wak'a* into the West
      African Mande / Soninke context.
    issue: |
      Cross-tradition category-import contamination. The category
      *wak'a* is a pre-Columbian central Andean Quechua category for
      sacred power-beings simultaneously persons / places /
      ancestral sources, and it is the load-bearing categorical
      apparatus of §IV (Pariacaca) — applied here in §I (Bida) to
      the Sahelian Soninke world. Ch28 claims-approved (line 75 of
      Ch28) frames the Soninke cosmographic situation as "the
      already-existing world of the western Sahel rather than a
      cosmogonically-emerging cosmos", without any *wak'a*-categorical
      apparatus. This is precisely the kind of cross-tradition
      category-import drift that the chapter's appropriation-protocol
      discipline is positioned to demonstrate *against*, and the
      drift is correspondingly more consequential in a chapter whose
      central methodological commitment is the area-specialist-first
      discipline.
    evidence: |
      Ch28 claims-approved line 75:
        "The Soninke oral tradition's own framing of the Wagadu
        narrative is foundational and aetiological: ... the cosmos
        within which it unfolds is the already-existing world of the
        western Sahel rather than a cosmogonically-emerging cosmos."
      Ch26 claims-approved line 72 (the source of the *wak'a*
      categorical apparatus):
        "The cycle's principal cosmographic framework is the wak'a-
        cosmography of pre-Columbian central Andean religion: the
        landscape is conceived as populated by *wak'as* — sacred
        power-beings (Quechua; older Spanish-derived spelling: huaca)
        ...."
      glossary.yaml 'wak'a' first_mention_gloss is explicitly the
      pre-Columbian central Andean Quechua category, with no Sahelian
      / Mande / Soninke applicability registered.
    recommended_fix: |
      Replace "wak'a-rich Sahelian landscape of Soninke ethnogeographic
      memory" with a phrase that draws on the Soninke / Mande / West
      African categorical apparatus or that uses a tradition-neutral
      formulation. Verbatim-substitutable replacements:
        (a) tradition-neutral: "the already-existing Sahelian world of
            Soninke ethnogeographic memory rather than a cosmogonically-
            emerging cosmos"
        (b) Soninke-internal framing: "the inhabited Sahelian landscape
            of the Soninke ancestral terrain rather than a
            cosmogonically-emerging cosmos"
      Either replacement removes the category-import without losing
      the structural-comparative point the sentence is making.

  - id: FIND-02
    severity: MEDIUM
    category: banned-term | glossary-violation | scoping-failure
    claim_anchor: §IV body prose (lines 195, 198, 201, 204, 210, 215)
    description: |
      The brief 40-C7-inversion-problem.yaml special_instructions and
      glossary.yaml's never_use list scope bare "chaos" / "chaos-X"
      compounds to scare-quoted appearances inside §VI Ballentine-
      critique paragraphs (per Ch35's stricter discipline applied
      here per the chapter's appropriation-protocol commitment).
      Several body-prose occurrences in §IV use unmarked "chaos-X"
      compounds outside the §VI scope, including:
        - line 195: "primordial chaos-adversary" (unmarked)
        - line 198: "primordial cosmos-versus-chaos opposition"
          (unmarked)
        - line 201: "primordial chaos" (unmarked)
