summary: |
  Ch40 is the most rigorously appropriation-protocol-disciplined
  chapter in Part II, drawing on five Part-I anchor chapters (Ch28
  Bida, Ch29 Mwindo, Ch19 §"Sigurd vs. Fáfnir", Ch26 Pariacaca, Ch23
  Susanoo) and on two methodological-typological comparative anchors
  (Forsyth 1987, Ballentine 2015). All 10 unique source_ids resolve
  in sources.yaml; all 14 COMPARATIVE-HOOK chapter-references resolve
  in toc.yaml. The four [APPROPRIATION-FLAG:] markers all conform to
  the locked four-sub-field schema (substance | named_specialists |
  tier_implication | forwards_to) — sub-field conformance is a clean
  PASS at all four loci. The [INFERENCE:] marker at §III line 185
  conforms to the locked schema (claim | basis | risk) and the
  [SPECULATION:] marker at §VI line 263 conforms to the locked
  schema (claim | basis | counterargument), with the counterargument
  sub-field substantively engaging the typological-recurrence
  defense — a clean improvement on the Ch35 FIND-04 schema deviation.
  Area-specialist-first discipline at §I (Bida) and §II (Mwindo) is a
  clean PASS: §I opens with the Soninke covenant-broken framing on
  the Soninke tradition's own terms before invoking the inverse-
  chaoskampf overlay; §II opens with the Nyanga maturation-through-
  hubris framing before invoking the chaoskampf-overlay contrast.
  The Bida / Mwindo main-weight discipline is observed (Bida and
  Mwindo together account for ~32 paragraph-claims out of 60; Sigurd
  / Pariacaca / Susanoo each at 8-10 paragraph-claims; §VI methodology
  at 9). Three MEDIUM findings: FIND-01 the "wak'a-rich Sahelian
  landscape" cross-tradition category-import contamination at line 63
  (importing the Andean Quechua category into the Soninke / Sahelian
  context — a load-bearing drift in the chapter that is positioned to
  demonstrate against precisely such category-imports); FIND-02 the
  banned-term scoping failure in §IV body prose where six lines use
  unmarked "chaos-X" compounds outside the §VI Ballentine-critique
  scope; FIND-03 the foreign-noun italic discipline mixed-convention
  drift between bold (Ch26 / Ch23 upstream convention) and italic
  (drift in §IV) that will migrate into the chapter-draft stage if
  not normalised. Three LOW findings (Hreidmar-death paraphrase
  drift; tier-name capitalisation; COMPARATIVE-HOOK density) and
  three NOTE-level positive structural observations (well-formed
  [SPECULATION:] / [INFERENCE:] markers; correct named-but-flagged
  pattern application). Most consequential single finding: FIND-01,
  the wak'a-rich-Sahelian-landscape category-import contamination at
  §I line 63, which is precisely the kind of cross-tradition
  category-import the chapter's appropriation-protocol commitment is
  positioned to demonstrate *against* — its appearance in §I is more
  consequential at Ch40 than the same drift would be elsewhere
  because the chapter's central methodological contribution rests on
  the area-specialists' priority and on tradition-internal
  categorical apparatus. Per the verdict rule "PASS if zero HIGH and
  ≤3 MEDIUM; otherwise REVISE", the chapter has zero HIGH findings
  and 3 MEDIUM findings, which sits at the threshold. The conservative
  reading is REVISE: although the count is at the limit, FIND-01 in
  particular is a category-import drift on the chapter's most load-
  bearing methodological commitment, and FIND-02 / FIND-03 are
  scoping / discipline failures that the chapter's argument requires
  it to model in its own prose. Final verdict: REVISE. All three
  MEDIUM findings are small and verbatim-substitutable in the post-
  human-normalize pass before the chapter advances to claims-approved.
