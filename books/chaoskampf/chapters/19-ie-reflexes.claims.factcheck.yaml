findings:

  - id: FC-01
    severity: MEDIUM
    category: citation_wrong
    location: >
      §"Beowulf vs. Grendel and the dragon" — three consecutive claims at the chapter's
      lines 151, 154, and 157 beginning (respectively) "J. R. R. Tolkien's 1936 British
      Academy lecture..." / "The Tolkien 1936 lecture is mentioned in the present chapter
      only at the level of..." / "The *Beowulf* dragon-episode's Indo-European-reflex
      reading therefore depends on two converging arguments..." Each has an
      // EVIDENCE: source_id=watkins-1995 ; loc=Part V tag.
    claim_text: >
      J. R. R. Tolkien's 1936 British Academy lecture "Beowulf: The Monsters and the
      Critics" argued that the dragon — and the monsters of the poem more generally —
      should be read as proper mythic adversaries integral to the poem's structure rather
      than as decorative accretions on a putatively-historical core, and the lecture was a
      load-bearing critical move that re-established the mythic register of the *Beowulf*
      monsters within twentieth-century Old English scholarship.
    problem: >
      The EVIDENCE tags for the three Tolkien-specific claims (the claim about what the
      1936 lecture argued, the deferral note, and the two-converging-arguments synthesis)
      all cite source_id=watkins-1995, loc=Part V. Tolkien 1936 is not Watkins 1995; the
      essay is an independent source that is not registered in sources.yaml. The
      source_id=watkins-1995 tag is factually wrong for the Tolkien-specific claims: Watkins
      1995 Part V contains Watkins's own philological argument about Beowulf's dragon diction,
      not Tolkien's structural-critical argument about the poem's monsters. The first two
      Tolkien-specific claims have no applicable registered source_id; the third is a
      synthesis claim that correctly needs both Watkins and Tolkien. This is a citation_wrong
      at MEDIUM severity: the claims about Tolkien's argument are accurate (Tolkien 1936 is
      a well-known and verifiable source), but the machine-readable EVIDENCE tags are
      incorrect, and Tolkien 1936 has no source_id entry in sources.yaml. The identifier
      cannot be resolved by the pipeline.
    evidence: >
      sources.yaml: no entry with id beginning "tolkien" or covering "The Monsters and the
      Critics." The Tolkien essay is referenced in scope.md (§"Reception coda") as belonging
      to the reception coda, and in the brief's special_instructions as "in-scope for brief
      mention (load-bearing for the Beowulf section)." It is not in the sources.yaml registry.
      Tolkien, J.R.R., "Beowulf: The Monsters and the Critics," Proceedings of the British
      Academy 22 (1936): 245–295 is the correct full citation.
    recommended_fix: >
      (1) Add a new entry to sources.yaml: id: tolkien-1936-monsters; author: Tolkien, J.R.R.;
      title: "Beowulf: The Monsters and the Critics"; year: 1936; container_title: Proceedings
      of the British Academy; full_citation: "Tolkien, J.R.R., 'Beowulf: The Monsters and the
      Critics,' Proceedings of the British Academy 22 (1936): 245–295"; identifier_type:
      stable-url (JSTOR or BL archive). (2) Update the EVIDENCE tags for the three
      Tolkien-specific claims to use source_id=tolkien-1936-monsters. (3) The third
      (synthesis) claim's EVIDENCE tag may retain both source_ids. This is an identifier_missing
      situation that should have been flagged at inventory stage — flag it here for glossary-lock.

  - id: FC-02
    severity: MEDIUM
    category: imprecision
    location: >
      §"Beowulf vs. Grendel and the dragon" — the claim at the chapter's line 124 beginning
      "Beowulf is a Geatish hero — a member of the Gēatas, a southern Scandinavian people —
      who in the poem's first movement travels to the Danish court of king Hrothgar..." with
      footnote citing "*Beowulf*, lines 86–193 in the standard Klaeber-edition line-numbering,
      on the Geatish identity of Beowulf, the Danish setting, Hrothgar's court at Heorot,
      Grendel's twelve-year depredations, and Grendel's descent from Cain."
    claim_text: >
      Beowulf is a Geatish hero — a member of the Gēatas, a southern Scandinavian people —
      who in the poem's first movement travels to the Danish court of king Hrothgar to defend
      the hall Heorot from the man-eating monster Grendel, the descendant of Cain who has been
      killing Hrothgar's warriors at Heorot for twelve years.
    problem: >
      The footnote cites "lines 86–193" as the locus for Beowulf's Geatish identity, but
      Beowulf himself is not introduced in lines 86–193 in standard Klaeber. Lines 86–193 cover
      Grendel's depredations against Heorot and his Cain genealogy (lines 99–114 for the Cain
      passage; lines 115–193 for the attacks), not Beowulf's introduction. Beowulf is introduced
      beginning at approximately line 194 ("þa wæs on burgum Beowulf Scyldinga") and named and
      identified as a Geatish hero around lines 194–257. The footnote's attribution of "the
      Geatish identity of Beowulf" to "lines 86–193" is therefore a line-range imprecision.
      The correct locus for Beowulf's Geatish identity introduction is approximately lines 194–228
      (or 194–257) in standard Klaeber 4th edition. The broader episode-level claim (the Grendel
      episode) is handled correctly at "lines 86–1250" elsewhere in the source overview.
    evidence: >
      Standard Klaeber 4th edition (Fulk, Bjork, Niles 2008): line 194 introduces Beowulf by
      name as "Beowulf Scyldinga" (actually Beowulf of the Geats — note: "Beowulf Scyldinga"
      is a different character; in Klaeber 4 line 194, the Geatish hero's name first appears
      around line 343 in some reckonings or in the opening of fit II). Regardless of the precise
      start line for Beowulf's introduction, trained knowledge is consistent that lines 86–193
      cover only Grendel's genealogy and attacks, not Beowulf's introduction. The line range
      cited in the footnote does not cover what the footnote claims it covers for Beowulf's identity.
    recommended_fix: >
      Update the footnote to cite "lines 194–228 (or the relevant passage in the standard Klaeber
      4th edition) for Beowulf's introduction and Geatish identity" separately from "lines 86–193
      for Grendel's Cain genealogy and twelve-year depredations." Alternatively, since the chapter
      treats Beowulf at episode level throughout (per the identifier_missing protocol), the
      footnote may simply say "Beowulf, the poem, on the Geatish identity of Beowulf, the Danish
      setting, Hrothgar's court at Heorot, Grendel's twelve-year depredations, and Grendel's
      descent from Cain" without specifying the 86–193 line range, since that range is demonstrably
      wrong for the Geatish-identity component.

  - id: FC-03
    severity: LOW
    category: unverified
    location: >
      §"Sigurd vs. Fáfnir" — the claim at the chapter's line 114 beginning "The Sigurd-Fáfnir
      episode is also one of the iconographically densest in the post-Vedic IE corpus, with
      at least eleven Scandinavian rune-stones from the 11th and 12th centuries CE depicting
      Sigurd's killing of Fáfnir..."
    claim_text: >
      The Sigurd-Fáfnir episode is also one of the iconographically densest in the post-Vedic IE
      corpus, with at least eleven Scandinavian rune-stones from the 11th and 12th centuries CE
      depicting Sigurd's killing of Fáfnir (the Ramsund stone in Södermanland c. 1030 CE is the
      principal-and-best-preserved witness), and the iconographic dossier supplements the Eddic
      and prose textual witnesses as a third register of attestation alongside the verbal-narrative
      and the philological-formulaic.
    problem: >
      The count "at least eleven" Scandinavian stones depicting Sigurd's killing of Fáfnir is
      cited only to "Larrington 2014 on the Sigurd-Fáfnir iconographic tradition" — a printed
      translation, not a rune-stone catalogue. Larrington 2014 is a translation of the Poetic
      Edda, not a survey of Sigurd iconography, and would not normally be the authority for a
      specific stone count. The count of Sigurd-pictorial stones varies in the specialist
      literature (Scandinavian art history surveys such as those by Anne-Sofie Gräslund or
      the Rundata database give varying counts depending on inclusion criteria). "At least eleven"
      is in the plausible range but cannot be verified against Larrington 2014 specifically.
      This is LOW because the Ramsund stone's identification and the general existence of
      multiple Sigurd pictorial stones are not in doubt; the specific count requires a
      rune-stone specialist source (e.g., Rundata database or Gräslund's surveys) rather
      than Larrington 2014.
    evidence: >
      Larrington 2014 is a translation of the Poetic Edda; rune-stone counts fall outside the
      scope of a verse translation and its introductory material. The Ramsund carving
      (Södermanland, c. 1030 CE) is the standard principal Sigurd pictorial monument and is
      correctly identified. The general statement that there are multiple Sigurd rune-stones
      from the 11th–12th centuries is correct; the specific "at least eleven" count needs a
      rune-stone specialist citation.
    recommended_fix: >
      Add a specialist source for the Sigurd iconographic stone count before the chapter-draft
      stage: e.g., Anne-Sofie Gräslund's surveys of Viking Age rune-stones, the Rundata
      database (Uppsala), or specifically Lena Peterson / Birgit Sawyer's rune-stone corpus
      work. Replace "Larrington 2014 on the Sigurd-Fáfnir iconographic tradition" with the
      appropriate rune-stone specialist source for the count. The Ramsund stone identification
      and the general iconographic-dossier argument are unaffected.

  - id: FC-04
    severity: LOW
    category: unverified
    location: >
      §"Batraz and the Nart combats" — the claim at the chapter's line 245 beginning "Batraz
      fights monstrous giants and dragons across multiple episodes of the Nart corpus: against
      the giant Mukara (or Bedzenag)..."
    claim_text: >
      Batraz fights monstrous giants and dragons across multiple episodes of the Nart corpus:
      against the giant Mukara (or Bedzenag), against various dragons-and-monstrous-figures,
      and against opposing Nart-clans within the Ossetic tradition; the Nart corpus is not a
      single continuous narrative but a cluster of episodic combats, with each combat-episode
      preserving the warrior-pole of the IE pattern in distinctive Ossetic morphology.
    problem: >
      "Mukara" as a Batraz adversary is the standard name found in Dumézil's and West's
      treatments of the Ossetic Nart corpus. However, "Bedzenag" as an alternate name for
      Mukara (or as a separate adversary-designator) is not confirmed in trained knowledge of
      standard Ossetic Nart scholarship. The parenthetical "(or Bedzenag)" suggests these are
      alternate names for the same figure; if Bedzenag is a different figure or a variant from
      a different narrator tradition (Circassian or Chechen rather than Ossetic), the
      "(or Bedzenag)" parenthetical conflates distinct adversary-figures. Without direct access
      to West 2007 ch. 6 or Dumézil's relevant monograph (e.g., *Légendes sur les Nartes*,
      1930, or *Romans de Scythie et d'alentour*, 1978), the "or Bedzenag" parenthetical cannot
      be verified as West's or Dumézil's phrasing. The claim is LOW rather than MEDIUM because
      the existence of multiple named adversaries of Batraz is standard in the Nart corpus, and
      the over-precision is in the parenthetical rather than the substantive combat-pattern claim.
    evidence: >
      West 2007 ch. 6 is the cited source (printed; not fetched). Dumézil's Nart monographs
      treat Batraz's adversaries including giant-figures in the Ossetic tradition. "Mukara"
      is the standard name in West 2007 and Dumézil for a principal giant-adversary of Batraz.
      "Bedzenag" does not appear in trained knowledge of the standard Ossetic Nart secondary
      literature (Dumézil, West, Colarusso's English anthology). It may be a Circassian or
      Chechen variant name not found in the West 2007 treatment.
    recommended_fix: >
      Before the chapter-draft stage, verify in West 2007 ch. 6 (or Dumézil's Nart monographs)
      whether "Bedzenag" is West's or Dumézil's alternate name for Mukara, or whether it comes
      from a different narrator tradition. If it is Circassian or Chechen rather than Ossetic,
      replace the parenthetical "(or Bedzenag)" with "(Ossetic: Mukara; cognate-figure in
      Circassian variants)" or similar language that preserves the multiple-narrator structure
      without asserting they are names for the same figure. If "Bedzenag" is not in the standard
      secondary literature at all, remove the parenthetical.

  - id: FC-05
    severity: LOW
    category: imprecision
    location: >
      §"Beowulf vs. Grendel and the dragon" — the claim at the chapter's line 151 giving
      the venue for Tolkien's 1936 essay: footnote cites "Tolkien, J. R. R., 'Beowulf: The
      Monsters and the Critics', British Academy lecture 1936."
    claim_text: >
      J. R. R. Tolkien's 1936 British Academy lecture "Beowulf: The Monsters and the Critics"
      [described as "British Academy lecture 1936" in the footnote]
    problem: >
      The essay is correctly identified as a British Academy lecture. However, the full
      bibliographic form is a publication: "Proceedings of the British Academy 22 (1936):
      245–295." The citation "British Academy lecture 1936" in the footnote is accurate as
      a provenance description but is incomplete as a bibliographic citation — it gives the
      occasion (the lecture) but not the publication locus (Proceedings of the British Academy,
      volume 22, pages 245–295). For a claims document that will anchor subsequent footnotes
      in the chapter-draft, the incomplete citation could propagate into the chapter-draft as
      an uncompleted reference. This is LOW rather than MEDIUM because: (a) the essay's
      year (1936), author (Tolkien), and title ("Beowulf: The Monsters and the Critics") are
      all correct; (b) the argument cited is accurate (recovery of the mythic register of the
      monsters); (c) the relevant FC-01 finding already flags the source_id gap; the citation
      imprecision is a second-order issue downstream of the identifier_missing problem.
    evidence: >
      Standard bibliographic record: Tolkien, J.R.R., "Beowulf: The Monsters and the Critics,"
      Proceedings of the British Academy 22 (1936): 245–295. Also repr. in Tolkien, The Monsters
      and the Critics and Other Essays, ed. Christopher Tolkien (London: Allen & Unwin, 1983):
      5–48. The "British Academy lecture" description is accurate as to occasion but incomplete
      as a publication citation.
    recommended_fix: >
      When adding the tolkien-1936-monsters source_id (per FC-01 fix), use the full bibliographic
      form: Tolkien, J.R.R., "Beowulf: The Monsters and the Critics," Proceedings of the British
      Academy 22 (1936): 245–295 (repr. in The Monsters and the Critics and Other Essays, ed.
      C. Tolkien, London: Allen & Unwin, 1983). Update the footnote to add the Proceedings
      publication locus. The 1983 reprint is the most commonly cited form in current Old English
      scholarship and may be the more accessible reference.

