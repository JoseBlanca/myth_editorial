findings:

  - id: FC-01
    severity: MEDIUM
    category: imprecision
    location: >
      §"Herakles vs. the Hydra, Ladon, and Geryon" — the claim at lines 156-157
      beginning "Hesiod's Theogony 313-318 names the Hydra alongside Ladon
      (described in adjacent lines)."
    claim_text: >
      Hesiod's Theogony 313-318 names the Hydra alongside Ladon (described in
      adjacent lines) and the Chimaera as members of the same monstrous brood
      descended from Typhon and Echidna, providing an early genealogical
      pre-grouping of the dragon-adversaries the labours later confront.
    problem: >
      The phrase "adjacent lines" is inaccurate. In the Hesiod Theogony, the
      Lernaean Hydra appears at lines 313-316 (offspring of Echidna, not Typhon
      in the earliest form, though the brood connection is established). The
      Chimaera appears at lines 319-325. Ladon, the serpent who guards the
      Hesperidean apples, appears at lines 333-335 — roughly 17-20 lines after
      the Hydra passage. "Adjacent lines" implies near-immediate proximity (2-5
      lines), which misrepresents the layout of the monstrous-brood catalogue.
      The correct framing is that all three appear in the same monstrous-brood
      passage (lines 306-336) but are separated by other offspring. Additionally,
      note that the Theogony 313 passage places the Hydra among Echidna's
      offspring, while Typhon's direct offspring are listed earlier; the joint
      Typhon-and-Echidna parentage of the full brood is established across lines
      306-336 but the specific attribution varies line by line. The claim's
      overall point (early genealogical pre-grouping) is correct; the phrase
      "adjacent lines" is the only problem.
    evidence: >
      Hesiod Theogony line ranges (standard scholarly consensus): Hydra at
      313-316; Chimaera at 319-325; Ladon at 333-335. The distance between 313
      and 333 is 20 lines — spanning Orthros, Geryon, Cerberus, and other
      figures between Hydra and Ladon.
    required_fix: >
      Replace "alongside Ladon (described in adjacent lines)" with "alongside
      Ladon (described some twenty lines later, at Theogony 333-335)." The
      overall claim about the monstrous-brood passage and early genealogical
      pre-grouping can stand unchanged.

  - id: FC-02
    severity: MEDIUM
    category: imprecision
    location: >
      §"Kadmos vs. the dragon of Ares" — the claim at lines 226-227 beginning
      "After the killing the goddess Athena instructs Kadmos to sow half of the
      dragon's teeth."
    claim_text: >
      After the killing the goddess Athena instructs Kadmos to sow half of the
      dragon's teeth in the earth, and from the sown teeth there spring up armed
      warriors — the Spartoi, the "Sown Men" — fully grown and battle-ready.
    problem: >
      In Apollodorus Bibliotheca 3.4.1, Athena instructs Kadmos to sow the
      dragon's teeth — but the instruction does not specify "half." The "half"
      detail belongs to the dual-tradition where Athena keeps half the teeth and
      gives them to Aeetes of Kolchis for the later Argonautic episode (Jason
      sows Aeetes's teeth in the Argonautica). This is attested in the overall
      mythographic tradition but it is not stated in the Kadmos-specific
      Apollodorus passage, and Ovid Metamorphoses 3.1-130 does not specify "half"
      in the Kadmos narrative either. The claims chapter correctly notes the
      Argonautic parallel at lines 241-242 — but the Argonautic parallel is the
      source of the "half" detail, and importing it into the Kadmos narrative
      as though Apollodorus 3.4.1 records it there creates a silent conflation
      of two separate passages. The "half" is an inference from the combined
      tradition, not a fact of the Kadmos-specific narrative.
    evidence: >
      Apollodorus 3.4.1 (Greek text): Athena instructs Kadmos to sow the
      dragon's teeth. No "half" specified. The Apollonius of Rhodes Argonautica
      3.1175-1190 is where the Aeetes/Jason teeth-sowing occurs, using teeth
      that Athena divided and gave to both Kadmos and Aeetes. This division is
      not stated in Apollodorus's Kadmos narrative itself.
    required_fix: >
      Remove "half of" so the sentence reads "Athena instructs Kadmos to sow
      the dragon's teeth in the earth." Optionally add a footnote: "In the
      Argonautica tradition, Athena keeps half the teeth for Aeetes; this
      detail is not stated in Apollodorus 3.4.1's Kadmos-specific account."

  - id: FC-03
    severity: MEDIUM
    category: missing_attribution
    location: >
      §"Hercules vs. Cacus" — the claim at lines 319-320 crediting the Cacus-
      as-Italic-IE-cattle-raid-reflex argument exclusively to West 2007 ch.6.
    claim_text: >
      West's chapter 6 of Indo-European Poetry and Myth makes the principal
      scholarly argument that Cacus is an Italic Indo-European cattle-raid
      reflex, structurally cognate to the same Indo-European pattern that
      Watkins reads in the Greek Geryon combat.
    problem: >
      The foundational scholarly argument that Cacus is an Italic Indo-European
      cattle-raid reflex was made by Georges Dumézil, principally in Mythe et
      épopée (vol. 2, 1971) and earlier in his comparative studies of the Cacus
      episode. West 2007 ch.6 builds on and refines Dumézil's comparative
      analysis; characterising West as making "the principal scholarly argument"
      without acknowledging Dumézil misrepresents the intellectual lineage. The
      brief itself (line 37 of the brief YAML) explicitly names Dumézil: "Dumézil
      reads it as an Italic IE cattle-raid reflex." The claims document omits
      Dumézil entirely — this is a missing attribution that could embarrass the
      book when readers familiar with Dumézil notice it.
    evidence: >
      Brief 12-greek-dragons-after-typhon.yaml, family_members entry for
      "Hercules vs. Cacus": "Dumézil reads it as an Italic IE cattle-raid
      reflex." West 2007 is explicit in ch.6 that he is developing and extending
      Dumézil's comparative framework. Watkins 1995 also engages Dumézil.
    required_fix: >
      Add Dumézil to this claim's scholarly lineage. Revised sentence: "The
      foundational scholarly argument that Cacus is an Italic Indo-European
      cattle-raid reflex was made by Georges Dumézil and is developed in West
      2007 ch.6, which is the chapter's principal printed anchor for this
      argument." A footnote should cite Dumézil's Mythe et épopée, vol. 2
      (Paris: Gallimard, 1971) alongside West 2007 ch.6.

  - id: FC-04
    severity: MEDIUM
    category: glossary_violation
    location: >
      §"Herakles vs. the Hydra, Ladon, and Geryon" lines 103, 124, 136, 130;
      §"Bellerophon vs. the Chimaera" lines 252, 267, 258.
    claim_text: >
      [Multiple instances] The Lernaean Hydra... The dragon Ladon... Geryon,
      the triple-bodied warrior... the Hesperides themselves are nymphs...
      the Chimaera that ravages the country... Pegasus, the winged horse...
      the Iliad describes the Chimaera.
    problem: >
      The glossary instructions (and the brief's glossary-check list) require
      italicisation at first mention for: Hydra, Ladon, Geryon, Hesperides,
      Chimaera, and Pegasus. None of these terms is italicised at first
      mention in the claims document. By contrast, drakaina (line 54), Ketos
      (line 170), Spartoi (line 226), and Septerion (line 77) are correctly
      italicised at first mention. The missing italics for Hydra, Ladon,
      Geryon, Hesperides, Chimaera, and Pegasus are a systematic formatting
      omission across the Herakles and Bellerophon sections.
    evidence: >
      Brief §Glossary checks: "Hydra, Ladon, Geryon, Hesperides" and
      "Bellerophon, Chimaera, Pegasus" listed as terms requiring italicisation.
      Lines 103 (Hydra), 124 (Ladon), 136 (Geryon), 130 (Hesperides), 252
      (Chimaera), 267 (Pegasus) — all first mentions — lack italics markup.
    required_fix: >
      Apply italics at first mention for each term: *Hydra* (line 103),
      *Ladon* (line 124), *Geryon* (line 136), *Hesperides* (line 130),
      *Chimaera* (line 252 or earlier at line 252), *Pegasus* (line 267).
      Subsequent mentions do not require italics. This is a mechanical fix
      requiring no substantive revision.

  - id: FC-05
    severity: MEDIUM
    category: imprecision
    location: >
      §"Apollo vs. Python" — the claim at lines 62-63 describing the
      Homeric Hymn's "monster-rearing episode involving the giant Typhaon."
    claim_text: >
      In the Hymn the drakaina is associated with the local nymph-tradition
      and with a separate monster-rearing episode involving the giant Typhaon,
      an episode that Fontenrose treats as an aetiological doublet of the
      principal combat.
    problem: >
      In the Homeric Hymn to Apollo, the she-serpent (the drakaina) does not
      "involve" a "giant Typhaon" in any combative or adversarial sense. Rather,
      the Hymn says Hera bore Typhon and gave him to the she-serpent to nurse
      and rear (lines 305-355 approx.) — Typhon is an infant in this passage,
      and the she-serpent is his nurse. "The giant Typhaon" imports a
      characterisation (giant) that is more appropriate to the later Typhon of
      Hesiod and the mythographic tradition. The Hymn's Typhaon is presented as
      a child in the rearing episode. The phrase "monster-rearing episode
      involving the giant Typhaon" is therefore imprecise on two counts: (1)
      Typhaon is not described as a giant in the Hymn's episode; (2) the
      she-serpent's role is as nurse, not as a combatant or joint protagonist
      with a giant. Fontenrose's doublet analysis is a legitimate scholarly
      reading, but the claim's phrasing misrepresents the primary text.
    evidence: >
      Homeric Hymn to Apollo, lines 300-374 (the Pytho section): Hera gives
      birth to Typhon (Typhaon in the Hymn's spelling) and gives him to the
      she-serpent to tend; the she-serpent nurses him. He is described as
      baneful (pema) but not as a giant in this specific nursing episode.
      "Giant" is a reasonable characterisation of the later Typhon/Typhaon
      tradition (Hesiod, Pindar, etc.) but not of the infant in the Hymn.
    required_fix: >
      Revise to: "In the Hymn the drakaina is associated with the local
      nymph-tradition and with a separate episode in which she nurses the
      infant Typhon (Typhaon), an episode that Fontenrose treats as an
      aetiological doublet of the principal combat." Remove "giant" and
      replace "involving" with "in which she nurses."

