findings:

  # ── CITATION-WRONG (MEDIUM) ──────────────────────────────────────────────

  - id: CW-01
    verdict: "! CITATION-WRONG"
    severity: MEDIUM
    claim_location: "Narrative — Tablet III, Dagan as dispatched messenger"
    claim_text: >
      "Dagan, the messenger of the assembly, is dispatched to bring news of the victory
      to the gods." (line 242 of claims doc, footnote citing Foster 2005, pp. 575-576.)
    issue: >
      Multiple independent corroborating sources indicate that Dagan is not described as
      a "dispatched messenger" in the SB Anzû Epic. The evidence points to two distinct
      problems:
      (a) Dagan appears as part of an epithet complex ("bulwark of Anu and Dagan") applied
          to Ninurta himself — i.e., as an honorific reference, not as a narrative actor.
      (b) The actual messenger dispatched after the victory appears to be Birdu (confirmed:
          "Enlil sends the messenger god Birdu to request Ninurta to return the Tablet of
          Destinies") or Nusku, not Dagan.
      (c) One source describes Dagan as the equivalent of Enlil in a variant ("Enlil, who
          is called Dagan at this point") — which would make "Dagan as messenger" a
          conflation of Enlil's acknowledgment speech with a separate dispatching act.
      The claim assigns Dagan a role ("dispatched to bring news") that does not correspond
      to the role the corroborating evidence assigns him.
    evidence: >
      WebSearch result: "Dagan is mentioned as part of a description of Ninurta as 'the
      strong and splendid firstborn of Mami, bulwark of Anu and Dagan'"; "Nusku goes outside
      and brings Birdu into Enlil's presence, where Birdu makes his voice heard and spoke."
      This is inconsistent with Dagan as the assembly's dispatched messenger.
    recommended_fix: >
      Writer should verify against Foster 2005 pp. 575-576 and Annus 2001 Tablet III whether
      Dagan appears as a narrative actor (messenger or otherwise) or only in an epithet.
      If Dagan does not appear as a dispatched messenger, replace with the correct actor
      (likely Birdu, or revise to describe the victory announcement scene without
      misassigning the messenger role). If the passage is lacunose and Dagan's role is
      reconstructed, add a RECONSTRUCTION marker.

  # ── INTERNAL-VARIANCE (MEDIUM) ───────────────────────────────────────────

  - id: IV-01
    verdict: "△ INTERNAL-VARIANCE"
    severity: MEDIUM
    claim_location: "Narrative — Tablet II opening, 'Seven Evil Winds'"
    claim_text: >
      "Tablet II opens with Ninurta mustering his weapons, including the Seven Evil Winds,
      the flood-storm, and the sling-stone, and setting out into the mountains."
      (line 161, footnote citing Foster 2005, pp. 565-566.)
    issue: >
      Independent corroboration confirms "seven winds" (or "the weapon of chaos, the seven
      winds, formed up") in the Anzû Epic's battle context, but the qualifier "Evil" in
      "Seven Evil Winds" is not corroborated. The "Seven Evil Winds" is a well-known Akkadian
      formula (they appear in Erra Epic and other texts) but its specific use in Tablet II
      of the SB Anzû Epic at the mustering scene requires direct verification against Annus
      2001 Tablet II or Foster 2005 pp. 565-566. A minor variant risk exists: the OB
      version may differ from the SB version on this detail, and if Foster's composite
      translation draws on the OB fragment for this passage, the "Evil" qualifier may
      import an OB-version detail into the SB narration without flagging it.
    evidence: >
      Web search confirmed: "the weapon of chaos, the seven winds, formed up" in the Anzû
      Epic. However, "Seven Evil Winds" (with "Evil") is a formulaic phrase most associated
      with the Erra Epic and Atrahasis, and its presence specifically at Tablet II opening
      of the SB Anzû Epic is UNVERIFIED.
    recommended_fix: >
      Writer should verify against Annus 2001 Tablet II or Foster 2005 pp. 565-566 whether
      the specific designation "Seven Evil Winds" (as opposed to simply "seven winds")
      appears in this passage of the SB text. If the detail comes from the OB version via
      Foster's composite, add a note to the footnote specifying the textual witness.

  # ── UNVERIFIED MEDIUM (sub-page granularity risk) ─────────────────────────

  - id: UV-M-01
    verdict: "? UNVERIFIED"
    severity: MEDIUM
    claim_location: "Narrative — Adad summoned at 'p. 561' (single page)"
    claim_text: >
      "Anu first addresses the storm-god Adad, offering him supremacy among the gods if
      he will undertake the combat." (footnote: Foster 2005, pp. 561.)
    issue: >
      The Foster citation is to a single page (p. 561), which is the sub-page granularity
      flag zone per task instructions. The threefold refusal is confirmed as occurring
      in Tablet I, but the specific sequence (Adad first, at p. 561) cannot be verified
      without access to the physical book. The narrative content (Adad refused; Gerra refused;
      Šara refused) is confirmed, but the page assignment is unverifiable at this granularity.
    evidence: >
      Foster 2005 pp. 555-578 confirmed as the Anzu section. Single-page sub-citations
      (p. 561, p. 567, p. 574) are at higher fabrication risk per task protocol.
    recommended_fix: >
      Low-priority for revision; sub-page Foster citations are endemic throughout the doc
      and all are flagged UNVERIFIED LOW per protocol. The content is confirmed by
      independent corroboration. No revision needed unless Foster p. 561 is found to
      mis-sequence the refusals.

  - id: UV-M-02
    verdict: "? UNVERIFIED"
    severity: MEDIUM
    claim_location: "Narrative — arrow-feather motif paraphrase vs. source text"
    claim_text: >
      "The shaft returns to its cane, the arrowhead to its flint, the feathers to the bird
      from which they came, and the bowstring to the sinew — the arrow is annulled mid-flight
      by the decree of the Tablet." (line 179, citing Foster 2005 p. 567.)
    issue: >
      The corroborated version of the dissolution decree reads: "You, shaft that came,
      return to your reed thicket! Bow frame, back to your copse! Bow string, back to the
      ram's gut! Feathers, return to the birds!" The claims doc's paraphrase introduces
      "arrowhead to its flint" — not attested in the corroborated text, which has "bow frame,
      back to your copse" rather than an arrowhead-to-flint clause. This may be a Foster
      translation variant (Foster may translate the same passage differently from the
      Gateways source), or it may be a paraphrase embellishment by the writer. The
      discrepancy is minor but constitutes an unverified specific detail.
    evidence: >
      Corroborated text: "shaft...reed thicket / bow frame...copse / bow string...ram's gut /
      feathers...birds." Claims text: "shaft...cane / arrowhead...flint / feathers...bird /
      bowstring...sinew." The "arrowhead to its flint" component has no corroboration.
    recommended_fix: >
      Writer should verify against Foster 2005 p. 567 whether "arrowhead to its flint" appears
      in Foster's translation. If absent, revise to match the attested dissolution sequence.
      Low-priority if Foster's translation differs from other translations of the same passage.

  # ── UNVERIFIED LOW (bulk — Annus/Foster tablet-level citations) ───────────

  - id: UV-L-BULK
    verdict: "? UNVERIFIED"
    severity: LOW
    claim_location: "All Annus 2001 tablet-level and Foster 2005 sub-page citations"
    count: ~72
    issue: >
      The majority of claims cite Annus 2001 (Tablet I, Tablet II, Tablet III apparatus)
      and Foster 2005 (pp. 555-578, various sub-page ranges). Neither source is freely
      accessible online. Per task instructions, these are treated as UNVERIFIED LOW unless
      the specific claim is implausible or appears fabricated. No implausible or fabricated
      content was detected among the tablet-level claims; all are consistent with:
      (a) the known narrative structure of the SB Anzû Epic as corroborated by independent
          sources;
      (b) the brief's lacuna/variant/reconstruction specifications;
      (c) established Mesopotamian scholarship on the Anzû/Marduk genealogy.
    recommended_fix: >
      No revisions required for UNVERIFIED LOW verdicts. These represent the inherent
      verification limit for claims citing print-only critical editions. The claims doc
      is well-structured and the Annus/Foster citations are plausible throughout.

