  - id: FIND-01
    severity: MEDIUM
    category: attribution-drift
    claim_anchor: "lines 9, 26, 123, 125 — chapter-comment, §Source-overview central-argument paragraph, and §III opening"
    description: |
      The chapter labels the Hittite case "Teshub-Illuyanka" in the
      pre-amble comment (line 9: "Ra-Apep (daily) and Teshub-Illuyanka
      (annual)"), in the central-argument paragraph (line 26: "Egyptian
      Ra-Apep and Hittite Teshub-Illuyanka"), and in the §III section
      title and opening sentence (line 123: "=== III. Teshub and
      Illuyanka — annual"; line 125: "The Hittite Teshub-Illuyanka
      combat is the chapter's annual-cycle case: the storm-god (Hittite
      Tarḫunna, Hurrian Teshub) confronts the serpent Illuyanka...").
    issue: |
      Ch6's claims-approved is explicit (lines 56, 59, 62) that the
      Illuyanka myth is a Hittite-language composition that uses
      Tarḫunna throughout, and that Teshub is the Hurrian-language
      counterpart used in Hurrian-derived material (Kumarbi Cycle and
      others) — explicitly distinguished from the Illuyanka material.
      The Ch6 chapter title is "Tarḫunna vs. Illuyanka: The Purulli
      Festival". Calling the case "Teshub-Illuyanka" is a name-pairing
      drift to upstream: Tarḫunna is the storm-god of the CTH 321
      tablets. The line-125 parenthetical ("Hittite Tarḫunna, Hurrian
      Teshub") acknowledges the distinction but the section title and
      every comparative-pairing label uses the Hurrian form. This is
      MEDIUM rather than HIGH because Tarḫunna and Teshub are the
      same deity in the Hittite-state pantheon (Hoffner 1998 general
      introduction), but the slip nonetheless cuts against the upstream
      chapter's explicit philological discipline.
    evidence: |
      Ch6 claims-approved line 62: "The Illuyanka myth is a Hittite-
      language composition and consequently uses Tarḫunna throughout,
      distinguishing it from the Hurrian-derived material that uses
      Teshub.[Hoffner 1998, "Illuyanka" §§1-2, throughout.]"
      Ch6 claims-approved line 2: "== Tarḫunna vs. Illuyanka: The
      Purulli Festival — Claims".
    recommended_fix: |
      Globally rename "Teshub-Illuyanka" to "Tarḫunna-Illuyanka" or
      "the storm-god-Illuyanka" wherever it appears as the case-label
      (chapter-comment line 9; central-argument line 26; §III title
      line 123; §III opening line 125). The line-125 parenthetical
      ("Hittite Tarḫunna, Hurrian Teshub") may be retained as
      philological gloss but should be reformulated as: "the storm-god
      (Hittite Tarḫunna; the Hurrian counterpart-deity Teshub appears
      in Hurrian-derived material such as the Kumarbi Cycle but the
      Illuyanka tablets use Tarḫunna throughout)". This is verbatim-
      substitutable.

