  - id: FIND-06
    severity: LOW
    category: attribution-drift
    claim_anchor: "line 137 (§III) — paragraph on Version 1 narrative summary"
    description: |
      "Version 1, in Hoffner's translation as 'Illuyanka' §1, opens
      with the storm-god and Illuyanka meeting in combat at Kiskilussa,
      in which Illuyanka defeats the storm-god; Inara — daughter of
      the storm-god — devises a stratagem with the mortal Hupasiya,
      who in exchange for a night with Inara binds the gorged serpent
      at a banquet so that the storm-god can return with the
      assembled gods and slay the bound Illuyanka."
    issue: |
      The phrasing "in exchange for a night with Inara" telescopes
      Ch6's framing somewhat: Ch6 lines 121-124 attest the bargain as
      Inara offering "to spend a night with him" in exchange for
      assistance, with the night recorded as a fulfilled stipulation
      separately from the binding. The Ch36 compression makes the
      night-and-binding a quid-pro-quo simultaneity, which is a mild
      reframe of the upstream's sequence (bargain → consummated
      bargain → conducted to banquet site → concealment → Inara
      summons serpents → gorging → Hupasiya emerges and binds). The
      drift is minor; the substantive claim (Hupasiya binds the
      gorged serpent; storm-god kills) is correct.
    evidence: |
      Ch6 claims-approved lines 121-139:
      "Inara proposes a bargain to Hupasiya: he is to assist her
       against the serpent, and in exchange she offers to spend a
       night with him. ... Hupasiya agrees to the bargain, and the
       text records the night spent between them as a fulfilled
       stipulation of the agreement. ... Inara conducts Hupasiya to
       the site of the planned banquet... While the serpents are
       immobilised by their gorging, Hupasiya emerges from concealment
       and binds Illuyanka with a rope."
    recommended_fix: |
      Replace "who in exchange for a night with Inara binds the
      gorged serpent at a banquet" with "who, after the bargained
      night with Inara, is concealed at the banquet site and there
      binds the gorged serpent". Verbatim-substitutable; preserves
      the compression's length-budget while restoring the upstream's
      narrative sequence.

  - id: FIND-07
    severity: LOW
    category: wording-ambiguity
    claim_anchor: "line 140 (§III) — paragraph on Version 2 narrative summary"
    description: |
      "Version 2, in Hoffner's translation as 'Illuyanka' §2, opens
      differently: Illuyanka defeats the storm-god by taking his heart
      and eyes; the mutilated storm-god begets a son with a mortal
      woman, marries the son into Illuyanka's house, and instructs
      him to demand the heart and eyes as bride-price; once the organs
      are returned, the restored storm-god kills both Illuyanka and
      his own son (who, having kept faith with his father-in-law's
      house, calls upon his father to kill him along with Illuyanka)."
    issue: |
      The phrasing "the restored storm-god kills both Illuyanka and
      his own son" omits the Ch6-attested locus of the renewed
      combat: Ch6 line 205 is explicit that "The storm-god then
      engages Illuyanka anew, this time in a combat at the sea, and
      slays the serpent." The footnote at Ch36 line 140 mentions
      "the renewed combat at the sea" but the body-prose narrative
      summary itself drops the "at the sea" locus. The omission is
      minor — Ch36 is short-by-design — but the upstream framing is
      explicit on this point and the locus is recoverable from the
      footnote.
    evidence: |
      Ch6 claims-approved line 205: "The storm-god then engages
      Illuyanka anew, this time in a combat at the sea, and slays
      the serpent."
      Ch36 line 140 footnote: "...the renewed combat at the sea, and
      the dual killing of Illuyanka and the son".
    recommended_fix: |
      Replace "once the organs are returned, the restored storm-god
      kills both Illuyanka and his own son" with "once the organs
      are returned, the restored storm-god joins Illuyanka in renewed
      combat at the sea and kills both the serpent and his own son".
      Verbatim-substitutable.

  - id: FIND-08
    severity: LOW
    category: wording-ambiguity
    claim_anchor: "line 110 [LACUNA:] block — Bremner-Rhind fragmentary preservation"
    description: |
      "[LACUNA: the Bremner-Rhind liturgy is preserved but fragmentary
      in sections — a documented physical gap in the principal
      documentary witness for the ritual embedding of the daily Apep
      combat | source: per brief 16-ra-apep.yaml on the fragmentary
      preservation of P. BM EA 10188 and per Faulkner's *JEA* 22 (1936)
      and *JEA* 23-24 (1937-38) on the philological reconstruction of
      the manuscript | scholarly_reconstruction: Faulkner's four-part
      *JEA* edition...]"
    issue: |
      The phrase "Faulkner's four-part *JEA* edition" is slightly
      imprecise: Ch16 line 92 attests the edition as "Faulkner 1936
      ('The Bremner-Rhind Papyrus I', JEA 22), and Faulkner 1937-38
      ('The Bremner-Rhind Papyrus II-IV', JEA 23-24)" — i.e., a four-
      part series spread across three JEA volumes (22, 23, 24). The
      "four-part" descriptor is correct (Parts I, II, III, IV) but
      "JEA edition" implies a single unified edition rather than the
      multi-volume series structure. This is a wording-precision
      issue rather than a substantive drift.
    evidence: |
      Ch16 claims-approved line 92: "...Faulkner 1936 ('The Bremner-
      Rhind Papyrus I', JEA 22), and Faulkner 1937-38 ('The
      Bremner-Rhind Papyrus II-IV', JEA 23-24) — which present the
      philological edition of the papyrus separately from his Book
      of the Dead translation; the chapter cites these as Faulkner's
      Bremner-Rhind editions and references them at the JEA-volume
      level..."
    recommended_fix: |
      Replace "Faulkner's four-part *JEA* edition" with "Faulkner's
      four-part *JEA* edition (Parts I-IV across *JEA* 22, 23, and
      24)". Optional; the compression is acceptable in a [LACUNA:]
      block.

