  - id: FIND-05
    severity: MEDIUM
    category: scope-creep
    claim_anchor: "line 251 (§VI) — paragraph on cyclical-vs-eschatological isfet-containment"
    description: |
      "...in the cyclical-maintenance subtype the cosmos is held in
      being by the daily-or-annual containment of *isfet* — Apep is
      rebuffed nightly, Illuyanka is recurrently slain — and the
      containment is interminable; in the eschatological subtype the
      cosmos's *isfet*-content accumulates toward a final reckoning..."
    issue: |
      The phrasing extends the Egyptian *isfet* category-term to apply
      across traditions (Ragnarök, Frashokereti, Revelation) where the
      term is not native. The Ch36 [INFERENCE:] block at line 249
      explicitly justifies using *maʿat* / *isfet* as comparative-
      analytical vocabulary for the Hittite case (per scope.md
      §"Reconstruction policy"), but extending *isfet* to the
      eschatological subtype's Norse / Iranian / Christian materials
      is a wider analytical scope than the [INFERENCE:] authorises.
      The drift is mild — the §VI paragraph is comparative-analytical
      rather than narrative-content-fill, so scope.md's no-cross-
      tradition-reconstruction policy is not strictly violated — but
      a careful reader may take "the cosmos's *isfet*-content
      accumulates toward a final reckoning" as imputing an Egyptian
      category to traditions whose own conceptual apparatus the
      chapter has not engaged. Ch36 line 245 is admirably explicit
      that the Hittite tablets do not articulate the framework; the
      same caveat is not extended to the eschatological-tradition
      materials in §VI's closing paragraphs.
    evidence: |
      Ch36 line 249 [INFERENCE:] block scope: "the *purulli*-and-
      Illuyanka material is not being narratively supplemented from
      the Egyptian corpus, only typologically described using a
      vocabulary that the Egyptian corpus articulates more explicitly".
      The eschatological-tradition extension at line 251 is broader.
    recommended_fix: |
      Add a parenthetical caveat to line 251 explicitly marking the
      *isfet*-language as comparative-analytical-vocabulary rather
      than as native to the eschatological traditions: "...the cosmos's
      isfet-content (using the Egyptian framework as comparative
      analytic, not as native vocabulary for the eschatological
      traditions) accumulates toward a final reckoning...". Alternatively,
      extend the [INFERENCE:] block at line 249 to cover the §VI
      eschatological-extension explicitly.

