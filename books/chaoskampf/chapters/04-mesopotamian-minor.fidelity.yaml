findings:
  - id: FH-01
    kind: IMPLICIT-ADDITION
    severity: LOW
    claim_or_passage: |
      "Three candidates have been put forward in the scholarship for the god
      whose name the manuscript no longer preserves. They are not equally
      weighted, and the order in which they are sometimes mentioned in older
      surveys can mislead." (line 62)
    issue: >
      The second sentence ("the order in which they are sometimes mentioned in
      older surveys can mislead") is an editorial signpost not backed by an
      explicit approved claim. It is consistent with the VARIANT block's
      weighting rubric and functions as a contextual warning rather than a
      standalone factual assertion. No claim states that older surveys present
      the identifications in a misleading order.
    recommended_fix: >
      No action required for publication; severity is LOW. If the editorial
      team prefers strict claim anchoring, the sentence can be trimmed to
      "Three candidates have been put forward in the scholarship for the god
      whose name the manuscript no longer preserves. They are not equally
      weighted." without loss of meaning.

  - id: FH-02
    kind: GLOSSARY-GAP
    severity: LOW
    claim_or_passage: "Terms: Tishpak, Nergal, bašmu, mušḫuššu"
    issue: >
      These four terms appear in the narrative and the claims doc but are
      absent from glossary.yaml. This is a glossary gap, not a narrative
      error — the narrative uses them correctly with appropriate context and
      italicisation. The gap means a reader consulting the glossary will not
      find definitions for these terms.
    recommended_fix: >
      Add glossary entries for Tishpak (patron deity of Eshnunna, proposed
      slayer of Labbu), Nergal (god of plague, war, and underworld violence),
      bašmu (Akkadian serpent species), and mušḫuššu (Akkadian horned serpent-
      dragon). These can be added at the next glossary update pass.
