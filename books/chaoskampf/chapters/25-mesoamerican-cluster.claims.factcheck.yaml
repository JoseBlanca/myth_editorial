findings:

  - id: FC-01
    severity: MEDIUM
    category: citation_wrong
    location: >
      §"Quetzalcoatl vs. Tezcatlipoca — the alternation across the five Suns" — body claim
      at line 103 on the structural pattern of the alternation (EVIDENCE token:
      source_id=lopez-austin-myths ; loc=The Myths of the Opossum, ch. on Cipactli and the
      Suns cycle). This is the chapter's load-bearing structural-framing claim for the second
      sub-case.
    claim_text: >
      "The structural pattern of the Quetzalcoatl-vs-Tezcatlipoca alternation is in scope.md's
      terms a cosmogonic-political cycle of combats rather than a single chaoskampf: each
      age-bounding 'combat' (the toppling of one ruling god by the other) is a sovereignty-
      transfer between paired antagonist deities rather than a once-and-for-all establishment
      of the present cosmic order, and the cycle as a whole performs both cosmogonic work
      (each age is a cosmos) and sovereignty work (each age is one god's reign) without
      resolving into the single decisive combat that the Coatepec, Marduk-Tiamat, or
      Indra-Vṛtra narratives present."
    problem: >
      The EVIDENCE token for this claim cites source_id=lopez-austin-myths (The Myths of the
      Opossum, ch. on Cipactli and the Suns cycle) as the sole anchor. However, the claim's
      key interpretive vocabulary — 'cosmogonic-political cycle,' 'sovereignty-transfer between
      paired antagonist deities,' the Suns cycle as a Mexica political-ideological framework —
      is the characteristic framing of Davíd Carrasco 1999 (City of Sacrifice), whose chapters
      on the five Suns analyse the Quetzalcoatl-Tezcatlipoca alternation as the cosmological
      engine of Mexica state violence and royal legitimation.

      López Austin 1993 (The Myths of the Opossum) does address the Suns cycle as a structural
      Mesoamerican cosmogonic pattern, but its orientation is comparative-mythological: it places
      the Mexica Suns cycle within a pan-Mesoamerican typology. The political-sovereignty framing
      — each Sun as a deity's reign, each toppling as a sovereignty-transfer — is the vocabulary
      of Carrasco 1999's political-ritual reading. Using lópez-austin-myths as the sole anchor
      for this claim routes the load-bearing structural framing through the less directly relevant
      source. This is the same misrouting pattern as FC-02 in Ch24 (Durán ritual-context content
      anchored to López Austin rather than Carrasco).

      Note: the claim's substance is factually correct — the Suns cycle is structurally
      distinctive from a single decisive combat — and the broader chapter's framing is sound.
      Only the source attribution for this specific structural-framing claim needs correction.
    evidence: >
      sources.yaml entry for carrasco-1999-city: "Huitzilopochtli ritual/political reading."
      The sources.yaml notes entry confirms Carrasco 1999 is the political-ritual anchor.
      sources.yaml entry for lopez-austin-myths: "Used for Cipactli, Huitzilopochtli,
      Quetzalcoatl/Tezcatlipoca" — while this confirms López Austin 1993 does cover the
      Quetzalcoatl/Tezcatlipoca material, the notes do not characterize López Austin as the
      political-sovereignty-framing anchor. Trained knowledge of Carrasco 1999: the book's
      chapters on the five Suns analyse the cycle explicitly as a framework for Mexica state
      ideology and royal legitimation (the Fifth Sun under Huitzilopochtli as cosmological
      legitimation for Mexica imperial violence). This is the 'sovereignty-transfer' framing
      the claim invokes.
    recommended_fix: >
      At line 103, add carrasco-1999-city as a co-anchor in the EVIDENCE token:
        // EVIDENCE: source_id=carrasco-1999-city ; loc=City of Sacrifice, ch. on the five Suns
        (or as a dual-anchor: source_id=lopez-austin-myths AND carrasco-1999-city)
      In the footnote at line 103, add Carrasco 1999 alongside López Austin 1993:
        "...on the structural pattern of the Quetzalcoatl-vs-Tezcatlipoca alternation as a
        cosmogonic-political cycle of combats rather than a single chaoskampf [López Austin 1993
        on the structural typology; Carrasco 1999 on the sovereignty-transfer political framing]..."
      The brief's sources.primary entries already include both lópez-austin-myths and
      carrasco-1999-city; adding Carrasco 1999 as co-anchor at line 103 is consistent with the
      brief's source specification and corrects the misrouting without requiring any substantive
      change to the claim.

  - id: FC-02
    severity: NOTE
    category: note
    location: >
      §"Source overview" — all 16 EVIDENCE tokens citing source_id=lopez-austin-myths specify
      the same single loc: 'The Myths of the Opossum, ch. on Cipactli and the Suns cycle.'
      Similarly, all 12 EVIDENCE tokens citing source_id=carrasco-1999-city specify
      'City of Sacrifice, ch. on the five Suns.'
    claim_text: >
      (Representative) "...López Austin 1993, The Myths of the Opossum, chapter on the
      Cipactli cosmogony..."
    problem: >
      The loc specification is consistent throughout the chapter but chapter-level only —
      no specific chapter titles, page ranges, or passage references are given for either
      López Austin 1993 or Carrasco 1999. López Austin 1993 (The Myths of the Opossum) is a
      316-page volume; 'ch. on Cipactli and the Suns cycle' is the chapter-level loc supplied
      by the brief. Carrasco 1999 (City of Sacrifice) is a 228-page volume; 'ch. on the five
      Suns' is the chapter-level loc supplied by the brief.

      This parallels the Matos Moctezuma 1988 'interpretive chapters' vague-loc situation in
      Ch24 (FC-04, NOTE-level). The brief supplies no chapter-number specificity for these
      sources. No claim is factually wrong; no claim lacks a sources.yaml anchor. The issue is
      citation-specificity depth, which the brief itself does not supply at this stage. The
