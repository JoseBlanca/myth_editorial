      This is a NOTE rather than a finding: the pipeline's claims stage routinely works at
      chapter-level loc specificity, and the brief authorises the current depth.
    evidence: >
      brief 25-mesoamerican-cluster.yaml, sources.primary entries:
        lópez-austin-myths: loc = 'The Myths of the Opossum — on Cipactli and the Suns cycle'
        carrasco-1999-city: loc = 'City of Sacrifice, chs. on the five Suns'
      Both locs are chapter-level only; no page ranges or sub-chapter titles given. The 16
      lópez-austin-myths EVIDENCE tokens and 12 carrasco-1999-city EVIDENCE tokens all carry
      these same chapter-level locs. This is brief-authorised at the claims stage.
    recommended_fix: >
      Before the chapter-draft stage, open López Austin 1993 (The Myths of the Opossum) and
      Carrasco 1999 (City of Sacrifice) to identify specific chapter titles and page ranges for:
        (1) The Cipactli dismemberment-cosmogony narrative (López Austin 1993)
        (2) The five Suns cycle and Quetzalcoatl-Tezcatlipoca alternation (both sources)
        (3) The Topiltzin Quetzalcoatl / Tollan tradition (Carrasco 1999)
        (4) The Aztec Sun Stone iconographic programme (Carrasco 1999)
        (5) The post-conquest textual filtering methodological situation (both sources)
      Update the brief with specific chapter titles and page ranges so that the chapter draft
      can supply pinned citations. This is the same recommendation as Ch24 FC-04 for Matos
      Moctezuma 1988's 'interpretive chapters' vague-loc.

