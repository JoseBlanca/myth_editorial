findings:
  - id: F1
    type: CLAIM-ADDED
    severity: MEDIUM
    location: "narrative line 152"
    section: "Tablet I — killing of Apsû"
    narrative_text: |
      "The sequence — bind, strip, kill — will be echoed in Marduk's later treatment of
      Tiamat, and the parallel is part of how the epic structures its two combats."
    claims_doc_text: |
      "The killing of Apsû is the first combat in the epic and establishes the pattern:
      the threatened younger god uses incantation and binding to subdue and dismember a
      primordial parent." (claims line 162)
      Forsyth 1987 ch. 2 cited as treating the episode as "a structural rehearsal for the
      Marduk-Tiamat combat."
    issue: |
      The claims doc says the episode "establishes the pattern" and Forsyth treats it as a
      "structural rehearsal" — but neither claim states that the specific bind-strip-kill
      sequence is repeated verbatim in Marduk's later combat. The narrative adds an explicit
      structural parallel ("echoed") that the claims doc does not assert and that is a new
      interpretive claim about the two combats' relationship. The claims-doc Forsyth citation
      refers to the general structural parallel, not to the specific three-step sequence.
    fix: |
      Remove "The sequence — bind, strip, kill — will be echoed in Marduk's later treatment
      of Tiamat, and the parallel is part of how the epic structures its two combats." Keep
      the existing sentence about Forsyth ("Forsyth treats the episode as a structural
      rehearsal for the Marduk-Tiamat combat that follows: same shape, smaller scale.") which
      is defensible from the claims doc.

  - id: F2
    type: CLAIM-ADDED
    severity: MEDIUM
    location: "narrative line 167"
    section: "Tablet I — Marduk's birth"
    narrative_text: |
      "the image becomes the standard portrait of Marduk in later iconography"
    claims_doc_text: |
      "Marduk is described as having four eyes and four ears, of surpassing physical
      proportions, and as radiant from birth." (claims line 168)
    issue: |
      The claims doc describes Marduk's physical characteristics as stated in Enūma Eliš.
      The narrative adds "the image becomes the standard portrait of Marduk in later
      iconography" — an unsupported iconographic reception claim not in the approved
      claims. While plausible, it is a factual assertion about the later history of
      Marduk's iconographic representation that has no claims-doc backing or source citation.
    fix: |
      Remove "and the image becomes the standard portrait of Marduk in later iconography."
      Stop after "outside the ordinary divine type."

  - id: F3
    type: CLAIM-ADDED
    severity: LOW
    location: "narrative line 292"
    section: "Tablet IV — cloth-test"
    narrative_text: |
      "The two acts are deliberate: the test verifies destruction and restoration, undoing
      and remaking, the two operations that will matter for the cosmogony to come."
    claims_doc_text: |
      "Marduk speaks; the cloth vanishes. He speaks again; the cloth is restored intact."
      (claims line 289)
