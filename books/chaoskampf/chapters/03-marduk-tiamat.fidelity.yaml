glossary_check:
  Ea_not_Enki_in_Akkadian_context: PASS
  Ea_Enki_metalinguistic_note: |
    Narrative line 77: "Ea in Akkadian context corresponds to Sumerian Enki, but Enūma Eliš
    is an Akkadian composition and uses the Akkadian theonym throughout. The point is one of
    usage rather than substance: the same god goes by Ea in this text." Exactly matches
    glossary prescription.
  Apsû_circumflex: PASS
  Anšar_hacek: PASS
  Qingu_not_Kingu: PASS
  Tiamat_no_length_mark: PASS
  Anzû_circumflex: PASS
  akitu_italicised_first_mention: PASS
  tehôm_italicised_first_mention: PASS
  Esagil_italicised_first_mention: FAIL
  Esarra_italicised_first_mention: FAIL
  esagil_esarra_note: |
    Glossary instruction: "Esagil/Esarra/akītu/tehôm italicised on first mention."
    _akītu_ is correctly italicised at narrative line 42. _tehôm_ is correctly italicised at
    narrative line 86. However Esagil and Esarra appear without italics on their first mention
    (narrative lines 42 and 104 for Esagil; line 443 for Esarra). This is a formatting breach
    — see F4. (Severity: MEDIUM.)
  chaos_figure_banned: PASS
  chaos_monster_banned: PASS
  Enki_Abzu_metalinguistic_only: PASS
  Abzu_note: |
    Narrative line 92: "The same word in Sumerian context is Abzu, but the Akkadian form with
    circumflex is the one used in Enūma Eliš, and the chapter follows it." Glossary-approved
    metalinguistic use only. No body-prose occurrences.
  primordial_contrastive_uses:
    - location: "narrative line 83"
      text: "primordial malice"
      verdict: DEFENSIBLE
      note: "Used in Ballentine-reading context: 'her motive... is grief and obligation rather
        than primordial malice.' Contrastive; mirrors claims-doc language."
    - location: "narrative line 113"
      text: "primordial setting"
      verdict: DEFENSIBLE
      note: "Describes the pre-creation opening of Tablet I. Descriptive, not evaluative."
    - location: "narrative line 116"
      text: "primordial waters"
      verdict: DEFENSIBLE
      note: "Describes Apsû and Tiamat before differentiation. Descriptive."
    - location: "narrative line 149"
      text: "primordial parent"
      verdict: DEFENSIBLE
      note: "Used of Apsû as Ea's adversary. Descriptive; mirrors claims-doc language."
    - location: "narrative line 161"
      text: "primordial parent"
      verdict: DEFENSIBLE
      note: "Repeated for Tiamat-Marduk parallel. Descriptive."
  mighty_winds_verbatim_catalogue: PASS
  sacred_number_verbatim_claim: PASS
  sacred_number_note: |
    Claims doc says "whose sacred number was fifty in the older theology." Narrative line 481
    paraphrases: "fifty was Enlil's number... the highest in the conventional ordering." The
    word "sacred number" appears only in the claims-doc, not in the narrative body. The
    narrative renders it accurately by paraphrase without importing the exact phrase—acceptable.
  Yahweh_not_YHWH: N/A
  yahweh_note: |
    No Genesis cross-reference with "Yahweh" or "YHWH" appears in this chapter's narrative.
    The tehôm cross-reference points to Ch. 8 only. No issue.

