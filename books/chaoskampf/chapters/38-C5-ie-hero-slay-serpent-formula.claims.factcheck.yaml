  - id: NOTE-02
    severity: NOTE
    category: structural-observation | janat-aiim-attribution
    claim_anchor: lines 91–93 (§I Avestan-reflex paragraph)
    description: |
      Ch38 line 91 introduces the Avestan reflex of the formula as
      "*janat aiim* ('he slew the serpent') and similar verb-noun
      pairings in the Avestan yashts", and the body-prose explicitly
      attributes the form to "per brief 38-C5-ie-hero-slay-serpent-
      formula.yaml comparative_argument naming '*janat aiim*' as the
      Avestan reflex" in the footnote.
    issue: |
      Ch13 claims-approved at line 149 attests the Avestan verbal
      root *jan-* as the verb of the smiting and identifies the
      *jan-* / *han-* cognancy as a principal philological pillar of
      Benveniste & Renou 1934 and Watkins 1995, but does not cite the
      specific verb-noun pairing form *janat aiim*. The form is the
      brief's own naming of the Avestan reflex (brief line 21 cites
      "*janat aiim*" as the Avestan reflex), and Ch38's body-prose
      footnote correctly flags this routing through the brief. The
      *janat aiim* form is a reasonable reconstruction of an Avestan
      counterpart to the Vedic *áhann áhim* given the *jan-* verbal
      root and the *aži-* nominal root, but it is not directly
      attested in the surviving Avestan corpus as a single verb-noun
      pair (the surviving Yt. 5.33–35 uses prayer-formula language
      without exhibiting this exact pairing). The chapter is
      correctly cautious — line 91 says "is most commonly cited in
      the form *janat aiim*" and "and similar verb-noun pairings",
      acknowledging the imprecision — but the brief's framing of the
      form as the Avestan reflex of the formula is one degree more
      assertive than the Avestan textual record itself supports.
    evidence: |
      Ch13 claims-approved line 149:
        "The combat-narrative that the Avestan hymn-allusions
        presuppose — without narrating it at length — has Thraētaona
        dispatching the dragon by smiting, and the principal verb
        used in the formulaic poetic vocabulary is the Avestan
        *jan-* 'to smite,' which is philologically cognate with the
        Vedic *han-* of the Indra-Vṛtra formula *áhann áhim*."
      Ch38 line 91 (body):
        "The Avestan reflex of the formula is most commonly cited in
        the form *janat aiim* ('he slew the serpent') and similar
        verb-noun pairings in the Avestan yashts..."
      Ch38 line 91 footnote:
        "...per brief 38-C5-ie-hero-slay-serpent-formula.yaml
        comparative_argument naming '*janat aiim*' as the Avestan
        reflex."
      Brief line 20–21:
        "Watkins's 1995 reconstruction of an Indo-European poetic
        formula — HERO SLAY SERPENT, realized in Vedic as áhann
        áhim, Avestan as *janat aiim, Hittite as kuenta...
        illuyanka..."
      Note that the brief itself prefixes *janat aiim* with an
      asterisk (reconstructed), suggesting that the brief regarded
      the form as a reconstructed Avestan counterpart rather than as
      a directly attested Avestan textual phrase.
    recommended_fix: |
      Optional, post-human-normalize. Consider hedging line 91's
      "most commonly cited in the form *janat aiim*" to make the
      reconstructed-rather-than-directly-attested status more
      explicit. Verbatim-substitutable hedge:
        "The Avestan reflex of the formula is conventionally
        reconstructed as *janat aiim* ('he slew the serpent') from
        the Avestan verb-and-noun pairings in the yashts (where the
        verbal root *jan-* and the noun *aži-* recur in the
        formulaic poetic vocabulary), instantiating the same
        lexical-and-semantic structure that Vedic *áhann áhim*
        instantiates in Vedic Sanskrit."

