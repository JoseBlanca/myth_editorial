# ─────────────────────────────────────────────────────────────────────
# SUPPORTED CLAIMS — summary register
# ─────────────────────────────────────────────────────────────────────
# Of 96 paragraph-claims, 92 are SUPPORTED: each EVIDENCE token routes
# through a source_id that is registered in sources.yaml (all 15 unique
# IDs verified present in the registry); each footnote attribution
# fairly characterises the cited scholar's published position; each
# forward-link to a comparative chapter (C6=Ch39 through C8=Ch41) and
# each back-link to Part-I chapters (Ch5, Ch6, Ch11, Ch12, Ch13, Ch14,
# Ch15, Ch16, Ch18, Ch19, Ch20, Ch24, Ch25, Ch29, Ch33, Ch36, Ch37)
# matches toc.yaml.
#
# §I substance is sound on the principal philological claims:
# Watkins's reconstructed HERO SLAY SERPENT formula as a lexical-and-
# semantic structure with a verb-of-killing slot filled by reflexes of
# PIE *gʷhen-* (Vedic *han-* / Avestan *jan-* / Hittite *kuen-*) and a
# serpent-object slot filled by reflexes of two distinct PIE etyma
# (Vedic *ahi-* / Avestan *aži-* on one hand; Hittite *illuyanka-* on
# the other); the formula's character as poetic-verbal inheritance
# rather than narrative or theological inheritance; the chronological
# depth secured by Hittite's early-attestation status; the three-
# witness Indo-Iranian + Anatolian cross-branch attestation; and the
# evidential gradient between direct philological cases (§II) and
# typological-or-fragmentary cases (§III).
#
# §II direct cases match Part-I framings: the Vedic case anchored on
# RV 1.32 with the eight-hymn Vṛtra-corpus and Trita Āptya residual
# stratum (RV 10.99.6; 1.105; 2.11.19–20); the Avestan case anchored
# on Yt. 5.33–35, Yt. 14, Yt. 19 plus the Pahlavi *Bundahišn* with
# explicit hymn-allusive vs. continuous-narrative distinction; the
# Hittite case anchored on CTH 321 with the two co-equal scribal
# versions and the *kuenta… illuyanka-* pairing as the philological
# exhibit. The Tarḫunna-vs-Teshub discipline is correctly preserved
# per the Ch36 §III locked correction.
#
# §III extended cases are correctly arranged on a philological-
# evidence spectrum from strong (Norse Sigurd-Fáfnir per Watkins
# ch. 42; Old English *Beowulf* per Watkins Part V and Tolkien 1936)
# to weak (Slavic Perun-Veles; Armenian Vahagn). The Welsh dual-
# recension treatment of *Historia Brittonum* and *Lludd and
# Llefelys*, the Celtic Lugh-Balor as typological-and-dynastic-
# structural rather than philological reflex, and the Ossetic Batraz
# steel-body and death-narrative treatments are all consistent with
# Ch19 claims-approved framings.
#
# The §III Slavic Perun-Veles VARIANT block (line 252) preserves the
# locked Ch20 framing of the Ivanov-Toporov reconstruction with the
# four-name dissent-list (Jakobson, Lajoye, Moszyński, Kapović), and
# §IV develops the three-objection critique (toponym circularity,
# late-and-Christianised chronicles, folklore over-interpretation)
# in three substantive paragraphs (lines 315, 318, 321) that match
# Ch20 claims-approved (line 116) on the three-line attack structure.
#
# §V transmission-vs-inheritance distinction is correctly framed:
# Watkins's argument is inheritance from PIE poetic tradition, not
# contact-borrowing; the C6 (Ch39) chapter's transmission territory
# is explicitly reserved; the Hittite dual-context complication is
# correctly resolved on Watkins's reading (the *kuenta… illuyanka-*
# pairing as IE-inherited; the *purulli*-festival aetiology and the
# storm-god-vs-serpent narrative structure as plausibly transmission-
# influenced); the Greek dual-context complication is correctly
# treated in the opposite direction (philological cognancy weaker;
# transmission evidence stronger; C6 will adjudicate).
#
# §VI Mwindo control is correctly framed as control rather than
# parallel: Mwindo's killing of the dragon Kirimu is followed by
# punishment by the sky-god Nkuba, the cycle's resolution is moral-
# cosmic chastening rather than sovereignty-establishment, and the
# wider non-IE catalogue (Mesopotamian, Egyptian, Levantine,
# Mesoamerican, Andean) is correctly cited as the book-internal
# warrant for the bounded reading of Watkins's argument.
#
# Source-ID registry check (all 15 unique IDs verified present in
# sources.yaml registry):
#   bailey-ivanova-1998, beckman-1982-illuyanka, benveniste-renou-1934,
#   biebuyck-mateene-mwindo, faulkes-snorri, hoffner-1998,
#   jamison-brereton-2014, larrington-poetic-edda, ogden-2013,
#   russell-zoroastrianism-armenia, tolkien-1936-monsters,
#   watkins-1995, west-1966-theogony, west-1997, west-2007.
# All resolve. No invented or unresolved IDs.
#
# COMPARATIVE-HOOK chapter-number registry check (all 26 hooks
# resolved against toc.yaml): Ch5, Ch6, Ch11, Ch12, Ch13, Ch14,
# Ch15, Ch16, Ch18, Ch19, Ch20, Ch24, Ch25, Ch29, Ch33, Ch36, Ch37
# (back-links); C6=Ch39, C7=Ch40, C8=Ch41 (forward-links). All
# resolve.
#
# Marker integrity:
#   3 INFERENCE blocks (lines 121, 334, 410): all use standard
#     `basis: ... | risk: ...` schema; all have substantive content;
