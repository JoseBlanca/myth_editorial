findings:
  - id: FIND-01
    severity: MEDIUM
    category: citation-wrong | verse-number-error
    claim_anchor: lines 79–81 (§I third Vedic-reflex paragraph) and line 133 (§II Vedic-case paragraph)
    description: |
      Ch38 attributes the *áhann áhim* formula to "Rigveda 1.32.1, the
      opening line of the principal Indra-Vṛtra hymn" at three loci:
        line 79 body: "*áhann áhim* — 'he slew the serpent' — from
          Rigveda 1.32.1, the opening line of the principal Indra-Vṛtra
          hymn"
        line 80 EVIDENCE token: "loc=RV 1.32.1"
        line 133 body: "Rigveda 1.32… whose opening line — *áhann
          áhim*, 'he slew the serpent' — supplies the formula's most-
          cited lexical exhibit"
    issue: |
      Verse-number error. Ch14 claims-approved is explicit at line 143
      that the *áhann áhim* formula falls in **the second verse (RV
      1.32.2)**, not in 1.32.1. The opening verse (1.32.1) announces
      the theme — "I shall now proclaim the manly deeds of Indra,
      those that he, the wielder of the *vajra*, did first" — and the
      formula itself, with the principal verb of the killing (*áhan*)
      and its object (*áhim*), falls in the second verse. Ch14's
      EVIDENCE token at line 144 correctly cites "loc=RV 1.32.1-2".
      Ch38's "loc=RV 1.32.1" attribution is too narrow and the body-
      prose framing of the formula as "the opening line" is
      substantively inaccurate.
    evidence: |
      From chapters/14-indra-vrtra.claims.approved.adoc line 143:
        "The opening verse of RV 1.32 announces the theme in the
        first-line poetic formula that Watkins identifies as a Vedic
        instance of the inherited Indo-European HERO SLAY SERPENT
        line: 'I shall now proclaim the manly deeds of Indra, those
        that he, the wielder of the *vajra*, did first' — with the
        principal verb of the killing (*áhan*, 'he slew') and its
        object (*áhim*, 'the serpent') falling in the second verse,
        in the formula áhann áhim."
      From the same file line 144 (EVIDENCE token):
        "// EVIDENCE: source_id=jamison-brereton-2014 ; loc=RV 1.32.1-2"
      And from line 149 (RV 1.32.2 substantive content):
        "RV 1.32.2 develops the killing in a sequence of paratactic
        lines: he slew the serpent, he split the mountain..."
    recommended_fix: |
      Replace "Rigveda 1.32.1" / "the opening line" with "Rigveda
      1.32.1–2" / "the opening verses" or with "Rigveda 1.32.2" / "the
      second verse" (the latter being the locus of the formula
      proper). Verbatim-substitutable replacement options:
        line 79 body: "*áhann áhim* — 'he slew the serpent' — from
          Rigveda 1.32.2, the second verse of the principal Indra-
          Vṛtra hymn whose opening verse announces the theme of
