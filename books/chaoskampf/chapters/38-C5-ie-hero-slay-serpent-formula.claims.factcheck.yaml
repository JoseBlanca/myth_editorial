summary: |
  Ch38 is a tightly-disciplined comparative chapter that delivers
  Calvert Watkins's reconstructed HERO SLAY SERPENT formula as a
  philological-genealogical inheritance argument across the IE
  daughter languages, with explicit gradient between the §II direct
  philological cases (Vedic / Avestan / Hittite Tarḫunna-Illuyanka)
  and the §III extended typological cases (Norse Sigurd-Fáfnir,
  Beowulf, Lugh-Balor, Welsh Red-and-White, Batraz, Vahagn, Slavic
  Perun-Veles, Dobrynya), and with the Slavic-reconstruction problem
  developed in three substantive paragraphs of dissent presentation
  (Jakobson, Lajoye, Moszyński, Kapović) per the locked Ch20 framing.
  All 15 unique source_ids resolve in sources.yaml and all 26
  COMPARATIVE-HOOK chapter-references resolve in toc.yaml. The
  Tarḫunna-vs-Teshub discipline is correctly preserved per the Ch36
  §III locked correction (7 Tarḫunna occurrences in body prose; 4
  Teshub mentions confined to clarification/contrast contexts).
  Banned-term scoping is clean (no occurrences of bare "chaos",
  "chaos-figure", "chaos-monster", "chaos-serpent"). Marker integrity:
  3 INFERENCE blocks, 3 LACUNA blocks, 1 VARIANT block, and 1
  SPECULATION block — the SPECULATION's third pipe-field is correctly
  labelled "counterargument:" per the locked Ch34 precedent. Of the
  96 paragraph-claims with 142 EVIDENCE tokens, 92 route through
  Part-I anchor source_ids that are documented to support the
  specific claim. Two MEDIUM findings (FIND-01: §I/§II RV 1.32.1
  vs RV 1.32.2 verse-number error in the *áhann áhim* attestation,
  where Ch14 claims-approved is explicit that the formula falls in
  the second verse not the opening; FIND-03: §IV SPECULATION block's
  second pipe-field labelled "speculative_basis" rather than the
  Ch34-locked "basis"), two LOW findings (FIND-02: "girdle of all
  lands" translation drift relative to the in-house glossary's
  "band of all lands" rendering and to Ch18's attestation of the
  Old Norse forms only in English translation; FIND-04: uneven
  doubled-token coverage across §III for Beowulf draca/wyrm, Welsh,
  Vahagn, and Slavic Perun-Veles paragraphs), and three NOTE-level
  structural observations (NOTE-01: Burkert 1992 and Forsyth 1987
  named in footnote-prose without EVIDENCE tokens; NOTE-02: the
  Avestan *janat aiim* form is a reconstructed counterpart per the
  brief's framing rather than a directly-attested Avestan textual
  phrase, which the chapter handles correctly with hedges but could
  tighten; NOTE-03: positive observation that the chapter's
  compliance with the brief's special_instructions on Watkins
  boundedness, Slavic-reconstruction dissent, fragmentary-attestation
  care, and Mwindo control is sound). Most consequential single
  finding: FIND-01, the §I/§II RV 1.32.1-vs-1.32.2 verse-number
  error in the *áhann áhim* attestation, since the chapter's most
  philologically-load-bearing claim — the Vedic reflex anchor of
  Watkins's reconstructed formula — is subtly mislocated within the
  hymn it cites; readers tracing the reference back to Jamison &
  Brereton 2014 or to RV 1.32 itself would find the formula in the
  second verse rather than in the opening line. Per the verdict rule
  "PASS if zero HIGH and ≤3 MEDIUM; otherwise REVISE", the chapter
  has zero HIGH findings and accumulates 2 MEDIUM findings, which
  satisfies the ≤3-MEDIUM threshold. All findings are small and
  verbatim-substitutable, and none affect the chapter's central
  argument or its source-ID discipline; the chapter's IE-philological
  rigour, the strict in-scope / out-of-scope citation pairing on
  transmission claims, the correct framing of §II direct cases and
  §III extended typological cases, the Tarḫunna-vs-Teshub discipline,
  the Slavic-reconstruction dissent presentation, and the §VI
  Mwindo control are all sound. The two MEDIUM findings (FIND-01,
  FIND-03) and two LOW findings (FIND-02, FIND-04) should be applied
  at the post-human-normalize pass before the chapter advances to
  claims-approved; FIND-01 in particular — the §I/§II RV 1.32.1-vs-
  1.32.2 verse-number error on the *áhann áhim* attestation — is
  the most consequential and should be prioritised for the post-
  human-normalize fix list, since the chapter's most-cited
  philological exhibit is the kind of claim that the IE-philological-
  formula chapter cannot afford to leave subtly mis-located in its
  claims-approved form. Final verdict: PASS.
