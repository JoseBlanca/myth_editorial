findings:
  - id: FH-01
    kind: IMPLICIT-ADDITION
    severity: MEDIUM
    claim_or_passage: |
      "That genealogy places him, in the Sumerian theogonic family tree, as a
      sibling of Enlil's — his uncle, if the relationship is read literally,
      and certainly his peer at the level of cosmic seniority." (line 50)
    issue: >
      The approved claim states only that Asag's parentage is An and Ki
      (claim 13). The inference that this makes Asag a sibling-of-Enlil /
      Ninurta's uncle is not present in any approved claim and is not marked
      as an [INFERENCE] or [RECONSTRUCTION]. It is a factual genealogical
      assertion about the Sumerian pantheon's family tree that goes beyond the
      approved claims text.
    recommended_fix: >
      Either delete the genealogical aside ("That genealogy places him … cosmic
      seniority") or mark it as an inline [INFERENCE] with a basis note
      referencing the Sumerian theogony (An > Enlil lineage), and add a
      corresponding entry to the claims doc before publishing.

  - id: FH-02
    kind: IMPLICIT-ADDITION
    severity: MEDIUM
    claim_or_passage: |
      "The liver, in Mesopotamian divinatory culture, was the seat of vital
      force, the organ read by priest-diviners for omens." (line 123)
    issue: >
      Claim 32 states only that Šarur delivers the battle-directive to pierce
      Asag's liver and bring it to the E-kur. The cultural gloss on hepatoscopy
      ("seat of vital force," "organ read by priest-diviners for omens") is
      not in the approved claims and does not appear in the approved footnote.
      It is added cultural context without a claim anchor.
    recommended_fix: >
      Either remove the hepatoscopy parenthesis, or add a brief claim to the
      claims doc citing a standard Mesopotamian divination reference (e.g.,
      Koch-Westenholz or Starr), or demote to a footnote flagged as authorial
      commentary.

  - id: FH-03
    kind: IMPLICIT-ADDITION
    severity: MEDIUM
    claim_or_passage: |
      "Nippur itself was not the political capital of any Sumerian kingdom. It
      was a religious centre, the place where Enlil's priests certified the
      legitimacy of whichever human king currently ruled Sumer." (line 36)
    issue: >
      Claim 9 covers Enlil as chief god, lord of air and command, resident at
      Nippur's E-kur (sourced to Forsyth 1987 ch.1). The specific assertion
      that Nippur was a religious rather than political capital, and that
      Enlil's priests certified royal legitimacy, goes beyond what the approved
      claim states. It is plausibly derivable from Forsyth 1987 ch.1 but is
      not in the approved text.
    recommended_fix: >
      Add a sub-claim to claim 9 (or a new claim 9a) covering Nippur's
      legitimation function, citing Forsyth 1987 ch.1, to give this
      contextualisation a claims anchor.

  - id: FH-04
    kind: IMPLICIT-ADDITION
    severity: MEDIUM
    claim_or_passage: |
      "Nisaba is the Sumerian goddess of writing, accounting, and the
      grain-harvest — a surprisingly tight overlap, from a modern perspective,
      but one that makes sense in a culture where literacy was first and most
      durably a technology for recording barley-yields." (line 284)
    issue: >
      Claim 75 covers Ninurta's appointment of Nisaba as guardian of the
      granaries and of agricultural order. Claim 76 notes Nisaba is celebrated
      as judge, keeper of records, and divine administrator. The specific
      characterisation of Nisaba as "goddess of writing, accounting, and the
      grain-harvest" and the literacy-as-barley-technology gloss are not in
      the approved claims.
    recommended_fix: >
      Add a claim anchoring Nisaba's profile (writing + grain + administration
      overlap) to a standard Sumerological reference (e.g., Krebernik in RlA,
      or Forsyth 1987), or trim to what the claims support: "judge, keeper of
      records, divine administrator."

  - id: FH-05
    kind: IMPLICIT-ADDITION
    severity: MEDIUM
    claim_or_passage: |
      "This multi-functionality is part of why the poem remained useful to
      Mesopotamian scribal culture for two thousand years." (line 314)
    issue: >
      No approved claim quantifies the duration of Lugal-e's scribal utility
      as "two thousand years." The transmission claim (claim 5) says the poem
      was excerpted and bilingualised "well into the first millennium BCE" and
      claim 85 covers the bilingual school-tablet afterlife. "Two thousand
      years" is an authored inference not pinned to any approved claim or
      source.
    recommended_fix: >
      Replace with a phrasing anchored to the approved claims: "for more than
      a millennium" (Ur III originals c. 2000 BCE to first-millennium school
      use) or add a claim quantifying the span with a source.

  - id: FH-06
    kind: CLAIM-DISTORTED
    severity: MEDIUM
    claim_or_passage: |
      Claim 84: "The _Creation and Chaos_ volume edited by Scurlock and Beal
      reassesses Gunkel's thesis for the Mesopotamian material, with essays on
      the Ninurta corpus that relocate the combat-myth framework within the
      specific politics and cultic logic of Sumerian and Babylonian religion."
      Narrative (line 321): "The Ballentine-style critique — that these texts
      are about rival sovereignty, not formlessness — applies to _Lugal-e_ as
      cleanly as it does to _Enūma Eliš_. Asag is not an unstructured
      adversary."
    issue: >
      The approved claim attributes the relocation argument to Scurlock and
      Beal 2013, accurately. The narrative then imports Ballentine's specific
      "rival sovereignty" framing and explicitly applies it as an analytical
      verdict on Asag ("He is a rival sovereign … who commands an army,
      controls a territory, and sets up a competing order"). The approved
      claims do not include a claim asserting that the Ballentine critique
      applies cleanly to Lugal-e as an analytical conclusion; that is an
      authorial interpretive move beyond the claim. The claim covers what
      Scurlock-Beal 2013 argues; the narrative goes further by independently
      endorsing Ballentine's reading and applying it to the specific character
      of Asag.
    recommended_fix: >
      Either add an approved claim stating that Ballentine 2015's rival-
      sovereignty reading applies to Lugal-e with a source anchor, or rephrase
      the passage to attribute the analytical verdict to Scurlock-Beal 2013
      rather than asserting it as the chapter's own conclusion (e.g., "The
      Scurlock-Beal essays argue that Asag is better read as a rival
      sovereign…").
