# ═══════════════════════════════════════════════════════════════════════════════
# HIGH FINDINGS
# ═══════════════════════════════════════════════════════════════════════════════

findings:
  high:
    - id: HIGH-01
      severity: HIGH
      location: "Source overview, paragraph 13 (lines 51–53)"
      claim_text: >
        "The biblical translation cited verbatim in this chapter for the English text of
        Revelation 12 is the New Revised Standard Version (NRSV) as quoted in Yarbro
        Collins 1976 and in Aune 1997–98…"
      finding: >
        FACTUAL ERROR — ANACHRONISM. The NRSV was published in 1989. Yarbro Collins 1976
        was published thirteen years before the NRSV existed. The 1976 monograph would have
        used the RSV (Revised Standard Version, 1952) or possibly the NEB. The claim that
        the NRSV is 'quoted in Yarbro Collins 1976' is impossible and constitutes a
        contamination of the source attribution. The NRSV quotes in the claims paragraphs
        are accurate against the NRSV text itself, but cannot be attributed to Yarbro Collins
        1976 as their source. Aune 1997–98 provides his own translation against the NA28
        Greek; the WBC commentary does not use the NRSV as its standard either.
      required_fix: >
        Replace "the New Revised Standard Version (NRSV) as quoted in Yarbro Collins 1976"
        with "the New Revised Standard Version (NRSV), the standard contemporary scholarly
        English translation; Yarbro Collins 1976 used the RSV." The footnote should specify
        that Aune provides his own translation. NRSV quotes throughout the body are accurate
        as NRSV and need no change in content — only the source attribution needs correction.

# ═══════════════════════════════════════════════════════════════════════════════
# MEDIUM FINDINGS
# ═══════════════════════════════════════════════════════════════════════════════

  medium:
    - id: MEDIUM-01
      severity: MEDIUM
      location: "Yarbro Collins reading section, paragraph on textual sources (lines 184–185)"
      claim_text: >
        "The textual sources Yarbro Collins draws on for the Leto-Apollo-Python plot are
        principally the Latin mythographer Hyginus's Fabulae 140 (first or second century CE)
        and the Greek mythographer Apollodorus's Bibliotheca 1.4.1 (first or second century
        CE) — both Hellenistic-Roman compilations roughly contemporary with the composition
        of Revelation."
      finding: >
        CONTENT MISMATCH — MEDIUM. Hyginus Fabulae 140 is CONFIRMED as the correct locus
        for the Leto-pursued-by-Python story WITH the oracle-motive (Python pursues Leto
        because a prophecy foretells his death at her son's hands). However, Apollodorus
        Bibliotheca 1.4.1, as verified from Theoi Classical Texts Library and Perseus, does
        NOT contain Python pursuing pregnant Leto. In Apollodorus 1.4.1, it is HERA who
        pursues Leto over the whole earth; Python appears only after Apollo's birth, when
        Apollo arrives at Delphi and slays the oracle-guarding serpent. The claim that
        1.4.1 is a source for the "Leto-pursued-by-Python" plot-element specifically is
        inaccurate as a description of 1.4.1's content. Yarbro Collins may cite Apollodorus
        for the broader myth complex (birth on Delos, Apollo's eventual Python-slaying), but
        the specific pursuit-of-pregnant-Leto element is not in Apollodorus 1.4.1.
      required_fix: >
        Clarify the claims text to distinguish what each source supplies: "Hyginus Fabulae 140
        provides the pursuit-of-pregnant-Leto plot (with the oracle-motive); Apollodorus
        Bibliotheca 1.4.1 provides the subsequent Apollo-Python combat at Delphi." Do not
        cite Apollodorus 1.4.1 as a source for the pursuit narrative specifically.

    - id: MEDIUM-02
      severity: MEDIUM
      location: "Combat-myth function section, paragraphs on royal-legitimation (lines 298–308)"
      claim_text: >
        "The combat-myth function of Rev 12 is also royal-legitimation, but with an inverted
        structure: Christ's cosmic kingship is established not through the combat itself…
        [attributed to] Yarbro Collins 1976, ch. 4; Forsyth 1987, ch. 6."
      finding: >
        TERMINOLOGY NOT TRIANGULATED — MEDIUM. The structural observation that in Rev 12 the
        throne-ascent (v. 5) precedes the combat (vv. 7–9), inverting the standard
        combat-establishes-kingship pattern, is sound as a textual datum and consistent with
        the scholarly readings of Yarbro Collins and Forsyth. However, the specific phrase
        "inverted royal-legitimation structure" could not be triangulated as terminology used
        in those works via WebSearch. The description may be the agent's synthesis of
        scholarly observations rather than a direct terminology these authors use. This is
        an inference, and the [INFERENCE:] marker covers the methodological point but not
        the specific terminological claim at the function level. The claim should either
        confirm the term appears in the cited works or reframe as the agent's analytical
        synthesis of their observations.
      required_fix: >
        If "inverted royal-legitimation" is the agent's analytical framing (not a direct
        quote from Yarbro Collins or Forsyth), add a note: "The observation is this book's
        analytical synthesis of the structural argument made by Yarbro Collins 1976, ch. 4
        and Forsyth 1987, ch. 6." Alternatively, locate the exact page reference where one
        of those authors uses similar language.

