        No glossary violation identified; this is a flag for consistency in the chapter-draft
        stage to ensure all Greek and Hebrew technical terms maintain italicisation at first
        mention and thereafter per the glossary.
      required_fix: "No change required in the claims file. Note for chapter-draft stage."

    - id: LOW-02
      severity: LOW
      location: "Comparative hook on Egypt (line 365) and Aune eclectic reading section (line 89 of brief)"
      claim_text: >
        The brief (cross_cultural_parallels) attributes the Isis-Horus-Set Egyptian parallel
        to "yarbro-collins-1976" as a 'secondary source adduced by Yarbro Collins'. The claims
        file (lines 228–244) correctly attributes the Egyptian stream to Aune rather than to
        Yarbro Collins.
      finding: >
        BRIEF VS. CLAIMS DISCREPANCY — LOW. The brief's cross_cultural_parallels section
        attributes the Isis-Horus-Set parallel to Yarbro Collins, but the claims file correctly
        identifies it as Aune's distinctive contribution (the third stream of Aune's eclectic
        reading). This is a tension between brief and claims — the claims file appears to have
        the more accurate attribution. The brief's note may be an error at the brief-writing stage.
      required_fix: >
        The claims file attribution (Aune) is correct. The brief should note this discrepancy
        for human review. No change required in the claims file itself.

    - id: LOW-03
      severity: LOW
      location: "Rev 12:12 quote (line 283)"
      claim_text: >
        "Woe to the earth and the sea, for the devil has come down to you with great wrath"
        (Rev 12:12)
      finding: >
        MINOR QUOTE VARIANCE. The NRSV text of Rev 12:12b per the search results reads:
        "Woe to the earth and the sea, because the devil has gone down to you!" The claims
        quote substitutes "for" for "because" and "come down" for "gone down." These are
        minor translation-register differences that may reflect a translation variant (RSV
        vs NRSV). Given HIGH-01 already requires clarifying the translation used, this low
        finding should be resolved as part of that fix.
      required_fix: >
        When HIGH-01 is resolved, verify the exact NRSV wording for Rev 12:12b and adjust
        the quote accordingly. The NRSV reads "because the devil has gone down to you."

