findings:

  - id: FC-01
    severity: MEDIUM
    category: marker_issue
    location: >
      §"Encounter 2 — The fishing expedition with Hymir" — the VARIANT marker
      at the paragraph following line 258 (after the Gylfaginning 48 outcome
      paragraph).
    claim_text: >
      [VARIANT: primary=Hymiskviða sts. 23–24 / Gylfaginning 48 (Larrington 2014;
      Faulkes 1987), serpent escapes when Hymir cuts the line before the killing
      blow | alt=Húsdrápa fragments (Faulkes 1987 Skáldskaparmál citations), serpent
      appears to be beheaded by Thor before the line is cut | chosen: both variants
      are presented co-equally per the brief, with the Hymiskviða / Gylfaginning
      outcome treated as the dominant one in the surviving narrative tradition and
      the Húsdrápa beheading as the older skaldic alternate that Snorri preserves
      as a witness to a divergent reading | reason: per brief
      18-thor-jormungandr.yaml variants.classification: co-equal ...]
    problem: >
      The VARIANT marker's 'chosen' sub-field contains an internal contradiction
      that violates the brief's co-equal mandate. The field opens with "both
      variants are presented co-equally per the brief" — correctly invoking the
      brief's variants.classification: co-equal — but then immediately qualifies
      this with "the Hymiskviða / Gylfaginning outcome treated as the dominant one
      in the surviving narrative tradition." Calling one variant "dominant" is
      incompatible with co-equal treatment. The brief is unambiguous: because no
      single source has all three encounters fully narrated, the co-equal
      classification means neither the line-cut nor the Húsdrápa outcome is
      privileged over the other. By labelling the Hymiskviða / Gylfaginning
      outcome "dominant," the writer drifts toward the implicit hierarchy that
      the brief explicitly excludes. The body prose around this marker is
      acceptable (it presents both outcomes without privileging either), but the
      VARIANT 'chosen' field will need to be corrected before the chapter-draft
      stage to avoid propagating the implicit hierarchy into the chapter-draft
      instructions.
    evidence: >
      Brief 18-thor-jormungandr.yaml, variants.classification: co-equal; variants.
      why_prevalent: "No single version has all three encounters fully narrated."
      The brief lists both the Hymiskviða line-cut and the Húsdrápa beheading as
      alternates under variants.alternates, with neither marked as the
      prevalent_version outcome — the prevalent_version.source is Faulkes-snorri
      only in the structural sense (Snorri provides the fullest narrative), not
      in the sense that the line-cut is the "true" outcome.
    recommended_fix: >
      In the VARIANT 'chosen' sub-field, replace "both variants are presented
      co-equally per the brief, with the Hymiskviða / Gylfaginning outcome treated
      as the dominant one in the surviving narrative tradition" with "both variants
      are presented co-equally per the brief; neither the Hymiskviða / Gylfaginning
      line-cut outcome nor the Húsdrápa apparent-killing outcome is privileged as
      the canonical version, and the chapter presents both as live witnesses from
      different textual strata." Remove the "dominant one" qualification entirely.

  - id: FC-02
    severity: MEDIUM
    category: unverified
    location: >
      §"Source overview" — the claim beginning "The chapter's Eddic primary text
      for the eschatological combat is Völuspá... in which the Thor-and-Jörmungandr
      Ragnarök combat is named and compressed in stanzas 55 and 56 of the Larrington
      2014 edition."
    claim_text: >
      The chapter's Eddic primary text for the eschatological combat is Völuspá
      ("The Seeress's Prophecy"), the opening poem of the Codex Regius and the
      principal Eddic source for the Norse cosmogony and eschatology, in which the
      Thor-and-Jörmungandr Ragnarök combat is named and compressed in stanzas 55
      and 56 of the Larrington 2014 edition.
    problem: >
      The claim states the Thor-and-Jörmungandr combat occupies "stanzas 55 and
      56" of the Larrington 2014 edition, but the footnote attached to this very
      claim contradicts it by saying "specifically to stanza 56 on the Thor-and-
      Jörmungandr combat." Every other citation in the claims document uses
      Völuspá st. 56 alone as the Thor-stanza. In standard Eddic stanza numbering
      (Neckel-Kuhn basis), Völuspá st. 55 describes the Fenrir-Óðinn aspect and
      the world-tree's trembling; st. 56 is the Thor-and-serpent stanza. The
      Larrington 2014 numbering may differ by one or two stanzas from the Neckel-
      Kuhn in the Ragnarök sequence, but the internal inconsistency within the
      claims document itself — "stanzas 55 and 56" in the body vs. "stanza 56" in
      the footnote — is a precision error that needs correction before the
      chapter-draft stage. The brief cites only "Völuspá 56" as the anchor.
      Without direct access to Larrington 2014, the exact stanza split cannot be
      confirmed, but the internal contradiction is unambiguous.
    evidence: >
      Brief 18-thor-jormungandr.yaml primary_source loc: "Völuspá 56 (Ragnarök
      combat)". The claims document's own footnote at this claim: "specifically to
      stanza 56 on the Thor-and-Jörmungandr combat." All subsequent citations in
      the document use "Völuspá st. 56" consistently. The body claim's "stanzas
      55 and 56" is therefore either an inaccuracy (if the Thor-stanza is only 56)
      or an imprecision (if both stanzas contribute to the Thor-and-serpent
      combat-passage in the Larrington edition). Either way, it conflicts with the
      brief and with the document's own footnote.
    recommended_fix: >
      Before the chapter-draft stage, verify in Larrington 2014 whether the
      Thor-and-Jörmungandr combat passage occupies one stanza (56 only) or spans
      two stanzas (55–56). If only st. 56 (as the brief and the document's own
      footnote suggest), correct the body claim to "stanza 56 of the Larrington
      2014 edition." If two stanzas, update the footnote and all subsequent
      citations from "st. 56" to "sts. 55–56" for consistency. Do not let the
      body-claim and the citation apparatus disagree on the stanza count.

  - id: FC-03
    severity: MEDIUM
    category: citation_imprecision
    location: >
      §"Source overview" — the claim beginning "The chapter's Eddic primary text
      for Thor's fishing expedition is Hymiskviða... a thirty-nine-stanza Eddic
      poem in fornyrðislag metre..."
    claim_text: >
      The chapter's Eddic primary text for Thor's fishing expedition is Hymiskviða
      ("The Lay of Hymir"), a thirty-nine-stanza Eddic poem in fornyrðislag metre
      that narrates Thor's journey to the giant Hymir's hall to fetch a brewing-
      cauldron and his rowing-out with Hymir to fish for the world-encircling serpent.
    problem: >
      The standard scholarly stanza count for Hymiskviða is 38 complete stanzas
      in the Neckel-Kuhn critical edition (used as the standard philological basis
      for most modern translations including Larrington 2014), with the final
      stanza sometimes counted as incomplete, giving either 38 or 38+ stanzas.
      Some counts include one partial or fragmentary stanza to reach 39.
      Without direct access to Larrington 2014's headnote, the exact count in
      that edition cannot be confirmed. The claim "thirty-nine stanzas" is either
      correct (if Larrington counts 39 by including the partial stanza) or one
      off (if Larrington gives 38). The citation apparatus (footnote) correctly
      defers to Larrington 2014's headnote, but the body-claim presents the
      stanza count as a fact rather than as a headnote-reported fact, which risks
      the error propagating into the chapter draft as a stated figure.
    evidence: >
      Standard Neckel-Kuhn Edda: Hymiskviða = 38 complete stanzas (plus one
      half-stanza sometimes counted separately). This is the standard reference
      count. Larrington 2014 may differ slightly in presentation. The brief does
      not cite a stanza count. The claim cannot be verified without the printed
      edition.
    recommended_fix: >
      Before the chapter-draft stage, verify Larrington 2014's headnote stanza
      count for Hymiskviða. If the headnote says 38 or a different number, correct
      the body claim. If uncertain, rephrase to "a poem of approximately forty
      stanzas" or "a poem of thirty-eight to thirty-nine stanzas, depending on
      the edition" rather than the unqualified "thirty-nine stanzas." Alternatively,
      omit the precise stanza count from the claims skeleton and let the chapter-draft
      verify it against the printed text.

  - id: FC-04
    severity: LOW
    category: glossary_precision
    location: >
      Throughout the body prose — all occurrences of "Miðgarðr" in body-prose
      claims (rather than in philological footnotes or Old Norse parentheticals).
      Instances at: the Thor-introduction paragraph, the Miðgarðsormr-name
      paragraph, the Norse-cosmography paragraph, the Óðinn-dispatch paragraph,
      and other body paragraphs throughout.
    claim_text: >
      [Body prose throughout uses "Miðgarðr" as the primary form; e.g., "the
      defence of Miðgarðr — the world of humans — against the giants..."]
    problem: >
      The locked glossary.yaml entry for Miðgarðr specifies: "chosen: Midgard
      (body prose); Miðgarðr at first mention and in philological notes." The
      claims document consistently uses "Miðgarðr" in body prose throughout,
      including in paragraphs that are not philological footnotes and not
      first-mention contexts. The glossary requires "Midgard" (without the
      Old Norse diacritics) in running body prose, with "Miðgarðr" reserved
      for first mention and philological contexts. This is a LOW finding because
      the claims stage is not final body prose — the chapter-draft stage will
      render the final form — but the claims skeleton's pervasive use of the
      scholarly diacritical form may propagate into the chapter draft if the
      claims prose is used as a template.
    evidence: >
      glossary.yaml entry for Miðgarðr: "chosen: Midgard (body prose); Miðgarðr
      at first mention and in philological notes." The claims document uses
      "Miðgarðr" in running body-prose paragraphs throughout (e.g., "the defence
      of Miðgarðr"; "Jörmungandr was thrown into the ocean encircling Miðgarðr";
      "Miðgarðr (the world of humans) at the middle level"). The first-mention
      gloss is correctly supplied at the Jörmungandr paragraph ("the Midgard
      Serpent"), but the body-prose form is consistently Miðgarðr rather than
      Midgard.
    recommended_fix: >
      At the chapter-draft stage, apply the glossary's Midgard/Miðgarðr
      distinction: use "Midgard" in running body prose and "Miðgarðr" only at
      first mention (with gloss) and in philological footnotes or parentheticals.
      The claims skeleton's use of "Miðgarðr" throughout is acceptable for
      claims purposes but should not carry over as-is into the chapter draft.
      This does not require a revision to the claims file itself — it is a
      reminder for the chapter-draft stage.

  - id: FC-05
    severity: NOTE
    category: stage_orchestration
    location: >
      §"Source overview" — the nine-paces attribution split between Völuspá st. 56
      and Gylfaginning 51. Both the Völuspá claim (paragraph beginning "Völuspá
      stanza 56 compresses the Ragnarök...") and the Gylfaginning 51 claim
      (paragraph beginning "In Gylfaginning 51, Thor — having killed the
      serpent — staggers nine paces...") attribute the nine-paces detail.
    claim_text: >
      [Völuspá st. 56 paragraph] ...then records that Thor — having killed the
      serpent — staggers nine paces from the kill-site before falling dead from
      the serpent's venom.
      [Gylfaginning 51 paragraph] In Gylfaginning 51, Thor — having killed the
      serpent — staggers nine paces from the kill-site before falling dead from
      the serpent's venom...
    problem: >
      The claims document correctly attributes the nine-paces detail to both
      Völuspá st. 56 (Larrington 2014) and Gylfaginning ch. 51 (Faulkes 1987).
      In trained knowledge of the standard texts, Völuspá st. 56 does include
      the nine-steps detail ("nine steps goes Fjörgyn's son" or equivalent in
      Larrington's translation), and Gylfaginning 51 expands this into a prose
      narrative. The writer's double-attribution is therefore accurate and not
      an error. This is a NOTE to confirm that the task instruction's statement
      "The 'nine paces' detail is from Gylfaginning 51" was not intended to
      exclude Völuspá 56 as a co-source, but rather to ensure that the detail
      was specifically anchored to Gylfaginning 51 as the more narratively
      explicit source. The double-attribution in the claims document is the
      correct and fuller treatment.
    evidence: >
      Standard Völuspá st. 56 (Larrington 2014 / Neckel-Kuhn numbering): the
      stanza includes the detail that Thor goes nine steps before falling.
      Gylfaginning ch. 51 (Faulkes 1987): the prose expansion of this detail
      names the nine paces explicitly. Brief 18-thor-jormungandr.yaml variants
      section: "Gylfaginning 51 (Ragnarök): Thor kills Jörmungandr but staggers
      nine paces and dies of the serpent's venom." The brief cites Gylfaginning
      51 for this detail (not Völuspá 56 separately), but this reflects the brief's
      focus on the prose-narrative source, not an exclusion of Völuspá 56 as
      a co-source. Both attributions in the claims document are valid.
    recommended_fix: >
      No fix required. The double-attribution is correct. If anything, the
      chapter-draft might clarify: "the nine-pace stagger is named in Völuspá st.
      56 and expanded in Snorri's Gylfaginning 51" to make the source-layering
      explicit. But this is a drafting refinement, not a factual correction.

