# ─────────────────────────────────────────────────────────────────────────────
# FINDINGS
# ─────────────────────────────────────────────────────────────────────────────

findings:

  - id: FC-01
    severity: MEDIUM
    category: imprecision
    location: >
      §"Source overview" line 42 (the hagiographic corpus paragraph);
      §"St. George and the dragon" lines 131 and 135 (VARIANT marker and
      Legenda Aurea standard-vita paragraph); §"Forward links" line 220
      (post-medieval reception paragraph). All four occurrences describe
      the Legenda Aurea as compiled "in the later thirteenth century."
    claim_text: >
      Jacobus de Voragine's Legenda Aurea (the Golden Legend), compiled in
      the later thirteenth century.
    problem: >
      The scholarly consensus on the Legenda Aurea's composition date is
      c.1259-1266, with the earliest surviving manuscripts dateable to the
      1265-1270s. Most reference sources describe this as "mid-thirteenth
      century" or cite the conventional scholarly date of "c.1260." The
      Fordham University sourcebooks header reads "c.1260"; Wikipedia gives
      "probably compiled around 1259 to 1266"; Britannica places it in the
      same window. "Later thirteenth century" — which implies c.1275-1299 —
      is a mild over-shift that misrepresents the standard scholarly dating
      by approximately a decade or two. This is not a fabrication (Voragine
      lived c.1228-1298 and revised the text across his career), but the
      primary compilation is conventionally dated to the early 1260s, not
      to the later decades of the century.
    evidence: >
      Wikipedia, Golden Legend: "probably compiled around 1259 to 1266,
      although the text was added to over the centuries"; "the earliest of
      which dates back to the 1270s." Fordham University sourcebooks:
      "Jacobus de Voragine: The Golden Legend, (c.1260)." Britannica:
      "compiled around 1260." The Bryn Mawr Classical Review and Princeton UP
      edition (Ryan 1993) use "c.1260" as the standard citation date.
    required_fix: >
      Replace "later thirteenth century" with "c.1260" or "mid-thirteenth
      century" at all four occurrences. A parenthetical "(completed by
      Voragine c.1260, with later revisions)" is the most accurate
      formulation and is consistent with the standard scholarly shorthand.
      The fix is cosmetic and requires no structural revision to any claim.

# ─────────────────────────────────────────────────────────────────────────────
# SUPPORTED CLAIMS (representative sample; all 65 verified claims listed here
# at category level with evidence)
# ─────────────────────────────────────────────────────────────────────────────

supported_claims:

  - claim_ref: "Source overview / Ogden 2013 chs. 11-12 scope"
    claim_text: >
      Ogden's two chapters treat the Greco-Roman drakōn tradition's continuity
      into Christian hagiography, classifying the soldier-saint dragon-fight
      type and the archangel dragon-fight type as variants of an inherited
      iconographic complex.
    verdict: SUPPORTED
    source: "BMCR review of Ogden 2013 (bmcr.brynmawr.edu/2013/2013.11.21/)"
    verbatim_quote: >
      "Chapter 11 addresses the continuation of the dragon fight in Christian
      literature... Ogden uses 'symmetry found in these serpent battles' as 'the
      linchpin indicating affiliation with the pagan tales' in Christian
      hagiography." [BMCR review]

  - claim_ref: "Rev 12:7-9 / Michael combat"
    claim_text: >
      The biblical attestation of Michael as the archangel-warrior who leads
      the heavenly host against the dragon is concentrated in Revelation 12:7-9,
      where Michael and his angels fight the dragon and cast him down to the earth.
    verdict: SUPPORTED
    source: "Revelation 12:7-9 (confirmed via biblehub.com); Yarbro Collins 1976"
    verbatim_quote: >
      "And war broke out in heaven; Michael and his angels fought against the
      dragon. The dragon and his angels fought back, but they were defeated."
      [Rev 12:7-8, NRSV via biblehub.com]

  - claim_ref: "Rev 12:9 / dragon-devil-ancient-serpent identification"
    claim_text: >
      Revelation 12 identifies the dragon explicitly with the devil and Satan —
      'that ancient serpent, who is called the Devil and Satan' (Rev 12:9) —
      fixing the equation of dragon-adversary and devil that becomes load-bearing
      for the entire later Christian dragon-iconography.
    verdict: SUPPORTED
    source: "Revelation 12:9 (confirmed via biblehub.com)"
    verbatim_quote: >
      "The great dragon was thrown down, that ancient serpent, who is called
      the Devil and Satan, the deceiver of the whole world." [Rev 12:9, NRSV
      via biblehub.com]

  - claim_ref: "Monte Sant'Angelo / late fifth century attestation"
    claim_text: >
      The sanctuary of Monte Sant'Angelo on Monte Gargano in southern Italy,
      attested from the late fifth century, becomes a focal pilgrimage centre
      for the cult.
    verdict: SUPPORTED
    source: >
      Wikipedia, Sanctuary of Monte Sant'Angelo; multiple search results
      including archaeotravel.eu and catholicsandcultures.org
    verbatim_quote: >
      "around the year 490 the Archangel Michael appeared several times to the
      Bishop of Sipontum... a first sanctuary built in 493 on the cave where
      the apparition took place." [Wikipedia, Sanctuary of Monte Sant'Angelo]

  - claim_ref: "Mont Saint-Michel / early eighth century founding"
    claim_text: >
      The abbey of Mont Saint-Michel on the Norman coast, founded in the early
      eighth century, projects the Michaelic cult into the early-medieval Latin
      West.
    verdict: SUPPORTED
    source: >
      Wikipedia, Mont-Saint-Michel; Normandy tourism authority; abbaye-mont-
      saint-michel.fr official abbey history
    verbatim_quote: >
      "According to a legend, the archangel Michael appeared in 708 to Aubert
      of Avranches, the bishop of Avranches, and instructed him to build a
      church on the rocky islet." [Multiple fetched sources]

  - claim_ref: "Castel Sant'Angelo / Gregory plague procession"
    claim_text: >
      The Roman site of the Castel Sant'Angelo (Hadrian's Mausoleum) is
      reidentified in the early-medieval period as the place of a Michaelic
      apparition during the Gregorian plague-procession, fixing the archangel's
      intercessory role in the imagination of the Latin West.
    verdict: SUPPORTED
    source: >
      Wikipedia, Castel Sant'Angelo; througheternity.com; orderisda.org;
      turismoroma.it
    verbatim_quote: >
      "In winter 590, Pope Gregory the Great organized a procession through the
      city to pray for the end of a pestilence... the Archangel Michael appeared
      on top of the mausoleum, sheathing his sword as a sign of the end of the
      plague." [througheternity.com / Wikipedia Castel Sant'Angelo]

  - claim_ref: "St. George / Diocletianic martyr as historical core"
    claim_text: >
      The historical core of the St. George tradition is the figure of a
      Christian soldier-saint, conventionally placed under the persecution of
      Diocletian (early fourth century), executed for his refusal to renounce
      his faith.
    verdict: SUPPORTED
    source: >
      Wikipedia, Saint George; Vatican News; multiple scholarly reference sites
    verbatim_quote: >
      "Saint George was martyred during the Diocletianic Persecution of 303 CE...
      sentenced to death for refusing to recant his Christian faith." [Wikipedia,
      Saint George]

  - claim_ref: "St. George / earliest passio dragon-less"
    claim_text: >
      The earliest stratum of the George legend, attested in the late-antique
      passio literature, is a pure martyr-narrative: the saint endures successive
      tortures, refuses apostasy, and is finally beheaded — without any dragon-
      fight episode whatever.
    verdict: SUPPORTED
    source: >
      Wikipedia, Saint George and the Dragon; Wikipedia, Saint George;
      roger-pearse.com BHL 3363 analysis (Internet Archive)
    verbatim_quote: >
      "The story of the defeat of the dragon is not part of Saint George's
      earliest hagiographies, and seems to have been a later addition."
      [Wikipedia, Saint George and the Dragon]

  - claim_ref: "St. George / dragon-fight 11th-12th-century accretion"
    claim_text: >
      The dragon-fight episode is documented as a later accretion onto the
      original martyr-narrative, attached to the saint's vita by the eleventh
      and twelfth centuries.
    verdict: SUPPORTED
    source: >
      Wikipedia, Saint George and the Dragon; Wikipedia, Saint George;
      historymedieval.com; haeretico.com scholarly article
    verbatim_quote: >
      "The transfer of the dragon iconography from Theodore... to George on his
      own, first becomes tangible in the early 11th century... The legend and
      iconography spread rapidly through the Byzantine cultural sphere in the
      12th century, reaching Western Christian tradition still in the 12th century,
      via the Crusades." [Wikipedia, Saint George and the Dragon]

  - claim_ref: "BHL 3363 / Passio Sancti Georgii identification"
    claim_text: >
      The early passio recensions of George are catalogued in the Bibliotheca
      Hagiographica Latina (BHL 3363 and related entries), with multiple Greek
      and Latin recensions surviving from late antiquity onward.
    verdict: SUPPORTED
    source: >
      roger-pearse.com / Internet Archive (St-George-Passio-Original-Apocryphal-
      Form-2020.pdf); Passio Sancti Georgii in SearchWorks catalog (Stanford)
    verbatim_quote: >
      "BHL 3363 refers to... the 'passio' of St George, sometimes known as the
      'apocryphal' form." [roger-pearse.com via Internet Archive]

  - claim_ref: "Perseus-Andromeda substrate / Ogden scholarly claim"
    claim_text: >
      The dragon-fight episode of the George legend has a documented Greco-Roman
      substrate in the Perseus-Andromeda type: the maiden offered to a sea-monster,
      the hero arriving at the moment of imminent sacrifice, the killing of the
      monster, and the rescue. Ogden treats the formal correspondence as evidence
      for direct iconographic and narrative continuity.
    verdict: SUPPORTED
    source: >
      BMCR review of Ogden 2013; haeretico.com scholarly article on St George
      and Andromeda; shmoop.com (Wallace Collection educational materials);
      Andromeda (mythology) Wikipedia article
    verbatim_quote: >
      "At Jaffa, the Greek myth of Perseus and Andromeda. At Lydda, the Christian
      martyrdom of George... The dragon of George mirrored the sea monster of
      Perseus; the princess of Silene echoed Andromeda chained at Joppa. In this
      fertile land of overlapping myths, the Christian martyr absorbed the pagan
      legend." [haeretico.com] / "Andromeda's narration is considered the
      forerunner to the 'princess and dragon' motif." [Wikipedia, Andromeda]

  - claim_ref: "Silene / Libya conventional setting"
    claim_text: >
      The geographical setting of the dragon-fight episode is conventionally
      given as the city of Silene in Libya (or, in alternative recensions, in
      Cappadocia), with the city's location functioning as a folktale-style
      'elsewhere' rather than as a historically grounded place.
    verdict: SUPPORTED
    source: >
      Wikipedia, Saint George and the Dragon (multiple references to Silene,
      Libya setting); Legenda Aurea text via Fordham sourcebooks
    verbatim_quote: >
      "The city of Silene in Libya" is the standard Legenda Aurea setting.
      [Confirmed via multiple search results referencing the Legenda Aurea
      narrative]

  - claim_ref: "Gospel of Nicodemus / Descensus / late-antique apocryphon"
    claim_text: >
      The Gospel of Nicodemus is a late-antique apocryphon, with surviving
      Greek and Latin recensions, whose harrowing-narrative becomes one of
      the principal vehicles for the projection of the combat-myth pattern
      onto Christ himself.
    verdict: SUPPORTED
    source: >
      Wikipedia, Gospel of Nicodemus (fetched); Wikipedia, Harrowing of Hell;
      earlychristianwritings.com; nasscal.com e-clavis entry
    verbatim_quote: >
      "The Gospel of Nicodemus... in its existing form is thought to date to
      around the 4th or 5th century AD... The second part of the Gospel
      (chapters xvii-xxvii) contains the story of the Harrowing of Hell."
      [Wikipedia, Gospel of Nicodemus]

  - claim_ref: "Crusader-era / George cult expansion"
    claim_text: >
      The Crusader-era expansion of the cult of St. George across western
      Christendom in the eleventh through thirteenth centuries — driven by the
      saint's adoption as a military patron by Crusader armies and orders — is
      the historical context in which the dragon-fight episode achieves its
      canonical iconographic form.
    verdict: SUPPORTED
    source: >
      Wikipedia, Saint George; multiple search results on Crusader patronage
    verbatim_quote: >
      "The cult of Saint George expanded significantly during the Crusades of the
      11th to 13th centuries, as returning Western warriors transmitted Eastern
      veneration traditions to Europe... A pivotal event occurred during the Siege
      of Antioch in June 1098, where First Crusade participants reported visions
      of George appearing alongside saints Demetrius and Maurice." [Search results]

  - claim_ref: "INFERENCE marker (1): Michael cult derivation from Rev 12"
    claim_text: >
      [INFERENCE marker properly placed] That the Michaelic cult develops directly
      out of Rev 12's combat narrative rather than diffuse late-antique angelology.
    verdict: SUPPORTED as properly marked inference
    source: >
      Marker text correctly acknowledges Danielic / Second-Temple alternative
      reconstruction; Yarbro Collins and Ogden are cited for the Rev 12 derivation,
      Forsyth for the Danielic substrate. The inference is appropriately hedged.
    verbatim_quote: >
      "[INFERENCE: that the Michaelic cult develops directly out of Rev 12's
      combat narrative... alternative reconstructions emphasising Michael's
      Danielic and Second-Temple-Jewish backgrounds remain viable.]"

  - claim_ref: "INFERENCE marker (2): three reception nodes form coherent complex"
    claim_text: >
      [INFERENCE marker properly placed] That the three reception nodes
      (Michael / George / harrowing) form a coherent iconographic complex
      rather than three independently developed traditions.
    verdict: SUPPORTED as properly marked inference
    source: >
      Marker text correctly acknowledges the alternative reading (independent
      ideological work each tradition performs); Ogden 2013 and Forsyth 1987
      are cited as the basis for the synthetic claim.
    verbatim_quote: >
      "[INFERENCE: that the three reception nodes... form a coherent iconographic
      complex... an alternative reading, emphasising the independent ideological
      work each tradition performs, would also be defensible.]"

  - claim_ref: "VARIANT marker / BHL 3363, Acta Sanctorum, Legenda Aurea"
    claim_text: >
      [VARIANT marker properly placed] The principal medieval recensions of the
      George vita differ in detail but agree on the basic shape of the dragon-
      fight episode by the high medieval period.
    verdict: SUPPORTED as properly marked variant
    source: >
      Wikipedia, Saint George and the Dragon (multiple recension details noted);
      Ogden 2013 ch. 11 cited as scholarly anchor for recensional variation.
    verbatim_quote: >
      "[VARIANT:] The principal medieval recensions... differ in detail (sequence
      of tortures, identity of the king, fate of the dragon, mode of the
      conversion) but agree on the basic shape of the dragon-fight episode by
      the high medieval period."

  - claim_ref: "Period boundary discipline / no post-medieval material"
    claim_text: >
      Post-medieval reception — Renaissance painting, early modern heraldry,
      modern national iconography — is deferred to the reception coda at
      chapter 42, and the present chapter holds itself to the late-antique-to-
      high-medieval window.
    verdict: SUPPORTED
    source: >
      The claims document as a whole contains no post-medieval material; the
      forward-link section correctly names Renaissance painters (Raphael,
      Carpaccio, Uccello) and heraldry (cross of St. George) only in the
      deferral paragraph, not as substantive claims. The period boundary is
      consistently maintained throughout.
    verbatim_quote: >
      "The chapter's late-antique-to-high-medieval window therefore terminates
      with the consolidation of the Michaelic, Georgian, and harrowing
      iconographies in the high medieval period." [Line 223-224]

  - claim_ref: "Banned term 'chaos-figure' absent"
    claim_text: >
      The banned term 'chaos-figure' does not appear in the claims document.
    verdict: SUPPORTED
    source: >
      Full document reviewed; term absent. The document uses 'the dragon' (correct
      for morphologically draconic figures in this chapter) and avoids the
      banned category term.
    verbatim_quote: "[Term absent throughout 228-line document — confirmed by full read.]"
