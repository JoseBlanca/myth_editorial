    line 310.

    Check 3 (Fidelity): All 130 claim-to-narrative mappings preserve meaning.
    Levels of certainty are maintained: LACUNA blocks are not softened; INFERENCE
    block preserves its "risk" qualifier; VARIANT blocks present-both without
    adjudicating. The "ancient Hattusa" gloss at line 6 matches the claims verbatim
    ("the site of ancient Hattusa") — it was in the claims, not added by the
    drafter.

    Glossary: Teshub is the dominant form throughout; Tarḫunna appears at line 33
    only in a metalinguistic note explaining the name-pair and explicitly noting
    that "Teshub is used throughout" — correct per glossary policy. Šauška and
    Ishtar are paired at first mention (lines 82 and 223). Boğazköy is spelled
    correctly with cedilla throughout. Šeri and Ḫurri (with Tilla variant noted)
    are handled correctly. "Chaos-figure" and "chaos-monster" (both banned) do not
    appear. No forbidden-word hits of any kind.

    Footnote integrity: footnote texts were extracted from both documents and
    diffed — no differences found. All 130 footnotes match verbatim.

    I am confident this is a full audit, not a pattern-match. Every claim was
    located to a specific passage.

