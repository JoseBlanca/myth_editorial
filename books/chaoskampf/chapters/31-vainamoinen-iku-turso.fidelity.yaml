  - kind: BRIDGE-PARAGRAPH
    severity: NOTE
    claim_number: ~
    narrative_location: "section 1 (bridge before LACUNA marker; bridge before VARIANT marker; chapter-roadmap bridge after source overview); section 4 (bridge before INFERENCE marker); section 7 (bridge before APPROPRIATION-FLAG marker)"
    issue: >
      Five unfootnoted bridge paragraphs not present in the claims document,
      at narrative bridge points introducing the LACUNA, VARIANT, INFERENCE,
      and APPROPRIATION-FLAG markers and a one-paragraph chapter-roadmap
      bridge after the source-overview section.
    detail: >
      Bridge before LACUNA (section 1): "That shape of evidence — no
      pre-modern indigenous-script attestation, a 19th-century recording
      corpus that doubles as a 19th-century editorial project, a still-
      living but reduced continuing tradition — is methodologically load-
      bearing for the whole chapter, and the claims document marks it
      explicitly:"
      Bridge before VARIANT (section 1, end): "Because the two layers —
      older rune-tradition material and Lönnrot's *Kalevala* — are taken
      as co-equal witnesses presented in sequence rather than collapsed,
      the variant-handling for the chapter is flagged here in full:"
      Chapter-roadmap bridge (after source overview): "What follows works
      through the two layers in turn before stepping back. The Finnic
      context comes first — the geographical area of the rune-tradition,
      its metrical form, and its performance practice. Then Väinämöinen as
      shaman-sage, then the older rune-tradition material on Iku-Turso,
      then Lönnrot's *Kalevala* synthesis, then the methodological discipline
      that holds the two layers apart, and finally the chapter's typology
      and forward-links."
      Bridge before INFERENCE (section 4): "The reading on which the
      chapter places its weight — the encounter as transformed shamanic
      binding — is itself a synthesis drawn from the brief and from
      Siikala's reading of the rune corpus, and is flagged as such here:"
      Bridge before APPROPRIATION-FLAG (section 7): "That typological
      placement is a comparativist overlay that the area-specialist
      tradition for the Finnic material does not itself adopt, and the
      chapter flags the resulting appropriation issue under the marker
      the project reserves for cases of this kind:"
      All five introduce no factual assertions beyond what the claims and
      the marker bodies establish; their content is structural-navigation
      prose. Same pattern as Ch24 ISSUE-01 / Ch26 ISSUE-01 / Ch27 / Ch28 /
      Ch30 ISSUE-01.
    recommended_fix: >
      No action required. NOTE severity only. The five bridges are
      authorised by the precedent-set Ch24/Ch26/Ch27/Ch28/Ch30 marker-
      introduction-bridge pattern.

