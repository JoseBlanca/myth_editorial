  honesty_self_check:
    q1_skipped_claims: >
      No claims skipped. All 95 claims were mapped individually to narrative
      locations in section order. Footnote counts were verified programmatically
      (95 on each side — exact match). EVIDENCE token counts were verified
      programmatically (95 on each side — exact match, and all EVIDENCE tags
