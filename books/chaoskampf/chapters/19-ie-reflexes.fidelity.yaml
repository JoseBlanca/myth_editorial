      diff returning empty output). All 7 INFERENCE markers, 1 LACUNA marker,
      and 2 VARIANT markers were compared to the claims document; all 10 are
      verbatim identical, confirmed by diff returning empty output. All 7
      COMPARATIVE-HOOK lines were verified verbatim identical by diff.
    q2_additions_check: >
      Every narrative paragraph was checked against the claims document. One
      unfootnoted introductory paragraph at narrative lines 3–4 (before the
      "=== Source overview" header) was evaluated: "Six post-Vedic, post-Iranian,
      post-Anatolian Indo-European traditions preserve the dragon-combat at varying
      philological depths. The Eddic poem *Fáfnismál* gives the diction of
      Sigurd's killing-stroke in a verbal form that Calvert Watkins reads as a
      direct reflex of the reconstructed Indo-European poetic formula HERO SLAY
      SERPENT. The Old English *Beowulf* gives the dragon-episode that closes the
      poem with the aged king's death-stroke. The Middle Irish *Cath Maige Tuired*
      gives Lugh's sling-stone killing of Balor. The Welsh tradition gives the
      Red-and-White Dragon combat in two recensions of distinct framing. The
      Ossetic Nart corpus gives Batraz's combats. And the Armenian material — the
      most fragmentary of the six — gives Vahagn the *Vishapakagh*, 'dragon-reaper',
      through Khorenatsi's late paraphrase of a hymn whose own text is lost. The
      chapter takes these six sub-cases in order from the strongest philological
      evidence to the most fragmentary, treating each in its own clearly-bounded
      sub-section and preserving the morphological and evidential distinctiveness
      of each rather than smoothing them into a single comparative schema."
      This paragraph previews the six sub-cases established in the claims;
      every factual assertion in it (Fáfnismál/Sigurd/Watkins direct-reflex;
      Beowulf aged-king death-stroke; Cath Maige Tuired/Lugh/Balor sling-stone;
      Welsh two-recension framing; Ossetic Nart/Batraz; Vahagn/Vishapakagh/
      Khorenatsi lost-hymn paraphrase) maps exactly to claims in the approved
      file. No footnote required; no new factual content. NOTE only.
      Critical verifier checks were confirmed explicitly:
      (1) Tolkien-1936 deferral discipline (FC-01 fix): three claims in the
          Beowulf sub-section carry source_id=tolkien-1936-monsters at the
          correct loc=Proceedings of the British Academy 22 (1936) in both
          claims and narrative; diff is empty. The narrative contains no
          analysis of Tolkien's essay beyond its load-bearing critical move
          (recovery of the mythic register of the Beowulf monsters). The
          literary-critical afterlife (influence on medievalism, Tolkien's
          dragon-fiction, modern academic reading) is explicitly deferred to
          Ch42 in two separate narrative passages. No pre-emption of Ch42.
      (2) Watkins full-derivation deferral: the narrative contains no full
          philological derivation of the HERO SLAY SERPENT formula. The formula
          is summarised at the level of its syntactic-semantic structure
          (Old Norse *vega* + hero + *Fáfnir* = Vedic *áhann áhim* = Hittite
          *kuenta . . . illuyanka*) in the Sigurd sub-section, which is exactly
          the claim-level summary at narrative line 3201. The full argument is
          consistently referred forward to Part II C5. No pre-emption.
      (3) Vahagn fragmentary framing: the sub-section opens with an explicit
          lost-hymn statement, the LACUNA marker is verbatim present with all
          sub-fields (source, scholarly_reconstruction), the narrative never
          presents Khorenatsi's paraphrase content as the hymn itself, and the
          birth-narrative (triple-birth motif: heavens / sea / reed) is
          explicitly attributed to Khorenatsi's paraphrase. The combat-content
          reconstruction is explicitly presented as drawn from the Vishapakagh
          epithet, vishapakar stelae, and comparative-philological readings
          rather than from a primary narrative text. No LACUNA collapse.
      (4) Six sub-sections: all six (Sigurd / Beowulf / Lugh-Balor / Welsh /
          Batraz / Vahagn) plus "Source overview" and "Family pattern, reception,
          and forward links" are present in narrative and claims with identical
          section headers. The ordering is identical (Sigurd to Vahagn, strongest
          to most fragmentary). Each sub-section has its own thematic register.
      (5) tolkien-1936-monsters source_id discipline (FC-01): three EVIDENCE
          tags in the narrative use source_id=tolkien-1936-monsters at
          loc=Proceedings of the British Academy 22 (1936). The counts match
          the claims exactly (3 in each); diff is empty.
      (6) Banned umbrella terms: "chaos-figure", "chaos-monster", and
          "chaos-serpent" are absent from narrative body prose. Grep confirmed
          zero hits.
      (7) No new source IDs: both narrative and claims use the same seven
          source_ids (forsyth-1987, larrington-poetic-edda, ogden-2013,
          russell-zoroastrianism-armenia, tolkien-1936-monsters, watkins-1995,
          west-2007). No unclaimed scholars, deities, texts, or comparanda
          introduced in narrative.
    q3_distortion_check: >
      All prose claims were checked for meaning preservation. The narrative is
      overwhelmingly verbatim relative to the claims — the diff between
      corresponding paragraphs is effectively zero. No paraphrases that alter
