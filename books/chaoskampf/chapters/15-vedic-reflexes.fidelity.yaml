        (2) Two-sub-section no-merge rule: the Trita Āptya section (=== Trita Āptya and the
        three-headed serpent) and the Krishna-Kāliya section (=== Krishna and Kāliya —
        bhakti-era reworking) are clearly bounded in the narrative with no cross-contamination
        of claims. The claims' prohibition on merging is reflected verbatim in narrative line
        42: "the two sub-cases are treated in clearly-bounded sub-sections that are not merged
        at the level of either narrative content or doctrinal framing."
        (3) Tagare anchor for BP narrative-detail claims: all nine BP 10.15–17 narrative-detail
        claims in the Krishna-Kāliya section carry Tagare 1976–78 as the first-named citation,
        with Forsyth 1987 retained as long-arc framing anchor — the dual citation structure
        is faithfully reproduced throughout.
        (4) Bhakti-era transformation thesis: the four-fold transformation (warrior →
        child-hero, killing → subjugation, cosmological → local, ritual → devotional) is
        treated as genuine and irreducible throughout — not collapsed into an alternative
        phrasing of Indra-Vṛtra. See narrative lines 167, 177, 204, 208–210, 218–220, 247.
        (5) 4th–10th c. CE dating for Krishna-Kāliya: narrative correctly states "4th century
        CE" for Harivaṃśa, "5th century CE" for Viṣṇu Purāṇa, and "9th to 10th century CE"
