      EVIDENCE token routes through Hallowell, who anchors only the
      Nanabozho case; the Bida case has no anchor in this paragraph. A
      reader reaching for the warrant for the Bida sub-case is left
      without an in-text reference. (Conrad-west-africa is the natural
      Bida anchor and IS in sources.yaml; he is named in §III but not
      cited in this paragraph.)
    evidence: >
      Claim 50's EVIDENCE token references Hallowell only. Conrad 2005
      (sources.yaml) is the book's pinned Bida anchor.
    recommended_fix: >
      Either (a) add a second sentence with an EVIDENCE token routing
      through conrad-west-africa for the Bida sub-case, paralleling the
      Hallowell anchor for the Nanabozho sub-case; or (b) rephrase the
