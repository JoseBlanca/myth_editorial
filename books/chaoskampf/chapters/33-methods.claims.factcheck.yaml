  - id: FIND-07
    claim_number: 46  # paragraph in §I, CONTRASTIVE classification
    claim_excerpt: >
      A story is classified CONTRASTIVE if the combat is genuinely present
      in the tradition's primary sources but its valence is inverted (Bida,
      where slaying the serpent destroys prosperity rather than
      establishing it) or if the area-specialist tradition declines the
      chaos-vs-order mapping while a surface combat is recorded
      (Nanabozho / Mishipeshu / Thunderers).
    line_in_input: 50
    evidence_token: "source_id=hallowell-ojibwa-world ; loc=Ojibwa Ontology, Behavior, and World View, 19-52"
    kind: ANCHOR-AWKWARD
    severity: LOW
    issue: >
