  - id: FIND-08
    claim_number: 96  # last paragraph of §VII, "auditable baseline"
    claim_excerpt: >
      The book does not claim that the present methods chapter is the
      final word on its own methodology; the chapter is a snapshot of
      the book's methodological commitments at the point of its
      publication, and the appropriate response to critique is not
      defence but revision in subsequent editions.
    line_in_input: 320
    evidence_token: "source_id=lincoln-2012 ; loc=Gods and Demons, Priests and Scholars, on revisable methodology"
    kind: LOOSE-ANCHOR
    severity: LOW
    issue: >
      The claim is a self-positioning statement about the book's own
      methodological humility. The Lincoln 2012 anchor reads as decorative
      — Lincoln treats methodology as ideologically situated, but the
      "revision in subsequent editions" commitment is the book's, not
      Lincoln's. The anchor is fair but loose; a careful reviewer would
      ask "what specifically in Lincoln 2012 motivates the revision-in-
      subsequent-editions commitment?" and the chapter's footnote does
      not say.
    evidence: >
      Claim 320 footnote: "Lincoln, B., *Gods and Demons, Priests and
      Scholars*, [...] on the political-ideological reading of methodology
      as itself a revisable scholarly commitment." — the phrase "as itself
      a revisable scholarly commitment" is an extrapolation beyond what
      Lincoln 2012 explicitly argues (Lincoln argues methodology is
      ideologically situated; the revisability is implied but not
      Lincoln's headline claim).
    recommended_fix: >
      Either (a) shorten the footnote to "Lincoln 2012 on the political-
      ideological reading of methodology" (drop "as itself a revisable
      scholarly commitment"), so the claim is anchored to what Lincoln
      actually says; or (b) make the self-positioning statement
      explicitly the book's own commitment and frame the Lincoln anchor
      as the *register* in which the commitment is articulated rather
      than as the *source* of the commitment. Option (b) is preferable
      because it honours the chapter's own special_instructions to be
      explicit about appropriation-disclosure as a self-disclosure.

