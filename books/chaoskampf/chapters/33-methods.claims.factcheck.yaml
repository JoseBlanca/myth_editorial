findings:
  # ───────────────────────────────────────────────────────────────────
  # MEDIUM findings — misattribution / over-attribution issues
  # ───────────────────────────────────────────────────────────────────

  - id: FIND-01
    claim_number: 81  # paragraph in §VII, "universal monomyth disclaimer"
    claim_excerpt: >
      The book does not claim a universal chaoskampf monomyth — a single
      underlying narrative pattern instantiated across all human cultures
      — and explicitly disclaims the comparativist tradition (Campbell,
      Eliade in their universalising registers) within which such monomyth
      claims have historically been advanced.
    line_in_input: 275
    evidence_token: "source_id=ballentine-2015 ; loc=The Conflict Myth and the Biblical Tradition, the alternative-sovereign critique against universalising"
    kind: MISATTRIBUTION
    severity: MEDIUM
    issue: >
      The disclaimer is anchored to Ballentine 2015 ("on the methodological
      critique that motivates the disclaimer"), but Ballentine's critique
      is specifically about the inappropriateness of the *chaos* framing
      for the Hebrew Bible adversaries (who are presented as rival
      sovereigns). She does NOT address the universal-monomyth claim
      (Campbell-style monomyth or Eliade-style History-of-Religions
      universalism) directly. The disclaimer needs an anchor that motivates
      the *monomyth-rejection* specifically. Lincoln 2012 — already cited
      elsewhere in the chapter — is the natural candidate (Lincoln's
      critique of the History of Religions tradition explicitly targets
      Eliade-style universalism). Wendy Doniger or Jonathan Z. Smith would
      be even better but are not in sources.yaml.
    evidence: >
      Ballentine 2015's argument, per the chapter's own §VI characterisation
      of "the Ballentine critique" (claim 255): "chaos is the wrong word
      for the adversaries in the combat-myth corpus, because they are
      presented in the ancient texts as rival sovereigns with their own
      retinue and power structure rather than as inchoate disorder." This
      is a critique of the chaos-framing, not a critique of universal
      monomyth.
    recommended_fix: >
      Re-anchor the §VII universal-monomyth disclaimer to Lincoln 2012
      (whose critical-edge usage of "comparativist" the chapter already
      uses, and whose critique of Eliade-school universalism in *Gods and
      Demons, Priests and Scholars* directly motivates the disclaimer).
      Alternatively, retain Ballentine 2015 as one anchor but pair her
      with Lincoln 2012 as the primary anchor for the monomyth-rejection.
      The footnote text should specify *what aspect of Ballentine's work*
      bears on the monomyth disclaimer, since her published argument is
      not directly about monomyth claims.

  - id: FIND-02
    claim_number: 67  # paragraph in §VI, "appropriation" definition
    claim_excerpt: >
      The book uses "appropriation" — without the "cultural" prefix — for
      the inappropriate application of a comparative category that does
      violence to a tradition's own self-understanding, in the sense in
      which Merlan 1998 and Hallowell 1960 use the term.
    line_in_input: 249
    evidence_token: "source_id=merlan-caging-rainbow ; loc=Caging the Rainbow, the appropriation usage"
    kind: MISATTRIBUTION
    severity: MEDIUM
    issue: >
      The claim asserts that Hallowell 1960 "uses the term [appropriation]"
      in the sense the book uses it. Hallowell's 1960 essay "Ojibwa
      Ontology, Behavior, and World View" is an ethnographic-philosophical
      argument about Anishinaabe ontology (the "other-than-human persons"
      framework). It is not framed as a critique of appropriation and does
      not develop "appropriation" as a methodological term. Merlan 1998
      genuinely does engage the appropriation literature; pairing Hallowell
      with her in this framing over-attributes the methodological-
      vocabulary work to Hallowell. The term-usage in the sense the book
      means is closer to Vizenor 1989 (already in sources.yaml; *Narrative
      Chance* explicitly engages the politics of academic representation
      of Native American materials) than to Hallowell.
    evidence: >
      Per trained-corpus knowledge of Hallowell 1960: the essay's
      vocabulary is ontological-ethnographic ("persons", "manitou",
      "grandfathers", "dreaming") rather than methodological-political
      ("appropriation"). The claim's parallel framing of Merlan and
      Hallowell flattens a real distinction in their projects.
    recommended_fix: >
      Either (a) drop "and Hallowell 1960" from the in-which-X-and-Y-use-
      the-term clause, leaving Merlan 1998 as the principal anchor; or
      (b) replace "Hallowell 1960" with "Vizenor 1989" (Vizenor's
      *Narrative Chance* is in sources.yaml and explicitly engages
      academic-discourse appropriation of Native American narratives).
      Option (b) is preferable because the book actually uses Vizenor's
      work for the methodological-refusal framing in Ch32.

  - id: FIND-03
    claim_number: 56  # paragraph in §II, asymmetric-protocol claim
    claim_excerpt: >
      The protocol is asymmetric: it applies to non-Eurasian RELATED and
      CONTRASTIVE chapters and not to non-Eurasian CORE chapters because
      the book's CORE entries are by definition cases where area
      specialists themselves identify the chaoskampf-relevant order-making
      work, so the appropriation risk is materially smaller.
    line_in_input: 91
    evidence_token: "source_id=hallowell-ojibwa-world ; loc=Ojibwa Ontology, Behavior, and World View, on the area-specialist criterion underlying the asymmetric application"
    kind: POLICY-EXPANSION
    severity: MEDIUM
    issue: >
      Scope.md §"Appropriation protocol" (line 62) reads: "every RELATED
      chapter on a non-Eurasian tradition must..." — explicitly RELATED
      only. The methods chapter's Section II expands the protocol's reach
      to "every RELATED or CONTRASTIVE chapter on a non-Eurasian tradition"
      (claim 67 / line 67) and the asymmetry-claim (line 91) makes this
      expansion explicit. The expansion is internally coherent (CONTRASTIVE
      cases like Nanabozho carry obvious appropriation-risk and the protocol
      should apply to them) but it is a policy-extension beyond scope.md
      as written. The methods chapter is the right place to make this
      extension explicit, but the chapter should acknowledge that scope.md
      as currently written specifies only RELATED — otherwise a careful
      reader comparing the two documents will notice the discrepancy and
      treat it as an inconsistency rather than as an intentional
      clarification.
    evidence: >
      Scope.md line 62 (verified in audit): "Given scholarly warnings about
      forcing Near Eastern / Indo-European templates onto non-Eurasian
      traditions (explicitly flagged for Rainbow Serpent, Nanabozho,
      Mwindo in the research notes), every RELATED chapter on a non-
      Eurasian tradition must:". The CONTRASTIVE expansion does not appear
      in scope.md.
    recommended_fix: >
      Either (a) add a sentence to claim 67 (line 67) acknowledging that
      the protocol is being extended from scope.md's RELATED-only formulation
      to cover CONTRASTIVE chapters as well, with the asymmetry claim of
      line 91 explaining why; or (b) update scope.md at post-human-normalize
      to match the chapter's RELATED+CONTRASTIVE formulation. Option (b) is
      preferable because the chapter's extended formulation is the right
      one — Nanabozho (Ch32 CONTRASTIVE) genuinely needs the protocol — and
      scope.md is the document that should be brought into line with the
      book's actual practice, not the methods chapter that should be
      retracted.

  # ───────────────────────────────────────────────────────────────────
  # LOW findings — wording / minor attribution issues
  # ───────────────────────────────────────────────────────────────────

  - id: FIND-04
    claim_number: 65  # paragraph in §VI, "comparativist" definition
    claim_excerpt: >
      The book uses "comparativist" with a critical edge — Lincoln 2012's
      term — to mark the position of a scholar who compares myths across
      traditions for shared patterns.
    line_in_input: 246
    evidence_token: "source_id=lincoln-2012 ; loc=Gods and Demons, Priests and Scholars, the critical-edge usage of 'comparativist'"
    kind: OVER-ATTRIBUTION
    severity: LOW
    issue: >
      The claim says "comparativist" is "Lincoln 2012's term", but
      glossary.yaml entry on "comparativist" credits the term to "Lincoln
      2012; contemporary critical scholarship" — i.e., Lincoln plus a
      broader register. The term is not Lincoln's coinage; it is current
      in the History of Religions field across multiple critical scholars
      (Doniger, J.Z. Smith, Lincoln). The claim's "Lincoln 2012's term"
      formulation is sharper than what the glossary supports.
    evidence: >
      Glossary.yaml line 101: "{ form: 'comparativist', source: 'Lincoln
      2012; contemporary critical scholarship' }".
    recommended_fix: >
      Replace "Lincoln 2012's term" with "the term in the critical register
      Lincoln 2012 makes use of" or with "a term in current critical
      scholarship for which Lincoln 2012 is the book's principal anchor".
      Either rewording preserves the Lincoln-2012 anchor while not
      attributing the term's *coinage* to Lincoln.

  - id: FIND-05
    claim_number: 4  # paragraph 1 of §I, five-tier list
    claim_excerpt: >
      The book sorts its chapters into five tiers — CORE, RELATED,
      PROVISIONAL, CONTRASTIVE, and SIDEBAR — [...] [later, claim 47]
      A story is classified PROVISIONAL or CRITIQUE if area specialists
      explicitly reject the chaoskampf framing for it.
    line_in_input: "35 (five-tier list); 47 (PROVISIONAL or CRITIQUE)"
    evidence_token: "source_id=forsyth-1987 (claim 35) ; source_id=merlan-caging-rainbow (claim 47)"
    kind: TERMINOLOGY-INCONSISTENCY
    severity: LOW
    issue: >
      The chapter's own tier-naming is inconsistent within the chapter and
      between the chapter and adjacent governing files:
        - Claim 35 (§I opener) lists FIVE tiers: CORE / RELATED /
          PROVISIONAL / CONTRASTIVE / SIDEBAR.
        - Claim 47 (§I third tier) names the third tier "PROVISIONAL or
          CRITIQUE" — sliding between two names.
        - Brief 33-methods.yaml §I summary names FIVE tiers: CORE /
          RELATED / CONTRASTIVE / CRITIQUE / SIDEBAR (with CRITIQUE not
          PROVISIONAL).
        - Glossary.yaml entry on "tier-ranking" (line 159–165) lists FOUR
          tiers: CORE / RELATED / PROVISIONAL / CONTRASTIVE (no SIDEBAR).
        - Scope.md uses "PROVISIONAL / CRITIQUE" as a single label.
      The methods chapter is the place where the tier scheme is defined
      for the book, and the inconsistency of the third-tier name and of
      the glossary's omission of SIDEBAR is therefore the chapter's
      responsibility to resolve.
    evidence: >
      Direct text of claim 35: "five tiers — CORE, RELATED, PROVISIONAL,
      CONTRASTIVE, and SIDEBAR". Direct text of claim 47: "classified
      PROVISIONAL or CRITIQUE". Glossary.yaml first_mention_gloss for
      tier-ranking: "CORE / RELATED / PROVISIONAL / CONTRASTIVE" — no
      SIDEBAR.
    recommended_fix: >
      (a) Lock a single name for the third tier — the recommendation is
      "PROVISIONAL/CRITIQUE" as a single hyphenated label that matches
      scope.md's usage, OR rename to just "CRITIQUE" to match the brief.
      Then use the chosen name consistently across claim 47 and any later
      reference. (b) Update glossary.yaml's tier-ranking entry at
      post-human-normalize to include SIDEBAR as the fifth tier, since
      the methods chapter is now defining the five-tier scheme and the
      glossary should reflect the full set.

  - id: FIND-06
    claim_number: 38  # paragraph in §III, Andean
    claim_excerpt: >
      For the Andean material, the book uses Frank Salomon and George
      Urioste's *Huarochirí Manuscript* as the primary-translation anchor
      for Pariacaca and the wak'a-succession material, with the area's
      broader Andean-studies scholarship as the contextualising frame.
    line_in_input: 141
    evidence_token: "source_id=salomon-urioste-huarochiri ; loc=The Huarochirí Manuscript, on Pariacaca"
    kind: BODY-FOOTNOTE-MISMATCH
    severity: LOW
    issue: >
