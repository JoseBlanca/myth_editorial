    FC-02 (MEDIUM): The wedjat eye identification. The claim at line 98 calls
    the torn-out eye "the *wedjat* eye, conventionally the lunar left eye" at
    the moment of its extraction by Seth. In standard Egyptological usage the
    wedjat (wḏꜣt, "the sound/healthy one") is the RESTORED eye of Horus —
    the eye after Thoth's healing — not the damaged eye itself. Calling the
    torn-out eye "the wedjat" reverses the Egyptological sequence and will
    mislead readers in a chapter that stakes its claim to scholarly precision
    on Egyptological accuracy. This is the most consequential single factual
    imprecision in the document.

