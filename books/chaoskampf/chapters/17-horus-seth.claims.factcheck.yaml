findings:

  - id: FC-01
    severity: MEDIUM
    category: glossary_violation
    location: >
      §"Setting and context" line 67 — the claim beginning "Seth — Egyptian
      Setekh, alternative form Sutekh in Ramesside diplomatic contexts..."
    claim_text: >
      Seth — Egyptian Setekh, alternative form Sutekh in Ramesside diplomatic
      contexts — is the Egyptian god of storms, deserts, and disorder...
    problem: >
      The form "Setekh" is introduced as the Egyptian-language name for Seth at
      first mention, but "Setekh" is not in the locked glossary.yaml for this
      book. The glossary entry "Seth / Sutekh" lists the renderings_considered
      as Seth (Faulkner 1972; te Velde 1967), Sutekh (Hittite treaty usage;
      Ramesside period), and Sēt (with length-mark, less common). The chosen
      form is "Seth as body-prose default; 'Sutekh' only where the Hittite-
      Egyptian interface is under discussion." The form "Setekh" is not among
      the locked renderings. While "Setekh" is a legitimate Egyptological
      transliteration of the Egyptian orthography and appears in some scholarly
      literature, the book's locked glossary discipline does not sanction it.
      The first-mention gloss in the claims document should use the glossary-
      approved form (Seth / Sutekh) rather than introducing an unlocked variant.
      This is a glossary-discipline violation, not a factual error about the
      deity.
    evidence: >
      glossary.yaml entry "Seth / Sutekh": renderings_considered includes Seth,
      Sutekh, and Sēt; chosen is "Seth as body-prose default; 'Sutekh' only
      where Hittite-Egyptian interface is under discussion." "Setekh" does not
      appear in the entry. The brief 17-horus-seth.yaml also uses "Seth" and
      "Sutekh" as the sanctioned forms.
    recommended_fix: >
      At line 67, replace "Seth — Egyptian Setekh, alternative form Sutekh in
      Ramesside diplomatic contexts" with "Seth — alternative form Sutekh in
      Ramesside diplomatic contexts." The Egyptian-language transliteration
      Setekh is not a locked glossary form; if the chapter-draft stage wants to
      note the Egyptian orthography, it should do so in a footnote using the
      locked scholarly sources (te Velde 1967) rather than in the body claim.
      Update the EVIDENCE-tag note accordingly.

  - id: FC-02
    severity: MEDIUM
    category: unverified
    location: >
      §"Setting and context" line 98 — the claim about the wedjat eye:
      "the *wedjat* eye, conventionally the lunar left eye"
    claim_text: >
      Seth tears out one of Horus's eyes (the *wedjat* eye, conventionally the
      lunar left eye), and Horus in turn injures Seth's testicles, with the
      eye-injury and the testicle-injury preserved in the textual record as the
      canonical mutilations of the contention.
    problem: >
      The claim conflates two distinct Egyptological concepts. In standard
      Egyptological usage, the "wedjat" (wḏꜣt) eye is the healed or whole/
      restored eye of Horus — the eye AFTER its restoration by Thoth, not the
      eye as Seth tears it out. The eye that Seth tears from Horus is the left
      (lunar) eye, which becomes the wedjat only after restoration. Calling
      the torn-out eye "the wedjat eye" at the moment of its extraction
      reverses the logic: the wedjat is precisely the healthy/healed eye, and
      its restoration is the resolution of the injury, not the injury itself.
      The Pyramid Texts and Coffin Texts attestations of the wedjat eye are
      typically in contexts of protection and restoration, not of wounding.
      The identification "conventionally the lunar left eye" for the torn eye
      is itself contested in Egyptology: the right eye of Horus is solar and
      associated with Ra; the left eye is lunar — this much the claim gets
      right. But the attachment of the "wedjat" label to the torn eye at the
      moment of tearing is an imprecision that the chapter-draft stage should
      not perpetuate. This is flagged as MEDIUM (imprecision, not fabrication)
      because the Egyptian sources do associate wedjat with the left/lunar eye
      broadly, but the precise sequence (tear → heal → wedjat) matters for
      theological accuracy in a chapter that stakes much on Egyptological
      precision.
    evidence: >
      Standard Egyptological usage: "wedjat" (wḏꜣt) means "the sound/healthy
      one" and refers to the restored eye of Horus, not the damaged eye.
      The sequence in the mythology is: Seth tears out the eye; Thoth
      (or Hathor in some variants) restores it; the restored eye is the wedjat.
      The claim as written presents the wedjat as simply another name for the
      torn-out eye, which is inaccurate. te Velde 1967 ch. 1 treats the
      eye-injury in the Pyramid Texts context; the wedjat-as-restored-eye is
      standard in the funerary literature and in te Velde's treatment.
    recommended_fix: >
      Revise to: "Seth tears out one of Horus's eyes (the left, conventionally
      the lunar eye; subsequently restored as the *wedjat*, the 'sound eye'),
      and Horus in turn injures Seth's testicles..." This preserves the
      correct Egyptological sequence: the eye is torn out as the lunar/left
      eye; it becomes the wedjat after restoration by Thoth. The wedjat label
      should be attached to the restored, not the torn, eye.

  - id: FC-03
    severity: MEDIUM
    category: unverified
    location: >
      §"Source overview" line 82-83 — the EVIDENCE token citing "introduction"
      as the locus for te Velde 1967.
    claim_text: >
      te Velde 1967's title _Seth, God of Confusion_ reflects the scholarly
      judgment that the Egyptian tradition's handling of Seth is itself
      characterised by deliberate ambivalence...
      [EVIDENCE: source_id=te-velde-1967 ; loc=introduction (deliberate ambivalence)]
    problem: >
      The EVIDENCE token at line 83 cites "loc=introduction (deliberate
      ambivalence)" as the locus within te Velde 1967. The brief and the
      citation discipline established for this book (and documented in the
      chapter's own lines 35-36 on the printed-source citation policy) specify
      that te Velde 1967 is to be cited at "chapter-section level (chs. 1-2)"
      for this chapter. "Introduction" is a more precise location than
      chapter-level and cannot be verified without direct access to the printed
      edition. The body footnote at line 82 correctly links the observation to
      the monograph's title and chs. 1-2, but the EVIDENCE tag narrows the
      citation to "introduction" specifically. This over-precision violates the
      printed-source citation discipline established by the brief.
    evidence: >
      Brief 17-horus-seth.yaml, sources.primary: "loc: Seth, God of Confusion,
      chs. 1-2 (on Horus-Seth contention and Seth's ambivalence)." The chapter
      itself (lines 35-36) states: "te Velde 1967 is printed-only; in the
      present chapter it is cited at chapter-section level (chs. 1-2) per the
      established discipline." The "introduction" loc is more precise than the
      chapter-level discipline allows for an unverified printed source.
    recommended_fix: >
      Change the EVIDENCE token at line 83 from
      "source_id=te-velde-1967 ; loc=introduction (deliberate ambivalence)"
      to "source_id=te-velde-1967 ; loc=chs. 1-2 (deliberate ambivalence)."
      The body footnote correctly notes both the title and chs. 1-2 as
      co-references; the EVIDENCE tag should match the chapter-level citation
      discipline, not narrow to the introduction.

  - id: FC-04
    severity: LOW
    category: unverified
    location: >
      §"The Contendings of Horus and Seth" line 186-187 — the Hoffner 1998
      §§14-18 citation in the Kumarbi-Teshub evidence tag.
    claim_text: >
      ...Hoffner 1998 on the Kumarbi-Teshub succession-strife (cross-ref Ch. 5).
      [EVIDENCE: source_id=hoffner-1998 ; loc=§§14-18 (Kumarbi-Teshub succession)]
    problem: >
      The EVIDENCE token for the Kumarbi Cycle cross-reference cites Hoffner
      1998 at "§§14-18 (Kumarbi-Teshub succession)." This is a specific section
      range within a printed-only edition. Hoffner 1998 (Hittite Myths, 2nd ed.,
      SBL Writings from the Ancient World 2) organises its texts by number, and
      the Kumarbi Cycle materials are among the longer numbered sections — but
      the specific section numbers §§14-18 cannot be verified without direct
      access to the printed edition. The citation is therefore over-precise for
      an unverifiable printed source. This is LOW rather than MEDIUM because
      the citation is in a forward-link / COMPARATIVE-HOOK context (the Kumarbi
      comparison is being forwarded to Ch. 5 and Part II C2, not being developed
      here), and the section numbering is plausible given Hoffner's standard
      organisation of the myths. The substantive claim (that the Kumarbi-Teshub
      succession-strife is the structural comparand) is not fabricated.
    evidence: >
      Hoffner 1998 (sources.yaml entry: "Anchor for Illuyanka and the Kumarbi
      Cycle [Song of Ullikummi, Song of Hedammu, Kingship in Heaven]") is a
      printed-only source. The section-number range §§14-18 for the Kumarbi-
      Teshub materials is plausible but unverifiable without the printed text.
      The corresponding body footnote (line 186) does not repeat the section
      numbers, citing only "Hoffner 1998 on the Kumarbi-Teshub succession-
      strife" — the section numbers are introduced only in the EVIDENCE tag,
      which is the more machine-readable/precise citation level.
    recommended_fix: >
      Change the EVIDENCE token at line 187 from
      "source_id=hoffner-1998 ; loc=§§14-18 (Kumarbi-Teshub succession)"
      to "source_id=hoffner-1998 ; loc=Kumarbi Cycle sections (Kumarbi-Teshub
      succession)." The body footnote already correctly cites at work level
      without section numbers; the EVIDENCE tag should match rather than add
      unverified precision.

