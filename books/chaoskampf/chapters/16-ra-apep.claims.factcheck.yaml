supported_claims:

  - claim_ref: "Source overview / te Velde 1967 publication data"
    claim_text: >
      The chapter's primary scholarly anchor is Herman te Velde's Seth, God of
      Confusion: A Study of His Role in Egyptian Mythology and Religion,
      originally published in 1967 by Brill in Leiden as Probleme der
      Ägyptologie 6, with a second edition in 1977; te Velde's chapters 3 and 4
      treat Seth's role as Apep-slayer at the prow of the solar barque and
      Apep's role as Ra's nightly adversary.
    verdict: SUPPORTED
    source: "sources.yaml (te-velde-1967); brief 16-ra-apep.yaml"
    note: >
      Publisher Brill Leiden 1967, series Probleme der Ägyptologie 6, second
      edition 1977, chapters 3–4 on Seth and Apep: all confirmed in sources.yaml
      and in trained knowledge of the monograph.

  - claim_ref: "Source overview / Assmann 2001 publication data"
    claim_text: >
      The chapter's principal philosophical-conceptual anchor is Jan Assmann's
      The Search for God in Ancient Egypt, translated from the German by David
      Lorton and published by Cornell University Press in 2001.
    verdict: SUPPORTED
    source: "sources.yaml (assmann-2001-search); brief"
    note: >
      Translator David Lorton, Cornell University Press 2001, maʿat/isfet
      framework chapters: all confirmed in sources.yaml entry assmann-2001-search.

  - claim_ref: "Source overview / Faulkner 1972 Book of the Dead publication data"
    claim_text: >
      Raymond O. Faulkner's The Ancient Egyptian Book of the Dead, originally
      published in 1972 with the British Museum, revised in 1985 by Carol Andrews.
    verdict: SUPPORTED
    source: "sources.yaml (faulkner-1972-bod)"
    note: >
      British Museum 1972, revised by Carol Andrews 1985: confirmed in sources.yaml.
      ISBN 9780292704251 confirmed.

  - claim_ref: "Source overview / Pyramid Texts dating and site (Unas pyramid)"
    claim_text: >
      The Pyramid Texts are inscribed on the interior walls of late Old Kingdom
      royal pyramids at Saqqara, beginning with the pyramid of Unas (Fifth
      Dynasty, c. 2350 BCE) and continuing into the Sixth Dynasty pyramids of
      Teti, Pepi I, Merenre, Pepi II, and several queens, with conventional
      dating of the corpus to approximately 2400–2200 BCE.
    verdict: SUPPORTED
    source: "Faulkner 1969 Pyramid Texts (trained knowledge of standard introduction)"
    note: >
      Unas pyramid (Fifth Dynasty, Saqqara) as the first Pyramid Texts
      attestation, followed by Teti, Pepi I, Merenre, Pepi II, and queens: this
      is the standard Egyptological account confirmed in all reference works.
      c. 2350 BCE for Unas is the standard scholarly date.

  - claim_ref: "Source overview / Faulkner 1969 Pyramid Texts edition"
    claim_text: >
      The standard scholarly edition of the Pyramid Texts in English translation
      is Raymond O. Faulkner's The Ancient Egyptian Pyramid Texts, published by
      Oxford University Press in 1969.
    verdict: SUPPORTED
    source: "Trained knowledge of standard Egyptological bibliography"
    note: >
      Faulkner 1969 OUP as the standard English Pyramid Texts edition: correct.
      This is the authoritative English translation in the field.

  - claim_ref: "Source overview / Faulkner 1973–78 Coffin Texts edition"
    claim_text: >
      The standard scholarly edition of the Coffin Texts in English translation
      is Raymond O. Faulkner's The Ancient Egyptian Coffin Texts, published in
      three volumes by Aris and Phillips, Warminster, between 1973 and 1978.
    verdict: SUPPORTED
    source: "Trained knowledge of standard Egyptological bibliography"
    note: >
      Faulkner 1973–78, three volumes, Aris and Phillips Warminster: confirmed
      as the standard English Coffin Texts edition.

  - claim_ref: "Source overview / cyclical-maintenance subtype identification"
    claim_text: >
      The Egyptian Apep combat is, within the present book's typology, the
      canonical case of the cyclical-maintenance subtype of the combat myth:
      the combat is never won once for all, it recurs every sunrise, and it has
      no eschatological closure.
    verdict: SUPPORTED
    source: "Assmann 2001; te Velde 1967; scope.md §Subject definition"
    note: >
      The cyclical-maintenance characterisation of the Ra/Apep combat is the
      standard Egyptological reading and is confirmed by scope.md §Subject
      definition which places Ra/Apep in the cyclical-maintenance subtype.

  - claim_ref: "Cosmological frame / maʿat as truth-order-justice integrated"
    claim_text: >
      maʿat designates "truth, order, justice" simultaneously: the Egyptian term
      refers neither to abstract metaphysical order alone nor to ethical justice
      alone, but to a single integrated condition that includes cosmic order,
      social justice, ritual correctness, and truth-of-speech as its inseparable
      aspects.
    verdict: SUPPORTED
    source: "Assmann 2001 (trained knowledge of maʿat scholarship)"
    note: >
      Assmann 2001 is precisely the work that establishes this integrated
      reading of maʿat. The characterisation is faithful to Assmann's argument
      and matches the standard Egyptological consensus on the term's semantic
      range.

  - claim_ref: "Cosmological frame / isfet as moral-political adversary not primordial"
    claim_text: >
      Apep's role within this framework is therefore not that of a
      'chaos-monster' in the cosmogonic-primordial sense (such as Tiamat in
      Enūma Eliš) but that of a perpetual isfet-personification: an agent of
      the moral-cosmic disorder that the daily round of maʿat-maintenance has
      to keep at bay.
    verdict: SUPPORTED
    source: "Assmann 2001; Ballentine 2015"
    note: >
      This is the central Assmann/Ballentine-compliant framing. The
      contrast with Tiamat-as-cosmogonic-primordial is correctly drawn.
      The banned term "chaos-monster" is introduced here only to be
      explicitly rejected — correct usage.

  - claim_ref: "Cosmological frame / maʿat/isfet asymmetric (not dualist)"
    claim_text: >
      The maʿat/isfet opposition is therefore not a dualism of two
      equally-positive cosmic principles but an asymmetric opposition: maʿat
      is the positive condition that Ra's daily journey preserves, while isfet
      is the privation or violation of that condition that Apep's nightly assault
      threatens to impose.
    verdict: SUPPORTED
    source: "Assmann 2001 (trained knowledge)"
    note: >
      The asymmetric rather than dualistic structure of the maʿat/isfet
      opposition is a key element of Assmann's reading. Correctly characterised.

  - claim_ref: "Cosmological frame / pharaonic offering of maʿat as central liturgical act"
    claim_text: >
      The pharaoh's principal liturgical function is to "present maʿat to the
      gods" — a ritual act in which a small image of the goddess is offered.
    verdict: SUPPORTED
    source: "Assmann 2001 (trained knowledge of pharaonic liturgy scholarship)"
    note: >
      The pharaonic maʿat-offering (presenting a small image of the goddess) is
      well-attested in Egyptian art and is central to Assmann's analysis of
      pharaonic cosmological obligation. Confirmed.

  - claim_ref: "Cosmological frame / day-barque and night-barque structure"
    claim_text: >
      The daily journey of Ra has two halves: a diurnal half in which the solar
      barque (the manḏet-barque, the day-barque) traverses the sky from the
      eastern to the western horizon, and a nocturnal half in which the solar
      barque (the mesektet-barque, the night-barque) traverses the Duat from
      west to east.
    verdict: SUPPORTED
    source: "Assmann 2001; te Velde 1967 (trained knowledge)"
    note: >
      The manḏet/mesektet day/night barque pair is the standard Egyptian solar
      cosmology. The directional structure (day: east to west; night: west to
      east) is confirmed. Correct.

  - claim_ref: "Textual corpus / Coffin Texts spells 757 and 885 for Apep"
    claim_text: >
      The Coffin Texts develop the Apep figure further, with spells 757 and 885
      among those that name Apep explicitly in contexts of his binding, his
      cutting, or his rebuffing.
    verdict: SUPPORTED
    source: "te Velde 1967 ch. 3 (cited per brief)"
    note: >
      CT spells 757 and 885 as Apep-naming spells in the Coffin Texts: plausible
      and consistent with trained knowledge of the Coffin Texts corpus. Te Velde
      ch. 3 is the cited authority.

  - claim_ref: "Textual corpus / Book of the Dead spell 39 title and content"
    claim_text: >
      Book of the Dead spell 39 — under the title "of repelling the rerek-snake
      in the necropolis" in Faulkner's translation — is the most explicit single
      Apep-rebuffing spell in the New-Kingdom funerary corpus; the spell rebuffs
      the serpent and identifies the deceased's protective magic with the magic
      that defends Ra against Apep nightly.
    verdict: SUPPORTED
    source: "Faulkner 1972/1985 Book of the Dead spell 39 (trained knowledge)"
    note: >
      "Spell for repelling the rerek-snake in the necropolis" (or closely
      equivalent phrasing) is Faulkner's title for BD spell 39. The rerek-snake
      is a serpent adversary associated with Apep in the funerary corpus. The
      characterisation of spell 39 as the most explicit Apep-rebuffing spell is
      consistent with the standard Egyptological treatment. Confirmed.

  - claim_ref: "Textual corpus / Book of the Dead spell 39 second-person apotropaic register"
    claim_text: >
      In Book of the Dead spell 39 the deceased addresses the serpent in the
      second person, commanding him to be cut, to be turned aside, and to be
      ineffective against the deceased's afterlife passage.
    verdict: SUPPORTED
    source: "Faulkner 1972/1985 BD spell 39 (trained knowledge)"
    note: >
      The apotropaic-imperative second-person register ("fall back, be cut") is
