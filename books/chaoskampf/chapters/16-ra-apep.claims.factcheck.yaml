findings:

  - id: FC-01
    severity: HIGH
    category: citation_wrong
    location: >
      §"Source overview" — the claim at line 2783 beginning "The principal
      scholarly edition of the Bremner-Rhind Papyrus is Raymond O. Faulkner's
      series of articles in the Journal of Egyptian Archaeology — Faulkner 1933
      ('The Bremner-Rhind Papyrus I', JEA 22)..."
    claim_text: >
      The principal scholarly edition of the Bremner-Rhind Papyrus is Raymond
      O. Faulkner's series of articles in the Journal of Egyptian Archaeology
      — Faulkner 1933 ("The Bremner-Rhind Papyrus I", JEA 22), and Faulkner
      1937–38 ("The Bremner-Rhind Papyrus II–IV", JEA 23–24) — which present
      the philological edition of the papyrus separately from his Book of the
      Dead translation; the chapter cites these as Faulkner's Bremner-Rhind
      editions and references them at the JEA-volume level.
    problem: >
      The date "1933" for JEA volume 22 is wrong. JEA volume 22 was published
      in 1936, not 1933. Faulkner's four-part Bremner-Rhind series in JEA is:
      Part I — JEA 22 (1936); Part II — JEA 23 (1937); Part III — JEA 23
      (1937); Part IV — JEA 24 (1938). The "1933" error is a known bibliographic
      confusion in the Egyptological literature (JEA 19 was published in 1933;
      JEA 22 was 1936). The task instructions for this audit explicitly flag
      this issue: "Faulkner published the philology in JEA 22, 23, 24 (1936–38),
      not the editions sometimes confused with 1933." This is not a trivial
      dating error — it is a load-bearing bibliographic claim that readers will
      use to locate the source, and it is wrong.
    evidence: >
      Standard Egyptological bibliography: JEA 22 = 1936; the Bremner-Rhind
      series ran JEA 22 (1936) through JEA 24 (1938). The task instructions
      explicitly confirm the 1936–38 date range. The year 1933 is not the
      year of JEA 22; it corresponds instead to JEA 19.
    recommended_fix: >
      Replace "Faulkner 1933 ('The Bremner-Rhind Papyrus I', JEA 22)" with
      "Faulkner 1936 ('The Bremner-Rhind Papyrus I', JEA 22)". Update every
      subsequent occurrence of "Faulkner 1933" in references to the Bremner-Rhind
      to read "Faulkner 1936". The correct short-citation form for the series
      is "Faulkner 1936–38 (JEA 22–24)" or individually as "Faulkner 1936
      (JEA 22)" for Part I and "Faulkner 1937–38 (JEA 23–24)" for Parts II–IV.

  - id: FC-02
    severity: HIGH
    category: citation_wrong
    location: >
      §"Source overview" through §"Ritual embedding" — all EVIDENCE tags that
      use "source_id=faulkner-1972-bod" to cite the Bremner-Rhind Papyrus
      (e.g., lines 2784, 2787). The specific instances are the evidence tags at
      the claims beginning "The principal scholarly edition of the Bremner-Rhind
      Papyrus..."; "The Bremner-Rhind Papyrus is preserved but fragmentary...";
      and the LACUNA block.
    claim_text: >
      [Evidence tags cite source_id=faulkner-1972-bod for Bremner-Rhind Papyrus
      editions (Faulkner's JEA articles 1933/1936–38).]
    problem: >
      The source_id "faulkner-1972-bod" in sources.yaml identifies Faulkner's
      Book of the Dead (1972, rev. 1985) — a separate publication from his
      Bremner-Rhind editions in JEA (1936–38). The claims document correctly
      narrates the distinction between the two publications in body prose (noting
      that the Bremner-Rhind editions are "separately from his Book of the Dead
      translation"), but the evidence tags then conflate them by citing
      "faulkner-1972-bod" for the Bremner-Rhind content. This creates an
      inconsistency: the prose distinguishes the two publications, but the
      machine-readable evidence tags point to the wrong source. Since the JEA
      Bremner-Rhind editions are not in sources.yaml as their own entry, this
      is a source-registry gap that flows through to incorrect evidence-tag
      citations.
    evidence: >
      sources.yaml entry faulkner-1972-bod: Faulkner, R.O., The Ancient
      Egyptian Book of the Dead, rev. ed. (London: British Museum, 1985;
      orig. 1972). This is the Book of the Dead, not the JEA Bremner-Rhind
      articles. The claims document's footnotes correctly name "Faulkner's
      editions in JEA (1933, 1937–38)" as separate from the Book of the Dead
      translation — but the evidence tags cite faulkner-1972-bod for that
      separate material.
    recommended_fix: >
      Add a new entry to sources.yaml for the Bremner-Rhind Papyrus editions:
      id: faulkner-1936-bremner-rhind; Faulkner, R.O., "The Bremner-Rhind
      Papyrus I–IV," Journal of Egyptian Archaeology 22 (1936): 121–140;
      23 (1937): 10–16, 166–185; 24 (1938): 41–53. Update all evidence tags
      that reference the Bremner-Rhind content to use this new source_id
      rather than faulkner-1972-bod. This requires both a sources.yaml update
      and a claim-evidence-tag update throughout the claims document.

  - id: FC-03
    severity: MEDIUM
    category: unverified
    location: >
      §"Ritual embedding" — the claim at line 3016 beginning "The recitative
      spells of the Bremner-Rhind text include the hymn known in Egyptological
      literature as the 'Hymn of the Four Falls of Apep'..."
    claim_text: >
      The recitative spells of the Bremner-Rhind text include the hymn known
      in Egyptological literature as the "Hymn of the Four Falls of Apep" — a
      hymn that recites the four moments at which Apep falls in the daily
      combat — and other titled hymns whose function is to recapitulate the
      cosmological combat in the priestly recitation.
    problem: >
      The name "Hymn of the Four Falls of Apep" is presented as the standard
      Egyptological designation for a specific hymn within the Bremner-Rhind
      corpus. However, without direct access to Faulkner's JEA editions, this
      specific title cannot be verified as Faulkner's editorial designation
      or as a widely-cited Egyptological label. The Bremner-Rhind does contain
      hymns recounting Apep's defeats, and a "four falls" structure is plausible
      given the cosmographic structure of the ritual — but the specific named
      label "Hymn of the Four Falls of Apep" may be a paraphrase of the
      content rather than the standard scholarly designation. This is not a
      fabrication flag but an unverified specificity that needs primary-text
      confirmation before the chapter draft uses it as a named citation.
    evidence: >
      Trained knowledge of the Bremner-Rhind corpus confirms that the Book of
      Overthrowing Apep contains hymns of praise to Ra and recitations of Apep's
      defeats. The specific four-falls structure and the exact name "Hymn of the
      Four Falls of Apep" as a standard Egyptological label cannot be confirmed
      from trained knowledge alone without access to Faulkner's JEA editions.
    recommended_fix: >
      Before the chapter draft, verify in Faulkner JEA 22–24 whether "Hymn of
      the Four Falls of Apep" is Faulkner's editorial section title or a broader
      Egyptological label. If it is Faulkner's term, cite as "(Faulkner 1936–38,
      JEA 22–24, [section])". If it is a paraphrase, rephrase as "a hymn
      recounting the four moments at which Apep falls in the daily combat"
      without naming it as a known title.

  - id: FC-04
    severity: MEDIUM
    category: unverified
    location: >
      §"Textual corpus" — the claim at line 2952 beginning "The fourth gate of
      the Book of Gates contains the canonical Apep-combat scene within that
      corpus..."
    claim_text: >
      The fourth gate of the Book of Gates contains the canonical Apep-combat
      scene within that corpus: Apep blocks the barque's passage at the
      gate-threshold, and the gods of the barque-crew dispatch him with knives,
      ropes, and binding-spells before the barque can continue through the gate.
    problem: >
      The "gate 4" designation for the canonical Apep-combat scene in the Book
      of Gates is plausible — te Velde 1967 ch. 3 is the cited authority, and
      the chapter consistently attributes this to te Velde. However, the Book
      of Gates' internal organisation in the primary text uses scenes and
      registers rather than consistently numbered "gates" in the way the Amduat
      uses numbered "hours." Some Egyptological references locate Apep's principal
      combat scene in a different scene-division of the Book of Gates. Without
      direct access to te Velde ch. 3, this specific "gate 4" designation cannot
      be confirmed as te Velde's exact terminology versus a paraphrase.
      The Amduat hour 7 designation is more widely confirmed in the reference
      literature; the Book of Gates gate-4 designation is the weaker of the two.
    evidence: >
      The Amduat's twelve-hour structure with Apep at hour 7 is confirmed in
      standard Egyptological references (e.g., Hornung's work on the Amduat;
      Assmann's synthesis). The Book of Gates gate-4 designation is attested
      in some Egyptological literature but is not as uniformly cited as the
      Amduat hour-7 parallel. The chapter's attribution to te Velde ch. 3 is
      the correct scholarly anchor, but te Velde's exact terminology requires
      verification.
    recommended_fix: >
      Before the chapter draft, verify in te Velde 1967 ch. 3 whether "gate 4"
      is te Velde's exact designation or whether a different gate number or
      scene number is given. If the designation is te Velde's own, cite as
      "te Velde 1967, ch. 3, [specific page or section]." If the exact gate
      number differs, update accordingly. The overall narrative (Apep blocks
      the barque at a gate-threshold in the Book of Gates) is correct; the
      specific gate number warrants confirmation.

  - id: FC-05
    severity: MEDIUM
    category: glossary_violation
    location: >
      §"Source overview" — the brief's entities_glossary entry for "Apep /
      Apophis" uses the first_mention_gloss_candidate: "chaos-serpent; adversary
      of Ra; embodiment of isfet (disorder)". The phrase "chaos-serpent" uses the
      banned root "chaos" in a characterisation-of-Apep context that the
      glossary.yaml explicitly bans.
    claim_text: >
      [Brief YAML, entities_glossary entry for "Apep / Apophis": first_mention_
      gloss_candidate: "chaos-serpent; adversary of Ra; embodiment of isfet
      (disorder)"]
    problem: >
      The glossary.yaml locks the term "chaos-figure" as banned (never_use) for
      adversary characterisations in this book, on the grounds that it begs the
      question the book is investigating (Ballentine 2015 critique). The brief's
      entities_glossary uses "chaos-serpent" — a direct cognate of the banned
      "chaos-figure" — as the first_mention_gloss_candidate for Apep. The claims
      document body correctly avoids "chaos-figure" and "chaos-monster" throughout,
      using "isfet-personification" and "agent of disorder" instead; but the brief
      itself contains the banned-root compound "chaos-serpent" in the
      entities_glossary. This is a low-stakes violation in the brief (the brief
      is not published prose), but it could propagate into the chapter draft if
      the chapter-draft stage uses the brief's entities_glossary as a template
      for the first-mention gloss.
    evidence: >
      glossary.yaml, entry for "the adversary (category term)": never_use
      includes "chaos-figure (begs the question)" and "chaos-monster (same
      reason; the corpus is not uniformly 'chaos')". Brief 16-ra-apep.yaml,
      entities_glossary: "chaos-serpent" in first_mention_gloss_candidate for
      Apep. The claims document body correctly uses "isfet-personification"
      throughout.
    recommended_fix: >
      In brief 16-ra-apep.yaml, update the entities_glossary first_mention_gloss
      _candidate for "Apep / Apophis" to replace "chaos-serpent" with the
      claims document's approved formulation: "adversary of Ra; embodiment of
      isfet (disorder, injustice, the violation of order)." This ensures that
      the chapter-draft stage does not import the banned-root compound from
      the brief. The claims document body already models the correct formulation.

