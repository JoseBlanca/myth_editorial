findings:
  - id: FIND-01
    severity: LOW
    category: minor-compression-error | corpus-enumeration
    claim_anchor: line 322 (§V opening paragraph)
    description: |
      Ch37 line 322 says: "the seven core passages that Day 1985
      identifies as the Hebrew Bible combat corpus (Pss 74:12–17,
      89:9–13, 104:6–9 and 26; Job 26:12–13; Job 41; Habakkuk 3;
      Isa 51:9–10) refer to Yahweh's combat against Leviathan, Rahab,
      the Tannīn, and the sea **as a past accomplishment**, with
      verbs in past or perfective aspect".
    issue: |
      The "seven core passages" framing in Ch37 line 322 is internally
      inconsistent with the corpus enumeration that follows. Ch8
      claims-approved line 14 lists Day's seven-passage corpus as:
      Ps 74:12–17, Ps 89:9–13, Ps 104:6–9 with v. 26, **Isa 27:1**,
      Isa 51:9–10, Job 26:12–13 with ch. 41, and Hab 3 — counting
      Job 26+41 as ONE entry, with Isa 27:1 included. Ch37 line 322
      excludes Isa 27:1 from the parenthetical list (presumably
      because §V then treats Isa 27:1 as the eschatological exception)
      but separates Job 26:12–13 from Job 41 — yielding seven entries
      that are not Day's seven. The paragraph also asserts that all
      seven "refer... as a past accomplishment", which is incorrect
      under Day's framing where Isa 27:1 is the prospective exception
      within the seven. The compression conflates "Day's seven-passage
      corpus" (which includes Isa 27:1) with "the dominantly-
      retrospective subset of Day's corpus" (which excludes Isa 27:1).
    evidence: |
      From chapters/08-yahweh-leviathan-rahab.claims.approved.adoc
      line 14:
        "The seven passages on which the corpus is built are Psalm
        74:12–17, Psalm 89:9–13, Psalm 104:6–9 with verse 26, Isaiah
        27:1, Isaiah 51:9–10, Job 26:12–13 with chapter 41, and
        Habakkuk 3 — drawn from Psalms, Isaiah, Job, and Habakkuk in
        their canonical Hebrew Bible distribution."
      Ch8 lines 70 and 232 confirm that Isa 27:1 is included in the
      seven and is the principal eschatological-projection exception:
        line 70: "The passages that come closest to narrating combat —
        Psalm 74:13–14, Psalm 89:9–10, Isaiah 51:9–10 — do so in a
        few terse poetic lines that summarise rather than narrate, and
        that consistently use the perfect / preterite tense to refer
        back to a past event."
        line 232: "The grammatical aspect of Isaiah 27:1 is decisive
        for the interpretation of the corpus: the verb is future, 'on
        that day Yahweh will slay'."
    recommended_fix: |
      Either (a) re-frame the line as "the six dominantly-retrospective
      passages within Day's seven-passage corpus", or (b) keep "seven"
      but include Isa 27:1 in the parenthetical list and rephrase the
      "as a past accomplishment" gloss to acknowledge the Isa 27:1
      exception explicitly. Verbatim-substitutable replacement
      (option a):
        "the six dominantly-retrospective passages within the Hebrew
        Bible combat corpus that Day 1985 identifies (Pss 74:12–17,
        89:9–13, 104:6–9 with v. 26; Job 26:12–13 with ch. 41;
        Habakkuk 3; Isa 51:9–10) refer to Yahweh's combat against
        Leviathan, Rahab, the Tannīn, and the sea as a past
        accomplishment, with verbs in past or perfective aspect,
        recalled as a precedent for present action rather than
        projected forward as a future event; the seventh passage in
        Day's corpus, Isaiah 27:1, is the principal eschatological-
        projection exception treated below."

  - id: FIND-02
    severity: LOW
    category: minor-attribution-imprecision | edge-case
    claim_anchor: line 144 (§II Case 2 opening, Yarbro Collins 1976 ch. 4 attribution)
    description: |
      Ch37 line 144 footnote says: "Yarbro Collins 1976, ch. 4, on
      Rev 12 and Rev 20 as the bipartite articulation of the
      eschatological combat".
    issue: |
      Yarbro Collins 1976 is *The Combat Myth in the Book of
      Revelation* and chs. 2–4 develop the Rev 12 reading. Ch9
      claims-approved (which is the upstream Part-I anchor for Yarbro
      Collins 1976) does not surface a "Rev 12 + Rev 20 bipartite"
      framing for ch. 4 specifically; Ch9 line 280 attests that ch. 4
      treats Rev 12's "eschatological function" within an "end-of-
      times visionary narrative", and Ch9 line 386 attests ch. 4 as
      the "didactic-encouragement function" chapter. The bipartite
      Rev 12 + Rev 20 framing is more naturally located on Aune
      1997–98's WBC 52B–C verse-by-verse philological commentary than
      on Yarbro Collins 1976 ch. 4, since Yarbro Collins's monograph
      is centred on Rev 12. The Ch37 attribution is not invented — the
      monograph does treat Rev 20 in passing — but the loc-pointer
      "ch. 4" understates that the bipartite framing is principally
      Aune's contribution. This is a minor-attribution-imprecision
      that does not amount to fabrication.
    evidence: |
      From chapters/09-revelation-red-dragon.claims.approved.adoc
      line 280:
        "The combat between Michael and the dragon at Rev 12:7–9
        functions eschatologically: the chapter places the combat
        within an end-of-times visionary narrative... [Yarbro Collins
        1976, ch. 4, on the eschatological function]."
      Ch9 line 366 is the principal upstream attestation for the
      Rev 12 / Rev 20 / Frashokereti comparative framing:
        "Frashokereti's eschatological rebinding and final slaying of
        Aži Dahāka by Kərəsāspa is the closest non-Christian
        eschatological-combat structural parallel to Rev 12; the
        parallel feeds Part II C4 (Eschatological displacement)..."
      But Ch9's claims-approved does not develop Rev 20 binding-and-
      loosing material in detail (its scope is Rev 12).
    recommended_fix: |
      Optional, post-human-normalize. Either drop the "Yarbro Collins
      1976, ch. 4" half of the doubled token at lines 145–146 and
      keep only the Aune 1997–98 token, or qualify Yarbro Collins's
      contribution to be specifically about Rev 12's eschatological
      function (with Aune supplying the verse-by-verse Rev 20
      treatment). Verbatim-substitutable replacement of the line 144
      footnote:
        "Yarbro Collins 1976, ch. 4, on Rev 12's eschatological
        function within the end-of-times visionary narrative; Aune
        1997–98, commentary on Rev 12:7–9 and on Rev 20:1–10, on the
        binding-and-final-loosing structure that links the two
        chapters."

