summary: |
  Ch37 is a tightly-disciplined comparative chapter that delivers the
  eschatological-displacement subtype as the structurally-distinct
  fourth subtype of the chaoskampf typology, with three independent
  attestations (Norse Thor-Jörmungandr at Ragnarök; Christian-
  apocalyptic Michael-and-dragon at Rev 12 + Rev 20; Zoroastrian Aži
  Dahāka at Frashokereti) and one transitional Hebrew Bible precedent
  (Isa 27:1). All 15 unique source_ids resolve in sources.yaml and
  all 21 COMPARATIVE-HOOK chapter-references resolve in toc.yaml. Of
  the 94 paragraph-claims with 168 EVIDENCE tokens, 92 route through
  Part-I anchor source_ids that are documented to support the specific
  claim. All three [SPECULATION:] markers (lines 94, 302, 401) use
  the locked "counterargument:" third-pipe-field discipline established
  by Ch35 FIND-04 (a notable improvement over Ch35's pre-revision
  state and a sign that the lock has been correctly absorbed). The
  [VARIANT:] block at line 169 (Yarbro Collins vs. Aune on Rev 12) is
  well-formed with primary/alt/chosen=present-both/reason fields and
  is consistent with Ch9 claims-approved line 261's [VARIANT:]
  precedent. The [LACUNA:] block at line 183 (Pahlavi temporal-layering
  of Frashokereti material) is well-formed with source/scholarly_
  reconstruction fields and is consistent with Ch13 line 54's
  [LACUNA:] precedent. The two [INFERENCE:] blocks (lines 246, 367)
  use "risk:" as third pipe-field per inference-marker convention.
  Two LOW findings (one corpus-enumeration compression error on
  Day 1985's seven-passage corpus at line 322; one minor-attribution-
  imprecision on Yarbro Collins 1976 ch. 4 vs. Aune for the Rev 12 +
  Rev 20 bipartite framing at line 144) and four NOTE-level structural
  observations (Dumézil/Puhvel scholarly-context omission handled
  correctly via no-invented-source-IDs discipline; §II re-narration
  discipline well-followed; §VI cognitive-implications development is
  substantive rather than rephrasing; §IV doubled-token coverage is
  good). Most consequential single finding: FIND-01, the corpus-
  enumeration compression at line 322 — the line says "the seven core
  passages... refer to Yahweh's combat... as a past accomplishment"
  but excludes Isa 27:1 from the parenthetical and lists Job 26 and
  Job 41 as separate entries, which makes the seven-passage assertion
  internally inconsistent with Ch8's enumeration (where Isa 27:1 is
  in the seven and Job 26+41 is one entry). The fix is small and
  verbatim-substitutable. Per the verdict rule "PASS if zero HIGH and
  ≤3 MEDIUM; otherwise REVISE", the chapter has zero HIGH findings,
  zero MEDIUM findings, and only two LOW findings, which yields PASS.
  The chapter's comparative-typology discipline, the strict in-scope /
  out-of-scope citation-pairing on transmission claims, the correct
  framing of §I around the four-feature pattern, §IV around the
  charitable-without-over-committing transmission-vs-convergence
  treatment, §V around Isa 27:1 as transitional rather than principal,
  and §VI around the three-axis cognitive-functional reorientation,
  the resolved-source-IDs registry-check, the resolved-TOC cross-
  references, and the substantively-correct three-case per-tradition
  synthesis are all sound. The two LOW fixes may be applied in the
  post-human-normalize pass before the chapter advances to draft, but
  do not block PASS at this stage.
