            loc: "City of Sacrifice, chs. on the five Suns"
            identifier: "ISBN 9780807046425"
          - id: lopez-austin-myths
            loc: "The Myths of the Opossum"
            identifier: "ISBN 9780826313942"
        date_range: "Leyenda de los Soles (1558); Historia de los Mexicanos por sus pinturas"
        summary: |
          Across the five Suns, Quetzalcoatl and Tezcatlipoca alternate as rulers,
          toppling each other in succession; world-ages end in catastrophe and
          re-creation. A cosmogonic-political cycle, less a single chaoskampf than
          a rhythm of combats.
        variants: ["Significant variation across Mexica and other Nahua sources."]
        scope_uncertain: false
        identifier_missing: false

      - id: pariacaca-amaru
        title: "Pariacaca and the amaru"
        tier: related
        primary_chapter_type: full
        sources:
          - id: salomon-urioste-huarochiri
            loc: "Huarochirí Manuscript chs. 6, 8, 21 (Pariacaca and amaru passages)"
            identifier: "ISBN 9780292730533"
        date_range: "Huarochirí Manuscript c. 1608 (Quechua, recording oral tradition)"
        summary: |
          The storm-wak'a Pariacaca opposes, defeats, and integrates rival wak'as
          across the Huarochirí landscape. The amaru in these episodes is often a
          summoned ally-monster of the defeated rival — not a primordial chaos,
          but a figure of wak'a-succession.
        variants: ["Multiple episodes (not a single combat); treat as cycle."]
        scope_uncertain: false
        identifier_missing: false
        notes: "Andean specialists (Salomon, Taylor, Dean) read as wak'a-succession, not chaoskampf — preserve that framing."

      - id: mapuche-kai-tren
        title: "Kai-Kai vs. Tren-Tren"
        tier: related
        primary_chapter_type: family
        sources: []
        date_range: "Recorded 19th–20th c. from Mapuche oral tradition; tradition older"
        summary: |
          The marine serpent Kai-Kai raises the sea to drown the earth; the mountain
          serpent Tren-Tren raises the mountains in response to save the Mapuche.
          A two-serpent cosmogony that preserves a flood-and-height memory.
        variants: ["Regional Mapuche variations across Nguluche, Huilliche, Pehuenche."]
        scope_uncertain: false
        identifier_missing: true
        notes: "Primary ethnographic sources (Foerster; Koessler-Ilg; Bacigalupo) to be pinned at chapter-briefs."

  - id: africa
    name: "Africa"
    stories:
      - id: bida
        title: "Bida and the founding of Wagadu (the inversion)"
        tier: related
        primary_chapter_type: full
        sources:
          - id: conrad-west-africa
            loc: "Empires of Medieval West Africa, ch. on Ghana/Wagadu legend"
            identifier: "ISBN 9780816052622"
          - id: belcher-epic
            loc: "Epic Traditions of Africa, ch. on Soninke traditions"
            identifier: "ISBN 9780253212818"
        date_range: "Oral tradition recorded from 19th c. (Monteil, Dieterlen); tradition medieval"
        summary: |
          The seven-headed serpent Bida protects the Soninke city of Wagadu in
          exchange for an annual tribute of a young woman. When the bride's suitor
          Mamadi Sefe Dekote kills Bida, Wagadu is abandoned, the rains cease, and
          the people scatter. Slaying the serpent *ends* prosperity — the inverse
          of the standard chaoskampf outcome.
        variants: ["Multiple oral recordings differ on Bida's number of heads and the hero's lineage."]
        scope_uncertain: false
        identifier_missing: false
        notes: "Anchor case for the Part II inversion comparative chapter (scope-lock decision 2026-04-23). The 'reverse chaoskampf' reading is a modern comparativist overlay — flag this in the chapter."

      - id: mwindo-kirimu
        title: "Mwindo and Kirimu (the contrastive case)"
        tier: contrastive
        primary_chapter_type: full
        sources:
          - id: biebuyck-mateene-mwindo
            loc: "The Mwindo Epic, episode of Kirimu"
            identifier: "ISBN 9780520003767"
          - id: belcher-epic
            loc: "Epic Traditions of Africa, ch. on Mwindo"
            identifier: "ISBN 9780253212818"
        date_range: "Recorded from Nyanga oral performance 1950s–60s; tradition older"
        summary: |
          In the Mwindo epic, the hero kills the monstrous dragon Kirimu — and is
          then punished by the sky-god Nkuba for the killing. The moral valence is
          inverted from chaoskampf: the dragon-slaying is hubris, not order-making.
        variants: ["Biebuyck & Mateene 1969 primary text; Biebuyck later published additional Nyanga epics."]
        scope_uncertain: false
        identifier_missing: false
        notes: "Treated as a contrastive case: the reader sees what a very thorough combat-myth looks like when its moral frame refuses chaoskampf."

  - id: se_asia_oceania
    name: "Southeast Asia and Oceania"
    stories:
      - id: bakunawa
        title: "Bakunawa and the moons"
        tier: related
        primary_chapter_type: family
        sources: []
        date_range: "Visayan / Bikol oral tradition; recorded from 19th c., main scholarly collections 20th c."
        summary: |
          The serpent-dragon Bakunawa devours six of the seven original moons; to
          save the last, communities make ritual noise (drums, gongs, shouting) to
          drive the serpent off during eclipses. There is no hero who slays it —
          the combat is communal and recurring.
        variants: ["Visayan, Bikol, and other Philippine regional variants differ on details."]
        scope_uncertain: false
        identifier_missing: true
        notes: "Primary collections (Eugenio's Philippine Folk Literature series) to be pinned at chapter-briefs. Eclipse-aetiology, not hero-slaying."

