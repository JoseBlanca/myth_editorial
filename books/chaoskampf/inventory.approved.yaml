        variants: []
        scope_uncertain: true
        identifier_missing: true
        notes: "Treated as contrastive case (scope-lock decision 2026-04-23): the chapter foregrounds area specialists' refusal of the chaoskampf frame. Primary-text editions (Basil Johnston; Theresa S. Smith) to be pinned at chapter-briefs."

  # ── Part II material held here for completeness (no story-chapters attached) ──

  - id: critique
    name: "Methodological critique"
    stories:
      - id: rainbow-serpent-critique
        title: "The Rainbow Serpent problem (methodological chapter)"
        tier: critique
        primary_chapter_type: methods
        sources:
          - id: merlan-caging-rainbow
            loc: "Caging the Rainbow, chs. 1–3"
            identifier: "ISBN 9780824819668"
        date_range: "Radcliffe-Brown 1926 (critique target); Merlan 1998, Morphy 1991, Rose 1996, Keen 1994 (critique authors)"
        summary: |
          Radcliffe-Brown's 1926 paper consolidated distinct regional ancestral
          beings (Yingarna, Ngalyod, Wanambi, Wagyl, Yulunggul) into a pan-Aboriginal
          'Rainbow Serpent.' Later ethnographers and Aboriginal Studies scholars
          have dismantled this lumping. The chapter treats the Rainbow Serpent
          primarily as a case study in the limits of the chaoskampf category,
          not as a chaoskampf exemplar.
        variants: []
