        title: "Hou Yi and the suns"
        tier: related
        primary_chapter_type: family
        sources:
          - id: lewis-2006-flood
            loc: "The Flood Myths of Early China (Hou Yi / Yao cluster)"
            identifier: "ISBN 9780791466636"
          - id: birrell-1993
            loc: "Chinese Mythology, ch. on solar myths"
            identifier: "ISBN 9780801849954"
        date_range: "Chuci 'Tian wen' (c. 3rd c. BCE); Huainanzi; Shanhaijing"
        summary: |
          When ten suns rise together and scorch the earth, the archer Hou Yi shoots
          down nine of them and also slays monstrous beasts (the Chiseltooth, the
          Nine-headed Monster, the Zhuyin serpent). Order is restored under Yao.
        variants: ["Nine-beasts cluster varies across sources."]
