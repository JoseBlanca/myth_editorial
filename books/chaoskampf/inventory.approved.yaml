        date_range: "Reconstruction from Slavic folklore, medieval chronicles, and toponyms; Ivanov & Toporov proposed 1965–1974"
        summary: |
          On the Ivanov/Toporov reconstruction, the Slavic storm-god Perun pursues the
          cattle-stealing earth-serpent Veles through tree, rock, water, and livestock
          before striking him with lightning and releasing rain. The reconstruction
          is contested: Jakobson, Lajoye, Moszyński, and Kapović have all voiced
          methodological objections.
        variants: ["Fragments only; reconstruction, not attestation."]
        scope_uncertain: true
        identifier_missing: true
        notes: "Chapter must be explicit that this is reconstruction. Scope_uncertain flagged for the specific plot details."

      - id: dobrynya-zmey
        title: "Dobrynya Nikitich vs. Zmey Gorynych"
        tier: related
        primary_chapter_type: family
        sources: []
        date_range: "East Slavic byliny, recorded 19th c.; tradition medieval"
        summary: |
          In the Russian epic tradition, the bogatyr Dobrynya Nikitich kills the
          three-headed dragon Zmey Gorynych and rescues the princess. Treated by
          Ivanov & Toporov as the later bylina reflex of the Perun-Veles pattern.
        variants: ["Multiple recorded bylina variants."]
        scope_uncertain: false
        identifier_missing: true
        notes: "Primary-text edition (Oinas, Propp) to be pinned at chapter-briefs."

  - id: east_asia
    name: "East Asia"
    stories:
