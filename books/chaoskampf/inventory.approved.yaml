            loc: "Die Mythen des alten Japan (Orochi chapter)"
            identifier: "ISBN 9783406421648"
        date_range: "Kojiki 712 CE; Nihon Shoki 720 CE"
        summary: |
          Expelled from heaven, Susanoo descends to Izumo, where the eight-headed
          serpent Yamata no Orochi has eaten seven of an elderly couple's eight
          daughters. Susanoo intoxicates the serpent with eight vats of sake,
          dismembers it, and finds the sword Kusanagi in its tail — a founding
          regalia of the imperial line.
        variants: ["Kojiki single account; Nihon Shoki juxtaposes multiple 'one writing says' variants."]
        scope_uncertain: false
        identifier_missing: false
        notes: "Demoted from CORE (scope-lock 2026-04-23): Japanese specialists (Naumann, Isomae, Como, Ooms) frame as sword-etiology / metallurgical allegory, not chaoskampf. Chapter will treat the label as applied from outside."

      - id: erlik-ulgen
        title: "Erlik vs. Ülgen"
        tier: related
        primary_chapter_type: family
        sources: []
        date_range: "Altaic / Siberian oral traditions; 19th-c.–20th-c. ethnographic recordings"
        summary: |
          In Altaic and broader Turkic-Mongol mythology, the sky-god Ülgen opposes
          the underworld-god Erlik; the opposition is dualistic and cosmogonic
          rather than straightforwardly combat-resolved.
        variants: ["Heavy ethnographic variability across Altai, Buryat, Yakut."]
        scope_uncertain: true
        identifier_missing: true
        notes: |
          Eliade and Harva are scholarly anchors; primary ethnographic sources to
          be pinned at chapter-briefs. [INCLUSION-MARGINAL] Adversary is not
          serpentine — Erlik is the underworld-god, not a dragon. Kept RELATED as
          a dualistic-cosmology comparandum rather than a chaoskampf proper;
          chapter framing must flag this. Audit 2026-04-23 flagged the marginal
          fit; design decision (2026-04-23) is to keep RELATED with an explicit
          framing marker rather than moving to sidebar.

  - id: americas
