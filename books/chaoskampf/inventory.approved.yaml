        summary: |
          The water-god Gonggong, defeated in combat, strikes his head against Mount
          Buzhou; the pillar of heaven breaks and the world tilts. Nüwa repairs the
          sky with five-coloured stones. The combat-plus-repair frames the present
          asymmetry of the cosmos.
        variants: ["Huainanzi vs. Lienü zhuan variants; treat side by side."]
        scope_uncertain: false
        identifier_missing: false
        notes: "Combat-cosmogony distinct from Yu the Great's hydraulic ordering (Yu appears as sidebar, not core)."

