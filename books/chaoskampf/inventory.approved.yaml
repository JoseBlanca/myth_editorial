          gaining understanding of birdsong. The killing brings Sigurd the treasure
          but also the curse that will ruin him.
        variants: ["Eddic vs. Völsunga saga emphases; Nibelungenlied's Siegfried is a related Germanic witness."]
        scope_uncertain: false
        identifier_missing: false

      - id: beowulf-dragons
        title: "Beowulf vs. Grendel and the dragon"
        tier: related
        primary_chapter_type: family
        sources:
          - id: watkins-1995
            loc: "How to Kill a Dragon, Part V"
            identifier: "ISBN 9780195085952"
        date_range: "Beowulf manuscript (Cotton Vitellius A.xv), c. 1000 CE; composition earlier (7th–10th c.)"
        summary: |
          Beowulf kills the fen-dwelling Grendel and Grendel's mother at the Danish
          court, and — fifty years later, as an old king — is killed in turn slaying
          a treasure-hoarding dragon. Tolkien 1936 argued for the dragon as a
          properly mythic adversary; Watkins reads the poem's dragon-slaying
          vocabulary as a direct IE reflex.
        variants: []
        scope_uncertain: false
        identifier_missing: true
        notes: "Primary-text edition (Klaeber 4th ed., ed. Fulk/Bjork/Niles 2008) to be pinned at chapter-briefs."

      - id: lugh-balor
        title: "Lugh vs. Balor (Second Battle of Mag Tuired)"
        tier: related
        primary_chapter_type: family
        sources:
