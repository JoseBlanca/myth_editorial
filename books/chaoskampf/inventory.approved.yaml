        title: "Cipactli (dismemberment-cosmogony boundary case)"
        tier: related
        primary_chapter_type: family
        sources:
          - id: lopez-austin-myths
            loc: "The Myths of the Opossum, ch. on creation"
            identifier: "ISBN 9780826313942"
        date_range: "Histoyre du Mechique (c. 1543); Leyenda de los Soles (1558)"
        summary: |
          Tezcatlipoca and Quetzalcoatl pull apart the primordial earth-monster
