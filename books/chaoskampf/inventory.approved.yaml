        summary: |
          Thor and Jörmungandr meet three times: once in disguise at Útgarðaloki's hall,
          once in the fishing expedition with Hymir (the most iconographically dense
          Norse myth, carved on the Altuna, Hørdum, Gosforth, and Ardre VIII stones),
          and finally at Ragnarök, where Thor kills the serpent and staggers nine
          paces before dying of its venom. Skaldic kennings appear to preserve the
          Indo-European storm-god/dragon diction directly.
        variants: ["Hymiskviða: Hymir cuts the line; Húsdrápa (skaldic): Thor appears to behead the serpent; Ragnarök: Thor kills it and dies. Present as layered record."]
        scope_uncertain: false
        identifier_missing: false
        notes: "Eschatological-displacement subtype. Watkins reads the skaldic diction as a direct IE reflex."

