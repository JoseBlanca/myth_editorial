        variants: ["Historia Brittonum political allegory vs. Mabinogi ritual-annual frame."]
        scope_uncertain: false
        identifier_missing: true

      - id: batraz-nart
        title: "Batraz and the Nart combats"
        tier: related
        primary_chapter_type: family
        sources:
          - id: west-2007
            loc: "Indo-European Poetry and Myth (for Scytho-Alanic reflex)"
