h circumflex throughout Ugaritic cross-references (19 instances); tehôm italicised throughout body prose (12 instances); Tiamat without length-mark (9 instances). RSV preserved throughout biblical quotations; the single NRSV mention surviving in the source-overview historical-context note retained. No drift on canonical scope, on Day's broader Canaanite-religion thesis beyond the corpus, on Ballentine's wider book outside the seven passages, on etymological glosses beyond the claims, or on cultural-context expansions of psalm cult-settings."
