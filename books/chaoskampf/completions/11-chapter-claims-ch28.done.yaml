    performance, of the Soninke foundation-narrative tradition,
    and of the historical Ghana / Wagadu polity, rather than
    within the chaoskampf-typology register imported from Gunkel-
    tradition combat-myth scholarship. The area-specialist objection
    is to the typological assimilation of the Bida combat to the
    Eurasian chaoskampf category — to which the combat's structural
    features are inverted at every load-bearing point — rather than
    to the recognition of combat per se (the Mande-area tradition's
    framing of the narrative as covenant-and-consequence does
    accommodate the recognition of a serpent-and-hero combat). The
    chapter's load-bearing methodological move is to use the
    inversion reading as the heuristic that registers exactly this
    objection: the narrative is recognised as featuring serpent-
    and-hero combat but the typology of order-establishment that
    the chaoskampf category presupposes is registered as inverted
    in the Bida case, and the area-specialist framing of covenant-
    and-consequence converges on the same structural recognition
    that the slaying-ENDS-prosperity feature is load-bearing for
    the narrative — even though the framings reach this convergence
    by different routes. Position on the spectrum of objection-
    strengths: closer to the Pariacaca-cycle case (Ch26) — Salomon-
    Urioste-Taylor-Dean objection to chaos-order framing but not to
    combat-myth framing as such — than to the Susanoo case (Ch23) —
    Naumann/Isomae/Como objection to combat-myth framing as such in
    favour of metallurgical-allegory reading — but structurally
    distinctive in that the area-specialist tradition's covenant-
    and-consequence framing and the chapter's comparative inversion-
    of-chaoskampf framing converge on the same structural
    recognition. Forwarded to Part II C7 (inversion / transformation
    problem; ch. 40) as the principal load-bearing test case, with
    the methodological discipline that the inversion frame is to
    be held as a heuristic for cross-cultural reflection and that
    Part II C7 is to investigate whether the inversion frame
    ultimately obscures more than it reveals about the Soninke
    tradition's own framing — per brief 28-bida-wagadu.yaml
    special_instructions. Forwarded to Part II C8 (refusal and
    appropriation problem; ch. 41) for the comparative-engagement
    work of holding the chaoskampf typology loosely where Mande-
    area specialists object to its application. Marker placement:
    structural marker at the close of the inversion-of-chaoskampf-
    typology section, immediately after the inversion-as-
    comparativist-heuristic claim, per the Ch26 marker-placement
    template precedent.

