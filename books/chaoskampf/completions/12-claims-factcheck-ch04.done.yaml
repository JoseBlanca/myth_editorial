high_severity_findings:
  - id: FC-02
    description: >
      Wakeman 1973 attributed as arguing for Marduk as the champion of the
      Labbu fragment. No triangulable scholarship supports this attribution.
      The consistently reported scholarly identifications are Tishpak (later
      version) and Nergal (earlier version); Marduk appears only as a
      structural parallel in the literature, not as a proposed identification
      of the lacunose divine name. Wakeman 1973 is inaccessible for direct
      verification. Given the attribution runs contrary to all triangulable
      evidence, this is HIGH severity — potentially a misreading of Wakeman's
      comparative observation as an identification claim.

medium_severity_findings:
  - id: FC-01
    description: >
      Foster's section at p. 581 is titled "The Lion-Serpent" (subsection (b)
      of "Monster Serpents"), not "The Slaying of Labbu." The claims document
      uses "The Slaying of Labbu" as Foster's section title throughout.
      "The Slaying of Labbu" is Lambert 2013's chapter title (pp. 361-365)
      and the conventional scholarly name for the myth, not Foster's section
      heading. A bracketed qualifier at first mention resolves this.
  - id: FC-03
    description: >
      Blood-flow motif described in claims as "flows for some distance" —
      spatial language. The surviving text specifies a duration: "three years,
      three months, one day and one night." The characterisation as spatial
      rather than temporal is factually inaccurate.
  - id: FC-04
    description: >
      Labbu's length given as "fifty leagues" without noting the
      version-dependent variation: fifty leagues (Bašmu version) or sixty
      leagues (Mušḫuššu version). The chapter's stated commitment to
      presenting the textual situation honestly requires acknowledging this.
  - id: FC-05
    description: >
      Lambert 2013 repeatedly cited as "introduction" for Labbu material.
      Labbu is at pp. 361-365 in Part III, not the introduction. All four
      "Lambert 2013, introduction" citations across the claims document need
      correction to "Lambert 2013, pp. 361-365."

