notes: |
  Tricky decisions:

  (1) Citation-level discipline. Ogden 2013 chs. 11-12 are
  printed-only and not online; per brief, citation is at chapter
  level. WebFetch for Wikisource Legenda Aurea / Caxton was denied,
  so no verbatim Latin or English quotation is made of the Legenda
  Aurea text — the brief explicitly forbids inventing specific Latin
  readings. The Legenda Aurea is therefore cited at work level
  ("Legenda Aurea, Voragine, later 13th c.") through Ogden 2013
  ch. 11 as the scholarly anchor.

  (2) Princess-and-dragon as later accretion. The brief's
  self-check #7 demands this be treated as a documented LATER
  ACCRETION. The chapter handles this in three explicit claim
  paragraphs in the George section: (i) the early stratum is a
  pure martyr-narrative, dragon-less; (ii) the dragon-fight is
  attached by the 11th-12th centuries; (iii) the dragon-fight is
  not part of the historical or earliest-attested layer. The
  Perseus-Andromeda substrate is registered in the next claim
  paragraph as the documented Greco-Roman background.

  (3) [VARIANT:] placement. The brief allows VARIANT for the
  Passio S. Georgii recensions where they differ. One VARIANT
  marker is placed in the George section, cataloguing the BHL
  3363 / Acta Sanctorum Apr. III / Legenda Aurea recensional
  differences while affirming convergence on the standard medieval
  narrative shape. This is the cleanest place in the chapter to
  register recensional plurality without dispersing it across
  multiple claims.

  (4) [INFERENCE:] markers. Two inference markers, both at points
  where the chapter offers a synthetic reading that goes beyond
  what any single source attests: (i) at end of Michael section,
  flagging the Rev-12-direct-derivation reading versus the
  Danielic / Second-Temple-substrate alternative; (ii) in the
  reception-pattern section, flagging the coherent-iconographic-
  complex synthesis versus a more dispersed reading of independent
  iconographic developments.

  (5) Period-boundary on the Crusader-era expansion. The Crusader
  period (11th-13th centuries) is in-window by the brief's
  "late-antique-to-high-medieval" window. The chapter explicitly
  registers the Crusader-era spread of the cult of St. George as
  the historical context for the canonical iconographic form.
  Voragine's Legenda Aurea (later 13th c.) is also in-window;
  Renaissance reception is explicitly out-of-window (deferred to
  Ch42).

  (6) Forsyth 1987 chapter-level citation. Per brief, Forsyth is
  the secondary anchor for the Christian-afterlife framing.
  Forsyth's full volume is structured around the long combat-myth
  trajectory; the chapter cites Forsyth at "later chapters on the
  Christian afterlife" level for the framing claims, and at
  topic-specific levels for the harrowing section ("on the
  *Gospel of Nicodemus*", "on the *descensus* homilies",
  "on Christ-as-dragon-slayer", etc.). Forsyth's printed page
  numbers are not pinned at the present stage; this matches the
  brief's printed-source citation discipline.

  (7) The royal-legitimation inversion claim. One claim in the
  reception-pattern section names Marduk vs. Tiamat (Babylonian
  kingship legitimation) and Yahweh vs. Leviathan/Rahab (covenant
  theology) as the contrast cases against which the Christian
  inversion is registered. The cross-reference to chapters 3 and
  8 of the present volume is implicit; the claim is anchored to
  Forsyth 1987's treatment of the inversion. "Yahweh" is used in
  this passage per glossary v1.

  (8) Length. 67 claim paragraphs, within the brief's 50-70
  target. Distribution (overview 12 / Michael 15 / George 16 /
  harrowing 10 / pattern 10 / forward 4) tracks the brief's
  guidance (~10 / ~15 / ~15 / ~10 / ~10) closely with one extra
  claim each in source overview and George (the latter justified
  by the four-step accretion-and-substrate argument the section
  must make).
