  Treatment of the three family members:
  - St. Michael: 15 claims tracing the Rev 12 textual basis
    (Yarbro Collins 1976 on Rev 12:7-9 and 12:9), the late-antique
    cult development (Ogden 2013 ch. 11 on Monte Sant'Angelo / Monte
    Gargano, Mont Saint-Michel, Castel Sant'Angelo), and the
    iconographic codification (armoured warrior, spear, trampled
    dragon underfoot). Cult centres named per brief: Monte Sant'Angelo
    (Gargano), Mont Saint-Michel (Norman), Castel Sant'Angelo (Roman
    plague-procession reidentification). The single [INFERENCE:]
    flags the Rev-12-direct-derivation reading versus a Danielic /
    Second-Temple-substrate alternative.
  - St. George: 16 claims separating (i) the historical core /
    Diocletianic martyr-narrative, (ii) the early dragon-less passio
    stratum (BHL 3363, Acta Sanctorum Apr. III), (iii) the dragon-
    fight episode as documented later 11th-12th-c. accretion, and
    (iv) the Greco-Roman Perseus-Andromeda substrate of the rescue
    pattern. The princess-and-dragon episode is registered explicitly
    as a LATER ACCRETION onto the original passio (per brief
    self-check #7) and as having a documented Greco-Roman substrate.
    The single [VARIANT:] catalogues recensional differences across
    BHL 3363, Acta Sanctorum Apr. III, and Voragine's Legenda Aurea
    (later 13th c.) while affirming the standardised high-medieval
    narrative shape. Crusader-era cult expansion (11th-13th c.) and
    the iconographic codification (mounted soldier-saint with lance)
    are registered.
  - Christ's harrowing of hell: 10 claims on the Gospel of Nicodemus
    (Acta Pilati / Descensus Christi ad Inferos), the patristic
    homiletic tradition on the descensus, the draconic-devil
    iconography of harrowing scenes, the Christ-as-dragon-slayer
    typology, and the structural relation among Michael, George, and
    the harrowing (saintly deputy / angelic deputy / Christ direct).
    Forsyth 1987 is the principal anchor for this section.

