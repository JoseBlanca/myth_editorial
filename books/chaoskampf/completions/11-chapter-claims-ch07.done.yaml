summary: "Chapter 7 (Baal vs. Yamm and the Defeat of Lôtan — the Ugaritic Baal Cycle) claims skeleton: 137 claim paragraphs distributed as 22 source overview, 17 setting and divine assembly, 33 Movement I (Baal-Yamm at KTU 1.1-1.2), 29 Movement II (palace-building at KTU 1.3-1.4), 14 Lôtan passage (KTU 1.5 i 1-3 as retrospective allusion, no narrativised combat), 6 Mot context, 14 Gunkel-Ballentine debate, 7 reception and forward links. Two LACUNA markers (KTU 1.1 throughout per brief; KTU 1.5 i 1-3 Lôtan combat not preserved per brief). One INFERENCE on the juridical-political pattern of Movement I. One VARIANT on the Smith-Pitard treatment of Lôtan vs. older harmonising readings. Four COMPARATIVE-HOOKs (Day 1985 Lôtan/Leviathan continuity → Ch8; Ballentine 2015 rival-sovereignty pivot → Part II C2; Ayyamur/Yagrush ↔ Šarur as areal feature → Ch1/Ch2; Phoenician-mediated Zeus-Typhon transmission → Ch11/Part II C6). Sources used: smith-1994-baal-i, smith-pitard-2009-baal-ii, day-1985, ballentine-2015, forsyth-1987, gunkel-1895, wakeman-1973, lambert-2013, west-1997, burkert-1992 — all whitelisted in sources.yaml."
notes: |
  Gunkel-Ballentine handling: the debate has its own dedicated
  === section with 14 claims, presenting Gunkel 1895 as the historical
  anchor of the Chaoskampf category and Ballentine 2015 as the
  on-text rival-sovereignty critique that the chapter substantively
  adopts. The four on-text observations grounding Ballentine's
  reading (Yamm = "sea" without primordiality marker; El's initial
  conferral of kingship on Yamm; Yamm / Judge River juridical title;
  no cosmogonic creation in the post-combat narrative) are each
  presented as separate claims. Smith 1994 / Smith & Pitard 2009 are
  cited for the kingship-as-Cycle-spine reading that aligns with
  Ballentine. Day 1985 is preserved within Ballentine's framework on
  the linguistic-and-narrative cognancy front (ltn ↔ lwytn) without
  adopting Day's cosmogonic-chaos category for the Ugaritic material.

  Lôtan passage handling: per the explicit brief guardrail, Lôtan is
  treated strictly as an allusion in Mot's retrospective taunt at
  KTU 1.5 i 1-3. The combat itself is NOT narrativised in the chapter.
  The named figure, the seven-headed-serpent description, the brḥ
  ("fleeing") and ʿqltn ("twisting") epithets, and the linguistic
  cognancy with Hebrew Leviathan are presented as Ugaritic facts; the
  combat-narrative is explicitly flagged as not preserved in a LACUNA
  marker, and no Hebrew Bible / Mesopotamian / Greek parallel material
  is imported to fill it. ʿAnat's parallel catalogue at KTU 1.3 iii
  (the seven-headed serpent in her victories) is recorded with a
  VARIANT noting the older harmonising reading vs. the current
  Smith-Pitard treatment as separate textual moments.

  Mot context: kept brief at 6 claims per the brief's "few claims to
  mark its place" instruction. The Baal-Mot material is acknowledged
  as the wider Cycle's second half and as the immediate setting of
  the Lôtan reference, but is explicitly not narrativised as a second
  chaoskampf. The agricultural-calendar reading is recorded with the
  Smith-Pitard caution that the Cycle does not present it as
  calendrical-ritual aetiology in the explicit way Hittite *purulli*
  does for Illuyanka.

  WebFetch usage: none. The brief authorises WebFetch for a
  freely-available ctr-ugaritic / OTH transcription if found, but I
  declined to attempt this rather than risk inventing sub-line
  Ugaritic readings from training data. The chapter cites at KTU
  tablet/column resolution exclusively (e.g., "KTU 1.2 iv
  commentary"), per the brief's explicit fallback authorisation.
  Sub-line readings have not been imported into the skeleton, and a
  note in the source-overview section flags that any later
  densification at sub-line resolution will be VERIFIED against the
  printed Smith / Smith & Pitard editions at the chapter-draft stage.

  Glossary discipline (v1-locked 2026-04-24):
  - Baʿlu / Haddu at first mention; Baal in body prose thereafter.
  - Yamm throughout (Ugaritic context); the Yamm / Judge River
    epithetic pair recorded as ym / ṯpṭ nhr.
  - Lôtan with circumflex throughout, with the unvocalised ltn given
    once for the cognancy ltn ↔ lwytn argument.
  - Mot with no diacritical change.
  - Kothar-wa-Khasis at first mention; Kothar acceptable thereafter.
  - El throughout (not "ʾIlu" in body).
  - ʿAnat with ʿayin diacritic throughout.
  - Ayyamur / Yagrush both named, with the meaning-glosses ("Driver",
    "Chaser") recorded once.
  - Ṣapānu with under-dot at first mention; Mount Zaphon noted as
    Hebrew-Bible reception form; Jebel al-Aqra given as the modern
    geographical identifier.
  - Tannīn with macron in the Hebrew-Bible cross-reference.
  - tehôm with circumflex in the Hebrew-Bible cross-reference.
  - "the adversary" used as neutral category term where needed;
    "chaos-figure" appears only in mention-not-use context (recording
    that the term is banned per Ballentine's critique).
  - Yahweh (not YHWH) in Hebrew-Bible cross-references.
  - Cross-reference Mesopotamian / IE diacritics: Enūma Eliš, Ninurta,
    Šarur, Anzû, all rendered with full scholarly diacritics.

  Tricky decisions:
  (1) Athtart's intervention at KTU 1.2 iv is recorded as a textual
      crux (rebuke or warning) without committing to a single reading,
      since Smith's commentary discusses both possibilities.
  (2) ʿAnat's KTU 1.3 ii slaughter scene is recorded for its detail
      (blood up to thighs, severed heads at belt) but the referent of
      the slaughter is left open per Smith and Pitard's commentary.
  (3) The window-of-the-palace debate is given two claims because the
      Smith-Pitard reading of openness-vs-fortified-residence is a
      load-bearing interpretive moment for the kingship reading.
  (4) The two-stage combat pattern (Yagrush insufficient, Ayyamur
      decisive) is noted as a structural-typological parallel to the
      Anzû Epic without making any transmission claim.

