notes: |
  Tricky decisions:

  (1) Bible-text citation chain. Direct WebFetch of ebible.org/ASV
  was denied. Per the Ch08 fallback pattern (Bible Gateway / Sefaria
  denial), every verbatim Bible-text quotation is footnoted as
  "NRSV translation of Rev 12:X, as quoted in Yarbro Collins 1976,
  ch. 2; Aune 1997–98 (WBC 52B), commentary on Rev 12:X". Both
  Yarbro Collins (using NRSV / RSV) and Aune (using his own
  translation against the NA28 Greek with NRSV citations) supply
  the citation chain for the Bible text. The brief explicitly
  authorised this fallback: "If WebFetch is denied (as for Day 1985
  in Ch8), default to citing biblical text 'as quoted in Yarbro
  Collins 1976 / Aune 1997–98' with the translation identified."
  NRSV is the chosen translation for consistency with Ch08 (Yahweh-
  Leviathan-Rahab); Aune's own translation against NA28 is named
  in source-overview claim 14 as the alternative scholarly
  translation chain.

  (2) [VARIANT:] vs. [INFERENCE:]. The brief is explicit: VARIANT
  is reserved for the YC-vs-Aune scholarly disagreement
  (single-prevalent classification per brief.variants); INFERENCE
  is for synthesis claims that bridge the two readings. One VARIANT
  marker is placed at the close of the Aune section, registering
  the disagreement as the chapter's principal scholarly variant. One
  INFERENCE marker immediately follows the VARIANT, registering the
  meta-observation that the disagreement is methodological (how to
  rank streams) rather than evidential (what counts as evidence).
  This preserves the brief's distinction between scholarly variant
  and analytic inference.

  (3) Single-prevalent classification interpretation. Per brief, YC
  is the prevalent treatment because it is a dedicated dissertation-
  length monograph with explicit comparative apparatus. Aune is the
  alternate because his verse-by-verse commentary format offers a
  different organising principle without overturning YC's
  philological observations. The chapter respects this hierarchy in
  citation distribution (YC cited ~70%, Aune cited ~50%, with
  overlap on most paragraphs) but does NOT adjudicate the
  substrate-vs-composite question — both readings are presented as
  serious scholarly framings, with the points of agreement
  (descriptive philological observations) and disagreement (how to
  rank the streams) explicitly catalogued.

  (4) Rev 12:9 double-gloss treatment. Per brief, the double-gloss
  is "a textual datum, not an inference" — Rev 12:9 itself supplies
  both the "ancient serpent" (Genesis 3 / Leviathan tradition) and
  "Satan / the devil" glosses in immediate apposition. The
  textual-exposition section dedicates four consecutive paragraphs
  to Rev 12:9 and its glosses, treating each gloss as a separately
  attested fact rather than as an inferred identification. The
  inference about which intertext is primary (Genesis 3 vs.
  Leviathan tradition) is registered as a separate paragraph, with
  the chapter following the brief's instruction to read them as
  parallel rather than alternative identifications.

  (5) The inverted-royal-legitimation observation. Per brief, this
  is load-bearing: the male child's enthronement at Rev 12:5
  precedes the combat at Rev 12:7–9, so the combat enacts a
  kingship already secured rather than establishing kingship. The
  combat-myth-function section dedicates three claims to this
  inversion (the inversion observation; the contrast with Marduk-
  Baal-Zeus-Indra cosmogonic-kingship combats; the linkage to the
  didactic-encouragement reading). The chapter explicitly identifies
  this as a "distinctive contribution to the combat-myth tradition
  rather than a simple repetition" of the inheritance.

  (6) Domitianic dating context. Per brief, this is the
  specifically Yarbro Collins reading rather than a settled
  consensus. The chapter registers Domitianic dating as supported
  by patristic testimony from Irenaeus and reinforced by internal
  evidence (source-overview claim 11) before developing the
  political-historical reading (YC reading section claims 9–11) as
  one specific application of the dating that Yarbro Collins's
  monograph develops. Aune's commentary accepts the dating without
  developing the political-historical reading at the same length.

  (7) The Frashokereti / Iran comparative hook. Per brief, this is
  a forward-link to Part II C4 (Eschatological displacement) rather
  than a developed parallel within the chapter. The reception
  section flags the structural parallel and explicitly notes that
  the question of Persian influence on Jewish-Christian apocalyptic
  is referred to the Part II comparative chapter rather than
  adjudicated here. The Aži Dahāka and Kərəsāspa names with full
  diacritics are used per glossary v1.

  (8) The Apollo-Python forward link. Per brief, the
  Leto-Apollo-Python material is treated in detail in the Part I
  "Greek dragon-combats after Zeus-Typhon" family chapter (cluster
  4 per scope.md). The present chapter cites the Greek myth
  specifically as Yarbro Collins's comparand (with Hyginus / Apollo-
  dorus textual sources named) and refers detailed treatment of the
  myth itself to that family chapter, with Fontenrose 1959 as the
  scholarly anchor. The connection feeds Part II C6 (Near Eastern
  → Mediterranean transmission) per scope.md.

  (9) The Egyptian Isis-Horus-Set treatment. Aune's third stream
  is presented at the level of structural correspondence (the
  Khemmis-flight episode, the Isis-pursued-by-Set / pregnant-mother
  parallel) without developing the underlying Egyptian material in
  detail; that material is referred to its place in the book's
  geographic Part I structure (cluster 7, Ra/Apep with Horus/Seth
  as the debated adjacent case).

  (10) The Michael / George iconography forward link. Per brief,
  this feeds Ch10 ("Christian reception of Rev 12 imagery"). The
  reception section registers Michael trampling the dragon as one
  of the most widespread post-classical motifs in Christian visual
  culture (Ogden 2013 ch. 11 cited as the scholarly anchor) and
  explicitly defers detailed treatment to Ch10. The St. George
  hagiographic tradition is registered as a parallel reception-
  figure of the Rev 12 dragon-slayer pattern.
