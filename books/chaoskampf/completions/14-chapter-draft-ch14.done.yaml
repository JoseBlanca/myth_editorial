summary: "Narrative draft of Chapter 14 (Indra vs. Vṛtra: The Splitting of the Mountain) in Asimov-register prose built from the 141 approved claims drawn from Jamison and Brereton 2014 (Rigveda translation), Watkins 1995 (How to Kill a Dragon, chs. 41-48), Benveniste and Renou 1934 (Vṛtra et Vṛθragna), West 2007 (Indo-European Poetry and Myth, ch. 6), Forsyth 1987 (Old Enemy, ch. 2), and Lambert 2013 (Babylonian Creation Myths). Full-chapter (CORE) treatment with eight major sections (source overview, hymn-cycle method, setting and Vedic religious context, Movement I — RV 1.32 spine, Movement II — seven supplementary hymns, Movement III — Watkins HERO SLAY SERPENT formula, cosmological-but-not-cosmogonic reading, post-Vedic brahminicide reframing, Indo-Iranian cognancy and forward links). All 141 footnotes, 141 // EVIDENCE: tokens, 2 INFERENCE markers, 2 VARIANT markers, and 4 // COMPARATIVE-HOOK comments preserved unchanged from the claims document — one-claim → one-paragraph → one-footnote → one-EVIDENCE-token structure strictly maintained throughout. Source overview (15 paragraphs) names Jamison and Brereton 2014 as anchor translation (superseding Griffith), Watkins 1995 as IE poetic anchor (chs. 41-48), Benveniste and Renou 1934 as Indo-Iranian foundational anchor, West 2007 ch. 6 as IE storm-god/water-dragon anchor, Forsyth 1987 ch. 2 as wider combat-myth anchor, and Lambert 2013 as Mesopotamian comparand reference; identifies the eight-hymn working corpus (RV 1.32, 1.80, 2.11-12, 4.18, 5.32, 6.17, 8.96, 10.113); flags Rigvedic philological reliability and the narrative-not-philological lacuna requiring hymn-cycle reconstruction; closes with five-stage transition. Hymn-cycle method section (10 claims): liturgical-genre framing; ritual-allusive mode contrasted with continuous narrative epics (Enūma Eliš, Anzû Epic, Baal Cycle); INFERENCE marker on hymn-cycle method as methodological synthesis preserved; variation-as-genre vs. corruption; cosmogonic-effect distribution across hymns; Watkins's parallel hymn-cycle method; genre-difference from post-Vedic Brāhmaṇa and Mahābhārata flagged; signposting commitment; as-reconstructed status. Setting section (12 claims): Indra as most-frequently-invoked deity; warrior-king and chief of the gods; soma sacrifice (yajña centred on soma plant); soma-drinking as immediate prelude to combat; Tvaṣṭṛ as divine artisan and forger of vajra; vajra as thunderbolt-mace; vajra as cosmic combat-weapon mythologising lightning-strike; tripartite Vedic pantheon (sovereign-priestly Varuṇa-Mitra / warrior Indra-Maruts / producer-fertility Aśvins-Pūṣan); Indo-European storm-god/waters complex (West ch. 6); Vṛtra as obstructing serpent from Sanskrit vṛ- 'to obstruct'; semantic transparency of Vṛtra name; ahi as the áhann áhim serpent-term; Dānu as Vṛtra's mother and danāva-class; ritual-aetiological function in soma sacrifice. Movement I — RV 1.32 (24 claims): hymn metadata (15 verses, first maṇḍala, attribution to Hiraṇyastūpa Āṅgirasa); opening áhann áhim formula at vv. 1-2; vajra-wielder framing; four cosmogonic-effect verbs in v. 2 (slew, split, released, opened); seven rivers (saptá síndhavaḥ); Tvaṣṭṛ-vajra in v. 2; soma-prelude at vv. 3-4; Vṛtra mountain-form at v. 5; bhid- splitting as dual killing-and-cosmogonic act; Vṛtra's reciprocal strike at v. 5; killing-blow at v. 6; body-and-water tableau at v. 7; Dānu cow-and-calf simile at v. 9; maternal-grief moral acknowledgment; water-cascade at v. 10; heaven-earth (dyaus and pṛthivī) and dawn (uṣas) at vv. 11-12; triple cosmogonic effect; sovereignty at vv. 13-14; ritual closure at v. 15; fifteen-verse arc structural summary; ritual-allusive framing; full motif inventory; primary witness status; absence of body-as-cosmos episode (contrast with Enūma Eliš IV); cosmologically-active-but-not-cosmogonic textual backbone; absence of brahminicide motif. Movement II — supplementary hymns (19 claims): RV 1.80 strophic refrain and áhann áhim co-witness; RV 2.11 gods' acclamation tableau; RV 2.12 sá janāsa índraḥ refrain and identifying-deeds mode; RV 4.18 embryonic-Indra and irregular sideways-birth; RV 4.18 biographical pre-history; RV 5.32 obstruction-and-release piercing-and-opening language; RV 6.17 cosmic-scale and three-tiered cosmos; RV 8.96 vṛtrahán cult-title concentration; vṛtrahán/Vərəθraγna cognancy (Wahrām/Bahrām); RV 10.113 cosmogonic-integration; RV 10.113 as late-corpus reflex; seven distinct emphases summary; spine-and-supplements consistency; motif-selection variation; motifs absent from RV 1.32; three modes of enrichment (cosmogonic frame / biographical pre-history / gods'-acclamation); eight-hymn evidentiary base; Vala-myth no-merge with structural family-resemblance; VARIANT marker on eight-hymn vs. wider Indra-combat corpus preserved. Movement III — Watkins formula (14 claims): formula as IE HERO SLAY SERPENT poetic line; RV 1.32.2 as principal Vedic attestation; structural elements (subject/aorist verb/serpent-object) and figura etymologica of áhan/áhim; figura preservation across IE comparanda; cross-language attestations (Hittite Tarḫunna-Illuyanka, Greek Apollo-Python, Norse Thor-Jörmungandr, Iranian Thraētaona-Aži Dahāka); formal-poetic vs. content-narrative status; Indra/Vṛtra as anchor case in chs. 41-48; deferral of cross-cultural reflexes to Part II C5; wide attestation across Vedic; actively productive status as evidentiary weight; formula plus vṛtrahán cult-title as principal Vedic combat-vocabulary; forward-link to Part II C5; Watkins's reconstruction as scholarly synthesis; chapter-level deferral per brief instructions; twin role of formula in poetics and comparative discipline. Cosmological-but-not-cosmogonic section (16 claims): triple cosmogonic effect (heaven-earth separation in RV 1.32.11-12 and RV 10.113; water-release in RV 1.32.2 and RV 5.32; dawn-production); strong-sense cosmological activity; absence of body-as-cosmos vs. Enūma Eliš IV; founding-of-cosmos vs. founding-of-cosmos-operation distinction; INFERENCE marker on typological framing as editorial synthesis preserved; typology consequence for Part II C1; distinctions from Hittite Kumarbi-Ullikummi (sovereignty-succession), Greek Zeus-Typhon (sovereignty-confirmation), Norse Thor-Jörmungandr (eschatological); strongest cosmologically-active position without crossing to body-cosmogonic; body-in-watercourse but-not-body-as-cosmos image; mountain-form-and-water tableau (West ch. 6); slain adversary's body comparison; Indo-Iranian comparand with chapter 13 Thraētaona-Aži Dahāka; diagnostic features summary; pre-existing-cosmos vs. primordial-waters-only setting; resistance to Mesopotamian assimilation; principal typological contribution; structural family-resemblance real but transmission undemonstrable (West 2007); ritual-aetiological function in soma sacrifice. Post-Vedic brahminicide reframing section (10 claims): principal exemplars Śatapatha Brāhmaṇa 1.6.3-4 and Mahābhārata Udyogaparvan 9-18; ritual-pollution narrative in Brāhmaṇa; extended brahminicide-and-expiation narrative in Mahābhārata Udyogaparvan; entity-difference between Rigvedic and post-Vedic Vṛtra; VARIANT marker on Rigvedic-primary vs. post-Vedic-as-clearly-marked-later-transformation preserved; cultural-centrality evidence from post-Vedic reworking; clearly-bounded sub-section per no-merge rule; forward-link to Ch15 (Vedic family chapter, including bhakti-period Krishna-Kāliya); moral-status transition tracking classical Indian ethics development; no-merge rule on doctrinal-assumption difference; chapter's brief-and-bounded treatment summary. Indo-Iranian cognancy and forward-links section (12 claims): ahi/aži phonological cognancy from common Indo-Iranian *ajhi-; áhim/aži shared serpent-vocabulary; Trita Āptya/Thraētaona cognancy; Trita Āptya as older Indo-Iranian combat-figure partially displaced by Indra; back-link to Ch13 Aži Dahāka; vṛtrahán/Vərəθraγna (Verethragna) cognancy as inherited Indo-Iranian combat-cult; two cognancies establish Indo-Iranian phase as language-historical fact; forward-link to Ch15 (Vedic family chapter — Trita Āptya, Brāhmaṇa-Mahābhārata, Krishna-Kāliya); forward-link to Part II C1 (cosmologically-active-not-cosmogonic-from-the-body typology); forward-link to Part II C5 (HERO SLAY SERPENT anchor case); intersection-of-threads position; closing observation that Vedic Vṛtra-combat is both Watkins's anchor case and typologically distinctive cosmologically-active combat. Glossary discipline: Indra (Devanagari इन्द्र) glossed at first mention; Vṛtra (Sanskrit वृत्र) glossed at first mention with vṛ- etymology; Tvaṣṭṛ (Sanskrit त्वष्टृ) glossed at first mention; Soma (Sanskrit सोम) glossed at first mention; Dānu (Sanskrit दानु) glossed at first mention; Trita Āptya (Sanskrit त्रित आप्त्य) glossed at first mention; vajra italicised throughout; soma italicised when referring to drink; ahi italicised; áhim italicised in formula context; áhann áhim formula italicised; vṛtrahán italicised; Vərəθraγna with proper diacritics; Aži Dahāka with proper diacritics; Thraētaona with proper diacritics; saptá síndhavaḥ italicised; sá janāsa índraḥ italicised; vīryà italicised; parvata italicised; bhid- italicised; dyaus and pṛthivī italicised; uṣas italicised; yajña italicised; maṇḍala italicised; śākhā italicised; Brāhmaṇa with proper diacritic; Mahābhārata with proper diacritics; Śatapatha Brāhmaṇa with proper diacritics; Enūma Eliš italicised with proper diacritics; full diacritics throughout (Vṛtra, Dānu, Hiraṇyastūpa Āṅgirasa, Tvaṣṭṛ, Aṅgiras, Aśvins, Pūṣan, Maruts, Varuṇa, Aži Dahāka, Vərəθraγna, Thraētaona, etc.). Forbidden words: zero hits on shimmering, ancient-as-ornament, mystical, unfathomable, primordial-as-ornament (one functional 'primordial waters' in Mesopotamian context only, contrastive), ineffable, sacred-as-filler, mighty, fearsome, dread, eternal, boundless, infinite, veiled, shrouded. Forbidden openings: zero hits on 'Long ago...', 'In the time before time...', 'It is said that...'. One-claim/one-paragraph structure: each claim-paragraph in the approved claims document corresponds to exactly one narrative paragraph in the chapter, with the same trailing footnote and the same // EVIDENCE: token on the next line; only the body of each paragraph has been rewritten in Asimov-register prose; markers (INFERENCE, VARIANT) carried over verbatim; comparative hooks at end carried over verbatim. Inherited-drift watchlist applied: zero genealogical / reception / etymological / cross-reference / cultural-context expansions beyond claims; no Vedic textual material beyond the eight Vṛtra-hymns; Rigvedic combat preserved as primary object with post-Vedic brahminicide reframing as clearly-bounded sub-section per brief no-merge rule."
