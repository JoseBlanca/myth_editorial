    pre-conquest performance contexts and the wider iconographic
    record (the Codex Borgia and other Borgia-group pictorial
    codices, the Aztec Sun Stone) are partially recoverable
    through the post-conquest texts and through the surviving
    pre-conquest pictorial sources. Sources: brief 25-mesoamerican-
    cluster.yaml special_instructions; Histoyre du Mechique
    (c. 1543), Leyenda de los Soles (1558), Historia de los
    Mexicanos por sus pinturas (c. 1530s–1540s), Florentine Codex
    (1545–1590); López Austin 1993. Scholarly_reconstruction:
    corroborative material from the pre-conquest Borgia-group
    pictorial codices and from the Aztec Sun Stone (late pre-
    conquest, Museo Nacional de Antropología) supplies parallel
    non-textual witnesses to the post-conquest alphabetic texts.

  INFERENCE × 2:
    (a) The Cipactli narrative's structural relationship to other
        Mesoamerican cosmogonic narratives places it within a
        wider pan-Mesoamerican family of dismemberment-cosmogonies
        with parallels in the Maya Popol Vuh's Zipacná and
        Cabrakán episodes per López Austin 1993. Basis is López
        Austin 1993's wider Mesoamerican-comparative framework.
        Risk is that the precise extent and historical-and-cultural
        depth of the pan-Mesoamerican pattern is itself a
        comparative argument and the chapter's reading is a
        synthesis rather than a single source-attested formulation.
    (b) The Aztec Sun Stone supplies a pre-conquest non-textual
        witness that confirms the broad outlines of the five Suns
        sequence as preserved in the post-conquest Leyenda de los
        Soles, supplying a partial control on the post-conquest
        filtering issue analogous to the Templo Mayor evidence's
        control on the Coatepec narrative in Ch24. Basis is
        Carrasco 1999 and López Austin 1993's reading of the Sun
        Stone's iconographic programme as the pre-conquest Mexica
        statement of the five Suns sequence in stone. Risk is that
        the iconographic interpretation of the Sun Stone's four
        panels as the four prior Suns and of the central face as
        Tonatiuh is itself a post-conquest scholarly reading
        dependent on the post-conquest textual record; alternative
        readings identify the central face as Tlaltecuhtli, and
        the parallel-non-textual-witness argument therefore reduces
        but does not eliminate the post-conquest-filtering risk.

