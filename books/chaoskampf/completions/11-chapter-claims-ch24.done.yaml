    los Mexicanos por sus pinturas, from Durán's Historia, and from the
    archaeological evidence at Templo Mayor (Coyolxauhqui stone, serpent-
    headed balustrades, structural layout) supplies parallel witnesses
    treated by Matos Moctezuma 1988 and Carrasco 1999 as confirming the
    broad outlines of the prevalent Florentine Codex Book 3 version.

  INFERENCE × 3:
    (a) The chapter reads Templo Mayor architecture, Coyolxauhqui
        stone, Panquetzaliztli festival, and Mexica sacrificial practice
        as four converging witnesses to a single integrated ritual-
        architectural-iconographic-narrative complex centred on the
        Coatepec narrative — flagged as the chapter's editorial synthesis
        of Matos Moctezuma 1988 and Carrasco 1999; basis is the
        independent attestation of the four lines of evidence; risk is
        that a stronger reading would treat the four witnesses as
        separately constituted phenomena that converge only contingently.
    (b) The chapter's reading of the Coatepec narrative as the most
        unambiguous single case of state-founded combat-cosmogony in
        the present book — flagged as an editorial synthesis of the
        brief's framing and the converging Matos Moctezuma 1988 and
        Carrasco 1999 readings; basis is the integration of cosmic-
        narrative, ritual, architecture, and state-political identity;
        risk is that comparative judgements of "the most unambiguous
        single case" are necessarily relative to the comparison-set
        and to the analyst's reading-criteria, with alternative readings
        available.
    (c) The chapter's combat-cosmogony reading of the Coatepec
        narrative is robust against the post-conquest-filtering risk
        because the architectural and iconographic evidence at the
        Templo Mayor is independent of the Spanish-friar textual
        redaction — flagged as a chapter-level methodological argument
        with reduce-but-not-eliminate scope; basis is Matos Moctezuma
        1988's argument that the Coyolxauhqui stone (Stage IV phase
        mid-fifteenth century CE pre-conquest) and the architectural
        design pre-date the post-conquest textual redaction; risk is
        that the iconographic interpretation and architectural
        identification are themselves post-conquest scholarly readings
        dependent on the post-conquest textual record.

