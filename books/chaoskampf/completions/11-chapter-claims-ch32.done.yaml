ng that the refusal-as-position is itself a comparativist-and-meta-comparativist construction that must be held at appropriate distance from a 'rebuttal of the chaoskampf framing on Anishinaabe terms' register; one [LACUNA] marker registers the absence of pre-contact attestations and the continuing-tradition textual-witness situation; one [VARIANT] marker registers the co-equal treatment with explicit refusal-to-synthesise of a single authoritative narrative per brief variants.classification. The chapter is the BOOK'S MOST METHODOLOGICALLY SENSITIVE CHAPTER IN PART I per brief special_instructions and is forwarded to Part II C8 (refusal and appropriation problem; ch. 41) as the BOOK'S CLEAREST CASE of the refusal sub-problem in its strongest form (refusing the combat framing as such, distinct from the moral-valence-refusal of Ch29 Mwindo and the outcome-valence-inversion of Ch28 Bida), with the chapter setting up Part II C8 as its theoretical consummation."
