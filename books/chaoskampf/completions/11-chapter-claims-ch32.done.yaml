  LACUNA × 1: pre-contact (i.e., pre-17th-century) attestations of
    the Nanabozho / Mishipeshu / Thunderers material in any
    Anishinaabe-indigenous-script form are not available, since the
    Anishinaabe languages had no pre-contact alphabetic or syllabic
    writing system; pictographic attestation (Agawa Rock pictographs
    at Lake Superior Provincial Park) preserves figural
    representations that current scholarship including Smith 1995
    reads as Mishipeshu-figure pictographs but that cannot be dated
    precisely or read as narrative-text attestations in the
    philological sense; pre-17th-century European-language attestations
    are not available, with the earliest substantive attestations
    beginning in the Jesuit Relations of the 17th century and the
    fur-trade and missionary accounts of the 18th and 19th centuries
    — none of which is treated as a primary source by current
    Anishinaabe-area scholarship since the colonial-mediation problem
    is acute and is foregrounded in current scholarship as itself a
    methodological topic. Source: brief 32-nanabozho-mishipeshu.yaml
    on the Anishinaabe oral-tradition material's regional variability
    and the chapter's NOT synthesising a single authoritative
    narrative; Hallowell 1960 on the textual witness situation and on
    the Berens River fieldwork; Smith 1995 introductory matter on the
    textual-witness situation and on the colonial-mediation problem;
    Johnston 1990 [1976] on the Anishinaabe-authored continuing-
    tradition register; Vizenor 1989 on the Indigenous-studies
