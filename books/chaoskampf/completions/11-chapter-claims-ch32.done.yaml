    of Anishinaabe ontology and cosmography (Hallowell's "other-than-
    human persons" framework; the relational-and-reciprocity-grounded
    moral universe; the Thunderer / Underwater-manitou dialectic of
    the layered cosmography), Anishinaabe-authored insider self-
    representation (Johnston's *Ojibway Heritage* and *The Manitous*),
    Indigenous-studies methodological refusal of Western-typological
    assimilation (Vizenor's "Trickster Discourse"), and the
    continuing-tradition transmission within named contemporary
    Anishinaabe communities (the Mide lodge tradition; the
    *aadizookaanag* sacred-story register; Anishinaabe-language
    continuing-transmission), rather than within the chaoskampf-
    typology register imported from Gunkel-tradition combat-myth
    scholarship. The area-specialist objection is the strongest in
    the present book — a refusal of the combat framing as such, not
    a refusal of the moral valence (as in the Ch29 Mwindo contrastive
    case) or of the outcome valence (as in the Ch28 Bida inversion
    case): the Anishinaabe tradition's own framing places Mishipeshu
    and the Thunderers in a relational-and-reciprocity-grounded
    register that is incommensurable with the chaos-vs-order register
    the typology presupposes, with the necessary-counterpart-not-
    adversaries reading of the Thunderer / Underwater-manitou
    dialectic being the load-bearing structural feature of the
    refusal. The chapter's load-bearing methodological move is to use
    the contrastive-case reading as the heuristic that registers
    exactly this refusal: the chaoskampf typology's combat-pattern
    recognition is not affirmed as load-bearing for the Anishinaabe
    tradition (the surface elements of combat in some narrative
    variants are present but are not the load-bearing structure of
    the narrative), and the typology's chaos-vs-order register is
    registered as incommensurable with the Anishinaabe ontological
    framework. Position on the spectrum of objection-strengths:
    strongest in the present book, operating more strongly than the
    Mande-area Bida-case objection in Ch28 (covenant-and-consequence
    framing whose convergence with the inversion frame is structural
    rather than explicit) and more strongly than the Nyanga-area
    Mwindo-case objection in Ch29 (maturation-through-humiliation
    framing whose narrative explicitly punishes the killer but holds
    the surface combat-pattern recognition); the Anishinaabe-area
    objection refuses the combat framing as such by placing the
    manitouk in a relational-and-reciprocity-grounded register that
    is incommensurable with the typology's chaos-vs-order register,
    with the trickster-discourse register of the Nanabozho cycle
    further refusing the heroic-narrative typology that the chaoskampf
    typology presupposes. Forwarded to Part II C8 (refusal and
    appropriation problem; ch. 41) as the BOOK'S CLEAREST CASE of
    the refusal sub-problem in its strongest form per brief
    32-nanabozho-mishipeshu.yaml special_instructions on the chapter
