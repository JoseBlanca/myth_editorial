  - FC-02 MEDIUM (unverified, line 98): wedjat eye re-attribution.
    Before: "Seth tears out one of Horus's eyes (the *wedjat* eye, conventionally
            the lunar left eye), and Horus in turn injures Seth's testicles..."
    After:  "Seth tears out one of Horus's eyes (the left, conventionally the
            lunar eye; subsequently restored by Thoth as the *wedjat*, the
            'sound eye'), and Horus in turn injures Seth's testicles..."
    Footnote updated: "on the *wedjat* eye and the testicle-injury as the
    principal mutilation-references" → "on the lunar left eye and the
    testicle-injury as the principal mutilation-references, with the
    torn-out eye becoming the *wedjat* (the 'sound/healthy one') only after
    Thoth's restoration."
    Rationale: standard Egyptological usage, wedjat (wḏꜣt) = "the
    sound/healthy one" = the eye AFTER Thoth's healing. Calling the
    torn-out eye "the wedjat eye" at the moment of extraction reverses
    the canonical Egyptological sequence. Fix preserves correct order:
    eye is torn out (left/lunar) → restored by Thoth → becomes wedjat.

