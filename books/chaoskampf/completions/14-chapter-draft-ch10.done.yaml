summary: "Narrative draft of Chapter 10 (St. George, St. Michael, and the Christian Reception): Asimov-register prose built from the 67 approved claims drawn from Ogden 2013 (chs. 11-12), Yarbro Collins 1976, and Forsyth 1987. Family-chapter (related-tier) treatment with three reception nodes (Michael / George / Christ-harrowing) plus reception-pattern synthesis and forward-links sections. All 67 footnotes, 67 // EVIDENCE: tokens, 2 INFERENCE markers, 1 VARIANT marker, and 3 // COMPARATIVE-HOOK comments preserved unchanged. Source overview gives 12 paragraphs naming Ogden 2013 as scholarly anchor, Yarbro Collins 1976 on Rev 12, and Forsyth 1987 on the long combat-myth trajectory; flags identifier-pinning deferral to glossary-lock and post-medieval deferral to Ch42 reception coda. Michael section (15 claims): Rev 12:7-9 substrate, Daniel-Second-Temple background, late-antique cult development, three cult sites (Monte Sant'Angelo / Mont Saint-Michel / Castel Sant'Angelo), Byzantine and Latin iconographic codification of trampled-dragon motif, INFERENCE marker on Rev 12 derivation vs angelological retrieval. George section (16 claims): Diocletianic martyr historical core, dragon-less earliest passio (BHL 3363), 11th-12th-c. dragon-fight accretion correctly framed, Perseus-Andromeda Greco-Roman substrate (forward to Ch12), Silene/Libya folktale setting, VARIANT marker on BHL/Acta Sanctorum/Legenda Aurea recensional differences, Legenda Aurea date c. 1260 preserved per factcheck correction, Crusader-era spread, mounted-saint iconographic type. Harrowing section (10 claims): Gospel of Nicodemus / Descensus apocryphal narrative, militant-entry framing, draconic-devil iconography, patristic homiletic tradition, Christ-as-dragon-slayer typology, structural relation among Michael (angelic deputy) / George (human deputy) / Christ (direct), soteriological ground for saintly-angelic combats. Reception-pattern section (10 claims): preserved cosmic-combat structure, Rev 12 dragon-as-devil identification, eschatological framing distinguishing Christian inheritance from cosmogonic versions, INFERENCE on unified iconographic complex, royal-legitimation inversion (Marduk-Tiamat / Yahweh-Leviathan-Rahab cross-refs), iconographic transmission breadth, soteriological reframing, princess-rescue as Greco-Roman, biblical-eschatological + Greco-Roman folkloric confluence. Forward-links section (4 claims): Ch12 Perseus-Andromeda, Ch9 Rev 12, Ch42 post-medieval coda, period-boundary affirmation. Period-boundary discipline maintained: zero Renaissance / heraldry / modern national-iconography material in body. Dragon-fight-on-George correctly framed throughout as documented 11th-12th-c. accretion onto original Diocletianic martyr-passio. Glossary discipline: Michael, St. George, the dragon, Latin titles italicised on first mention (Legenda Aurea, Acta Sanctorum, passio, Gospel of Nicodemus, Descensus, Passio S. Georgii, descensus ad inferos, Acta Pilati, Descensus Christi ad Inferos, vita), Perseus / Andromeda for Greek cross-ref, Yahweh in royal-legitimation cross-ref, the adversary as neutral term, zero hits on chaos-figure. No inherited drift: no Renaissance expansions, no modern national-iconography material, no etymological glosses beyond claims."
