  APPROPRIATION-FLAG × 1: Andean-studies area specialists (Frank
    Salomon and George L. Urioste in the 1991 critical edition;
    with the further area-specialists Gérald Taylor in his Lima
    IFEA critical edition of the Huarochirí Manuscript and
    Carolyn Dean on Andean ritual-political imagination, named
    in the brief's special_instructions) read the Pariacaca cycle
    as wak'a-succession (the displacement of one hegemonic regional
    wak'a by another within an already-existing wak'a-cosmography)
    rather than as chaoskampf in the strong cosmos-versus-chaos
    sense; the area-specialist objection is to the chaos-order
    framing rather than to combat-myth framing as such, since
    the cycle does narrate combat between named divine figures
    and a wak'a-political reorganisation does follow from the
    combat-outcome. The brief's special_instructions explicitly
    characterise the case as "milder than Nanabozho/Mishipeshu"
    because the area-specialist reading does accommodate some
    combat-myth framing — just not the chaos-order framing —
    placing the Pariacaca cycle on the spectrum of area-specialist
    objection-strengths between the Naumann objection in Ch23
    (which objects to combat-myth framing itself in favour of
    sword-etiology and metallurgical-allegory) and the Hallowell-
    Johnston-Smith-Vizenor objection in Ch32 (which rejects
    combat-and-defeat-of-the-other framing entirely in favour of
    necessary-counterpart-dialectic framing). Forwarded to Part
    II C7 (inversion / transformation) and Part II C8 (refusal
