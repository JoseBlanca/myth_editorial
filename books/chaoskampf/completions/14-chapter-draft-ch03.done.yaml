notes: >-
  Length: 13,525 words, 605 lines, within the 13,500–14,500 target. Brief special_instructions
  warned "Do not compress" and gave 14,000 as the target; the chapter was first drafted at a
  one-claim-per-paragraph density (~7,950 words) and then thickened by merging claims into
  longer connected paragraphs and adding connective-tissue sentences that draw out
  implications already in the claims rather than introducing new facts. No factual additions:
  every assertion in the body traces to an approved claim. Decisions worth flagging:
  (1) The Gunkel/Ballentine debate is treated as a body section per the brief, not a
  footnote, and the chapter does not adjudicate the question — the variant marker
  records the editorial decision to carry both readings. The chapter explicitly notes that
  the alternative-sovereign reading does not require dissolving the cosmogonic dimension
  Gunkel identified, since Tiamat occupies both registers simultaneously. (2) The
  fifty-names framing follows the claims doc's four thematic clusters (rule/exorcism/creation;
  combat/victory; cosmic-ordering; older-gods-prerogatives), with Anu's bestowal of the
  number fifty marked as the conceptual capstone (Annus). (3) Three movement-bridge
  paragraphs and one closing-summary paragraph were added to give the seven-tablet structure
  scaffolding, all summarising material already covered without introducing new facts.
  Inherited drift carefully avoided: no Asag-style genealogical glosses; no
  Nippur-as-religious-centre asides; no Ashurbanipal-also-gave-us-Gilgamesh expansions;
  no Forsyth-scope-expansions beyond what the claims explicitly state. Where a gloss might
  have seemed natural (e.g., explaining what hepatoscopy is, or why Enlil's number-fifty
  matters numerologically beyond what the claims say), the gloss was omitted. The two
  Sumerian-form mentions ("Enki", "Abzu") appear only in metalinguistic notes that
  explicitly contrast them with the Akkadian forms, per glossary requirements.
