    song-and-knowledge as the load-bearing mode of subjugation;
    brief special_instructions classification of the chapter as a
    *transformed variant* with the explicit instruction that the
    chapter does NOT claim Iku-Turso fits chaoskampf cleanly; Siikala
    2002's reading of the encounter as a transformed shamanic
    binding within the wider Finnic shamanic complex; brief's
    cultural_relevance.cross_cultural_parallels on the "subjugate-
    not-slay" transformation as the encounter's distinctive
    structural-and-modal feature. Risk: the *transformed variant*
    characterisation is a comparativist framing that the area-
    specialist Finnic-folklore-studies tradition (Siikala, Honko,
    DuBois, and others) does not necessarily adopt in its own
    register; Siikala's principal register is the shamanic-mythic-
    image framework rather than the chaoskampf-typology framework,
    and the *transformed variant* characterisation is a comparativist
    heuristic that holds the rune-tradition material against an
    external (Eurasian-chaoskampf) typology; the chapter's task is
    to hold the *transformed variant* characterisation as a
    comparativist framing that registers the area-specialist register
    rather than as a tradition-internal characterisation, with the
    methodological discipline of the appropriation protocol at
    scope.md §"Appropriation protocol" point 3 applied to the chapter
    even though the appropriation protocol's principal force is for
    non-Eurasian rather than for European-area material.

  VARIANT × 1: ONE [VARIANT] marker per the brief's two-layer
    structure — co-equal presentation of (A) the older rune-tradition
    material — the body of 19th-century rune-collection records made
    by Lönnrot, Europaeus, Ahlqvist, Genetz, Julius and Kaarle Krohn,
    and other rune-collectors from Karelian, Ingrian, and Finnish
    singers between approximately the 1820s and the early 20th
    century, archived in the SKS Folklore Archives in Helsinki and
    synthesised in the Finnish Literature Society's multi-volume
    *Suomen Kansan Vanhat Runot* edition (1908-1948 + index
    volumes), in which the Iku-Turso material is laconic, fragmentary,
    distributed across distinct genre-registers (incantation-against-
    sickness, longer narrative-rune, lyric), and recorded from named
    singers in named villages including Arhippa Perttunen of
    Latvajärvi in Viena Karelia and Ontrei Malinen of Vuonninen, with
    the figure of Iku-Turso appearing both as a personification of
    disease-bearing power from the sea (in incantation-against-
    sickness material) and as a sea-monster who emerges from the
    depths and is subjugated by Väinämöinen's song (in narrative-
    rune material) AND (B) Elias Lönnrot's 1835 / 1849 *Kalevala* —
    the composite literary-editorial synthesis published in the 1835
    *Vanha Kalevala* (32 cantos) and the much-expanded 1849 *Uusi
    Kalevala* (50 cantos) which became the standard text — in which
    the Iku-Turso material is reshaped by Lönnrot to serve the
    *Kalevala*'s overall narrative architecture, integrated with the
    wider *Kalevala* narrative arc (especially with the Sampo-cycle
    and the Pohjola material), and presented in continuous-narrative
    form rather than as the laconic-and-distributed material of the
    older rune-tradition record. Chosen: BOTH (co-equal presentation
    per brief special_instructions). Reason: per brief 31-vainamoinen
    -iku-turso.yaml variants.classification co-equal and brief
    special_instructions explicit specification — the two layers are
    kept explicitly distinct rather than collapsed because the
    methodological point of the chapter — that the *Kalevala* is a
    19th-century editorial synthesis rather than a transparent
    record of older Finnic tradition — depends on holding the layers
    apart at the narrative-presentation level. The chapter's
    narrative work proceeds in two phases: first the older rune-
    tradition material on its own laconic-and-distributed terms,
    then the Lönnrot editorial synthesis as a 19th-century
    compositional layer that reshapes the older material for the
    modern national epic.

