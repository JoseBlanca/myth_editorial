  LACUNA × 1: pre-conquest written-prose attestations of the Kai-
    Kai / Tren-Tren cycle are not available; pre-contact Mapuche
    record-keeping was oral rather than alphabetic; the surviving
    textual witnesses are all post-conquest compositions filtered
    through Spanish-language transcription (Rosales SJ ~1670;
    Núñez de Pineda ~1673; Lenz; Latcham 1924; Augusta-Moesbach
    1934-36; Koessler-Ilg 1962). Pre-contact ritual contexts
    (ngillatun communal ritual; machi shamanic practice; oral
    epew and nütram narrative-and-history performance) partially
    recoverable through these post-conquest textual sources,
    through twentieth- and twenty-first-century ethnographic
    fieldwork in still-active Mapuche communities, and through
    archaeological evidence at ritual sites in south-central
    Chile and southern-cone Argentina. Source: brief 27-mapuche-
    kai-tren.yaml on the post-conquest filtering caveat;
    Koessler-Ilg 1962 introductory matter on the oral-tradition
    character; Foerster 1993 on the textual situation.
    Scholarly_reconstruction: yes — chapter's narrative
    reconstruction proceeds within the body of Mapuche oral-and-
    ethnographic record itself, taking Koessler-Ilg 1962 as
    principal narrative anchor and Foerster 1993, Bacigalupo
    2007, Course 2011, and Faron 1964 as area-specialist
    secondary anchors; cross-tradition reconstruction is excluded
    per scope.md §"Reconstruction policy" point 1; the modern
    ethnographic record (still-active ngillatun ritual; ongoing
    machi practice; oral narrative still in performance) supplies
    a continuing-tradition witness that distinguishes the Mapuche
    situation from the more strictly archival situations of the
    Eurasian chapters in the present book.

  INFERENCE × 1: the chapter's reading of the Kai-Kai / Tren-Tren
    cycle's principal narrative work as cosmogonic-cataclysm-
    within-existing-cosmos (the flood-and-height crisis within an
    already-populated Mapuche world, with the cycle's outcome
    being landscape-reconfiguration and ritual-foundation rather
    than cosmos-establishment-ex-novo) rather than as cosmogonic
    combat in the strong cosmos-versus-chaos sense — flagged as
    a synthesis of the brief's framing, of Foerster 1993's
    cosmographic framework, of Course 2011 and Bacigalupo 2007's
    contemporary anthropological readings, and of Faron 1964's
    mid-twentieth-century structural-ritual reading; basis is
    the brief's explicit classification of the cycle's pattern
    as a two-serpent cosmogony that "does not map cleanly onto
    chaoskampf", Foerster 1993's development of the cosmogonic-
    cataclysm reading via the Wenu / Naq / Minche Mapu framework,
    and Bacigalupo 2007 / Course 2011 / Faron 1964's convergence
    on the ngillatun-ritual-foundation reading; risk is that
    older twentieth-century structuralist treatments tended to
    assimilate the Kai-Kai / Tren-Tren material to a cosmos-
    versus-chaos pattern (Latcham 1924's foundational synthesis
    is sometimes read in that comparativist register), and the
    chapter's cosmogonic-cataclysm-within-existing-cosmos reading
    is the area-specialist consensus per the brief but is not
    the only available scholarly position.

  VARIANT × 0: regional variants are co-equal per brief
    27-mapuche-kai-tren.yaml variants.classification, listed as
    separate attributed claims in the Regional variants section
    without a [VARIANT:] marker per the skill instructions on
    co-equal variant handling.

  APPROPRIATION-FLAG × 1: Mapuche-studies area specialists (Rolf
    Foerster González 1993; Ana Mariella Bacigalupo 2007; Magnus
    Course 2011; Louis C. Faron 1964; with Ricardo E. Latcham
    1924's *La organización social y las creencias religiosas
    de los antiguos araucanos* as the foundational early-
    twentieth-century precursor named in body prose without a
    sources.yaml entry per the named-but-flagged pattern of Ch23
    FC-02 and Ch26 FC-02) read the Kai-Kai / Tren-Tren cycle as
    cosmogonic-cataclysm-within-existing-cosmos and ngillatun-
    ritual-foundation rather than as chaoskampf in the strong
    cosmos-versus-chaos sense. The substance of the area-
    specialist objection is that the cycle's two-serpent
    structure (no hero-figure; no kill-and-eradicate outcome;
    non-divine human population as narrative beneficiary-centre)
    and cataclysm-within-already-existing-cosmos framing do not
    match the cosmos-versus-chaos opposition that the Gunkel-
    tradition chaoskampf-typology presupposes; the cycle's
    narrative work is the foundational-charter establishment of
    the ngillatun ritual life and the legitimisation of Mapuche
    territorial occupation of the elevated southern-cone
    landscape rather than the cosmogonic establishment of cosmic
    order from primordial chaos. Tier-implication: the area-
    specialist objection-strength is comparable to the Ch26
    Pariacaca case (where Salomon-Urioste-Taylor-Dean read the
    cycle as wak'a-succession rather than chaos-versus-order
    combat) — both mid-spectrum objections accommodating some
    combat-myth framing while objecting to the chaos-order
    framing — and milder than the Ch32 Nanabozho case (where
    Hallowell-Johnston-Smith-Vizenor reject combat-and-defeat-of-
    the-other framing entirely in favour of necessary-counterpart-
    dialectic framing). Forwarded to Part II C7 (inversion /
    transformation; ch. 40) and C8 (refusal and appropriation;
    ch. 41) for the comparative-engagement work that scope.md
    §"Appropriation protocol" point 2 requires of the comparative
    chapters; the present chapter functions as a worked instance
    of the appropriation-protocol's outside-framing requirement
    at scope.md §"Appropriation protocol" point 3.

  RECONSTRUCTION × 0: no [RECONSTRUCTION] marker in this chapter;
    the Mapuche material's distinctive textual-record situation
