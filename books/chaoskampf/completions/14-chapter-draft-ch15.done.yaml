 c. CE; VARIANT marker on present-all-three witnesses preserved verbatim; narrative occasion in BP 10.15 (sickening of cattle and herd-boys); the kadamba-tree leap and the nāga-coiling attack in BP 10.16; the dance-resolution (Kāliyamardana) in BP 10.16; the non-lethal subjugation, nāgapatnīs' intercession, and conditional sparing in BP 10.16-17; first transformation: subjugation for killing as genuine structural transformation; kṛpā power-compassion devotional reading; līlā framing as second principal transformation; child-hero substitution and avatāra doctrinal exhibit; iconographic centrality of Kāliyamardana / Kāliyadamana in temple sculpture, painted manuscripts, and popular prints; iconographic stability across Gupta-era to twenty-first-century Indic visual culture; preservation of the water-release pattern in transformed form (third transformation); INFERENCE marker on the structural-functional reading of water-release preservation as comparative reading preserved verbatim; cosmological-to-local reduction (third transformation, scale); cosmological-and-ritual to devotional-and-narrative frame-transformation (fourth transformation, register); coexistence rather than replacement of the Rigvedic combat; distinction from the post-Vedic Indra-Vṛtra brahminicide reframing of chapter 14; nāga vs. ahi adversary-category distinctness; nāga moral-personhood evidence in Kāliya's expulsion-rather-than-annihilation and nāgapatnīs' intercession; developed dance-on-the-heads iconography; forward-looking Vaishnava theological reading of the combat as gracious chastisement and līlā; four-fold transformation thesis (warrior → child-hero, killing → subjugation, cosmological → local, ritual → devotional); long-arc productive plasticity of the tradition. Family pattern and forward-links section (10 claims): Trita and Krishna sub-cases bracket the Indra-Vṛtra flagship in historical-genealogical depth; genealogical-and-arc-shaped (not synchronic) reading; INFERENCE marker on the three-moment genealogical scheme as editorial synthesis preserved verbatim; Trita-Thraētaona cross-tradition forward-link to chapter 13; Trita comparative forward-link to Part II C5; Krishna-Kāliya forward-link to chapter 31 (transformed combat-variants alongside Väinämöinen-Iku-Turso); Krishna-Kāliya back-link to chapter 14; productive-template reading; chapter's two-part contribution to the present book; long-arc bracketing as documentary support for the long-arc reading. Glossary discipline: Trita Āptya (Sanskrit त्रित आप्त्य) glossed at first mention; Kāliya (Sanskrit कालिय) glossed at first mention; nāga (Sanskrit नाग) glossed at first mention; līlā (Sanskrit लीला; 'sacred play') glossed at first mention; soma italicised throughout; haoma italicised; ahi italicised; nāga and nāgapatnīs italicised; kadamba italicised; vaṃśī italicised; kṛpā italicised; avatāra italicised; Kāliyamardana / Kāliyadamana italicised; maṇḍala italicised; khila italicised; Harivaṃśa, Viṣṇu Purāṇa, Bhāgavata Purāṇa, Mahābhārata, Śatapatha Brāhmaṇa with proper diacritics and italicised as text-titles; Aži Dahāka, Thraētaona, Vərəθraγna with proper diacritics; full diacritics throughout (Trita Āptya, Kāliya, Vṛtra, Yamunā, Brindavan/Vraja, etc.). Forbidden-word check: zero ornamental hits on shimmering, mystical, unfathomable, ineffable, mighty, fearsome, dread, eternal, boundless, infinite, veiled, shrouded, ancient-as-ornament, primordial-as-ornament. The single 'sacred' occurrence is the literal dictionary gloss of līlā ('sacred play'), preserved verbatim from the claims document and from the Vaishnava theological tradition's own English translation convention; not ornamental filler. Forbidden openings: zero hits on 'Long ago...', 'In the time before time...', 'It is said that...'. One-claim/one-paragraph structure: each claim-paragraph in the approved claims document corresponds to exactly one narrative paragraph in the chapter, with the same trailing footnote and the same // EVIDENCE: 