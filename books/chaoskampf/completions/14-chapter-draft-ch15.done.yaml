summary: "Narrative draft of Chapter 15 (Vedic and Post-Vedic Reflexes — Trita Āptya, Krishna/Kāliya) in Asimov-register prose built from the 77 approved claims drawn from Jamison and Brereton 2014 (Rigveda translation), Benveniste and Renou 1934 (Vṛtra et Vṛθragna; Trita-Thraētaona cognancy), Watkins 1995 (How to Kill a Dragon, Part V chs. 41-48; chs. 44-45 on Trita-Thraētaona), West 2007 (Indo-European Poetry and Myth, ch. 6), Forsyth 1987 (Old Enemy, ch. 2; long-arc Indian framing), and Tagare 1976-78 (Bhāgavata Purāṇa book 10 chs. 15-17, principal narrative-detail anchor). Family-chapter (composite-editorial) treatment with two clearly-bounded sub-sections: Trita Āptya and the three-headed serpent (older Indo-Iranian stratum, RV 10.99.6 + RV 1.105 + RV 2.11.19-20, Trita-Thraētaona cognancy), and Krishna and Kāliya — bhakti-era reworking (Harivaṃśa c.4th c. CE, Viṣṇu Purāṇa book 5 c.5th c. CE, Bhāgavata Purāṇa 10.15-17 c.9th-10th c. CE). The two sub-cases are organised by their position in the long arc of the Indian tradition (pre-Indra Indo-Iranian / post-Vedic bhakti-era) and bracket the Indra-Vṛtra flagship of chapter 14. All 77 footnotes, 77 // EVIDENCE: tokens, 4 INFERENCE markers, 1 VARIANT marker, and 4 // COMPARATIVE-HOOK comments preserved unchanged from the claims document — one-claim → one-paragraph → one-footnote → one-EVIDENCE-token structure strictly maintained throughout. Source overview (15 paragraphs) names Jamison and Brereton 2014 as Rigveda anchor, Benveniste and Renou 1934 as Indo-Iranian cognancy anchor, Watkins 1995 Part V as Indo-European-poetic anchor (with chs. 44-45 on the Trita-Thraētaona pair specifically), West 2007 ch. 6 as wider IE storm-god/water-dragon anchor, Forsyth 1987 ch. 2 as long-arc Indian anchor, and Tagare 1976-78 as principal Bhāgavata Purāṇa narrative anchor; identifies the Trita-cluster hymns (RV 10.99.6, 1.105, 2.11.19-20) and the three Krishna-Kāliya texts (Harivaṃśa, Viṣṇu Purāṇa book 5, Bhāgavata Purāṇa 10.15-17)