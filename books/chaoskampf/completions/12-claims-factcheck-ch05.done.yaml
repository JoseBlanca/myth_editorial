medium_severity_findings:
  - id: FC-01
    description: >
      Bull-name error: the claims document names Teshub's bulls 'Šeri and
      Tella.' The standard pair is Šeri and Ḫurri. In the Song of Ullikummi
      specifically, the second bull is Tilla (a regional variant attested in
      Nuzi texts), not Tella. 'Tella' is not an attested form of either name.
      This is a factual error requiring correction before chapter-draft.
  - id: FC-02
    description: >
      The claim that the Kumarbi Cycle 'is preserved without an explicit
      liturgical or festival rubric' is slightly overstated. A ritual text
      (KUB 44.7) associates at least the Song of the Sea with performance at
      Mount Ḫazzi. The comparison with Enūma Eliš/akītu remains valid but
      the absolute statement needs qualification.
  - id: FC-03
    description: >
      The attribution to Annus 2001 specifically of the label 'tripartite
      combat structure as the standard pattern of the Mesopotamian combat-myth'
      is sub-section granularity in a print-only cuneiform-text edition. The
      structural observation is sound; the specific attribution to Annus needs
      softening to avoid fabrication risk.

