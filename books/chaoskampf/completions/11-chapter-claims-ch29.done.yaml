summary: "Ch29 Mwindo and Kirimu (the Contrastive Case) claims skeleton — 48 claim paragraphs across seven sections (source overview; the Banyanga, the forest world, and the epic's setting; Mwindo's birth, growth, and early feats; the Kirimu episode — provocation, hunt, and killing; the punishment — Nkuba's lightning and the celestial humiliation; the maturation-through-humiliation reading — the tradition's own framing; the contrastive case — refusal of the chaoskampf valence; typology, area-specialist framing, and forward-links) covering the contrastive-case-tier (full) treatment of the Nyanga oral epic in which the hero Mwindo kills the dragon Kirimu in the forest and is then struck down by the sky-god Nkuba and taken up to the celestial realm where he is humiliated, instructed, and returned chastened — a narrative whose own moral-didactic framing (maturation-through-humiliation, reciprocal balance between human and spirit worlds, sky-god's authority over the hero) explicitly refuses the chaoskampf typology's order-establishing valence by punishing rather than celebrating the dragon-killer. The chapter opens with the Nyanga tradition's own framing before invoking the comparative chaoskampf category, per brief special_instructions and scope.md §Appropriation protocol; one [APPROPRIATION-FLAG:] marker registers the Nyanga-area / Bantu-and-African-oral-epic-studies area-specialist (Biebuyck, Mateene, Belcher, Hale, Ngandu Nkashama, Mulokozi, Bird) objection to typological-assimilation of the Mwindo / Kirimu episode to the Eurasian chaoskampf category; one [INFERENCE] marker registers the contrastive-case reading itself as a 20th-century-Western comparativist overlay on the Nyanga tradition's own maturation-through-humiliation framing; one [LACUNA] marker registers the absence of pre-modern attestations and the single-1956-recording textual witness situation; one [VARIANT] marker registers the single-prevalent treatment with the Biebuyck & Mateene 1969 Rureke text as anchor. The chapter is the present book's CLEAREST CASE OF A TRADITION WHOSE OWN FRAMING EXPLICITLY REJECTS THE CHAOS-ORDER MAPPING per brief special_instructions and is forwarded to Part II C8 (refusal and appropriation problem; ch. 41) as the BOOK'S CLEAREST WORKED INSTANCE for the refusal sub-problem proper, alongside the Anishinaabe Nanabozho / Mishipeshu material (Ch32) as structurally-distinct combat-framing-refusal co-case, and to Part II C7 (inversion / transformation problem; ch. 40) as a contrastive-tier worked instance of the moral-valence-refusal sub-problem paired with the Bida case (Ch28) as the Africa-cluster co-comparandum."
