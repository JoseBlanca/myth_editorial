  - FC-01 HIGH (CITATION-WRONG, canto location for Iku-Turso's principal
    Kalevala appearance at body-prose line 133): MODIFY per task-
    instructions guidance. The auditor flagged the chapter's "50th canto"
    assertion as wrong; per Wikipedia *Iku-Turso (creature)* and *Cantos
    of the Kalevala*, Iku-Turso appears principally in Cantos II (2) and
    XLII (42) of the New Kalevala, with Canto 42 being the Sampo-cycle
    subjugation episode the chapter correctly describes elsewhere (Louhi
    summons Iku-Turso to devour the Kalevala heroes returning with the
    Sampo, Väinämöinen grabs him by the ears and binds him with magical
    words to never return from the bottom of the sea), and Canto 50
    being the Marjatta and Väinämöinen's-departure final canto unrelated
    to the Iku-Turso encounter.
    Body prose at line 133 revised from "the *Kalevala*'s 50th canto
    (in the 1849 *Uusi Kalevala* numbering) and in adjacent passages
    connected with the Sampo-cycle and the Pohjola material" to "the
    *Kalevala*'s 42nd canto (Rune XLII, in the 1849 *Uusi Kalevala*
    numbering — the Sampo-cycle and Pohjola material in which Louhi
    summons Iku-Turso to stop the Kalevala heroes' return with the
    Sampo and Väinämöinen subdues him by song), with an earlier brief
    appearance in the 2nd canto (the rising-from-the-sea-and-burning-
    the-hay episode that produces the great oak)" per the auditor's
    recommended_fix. Matching footnote tightened identically with
    explicit Louhi-summons-and-Väinämöinen-binds-by-the-ears narrative
    detail per the auditor's evidence note. No EVIDENCE-token
    disposition change since the source_id siikala-finnish was already
    correctly the anchor; the canto-number claim is brought into
    alignment with what the Kalevala source actually contains.

  - FC-02 HIGH (CITATION-WRONG, Kalevalan päivä commemoration date and
    edition at body-prose line 139): MODIFY per task-instructions
    guidance. The auditor flagged the chapter's "1849 publication date —
    28 February 1849" formulation as conflating two distinct facts; per
    Wikipedia *Kalevala Day*, the date 28 February commemorates Lönnrot's
    signing the preface to the FIRST edition (1835 Vanha Kalevala), NOT
    the 1849 New Kalevala — whose preface is dated April 1849. Kalevala
    Day today celebrates the Kalevala broadly (both editions), but the
    date itself derives from the 1835 preface signature.
    Body prose at line 139 revised from "since the 1849 *Uusi Kalevala*
    (with the publication date — 28 February 1849 — celebrated annually
    in Finland as *Kalevalan päivä*, 'Kalevala Day', and as the Day of
    Finnish Culture)" to "since the 1835 *Vanha Kalevala* and especially
    since the 1849 *Uusi Kalevala* became the standard text (with the
    date 28 February 1835, on which Lönnrot signed the preface to the
    first edition, celebrated annually in Finland as *Kalevalan päivä*,
    'Kalevala Day', and as the Day of Finnish Culture)" per the
    auditor's recommended_fix. Matching footnote tightened identically
    with explicit "Kalevala Day commemorates Lönnrot's signing of the
    1835 preface, not the 1849 edition's publication date, which is in
    April 1849" qualifier per the auditor's evidence note. No EVIDENCE-
    token disposition change since the source_id siikala-finnish was
    already correctly the anchor; the commemoration-date-and-edition
    claim is brought into alignment with what the Kalevala Day
    commemoration actually celebrates.

  - FC-03 LOW (identifier_year_ambiguity, Siikala 2002 vs Folklore
    Fellows official catalogue 2003 in sources.yaml siikala-finnish
    entry): NOTE-only / DEFER per task-instructions guidance ("your
    call — either ACCEPT the year correction in sources.yaml, or
    NOTE-only and defer"). The 2002 dating in sources.yaml is
    defensible per multiple library catalogues (Open Library, Project
    MUSE, Semantic Scholar) and matches the predominant secondary-
    source convention; the FFC official page lists 2003, apparently a
    late-2002 publication with general circulation beginning in 2003.
    The discrepancy is a minor bibliographic ambiguity that does not
    affect any claim's accuracy; pinned ISBN 9789514109027 is verified
    correct per the auditor's plausibility check. The year-ambiguity is
    left at NOTE-only with no sources.yaml change at this stage; if
    the user prefers the FFC official-catalogue 2003 dating, the
    sources.yaml entry's year field can be updated at inventory-audit.

  - INFO-01 NOTE (LACUNA marker reference to "+ index volumes" for
    SKVR at line 59): NOTE-only per task-instructions guidance. The
    auditor explicitly classified this as INFO-level non-finding
    observation. The "+ index volumes" formulation is a slight
    imprecision per Wikipedia *Suomen kansan vanhat runot* (the
    original publication ran 1908-1948 in approximately 32 physical
    volumes containing the original 14 volumes of poems; a supplement
    — not "index volumes" per se — was added in 1997), but is not
    substantively wrong. The LACUNA marker text is left unchanged.

  - INFO-02 NOTE (LACUNA marker reference to "SKS Folklore Archives"
    historical name at line 59): NOTE-only per task-instructions
    guidance. The Folklore Archives (founded 1937) were merged with
    the SKS Literature Archives in 2016 to form the new SKS Archives;
    the historical name "SKS Folklore Archives" is widely used in the
    secondary literature. This is not a factual error but a minor
    naming convention. The LACUNA marker text is left unchanged.

