special_instructions: |
  This is the comparativist flagship chapter on the "how much is inheritance, how much is
  contact, how much is convergence" question. Build the transmission argument progressively:
  Hurro-Hittite-to-Greek is the most documented (West 1997 makes it almost inescapable);
  Ugaritic-to-Israelite is also strong; the Marduk / Genesis-1 case is weaker and should
  be presented as such. The chapter's concluding move — that the Mediterranean cases are
  partly a chain and the cross-cultural force of the book's argument rests on the
  independent attestations (Chinese, Mexica, Vedic, African) — is important. Do not
  overstate transmission; do not understate it either.
