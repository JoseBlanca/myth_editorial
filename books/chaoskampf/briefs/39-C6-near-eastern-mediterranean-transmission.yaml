comparative_argument: |
  In contrast to C5's inheritance argument, this chapter presents the argument from
  historical contact: West 1997, Burkert 1992, and López-Ruiz 2010 (and predecessors
  Güterbock and others) have progressively mapped the routes by which Near Eastern combat
  myths reached Greece — through Hurro-Hittite intermediaries (Kumarbi Cycle → Hesiod's
  Theogony), through Phoenician trading networks (Baal-Yamm → Zeus-Typhon, with Cilicia
  and Mount Aqra as documented contact points), through Israelite poetry absorbing
  Ugaritic material (Baal-Yamm-Lôtan → YHWH-Leviathan-Rahab), and through the layered
  Jewish-Hellenistic apocalyptic that produced Rev 12. This chapter presents the
  documented transmission routes as one kind of explanation for the book's Mediterranean
  convergence, distinct from (and complementary to) IE inheritance.

