structure:
  - section: "I. The Hurro-Hittite → Greek route"
    summary: "Kumarbi Cycle → Hesiod Theogony: Ouranos-Kronos-Zeus parallels Alalu-Anu-Kumarbi-Teshub; Typhonomachy parallels Ullikummi; Philo of Byblos preserves Phoenician intermediary stage."
  - section: "II. The Levantine → Aegean route"
    summary: "Baal-Yamm / Baal-Lôtan → Zeus-Typhon (Cilicia-Mount Aqra localization); Phoenician trading networks and the Late Bronze / Iron Age corridor."
  - section: "III. The Ugaritic → Israelite route"
    summary: "Day 1985's case: Ugaritic Lôtan ↔ Hebrew lwytn (Leviathan); Baal's mace Ayyamur cognate structure in YHWH poetry; seven-headed serpent (KTU 1.5 / Pss 74)."
  - section: "IV. The Jewish-Hellenistic → Revelation 12 synthesis"
    summary: "Yarbro Collins's case: Leto-Apollo-Python substrate + Isaiah/Leviathan overlay + apocalyptic dragon (Satan) = Rev 12. Not single source but deliberate composite."
  - section: "V. Marduk as possible but undemonstrated source"
    summary: "Gunkel's tehôm ~ Tiamat link; the cosmogonic structural parallels of Enūma Eliš ~ Genesis 1; the 20th-century post-Wellhausen debate. Present as less decisively documented than the Ugaritic case."
  - section: "VI. Implications for the book's argument"
    summary: "Transmission is real and documented for major routes. This does NOT undermine the book's cross-cultural comparison — it just means the Mediterranean cases are a chain of connected traditions rather than independent attestations. Chinese, Mexica, Vedic, and African cases are independent of this chain and carry the book's strongest typological weight."

