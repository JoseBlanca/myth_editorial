family_members:
  - name: "St. Michael the Archangel (drawing on Rev 12)"
    summary: "The cult of the warrior-archangel — high medieval through early modern — develops directly from Rev 12's combat narrative. Michael's iconography (armour, spear, trampled dragon) preserves the combat-pattern through Christian devotional culture."
  - name: "St. George and the dragon"
    summary: "Late-antique passio narratives of the soldier-saint martyred under Diocletian acquire, by the 11th–12th centuries, the princess-and-dragon rescue episode (which has a documented Greco-Roman substrate in the Perseus-Andromeda type). The combined figure becomes one of medieval Europe's most widespread iconographic types."
  - name: "Christ's harrowing of hell and defeat of the dragon"
    summary: "Apocryphal material (Gospel of Nicodemus) and patristic homily present Christ's descent into hell as a combat with the devil-as-dragon; a conceptual cousin of the George/Michael pattern."

shared_variant_handling: |
  Multiple recensions of the Passio S. Georgii; standard editions (Legenda Aurea, Acta
  Sanctorum) to be pinned at glossary-lock. The princess-episode is a later accretion and
  should be treated as such in the chapter's philological framing. Ogden 2013 is the
  scholarly anchor for both Michael and George.

cultural_relevance:
  centrality: significant
  function: "ritual-devotional (cult of the saints); didactic (exemplary virtues); iconographic (art, heraldry)"
  cross_cultural_parallels: |
    - The George narrative's princess-rescue has Greek antecedents (Perseus-Andromeda, Chapter 12 family).
    - Michael's iconography preserves Rev 12 directly (Chapter 9).
    - The hagiographic-combat pattern spreads beyond Christian Europe via Byzantine iconographic transmission.

target_length_words: 4500

special_instructions: |
  The chapter traces how the Rev 12 combat-imagery is refracted into medieval Christian
  hagiography and iconography. The post-medieval reception (Renaissance art, heraldry,
  modern national iconography) is deferred to the reception coda (Chapter 42). This chapter
  treats the LATE ANTIQUE TO HIGH MEDIEVAL material — where the primary-text situation is
  hagiographic texts and early visual corpora. Identifier pinning for specific Passio
  editions is deferred to glossary-lock per inventory notes.
