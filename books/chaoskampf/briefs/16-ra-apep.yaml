special_instructions: |
  The chapter must open by establishing the cyclical-maintenance subtype as distinct from
  cosmogonic (Marduk) or eschatological (Revelation) combats. The Apep combat is never
  "won" once for all — it is won every morning. Structure: (1) the cosmological frame
  (maʿat vs. isfet per Assmann); (2) the textual corpus (Pyramid Texts, Book of the Dead,
  Amduat, Book of Gates, Bremner-Rhind) with representative passages from each stratum;
  (3) the ritual embedding in priestly practice (Bremner-Rhind); (4) Seth's ambivalent role
  as Apep-slayer at the prow of the barque — which sets up the Chapter 17 edge-case on
  Horus-Seth. Do not overclaim Egyptian-Hebrew direct transmission; the parallels are
  typological, the evidence for textual borrowing is weaker than for Ugaritic-Hebrew. The
  chapter should use Egyptian terms (maʿat, isfet, Duat) to preserve the tradition's own
  framing per scope.md §"Appropriation protocol".
