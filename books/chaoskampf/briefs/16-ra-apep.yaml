variants:
  classification: composite-editorial
  prevalent_version:
    source: te-velde-1967
    why_prevalent: "The Apep combat is distributed across multiple text corpora over 2000 years: Pyramid Texts (c. 2400 BCE), Coffin Texts, Book of the Dead (Faulkner's standard English), Amduat, Book of Gates, and the Bremner-Rhind papyrus (c. 310 BCE). te Velde 1967 and Assmann 2001 are the standard syntheses. The chapter treats the corpus as a cyclical-maintenance tradition, not as a single narrative."
  alternates:
    - source: faulkner-1972-bod
      difference: "Book of the Dead spells 7, 39, 108: Apep as enemy of the deceased's afterlife journey, combat as protection magic"
    - source: te-velde-1967
      difference: "Amduat (hour 7) and Book of Gates (gate 4): Apep as enemy of Ra's solar barque, combat in the twelve-hour nocturnal structure"
    - source: faulkner-1972-bod
      difference: "Bremner-Rhind (P. BM 10188, Book of Overthrowing Apep): liturgical manual for priestly re-enactment of the combat, daily, at the temple of Ra"

entities_glossary:
