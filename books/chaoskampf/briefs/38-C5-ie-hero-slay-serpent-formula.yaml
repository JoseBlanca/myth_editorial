structure:
  - section: "I. The formula"
    summary: "Subject + verb-of-killing + serpent-object. Vedic áhann áhim; Avestan cognates; Hittite illuyanka kuenta; Norse skaldic kennings. The philological core."
  - section: "II. The direct philological cases"
    summary: "Vedic Indra-Vṛtra; Avestan Thraētaona-Aži Dahāka; Hittite Teshub-Illuyanka. Three IE language families with formal-linguistic correspondences."
  - section: "III. The extended typological cases"
    summary: "Greek Zeus-Typhon; Norse Thor-Jörmungandr; Germanic Sigurd-Fáfnir, Beowulf-dragon; Celtic Lugh-Balor; Welsh Red-White Dragon; Ossetic Batraz; Armenian Vahagn-vishaps; Slavic Perun-Veles / Dobrynya-Zmey."
  - section: "IV. Where the argument is strong, where it is weak"
    summary: "Strong: Vedic-Avestan-Hittite direct linguistic correspondence; Norse skaldic kennings. Weak: Celtic material, Slavic reconstruction (where area specialists dissent — Jakobson, Lajoye, Kapović). Typological rather than philological."
  - section: "V. Transmission vs. inheritance"
    summary: "Watkins's claim is inheritance from PIE poetic tradition, not contact-borrowing. This is crucial: C6 addresses transmission (Near East → Greece) separately."
  - section: "VI. The Mwindo problem as a control"
    summary: "Non-IE traditions (Mwindo, Rainbow Serpent, Mesoamerican) also have serpent-combat vocabulary. This alone shows IE-philological inheritance is not sufficient to explain the pattern globally. Watkins's argument is about IE, not about combat-myth as such."

