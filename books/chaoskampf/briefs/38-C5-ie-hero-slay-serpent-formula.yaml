comparative_argument: |
  Watkins's 1995 reconstruction of an Indo-European poetic formula — HERO SLAY SERPENT,
  realized in Vedic as áhann áhim, Avestan as *janat aiim, Hittite as kuenta... illuyanka —
  is the strongest linguistic argument for a shared combat-myth tradition across the IE
  language family. The formula recurs in Norse skaldic diction, in Greek hexameter, in
  Beowulf's Old English, in Armenian fragments. The chapter presents Watkins's case,
  explicit about where the philological evidence is direct (Vedic-Avestan-Hittite) and
  where it is typological or reconstructed. This is the chapter where comparativist
  methodology is on display at its most rigorous and most contestable.

