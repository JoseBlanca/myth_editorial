special_instructions: |
  This chapter is the book's most philologically technical. Present Watkins's argument
  respectfully but do not treat it as book-shaping truth — it explains IE distribution
  of the combat-myth, not the pattern's broader existence. The chapter must be clear-eyed
  about the Slavic-reconstruction problem: Ivanov/Toporov's Perun-Veles reconstruction is
  contested (as Chapter 20 flags). Use the Celtic / Welsh / Armenian material with the
  care scope.md demands for fragmentary attestations. The chapter closes with the Mwindo
  control — to show that IE inheritance is a real finding but not a totalising explanation.
