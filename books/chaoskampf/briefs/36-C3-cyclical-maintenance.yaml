special_instructions: |
  Short chapter by design. The cyclical-maintenance subtype has only two strong attestations
  and one minor one. Do not pad. The chapter's theoretical contribution is showing that
  combat-myth + ritual-recurrence is a distinct and differently-functioning subtype, not a
  "weaker cosmogony". Assmann's maʿat/isfet framework is the chapter's conceptual through-line.
  The chapter should explicitly set up the contrast with C4 (eschatological): Egypt has no
  eschatology; the combat is perpetual. Revelation has an eschatology; the combat is final.
  These differ structurally.
