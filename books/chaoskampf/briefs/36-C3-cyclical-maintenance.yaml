structure:
  - section: "I. The pattern"
    summary: "Combat-as-recurring-ritual. Neither one-time cosmogony nor episodic sovereignty succession — the combat is the rite's repeating center."
  - section: "II. Ra and Apep — daily"
    summary: "The Bremner-Rhind liturgy; the Amduat / Book of Gates nocturnal registers; the practice of Apep-figurine wax-melting."
  - section: "III. Teshub and Illuyanka — annual"
    summary: "The purulli spring festival at Nerik; the two co-equal tablet-versions as possibly ritual-performance alternates."
  - section: "IV. Apollo and Python — the cult-foundation-with-festival cognate"
    summary: "Septerion's re-enactment of the Python-slaying every eighth year is not chaoskampf strictly but a related pattern: combat-as-cult-preservation."
  - section: "V. Why these two and not others"
    summary: "Marduk's combat is liturgised at akītu, but it is narrated as one-time; the akītu is recitation, not re-enactment. The Zoroastrian pattern is eschatological rather than maintenance-cyclical. Cyclical maintenance is specifically where the ritual's effectiveness depends on this-time's combat."
  - section: "VI. The conceptual apparatus — maʿat / isfet"
    summary: "Assmann's analysis: the Egyptian framework is the book's clearest native concept-pair for combat-as-maintenance. Useful for articulating what 'chaos' is NOT doing here."

