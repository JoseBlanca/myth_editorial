comparative_argument: |
  A small but tight cluster. Ra versus Apep is a daily combat preserved in priestly liturgy
  (Bremner-Rhind Book of Overthrowing Apep); Teshub versus Illuyanka is an annual combat
  explicitly framed as the aetiology of the purulli spring festival. In both cases the
  combat is never concluded — it is re-performed. This marks a distinct subtype from
  cosmogonic (one-time, generative) and sovereignty (episodic, terminal) combats: cyclical
  maintenance is combat-as-ritual-preservation, where the cosmos is always under threat
  and the ritual is the insurance. The Apollo Septerion festival at Delphi is a minor
  reflex of the same subtype.

