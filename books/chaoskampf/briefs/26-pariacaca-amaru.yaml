variants:
  classification: composite-editorial
  summary: |
    The Huarochirí Manuscript (c. 1608) is the single primary source. It records multiple
    episodes across chapters 6, 8, and 21 involving Pariacaca's combats with rival wak'as
    and with amaru. The chapter treats these as a cycle rather than a single combat.

summary: |
  The storm-wak'a Pariacaca opposes, defeats, and integrates rival wak'as across the
  Huarochirí landscape. The amaru in these episodes is often a summoned ally-monster of a
  defeated rival — not a primordial chaos, but a figure of wak'a-succession. Salomon,
  Taylor, and Dean read the narrative as wak'a-succession politics rather than
  cosmos-versus-chaos combat.

cultural_relevance:
  centrality: |
    Central within Huarochirí religious tradition (early-colonial Quechua-language
    attestation from an Andean community's own framing); significant as source for
    pre-Columbian Andean religion more broadly.
  function: |
    - Political-theological (wak'a-succession, integration of defeated wak'as into the
      Pariacaca cult)
    - Geographic-cosmogonic (each combat is localized to a specific landscape feature)
    - Ritual-aetiological (some episodes are tied to specific ritual practices)
  cross_cultural_parallels: |
    - Structurally, Pariacaca's integration of defeated wak'as parallels Marduk's
      incorporation of the fifty names at the end of Enūma Eliš — victory consolidates
      rival power-bases rather than eradicating them.
    - The amaru-as-ally-of-rival pattern is distinctive to the Andean material; the amaru
      is not a primordial chaos-monster but a summoned agent.

target_length_words: 4000

special_instructions: |
  Area-specialist citation policy applies: cite Salomon, Urioste, Taylor, Dean, and (as
  relevant) Bray or MacCormack by name in the first factual pass per scope.md
  §"Appropriation protocol". The chapter must open with the Huarochirí Manuscript's own
  framing (Quechua-language early-colonial text, recorded by an Andean community) and only
  then invoke the comparative term "chaoskampf" — and when it does, explicitly flag that
  Andean specialists read the pattern as wak'a-succession rather than chaos-ordering. The
  chapter contributes to Part II C7 (what inversion or not-quite-chaoskampf teaches) and
  C8 (the refusal and the appropriation problem) in limited form; the Pariacaca material
  is a milder case than Nanabozho/Mishipeshu, because the area-specialist reading does
  accommodate some combat-myth framing — just not the chaos-order framing.
