      detail: "Watkins's flagship Indo-Iranian reflex of the HERO SLAY SERPENT formula; Benveniste & Renou is the foundational Iranian philological study"
      source: "watkins-1995; benveniste-renou-1934"
  function:
    - role: royal-legitimation
      basis: "Thraētaona's slaying of the tyrant-dragon Aži Dahāka models legitimate kingship's victory over usurping tyranny; foundational for later Iranian kingship ideology"
      source: "benveniste-renou-1934; forsyth-1987"
    - role: eschatological
      basis: "The Frashokereti narrative places a final version of the combat at the end of cosmic time: Aži Dahāka escapes, is killed by Kərəsāspa, the dead rise, and the cosmos is renovated"
      source: "watkins-1995"
    - role: cosmological
      basis: "Aži Dahāka in the Pahlavi tradition is bound beneath Damāvand, a cosmogeographic feature; his presence structures the sacred landscape"
      source: "benveniste-renou-1934"
  cross_cultural_parallels:
    - other_culture: "Vedic"
      parallel: "Thraētaona's Aži Dahāka parallels Trita Āptya's three-headed serpent in Rigveda 10.8.8–9; the two are philologically cognate (Avestan Thraētaona ~ Vedic Trita) and structurally near-identical"
      source: "benveniste-renou-1934; watkins-1995"
    - other_culture: "Hurro-Hittite"
      parallel: "Aži Dahāka's three heads parallel Illuyanka's structural characteristics within Watkins's IE serpent-slayer formula"
      source: "watkins-1995"
    - other_culture: "Norse"
      parallel: "The eschatological rebinding-and-final-slaying structure of Aži Dahāka parallels Jörmungandr's role at Ragnarök"
      source: "west-2007"

