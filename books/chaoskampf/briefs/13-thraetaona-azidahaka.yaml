special_instructions: |
  The chapter has two built-in sub-sections: (1) Thraētaona's defeat of Aži Dahāka in the
  Avestan-Pahlavi tradition — royal-legitimation and cosmological; (2) Frashokereti — Aži
  Dahāka's final killing at the end of time, the eschatological pendant. Keep these as
  distinct sub-sections; do not merge them into a single narrative. The Pahlavi narrative
  is the fullest witness but is LATE — the chapter must flag this explicitly, because some
  of the most striking parallels (the binding beneath the mountain, the revived hero)
  appear in Middle Persian rather than Avestan. The chapter sets up Part II C4 (eschatology)
  and C5 (IE HERO SLAY SERPENT formula). The Shahnameh / Fereydun-Zahhāk material is
  post-Islamic and explicitly out of primary scope per scope.md §"Period" — flag in a
  footnote only.
