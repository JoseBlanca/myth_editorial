variants:
  classification: single-prevalent-reconstructed
  prevalent_version:
    source: benveniste-renou-1934
    why_prevalent: "The Pahlavi Bundahišn is the fullest narrative witness, but it is a late compilation. The Avestan hymn allusions (especially in the yashts) are earlier but allusive. Benveniste & Renou establish the standard philological reconstruction integrating both."
  alternates:
    - source: benveniste-renou-1934
      difference: "Avestan Yt. 5.33–35: Thraētaona's prayer to Anāhitā for victory over Aži Dahāka, hymn-level allusive. Yt. 19: the Frashokereti material on Kərəsāspa and the final combat"
    - source: watkins-1995
      difference: "Pahlavi Bundahišn: the full narrative of Thraētaona's combat, Aži Dahāka's imprisonment at Mount Damāvand, his eventual escape, and his final killing by Kərəsāspa at the end of time"
    - source: watkins-1995
      difference: "The Shahnameh (Firdowsi, c. 1000 CE) reshapes Thraētaona as Fereydun, tyrant-slayer of Zahhāk; this is the Islamic-era literary reception and is out of primary scope for the book, but the chapter flags its existence"

