family_members:
  - name: "Cipactli (dismemberment-cosmogony boundary case)"
    summary: "Tezcatlipoca and Quetzalcoatl pull apart the primordial earth-monster Cipactli to make the sky and the earth from her body. No combat in the narrow sense — a dismemberment-cosmogony. Preserved in Histoyre du Mechique (c. 1543) and Leyenda de los Soles (1558). Included precisely to mark the boundary between dismemberment-cosmogony and combat-cosmogony (see scope.md §'Excluded adjacent motifs' #1)."
  - name: "Quetzalcoatl vs. Tezcatlipoca (the Suns)"
    summary: "Across the five Suns of Mesoamerican cosmology, Quetzalcoatl and Tezcatlipoca alternate as rulers, toppling each other in succession. World-ages end in catastrophe and re-creation. Primary witnesses: Leyenda de los Soles (1558); Historia de los Mexicanos por sus pinturas. A cosmogonic-political cycle of combats rather than a single chaoskampf, but the structural pattern (agonistic pair rotating sovereignty) is distinctive."

shared_variant_handling: |
  Cipactli: stable across witnesses. Present the dismemberment-without-combat framing
  directly — this is the story's defining feature for the book's purposes.

  Quetzalcoatl / Tezcatlipoca: significant variation across Mexica and other Nahua sources.
  The chapter presents the pattern across the five Suns with the variant-emphases on who
  serves as what sun.

cultural_relevance:
  centrality: |
    Cipactli — significant (appears in major sources but is not a central cult-narrative).
    Quetzalcoatl-Tezcatlipoca Suns cycle — central (structures Mexica cosmology and
    time-reckoning, parallels in Maya and other Mesoamerican traditions).
  function: |
    Cipactli: cosmological (dismemberment-origin of sky and earth).
    Suns cycle: cosmological (world-ages), ritual-aetiological (calendar), royal-legitimation
    (current age is the Fifth Sun under Huitzilopochtli, Chapter 24).
  cross_cultural_parallels: |
    - Cipactli parallels Ymir (Norse), Puruṣa (Vedic), and Pangu (Chinese) as
      dismemberment-cosmogony cases — scope.md §"Excluded adjacent motifs" notes these
      are adjacent but not combat-cosmogonic.
    - The Quetzalcoatl-Tezcatlipoca rotation parallels aspects of Seth-Horus contention
      (Chapter 17) — agonistic sovereignty rotation rather than single decisive combat.

target_length_words: 4500

special_instructions: |
  Two distinct sub-sections. The Cipactli sub-section's role in the chapter — and in the
  book — is to make the dismemberment/combat distinction explicit. Mention but do not
  fully develop the parallel dismemberment-cosmogonies (Ymir, Puruṣa, Pangu): these are
  scope.md §"Excluded adjacent motifs" #1 cases and do not get their own chapters. The
  Quetzalcoatl-Tezcatlipoca sub-section handles the Mesoamerican Suns cycle as a
  structurally distinctive case — not a single chaoskampf but a cosmological rhythm of
  combats. Cross-reference Chapter 24 (Huitzilopochtli) as the Fifth-Sun framing for the
  present age. Area-specialist citation policy applies: cite López Austin and Carrasco
  by name throughout.
