structure:
  - section: "I. The anchor case — Bida"
    summary: "The serpent as protector. The annual tribute. The slaying. The city's abandonment and the rains' cessation. The narrative's 'reverse chaoskampf' structure as modern comparativist frame, with explicit acknowledgment that the framing is a modern overlay on a Soninke story whose own logic is not 'chaoskampf-inverted' but 'covenant-broken'."
  - section: "II. The full refusal — Mwindo"
    summary: "Hero kills dragon and is punished by the sky-god. Not an inversion of outcome but an inversion of moral valence: the killing is hubris. Area specialists read the epic as a maturation narrative, not a chaos-order narrative."
  - section: "III. The partial case — Sigurd"
    summary: "Watkins shows Sigurd-Fáfnir fits the IE formula linguistically, but the narrative outcome (Sigurd is cursed by Fáfnir's treasure) complicates the 'order-establishment' reading. Sigurd himself dies shortly after."
  - section: "IV. The area-specialist case — Pariacaca"
    summary: "Salomon and Taylor read the amaru in Huarochirí not as chaoskampf's monster but as a summoned ally of a rival wak'a. The pattern is wak'a-succession, not cosmos-ordering. This is 'not an inversion' but 'not the same thing at all'."
  - section: "V. The metallurgical case — Susanoo"
    summary: "Naumann, Isomae, Como, Ooms read Orochi-slaying as sword-etiology (Kusanagi in the tail), not combat-cosmology. The chaoskampf label is applied from outside, by 20th-century comparativists."
  - section: "VI. What inversion teaches"
    summary: "Two lessons: (a) the combat-myth category has semantic edges that the Bida and Mwindo cases expose sharply; (b) the comparativist pattern of forcing every serpent-fight into the chaoskampf frame is precisely the move that Ballentine, the area-specialists, and scope.md §'Appropriation protocol' argue against."

