comparative_argument: |
  The Soninke Bida / Wagadu myth inverts the standard chaoskampf outcome: the serpent is
  the source of prosperity, and slaying it causes the city's abandonment and the rains'
  cessation. Mwindo / Kirimu is more pointed still: the hero kills the dragon and is
  punished by the sky-god for the killing — the moral frame explicitly refuses "combat
  establishes order." Sigurd's slaying of Fáfnir sits on an edge: the killing brings him
  the treasure but also the curse that destroys him. Susanoo-Orochi, as specialists read
  it, is not chaoskampf at all but a metallurgical aetiology with a sword-discovery at the
  center. The chapter argues that the existence of these cases — from multiple traditions —
  is not a local anomaly but evidence that combat-myth can go in an "inverse" direction
  within the same general pattern, and that the comparativist move of treating all
  serpent-combats as chaoskampf obscures rather than illuminates them.

