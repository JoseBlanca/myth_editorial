special_instructions: |
  This chapter must respect the scope.md §"Appropriation protocol" rigorously: cite
  Conrad, Belcher, Biebuyck & Mateene, Salomon, Taylor, Naumann, Isomae, Como, Ooms by
  name. The chapter opens with Bida's own Soninke framing (covenant, tribute, consequence
  of breaking the covenant) BEFORE invoking "inversion of chaoskampf" — that invocation
  is a modern comparative move, not the myth's own frame. Similarly for Mwindo: the
  Nyanga frame is maturation-through-hubris, not inversion-of-cosmogony. The chapter's
  theoretical contribution is showing that the "inverse chaoskampf" reading is itself a
  comparativist artifact, and that allowing the area-specialists to speak first does NOT
  destroy the comparison — it makes the comparison more precise. The Sigurd and Susanoo
  sections are shorter — think of Bida and Mwindo as the main weight.
