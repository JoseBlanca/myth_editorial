target_length_words: 11000

special_instructions: |
  Long chapter — the composition is substantial and forms the earliest anchor of the book's
  combat-cosmogony tier. Do not compress the Šarur-scouting-mission section; it is where the
  Sumerian text develops the animate-weapon motif that later recurs at Ugarit and in the
  Marduk tradition. Present the lapidary aetiology (lines 416–620) with enough specific
  stone-name examples to let the reader feel the ritual precision, without listing every
  one. The Akkadian bilingual receptions are transmission-history and belong in footnotes,
  not the main narrative.
