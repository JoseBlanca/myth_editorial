entities_glossary:
  - name: "Ninurta (𒀭𒊩𒌆𒅅)"
    role: deity
    first_mention_gloss_candidate: "Sumerian warrior-god, son of Enlil, lord of Nippur and the plough"
  - name: "Asag (𒀉𒊕)"
    role: deity
    first_mention_gloss_candidate: "monstrous demon of the mountains, accompanied by a stone army"
  - name: "Lugal-e (𒈗𒂊)"
    role: artifact
    first_mention_gloss_candidate: "the Sumerian composition itself, named after its opening line 'O king, storm of majestic splendor'"
  - name: "Šarur (𒃻𒄯)"
    role: artifact
    first_mention_gloss_candidate: "Ninurta's animate talking mace, his weapon and scout"
  - name: "Tigris (𒀀𒇉𒈦𒈖)"
    role: place
    first_mention_gloss_candidate: "river whose flow Ninurta reorders for irrigation after the combat"
  - name: "kur (𒆳)"
    role: place
    first_mention_gloss_candidate: "'mountain' / 'foreign land' / 'netherworld', the domain from which Asag's forces come"

cultural_relevance:
  centrality: central
  centrality_evidence:
    - kind: attestation-volume
      detail: "Lugal-e is one of the longest Sumerian literary compositions, preserved in dozens of Old Babylonian copies from Nippur and Ur scribal schools, and extensively excerpted into later Akkadian school material"
      source: "etcsl 1.6.2 manuscript list; vandijk-1983-lugale vol. 1 introduction"
    - kind: scholarly-attention
      detail: "Treated as the earliest full-length combat-cosmogony in the Mesopotamian scholarly tradition (Forsyth, Scurlock & Beal, Gunkel)"
      source: "forsyth-1987 chs. 1–2; scurlock-beal-2013"
    - kind: ritual-context
      detail: "Lugal-e was excerpted and bilingualized (Sumerian-Akkadian) as temple school curriculum through the first millennium"
      source: "vandijk-1983-lugale vol. 1 (introduction on transmission)"
  function:
    - role: cosmological
      basis: "The combat reorders the Tigris, the mountains, and the stones, establishing the irrigation landscape and the social status of stone materials"
      source: "etcsl 1.6.2 lines 330–650 (post-combat reorderings)"
    - role: royal-legitimation
      basis: "Ninurta, as model of the victorious king, provides the template for Sumerian and later Akkadian royal ideology of the warrior-ruler"
      source: "forsyth-1987 ch. 2"
    - role: ritual-aetiological
      basis: "Individual stones receive their working properties (hardness, colour, ritual status) as rewards or punishments for their stance in the battle — a lapidary aetiology"
      source: "etcsl 1.6.2 lines 416–620"
  cross_cultural_parallels:
    - other_culture: "Mesopotamia (Akkadian)"
      parallel: "Direct lineal descendant: the same ordering-through-combat pattern is reshaped in the Anzû Epic and then in Enūma Eliš"
      source: "forsyth-1987"
    - other_culture: "Hebrew Bible"
      parallel: "The storm-god-defeats-the-mountain pattern feeds (via Ugaritic mediation) into Yahweh's victories over Leviathan and Rahab"
      source: "day-1985"
    - other_culture: "Vedic"
      parallel: "Indra's splitting of the mountain to release the waters after slaying Vṛtra shows the same storm-god-liberates-waters structure, though the mechanism (lightning-strike) differs from Ninurta's mace-work"
      source: "jamison-brereton-2014"

comparative_hooks:
  - other_culture: "Mesopotamia (Akkadian)"
    parallel: "Annus has argued that Lugal-e is the structural and thematic source of both Anzû and Enūma Eliš — the Marduk-Tiamat narrative is in important ways a retelling of Ninurta-Asag with a different protagonist and monster"
    source: "annus-2001-anzu"
  - other_culture: "Vedic"
    parallel: "The splitting-the-mountain-to-release-waters motif invites comparison with Indra's cosmogonic act and thus with Watkins's IE reflexes, though Lugal-e is pre-IE"
    source: "watkins-1995"
  - other_culture: "Ugaritic"
    parallel: "The storm-weapon (Ninurta's Šarur) as an animate, speaking agent parallels Baal's double-named mace Ayyamur/Yagrush from Kothar; the motif may be areal rather than genealogical"
    source: "smith-1994-baal-i"

triangulation_databases:
