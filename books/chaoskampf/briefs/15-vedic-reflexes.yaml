family_members:
  - name: "Trita Āptya and the three-headed serpent"
    summary: "A small cluster of Rigvedic hymns assigns the dragon-slaying to the older figure Trita Āptya rather than to Indra, or to Indra-and-Trita together (RV 10.99.6; 1.105; 2.11.19–20). Dumézil and Watkins read this as a pre-Indra Indo-Iranian stratum preserving the older form of the combat pattern that Indra-Vṛtra (Chapter 14) supersedes. Trita is philologically cognate with Avestan Thraētaona (Chapter 13), making this the clearest Indo-Iranian pair."
  - name: "Krishna vs. Kāliya"
    summary: "The child Krishna leaps into the Yamunā river and dances atop the many-headed serpent Kāliya, who has poisoned the waters; the cowed serpent agrees to leave the river. A bhakti-era reworking (Harivaṃśa c. 4th c. CE; Viṣṇu Purāṇa c. 5th c. CE; Bhāgavata Purāṇa 9th–10th c. CE) of the Indra-Vṛtra water-release pattern. The combat is transformed: no killing, but subjugation; the child-hero's sacred play (līlā) replaces the warrior-combat."

shared_variant_handling: |
  Trita Āptya: multiple Rigvedic attestations, each hymn-allusive rather than narrative.
  The chapter gathers them to show the consistent identification of Trita as combat-hero.

  Krishna-Kāliya: the Bhāgavata Purāṇa version is the most famous and iconographic-pervasive;
  the Harivaṃśa is the earliest fully-narrative witness. Present both with edition-pinning
  deferred to glossary-lock. The iconographic tradition (Krishna dancing on Kāliya's hoods)
  is extensive and will feed the chapter's cultural-relevance material.

cultural_relevance:
  centrality: |
    Trita Āptya — marginal in the Rigvedic corpus (eclipsed by Indra); significant as scholarly
    anchor for the IE pre-Indra stratum.
    Krishna-Kāliya — central in post-Vedic Vaishnava devotional tradition; one of the most
    widely-depicted Krishna episodes.
  function: |
    Trita Āptya: archaic stratum of the IE combat-myth; philologically load-bearing for the
    comparative argument.
    Krishna-Kāliya: devotional-didactic (bhakti-era reshaping); iconographic (Krishna līlā).
  cross_cultural_parallels: |
    - Trita Āptya ↔ Avestan Thraētaona (Chapter 13) — the clearest Indo-Iranian cognate pair.
    - Krishna subduing the water-serpent echoes Indra's water-release structure under a
      transformed moral frame.
    - The "slay not, subjugate" transformation (Krishna-Kāliya) parallels transformed
      variants in other traditions (Väinämöinen-Iku-Turso, Chapter 31).

target_length_words: 4500

special_instructions: |
  Two clearly-distinct sub-sections. The Trita Āptya section is philologically technical
  and sets up Part II C5 (the IE formula) as well as Chapter 13 (Thraētaona). The
  Krishna-Kāliya section is a bhakti-era reworking — the chapter must be clear that this
  is NOT early-Vedic material and the transformation (non-lethal subjugation, child-hero,
  līlā) is genuine, not just an alternative phrasing of Indra-Vṛtra. Edition-pinning for
  the Bhāgavata Purāṇa (Tagare translation, Motilal Banarsidass) is deferred to
  glossary-lock per inventory notes.
