lacunae:
  - source: west-1966-theogony
    location: "Theogony 820–880"
    what_is_missing: "No narrative lacunae; Hesiod's text is well preserved. The lacunae are structural: Hesiod gives only the sketch, not the full narrative"
    in_tradition_fills_available: "yes, but from much later sources (Apollodorus Library 1.6.3; Nonnus Dionysiaca 1–2) which must be clearly marked as later expansions"

variants:
  classification: co-equal
  prevalent_version:
    source: west-1966-theogony
    why_prevalent: "Hesiod is the earliest and most prestigious source; the critical edition is West 1966. But the Typhonomachy as a full story is a reconstruction from multiple sources — no single text has the complete narrative."
  alternates:
    - source: ogden-2013
      difference: "Apollodorus Library 1.6.3 (1st–2nd c. CE): adds Typhon's temporary defeat of Zeus, severing of sinews, and recovery via Hermes and Aigipan; gives the extended form that becomes canonical"
    - source: ogden-2013
      difference: "Nonnus Dionysiaca 1–2 (5th c. CE): extensive baroque expansion of the combat; incorporates Cadmus playing the pipes to beguile Typhon"
    - source: west-1966-theogony
      difference: "Homeric Hymn to Apollo 305–355 and Pindar Pythian 1: partial attestations with different emphases; locate Typhon under Etna or in Cilicia"

entities_glossary:
  - name: "Zeus (Ζεύς)"
    role: deity
    first_mention_gloss_candidate: "king of the Olympian gods; wields the thunderbolt in combat"
  - name: "Typhon / Typhoeus (Τυφῶν, Τυφωεύς)"
    role: deity
    first_mention_gloss_candidate: "earth-born monster, son of Gaia and Tartarus, hundred-headed serpent-limbed; the last and greatest challenge to Olympian sovereignty"
  - name: "Gaia (Γαῖα)"
    role: deity
    first_mention_gloss_candidate: "primordial earth-goddess; mother of Typhon"
  - name: "Tartarus (Τάρταρος)"
    role: place
    first_mention_gloss_candidate: "lowest realm of the underworld; father (in the Theogony) of Typhon; prison of defeated enemies"
  - name: "Etna (Αἴτνη)"
    role: place
    first_mention_gloss_candidate: "Sicilian volcano under which Typhon is said to be buried, explaining its eruptions"
  - name: "Corycian cave (Κωρύκιον ἄντρον)"
    role: place
    first_mention_gloss_candidate: "Cilician cave where Apollodorus locates Typhon's stripping of Zeus's sinews"

cultural_relevance:
  centrality: central
  centrality_evidence:
    - kind: attestation-volume
      detail: "Attested from Hesiod (c. 700 BCE) through Nonnus (5th c. CE); a continuous tradition across more than a millennium of Greek literature"
      source: "west-1966-theogony introduction; ogden-2013"
    - kind: iconography
      detail: "Typhon combat depicted on Chalcidian vases and in sculpture from the archaic period through Roman-era mosaics"
      source: "ogden-2013"
    - kind: scholarly-attention
      detail: "West 1997 and Burkert 1992 treat the Typhonomachy as the main test case for Near Eastern → Greek transmission of combat-myth"
      source: "west-1997; burkert-1992"
  function:
    - role: royal-legitimation
      basis: "Zeus's victory confirms his kingship over gods and men; structurally parallel to Marduk's elevation"
      source: "west-1966-theogony; forsyth-1987"
    - role: theogonic
      basis: "Situated at the close of the Theogony after the Titanomachy; the Typhonomachy is the last generation of divine combat before the stable pantheon"
      source: "west-1966-theogony"
    - role: ritual-aetiological
      basis: "Typhon-under-Etna accounts for volcanic activity; the cave-traditions (Corycian, Cilician) give the story geographic anchor points"
      source: "ogden-2013"
  cross_cultural_parallels:
    - other_culture: "Hurro-Hittite (Kumarbi Cycle)"
      parallel: "West 1997 argues that the Hesiodic succession (Ouranos-Kronos-Zeus) and the Typhonomachy both derive from the Kumarbi Cycle via Near Eastern mediation. The structural correspondences are detailed and numerous"
      source: "west-1997"
    - other_culture: "Mesopotamia (Marduk)"
      parallel: "Zeus-versus-Typhon parallels Marduk-versus-Tiamat as storm-god-versus-monster sovereignty combat, though direct transmission is less clear than for Kumarbi"
      source: "burkert-1992"
    - other_culture: "Ugarit (Baal)"
      parallel: "Baal-versus-Yamm and the Baal-Lôtan allusions share the storm-god structure with Zeus-Typhon; Typhon's Cilician location (near the Levantine coast) is philologically suggestive"
      source: "west-1997"

comparative_hooks:
  - other_culture: "Hurro-Hittite"
    parallel: "The Typhonomachy is the central evidence in Part II C6: Hedammu's growth-from-sea, Ullikummi's stone-body, and Ilkunirsa's theft of the storm-god's organs all have Typhon parallels"
    source: "west-1997"
  - other_culture: "Phoenician"
    parallel: "Typhon's Cilician and Phoenician-coast geographic anchoring suggests a mid-first-millennium BCE point of transmission; Greeks in the Levant encountered the Baal-Yamm tradition directly"
    source: "west-1997; burkert-1992"
  - other_culture: "Greek (later dragon-combats)"
    parallel: "Apollo-Python, Herakles-Hydra, Perseus-Ketos, Kadmos-dragon, Bellerophon-Chimaera are Hellenic reiterations of the combat structure after Zeus-Typhon; this chapter sets up the Chapter 12 family chapter"
    source: "ogden-2013; fontenrose-1959"

triangulation_databases:
