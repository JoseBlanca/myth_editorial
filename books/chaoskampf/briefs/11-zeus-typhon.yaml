target_length_words: 9500

special_instructions: |
  Three movements: (1) Hesiod's version as the anchor, with full translation of Theog. 820–880;
  (2) the later expansion with Apollodorus and Nonnus, marked as later — the sinew-theft is
  NOT in Hesiod; (3) the Near-Eastern-transmission question, with West 1997 and Burkert 1992
  as the core treatments. The chapter must present the Kumarbi parallels specifically and
  concretely, not at the level of generalities, since this chapter is the Greek end of the
  transmission bridge established in Chapter 5 (Kumarbi). The three-stage variant timeline
  (Hesiod → Apollodorus → Nonnus) is load-bearing: the story accretes over a millennium.
  Frame the forthcoming Chapter 12 family chapter as the Greek reception of this pattern.
