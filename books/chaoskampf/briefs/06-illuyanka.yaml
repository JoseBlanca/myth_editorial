lacunae:
  - source: hoffner-1998
    location: "Version 1, end of tablet (after binding of Illuyanka)"
    what_is_missing: "Closing section on the purulli festival framing partially broken"
    in_tradition_fills_available: "partial, the ritual colophon is extant"
  - source: hoffner-1998
    location: "Version 2, mid-narrative"
    what_is_missing: "Transitions between the storm-god's son's marriage into Illuyanka's house and the recovery episode"
    in_tradition_fills_available: "partial — the tablet preserves enough for the narrative arc"

variants:
  classification: co-equal
  prevalent_version:
    source: hoffner-1998
    why_prevalent: "The two versions sit on the same tablet group (CTH 321) and are presented by the scribes as two accounts of the same combat. Neither is scholarly-marked as primary. Present side by side."
  alternates:
    - source: hoffner-1998
      difference: "Version 1: the goddess Inara lures Illuyanka out of its hole with a banquet; the mortal Hupasiya, having bargained for a night with Inara, binds the serpent while it is stuffed. Version 2: the storm-god loses heart and eyes to Illuyanka; his son (by a mortal wife) marries Illuyanka's daughter and reclaims the organs as bride-price, then must be killed along with his father-in-law."

entities_glossary:
  - name: "Tarḫunna (𒀭𒅎)"
    role: deity
    first_mention_gloss_candidate: "Hittite storm-god; called Teshub in Hurrian contexts"
  - name: "Illuyanka"
    role: deity
    first_mention_gloss_candidate: "serpent-monster, the storm-god's adversary"
  - name: "Inara (𒀭𒈠𒍝)"
    role: deity
    first_mention_gloss_candidate: "daughter of the storm-god; ritual actor in Version 1"
  - name: "Hupasiya"
    role: hero
    first_mention_gloss_candidate: "mortal man who binds Illuyanka; Inara's partner in Version 1"
  - name: "purulli (𒁉𒊒𒇻𒇷)"
    role: ritual-term
    first_mention_gloss_candidate: "Hittite spring festival at which the Illuyanka myth was recited"
  - name: "Nerik"
    role: place
    first_mention_gloss_candidate: "northern Hittite cult center of the storm-god; centre of the purulli festival"

cultural_relevance:
  centrality: central
  centrality_evidence:
    - kind: ritual-context
      detail: "The myth is explicitly framed by its scribal colophon as the aetiology of the purulli festival — one of the few Near Eastern combat myths whose liturgical embedding is directly attested on the tablet itself"
      source: "hoffner-1998 on Illuyanka; beckman-1982-illuyanka"
    - kind: attestation-volume
      detail: "Multiple manuscripts from Hattusa archives"
      source: "hoffner-1998 introduction"
    - kind: scholarly-attention
      detail: "Featured centrally in Watkins's Indo-European poetic-formula study and in West's Near Eastern transmission argument"
      source: "watkins-1995; west-1997"
  function:
    - role: ritual-aetiological
      basis: "The myth is the explicit charter of the purulli spring festival — cyclical-maintenance type"
      source: "hoffner-1998; beckman-1982-illuyanka"
    - role: royal-legitimation
      basis: "The storm-god of Nerik (and thus the purulli cult) is tied into Hittite royal religion"
      source: "hoffner-1998 introduction"
  cross_cultural_parallels:
    - other_culture: "Egypt"
      parallel: "Ra's nightly defeat of Apep is the other classic case of cyclical-maintenance chaoskampf: a combat tied to a recurring calendrical frame rather than a one-off cosmogonic act"
      source: "faulkner-1972-bod; te-velde-1967"
    - other_culture: "Indo-European"
      parallel: "Watkins traces the áhann áhim 'he slew the serpent' formula from Rigveda through Hittite Illuyanka to the Germanic and Greek reflexes"
      source: "watkins-1995"
    - other_culture: "Greek"
      parallel: "Apollo's Septerion festival at Delphi re-enacted the Python-slaying annually — a cyclical-maintenance echo, though cult-foundation rather than sovereignty"
      source: "fontenrose-1959"

comparative_hooks:
  - other_culture: "Indo-European"
    parallel: "Illuyanka is one of Watkins's four primary demonstration cases (with Vṛtra, Python, and the Middle Iranian materials) for the reconstructed IE combat formula"
    source: "watkins-1995"
  - other_culture: "Egyptian"
    parallel: "The purulli-as-annual-combat structure is the closest Near-Eastern parallel to the daily Apep-combat; Part II C3 develops this as the cyclical-maintenance subtype"
    source: "faulkner-1972-bod"
  - other_culture: "Norse"
    parallel: "Version 2's loss-and-recovery pattern (heart and eyes) has been compared to Thor's body-damage in the Ragnarök combat with Jörmungandr, though directly cognate only in very broad structural outlines"
    source: "watkins-1995"

triangulation_databases:
  - TITUS
  - CDLI

target_length_words: 5500

special_instructions: |
  Present Version 1 and Version 2 side by side, each with its own tablet-line attribution.
  Both are scribally-attested co-equal alternatives, not one primary and one variant. The
  ritual framing (purulli festival) is the chapter's through-line — open and close on the
  liturgical context, with the two narrative versions in the middle. The Watkins formula
  discussion is context for the chapter but belongs to Part II C5 in extended form: keep it
  brief here.
