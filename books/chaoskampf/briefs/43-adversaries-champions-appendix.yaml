special_instructions: |
  The appendix is a reference tool, not a narrative chapter. Entries are one paragraph
  each (150–250 words). Cross-references use chapter anchors. Alphabetical order
  within each of the two lists (adversaries, champions). Some figures (Seth, Quetzalcoatl)
  appear in both lists. Apollo and Herakles appear multiple times (different combats)
  but get one consolidated entry. The appendix is where readers can quickly check "what
  is Lôtan" or "who is Pariacaca" without reading the whole book. Do not use entries to
  re-argue the book's theses; entries are strictly informational.
