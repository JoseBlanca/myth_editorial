chapter_number: 43
slug: "adversaries-champions-appendix"
title: "Adversaries and Champions: An Appendix"
chapter_anchor: "ch-43-adversaries-champions-appendix"

chapter_type: "back-matter (appendix)"

purpose: |
  A reference appendix with one short entry per named adversary (monster / serpent / rival)
  and one short entry per named champion, organised alphabetically. Load-bearing because
  the book's cross-cultural comparisons happen across figures, not plots: readers want to
  look up "Leviathan" or "Thor" and get the entry rather than search through chapter text.

structure:
  # The appendix's structure is deliberately non-narrative.
  entry_format: |
    Each entry gets the same five fields:
      - Name(s) / epithets (native form + transliteration)
      - Tradition(s) and period
      - Role / type (adversary / champion / both — some figures, like Seth, are both)
      - Combat(s) in which the figure appears (cross-reference to chapter number)
      - One-paragraph summary of the figure's distinctive features
