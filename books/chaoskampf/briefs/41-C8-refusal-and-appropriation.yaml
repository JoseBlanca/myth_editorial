special_instructions: |
  The most methodologically-sensitive chapter in the book. Every factual claim in the
  Anishinaabe, Aboriginal-Australian, and Nyanga sections must cite an area specialist
  by name, per scope.md §"Appropriation protocol". The chapter must be self-aware about
  the book's own limits: a book written in English, drawing on secondary scholarship,
  about traditions whose living practitioners have their own authority over how they
  should be represented. The goal is NOT to have it both ways (comparing and refusing to
  compare); the goal is to show that refusing to compare these specific cases is itself
  a principled form of comparison — one that takes the area specialists' refusal as data
  and builds the book's typology around it rather than against it. The chapter must engage
  directly with the methodological criticism that comparative mythology historically has
  been a colonial / universalising project, and explain how this book tries to do better.
