structure:
  - section: "I. The Rainbow Serpent problem"
    summary: "Radcliffe-Brown 1926's consolidation. The ethnographic dismantling (Merlan, Morphy, Rose, Keen). The regional specificity of Yingarna, Ngalyod, Wanambi, Wagyl, Yulunggul. What the 'Rainbow Serpent' signifier obscures."
  - section: "II. The Nanabozho/Mishipeshu refusal"
    summary: "Hallowell's ontology. Johnston, T. Smith, Vizenor. The Thunderer / Underwater-manitouk dialectic as necessary, not adversarial. Why 'chaos vs. order' is a category-error here."
  - section: "III. Mwindo revisited in this frame"
    summary: "C7 treated Mwindo as inversion; here the chapter considers the fuller implication: Mwindo's moral frame is specifically Nyanga, and the sky-god's punishment of the hero is traditional teaching about hubris rather than a variant chaoskampf. The epic's own pedagogy should shape the comparison."
  - section: "IV. The Kalevala question — Lönnrot's editorial hand"
    summary: "The Väinämöinen-Iku-Turso material was reshaped by Lönnrot in 1835 / 1849 from older rune fragments. The 'binding' of Iku-Turso is partly Lönnrot's synthesis. This is a different kind of appropriation — of earlier material by a nationalist-romantic compiler — and it affects what the chapter can claim about 'Finnic chaoskampf'."
  - section: "V. Bakunawa and the communal combat"
    summary: "In Visayan / Bikol tradition, Bakunawa is driven off during eclipses by communal noise-making. No hero. No slaying. The combat is communal and recurring. The chapter asks whether this counts as chaoskampf at all, and what excluding it would cost the comparison."
  - section: "VI. What the refusal teaches"
    summary: "The comparativist project does not require every tradition to fit the pattern. The cases where it DOESN'T fit — when area specialists explicitly and consistently say so — are themselves data. They tell us where the pattern has limits, what features are contingent on certain types of cosmology, and how to do comparison responsibly."

