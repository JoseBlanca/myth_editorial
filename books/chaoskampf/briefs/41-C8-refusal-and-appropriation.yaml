comparative_argument: |
  Where C7 addresses the "inverted" combat-myths (the frame still applies, inverted),
  this chapter addresses cases where area specialists refuse the frame altogether. The
  Rainbow Serpent problem: Radcliffe-Brown 1926 consolidated regionally distinct
  Aboriginal Australian ancestral beings (Yingarna, Ngalyod, Wanambi, Wagyl, Yulunggul,
  etc.) into a pan-Aboriginal "Rainbow Serpent" that is a 20th-century scholarly construct
  rather than an Aboriginal concept. Merlan 1998, Morphy 1991, Rose 1996, and Keen 1994
  have dismantled the consolidation. The Anishinaabe Nanabozho / Mishipeshu case is more
  principled still: Hallowell's 1960 analysis shows that Anishinaabe ontology frames
  Mishipeshu and the Thunderers as necessary counterparts in a reciprocal moral universe,
  not adversaries to be defeated. Theresa S. Smith and Gerald Vizenor extend this. The
  chapter argues that the chaoskampf category, when applied to these traditions, is not
  just wrong — it is a species of scholarly appropriation that distorts what the traditions
  actually teach, and that refusing the frame is not anti-comparative but more responsibly
  comparative.

