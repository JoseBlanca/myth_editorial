lacunae:
  - source: jamison-brereton-2014
    location: "No philological lacunae — the Rigveda is orally preserved with extreme precision"
    what_is_missing: "Narrative not philological: the Rigveda never tells the Vṛtra combat as a full story; each hymn is a ritual invocation that alludes to the combat"
    in_tradition_fills_available: "partial — the full narrative must be reconstructed from multiple hymns read together (the 'hymn-cycle method')"

variants:
  classification: composite-editorial
  prevalent_version:
    source: jamison-brereton-2014
    why_prevalent: "Rigveda 1.32 is the most concentrated and complete hymn (15 verses) on the Vṛtra combat. Jamison & Brereton is the scholarly-standard English Rigveda. The chapter uses 1.32 as base text with 2.11, 2.12, 4.18, and 10.113 as co-witnesses."
  alternates:
    - source: jamison-brereton-2014
      difference: "Later tradition (Śatapatha Brāhmaṇa 1.6.3–4; Mahābhārata Udyogaparvan 9–18) reframes Vṛtra as a Brahmin, making Indra's slaying a sin of brahminicide requiring expiation. This is post-Vedic and must be clearly marked — do not merge with the Rigvedic combat."

entities_glossary:
  - name: "Indra (इन्द्र)"
    role: deity
    first_mention_gloss_candidate: "Vedic storm-god, chief of the gods in the Rigveda, wielder of the vajra"
  - name: "Vṛtra (वृत्र)"
    role: deity
    first_mention_gloss_candidate: "serpent-demon whose name derives from vṛ- 'to obstruct / enclose'; the obstacle that blocks the waters"
  - name: "vajra (वज्र)"
    role: artifact
    first_mention_gloss_candidate: "Indra's thunderbolt-mace, forged by Tvaṣṭṛ; the cosmic weapon"
  - name: "Tvaṣṭṛ (त्वष्टृ)"
    role: deity
    first_mention_gloss_candidate: "divine artisan; forges Indra's vajra"
  - name: "soma (सोम)"
    role: ritual-term
    first_mention_gloss_candidate: "ritual drink (and deified plant) that fortifies Indra for the combat"
  - name: "ahi (अहि)"
    role: deity
    first_mention_gloss_candidate: "'serpent' — used as an epithet of Vṛtra; the word of the Watkins formula áhann áhim 'he slew the serpent'"
  - name: "Dānu (दानु)"
    role: deity
    first_mention_gloss_candidate: "Vṛtra's mother; her waters are released when Vṛtra is slain"

cultural_relevance:
  centrality: central
  centrality_evidence:
    - kind: attestation-volume
      detail: "Indra is the most frequently addressed deity in the Rigveda; his Vṛtra-slaying is referenced across all ten maṇḍalas and receives full hymn-length treatment in at least eight hymns"
      source: "jamison-brereton-2014 introduction"
    - kind: ritual-context
      detail: "Rigvedic hymns are liturgical: each Vṛtra-slaying invocation is part of the soma sacrifice, so the combat is ritually re-performed at every major Vedic sacrifice"
      source: "jamison-brereton-2014"
    - kind: scholarly-attention
      detail: "Indra/Vṛtra is the anchor case for Watkins's entire HERO SLAY SERPENT formula; the book's most thoroughly studied IE combat-myth"
      source: "watkins-1995"
  function:
    - role: cosmological
      basis: "The combat simultaneously separates heaven and earth, releases the waters (rain and rivers), and produces dawn — Rigveda 1.32 explicitly credits Indra with all three acts"
      source: "jamison-brereton-2014 on RV 1.32"
    - role: royal-legitimation
      basis: "Indra's victory establishes his kingship over the gods; the combat is cited in later hymns as the warrant for his supreme status"
      source: "jamison-brereton-2014"
    - role: ritual-aetiological
      basis: "The combat is the mythic reason for the soma offering — Indra needs the strengthening drink to fight Vṛtra, so the ritual is a replay of divine history"
      source: "jamison-brereton-2014"
  cross_cultural_parallels:
    - other_culture: "Avestan (Iranian)"
      parallel: "Thraētaona's Aži Dahāka and Keresaspa's serpent-combat are the Iranian cognate tradition; philologically, Vedic ahi and Avestan aži are the same word"
      source: "benveniste-renou-1934; watkins-1995"
    - other_culture: "Hittite"
      parallel: "Teshub-Illuyanka and Indra-Vṛtra share the storm-god-versus-serpent structure and the áhann áhim 'he slew the serpent' formula in Watkins's reconstruction"
      source: "watkins-1995"
    - other_culture: "Mesopotamia"
      parallel: "Indra's splitting of the mountain to release the waters has often been compared to Marduk's division of Tiamat; the structural parallel is real but the transmission route is not demonstrable"
      source: "west-2007"

comparative_hooks:
  - other_culture: "Iran"
    parallel: "Trita-Thraētaona / Indra-Vṛtra is the prime Indo-Iranian pair; Part II C5 treats this in depth. The Vedic and Avestan witnesses demonstrate the combat-formula in its shared phase"
    source: "benveniste-renou-1934; watkins-1995"
  - other_culture: "Hittite / Germanic / Greek"
    parallel: "Watkins's HERO SLAY SERPENT formula is built across Vedic, Hittite, Greek, and Germanic witnesses; Indra/Vṛtra is the clearest and most complete attestation"
    source: "watkins-1995"
  - other_culture: "Bhakti tradition"
    parallel: "Later Hindu reworkings (Krishna-Kāliya in the bhakti epoch) echo the Indra-Vṛtra water-release structure, though heavily transformed; the Chapter 15 family chapter develops this"
    source: "jamison-brereton-2014"

