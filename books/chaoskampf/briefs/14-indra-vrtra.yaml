special_instructions: |
  Structure: (1) present Rigveda 1.32 as the base text with full J&B translation, hymn by
  hymn; (2) the supporting hymn-cycle (2.11, 2.12, 4.18, 10.113) as co-witnesses that flesh
  out the combat; (3) Watkins's HERO SLAY SERPENT formula — introduce it here in Vedic
  form and flag that Part II C5 will develop the cross-cultural evidence; (4) the post-Vedic
  brahminicide reframing (Śatapatha Brāhmaṇa, Mahābhārata) as a clearly-marked later
  transformation, NOT part of the Rigvedic combat. The Vṛtra-as-Brahmin reading is
  load-bearing for Hindu reception history but it would distort the Rigvedic combat if
  merged uncritically. Indra's combat is the book's clearest case of a combat that does
  cosmogonic work (separating heaven and earth, releasing waters, making dawn) without
  being a cosmogony in the Mesopotamian sense (no body-of-Tiamat physical creation). This
  distinction is important for Part II C1.
