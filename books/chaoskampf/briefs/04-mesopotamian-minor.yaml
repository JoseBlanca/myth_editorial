family_members:
  - name: "Marduk(?) vs. Labbu"
    summary: "A single fragmentary Akkadian tablet preserves a tale of a serpent-dragon fifty leagues long, called Labbu ('lion' or 'raging one'), slain by a god whose name is lost to a break where the identification appears. Marduk, Tishpak, and Nergal have all been proposed. The fragment is too broken for secure cosmogonic function; the tale is included primarily to show that the Mesopotamian combat-myth tradition is richer than the three full chapters (Asag, Anzû, Tiamat) suggest."

shared_variant_handling: |
  Fragmentary-by-design. The chapter presents the text as it survives, names the proposed
  combatants, and does NOT fill the lacunae from Marduk or other combat narratives. Present
  the textual situation — who has argued for each identification — rather than a composite
  narrative.

cultural_relevance:
  centrality: marginal
  function: "literary / scribal — a fragment within the larger combat-myth corpus"
  cross_cultural_parallel: "none distinctive beyond the general Mesopotamian combat-myth pattern"

target_length_words: 2500

special_instructions: |
  Short chapter. Do not pad. The chapter's purpose is to round out the Mesopotamian cluster
  by showing that the combat-myth tradition produced more than the three flagship cases.
  Honest fragmentary framing: the chapter should open by explaining what we do and do not
  have, and resist the temptation to reconstruct the narrative from Marduk or Tishpak
  parallels. The fragment's own value is that it existed.
