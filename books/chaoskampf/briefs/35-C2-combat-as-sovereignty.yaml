comparative_argument: |
  A larger and more linguistically coherent cluster than the cosmogonic set: combats in
  which the combat establishes or restores sovereignty over gods and/or humans. Baal gains
  kingship by slaying Yamm; Zeus by slaying Typhon; Indra by slaying Vṛtra; Thraētaona by
  slaying Aži Dahāka; Teshub by defeating Ullikummi; Ninurta by reclaiming the Tablet from
  Anzu; YHWH's combat imagery undergirds royal-psalm theology. This is where Ballentine's
  alternative-sovereign reading is strongest: the adversaries are not undifferentiated chaos,
  they are rival courts, rival kings, rival claimants. The chapter argues that sovereignty
  (not cosmogony) is the primary function of most combat myths in the book's corpus.

