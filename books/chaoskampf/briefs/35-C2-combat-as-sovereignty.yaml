structure:
  - section: "I. The pattern"
    summary: "Storm-god / champion + rival-kingship adversary + combat = sovereign elevation. Show the pattern across seven cases."
  - section: "II. Ballentine's reading"
    summary: "The adversaries have courts, retainers, and legitimate-seeming claims. Yamm is handed kingship by El; Qingu gets the Tablet of Destinies from Tiamat; Aži Dahāka rules lands. This makes 'chaos' linguistically awkward."
  - section: "III. The difference from cosmogony"
    summary: "In sovereignty combats, the world already exists. What changes is who rules it. This distinguishes the subtype from C1."
  - section: "IV. The Anzu-to-Marduk genealogy"
    summary: "Within Mesopotamian tradition, Anzu (sovereignty) is reworked into Enūma Eliš (sovereignty + cosmogony). Document how sovereignty combats get escalated into cosmogonic ones, using the best-documented case."
  - section: "V. Transmission vs. typology"
    summary: "Baal-Yamm → YHWH-Leviathan-Rahab → Rev 12 is a documented transmission. Zeus-Typhon via Kumarbi is well-argued. Indra-Vṛtra and Thraētaona-Aži Dahāka are IE inheritance. Some of this cluster's coherence IS due to transmission, not just independent typology."
  - section: "VI. Ritual and state"
    summary: "Many sovereignty combats are tied to coronation / state ritual (Marduk at akītu, Baal at Ṣapānu palace-founding, Zeus on Olympus). The combat is the rite that the king performs-by-proxy."

