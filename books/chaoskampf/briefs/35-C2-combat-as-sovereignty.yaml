special_instructions: |
  This is the book's most philosophically-weighted comparative chapter, because it hosts
  the Ballentine-Gunkel argument at its sharpest. The chapter should present Ballentine's
  reading as the primary interpretive frame for this subtype — not because the book fully
  endorses it, but because the evidence in this subtype supports it more than in C1 or C3.
  The cosmogonic-combat chapter (C1) can keep "chaos" as informal shorthand; the sovereignty
  chapter (C2) really should not. The Anzu-to-Marduk escalation is the chapter's best
  worked example: show how a pure sovereignty combat (Anzu) becomes a cosmogonic-sovereignty
  combat (Enūma Eliš) through deliberate Babylonian theological engineering.
