lacunae:
  - source: smith-1994-baal-i
    location: "KTU 1.1 throughout"
    what_is_missing: "This opening tablet is badly damaged; the sequence of events prior to Baal's investiture as divine warrior is partially reconstructed"
    in_tradition_fills_available: "yes, from KTU 1.2 internal cross-references and from thematic parallels in KTU 1.3–1.4"
  - source: smith-pitard-2009-baal-ii
    location: "KTU 1.5 i 1–3 (Lôtan passage)"
    what_is_missing: "The Lôtan reference is embedded as a boast by Mot; the narrative of the Lôtan combat itself is not preserved"
    in_tradition_fills_available: "no — the chapter must treat Lôtan as an allusion to a combat Baal has evidently already won, without filling in a 'Baal-Lôtan combat narrative' from parallels"

