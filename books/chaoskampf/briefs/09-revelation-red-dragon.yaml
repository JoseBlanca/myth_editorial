variants:
  classification: single-prevalent
  prevalent_version:
    source: yarbro-collins-1976
    why_prevalent: "Rev 12 is a single canonical text. Variant readings are textual-critical (NA28) and minor. The chapter uses an English translation (NRSV or Aune's own) keyed to the Greek."
  alternates:
    - source: aune-revelation
      difference: "Rev 12 draws on antecedent traditions — Leto-Apollo-Python (Greco-Roman), YHWH-Leviathan-Rahab (Hebrew Bible), and possibly Isis-Horus-Set (Egyptian). Yarbro Collins argues the primary substrate is Leto-Apollo, with Jewish overlay; Aune is more eclectic. Present both readings."

