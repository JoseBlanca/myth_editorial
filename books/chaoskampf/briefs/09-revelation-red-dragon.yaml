special_instructions: |
  The chapter must present both Yarbro Collins's Leto-Apollo-Python primary substrate reading
  and the more eclectic Aune / Forsyth reading that the combat draws on multiple streams
  (Jewish apocalyptic, Greek myth, Isis religion). The Rev 12:9 identification of the dragon
  with "the ancient serpent, the devil, Satan" is the pivot where the combat-myth tradition
  acquires its mature Christian form — do not gloss over it. The chapter closes Part I's
  Hebrew-Christian section and sets up the Christian reception family chapter (10), as well
  as Part II C4 (eschatological displacement). Do not treat Rev 12 as the "final" chaoskampf;
  it is one eschatological reformulation among several.
