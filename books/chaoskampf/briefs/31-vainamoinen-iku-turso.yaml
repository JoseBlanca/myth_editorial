  summary: |
    Older rune-tradition witnesses are more laconic; Lönnrot's 1835 / 1849 Kalevala is a
    composite literary-editorial synthesis that expanded and reshaped the older fragments.
    The chapter presents BOTH layers — the older rune material AND Lönnrot's redaction —
    side by side, per scope-lock 2026-04-23 "transformed variant" framing.

summary: |
  The sea-monster Iku-Turso emerges from the sea; Väinämöinen subdues him by shamanic song
  rather than by sword. The encounter is a binding, not a slaying. The older rune material
  is laconic; Lönnrot's Kalevala expanded and integrated the material into the modern
  composite. The chapter treats both the older attestation and the Lönnrot editorial layer
  explicitly.

cultural_relevance:
  centrality: |
    Central in modern Finnish national consciousness (via the Kalevala); marginal in
    historical-attestation terms (the older rune material is more fragmentary than the
    Kalevala's prominence would suggest).
  function: |
    - Shamanistic-ritual (Väinämöinen's song as knowledge-and-subjugation rather than
      combat)
    - National-romantic (via Lönnrot's 19th-century project)
    - Didactic (the hero-sage as knowledge-holder rather than warrior)
  cross_cultural_parallels: |
    - The "subjugate-not-slay" transformation parallels Krishna-Kāliya (Chapter 15) —
      binding or taming rather than killing.
    - The knowledge-over-force framing is distinctively Finnic; no direct IE parallel.
    - Lönnrot's editorial synthesis raises methodological parallels with the Macpherson-
      Ossian question and the Ivanov/Toporov Perun-Veles reconstruction (Chapter 20): how
      much of "the tradition" is 19th-century nationalist reconstruction?

target_length_words: 4500

special_instructions: |
  The chapter must explicitly separate the older rune attestations from Lönnrot's 1835 /
  1849 editorial synthesis. Present the older material first (laconic, fragmentary) and
  then show how Lönnrot reshaped it into the Kalevala Iku-Turso episode. This two-layer
  framing is the chapter's contribution — Part II C8 (refusal and appropriation) picks up
  the methodological point about editorial synthesis. Area-specialist citation applies:
  cite Siikala by name throughout; note the broader scholarship on Lönnrot's compositional
  method (Honko, DuBois). The chapter does NOT claim Iku-Turso fits chaoskampf cleanly; the
  "transformed variant" framing is explicit.
