structure_the_chapter_must_follow:
  - section: "I. What the book is about"
    summary: "A non-technical statement of what combat-myth / chaoskampf means: a sovereign or champion defeats a monstrous adversary, and the combat does order-making work. Use Marduk-Tiamat as opening exemplar but flag immediately that Marduk is not the only template."
  - section: "II. The word — Gunkel 1895"
    summary: "What Gunkel proposed in 1895, the context (German biblical criticism, Babylonian rediscovery), and why the term stuck."
  - section: "III. The critique — Scurlock/Beal, Ballentine"
    summary: "Why recent scholars are uneasy with 'chaos': the adversaries are not inchoate chaos; they are defeated rival sovereigns. 'Chaos' imports a Hellenistic/philosophical category that the ancient texts don't use."
  - section: "IV. The operational definition this book uses"
    summary: |
      A sovereign (or would-be sovereign) defeats a monstrous or serpentine adversary,
      and the combat does one or more of the following kinds of order-making work:
      cosmogonic, sovereignty, cyclical maintenance, eschatological. We retain the term
      because of its reader-recognition and search-term coverage, but use 'combat myth'
      interchangeably in body prose.
  - section: "V. Four subtypes, previewed"
    summary: |
      Cosmogonic (Marduk, Ninurta/Asag, Gonggong, Huitzilopochtli). Sovereignty (Baal/Yamm,
      Zeus/Typhon, Indra/Vṛtra, Kumarbi/Ullikummi, Ninurta/Anzu, Thraētaona). Cyclical
      maintenance (Ra/Apep, Illuyanka). Eschatological (Thor/Jörmungandr, Rev 12,
      Frashokereti). Preview only; each subtype has a Part II chapter.
  - section: "VI. Cross-cultural parallels, with proportion"
    summary: |
      Yes, parallels are pervasive. No, this does not mean pan-human monomyth or single
      origin. Transmission routes (Kumarbi → Hesiod; Ugarit → Hebrew Bible; Indo-Iranian
      inheritance) are documented for some cases. Independent invention is likely for
      others. Some traditions resist the framing and the book treats that refusal as data,
      not failure.
  - section: "VII. What this book is not"
    summary: |
      Not a catalog. Not an origin-story for the monomyth. Not a book about dragons in
      general. Not a reduction of every dragon-fight to chaoskampf — the book expends
      substantial effort (Chapter 32, Chapter 41, the Rainbow Serpent critique in C8)
      marking where the category does NOT apply.
  - section: "VIII. How to read the book"
    summary: |
      Part I — 32 story chapters organised geographically. Part II — 8 comparative chapters.
      Methods sidebar between the two. Back matter — reception coda, adversaries/champions
      appendix. Front-to-back readers get the framing before the cases; cherry-pickers can
      read any Part I chapter standalone and cross-reference to Part II via the anchors.

cultural_relevance_aggregation:
  # The introduction aggregates the cultural_relevance fields from all 15 CORE briefs.
  # The writing AI should consult those briefs and weave the evidence into Section VI.
  summary: |
    Most CORE cases are attested as CENTRAL in their cultures (Lugal-e, Enūma Eliš, the
    Baal Cycle, the Kumarbi Cycle, Rigvedic Indra, Book of the Dead Apep, Thor-iconography,
    Templo Mayor, Rev 12 canonical scripture). Cultural functions span cosmological,
    sovereignty, ritual-aetiological, eschatological, and didactic — with most cases serving
    multiple functions at once. The introduction uses these as evidence that combat-myth is
    not a marginal or literary artifact but a load-bearing feature of the traditions that
    produced it.

