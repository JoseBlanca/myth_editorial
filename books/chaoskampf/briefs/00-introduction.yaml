chapter_number: 0
slug: "introduction"
title: "What Chaoskampf is, and why the word is contested"
chapter_anchor: "ch-00-introduction"

chapter_type: "front-matter introduction"

purpose: |
  Front-load the book's operational definition of Chaoskampf, the 1895 Gunkel thesis that
  named the category, the 20th–21st century critiques (Scurlock & Beal 2013, Ballentine 2015),
  and the book's intellectual posture: we retain the term because it is what readers will
  search for and what scholars still (uneasily) use, but we take the critiques seriously and
  use "combat myth" as an interchangeable term in body prose. The introduction is the reader's
  orientation — how to read everything that follows.

