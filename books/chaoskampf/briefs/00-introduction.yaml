special_instructions: |
  The introduction is a piece of literary writing as much as a piece of scholarship. It sets
  the register for the book. Follow the plain-English register locked in scope.md §"Book
  register". DO NOT begin with a lecture on Gunkel and German biblical criticism; begin with
  a specific combat (Marduk and Tiamat is the canonical opening, though Enki-Dilmun or
  Ninurta-Asag are alternatives the writer may prefer) and let the conceptual framework
  emerge from it. The Ballentine critique must be presented charitably: the argument is
  that "chaos" is a philosophically-loaded Western category that distorts the actual
  ancient adversaries, who are presented as rival sovereigns with their own power structures
  and retainers. Do not stage-manage the debate: the reader should finish the introduction
  with both positions clearly understood, not with a verdict.
