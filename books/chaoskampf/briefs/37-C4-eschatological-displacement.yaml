structure:
  - section: "I. The pattern"
    summary: "Monster bound or held → released → final combat → cosmic closure or renovation. Three attestations across Norse, Christian-Jewish, and Zoroastrian traditions."
  - section: "II. The three cases"
    summary: "Thor-Jörmungandr at Ragnarök; Michael-red-dragon in Rev 12 (with the binding of Satan at Rev 20); Aži Dahāka released and killed at Frashokereti."
  - section: "III. The common structural element — the binding"
    summary: "All three monsters are constrained, not destroyed, in the pre-eschatological age. This is the signature of the subtype. Contrast with Marduk's decisive killing of Tiamat."
  - section: "IV. Historical influence or typological convergence?"
    summary: "Three possibilities: Zoroastrian influence on Jewish apocalyptic (widely accepted); Jewish-Christian influence on Norse (via Christianization contact); independent convergence due to structural pressure from linear-time cosmology. The chapter presents the evidence without forcing a verdict."
  - section: "V. Isaiah 27:1 as transition"
    summary: "The Hebrew Bible's combat imagery is mostly retrospective (Pss 74, Job 26: YHWH already won). Isaiah 27:1 is the exception — projecting the combat forward 'on that day'. This may be the key text in the shift toward eschatological combat."
  - section: "VI. What eschatology changes"
    summary: "A terminal combat functions differently in a tradition than a perpetual or primordial one. Changes believers' relationship to the monster (patience rather than ritual); to history (meaningful-linear rather than cyclical); to the hero (promised rather than already-victorious)."

