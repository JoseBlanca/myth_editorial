comparative_argument: |
  Three independent traditions (Norse, Christian-Jewish-apocalyptic, Zoroastrian) displace
  the combat out of the primordial past and out of the maintenance-present into the end
  of cosmic time. In each, the monster is bound or held in reserve (Jörmungandr encircling
  the world, Satan cast down, Aži Dahāka bound at Damāvand), escapes or is released, and
  is killed in a final combat that ends or renovates the age. The three traditions are
  historically adjacent (all late Iron Age / early post-classical) and may have influenced
  each other — Zoroastrian eschatology is a plausible source of influence on both Jewish
  apocalyptic and Norse eschatology. The chapter's argument: eschatological displacement
  is a late innovation in the combat-myth tradition, made possible by the development of
  linear-time cosmology that earlier traditions (Marduk, Ra, Illuyanka) did not share.

