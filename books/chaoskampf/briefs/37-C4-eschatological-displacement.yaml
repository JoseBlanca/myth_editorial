special_instructions: |
  The Zoroastrian-influence-on-Jewish-apocalyptic argument is old and well-argued but not
  universally accepted; present it charitably without over-committing. Ragnarök is the
  cleanest Indo-European case; its structural fit with Frashokereti is striking and has
  received comparative treatment (Dumézil, West, Puhvel). The chapter should not re-narrate
  the individual cases — refer readers back to the Part I chapters. The theoretical
  contribution is the observation that eschatological displacement IS a distinct subtype
  with distinct cognitive implications for believers, not merely "combat at the end instead
  of the beginning."
