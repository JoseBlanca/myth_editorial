  - severity: MEDIUM
    kind: SILENT-CONFLATION
    story_id: kumarbi-ullikummi
    entity_or_detail: "Song of Hedammu + Song of the Sea inside one Kumarbi Cycle entry"
    issue: |
      The entry bundles *Song of Ullikummi* (the title-piece), *Kingship
      in Heaven*, and *Song of Hedammu* under one CORE chapter. The
      variants field acknowledges Kingship in Heaven and Hedammu as
      "companion texts." However, the cycle also includes the *Song of
      the Sea* (a separate combat between Teshub and Kiaše / Aruna,
      attested in summary in other Hurro-Hittite material) and the
      *Song of LAMMA* — the *Song of the Sea* is in fact a distinct
      combat-myth candidate which the Beckman / Rutherford scholarship
      treats as a separate Teshub-vs-chaos episode. Bundling it
      silently inside "Kumarbi Cycle" risks losing that distinction,
      particularly when Part II C6 (Near East → Mediterranean
      transmission) will want to engage it.
    evidence_quote: |
      "The Song of the Sea no longer survives but was summarized in
      another text. It has been proposed that Song of the Sea was
      a part of the Kumarbi cycle, but this remains uncertain...
      The Song of the Sea appears to depict a battle between the
      storm god Teshub and the sea deity." (Wikipedia summary of
      Rutherford / Archi scholarship; see also Rutherford,
      "The Hittite 'Song of Emergence' and the Theogony").
    evidence_source: "ResearchGate / Wikipedia / Rutherford articles"
    recommended_action: |
      Expand the variants field to list Hedammu, Kingship in Heaven,
      LAMMA, and Song of the Sea as explicitly separate companion
      texts; at chapter-briefs, decide whether Song of the Sea gets
      its own short treatment or is a sidebar. The comparative C6
      chapter must not silently elide it.

